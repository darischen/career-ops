              - heading "Protecting Yourself from Recruitment Scams" [level=3] [ref=e61]:
                - strong [ref=e62]: Protecting Yourself from Recruitment Scams
              - paragraph [ref=e63]: Anduril is committed to maintaining the integrity of our Talent acquisition process and the security of our candidates. We've observed a rise in sophisticated phishing and fraudulent schemes where individuals impersonate Anduril representatives, luring job seekers with false interviews or job offers. These scammers often attempt to extract payment or sensitive personal information.
            - generic [ref=e64]:
              - paragraph [ref=e65]: "To ensure your safety and help you navigate your job search with confidence, please keep the following critical points in mind:"
              - list [ref=e66]:
                - listitem [ref=e67]:
                  - paragraph [ref=e68]:
                    - strong [ref=e69]: "No Financial Requests:"
                    - text: Anduril will never solicit payment or demand personal financial details (such as banking information, credit card numbers, or social security numbers) at any stage of our hiring process. Our legitimate recruitment is entirely free for candidates.
                - listitem [ref=e70]:
                  - strong [ref=e71]: "Please always verify communications:"
                  - list [ref=e72]:
                    - listitem [ref=e73]:
                      - text: "Direct from Anduril: If you receive an email from one of our recruiters, it will"
                      - emphasis [ref=e74]: only
                      - text: come from an
                      - code [ref=e75]: "@anduril.com"
                      - text: address.
                    - listitem [ref=e76]:
                      - text: "Via Agency Partner: If contacted by a recruiting agency for an Anduril role, their email will clearly identify their agency. If you suspect any suspicious activity, please verify the agency's authenticity by reaching out to"
                      - link "contact@anduril.com" [ref=e77] [cursor=pointer]:
                        - /url: mailto:contact@anduril.com
                      - text: .
                - listitem [ref=e78]:
                  - paragraph [ref=e79]:
                    - strong [ref=e80]: "Exercise Caution with Unsolicited Outreach:"
                    - text: If you receive any communication that appears suspicious, contains grammatical errors, or makes unusual requests, do not engage. Always confirm the sender's email domain is @anduril.com before providing any personal information or clicking on links.
                - listitem [ref=e81]:
                  - paragraph [ref=e82]:
                    - strong [ref=e83]: "What to Do If You Suspect Fraud:"
                    - text: Should you encounter any questionable or fraudulent outreach claiming to be from Anduril, please report it immediately to
                    - link "contact@anduril.com" [ref=e84] [cursor=pointer]:
                      - /url: mailto:contact@anduril.com
                    - text: . Your proactive caution is invaluable in protecting your personal information and upholding the security and trustworthiness of our recruitment efforts.
