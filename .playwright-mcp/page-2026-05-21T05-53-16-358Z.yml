                - listitem [ref=e419]: Blind or low vision
                - listitem [ref=e420]: Cancer (past or present)
                - listitem [ref=e421]: Cardiovascular or heart disease
                - listitem [ref=e422]: Celiac disease
                - listitem [ref=e423]: Cerebral palsy
