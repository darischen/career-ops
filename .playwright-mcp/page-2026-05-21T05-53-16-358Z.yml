          - generic [ref=e50]:
            - paragraph [ref=e51]: "The salary range for this role is an estimate based on a wide range of compensation factors, inclusive of base salary only. Actual salary offer may vary based on (but not limited to) work experience, education and/or training, critical skills, and/or business considerations. Highly competitive equity grants are included in the majority of full time offers; and are considered part of Anduril's total compensation package. Additionally, Anduril offers top-tier benefits for full-time employees, including:"
            - paragraph [ref=e52]
            - heading "Benefits" [level=3] [ref=e53]:
              - strong [ref=e54]: Benefits
            - paragraph [ref=e55]:
              - text: At Anduril, we invest in our people. Our comprehensive, competitive benefits package (available at little to no cost to employees) ensures you’re supported in health, recovery, and whatever comes next.
