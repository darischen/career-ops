        - generic [ref=e16]:
          - paragraph [ref=e18]: Anduril Industries is a defense technology company with a mission to transform U.S. and allied military capabilities with advanced technology. By bringing the expertise, technology, and business model of the 21st century’s most innovative companies to the defense industry, Anduril is changing how military systems are designed, built and sold. Anduril’s family of systems is powered by Lattice OS, an AI-powered operating system that turns thousands of data streams into a realtime, 3D command and control center. As the world enters an era of strategic competition, Anduril is committed to bringing cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology to the military in months, not years.
          - generic [ref=e19]:
            - heading "ABOUT THE JOB" [level=3] [ref=e20]
            - paragraph [ref=e21]: We are looking for Software Engineers to join our rapidly growing team! We have positions open in Seattle, WA. These roles are targeted to start on a quarterly basis beginning in 2026. We hire self-motivated people, those who hold a higher bar for themselves than anyone else could hold for them. If you are eager to solve tough problems, then this role might be for you!
            - heading "WHAT YOU’LL DO" [level=4] [ref=e22]
            - list [ref=e23]:
              - listitem [ref=e24]: Support the software solutions that are deployed to customers and key stakeholders.
              - listitem [ref=e25]: Write code to improve products and scale the mission capability to more customers.
              - listitem [ref=e26]: Collaborate across multiple teams to plan, build, and test complex functionality.
              - listitem [ref=e27]: Create and analyze metrics that are leveraged for debugging and monitoring.
              - listitem [ref=e28]: Triage issues, root cause failures, and coordinate next-steps.
              - listitem [ref=e29]: Work on real, meaningful projects and learn from experienced professionals along the way.
            - heading "REQUIRED QUALIFICATIONS" [level=4] [ref=e30]:
              - strong [ref=e31]: REQUIRED QUALIFICATIONS
            - list [ref=e32]:
              - listitem [ref=e33]: Must be pursuing or have completed a Bachelor’s or Master’s degree in Computer Science, Computer/Software Engineering, Mathematics, Physics, or a related field.
              - listitem [ref=e34]: 3 months - 2 years of technical work to include technical internship and able to start full time in 2026.
              - listitem [ref=e35]: Familiarity with algorithms, data structures, storage systems, cloud infrastructure, front-end frameworks, and other technical tools.
              - listitem [ref=e36]: Proficiency in a variety of programming languages such as C++, Go, Rust, Java, and Python.
              - listitem [ref=e37]: A desire to work on software and applications that have real-world impact.
              - listitem [ref=e38]: Must be a U.S. Person due to required access to U.S. export controlled information or facilities; U.S. clearance eligibility may be required depending on program.
            - heading "PREFERRED QUALIFICATIONS" [level=4] [ref=e39]:
              - strong [ref=e40]: PREFERRED QUALIFICATIONS
            - list [ref=e41]:
              - listitem [ref=e42]: Have a bias for action. If you see a problem, you want to solve and fix it.
              - listitem [ref=e43]: Be naturally curious about the technologies and tools you use.
              - listitem [ref=e44]: Low-ego, high ownership, and mission oriented.
            - paragraph [ref=e45]: Anduril is an equal-opportunity employer, and we encourage candidates from all backgrounds to apply. If you are someone passionate to work on problems that matter, we’d love to hear from you!
