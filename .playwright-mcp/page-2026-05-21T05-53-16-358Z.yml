                - listitem [ref=e427]: Epilepsy or other seizure disorder
                - listitem [ref=e428]: Gastrointestinal disorders, for example, Crohn's Disease, irritable bowel syndrome
                - listitem [ref=e429]: Intellectual or developmental disability
                - listitem [ref=e430]: Mental health conditions, for example, depression, bipolar disorder, anxiety disorder, schizophrenia, PTSD
                - listitem [ref=e431]: Missing limbs or partially missing limbs
