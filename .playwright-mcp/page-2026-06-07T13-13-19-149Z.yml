          - generic [ref=e23]:
            - heading "About Anthropic" [level=2] [ref=e24]:
              - strong [ref=e25]: About Anthropic
            - paragraph [ref=e26]: Anthropic’s mission is to create reliable, interpretable, and steerable AI systems. We want AI to be safe and beneficial for our users and for society as a whole. Our team is a quickly growing group of committed researchers, engineers, policy experts, and business leaders working together to build beneficial AI systems.
          - generic [ref=e27]:
            - heading "About the Role" [level=2] [ref=e28]
            - paragraph [ref=e29]: As Data Operations Manager, you'll build and scale data operations across research teams working on frontier AI capabilities. You'll partner with researchers to design and execute data strategies, manage vendor relationships, and own the entire data pipeline from requirements to production. This role requires operational excellence combined with technical depth to understand what makes high-quality training data, but your focus will be on strategy and execution.
            - heading "About the Impact" [level=2] [ref=e30]
            - paragraph [ref=e31]: The data operations you build will directly determine how well our models perform on critical capabilities—tool use accuracy, prompt injection robustness, long-horizon reasoning, and safety alignment. You'll work with world-class researchers advancing the frontier while building the operational infrastructure to scale these efforts.
            - paragraph [ref=e32]: We're looking for someone who gets excited about the challenge of scaling quality across diverse research areas—someone who can understand nuanced technical requirements, build the right partnerships, and execute flawlessly. If you thrive at the intersection of operational excellence and cutting-edge AI research, we'd love to hear from you.
            - heading "Responsibilities:" [level=2] [ref=e33]
            - list [ref=e34]:
              - listitem [ref=e35]:
                - paragraph [ref=e36]: Own and execute data strategy for research teams advancing frontier AI capabilities across RLHF, safety, tool use, and agentic workflows
              - listitem [ref=e37]:
                - paragraph [ref=e38]: Drive strategic vendor partnerships and build scalable frameworks for technical data collection at scale
              - listitem [ref=e39]:
                - paragraph [ref=e40]: Design and implement operational systems that translate research requirements into high-quality data pipelines
              - listitem [ref=e41]:
                - paragraph [ref=e42]: Build evaluation frameworks and quality standards that ensure data meets the bar for training state-of-the-art AI systems
              - listitem [ref=e43]:
                - paragraph [ref=e44]: Lead cross-functional initiatives to optimize research velocity while maintaining rigorous quality standards
              - listitem [ref=e45]:
                - paragraph [ref=e46]: Proactively identify risks, bottlenecks, and opportunities to improve efficiency and effectiveness across data operations
              - listitem [ref=e47]:
                - paragraph [ref=e48]: Partner with senior research leaders to align data operations with model development roadmaps and strategic priorities
            - heading "You may be a good fit if you:" [level=2] [ref=e49]
            - list [ref=e50]:
              - listitem [ref=e51]:
                - paragraph [ref=e52]: Have 3+ years in operations, consulting, product management, or program management roles
              - listitem [ref=e53]:
                - paragraph [ref=e54]: Have exceptional project management skills with ability to handle multiple complex projects simultaneously
              - listitem [ref=e55]:
                - paragraph [ref=e56]: Have strong communication skills and can engage effectively with technical and non-technical stakeholders
              - listitem [ref=e57]:
                - paragraph [ref=e58]: Are familiar with how LLMs work or have strong interest in understanding AI training methodologies
              - listitem [ref=e59]:
                - paragraph [ref=e60]: Are highly organized and can navigate ambiguity effectively
              - listitem [ref=e61]:
                - paragraph [ref=e62]: Have experience with data analysis tools (SQL, Python, Tableau, spreadsheets, or similar)
              - listitem [ref=e63]:
                - paragraph [ref=e64]: Thrive in fast-paced research environments with shifting priorities
              - listitem [ref=e65]:
                - paragraph [ref=e66]: Are passionate about AI safety and understand the critical importance of high-quality data
            - heading "Strong candidates may also have:" [level=2] [ref=e67]
            - list [ref=e68]:
              - listitem [ref=e69]:
                - paragraph [ref=e70]: Experience with data collection, labeling, or annotation operations for AI/ML systems
              - listitem [ref=e71]:
                - paragraph [ref=e72]: Knowledge of RLHF, constitutional AI, or human-in-the-loop workflows
              - listitem [ref=e73]:
                - paragraph [ref=e74]: Background working with research teams at AI companies or research-oriented organizations
              - listitem [ref=e75]:
                - paragraph [ref=e76]: Experience managing vendor relationships or external contractors
              - listitem [ref=e77]:
                - paragraph [ref=e78]: Consulting background with experience translating complex requirements into deliverables
              - listitem [ref=e79]:
                - paragraph [ref=e80]: Track record of implementing process improvements or quality control systems at scale
