          - generic [ref=e37]:
            - heading "We are an applied AI lab building end-to-end software agents." [level=2] [ref=e38]:
              - strong [ref=e39]: We are an applied AI lab building end-to-end software agents.
            - paragraph [ref=e40]: We're the makers of Devin, the first AI software engineer, and Windsurf, the AI-native IDE. Together, they represent our vision for collaborative AI teammates that enable engineers to focus on more interesting problems and empower teams to strive for more ambitious goals.
            - paragraph [ref=e41]: Our team is small and talent-dense. Among our founding team, we have world-class competitive programmers, former founders, and leaders from companies at the cutting edge of AI including Scale AI, Palantir, Cursor, Waymo, Tesla, Lunchclub, Modal, Google DeepMind, and Nuro.
            - paragraph [ref=e42]: Building Devin and Windsurf is just the first step—our hardest challenges still lie ahead. If you’re excited to solve some of the world’s biggest problems and build AI that can reason on real-world tasks, apply to join us.
            - paragraph [ref=e43]
            - heading "About the Role" [level=2] [ref=e44]:
              - strong [ref=e45]: About the Role
            - paragraph [ref=e46]: Cognition’s AI Enablement Engineers help teams adopt Devin and integrate agentic workflows into their day-to-day development. They combine deep technical expertise, consulting intuition, and a teacher’s mindset to guide teams through real work—building software alongside them while teaching how to use Devin to do the same.
            - paragraph [ref=e47]: "As one of the first AI Enablement Engineers, you’ll also play a key role in shaping how the program scales globally—turning individual training engagements into repeatable playbooks, digital learning content, and partner-driven enablement models that allow Cognition to reach hundreds of thousands of engineers worldwide. You’ll help define how AI Enablement becomes a product in itself: structured, measurable, and continuously improving in impact."
            - paragraph [ref=e48]: This role is perfect for someone who has strong engineering fundamentals, enjoys working directly with customers, and finds deep satisfaction in teaching others and unlocking their potential—while also thinking systematically about how to scale those learnings to the next 100 teams.
            - paragraph [ref=e49]
            - heading "In this role, you will:" [level=2] [ref=e50]:
              - strong [ref=e51]: "In this role, you will:"
            - list [ref=e52]:
              - listitem [ref=e53]:
                - paragraph [ref=e54]: Lead interactive programs for enterprise engineering teams (live workshops, pair programming sessions)
              - listitem [ref=e55]:
                - paragraph [ref=e56]: Guide customers through installing, configuring, and optimizing Devin and its associated tools (DeepWiki, MCP integrations, etc.)
              - listitem [ref=e57]:
                - paragraph [ref=e58]: Pair-program with engineers at varying experience levels, helping them build, debug, and automate real projects
              - listitem [ref=e59]:
                - paragraph [ref=e60]: Identify high-ROI workflows for Devin across engineering, QA, support, data, and product teams
              - listitem [ref=e61]:
                - paragraph [ref=e62]: Create enablement materials, best practices, and shared playbooks based on customer learnings
              - listitem [ref=e63]:
                - paragraph [ref=e64]: Work with leadership to scale AI Enablement into a repeatable and productized offering—through digital learning content, partner certifications, and scalable training models
              - listitem [ref=e65]:
                - paragraph [ref=e66]: Collaborate with Cognition Engagement Managers and Engineering teams to continuously refine onboarding and provide feedback on new features
            - heading "Requirements for the Role:" [level=2] [ref=e67]:
              - strong [ref=e68]: "Requirements for the Role:"
            - list [ref=e69]:
              - listitem [ref=e70]:
                - paragraph [ref=e71]: Degree in a STEM field or equivalent hands-on experience
              - listitem [ref=e72]:
                - paragraph [ref=e73]: 3+ years as a software engineer or technical consultant with strong coding proficiency (Python, JavaScript/TypeScript, or similar)
              - listitem [ref=e74]:
                - paragraph [ref=e75]: Proven ability to communicate complex technical topics to diverse audiences
              - listitem [ref=e76]:
                - paragraph [ref=e77]: Strong customer-service orientation and ability to thrive in interactive, people-facing environments
              - listitem [ref=e78]:
                - paragraph [ref=e79]: Excellent verbal and written communication skills
              - listitem [ref=e80]:
                - paragraph [ref=e81]: Demonstrated ability to learn and adapt exceptionally fast
            - heading "You might excel if you…" [level=2] [ref=e82]:
              - strong [ref=e83]: You might excel if you…
            - list [ref=e84]:
              - listitem [ref=e85]:
                - paragraph [ref=e86]: Have experience leading technical workshops, internal enablement programs, or developer onboarding initiatives
              - listitem [ref=e87]:
                - paragraph [ref=e88]: Have deployed or integrated LLM or agent-based systems in production settings
              - listitem [ref=e89]:
                - paragraph [ref=e90]: Are energized by teaching, coaching, and helping others reach “aha” moments
              - listitem [ref=e91]:
                - paragraph [ref=e92]: Have previously founded or joined early-stage startups where autonomy and execution speed were critical
