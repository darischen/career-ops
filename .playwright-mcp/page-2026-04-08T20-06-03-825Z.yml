          - generic [ref=e40]:
            - heading "🚀 Join the Future of Commerce with Whatnot!" [level=2] [ref=e41]:
              - strong [ref=e42]: 🚀 Join the Future of Commerce with Whatnot!
            - paragraph [ref=e43]: Whatnot is the largest livestream shopping platform in North America and Europe to buy, sell, and discover the things you love. Whether it's trading cards, fashion, electronics, or live plants, our sellers are building real businesses across hundreds of categories. We're building live commerce at a scale that's never been done in the West, and there's no playbook to copy. The people here are shaping how an entirely new industry develops.
            - paragraph [ref=e44]:
              - text: As a remote co-located team, we're inspired by our
              - link "values" [ref=e45] [cursor=pointer]:
                - /url: https://www.whatnot.com/careers
              - text: and anchored in hubs across the US, UK, Ireland, Poland, Germany, and Australia. We move fast, stay close to our users, and focus on the work that drives the most impact.
            - paragraph [ref=e46]:
              - text: We're one of the
              - link "fastest growing marketplaces" [ref=e47] [cursor=pointer]:
                - /url: https://a16z.com/marketplace-100/
              - text: and were recently named the
              - link "#1 Best Startup Employer in America" [ref=e48] [cursor=pointer]:
                - /url: http://google.com/search?q=%231+forbes+startup+employer&oq=%231+forbes+startup+employer&gs_lcrp=EgZjaHJvbWUyBggAEEUYOTIGCAEQRRg9MgYIAhBFGD0yBggDEEUYQDIGCAQQRRhAMgYIBRBFGEDSAQg1NzM0ajBqMagCALACAA&sourceid=chrome&ie=UTF-8
              - text: by Forbes. Check out the latest Whatnot updates on our
              - link "news" [ref=e49] [cursor=pointer]:
                - /url: https://blog.teamwhatnot.com/
              - text: and
              - link "engineering blogs" [ref=e50] [cursor=pointer]:
                - /url: https://medium.com/whatnot-engineering
              - text: and join us as we enable anyone to turn their passion into a business and bring people together through commerce.
            - heading "💻 Role" [level=2] [ref=e51]:
              - strong [ref=e52]: 💻 Role
            - paragraph [ref=e53]: We’re looking for builders–intellectually curious, highly entrepreneurial engineers eager to shape the future of AI and ML at Whatnot. You’ll design and scale the core infrastructure that powers large language model applications across the company, working side by side with machine learning scientists to bring cutting-edge models into production and unlock entirely new product experiences. This means building systems that make AI dependable and fast at scale–from building retrieval systems to more effectively ground LLM responses in Whatnot’s business context to developing scalable LLM evaluation frameworks and human-in-the-loop feedback mechanisms.
            - heading "What you'll do:" [level=2] [ref=e54]:
              - strong [ref=e55]: "What you'll do:"
            - list [ref=e56]:
              - listitem [ref=e57]:
                - paragraph [ref=e58]: Own the infrastructure powering LLMs across critical business surfaces– supporting growth, recommendations, trust and safety, fraud, seller tooling, and more.
              - listitem [ref=e59]:
                - paragraph [ref=e60]: Create robust and scalable LLM evaluation frameworks to measure model performance, guide iteration, and prevent regression via CI/CD.
              - listitem [ref=e61]:
                - paragraph [ref=e62]: Deploy RAG systems and MCP servers to more effectively ground LLM responses in Whatnot’s business context while enforcing rigorous PII controls.
              - listitem [ref=e63]:
                - paragraph [ref=e64]: Design efficient human-in-the-loop feedback pipelines that can be used to inform scalable LLM evaluation
              - listitem [ref=e65]:
                - paragraph [ref=e66]: Bridge the gap between research and production, helping to transform experimental ideas into scalable solutions
              - listitem [ref=e67]:
                - paragraph [ref=e68]: Stretch beyond your comfort zone to take on new technical challenges as we scale AI across Whatnot’s ecosystem.
            - paragraph [ref=e69]:
              - strong [ref=e70]: "US Based: We offer flexibility to work from home or from one of our global office hubs, and we value in-person time for planning, problem-solving, and connection. Team members in this role must live within commuting distance of our New York, Seattle, Los Angeles, and San Francisco hubs."
            - paragraph [ref=e71]
            - heading "👋 You" [level=2] [ref=e72]:
              - strong [ref=e73]: 👋 You
            - paragraph [ref=e74]: People who do well at Whatnot tend to be comfortable figuring things out as they go, biased toward action, and genuinely curious about what they're building. They care more about outcomes than credit and stay close to the product and the people using it.
            - paragraph [ref=e75]: "As our next AI/ML Engineer you should have 4+ years of professional experience developing machine learning systems and algorithms, plus:"
            - list [ref=e76]:
              - listitem [ref=e77]:
                - paragraph [ref=e78]: Bachelor’s degree in Computer Science, Statistics, Applied Mathematics or a related technical field, or equivalent work experience.
              - listitem [ref=e79]:
                - paragraph [ref=e80]: 3+ years of software engineering experience building and maintaining production systems for consumer-scale loads.
              - listitem [ref=e81]:
                - paragraph [ref=e82]: 1+ years of professional experience developing software in Python
              - listitem [ref=e83]:
                - paragraph [ref=e84]: Ability to work autonomously and drive initiatives across multiple product areas and communicate findings with leadership and product teams.
              - listitem [ref=e85]:
                - paragraph [ref=e86]: Experience with operational, search, and key-value databases such as PostgreSQL, DynamoDB, Elasticsearch, Redis.
              - listitem [ref=e87]:
                - paragraph [ref=e88]: Firm grasp of visualization tools for monitoring and logging e.g. DataDog, Grafana.
              - listitem [ref=e89]:
                - paragraph [ref=e90]: Familiarity with cloud computing platforms and managed services such as AWS Sagemaker, Lambda, Kinesis, S3, EC2, EKS/ECS, Apache Kafka, Flink.
              - listitem [ref=e91]:
                - paragraph [ref=e92]: Professionalism around collaborating in a remote working environment and well tested, reproducible work.
              - listitem [ref=e93]:
                - paragraph [ref=e94]: Exceptional documentation and communication skills.
            - heading "💰Compensation" [level=2] [ref=e95]:
              - strong [ref=e96]: 💰Compensation
            - paragraph [ref=e97]:
              - text: "For US-based applicants:"
              - strong [ref=e98]
              - text: $245,000 - $345,000/year + benefits + stock options
            - paragraph [ref=e99]: The salary range may be inclusive of several levels that would be applicable to the position. Final salary will be based on a number of factors including, level, relevant prior experience, skills and expertise. This range is only inclusive of base salary, not benefits (more details below) or equity in the form of stock options.
