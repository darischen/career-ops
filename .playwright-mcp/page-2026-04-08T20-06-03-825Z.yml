                - list [ref=e127]:
                  - listitem [ref=e128]:
                    - paragraph [ref=e129]: All Whatnauts are expected to develop a deep understanding of our product. We're passionate about building the best user experience, and all employees are expected to use Whatnot as both a buyer and a seller as part of their job (our dogfooding budget makes this fun and easy!).
