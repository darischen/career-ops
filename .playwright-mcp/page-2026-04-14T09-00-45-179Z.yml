              - strong [ref=e633]: Why are you being asked to complete this form?
              - paragraph [ref=e634]: We are a federal contractor or subcontractor. The law requires us to provide equal employment opportunity to qualified people with disabilities. We have a goal of having at least 7% of our workers as people with disabilities. The law says we must measure our progress towards this goal. To do this, we must ask applicants and employees if they have a disability or have ever had one. People can become disabled, so we need to ask this question at least every five years.
              - paragraph [ref=e635]:
                - text: Completing this form is voluntary, and we hope that you will choose to do so. Your answer is confidential. No one who makes hiring decisions will see it. Your decision to complete the form and your answer will not harm you in any way. If you want to learn more about the law or this form, visit the U.S. Department of Labor’s Office of Federal Contract Compliance Programs (OFCCP) website at
                - link "www.dol.gov/ofccp" [ref=e636] [cursor=pointer]:
                  - /url: https://www.dol.gov/ofccp
                - text: .
              - strong [ref=e637]: How do you know if you have a disability?
              - paragraph [ref=e638]:
                - text: A disability is a condition that substantially limits one or more of your “major life activities.” If you have or have ever had such a condition, you are a person with a disability.
                - strong [ref=e639]: "Disabilities include, but are not limited to:"
              - list [ref=e640]:
                - listitem [ref=e641]: Alcohol or other substance use disorder (not currently using drugs illegally)
                - listitem [ref=e642]: Autoimmune disorder, for example, lupus, fibromyalgia, rheumatoid arthritis, HIV/AIDS
                - listitem [ref=e643]: Blind or low vision
                - listitem [ref=e644]: Cancer (past or present)
                - listitem [ref=e645]: Cardiovascular or heart disease
                - listitem [ref=e646]: Celiac disease
                - listitem [ref=e647]: Cerebral palsy
                - listitem [ref=e648]: Deaf or serious difficulty hearing
                - listitem [ref=e649]: Diabetes
                - listitem [ref=e650]: Disfigurement, for example, disfigurement caused by burns, wounds, accidents, or congenital disorders
                - listitem [ref=e651]: Epilepsy or other seizure disorder
                - listitem [ref=e652]: Gastrointestinal disorders, for example, Crohn's Disease, irritable bowel syndrome
                - listitem [ref=e653]: Intellectual or developmental disability
                - listitem [ref=e654]: Mental health conditions, for example, depression, bipolar disorder, anxiety disorder, schizophrenia, PTSD
                - listitem [ref=e655]: Missing limbs or partially missing limbs
                - listitem [ref=e656]: Mobility impairment, benefiting from the use of a wheelchair, scooter, walker, leg brace(s) and/or other supports
                - listitem [ref=e657]: Nervous system condition, for example, migraine headaches, Parkinson’s disease, multiple sclerosis (MS)
                - listitem [ref=e658]: Neurodivergence, for example, attention-deficit/hyperactivity disorder (ADHD), autism spectrum disorder, dyslexia, dyspraxia, other learning disabilities
                - listitem [ref=e659]: Partial or complete paralysis (any cause)
                - listitem [ref=e660]: Pulmonary or respiratory conditions, for example, tuberculosis, asthma, emphysema
                - listitem [ref=e661]: Short stature (dwarfism)
                - listitem [ref=e662]: Traumatic brain injury
