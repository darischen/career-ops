          - generic [ref=e22]:
            - heading "Join Axon and be a Force for Good." [level=4] [ref=e23]:
              - strong [ref=e24]: Join Axon and be a Force for Good.
            - paragraph [ref=e25]:
              - text: At Axon, we’re on a mission to Protect Life. We’re explorers, pursuing society’s most critical safety and justice issues with our ecosystem of devices and cloud software. Like our products, we work better together. We connect with candor and care, seeking out diverse perspectives from our customers, communities and each other.
              - text: Life at Axon is fast-paced, challenging and meaningful. Here, you’ll take ownership and drive real change. Constantly grow as you work hard for a mission that matters at a company where you matter.
          - generic [ref=e26]:
            - heading [level=4]
            - heading "Your Impact" [level=3] [ref=e27]:
              - strong [ref=e28]: Your Impact
            - paragraph [ref=e29]:
              - text: You are a Junior Software Engineer looking to take your career and technical skills to the next level. Your passion is learning new technical areas and coming up with innovative solutions for customer problems. You are looking for an opportunity to grow rapidly and take on high impact work alongside your team.
              - text: At Axon, you will develop high quality mission critical software in a collaborative environment while leveraging modern frameworks, tools, and AI-assisted development workflows. You will operate in an AI-first engineering environment where intelligent tooling, code generation, and data-driven decision making are embedded into daily development practices.
              - text: You will use your passion, experience, and analytical skills to help bring new solutions to public safety and leave a positive impact on the world.
            - heading "What You’ll Do" [level=3] [ref=e30]:
              - strong [ref=e31]: What You’ll Do
            - 'heading "Location: Seattle, Scottsdale, Boston, Atlanta Reports to: Software Engineering Manager" [level=4] [ref=e32]':
              - strong [ref=e33]: "Location:"
              - text: Seattle, Scottsdale, Boston, Atlanta
              - strong [ref=e34]: "Reports to:"
              - text: Software Engineering Manager
            - list [ref=e35]:
              - listitem [ref=e36]: Participate in code reviews and architecture design meetings, incorporating AI-assisted insights and tooling
              - listitem [ref=e37]: Own and drive end-to-end features with Product and Design, leveraging AI tools to accelerate development and improve quality
              - listitem [ref=e38]: Ensure that your code hits a high bar for quality and performance, including validating AI-generated code outputs
              - listitem [ref=e39]: Work in an AI-first environment where developer productivity is augmented through copilots, automation, and intelligent systems
              - listitem [ref=e40]: Work together with like-minded people who are passionate about our mission
              - listitem [ref=e41]: Work with the latest open source technologies and AI-enabled development platforms
              - listitem [ref=e42]: Have mentorship from experienced engineers on both traditional and AI-assisted software engineering practices
            - heading "What You Bring" [level=3] [ref=e43]:
              - strong [ref=e44]: What You Bring
            - list [ref=e45]:
              - listitem [ref=e46]: Bachelor's Degree in Computer Science or Engineering, OR 2+ years of relevant experience, OR coding boot camp
              - listitem [ref=e47]: Professional software development internship
              - listitem [ref=e48]: Experience in at least one managed language such as Java, Scala, Go, C# or similar
              - listitem [ref=e49]: Familiarity with or interest in AI-assisted development tools, code generation, and automation workflows
              - listitem [ref=e50]: You follow the latest in software engineering, including emerging AI-driven development practices
              - listitem [ref=e51]: You love delighting end users and solving novel challenges in a rapidly evolving technical landscape
            - heading "Benefits that Benefit You" [level=3] [ref=e52]:
              - strong [ref=e53]: Benefits that Benefit You
            - list [ref=e54]:
              - listitem [ref=e55]: Competitive salary and 401k with employer match
              - listitem [ref=e56]: Discretionary time off
              - listitem [ref=e57]: Paid parental leave for all
              - listitem [ref=e58]: Medical, Dental, Vision plans
              - listitem [ref=e59]: Fitness Programs
              - listitem [ref=e60]: Emotional & Development Programs
              - listitem [ref=e61]: And yes, we have snacks in our offices
            - heading "Benefits listed herein may vary depending on the nature of your employment and the location where you work." [level=4] [ref=e62]:
              - emphasis [ref=e63]: Benefits listed herein may vary depending on the nature of your employment and the location where you work.
          - generic [ref=e65]:
            - paragraph [ref=e69]:
              - text: "Axon is a total compensation company, meaning compensation is made up of base pay, bonus, and stock awards. The actual base pay is dependent upon many factors, such as: level, function, training, transferable skills, work experience, business needs, geographic market, and often a combination of all these factors. Our benefits offer an array of options to help support you physically, financially and emotionally through the big milestones and in your everyday life. To see more details on our benefits offerings please visit"
              - link "https://www.axon.com/careers" [ref=e70] [cursor=pointer]:
                - /url: https://www.axon.com/careers
              - text: .
            - paragraph [ref=e71]: Base Pay Range
            - paragraph [ref=e72]: $120,750 - $193,200 USD
          - generic [ref=e73]:
            - paragraph [ref=e74]: Don’t meet every single requirement? That's ok. At Axon, we Aim Far. We think big with a long-term view because we want to reinvent the world to be a safer, better place. We are also committed to building diverse teams that reflect the communities we serve.
            - paragraph [ref=e75]: Studies have shown that women and people of color are less likely to apply to jobs unless they check every box in the job description. If you’re excited about this role and our mission to Protect Life but your experience doesn’t align perfectly with every qualification listed here, we encourage you to apply anyways. You may be just the right candidate for this or other roles.
            - paragraph [ref=e76]:
              - strong [ref=e77]: Important Notes
            - paragraph [ref=e78]:
              - emphasis [ref=e79]: The above job description is not intended as, nor should it be construed as, exhaustive of all duties, responsibilities, skills, efforts, or working conditions associated with this job. The job description may change or be supplemented at any time in accordance with business needs and conditions.
            - paragraph [ref=e80]:
              - emphasis [ref=e81]: Some roles may also require legal eligibility to work in a firearms environment.
            - paragraph [ref=e82]:
              - emphasis [ref=e83]:
                - text: We collect personal information from applicants to evaluate candidates for employment. You may request access, deletion, or exercise other CCPA rights at
                - strong [ref=e84]:
                  - link "axongreenhousesupport@axon.com" [ref=e85] [cursor=pointer]:
                    - /url: mailto:axongreenhousesupport@axon.com
                - text: or via our
                - link "Axon Privacy Web Form" [ref=e86] [cursor=pointer]:
                  - /url: https://privacyportal.onetrust.com/webform/0efc1702-9321-4119-bc9d-a06c3a1d3e4e/ca57cc26-a159-4193-9f6e-58ffe3fd2509
                - text: . For more information, please see the Your California Privacy Rights section of our
                - link "Applicant and Candidate Privacy Notice." [ref=e87] [cursor=pointer]:
                  - /url: https://www.axon.com/candidateprivacypolicy
            - paragraph [ref=e88]:
              - emphasis [ref=e89]: Axon’s mission is to Protect Life and is committed to the well-being and safety of its employees as well as Axon’s impact on the environment. All Axon employees must be aware of and committed to the appropriate environmental, health, and safety regulations, policies, and procedures. Axon employees are empowered to report safety concerns as they arise and activities potentially impacting the environment.
            - paragraph [ref=e90]:
              - emphasis [ref=e91]:
                - text: We are an equal opportunity employer that promotes justice, advances equity, values diversity and fosters inclusion. We’re committed to hiring the best talent — regardless of race, creed, color, ancestry, religion, sex (including pregnancy), national origin, sexual orientation, age, citizenship status, marital status, disability, gender identity, genetic information, veteran status, or any other characteristic protected by applicable laws, regulations and ordinances — and empowering all of our employees so they can do their best work. If you have a disability or special need that requires assistance or accommodation during the application or the recruiting process, please email
                - link "recruitingops@axon.com." [ref=e92] [cursor=pointer]:
                  - /url: mailto:recruitingops@axon.com
                - text: Please note that this email address is for accommodation purposes only. Axon will not respond to inquiries for other purposes.
            - paragraph [ref=e93]:
              - text: "Phishing alert: Axon will never ask you to pay for any part of the hiring process, including training, equipment, or background checks. We do not make job offers via text message, WhatsApp, or instant messaging platforms without a formal interview process. All legitimate job openings are listed on our official careers page at"
              - link "https://www.axon.com/careers" [ref=e94] [cursor=pointer]:
                - /url: https://www.axon.com/careers
              - text: . If you receive a suspicious offer or outreach from an email address that is not
              - strong [ref=e95]: "@axon.com"
              - text: ", or if you are asked for sensitive personal information (bank details, Social Security Number) prematurely, please ignore the message and report it to"
              - link "recruitingops@axon.com" [ref=e96] [cursor=pointer]:
                - /url: mailto:recruitingops@axon.com
              - text: .
