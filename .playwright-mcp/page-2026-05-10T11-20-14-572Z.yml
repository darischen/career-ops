          - heading "Our Hiring Process" [level=2] [ref=e81]
          - generic [ref=e82]:
            - paragraph [ref=e83]: The success of our company is the direct result of our amazing team. We understand that looking for a new position is hard and we are grateful that you have chosen to invest your time in our hiring process.
            - paragraph [ref=e84]: "While we work to make our hiring process as simple as possible, it is thorough by design. Our hiring philosophy encompasses four principles. In order of relative importance, they are: values alignment, passion for security, cognitive capabilities and task relevant experience."
            - paragraph [ref=e85]: "Once you have submitted your application, you can anticipate a response within 48 hours. While our process can vary by role, generally you can anticipate five interview stages:"
        - generic [ref=e86]:
          - generic [ref=e87]:
            - heading "Step 1" [level=2] [ref=e89]
            - heading "Discovery & Culture in Action" [level=3] [ref=e91]
            - generic [ref=e92]:
              - paragraph [ref=e93]: Discovery Call – A 30-minute introduction where we explore your background, interests, and what drives you. You’ll also hear about Praetorian, our mission, and what to expect in the process.
              - paragraph [ref=e94]: Culture in Action & DISC Assessment – You’ll watch a real, unfiltered look at our culture and complete a DISC assessment, helping us understand your working and communication style.
              - paragraph [ref=e95]:
                - strong [ref=e96]: Hiring Manager Interview
                - text: – A deep-dive discussion with your potential manager, focusing on how you solve problems, your experience, and team fit.
          - generic [ref=e97]:
            - heading "Step 2" [level=2] [ref=e99]
            - heading "Half-Day Technical Interview" [level=3] [ref=e101]
            - generic [ref=e102]:
              - paragraph [ref=e103]: This is a back-to-back interview session designed to efficiently assess your problem-solving skills, technical methodology, and team fit.
              - paragraph [ref=e104]:
                - strong [ref=e105]: 9:00 AM | Problem-Solving Exercise
                - text: – A logic puzzle challenge designed to evaluate how you approach new and unfamiliar problems.
              - paragraph [ref=e106]:
                - strong [ref=e107]: 10:00 AM – 1:00 PM | Technical Labs
                - text: – A hands-on virtual technical challenge, assess your competence. You’ll tackle real-world scenarios and engage with our engineers.
