                      - strong [ref=f48e18]: We Are Praetorian
                    - paragraph [ref=f48e19]: Praetorian is defined by raw intensity, fearless candor, and a relentless drive. This is who we are.
                    - paragraph [ref=f48e20]: We are looking for high-performing, mission-aligned individuals. We prioritize performance over politics and purpose over transaction. This environment is built for those who seek ownership and impact.
                    - paragraph [ref=f48e21]: Is Praetorian the right fit for you? If you are someone who obsesses over the problem, defaults to open communication, and wants to work with a team that refuses to accept mediocrity—then you have found your home.
                    - paragraph [ref=f48e22]:
                      - strong [ref=f48e24]: The Mission
                    - paragraph [ref=f48e25]: Praetorian is an expert-driven offensive security company. Our mission is to prevent breaches before they occur. We help organizations shift from an "assume breach" mentality to adopting offensive security as a core strategy of prevention.
                    - paragraph [ref=f48e26]: We don’t just find bugs; we solve the root cause. We are building a future without compromise, and we need people who run toward the fire.
