                      - strong [ref=f48e332]: Why are you being asked to complete this form?
                      - paragraph [ref=f48e333]: We are a federal contractor or subcontractor. The law requires us to provide equal employment opportunity to qualified people with disabilities. We have a goal of having at least 7% of our workers as people with disabilities. The law says we must measure our progress towards this goal. To do this, we must ask applicants and employees if they have a disability or have ever had one. People can become disabled, so we need to ask this question at least every five years.
                      - paragraph [ref=f48e334]:
                        - text: Completing this form is voluntary, and we hope that you will choose to do so. Your answer is confidential. No one who makes hiring decisions will see it. Your decision to complete the form and your answer will not harm you in any way. If you want to learn more about the law or this form, visit the U.S. Department of Labor’s Office of Federal Contract Compliance Programs (OFCCP) website at
                        - link "www.dol.gov/ofccp" [ref=f48e335] [cursor=pointer]:
                          - /url: https://www.dol.gov/ofccp
                        - text: .
                      - strong [ref=f48e336]: How do you know if you have a disability?
                      - paragraph [ref=f48e337]:
                        - text: A disability is a condition that substantially limits one or more of your “major life activities.” If you have or have ever had such a condition, you are a person with a disability.
                        - strong [ref=f48e338]: "Disabilities include, but are not limited to:"
                      - list [ref=f48e339]:
                        - listitem [ref=f48e340]: Alcohol or other substance use disorder (not currently using drugs illegally)
                        - listitem [ref=f48e341]: Autoimmune disorder, for example, lupus, fibromyalgia, rheumatoid arthritis, HIV/AIDS
                        - listitem [ref=f48e342]: Blind or low vision
                        - listitem [ref=f48e343]: Cancer (past or present)
                        - listitem [ref=f48e344]: Cardiovascular or heart disease
                        - listitem [ref=f48e345]: Celiac disease
                        - listitem [ref=f48e346]: Cerebral palsy
                        - listitem [ref=f48e347]: Deaf or serious difficulty hearing
                        - listitem [ref=f48e348]: Diabetes
                        - listitem [ref=f48e349]: Disfigurement, for example, disfigurement caused by burns, wounds, accidents, or congenital disorders
                        - listitem [ref=f48e350]: Epilepsy or other seizure disorder
                        - listitem [ref=f48e351]: Gastrointestinal disorders, for example, Crohn's Disease, irritable bowel syndrome
                        - listitem [ref=f48e352]: Intellectual or developmental disability
                        - listitem [ref=f48e353]: Mental health conditions, for example, depression, bipolar disorder, anxiety disorder, schizophrenia, PTSD
                        - listitem [ref=f48e354]: Missing limbs or partially missing limbs
                        - listitem [ref=f48e355]: Mobility impairment, benefiting from the use of a wheelchair, scooter, walker, leg brace(s) and/or other supports
                        - listitem [ref=f48e356]: Nervous system condition, for example, migraine headaches, Parkinson’s disease, multiple sclerosis (MS)
                        - listitem [ref=f48e357]: Neurodivergence, for example, attention-deficit/hyperactivity disorder (ADHD), autism spectrum disorder, dyslexia, dyspraxia, other learning disabilities
                        - listitem [ref=f48e358]: Partial or complete paralysis (any cause)
                        - listitem [ref=f48e359]: Pulmonary or respiratory conditions, for example, tuberculosis, asthma, emphysema
                        - listitem [ref=f48e360]: Short stature (dwarfism)
                        - listitem [ref=f48e361]: Traumatic brain injury
                    - generic [ref=f48e364]:
                      - text: Disability Status
