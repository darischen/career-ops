                    - paragraph [ref=f48e38]:
                      - strong [ref=f48e40]: Who We Are Looking For
                    - paragraph [ref=f48e41]:
                      - generic [ref=f48e42]:
                        - text: We are looking for a
                        - strong [ref=f48e43]: Software Engineer
                        - text: who operates with clear ownership. You’re not just filling a seat. You’re setting the standard. You believe great execution brings strategy to life.
                    - paragraph [ref=f48e44]:
                      - strong [ref=f48e46]: How You Operate
                    - paragraph [ref=f48e47]:
                      - generic [ref=f48e48]:
                        - text: You bring
                        - strong [ref=f48e49]: mission-driven grit
                        - text: to every challenge, running toward hard problems rather than away from them. You prioritize customer outcomes over internal processes. You choose
                        - strong [ref=f48e50]: truth and clarity
                        - text: over performative politeness. We look for builders with a
                        - strong [ref=f48e51]: bias for action
                        - text: – people who own the fix when things break, share credit with the team, and possess the
                        - strong [ref=f48e52]: intellectual humility
                        - text: to care more about getting to the right answer than being right.
                    - paragraph [ref=f48e53]:
                      - strong [ref=f48e55]: What You Will Own
                    - list [ref=f48e56]:
                      - listitem [ref=f48e57]:
                        - generic [ref=f48e58]:
                          - strong [ref=f48e59]: "Own the Outcome:"
                          - text: Build and ship features across the full stack of the Praetorian Guard platform, from the Go serverless backend to a React frontend used by security teams daily. You own it from design through production operations.
                      - listitem [ref=f48e60]:
                        - generic [ref=f48e61]:
                          - strong [ref=f48e62]: "Take Accountability:"
                          - text: Owning the outcome means taking accountability to overcome the challenges in developing and operating the Praetorian Guard platform.
                      - listitem [ref=f48e63]:
                        - generic [ref=f48e64]:
                          - strong [ref=f48e65]: "Raise the Bar:"
                          - text: Write code that is clear, tested, and built to last. Push the team's engineering standards forward through code review, technical proposals, and leading by example.
                      - listitem [ref=f48e66]:
                        - generic [ref=f48e67]:
                          - strong [ref=f48e68]: "Drive Impact:"
                          - text: Work directly with offensive security engineers to translate real-world vulnerability findings into platform capabilities. Your code doesn't just run, it scales the impact of every security engineer on the team.
                      - listitem [ref=f48e69]:
                        - generic [ref=f48e70]:
                          - strong [ref=f48e71]: "Scale the Platform:"
                          - text: "Design systems that handle the complexity of attack surface management at scale: graph databases modeling millions of asset relationships, queue-based architectures processing continuous security scans, and real-time interfaces that make complex data actionable."
                    - paragraph [ref=f48e72]:
                      - strong [ref=f48e74]: What You Bring
                    - list [ref=f48e75]:
                      - listitem [ref=f48e76]:
                        - generic [ref=f48e77]:
                          - strong [ref=f48e78]: "The Foundation:"
                          - text: A Bachelor's degree in Computer Science, Engineering, Mathematics, or Physics, backed by
                          - strong [ref=f48e79]: 0–5 years of experience
                          - text: in cybersecurity, startups, or tech companies.
                      - listitem [ref=f48e80]:
                        - generic [ref=f48e81]:
                          - strong [ref=f48e82]: "Backend Fluency:"
                          - text: You write Go that is idiomatic, testable, and production-ready. You understand serverless architectures, API design, and working with databases under real load.
                      - listitem [ref=f48e83]:
                        - generic [ref=f48e84]:
                          - strong [ref=f48e85]: "Systems Thinking:"
                          - text: You reason about distributed systems, concurrency, failure modes, and data flow. You don't just write the function—you think about what happens when it's called ten thousand times a second.
                      - listitem [ref=f48e86]:
                        - generic [ref=f48e87]:
                          - strong [ref=f48e88]: "Frontend Ability:"
                          - text: You apply software engineering principles to guide AI agents to build responsive, performant UI in maintainable code. You care deeply about the final user experience and do not stop iterating until it is right.
                      - listitem [ref=f48e89]:
                        - generic [ref=f48e90]:
                          - strong [ref=f48e91]: "Builder's Instinct:"
                          - text: You have side projects, open-source contributions, or technical writing that shows you build because you want to, not because someone told you to. You've shipped something real outside of a classroom.
                    - paragraph [ref=f48e92]:
                      - strong [ref=f48e94]: "If This Position Is Wildly Successful, In One Year You Will Have:"
                    - list [ref=f48e95]:
                      - listitem [ref=f48e96]: Shipped major features across the Guard platform that security teams rely on daily
                      - listitem [ref=f48e97]: Built infrastructure that scales, such as queue-based scanning pipelines, graph query optimization, and AWS serverless architecture.
                      - listitem [ref=f48e98]: "Written code that your teammates trust: clean and well-tested. Your pull requests raise the bar and your reviews make the people around you sharper"
                      - listitem [ref=f48e99]: Integrated AI tooling into your development workflow, moving fast in complex systems without sacrificing quality or understanding
                      - listitem [ref=f48e100]: Honed your product skills by turning high-level requests into practical features that real customers rely on and generate delights.
                      - listitem [ref=f48e101]: Demonstrated ownership across the full stack, from CloudFormation templates and Lambda handlers to React components and Playwright tests, not because you were told to, but because the problem demanded it
                      - listitem [ref=f48e102]: Closed the gap between field findings and platform capabilities by partnering with offensive security engineers to translate recurring vulnerability patterns into automated detections that multiply the team's impact
                      - listitem [ref=f48e103]: Contributed to Praetorian's engineering culture through technical blog posts, internal knowledge sharing, or open-source contributions that reflect the depth of what we're building
                      - listitem [ref=f48e104]: Mentored junior engineers and contributed to a culture of continuous learning, raising the technical floor across the team through your example and your investment in the people around you
