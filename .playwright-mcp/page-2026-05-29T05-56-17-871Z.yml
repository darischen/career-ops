              - link:
                - /url: https://www.physicsx.ai/newsroom/how-delivery-makes-physical-ai-work-in-the-real-world
            - heading "What we offer" [level=2] [ref=e68]:
              - strong [ref=e69]: What we offer
            - heading "Build what actually matters" [level=3] [ref=e70]:
              - strong [ref=e71]: Build what actually matters
            - paragraph [ref=e72]: Help shape an AI-native engineering company at a formative stage, tackling problems that genuinely matter for industry and society. This is work with real-world impact - and something you can be proud to stand behind.
            - heading "Learn alongside exceptional people" [level=3] [ref=e73]:
              - strong [ref=e74]: Learn alongside exceptional people
            - paragraph [ref=e75]: Work with a high-caliber, collaborative team of engineers, scientists, and operators who care deeply about doing great work, and about helping each other get better. We come from diverse backgrounds, but we share a commitment to operating at the highest level and addressing some of the most complex challenges out there. If you’re ambitious, thoughtful, and driven by impact, you’ll feel at home.
            - heading "Influence over hierarchy" [level=3] [ref=e76]:
              - strong [ref=e77]: Influence over hierarchy
            - paragraph [ref=e78]: "We operate with a flat structure: good ideas win - wherever they come from. Questioning assumptions and challenging the status quo isn’t just welcomed, it’s expected."
            - heading "Sustainable pace, long-term ambition" [level=3] [ref=e79]:
              - strong [ref=e80]: Sustainable pace, long-term ambition
            - paragraph [ref=e81]: Building meaningful technology is a marathon, not a sprint. We believe in balancing focused, ambitious work with a life beyond it. Our hybrid model blends time together in our New York office with work-from-home days, giving you the flexibility to work sustainably while staying connected in person.
            - paragraph [ref=e82]:
              - strong [ref=e83]: And it doesn’t stop there …
            - paragraph [ref=e84]:
