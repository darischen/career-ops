                - listitem [ref=e489]: Gastrointestinal disorders, for example, Crohn's Disease, irritable bowel syndrome
                - listitem [ref=e490]: Intellectual or developmental disability
                - listitem [ref=e491]: Mental health conditions, for example, depression, bipolar disorder, anxiety disorder, schizophrenia, PTSD
                - listitem [ref=e492]: Missing limbs or partially missing limbs
                - listitem [ref=e493]: Mobility impairment, benefiting from the use of a wheelchair, scooter, walker, leg brace(s) and/or other supports
                - listitem [ref=e494]: Nervous system condition, for example, migraine headaches, Parkinson’s disease, multiple sclerosis (MS)
                - listitem [ref=e495]: Neurodivergence, for example, attention-deficit/hyperactivity disorder (ADHD), autism spectrum disorder, dyslexia, dyspraxia, other learning disabilities
                - listitem [ref=e496]: Partial or complete paralysis (any cause)
                - listitem [ref=e497]: Pulmonary or respiratory conditions, for example, tuberculosis, asthma, emphysema
