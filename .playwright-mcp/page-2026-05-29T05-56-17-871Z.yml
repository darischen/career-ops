          - generic [ref=e23]:
            - heading "About us" [level=2] [ref=e24]
            - generic [ref=e25]: PhysicsX is a deep-tech company with roots in numerical physics and Formula One, dedicated to accelerating hardware innovation at the speed of software.
            - generic [ref=e26]: We are building an AI-driven simulation software stack for engineering and manufacturing across advanced industries. By enabling high-fidelity, multi-physics simulation through AI inference across the entire engineering lifecycle, PhysicsX unlocks new levels of optimization and automation in design, manufacturing, and operations — empowering engineers to push the boundaries of possibility. Our customers include leading innovators in Aerospace & Defense, Materials, Energy, Semiconductors, and Automotive.
          - generic [ref=e27]:
            - paragraph [ref=e28]:
              - strong [ref=e29]: "Note:"
              - text: We are currently recruiting for multiple positions, however please only apply for the role that best aligns with your skillset and career goals.
            - heading "Who We're Looking For" [level=2] [ref=e30]:
              - strong [ref=e31]: Who We're Looking For
            - paragraph [ref=e32]:
              - text: As a Machine Learning Engineer in Delivery, you are a problem solver who stays anchored to impact. You are someone who can grasp advanced engineering concepts across multiple industries, and excel at working directly with customers (and often side-by-side with them on-site) to embed cutting-edge AI models into tools that are useful and used.
              - text: "You’ve shipped ML systems end-to-end and at scale: you design, build and test reliable, scalable ML data pipelines; you know how to explore and manipulate 3D point-cloud and mesh data to enable geometry-aware modelling; you select the right libraries, frameworks and tools. Working at the intersection of data science and software engineering, you translate R&D and project outputs into reusable libraries, tooling and products."
              - text: With at least 2 years industry experience (post Masters or PhD) in a commercial, non-research environment. You're truly excited about taking ownership of complex work streams and guiding teams to success, while continuously improving the systems and solutions you work on to ensure they are practical, impactful and meet the evolving needs of our customers.
            - paragraph [ref=e33]:
              - strong [ref=e34]: "Note:"
              - text: Due to the nature of our aerospace and defense work, this position is open to US citizens only.
            - heading "This Role" [level=2] [ref=e35]
            - paragraph [ref=e36]: As a Machine Learning Engineer, you'll work closely with our Data Scientists, Simulation Engineers, and customers to understand and define the engineering and physics challenges we are solving. You will iterate with customers and use your influence to drive decisions around reliable deployment with measurable outcomes.
            - strong [ref=e38]: What you will do
            - list [ref=e39]:
              - listitem [ref=e40]: Work closely with our simulation engineers, data scientists and customers to develop an understanding of the physics and engineering challenges we are solving
              - listitem [ref=e41]: Design, build and test data pipelines for machine learning that are reliable, scalable and easily deployable
              - listitem [ref=e42]: Explore and manipulate 3D point cloud & mesh data
              - listitem [ref=e43]: Own the delivery of technical workstreams
              - listitem [ref=e44]: Create analytics environments and resources in the cloud or on premise, spanning data engineering and science
              - listitem [ref=e45]: Identify the best libraries, frameworks and tools for a given task, make product design decisions to set us up for success
              - listitem [ref=e46]: Work at the intersection of data science and software engineering to translate the results of our R&D and projects into re-usable libraries, tooling and products
              - listitem [ref=e47]: Continuously apply and improve engineering best practices and standards and coach your colleagues in their adoption
            - generic [ref=e48]:
              - text: You'll also have the opportunity to travel to customer sites in North America, Europe, Asia, Oceania, for an
              - strong [ref=e49]: average of 3-4 weeks per quarter
              - text: ", where you'll collaborate closely with customers to build solutions on-site."
            - strong [ref=e52]: What you bring to the table
            - list [ref=e53]:
              - listitem [ref=e54]: Experience applying Machine learning methods (including 3D graph/point cloud deep learning methods) to real-world engineering applications, with a focus on driving measurable impact in industry settings.
              - listitem [ref=e55]: Experience in ML/Computational statistics/Modelling use-cases in industrial settings (for example supply chain optimisation or manufacturing processes) is encouraged.
              - listitem [ref=e56]: A track record of scoping and delivering projects in a customer facing role
              - listitem [ref=e57]: 2+ years’ experience in a data-driven role, with exposure to software engineering concepts and best practices (e.g., versioning, testing, CI/CD, API design, MLOps)
              - listitem [ref=e58]: Building machine learning models and pipelines in Python, using common libraries and frameworks (e.g., TensorFlow, MLFlow)
              - listitem [ref=e59]: Distributed computing frameworks (e.g., Spark, Dask)
              - listitem [ref=e60]: Cloud platforms (e.g., AWS, Azure, GCP) and HP computing
              - listitem [ref=e61]: Containerization and orchestration (Docker, Kubernetes)
              - listitem [ref=e62]: Strong problem-solving skills and the ability to analyse issues, identify causes, and recommend solutions quickly
              - listitem [ref=e63]: Excellent collaboration and communication skills - with teams and customers alike
              - listitem [ref=e64]: A background in Physics, Engineering, or equivalent
            - heading "Our delivery teams drive innovation to turn AI models into practical solutions - read our blog to learn more about how you’ll contribute to this exciting journey!" [level=4] [ref=e65]:
              - strong [ref=e66]:
                - text: Our delivery teams drive innovation to turn AI models into practical solutions -
                - link "read our blog to learn more about how you’ll contribute to this exciting journey!" [ref=e67] [cursor=pointer]:
