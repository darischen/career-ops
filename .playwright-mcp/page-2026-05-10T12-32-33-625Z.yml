    - generic [ref=e71]:
      - paragraph [ref=e72]:
        - strong [ref=e73]: "About the team:"
      - paragraph [ref=e74]: Tapestry is X’s moonshot for the electric grid. We’re transforming how the world makes, moves and uses electricity, using AI to reshape energy on a global scale.
      - paragraph [ref=e75]: We’re looking for curious minds who want to be a part of this extraordinary moment in energy. You would be joining a multidisciplinary team from a wide variety of experiences and backgrounds—from ML/AI and power systems experts to software engineers and energy entrepreneurs– working together to realize Tapestry’s mission to make the grid visible so that everyone, everywhere can access reliable, abundant, and clean energy.
      - paragraph [ref=e76]: Tapestry is incubating at X, Alphabet’s Moonshot Factory—the birthplace of breakthrough technologies like Waymo, Android and Google Brain. At Tapestry, you’ll have the chance to be part of a rapidly growing team that has the agility and impact of an early stage company with the resources and technical excellence of Alphabet. If developing multimodal AI solutions gets you up in the morning and load growth challenges keep you up at night, we'd love to meet you.
      - paragraph [ref=e77]: Learn more about our team and our mission here.
      - paragraph [ref=e78]:
        - strong [ref=e79]: "About the role:"
      - paragraph [ref=e80]: We're looking for an early career Machine Learning Engineer to join our team. In this role you will build and deploy state of the art machine learning models to solve complex challenges that face today’s electric grid. You will work closely with other Machine Learning Engineers, Data Scientists and Software Engineers across diverse ML domains spanning multimodal machine learning, information retrieval, natural language processing and agentic AI.
      - paragraph [ref=e81]:
        - strong [ref=e82]: "How you will make 10x impact:"
      - list [ref=e83]:
        - listitem [ref=e84]: "- Train, and deploy machine learning models in production environments."
        - listitem [ref=e85]: "- Work with senior team members to develop enterprise quality ML systems, spanning multiple ML domains"
        - listitem [ref=e86]: "- Operationalize ML model training at serving at enterprise scale"
        - listitem [ref=e87]: "- Stay abreast of the latest advancements in machine learning"
      - paragraph [ref=e88]:
        - strong [ref=e89]: "What you should have:"
      - list [ref=e90]:
        - listitem [ref=e91]: "- Master’s Degree/Bachelor's Degree in Machine Learning, Computer Science, Statistics or related field"
        - listitem [ref=e92]: "- Experience in machine learning model development and engineering."
        - listitem [ref=e93]: "- Expertise in one or more of the following areas: multimodal machine learning NLP or agentic AI, planning, control and reinforcement learning"
        - listitem [ref=e94]: "- Strong programming skills in Python and experience with ML frameworks like PyTorch or TensorFlow."
        - listitem [ref=e95]: "- Experience with building and deploying ML systems at scale, OR a proven ability to perform applied ML research and develop the state of the art in an academic setting"
      - paragraph [ref=e96]:
        - strong [ref=e97]: "It’d be great if you also had these:"
      - list [ref=e98]:
        - listitem [ref=e99]: "- PhD in Machine Learning, Computer Science, Statistics, or a related field"
        - listitem [ref=e100]: "- Experience with cloud platforms such as AWS, GCP, or Azure."
        - listitem [ref=e101]: "- A strong portfolio of projects demonstrating ML expertise."
      - paragraph [ref=e102]:
        - strong [ref=e103]: Our values
      - list [ref=e104]:
        - listitem [ref=e105]: "- Take charge: We take initiative and own outcomes that move the mission forward."
        - listitem [ref=e106]: "- Transform with purpose: We build solutions that solve real problems and create meaningful impact."
        - listitem [ref=e107]: "- Be a Tapestry, not a thread: We collaborate across diverse skills and perspectives to achieve more than we can individually."
        - listitem [ref=e108]: "- Always fine-tune: We stay curious, seek feedback, and refine our understanding as we learn."
        - listitem [ref=e109]: "- Stay grounded: We listen openly, value different perspectives, and stay focused on what matters most."
      - paragraph [ref=e110]:
        - strong [ref=e111]: What we offer
      - paragraph [ref=e112]: "A culture that supports growth, ownership, and meaningful impact, along with:"
      - list [ref=e113]:
        - listitem [ref=e114]: "- Competitive salary and equity"
        - listitem [ref=e115]: "- Medical, dental, and vision coverage"
        - listitem [ref=e116]: "- Generous PTO and flexible hybrid work model"
        - listitem [ref=e117]: "- 401(k) with employer contribution"
        - listitem [ref=e118]: "- Professional development"
        - listitem [ref=e119]: "- The ability to work on important real-world problems within an Alphabet-backed environment"
      - paragraph [ref=e120]: The US base salary range for this full-time position is $166,000 - $244,000 + bonus + equity + benefits. Within the range, individual pay is determined by work location and additional factors, including job-related skills, experience, and relevant education or training. Your recruiter can share more about the specific salary range for your location during the hiring process.
      - paragraph [ref=e121]: Please note that the compensation details listed in US role postings reflect the base salary only, and do not include bonus, equity, or benefits.
      - paragraph [ref=e122]: .
