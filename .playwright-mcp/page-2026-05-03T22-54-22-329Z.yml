              - listitem [ref=e53]:
                - paragraph [ref=e54]: Comfortable operating in ambiguity, taking fuzzy problems and driving toward concrete solutions with minimal high-leverage scope.
              - listitem [ref=e55]:
                - paragraph [ref=e56]: Strong ownership mindset focused on shipping customer value and delivering robust, usable solutions.
              - listitem [ref=e57]:
