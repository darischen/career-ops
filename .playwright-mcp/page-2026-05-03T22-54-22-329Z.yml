            - paragraph [ref=e39]:
              - strong [ref=e40]: Who we are
            - paragraph [ref=e41]: Picogrid is a leading venture-backed defense technology company founded to bridge the decades-long gap between modern technology and the critical demands of national security. Today, we're building the essential infrastructure to unify sensors, autonomy, and operators with our technology deployed in active operations around the world. Our mission is to deliver an operational advantage to secure the United States and its allies.
            - heading "About the Role" [level=2] [ref=e42]:
              - strong [ref=e43]: About the Role
            - paragraph [ref=e44]: We’re looking for entrepreneurial, product- and customer-focused full-stack engineers to own up to several bespoke UIs for users from interceptor drone navigators to security forces operators. When a feature needs changes in other parts of our system you will often jump in and help implement those. This is a high-impact, high-autonomy role where you’ll shape real-time geospatial UIs that integrate live video, maps, and controls for complex defense systems. You will work closely with product, design, and customers to turn ambiguous needs into shipping products at lightning speed. You will occasionally travel to the customer to help learn the real requirements and constraints and iterate with them in the field. The role is frontend-heavy (React / TypeScript), but you should be comfortable working across the stack when needed.
            - paragraph [ref=e45]
