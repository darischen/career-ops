            - listitem [ref=e35]: A minimum of 2 years of industry experience in software development.
            - listitem [ref=e36]: Expertise in front-end technologies, including JavaScript, HTML5/CSS, React, and Next.js.
            - listitem [ref=e37]: Proficiency in back-end development with Python and Node.js.
            - listitem [ref=e38]: Strong understanding of databases, SQL and noSQL.
            - listitem [ref=e39]: Strong interest in working on software systems that interact with real hardware.
            - listitem [ref=e40]: Experience with Docker for containerization and deployment.
            - listitem [ref=e41]: Experience with data visualization tools and frameworks.
            - listitem [ref=e42]: Exceptional verbal and written communication skills.
