          - paragraph [ref=e23]: We are seeking a highly skilled and motivated Senior Full-Stack Engineer on Systems Integration and Test to design, build, deploy, and maintain tools for ensuring the smooth configuration, diagnosis, calibration, data management, and operation of our sub assemblies and robots.
          - paragraph [ref=e24]:
            - strong [ref=e25]: "Responsibilities:"
          - list [ref=e26]:
            - listitem [ref=e27]: Architect, design, implement, deploy, and maintain tools for subassembly and robot configuration, diagnosis, calibration, data management, visualization, and user interaction.
            - listitem [ref=e28]: Develop scalable, well-documented APIs and frameworks to support mission-critical operations.
            - listitem [ref=e29]: Conduct trade studies to evaluate and select the best tools and technologies for the software stack.
            - listitem [ref=e30]: Collaborate with cross-functional teams, including system integration, manufacturing, and operations to gather requirements and incorporate feedback.
          - paragraph [ref=e31]:
