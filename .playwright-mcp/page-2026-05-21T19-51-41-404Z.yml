        - generic [ref=e28]: About Hive
        - generic [ref=e30]: Hive is the leading provider of cloud-based AI solutions to understand, search, and generate content, and is trusted by hundreds of the world's largest and most innovative organizations. The company empowers developers with a portfolio of best-in-class, pre-trained AI models, serving billions of customer API requests every month. Hive also offers turnkey software applications powered by proprietary AI models and datasets, enabling breakthrough use cases across industries. Together, Hive’s solutions are transforming content moderation, brand protection, sponsorship measurement, context-based ad targeting, and more.
        - generic [ref=e32]: Hive has raised over $120M in capital from leading investors, including General Catalyst, 8VC, Glynn Capital, Bain & Company, Visa Ventures, and others. We have over 250 employees globally in our San Francisco, Seattle, and Delhi offices. Please reach out if you are interested in joining the future of AI!
        - generic [ref=e34]: Machine Learning Role
        - generic [ref=e36]: In order to execute our vision, we need to grow our team of best-in-class machine learning engineers. We are looking for developers who are excited about staying at the forefront of deep learning technology, prototyping state-of-the-art neural net models and launching these models into production. We value hard workers who have no qualms working with terabyte-scale datasets, who are interested in learning new technologies at all levels of the machine learning stack, and who move fast and take ownership of their projects. Our ideal candidate has experience creating a working machine learning-powered project from the ground up, contributes innovative ideas and ingenious implementations to the team, and is capable of planning out scalable, maintainable data pipelines.
      - generic [ref=e38]:
        - heading "Responsibilities" [level=3] [ref=e39]
        - list [ref=e42]:
          - listitem [ref=e43]: Everything involved in applying a ML model to a production use case, including, designing and coding up the neural network, gathering and refining data, training and tuning the model, deploying it at scale with high throughput and uptime, and analyzing the results in the wild in order to continuously update and improve accuracy and speed
          - listitem [ref=e44]: Interface closely with the Backend and DevOps teams as well as with our internal data labeling services
          - listitem [ref=e45]: Utilize OWASP top 10 techniques to secure code from vulnerabilities
          - listitem [ref=e46]: Maintain awareness of industry best practices for data maintenance handling as it relates to your role
          - listitem [ref=e47]: Adhere to policies, guidelines and procedures pertaining to the protection of information assets
          - listitem [ref=e48]: Report actual or suspected security and/or policy violations/breaches to an appropriate authority
      - generic [ref=e50]:
        - heading "Requirements" [level=3] [ref=e51]
        - list [ref=e54]:
          - listitem [ref=e55]: You have an undergraduate or graduate degree in computer science or similar technical field, with significant coursework in mathematics or statistics
          - listitem [ref=e56]: You have 1-2 years industry machine learning experience
          - listitem [ref=e57]: You have successfully trained and deployed a deep learning machine model (image, NLP, video, or audio) into production, with measurably improved performance over baseline, either in industry or as a personal project
          - listitem [ref=e58]: You have strong experience with a high-level machine learning frameworks such as Tensorflow, Caffe, or Torch, and familiarity with the others
          - listitem [ref=e59]: You know the ins and outs of Python, especially as it applies to the above ML frameworks
          - listitem [ref=e60]: You are capable of quickly coding and prototyping data pipelines involving any combination of Python, Node, bash, and linux command-line tools, especially when applied to large datasets consisting of millions of files
          - listitem [ref=e61]: "You have a working knowledge of the following technologies, or are not afraid of picking it up on the fly: C++, Scala/Spark, SQL, Cassandra, Docker"
          - listitem [ref=e62]: You are up-to-date on the latest deep neural net research and architectures, both in understanding the theory and motivations behind the techniques, as well as how to implement them in the ML framework of your choice
          - listitem [ref=e63]: You have great communication skills and ability to work with others
          - listitem [ref=e64]: You are a strong team player, with a do-whatever-it-takes attitude
