        - generic [ref=e39]:
          - paragraph [ref=e40]: Company
          - heading "Develop safe, beneficial AI systems" [level=1] [ref=e41]
          - paragraph [ref=e43]: We’re looking for curious minds from a wide range of disciplines and backgrounds.
          - link "View open roles" [ref=e46] [cursor=pointer]:
            - /url: /careers/search/
        - heading "AI must be advanced with knowledge of and respect for humanity’s full spectrum of experiences and perspectives." [level=3] [ref=e50]
        - generic [ref=e52]:
          - paragraph [ref=e53]:
            - generic [ref=e54]: "Values:"
            - text: These values define what we consider to be the most important things. They guide our decision-making. We believe that channeling these values is the most promising way to achieve our mission.
          - list [ref=e55]:
            - listitem [ref=e56]:
              - generic [ref=e57]: Humanity first.
              - text: Working at OpenAI means being part of a team that is passionate about benefitting people and society through our work. We build AI to elevate humanity.
            - listitem [ref=e58]:
              - generic [ref=e59]: Act with humility.
              - text: Humility reminds us to recognize the limits of our own knowledge and to remain open to new ideas, perspectives, and the possibility of being wrong. This mindset influences our iterative approach to deployment, and the reintegration of feedback into our research.
            - listitem [ref=e60]:
              - generic [ref=e61]: Feel the AGI.
              - text: AGI will be powerful in an unprecedented way, with potential for upside and downside. Building it requires rigor and discipline, boundless imagination, and a deep sense of responsibility. We approach research and product development with respect for the transformative technology we are helping create, and the coupled benefits, changes, and risks that come along with it.
            - listitem [ref=e62]:
              - generic [ref=e63]: Ship joy.
              - text: Through our research we develop products that can transform how people live their lives. Our technology reflects an internal culture of optimism for the future and stewardship of our mission.
        - generic [ref=e65]:
          - paragraph [ref=e66]:
            - generic [ref=e67]: "Operating Principles:"
            - text: These principles define how we work together. They are important for establishing our operating culture.
          - list [ref=e68]:
            - listitem [ref=e69]:
              - generic [ref=e70]: Find a way.
              - text: We believe in finding a way to do the things that matter. We give agency to individuals and teams to find an approach that works. Ideas come from anywhere, regardless of title or tenure.
            - listitem [ref=e71]:
              - generic [ref=e72]: Creativity over control.
              - text: We look to find creative solutions, even if sometimes imperfect, over rigidity and control. Our approach to solving problems is based on best principles (first principles and best practices).
            - listitem [ref=e73]:
              - generic [ref=e74]: Update quickly.
              - text: We come in with a hypothesis and are willing to change our approach as we receive new information. We seek truth and adapt knowing that flexibility is key to progress on the path to AGI.
            - listitem [ref=e75]:
              - generic [ref=e76]: Intense focus.
              - text: We are hard workers who are here to make an impact on the world. This intensity and resilience are pivotal to the mission, while clarity and focus enable us to make hard decisions.
