          - generic [ref=e23]:
            - heading "About Flexport:" [level=2] [ref=e24]:
              - strong [ref=e25]: "About Flexport:"
            - paragraph [ref=e26]: At Flexport, we believe global trade can move the human race forward. That’s why it’s our mission to make global commerce so easy there will be more of it. We’re shaping the future of a $10T industry with solutions powered by innovative technology and exceptional people. Today, companies of all sizes—from emerging brands to Fortune 500s—use Flexport technology to move more than $19B of merchandise across 112 countries a year.
            - paragraph [ref=e27]: The recent global supply chain crisis has put Flexport center stage as we continue to play a pivotal role in how goods move around the world. We are proud to have the support of the best investors in the game who believe in our mission, solutions and people. Ready to tackle global challenges that impact business, society, and the environment? Come join us.
          - generic [ref=e28]:
            - paragraph [ref=e29]:
              - strong [ref=e30]: The Opportunity
            - paragraph [ref=e31]: This is a unique opportunity to join a new engineering team at the ground floor. As an SDE 1, you will learn from senior and staff level engineers while contributing to real production systems that power global trade. We are building Flexport’s client-facing rates platform and a new self-serve booking experience, moving the company from an assisted-sales model to a tech-run one.
            - paragraph [ref=e32]:
              - text: "You will help build the \"front door\" of our Client App: the interfaces and services that allow customers to see pricing and book shipments without manual intervention. This is an"
              - strong [ref=e33]: AI-first team
              - text: where you will see firsthand how intelligent automation is applied to real-world logistics. If you are looking for a high-growth environment where you can see your code impact thousands of shipments across 112 countries, this is the team for you.
            - heading "You Will" [level=3] [ref=e34]:
              - strong [ref=e35]: You Will
            - list [ref=e36]:
              - listitem [ref=e37]: Design, develop, test, deploy, and maintain systems that represent the real-world intricacies of global logistics and pricing logic.
              - listitem [ref=e38]: Work within an AI-integrated codebase, learning how to build and maintain services that support autonomous booking and intelligent quoting.
              - listitem [ref=e39]: Contribute to code reviews to maintain code quality, share knowledge, and learn from experienced mentors on the team.
              - listitem [ref=e40]: Collaborate with engineering, product, and design to translate complex business problems into elegant technical solutions.
              - listitem [ref=e41]: Build highly available, secure, and distributed services within a modern microservices architecture.
              - listitem [ref=e42]: "Build and launch products rapidly and incrementally: we ship to production dozens of times per day."
              - listitem [ref=e43]: Ensure high-quality standards by incorporating metrics and monitoring into every service you touch.
            - heading "You Should Have" [level=3] [ref=e44]:
              - strong [ref=e45]: You Should Have
            - list [ref=e46]:
              - listitem [ref=e47]: Bachelor’s degree in Computer Science, Software Engineering, or a related field, or equivalent practical experience.
              - listitem [ref=e48]:
                - text: "1+ years of professional experience in software development with demonstrated coding skills:"
                - strong [ref=e49]: strong internship experience in a product-focused environment is highly valued.
              - listitem [ref=e50]: "Proficiency in modern programming languages: specifically Java, Ruby, or TypeScript."
              - listitem [ref=e51]: Familiarity with technologies like databases, API development, and modern frontend frameworks like React.
              - listitem [ref=e52]:
                - strong [ref=e53]: "AI Curiosity:"
                - text: A strong interest in how AI and LLMs are transforming software development and a desire to learn how to build with these technologies.
              - listitem [ref=e54]:
                - strong [ref=e55]: "A self-starter attitude:"
                - text: You are curious, eager to learn, and when you see a problem, you look for a way to solve it.
              - listitem [ref=e56]:
                - strong [ref=e57]: "Product Curiosity:"
                - text: An interest in how users interact with software and a desire to understand the "why" behind the features you build.
            - heading "It’s a Plus If You Have" [level=3] [ref=e58]:
              - strong [ref=e59]: It’s a Plus If You Have
            - list [ref=e60]:
              - listitem [ref=e61]: "Experience with elements of our tech stack: Java, Spring Boot, Ruby on Rails, React, AWS."
              - listitem [ref=e62]: Experience using AI coding assistants to accelerate your development workflow.
              - listitem [ref=e63]: Ability to convey technical ideas in common terms to business stakeholders and product managers.
              - listitem [ref=e64]: Excellent written and verbal communication skills.
            - paragraph [ref=e65]: "#LI-Onsite"
