            - emphasis [ref=e81]: The range displayed on each job posting reflects the minimum and maximum target for new hire salaries for the position in the posting's respective region. Our salary ranges are determined by role, level, and location. Within the range displayed, individual pay is determined by work location and additional factors, including job-related skills, experience, and relevant education and / or training.
