          - generic [ref=e20]:
            - paragraph [ref=e21]: Cerebras Systems builds the world's largest AI chip, 56 times larger than GPUs. Our novel wafer-scale architecture provides the AI compute power of dozens of GPUs on a single chip, with the programming simplicity of a single device. This approach allows Cerebras to deliver industry-leading training and inference speeds and empowers machine learning users to effortlessly run large-scale ML applications, without the hassle of managing hundreds of GPUs or TPUs.
            - paragraph [ref=e22]:
              - text: Cerebras' current customers include top model labs, global enterprises, and cutting-edge AI-native startups.
              - link "OpenAI recently announced a multi-year partnership with Cerebras" [ref=e23] [cursor=pointer]:
                - /url: https://openai.com/index/cerebras-partnership/
              - text: ", to deploy 750 megawatts of scale, transforming key workloads with ultra high-speed inference."
            - paragraph [ref=e24]: Thanks to the groundbreaking wafer-scale architecture, Cerebras Inference offers the fastest Generative AI inference solution in the world, over 10 times faster than GPU-based hyperscale cloud inference services. This order of magnitude increase in speed is transforming the user experience of AI applications, unlocking real-time iteration and increasing intelligence via additional agentic computation.
          - generic [ref=e44]:
            - strong [ref=e46]: Job Overview
            - generic [ref=e47]:
              - text: We are seeking a highly skilled Compiler Engineer with a passion of optimizing compiler technologies for AI workloads. You will be an integral part of our software compiler stack team, focusing on enhancing our compiler to fully leverage the unique capabilities of our CS3 system. Your work will play a critical role in achieving unprecedented levels of performance, efficiency, and scalability for AI applications.
              - strong [ref=e48]: Key Responsibilities
            - list [ref=e49]:
              - listitem [ref=e50]: Design, develop, and optimize compiler technologies for AI chips using LLVM and MLIR frameworks.
              - listitem [ref=e51]: Identify and address performance bottlenecks, ensuring optimal resource utilization and execution efficiency.
              - listitem [ref=e52]: Work with the machine learning team to integrate compiler optimizations with AI frameworks and applications.
              - listitem [ref=e53]: Contribute to the advancement of compiler technologies by exploring new ideas and approaches.
            - strong [ref=e55]: Qualifications
            - list [ref=e56]:
              - listitem [ref=e57]: Master’s degree in Computer Science, Electrical Engineering, or a related field required.
              - listitem [ref=e58]: Proficiency in C/C++ programming and experience with low-level optimization.
              - listitem [ref=e59]: Proficiency in Python programming.
              - listitem [ref=e60]: Strong background in optimization techniques, particularly those involving NP-hard problems.
              - listitem [ref=e61]:
                - text: "Familiarity with either of the following is a plus:"
                - list [ref=e62]:
                  - listitem [ref=e63]: The Satisfiability Problem
                  - listitem [ref=e64]: Integer-Linear Programming
                  - listitem [ref=e65]: Constraint Satisfaction Problems
              - listitem [ref=e66]: Familiarity with MLIR is a plus.
              - listitem [ref=e67]: Excellent problem-solving skills and a strong analytical mindset.
              - listitem [ref=e68]: Ability to work in a fast-paced, collaborative environment.
            - strong [ref=e70]: What We Offer
            - list [ref=e71]:
              - listitem [ref=e72]: Competitive salary and benefits package.
              - listitem [ref=e73]: Opportunities for professional growth and career advancement.
              - listitem [ref=e74]: A dynamic and innovative work environment.
              - listitem [ref=e75]: The chance to work on cutting-edge technologies and make a significant impact on the future of AI.
          - generic [ref=e76]:
            - heading "Why Join Cerebras" [level=4] [ref=e77]:
              - strong [ref=e78]: Why Join Cerebras
            - paragraph [ref=e79]: "People who are serious about software make their own hardware. At Cerebras we have built a breakthrough architecture that is unlocking new opportunities for the AI industry. With dozens of model releases and rapid growth, we’ve reached an inflection point in our business. Members of our team tell us there are five main reasons they joined Cerebras:"
            - list [ref=e80]:
              - listitem [ref=e81]: Build a breakthrough AI platform beyond the constraints of the GPU.
              - listitem [ref=e82]: Publish and open source their cutting-edge AI research.
              - listitem [ref=e83]: Work on one of the fastest AI supercomputers in the world.
              - listitem [ref=e84]: Enjoy job stability with startup vitality.
              - listitem [ref=e85]: Our simple, non-corporate work culture that respects individual beliefs.
