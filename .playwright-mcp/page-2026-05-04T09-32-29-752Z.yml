        - generic [ref=e20]:
          - paragraph [ref=e21]:
            - strong [ref=e22]: About Wonderschool
          - paragraph [ref=e23]:
            - link "Wonderschool" [ref=e24] [cursor=pointer]:
              - /url: https://wonderschool.com/
            - text: is harnessing the power of technology to provide comprehensive support to childcare providers operating out of their homes as well as in the government and non-profit sectors. Our products enable childcare providers to create high-quality environments and meet the demands of their business, while also helping parents in need of childcare solutions through the creation of an accessible marketplace.
          - paragraph [ref=e25]: We are seeking a highly skilled and motivated Early Career Software Engineer to join our team. As the Early Career Software Engineer, you will play a crucial role in leading our software development initiatives, working with a talented team to create innovative solutions. Your expertise in delivery of high-quality software will be essential in driving the development of our cutting-edge applications.
          - paragraph [ref=e26]:
            - strong [ref=e27]: Role Overview
          - paragraph [ref=e28]: We are seeking an Early Career Software Engineer with an interest in applied AI to join our growing team. This is a unique opportunity to work in a fast-paced, purpose-driven environment where you can apply your technical skills to create meaningful impact in the childcare ecosystem. You’ll collaborate with cross-functional teams to build scalable, AI-driven solutions that empower childcare providers and improve parent experiences. This position is on site in our San Francisco office, Tuesday, Wednesday, and Thursday to allow for collaboration.
          - paragraph [ref=e29]:
            - strong [ref=e30]: Key Responsibilities
          - list [ref=e31]:
            - listitem [ref=e32]: Design, develop, and maintain robust software solutions with a focus on integrating AI capabilities.
            - listitem [ref=e33]: Collaborate with product managers, designers, and engineers to define requirements and implement innovative features.
          - list [ref=e34]:
            - listitem [ref=e35]: "Design and Development of AI Agents: Build modular, task-specific AI agents capable of natural language understanding, dialogue management, and action execution using frameworks such as LangChain or Rasa."
            - listitem [ref=e36]: Debug and troubleshoot technical issues to ensure platform stability.
            - listitem [ref=e37]: Stay current with emerging technologies and best practices in software engineering and AI.
          - paragraph [ref=e38]:
            - strong [ref=e39]: Required Qualifications
          - list [ref=e40]:
            - listitem [ref=e41]: Bachelor’s degree in Computer Science, Engineering, or related field.
            - listitem [ref=e42]: Strong foundation in programming languages (e.g., Python, JavaScript, or TypeScript).
            - listitem [ref=e43]: Familiarity with AI/ML concepts and frameworks (e.g., TensorFlow, PyTorch, Scikit-learn).
            - listitem [ref=e44]: Basic understanding of cloud platforms like Google Cloud Platform and AWS.
            - listitem [ref=e45]: Excellent communication skills and ability to work in a collaborative, in-person environment.
          - paragraph [ref=e46]:
            - strong [ref=e47]: Nice-to-Have Skills
          - list [ref=e48]:
            - listitem [ref=e49]: Strong understanding of machine learning principles, including model development, evaluation, and deployment for real-world applications.
            - listitem [ref=e50]:
              - strong [ref=e51]: Retrieval-Augmented Generation (RAG) Pipelines
              - text: ": Design and deploy RAG pipelines by integrating retrievers with generative models to enable contextual, real-time responses using vectorized knowledge bases."
            - listitem [ref=e52]:
              - strong [ref=e53]: Continuous Learning
              - text: ": Incorporate user feedback loops and data augmentation techniques to iteratively improve the performance and relevance of AI agents and RAG pipelines."
          - paragraph [ref=e54]:
            - strong [ref=e55]: What We Offer
          - list [ref=e56]:
            - listitem [ref=e57]:
              - strong [ref=e58]: Compensation
              - text: ": Expected salary range is $100K–$120K annually, based on experience and location."
            - listitem [ref=e59]:
              - strong [ref=e60]: Health Benefits
              - text: ": 100% coverage for employee premiums and 80% for dependents."
            - listitem [ref=e61]:
              - strong [ref=e62]: Wellness
              - text: ": Flexible PTO, mental wellness days, and reimbursements for wellness initiatives."
            - listitem [ref=e63]:
              - strong [ref=e64]: Parental Leave
              - text: ": Competitive policies eligible after six months of employment."
            - listitem [ref=e65]:
              - strong [ref=e66]: Work Environment
              - text: ": 3-5 Days in our SF Office in Downtown in SF with lunch covered."
          - paragraph [ref=e67]:
            - link "Wonderschool’s" [ref=e68] [cursor=pointer]:
              - /url: https://wonderschool.com/
            - text: mission is to ensure every child has access to child care that helps them realize their potential. We are doing this by building a suite of tools to support passionate early care and education professionals to start and run quality and sustainable child care programs. Our tools allow providers to easily manage their students, parents, and school all from one dashboard. Our community allows providers to seek advice, support, and a sense of belonging with a group of like-minded peers.
          - paragraph [ref=e69]: For parents, our marketplace allows parents to easily search for schools, schedule visits, enroll their children, and make payments.
          - paragraph [ref=e70]: The first five years of a child’s life are critical for nurturing brain development for success in school and beyond. All children deserve access to a care situation that will allow them to grow into healthy, lifelong learners. By leading a revolution where all children are able to get access to an environment to develop these skills, we can create drastic changes to neighborhoods and societies as a whole.
