                - generic [ref=e315]: Are you willing to spend a significant portion of your time (up to 50%) working directly with customers through support tickets and calls to inform the AI systems you build, and can you share specific examples where you’ve worked outside traditional engineering responsibilities or why this type of work appeals to you?*
                - textbox "Are you willing to spend a significant portion of your time (up to 50%) working directly with customers through support tickets and calls to inform the AI systems you build, and can you share specific examples where you’ve worked outside traditional engineering responsibilities or why this type of work appeals to you?" [ref=e316]
              - generic [ref=e318]:
                - paragraph [ref=e319]: This role focuses on building applied AI systems that automate customer interactions. To do this well, you will spend up to 50% of your time directly handling support tickets and customer calls. This hands-on exposure ensures you deeply understand user needs, edge cases, and the real-world workflows the AI must replicate or improve.
                - paragraph [ref=e320]: You will use these insights to design, build, and iterate on AI-driven solutions that improve quality, efficiency, and customer experience. The role is best suited for someone who is excited to operate beyond traditional software engineering boundaries, enjoys engaging directly with customers, and can translate those experiences into practical, high-impact AI systems.
            - generic [ref=e321]:
              - generic [ref=e323]:
                - generic [ref=e324]: What experience do you have using tools like Claude Code, OpenClaw, or similar AI-assisted development environments?*
                - textbox "What experience do you have using tools like Claude Code, OpenClaw, or similar AI-assisted development environments?" [ref=e325]
              - paragraph [ref=e335]: In this role, a significant portion of your work will involve building tools that allow non-engineers to create, modify, and operate workflows using AI-assisted coding systems. You will also be expected to use these tools yourself to accelerate development. We are looking for candidates who not only use AI to write code, but who can design systems that enable others to do the same effectively.
