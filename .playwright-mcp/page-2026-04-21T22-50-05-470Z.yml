        - paragraph [ref=e56]:
          - strong [ref=e57]: "Duties:"
          - text: Build customer-facing features and deliver scalable platform capabilities that power rich, performant user experiences. Collaborate across design, product, and platform teams to drive innovation across both front-end and back-end stack. Solve complex problems in business-critical feature flows. Own business-critical core feature flows. Own projects end-to-end and be responsible for working with Product and other stakeholders to refine requirements, create technical designs and specs, implement changes, and see projects through launch and maintenance. May telecommute.
        - paragraph [ref=e58]: Employer will accept a Bachelor's degree in Computer Science, Computer Systems Engineering, Engineering (Any), Information Technology, Mathematics, Physics, or related field.
        - paragraph [ref=e59]: "Position requires:"
        - list [ref=e60]:
          - listitem [ref=e61]: Creating, designing, and maintaining user interfaces;
          - listitem [ref=e62]: Web technologies such as HTML, CSS, and JavaScript;
          - listitem [ref=e63]: Experience with traditional server-side rendering patterns;
          - listitem [ref=e64]: Full stack including Go backend systems;
          - listitem [ref=e65]: Running A/B tests and using results to inform product decisions;
          - listitem [ref=e66]: Interpreting customer behavior and iterating on product flows based on data;
          - listitem [ref=e67]: Building large-scale software;
          - listitem [ref=e68]: Building data-driven experiments.
        - paragraph [ref=e69]: Uber's mission is to reimagine the way the world moves for the better. Here, bold ideas create real-world impact, challenges drive growth, and speed fuels progress. What moves us, moves the world - let's move it forward, together.
        - paragraph [ref=e70]:
          - text: Uber is proud to be an Equal Opportunity employer. All qualified applicants will receive consideration for employment without regard to sex, gender identity, sexual orientation, race, color, religion, national origin, disability, protected Veteran status, age, or any other characteristic protected by law. We also consider qualified applicants regardless of criminal histories, consistent with legal requirements. If you have a disability or special need that requires accommodation, please let us know by completing
          - link "this form" [ref=e71] [cursor=pointer]:
            - /url: https://forms.gle/aDWTk9k6xtMU25Y5A
          - text: .
        - paragraph [ref=e72]: Offices continue to be central to collaboration and Uber’s cultural identity. Unless formally approved to work fully remotely, Uber expects employees to spend at least half of their work time in their assigned office. For certain roles, such as those based at green-light hubs, employees are expected to be in-office for 100% of their time. Please speak with your recruiter to better understand in-office expectations for this role.
