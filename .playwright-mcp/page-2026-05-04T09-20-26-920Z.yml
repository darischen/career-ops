            - strong [ref=e57]: "Duties:"
            - text: Design, develop, and test software applications. Design, develop, and/or test software applications using company technology stack. Apply technical knowledge to evaluate complex data, developments, and projects in order to provide recommendations to resolve technical issues. Support the company's business operations and improve engineering productivity. Build software components that can be integrated into a fully functional software system. Solve production issues in product and system reliability. Design and implement solutions and features within complex, highly scalable systems, ensuring the marketplace for autonomous vehicles operates efficiently at scale. Drive technical projects from inception to completion, collaborating with cross-functional partners such as product managers, data scientists, and operations teams to deliver impactful solutions. May telecommute.
          - paragraph [ref=e58]: Employer will accept a Master's degree in Computer Science, Engineering (Any), Information Technology, Mathematics, Physics, or related field and 6 months of experience in the job offered or in a related occupation.
