              - text: to learn how to ace our interview process.
            - heading "About the Role" [level=3] [ref=e26]:
              - strong [ref=e27]: About the Role
            - paragraph [ref=e28]: Join Twitch's Commerce Engineering organization, where we're revolutionizing how viewers engage with their favorite creators. We are the teams behind Subscriptions, Gifting, Bits, Hype Train and Turbo products. From experimental features to established systems used by millions, we're constantly pushing the boundaries of what's possible in live streaming.
            - paragraph [ref=e29]: This position and team are based in Seattle, WA and San Francisco, CA
            - heading "You Will:" [level=3] [ref=e30]:
              - strong [ref=e31]: "You Will:"
            - list [ref=e32]:
              - listitem [ref=e33]: Craft immersive, interactive experiences that keep viewers supporting creators while engaging with the Twitch Community.
              - listitem [ref=e34]: Architect and build robust, scalable applications that can handle millions of concurrent users
              - listitem [ref=e35]: Collaborate across teams to create cohesive solutions that drive business impact
              - listitem [ref=e36]: Transform customer feedback into innovative features that enhance the Twitch experience
            - heading "You Have:" [level=3] [ref=e37]:
              - strong [ref=e38]: "You Have:"
