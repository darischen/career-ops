              - strong [ref=e19]: About Us
            - paragraph [ref=e20]: Twitch is the world’s biggest live streaming service, with global communities built around gaming, entertainment, music, sports, cooking, and more. It is where thousands of communities come together for whatever, every day.
            - paragraph [ref=e21]:
              - text: We’re about community, inside and out. You’ll find coworkers who are eager to team up, collaborate, and smash (or elegantly solve) problems together. We’re on a quest to empower live communities, so if this sounds good to you, see what we’re up to on
              - link "LinkedIn" [ref=e22] [cursor=pointer]:
