              - listitem [ref=e41]: Excellent verbal and written communication skills; Ability to effectively collaborate with teammates is critical to success.
              - listitem [ref=e42]: A track record of building consumer-facing products that users love
              - listitem [ref=e43]: Demonstrable experience of modern programming languages and frameworks
              - listitem [ref=e44]: Sharp problem-solving skills with a focus on algorithms, data structures, and schema design
              - listitem [ref=e45]: Bachelor's degree in Computer Science or equivalent real-world experience
            - heading "Bonus Points" [level=3] [ref=e46]:
