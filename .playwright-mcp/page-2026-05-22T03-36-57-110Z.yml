            - heading "About Canals" [level=1] [ref=e36]:
              - strong [ref=e37]: About Canals
            - paragraph [ref=e38]: Canals is a fully remote, profitable startup transforming the industrial supply chain ($10T industry) with AI. Our platform seamlessly integrates with the systems distributors already use, automating tedious tasks and reducing failure points in moving physical goods across the globe.
            - paragraph [ref=e39]: We’re a 100 person team (60 in engineering) distributed across North and South America.
            - heading "The Role" [level=1] [ref=e40]:
              - strong [ref=e41]: The Role
            - paragraph [ref=e42]: Our customer base is growing fast, and we’re looking for a Junior Software Engineer eager to learn and grow with us. You’ll work alongside experienced engineers building scalable, high-performance systems that solve real-world problems in logistics and automation.
            - paragraph [ref=e43]: This is a great opportunity to gain exposure to modern engineering practices, real customers, and a product that delivers measurable business impact.
            - heading "What You’ll Do" [level=1] [ref=e44]:
              - strong [ref=e45]: What You’ll Do
            - list [ref=e46]:
              - listitem [ref=e47]:
                - paragraph [ref=e48]: Work closely with senior engineers to design, build, and maintain backend systems that power our platform.
              - listitem [ref=e49]:
                - paragraph [ref=e50]: Contribute to feature development, bug fixes, and performance improvements.
              - listitem [ref=e51]:
                - paragraph [ref=e52]: Participate in code reviews, testing, and documentation to ensure quality and maintainability.
              - listitem [ref=e53]:
                - paragraph [ref=e54]: Collaborate with product and design teams to bring ideas from concept to production.
              - listitem [ref=e55]:
                - paragraph [ref=e56]: Learn new tools and technologies, and grow into greater ownership over time.
            - heading "What You'll Bring" [level=1] [ref=e57]:
              - strong [ref=e58]: What You'll Bring
            - list [ref=e59]:
              - listitem [ref=e60]:
                - paragraph [ref=e61]: Typically, 0–2 years of professional experience as a software engineer (internships or projects count!).
              - listitem [ref=e62]:
