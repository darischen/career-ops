            - paragraph [ref=e21]:
              - strong [ref=e22]: Who We Are
            - paragraph [ref=e23]: Founded in 1980 as Aardvark Financial, TransMarket Group (TMG) is a privately held global markets proprietary trading firm in Chicago. We use next-generation technology to capture opportunities around the world and manage risk in financial markets. Our mission is to bless others through the services we provide and through the generous stewardship of the wealth we create.
            - paragraph [ref=e24]: TMG is a well-established and profitable business as a respected member of the global financial system for over 40 years, but also is like a startup because the potential of our group is at least one order of magnitude greater than what we are currently producing. We have an entrepreneurial culture and collaboratively develop our business with patience and discipline; we work hard, learn constantly, and relentlessly improve our expertise.
          - generic [ref=e25]:
            - paragraph [ref=e26]:
              - strong [ref=e27]: Description
            - paragraph [ref=e28]: Our Software development team designs and builds low-latency systems that allow us to trade a diverse set of instruments across a wide range of financial marketplaces. This smaller, focused team comes with a high degree of responsibility and ownership. Our systems aim to be clean and understandable while achieving low latency and robust error tolerance. The libraries you work on will become the engine of our firm’s strategies.
            - paragraph [ref=e29]:
              - strong [ref=e30]: Responsibilities
            - list [ref=e31]:
              - listitem [ref=e32]: Work with Sr. Software Developers to assist and learn all facets of software development applied to the automated trading business
              - listitem [ref=e33]: Develop, code, maintain, and support production-quality automated components for global proprietary trading
              - listitem [ref=e34]: Develop expertise in software development principles, C++, and high-performance automated trading systems
              - listitem [ref=e35]: Collaborate with technology, software, trading, business, and accounting/finance teams
            - paragraph [ref=e36]:
              - strong [ref=e37]: Requirements
            - list [ref=e38]:
              - listitem [ref=e39]: Bachelor’s degree in a quantitative or technical field
              - listitem [ref=e40]: Passion for software and math applied to markets and trading
              - listitem [ref=e41]: Strong understanding of computing, math, probability, statistics, and finance is also preferred
              - listitem [ref=e42]: Programming proficiency and experience (C++, Python). Linux scripting is a plus
              - listitem [ref=e43]: Strong work ethic and willingness to do what it takes to get the job done
              - listitem [ref=e44]: Excellent technical and non-technical communication skills
              - listitem [ref=e45]: This position requires physical presence and is onsite (no remote work)
          - generic [ref=e46]:
