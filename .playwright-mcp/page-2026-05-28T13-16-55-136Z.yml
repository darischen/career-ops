          - generic [ref=e23]:
            - paragraph [ref=e24]:
              - strong [ref=e25]: About the Company
            - paragraph [ref=e26]:
              - text: At Torc, we have always believed that autonomous vehicle technology will transform how we travel, move freight, and do business.
              - text: A leader in autonomous driving since 2007, Torc has spent over a decade commercializing our solutions with experienced partners.
              - link "Now a part of the Daimler family" [ref=e27] [cursor=pointer]:
                - /url: https://torc.ai/daimler-testing-automated-trucks-public/
                - generic [ref=e28]: Now a part of the Daimler family
              - text: ", we are focused solely on developing software for automated trucks to transform how the world moves freight."
              - text: Join us and catapult your career with the company that helped pioneer autonomous technology, and the first AV software company with the vision to partner directly with a truck manufacturer.
            - paragraph [ref=e29]:
              - strong [ref=e30]: Meet the Team
            - paragraph [ref=e31]: Torc is developing Level 4 autonomous semi-truck software to transform how freight moves across the world. As a Software Engineer I on the Metrics for Release (MFR) team, you will contribute to the cloud-based systems and data pipelines that evaluate autonomy performance and support release readiness across Torc Drive.
            - paragraph [ref=e32]: This team owns the safety metrics, KPIs, and automated evaluation infrastructure used to validate autonomy behavior and ensure software releases meet safety and performance expectations before deployment. In this role, you will help build and maintain services and workflows that process telemetry and validation data, transforming raw vehicle data into meaningful system signals used to evaluate release quality and system readiness.
            - paragraph [ref=e33]: You will work closely with senior engineers and cross-functional teams to support metrics implementation, validation workflows, and scalable cloud-based infrastructure supporting Torc’s autonomous driving platform.
            - paragraph [ref=e34]:
              - strong [ref=e35]: What You’ll Do
            - list [ref=e36]:
              - listitem [ref=e37]: Contribute to the development and maintenance of Python-based services and AWS data pipelines supporting metrics and validation workflows
            - list [ref=e38]:
              - listitem [ref=e39]: Assist in processing and analyzing vehicle telemetry and validation data to generate meaningful safety metrics
            - list [ref=e40]:
              - listitem [ref=e41]: Support implementation of release validation logic tied to automated testing and evaluation pipelines
            - list [ref=e42]:
              - listitem [ref=e43]: Collaborate with systems, validation, and autonomy teams to support implementation of safety and performance metrics
            - list [ref=e44]:
              - listitem [ref=e45]: Investigate pipeline failures, telemetry inconsistencies, and data quality issues using logs and large-scale datasets
            - list [ref=e46]:
              - listitem [ref=e47]: Support workflow orchestration and automation systems used for validation and release readiness
            - list [ref=e48]:
              - listitem [ref=e49]: Participate in code reviews and collaborate with team members to deliver reliable, maintainable software solutions
            - list [ref=e50]:
              - listitem [ref=e51]: Contribute to continuous improvement of engineering practices, tooling, and validation infrastructure
            - paragraph [ref=e52]:
              - strong [ref=e53]: What You’ll Need to Succeed
            - list [ref=e54]:
              - listitem [ref=e55]: Bachelor’s degree in Computer Science, Software Engineering, Computer Engineering, Robotics, Electrical Engineering, Mechanical Engineering, Systems Engineering, or related technical field plus 0–4 years of relevant experience, OR Master’s degree in a related technical field
            - list [ref=e56]:
              - listitem [ref=e57]: Strong programming experience in Python
            - list [ref=e58]:
              - listitem [ref=e59]: Familiarity with cloud infrastructure and AWS services such as S3, Lambda, ECS, or Step Functions
            - list [ref=e60]:
              - listitem [ref=e61]: Familiarity with data processing, backend systems, or large-scale datasets
            - list [ref=e62]:
              - listitem [ref=e63]: Ability to debug and troubleshoot systems using logs, telemetry, and data analysis
            - list [ref=e64]:
              - listitem [ref=e65]: Strong problem-solving skills and ability to work collaboratively across teams
            - list [ref=e66]:
              - listitem [ref=e67]: Strong communication skills and willingness to learn in a fast-paced engineering environment
            - paragraph [ref=e68]:
              - strong [ref=e69]: Bonus Points
            - list [ref=e70]:
              - listitem [ref=e71]: Exposure to workflow orchestration tools such as Temporal, Airflow, or AWS Step Functions
            - list [ref=e72]:
              - listitem [ref=e73]: Experience working with telemetry, event data, or time-series datasets
            - list [ref=e74]:
              - listitem [ref=e75]: Exposure to robotics, automotive, or autonomous systems
            - list [ref=e76]:
              - listitem [ref=e77]: Experience contributing to validation, metrics, or automated testing systems
            - list [ref=e78]:
              - listitem [ref=e79]: Familiarity with cloud-native development or CI/CD workflows
            - list [ref=e80]:
              - listitem [ref=e81]: Experience working in safety-critical or high-reliability environments
            - paragraph [ref=e82]:
              - strong [ref=e83]: Perks of Being a Full-time Torc’r
              - text: "Torc cares about our team members and we strive to provide benefits and resources to support their health, work/life balance, and future. Our culture is collaborative, energetic, and team focused. Torc offers:"
            - list [ref=e84]:
              - listitem [ref=e85]: A competitive compensation package that includes a bonus component and stock options
            - list [ref=e86]:
              - listitem [ref=e87]: 100% paid medical, dental, and vision premiums for full-time employees
            - list [ref=e88]:
              - listitem [ref=e89]: 401K plan with a 6% employer match
            - list [ref=e90]:
              - listitem [ref=e91]: Flexibility in schedule and generous paid vacation (available immediately after start date)
            - list [ref=e92]:
              - listitem [ref=e93]: AD+D and Life Insurance
            - paragraph [ref=e94]:
              - generic [ref=e95]: At Torc, we’re committed to building a diverse and inclusive workplace. We celebrate the uniqueness of our Torc’rs and do not discriminate based on race, religion, color, national origin, gender (including pregnancy, childbirth, or related medical conditions), sexual orientation, gender identity, gender expression, age, veteran status, or disabilities.
              - generic [ref=e97]: Even if you don’t meet 100% of the qualifications listed for this opportunity, we encourage you to apply.
            - paragraph [ref=e98]:
              - generic [ref=e99]: Our compensation reflects the cost of labor across several geographic markets. Pay is based on a number of factors and may vary depending on job-related knowledge, skills, and experience. Torc's total compensation package will also include our corporate bonus and stock option plan. Dependent on the position offered, sign-on payments, relocation, and other forms of compensation may be provided as part of a total compensation package, in addition to a full range of medical, financial, and/or other benefits.
