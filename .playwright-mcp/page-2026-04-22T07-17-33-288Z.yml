        - generic [ref=e18]:
          - paragraph [ref=e19]:
            - strong [ref=e20]: About us
          - paragraph [ref=e21]: Graphcore is one of the world’s leading innovators in Artificial Intelligence compute.
          - paragraph [ref=e22]: It is developing hardware, software and systems infrastructure that will unlock the next generation of AI breakthroughs and power the widespread adoption of AI solutions across every industry.
          - paragraph [ref=e23]: "As part of the SoftBank Group, Graphcore is a member of an elite family of companies responsible for some of the world’s most transformative technologies. Together, they share a bold vision: to enable Artificial Super Intelligence and ensure its benefits are accessible to everyone."
          - paragraph [ref=e24]: Graphcore’s teams are drawn from diverse backgrounds and bring a broad range of skills and perspectives. A melting pot of AI research specialists, silicon designers, software engineers and systems architects, Graphcore enjoys a culture of continuous learning and constant innovation.
          - paragraph [ref=e25]
          - paragraph [ref=e26]:
            - strong [ref=e27]: Job Summary
            - strong [ref=e28]
          - paragraph [ref=e29]: The position requires a strong interest in reliability and performance testing, as well as a genuine passion for debugging and problem-solving. Ideal candidates will be self-motivated, enthusiastic, and able to work independently while also being effective communicators who can collaborate with team members. They should also be the type of person who takes initiative and gets things done quickly and efficiently. This opportunity is particularly well-suited for graduate software engineers seeking to gain hands-on exposure to the exciting fields of Artificial Intelligence (AI), ML, and AI accelerator hardware.
          - paragraph [ref=e30]
          - paragraph [ref=e31]:
            - strong [ref=e32]: The Team
          - paragraph [ref=e33]: The Software QA team is composed of highly skilled and dedicated software engineers with a strong passion for automation and data analysis. They collaborate extensively with industry-standard machine learning frameworks and models, making contributions to upstream open-source projects. Operating in a dynamic and fast-paced environment, the team consistently delivers high-quality results, ensuring exceptional customer experiences and impactful advancements in the product.
          - paragraph [ref=e34]
          - paragraph [ref=e35]:
            - strong [ref=e36]: Responsibilities and Duties
          - list [ref=e37]:
            - listitem [ref=e38]: Create representative ML workloads and gain insights from their execution. (Numerical accuracy, performance analysis and benchmarking).
          - list [ref=e39]:
            - listitem [ref=e40]: Build Continuous Integration/Delivery (CI/CD) against hardware simulators/emulators and physical hardware.
          - list [ref=e41]:
            - listitem [ref=e42]: Design and write tests for projects within the Software team and ML frameworks.
          - list [ref=e43]:
            - listitem [ref=e44]: Work closely with all Software development teams, supporting a culture of quality, security and maintainability.
          - list [ref=e45]:
            - listitem [ref=e46]: Evaluate the effectiveness of existing test strategies and infrastructure and make thoughtful improvements to ensure they continue to support team goals and organizational direction.
          - paragraph [ref=e47]
          - paragraph [ref=e48]:
            - strong [ref=e49]: Candidate Profile
          - paragraph [ref=e50]:
            - strong [ref=e51]: "Essential:"
          - list [ref=e52]:
            - listitem [ref=e53]: Bachelor’s or Master’s Degree in Computer Science, Maths, Machine Learning, Data Science, or related field.
          - list [ref=e54]:
            - listitem [ref=e55]: Strong proficiency in Python
          - list [ref=e56]:
            - listitem [ref=e57]: Proficiency in C++
          - list [ref=e58]:
            - listitem [ref=e59]: Experience with Linux operating systems
          - list [ref=e60]:
            - listitem [ref=e61]: Must be a fast learner
          - paragraph [ref=e62]
          - paragraph [ref=e63]:
            - strong [ref=e64]: Desirable
          - list [ref=e65]:
            - listitem [ref=e66]: Exposure to machine learning frameworks such as PyTorch, JAX, Triton, TensorFlow
          - list [ref=e67]:
            - listitem [ref=e68]: Experience with distributed workload management systems such as Kubernetes, VLLM, Keras or MLOps pipelines
          - list [ref=e69]:
            - listitem [ref=e70]: Experience with hardware architectures or compilers
          - list [ref=e71]:
            - listitem [ref=e72]: Experience with test automation in a CI/CD environment
          - list [ref=e73]:
            - listitem [ref=e74]: Exposure to data analytic methodologies
          - paragraph [ref=e75]
          - paragraph [ref=e76]:
            - strong [ref=e77]: Benefits
          - paragraph [ref=e78]: In addition to a competitive salary, Graphcore offers flexible working, a generous annual leave policy, private medical insurance and health cash plan, a dental plan, pension (matched up to 5%), life assurance and income protection. We have a generous parental leave policy and an employee assistance programme (which includes health, mental wellbeing, and bereavement support). We offer a range of healthy food and snacks at our central Bristol office and have our own barista bar! We welcome people of different backgrounds and experiences; we’re committed to building an inclusive work environment that makes Graphcore a great home for everyone. We offer an equal opportunity process and understand that there are visible and invisible differences in all of us. We can provide a flexible approach to interview and encourage you to chat to us if you require any reasonable adjustments.
