        - generic [ref=e21]: Aircall is a unicorn, AI-powered customer communications platform used by 22,000+ companies worldwide to drive revenue, resolve issues faster, and scale customer-facing teams. We’re redefining customer communications by bringing voice, SMS, WhatsApp, and AI together into one seamless workspace.
        - generic [ref=e23]: "Our momentum comes from a simple idea: help teams work smarter, not harder. Aircall’s AI Voice Agent automates routine calls, AI Assist streamlines post-call work, and AI Assist Pro delivers real-time guidance so people can do their best work. The result is higher revenue, faster resolutions, and teams that scale with confidence."
        - generic [ref=e25]: Aircall is headquartered in Paris, our European HQ, with a strong North American presence anchored in Seattle, our North American HQ, and teams across Madrid, London, Berlin, San Francisco, New York City, Sydney, and Mexico City. We’ve built a product customers love and a business that’s scaling quickly, backed by world-class investors and driven by rapid AI innovation across multiple product lines.
        - generic [ref=e26]: At Aircall, you’ll join a company in motion. We’re ambitious, product-driven, and execution-focused, with visible impact, fast decisions, and real growth.
        - generic [ref=e28]:
          - strong [ref=e29]: "How we work at Aircall:"
          - text: We’re customer-obsessed, data-driven, and focused on delivering meaningful outcomes. We value ownership, continuous learning, and thoughtful speed. If you thrive in a collaborative, fast-moving environment where trust and impact matter, you’ll feel at home here.
        - strong [ref=e32]: About the Role
        - generic [ref=e33]: We're looking for a Full Stack Software Engineer with a product mindset to join our Data team and help transform how Aircall goes to market.
        - generic [ref=e35]: In this role, you'll partner closely with go-to-market teams — Sales, Marketing, Customer Success, Support, and Revenue Operations — to understand their workflows, identify high-leverage opportunities, and build AI-powered tools that automate processes and boost productivity. You'll report to the Data team lead while embedding directly with GTM stakeholders to ensure what you build delivers real impact.
        - generic [ref=e37]: You'll move quickly from prototype to production. This role is ideal for engineers who want to be close to users, own end-to-end outcomes, and shape entirely new categories of internal tooling powered by AI. If you thrive at the intersection of engineering, data, and business operations, this is your opportunity to make an outsized impact.
