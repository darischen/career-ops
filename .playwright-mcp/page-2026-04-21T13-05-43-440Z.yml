        - generic [ref=e20]:
          - paragraph [ref=e22]: Figma is growing our team of passionate creatives and builders on a mission to make design accessible to all. Figma’s platform helps teams bring ideas to life—whether you're brainstorming, creating a prototype, translating designs into code, or iterating with AI. From idea to product, Figma empowers teams to streamline workflows, move faster, and work together in real time from anywhere in the world. If you're excited to shape the future of design and collaboration, join us!
          - generic [ref=e25]:
            - paragraph [ref=e26]: Figma is growing our team of passionate creatives and builders on a mission to make design accessible to all. Figma’s platform helps teams bring ideas to life—whether you're brainstorming, creating a prototype, translating designs into code, or iterating with AI. From idea to product, Figma empowers teams to streamline workflows, move faster, and work together in real time from anywhere in the world. If you're excited to shape the future of design and collaboration, join us!
            - paragraph [ref=e27]: Our AI Platform teams build the core frameworks and systems that support AI features across Figma, from infrastructure for training cutting-edge models to platforms for writing agentic product functionality.
            - paragraph [ref=e28]: "We’re hiring across several different teams:"
            - paragraph [ref=e29]:
              - strong [ref=e30]: Modeling Platform
            - paragraph [ref=e31]: The Modeling Platform team develops infrastructure for training, evaluating, deploying, and serving the AI models used across Figma. Modeling Platform engineers partner with our AI Research team to accelerate the end-to-end model development lifecycle, from experimentation to production.
            - paragraph [ref=e32]:
              - strong [ref=e33]: Agent Platform
            - paragraph [ref=e34]: The Agent Platform team builds the frameworks and systems powering agentic AI features throughout Figma’s products. Agent Platform engineers partner with our product and infrastructure teams to unlock new AI capabilities, improve the development velocity of AI engineers, and ensure all of our AI features are reliable, performant, and high-quality.
            - paragraph [ref=e35]:
              - strong [ref=e36]: Search & Recommendations
            - paragraph [ref=e37]:
              - text: The Search & Recommendations team builds our platform for context-gathering for agents, surfacing content across the Figma ecosystem (text, design systems, and more) by combining traditional search, recommendation, and information retrieval infrastructure with modern agentic search capabilities. Search and Recommendations engineers partner with product teams across our AI organization to develop highly reliable and performant systems that improve AI quality.
              - strong [ref=e38]: Make Platform
            - paragraph [ref=e39]: The Make Platform team builds systems that power a new way of creating and shipping software, where code, tooling, and runtime environments come together seamlessly. This includes standing up and managing sandboxed environments that can reliably run real applications, designing flexible pipelines that build and preview projects across a wide range of application frameworks, and integrating deeply with codebases to keep development state consistent as it evolves. The work spans distributed systems, developer infrastructure, and product-facing reliability challenges, with a focus on making complex workflows feel fast, intuitive, and dependable.
            - paragraph [ref=e40]:
              - strong [ref=e41]: Extensibility
            - paragraph [ref=e42]: The Extensibility team is responsible for our plugin, widget, and REST APIs that enable developers to build their own Figma integrations. Extensibility engineers also partner with our product teams to develop our recently-launched MCP offerings and server platforms that integrate Figma into the wider AI ecosystem.
            - paragraph [ref=e43]: We’re looking for engineers with a background in platform engineering or machine learning to strengthen our foundational AI systems & frameworks. As a member of our AI Platforms teams, you’ll play a critical role in developing cutting-edge AI models and new product functionality, while also upleveling the technical quality, performance, and reliability of our AI features. You’ll work alongside developers across the company, and combine industry best practices with a first-principle approach to design and build the platforms that power Figma’s design and collaboration products.
            - paragraph [ref=e44]: This is a full time role that can be held from one of our US hubs or remotely in the United States.
            - paragraph [ref=e45]:
              - strong [ref=e46]: "What you’ll do at Figma:"
            - list [ref=e47]:
              - listitem [ref=e48]: Support end-to-end AI feature development by designing, building, and maintaining systems that are scalable, reliable, and performant.
              - listitem [ref=e49]: Collaborate with product, research, and infrastructure engineers working across AI.
              - listitem [ref=e50]: Help shape our platform strategy, roadmaps, and engineering best practices throughout the organization.
              - listitem [ref=e51]: Debug and resolve complex production issues that span services and layers of the stack.
              - listitem [ref=e52]: Mentor engineers and foster a culture of collaboration, inclusivity, and technical excellence.
            - paragraph [ref=e53]:
              - strong [ref=e54]: "We'd love to hear from you if you have:"
            - list [ref=e55]:
              - listitem [ref=e56]: 5+ years of Software Engineering experience, especially in backend or infrastructure engineering.
              - listitem [ref=e57]: "3+ years of experience in one or more of: AI, search infrastructure, or developer platforms."
              - listitem [ref=e58]: Proficiency in TypeScript, Python, or Ruby.
              - listitem [ref=e59]: Strong system design skills and a track record of architecting resilient production systems.
              - listitem [ref=e60]: Excellent communication skills, with experience collaborating across teams and mentoring others.
            - paragraph [ref=e61]:
              - strong [ref=e62]: "While not required, It’s an added plus if you also have:"
            - list [ref=e63]:
              - listitem [ref=e64]: Prior experience in building AI infrastructure at scale, whether that be model training or serving platforms.
              - listitem [ref=e65]: Experience evolving large-scale, shared developer platforms to improve reliability and developer velocity.
              - listitem [ref=e66]: A proven track record of leading technical strategy and complex, multi-team projects.
            - paragraph [ref=e67]: At Figma, one of our values is Grow As You Go. We believe in hiring smart, curious people who are excited to learn and develop their skills. If you’re excited about this role but your past experience doesn’t align perfectly with the points outlined in the job description, we encourage you to apply anyways. You may be just the right candidate for this or other roles.
          - generic [ref=e69]:
            - generic [ref=e72]:
              - paragraph [ref=e73]:
                - strong [ref=e74]: Pay Transparency Disclosure
              - paragraph [ref=e75]: If based in Figma’s San Francisco or New York hub offices, this role has the annual base salary range stated below.
              - paragraph [ref=e76]: Job level and actual compensation will be decided based on factors including, but not limited to, individual qualifications objectively assessed during the interview process (including skills and prior relevant experience, potential impact, and scope of role), market demands, and specific work location. The listed range is a guideline, and the range for this role may be modified. For roles that are available to be filled remotely, the pay range is localized according to employee work location by a factor of between 80% and 100% of range. Please discuss your specific work location with your recruiter for more information.
              - paragraph [ref=e77]: Figma offers equity to employees, as well a competitive package of additional benefits, including health, dental & vision, retirement with company contribution, parental leave & reproductive or family planning support, mental health & wellness benefits, generous PTO, company recharge days, a learning & development stipend, a work from home stipend, and cell phone reimbursement. Figma also offers sales incentive pay for most sales roles and an annual bonus plan for eligible non-sales roles. Figma’s compensation and benefits are subject to change and may be modified in the future.
            - paragraph [ref=e78]: "Annual Base Salary Range:"
            - paragraph [ref=e79]: $153,000 - $376,000 USD
