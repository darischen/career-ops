            - heading "About Us" [level=2] [ref=e41]:
              - strong [ref=e42]: About Us
            - paragraph [ref=e43]: We're living through a fundamental shift in how people discover, evaluate, and purchase products. The next generation doesn't respond to traditional marketing -- they build relationships with brands through authentic social interactions, seek recommendations from communities they trust, and expect personalized experiences that feel human, not corporate.
            - paragraph [ref=e44]: At Nectar Social, we're building the AI-native social operating system that enables this new era of commerce. We believe every social interaction should deepen the relationship between brands and their communities while creating genuine value for both sides.
            - paragraph [ref=e45]: Founded by ex-Meta product and engineering leaders, we've raised over $30M in total capital from investors including GV and True Ventures. We work with brands like Oura Health, Caraway, e.l.f. Cosmetics, Kosas, OLIPOP, and many more. We're building the future of social commerce -- where community, conversation, and commerce converge.
            - heading "The Role" [level=2] [ref=e46]:
              - strong [ref=e47]: The Role
            - paragraph [ref=e48]: We're looking for an early-career Software Engineer to help build the next generation of AI-powered social commerce tools. In this role, you'll contribute to real systems used by major consumer brands while gaining mentorship and experience in a fast-moving startup environment.
            - paragraph [ref=e49]: You'll work across product features, AI integrations, and platform infrastructure while learning best practices in software engineering, cloud systems, and AI-driven product development.
