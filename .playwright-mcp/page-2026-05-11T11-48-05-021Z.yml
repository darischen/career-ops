            - paragraph [ref=e69]:
              - strong [ref=e70]: About the Team
            - paragraph [ref=e71]: OpenAI’s Applications Engineering organization builds and operates the products (such as ChatGPT & Codex) that bring our cutting-edge research to millions of users and developers worldwide.
            - paragraph [ref=e72]: The Applied Foundations team owns the core product and platform layers that make those experiences possible — from identity & access, to safety to payments & commerce across all of our apps. Our teams span product engineering, infrastructure, and safety, working together to deliver technology that is reliable, secure, and trusted at global scale.
            - paragraph [ref=e73]:
              - strong [ref=e74]: About the Role
            - paragraph [ref=e75]: We’re hiring Full-Stack Software Engineers to design and implement safe services, systems and infrastructure that power our core products.
            - paragraph [ref=e76]:
              - strong [ref=e77]: "In this role, you will:"
            - list [ref=e78]:
              - listitem [ref=e79]:
                - paragraph [ref=e80]: Architect, build, and improve frontend and backend systems.
              - listitem [ref=e81]:
                - paragraph [ref=e82]: Work across the full stack to build products and systems from initial exploration through launch readiness.
              - listitem [ref=e83]:
                - paragraph [ref=e84]: Participate in long-term architectural planning and technical design reviews.
              - listitem [ref=e85]:
                - paragraph [ref=e86]: Collaborate with cross-functional teams to design solutions that protect against and mitigate adversarial attacks without compromising user experience.
            - paragraph [ref=e87]:
              - strong [ref=e88]: "You might thrive in this role if you:"
            - list [ref=e89]:
              - listitem [ref=e90]:
                - paragraph [ref=e91]: Have built and shipped full-stack apps or systems end-to-end — in fast-moving, startup-like environments.
              - listitem [ref=e92]:
                - paragraph [ref=e93]: Have a humble attitude, an eagerness to help your colleagues, and a desire to do whatever it takes to make the team succeed.
              - listitem [ref=e94]:
                - paragraph [ref=e95]: Enjoy building resilient products and services that handle large scale and complexity.
              - listitem [ref=e96]:
                - paragraph [ref=e97]: Are self-directed and enjoy figuring out the best way to solve a particular problem
              - listitem [ref=e98]:
                - paragraph [ref=e99]: Own problems end-to-end, and are willing to pick up whatever knowledge you're missing to get the job done.
            - paragraph [ref=e100]
            - paragraph [ref=e101]:
              - strong [ref=e102]: About OpenAI
            - paragraph [ref=e103]: OpenAI is an AI research and deployment company dedicated to ensuring that general-purpose artificial intelligence benefits all of humanity. We push the boundaries of the capabilities of AI systems and seek to safely deploy them to the world through our products. AI is an extremely powerful tool that must be created with safety and human needs at its core, and to achieve our mission, we must encompass and value the many different perspectives, voices, and experiences that form the full spectrum of humanity.
            - paragraph [ref=e104]: We are an equal opportunity employer, and we do not discriminate on the basis of race, religion, color, national origin, sex, sexual orientation, age, veteran status, disability, genetic information, or other applicable legally protected characteristic.
            - paragraph [ref=e105]:
              - text: For additional information, please see
              - link "OpenAI’s Affirmative Action and Equal Employment Opportunity Policy Statement" [ref=e106] [cursor=pointer]:
                - /url: https://cdn.openai.com/policies/eeo-policy-statement.pdf
              - text: .
            - paragraph [ref=e107]: "Background checks for applicants will be administered in accordance with applicable law, and qualified applicants with arrest or conviction records will be considered for employment consistent with those laws, including the San Francisco Fair Chance Ordinance, the Los Angeles County Fair Chance Ordinance for Employers, and the California Fair Chance Act, for US-based candidates. For unincorporated Los Angeles County workers: we reasonably believe that criminal history may have a direct, adverse and negative relationship with the following job duties, potentially resulting in the withdrawal of a conditional offer of employment: protect computer hardware entrusted to you from theft, loss or damage; return all computer hardware in your possession (including the data contained therein) upon termination of employment or end of assignment; and maintain the confidentiality of proprietary, confidential, and non-public information. In addition, job duties require access to secure and protected information technology systems and related data security obligations."
