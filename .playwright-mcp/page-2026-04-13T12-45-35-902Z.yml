          - heading "ELECTRICAL ENGINEER (NEW GRAD SUMMER 2026)" [level=2] [ref=e24]:
            - strong [ref=e25]: ELECTRICAL ENGINEER (NEW GRAD SUMMER 2026)
          - paragraph [ref=e26]: Freeform builds AI-native manufacturing systems that unify software, hardware, and physics to produce industrial-scale parts at the speed of human ideation. By treating manufacturing as a single integrated system, we unlock a new era of innovation where complex hardware is designed, built, and scaled without limits.
          - paragraph [ref=e27]: As an Electrical Engineer at Freeform, you will play an integral role in the design and development of custom electronics that bring our advanced metal 3D printing factory systems to life. You’ll work with a talented engineering team from some of the world’s most innovative companies on electrical system design, development, and integration efforts across the factory systems, with a specific focus on PCB and compute system design. You will use a first-principles approach to solving problems and tackling new areas within electrical engineering that you may not have directly worked on before. The ideal candidate is capable of running projects from cradle to grave and has the ability to work effectively with other engineering disciplines.
          - paragraph [ref=e28]: 3D printing experience is not required to be successful here - rather we look for smart, motivated, collaborative engineers who love solving hard problems and creating amazing technology!
