          - list [ref=e60]:
            - listitem [ref=e61]:
              - paragraph [ref=e62]: Based in Hawthorne, our vertically integrated facility brings technology development, R&D, and production together under one roof. We operate at the center of LA’s deep tech ecosystem, surrounded by some of the most ambitious hardware innovation happening anywhere in the country.
          - paragraph [ref=e63]:
            - strong [ref=e64]: "What We Offer:"
          - list [ref=e65]:
            - listitem [ref=e66]: We have an inclusive and diverse culture that values collaboration, learning, and making deliberate data-driven decisions.
            - listitem [ref=e67]: We offer a unique opportunity to be an early and integral member of a rapidly growing company that is scaling a world-changing technology.
            - listitem [ref=e68]:
              - text: Benefits
              - list [ref=e69]:
                - listitem [ref=e70]: Significant stock option packages
                - listitem [ref=e71]: 100% employer-paid Medical, Dental, and Vision insurance (premium PPO and HMO options)
                - listitem [ref=e72]: Life insurance
                - listitem [ref=e73]: Traditional and Roth 401(k)
                - listitem [ref=e74]: Relocation assistance provided
                - listitem [ref=e75]: Paid vacation, sick leave, and company holidays
                - listitem [ref=e76]: Generous Paid Parental Leave and extended transition back to work for the birthing parent
                - listitem [ref=e77]: Free daily catered lunch and dinner, and fully stocked kitchenette
                - listitem [ref=e78]: Casual dress, flexible work hours, and regular catered team building events
            - listitem [ref=e79]:
              - text: Compensation
              - list [ref=e80]:
                - listitem [ref=e81]: Our intent is to offer a salary that is commensurate for the company’s current stage of development and allows the employee to grow and develop within a role.
                - listitem [ref=e82]:
                  - text: In addition to the significant stock option package, the estimated salary range for this role is
                  - generic [ref=e83]: $105,000-$120,000. The upper end of the range is reserved for individuals who demonstrate exceptional experience, deep domain mastery, and a proven history of high performance and impact.
            - listitem [ref=e84]: Freeform is an Equal Opportunity Employer that values diversity; employment with Freeform is governed on the basis of merit, competence and qualifications and will not be influenced in any manner by race, color, religion, gender, national origin/ethnicity, veteran status, disability status, age, sexual orientation, gender identity, marital status, mental or physical disability or any other legally protected status.
