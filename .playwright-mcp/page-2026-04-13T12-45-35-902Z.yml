          - paragraph [ref=e32]:
            - strong [ref=e33]: "Responsibilities:"
          - list [ref=e34]:
            - listitem [ref=e35]: Rapidly design, develop and test highly reliable electronics and PCBs
            - listitem [ref=e36]: Model and simulate circuit designs for analysis and performance
            - listitem [ref=e37]: Contribute to electrical architecture, product requirements, component selection, analysis, schematic capture, prototyping, bring-up, debugging, documentation, product management, productization, manufacturing, and test
            - listitem [ref=e38]: Drive component selection, analysis, schematic capture, prototyping, bring-up, debugging, documentation, manufacturing, and test
            - listitem [ref=e39]: Hands-on debugging of the unexpected via the use of laboratory test equipment, custom instrumentation, and testing setups
          - paragraph [ref=e40]:
            - strong [ref=e41]: "Basic Qualifications:"
          - list [ref=e42]:
            - listitem [ref=e43]: Bachelor’s degree in electrical engineering or computer engineering from an ABET accredited university or college
            - listitem [ref=e44]: Hands on electrical experience from internships or engineering clubs such as FSAE, Baja SAE, solar car, rocket club, robotics club, or similar
            - listitem [ref=e45]: Well-versed in electrical engineering fundamentals and comfortable taking a first-principles approach to solving problems
          - paragraph [ref=e46]:
            - strong [ref=e47]: "Nice to Have:"
          - list [ref=e48]:
            - listitem [ref=e49]: Advanced degree (Master's, PhD) in electrical engineering
            - listitem [ref=e50]: Familiarity with industrial automation technologies, robotics, spacecraft avionics, or similar high-performance electromechanical system
            - listitem [ref=e51]: Experience with sensors, embedded microcontroller design and firmware, and FPGA hardware and software development
            - listitem [ref=e52]: Experience with high-speed data acquisition systems, high-accuracy motion systems, high-speed scanning systems, or similar camera/telemetry-based control systems
            - listitem [ref=e53]: Comfortable working in fast-paced, ambiguous environments and iterating quickly (comfortable building the plane as we fly it)
            - listitem [ref=e54]: Strong communicator who collaborates across disciplines and proactively seeks support when needed
            - listitem [ref=e55]: Willing to take ownership of tasks big and small, with a hands-on, problem-solving mindset
            - listitem [ref=e56]: Strong work ethic with a refuse-to-fail mindset
            - listitem [ref=e57]: Demonstrated indicators of excellence and/or achieving success against adversity (i.e. top academic performance, leadership in engineering clubs, first-generation college student, or other examples of resilience and achievement)
          - paragraph [ref=e58]:
