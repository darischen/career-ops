                - text: .
              - strong [ref=e567]: How do you know if you have a disability?
              - paragraph [ref=e568]:
                - text: A disability is a condition that substantially limits one or more of your “major life activities.” If you have or have ever had such a condition, you are a person with a disability.
                - strong [ref=e569]: "Disabilities include, but are not limited to:"
              - list [ref=e570]:
                - listitem [ref=e571]: Alcohol or other substance use disorder (not currently using drugs illegally)
                - listitem [ref=e572]: Autoimmune disorder, for example, lupus, fibromyalgia, rheumatoid arthritis, HIV/AIDS
                - listitem [ref=e573]: Blind or low vision
                - listitem [ref=e574]: Cancer (past or present)
                - listitem [ref=e575]: Cardiovascular or heart disease
                - listitem [ref=e576]: Celiac disease
