            - generic [ref=f1e20]:
              - paragraph [ref=f1e21]:
                - strong [ref=f1e22]: Who We Are
              - paragraph [ref=f1e23]: Spot & Tango is an innovative pet health & wellness brand that delivers personalized meal plans on a subscription basis. Our recipes are developed by leading animal nutritionists, and are made with only real, human-grade ingredients... and nothing artificial! We have lofty goals (to make every dog in the US and Canada healthier, and every pet parent happier!) and we are looking for the right people to help us get there. This is an exciting opportunity to join a VC-backed, high-growth, e-commerce startup and have an outsized impact in an extremely fast-paced environment. Plus, you get to think about dogs all day!
              - paragraph [ref=f1e24]:
                - strong [ref=f1e25]: Who You Are
              - paragraph [ref=f1e26]:
                - text: We are seeking a talented and experienced
                - strong [ref=f1e27]: Jr Software Engineer
                - text: to join our growing team. We are seeking candidates with expertise primarily in React and Python. As a Jr Software Engineer at Spot & Tango, you will play a pivotal role in building scalable web applications for our customers and for internal company use.
              - paragraph [ref=f1e28]:
                - strong [ref=f1e29]: "Responsibilities:"
              - list [ref=f1e30]:
                - listitem [ref=f1e31]: Play a role in designing and building new features for our core products, primarily using TypeScript, React, React Native, and NextJS
                - listitem [ref=f1e32]: QA efforts by writing integration tests and thoroughly testing code before merging
                - listitem [ref=f1e33]: Collaborate with cross-functional stakeholders to ensure web applications achieve their business goals
                - listitem [ref=f1e34]: Optimize applications for maximum performance and responsiveness, especially on mobile devices
                - listitem [ref=f1e35]: Troubleshoot, debug, and resolve software defects and issues
                - listitem [ref=f1e36]: Implement security best practices to ensure the integrity and confidentiality of user data
                - listitem [ref=f1e37]: Stay up-to-date with emerging technologies and industry trends, and apply them to enhance our products
                - listitem [ref=f1e38]: Participate in code reviews to maintain code quality and ensure compliance with coding standards
                - listitem [ref=f1e39]: Contribute to the development of technical documentation and knowledge sharing within the team
                - listitem [ref=f1e40]: Help us scale the company, the culture, and our products
              - paragraph [ref=f1e41]:
                - strong [ref=f1e42]: "Qualifications:"
              - list [ref=f1e43]:
                - listitem [ref=f1e44]: BS in Computer Science, Engineering, or a related field strongly preferred
                - listitem [ref=f1e45]: 0-3 years of professional experience developing software
                - listitem [ref=f1e46]: Proficiency in NextJS and React, with a strong portfolio showcasing your work
                - listitem [ref=f1e47]: Experience in developing and deploying web applications
                - listitem [ref=f1e48]: Ability to work independently and as part of a collaborative team
                - listitem [ref=f1e49]: Ability to find simple solutions to complex problems
                - listitem [ref=f1e50]: Excellent communication skills
                - listitem [ref=f1e51]: Solid understanding of front-end technologies such as HTML, CSS, and TypeScript
                - listitem [ref=f1e52]: Experience with AWS services preferred
                - listitem [ref=f1e53]: Experience with version control systems (e.g., Git)
                - listitem [ref=f1e54]: Excellent problem-solving skills and attention to detail
                - listitem [ref=f1e55]: Experience working in a startup environment, and familiarity with DTC (Direct-to- Consumer) business models and e-commerce is a plus
                - listitem [ref=f1e56]: Familiarity with RESTful APIs and third-party integrations
                - listitem [ref=f1e57]: Familiarity with SQL, Python, and Django is preferred
              - paragraph [ref=f1e58]: If you have a passion for technology, a desire to work with a high-performing engineering team, and are excited about the prospect of contributing to the growth of a DTC startup, we encourage you to apply for this exciting opportunity.
              - paragraph [ref=f1e59]:
                - emphasis [ref=f1e60]: This is a hybrid position.
              - paragraph [ref=f1e61]:
                - emphasis [ref=f1e62]: You must be able to commute into our office in Midtown Manhattan Monday, Wednesday, and Thursday.
            - paragraph [ref=f1e64]: Spot & Tango is an equal opportunity employer. We celebrate diversity and are committed to creating an inclusive environment for all employees.
