            - paragraph
          - generic [ref=e21]:
            - heading "About the Team" [level=2] [ref=e22]:
              - strong [ref=e23]: About the Team
            - paragraph [ref=e24]: DoorDash Labs is a team within DoorDash building autonomous delivery robots and other autonomy solutions from the ground up for DoorDash's core delivery platform. If you have a passion for applying robotics solutions to a service loved by millions of people, then we want to talk to you!
            - heading "About the Role" [level=2] [ref=e25]:
              - strong [ref=e26]: About the Role
            - paragraph [ref=e27]: As Autonomy Technical Support Associate at DoodDash Labs, you will ensure the successful daily operations of the robot fleet and act as a conduit between Operations and Engineering teams to report, track and resolve field operations issues.
            - heading "You’re excited about this opportunity because you will…" [level=2] [ref=e28]:
              - strong [ref=e29]: You’re excited about this opportunity because you will…
            - list [ref=e30]:
              - listitem [ref=e31]: Act as a primary point of contact for software and hardware issues encountered during autonomy operations and testing, supporting the reliability of a live robotic fleet
              - listitem [ref=e32]: Perform initial debugging and troubleshooting to identify issues, implement mitigation steps, and ensure timely resolution of operational disruptions
              - listitem [ref=e33]: Partner closely with Robot Operations and Engineering teams to report anomalies, bugs, and faults with clear, actionable context to support efficient investigation and resolution
              - listitem [ref=e34]: Contribute to maintaining and improving troubleshooting documentation, helping build a consistent and scalable knowledge base for issue resolution
              - listitem [ref=e35]: Support ongoing improvements to triage quality and workflows, helping the team operate more efficiently as fleet complexity and scale increase
              - listitem [ref=e36]: Identify recurring issues and patterns, contributing insights that help improve system performance and reduce future incidents
              - listitem [ref=e37]: Own and maintain the Failure Mode repository, a critical system of record powering triage, self-service, and automation workflows
              - listitem [ref=e38]: Continuously refine and evolve Failure Modes based on live issues, partnering with Operations and Engineering to improve triage quality, enable self-service, and support downstream automation and AI-driven workflows (e.g., issue categorization, resolution guidance)
            - heading "We’re excited about you because…" [level=2] [ref=e39]:
              - strong [ref=e40]: We’re excited about you because…
            - list [ref=e41]:
              - listitem [ref=e42]: You have experience troubleshooting and debugging complex technical issues in fast-paced, operational environments
              - listitem [ref=e43]: You are comfortable working with tools such as Linux command line, Jira, and GitHub (or similar systems) to investigate and track issues
              - listitem [ref=e44]: You communicate clearly and effectively, with strong attention to detail when documenting issues and sharing context with cross-functional partners
              - listitem [ref=e45]: You are able to navigate ambiguity and make sound decisions under pressure, balancing speed with accuracy in real-time situations
              - listitem [ref=e46]: You are naturally curious and motivated to understand how systems work, with a desire to continuously learn and improve
              - listitem [ref=e47]: You take ownership of your work and proactively look for ways to improve processes, workflows, and overall team efficiency
              - listitem [ref=e48]: You are flexible and willing to support operations across different shifts, including evenings or weekends as needed
            - paragraph [ref=e49]
          - generic [ref=e51]:
            - generic [ref=e54]:
              - paragraph [ref=e55]:
                - strong [ref=e57]: Compensation
              - paragraph [ref=e58]: Actual compensation within the pay range listed below will be decided based on factors including, but not limited to, skills, prior relevant experience, and specific work location. Base salary is localized according to employee work location.
              - paragraph [ref=e59]: DoorDash cares about you and your overall well-being. That’s why we offer a comprehensive benefits package to all regular employees, which includes a 401(k) plan with employer matching, 16 weeks of paid parental leave, wellness benefits, commuter benefits match, paid time off and paid sick leave in compliance with applicable laws (e.g. Colorado Healthy Families and Workplaces Act). DoorDash also offers medical, dental, and vision benefits, 11 paid holidays, disability and basic life insurance, family-forming assistance, and a mental health program, among others.
              - paragraph [ref=e60]:
                - text: To learn more about our benefits, visit our careers page
                - link "here" [ref=e61] [cursor=pointer]:
                  - /url: https://careers.doordash.com/
                - text: .
              - paragraph [ref=e62]: "See below for paid time off details:"
              - list [ref=e63]:
                - listitem [ref=e64]:
                  - strong [ref=e65]: "For salaried roles:"
                  - text: flexible paid time off/vacation, plus 80 hours of paid sick time per year.
                - listitem [ref=e66]:
                  - strong [ref=e67]: "For hourly roles:"
                  - text: vacation accrued at about 1 hour for every 25.97 hours worked (e.g. about 6.7 hours/month if working 40 hours/week; about 3.4 hours/month if working 20 hours/week), and paid sick time accrued at 1 hour for every 30 hours worked (e.g. about 5.8 hours/month if working 40 hours/week; about 2.9 hours/month if working 20 hours/week).
            - paragraph [ref=e68]: The national base pay range for this position within the United States, including Illinois and Colorado.
            - paragraph [ref=e69]: $76,900 - $113,000 USD
          - generic [ref=e70]:
            - heading "About DoorDash" [level=2] [ref=e71]
            - paragraph [ref=e72]:
              - text: At DoorDash, our mission to empower local economies shapes how our team members move quickly, learn, and reiterate in order to make impactful decisions that display empathy for our range of users—from Dashers to merchant partners to consumers. We are a technology and logistics company that started by enabling door-to-door delivery, and we are looking for team members who can help us go from a company that is known as the place you order food to a company that people turn to for any and all goods.
              - text: DoorDash is growing rapidly and changing constantly, which gives our team members the opportunity to share their unique perspectives, solve new challenges, and own their careers. We're committed to supporting employees’ happiness, healthiness, and overall well-being by providing comprehensive benefits and perks including premium healthcare, wellness expense reimbursement, paid parental leave and more.
            - heading "Our Commitment to Diversity and Inclusion" [level=2] [ref=e73]
            - paragraph [ref=e74]: We’re committed to growing and empowering a more inclusive community within our company, industry, and cities. That’s why we hire and cultivate diverse teams of people from all backgrounds, experiences, and perspectives. We believe that true innovation happens when everyone has room at the table and the tools, resources, and opportunity to excel.
            - paragraph [ref=e75]: "Statement of Non-Discrimination: In keeping with our beliefs and goals, no employee or applicant will face discrimination or harassment based on: race, color, ancestry, national origin, religion, age, gender, marital/domestic partner status, sexual orientation, gender identity or expression, disability status, or veteran status. Above and beyond discrimination and harassment based on “protected categories,” we also strive to prevent other subtler forms of inappropriate behavior (i.e., stereotyping) from ever gaining a foothold in our office. Whether blatant or hidden, barriers to success have no place at DoorDash. We value a diverse workforce – people who identify as women, non-binary or gender non-conforming, LGBTQIA+, American Indian or Native Alaskan, Black or African American, Hispanic or Latinx, Native Hawaiian or Other Pacific Islander, differently-abled, caretakers and parents, and veterans are strongly encouraged to apply. Thank you to the Level Playing Field Institute for this statement of non-discrimination."
            - paragraph [ref=e76]: Pursuant to the San Francisco Fair Chance Ordinance, Los Angeles Fair Chance Initiative for Hiring Ordinance, and any other state or local hiring regulations, we will consider for employment any qualified applicant, including those with arrest and conviction records, in a manner consistent with the applicable regulation.
            - paragraph [ref=e77]:
              - strong [ref=e78]: If you need any accommodations, please inform your recruiting contact upon initial connection.
            - paragraph [ref=e79]: Notice to Applicants for Jobs Located in NYC or Remote Jobs Associated With Office in NYC Only
            - paragraph [ref=e80]: We used Covey as part of our hiring and/or promotional process for jobs in NYC and certain features may qualify it as an AEDT in NYC. As part of the hiring and/or promotion process, we provided Covey with job requirements and candidate submitted applications. We began using Covey Scout for Inbound from August 21, 2023, through December 21, 2023. We resumed using Covey Scout for Inbound again on June 29, 2024, and ceased using Covey Scout for Inbound on April 30, 2026.
            - paragraph [ref=e81]:
              - text: "The Covey tool has been reviewed by an independent auditor. Results of the audit may be viewed here:"
              - strong [ref=e82]:
