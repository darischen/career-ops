            - paragraph
          - heading "About the Team" [level=2] [ref=e45]:
            - strong [ref=e46]: About the Team
          - paragraph [ref=e47]: Join the team focused on building intelligent, personalized systems that drive fairness, efficiency, and trust in the DoorDash platform. We own the credits and refunds experience—key components of customer satisfaction and retention—and we’re pioneering new ways to optimize and personalize these decisions at scale using causal inference and optimization.
          - heading "About the Role" [level=2] [ref=e48]:
            - strong [ref=e49]: About the Role
          - paragraph [ref=e50]: We're seeking a Machine Learning Engineer to lead the development of state-of-the-art ML systems that personalize and optimize credits and refund decisions. This work is critical to balancing cost efficiency with long-term customer retention and experience.
          - paragraph [ref=e51]: In this high-impact role, you will partner with cross-functional leaders to design and deploy causal models and optimization algorithms that influence millions of user experiences every week.
          - heading "You’re excited about this opportunity because you will…" [level=2] [ref=e52]:
            - strong [ref=e53]: You’re excited about this opportunity because you will…
          - list [ref=e54]:
            - listitem [ref=e55]: Designing and deploying causal inference models to accurately assess the impact of refunds and credits on customer satisfaction, retention, and behavior
            - listitem [ref=e56]: Developing optimization frameworks that balance customer experience with operational cost, under policy and budget constraints
            - listitem [ref=e57]: Building personalized decision systems that adapt to customer preferences and platform dynamics in real time
            - listitem [ref=e58]: Collaborating with engineering, product, and data science partners to shape the roadmap for trust, service recovery, and consumer experience
            - listitem [ref=e59]: Leading end-to-end model development, including experimentation, deployment, monitoring, and iteration
          - heading "We’re excited about you because you have:" [level=2] [ref=e60]:
            - strong [ref=e61]: "We’re excited about you because you have:"
          - list [ref=e62]:
            - listitem [ref=e63]: 3+ years of industry experience delivering machine learning systems with clear business impact, especially in personalization, optimization, or causal inference
            - listitem [ref=e64]: Proficiency in using AI coding tools (e.g., Claude Code, Codex, Cursor) in the full software development lifecycle, including designing, generating code, testing, monitoring and releasing software
            - listitem [ref=e65]: Deep expertise in statistical modeling and causal inference (e.g., uplift modeling, treatment effect estimation, synthetic controls, instrumental variables)
            - listitem [ref=e66]: Experience designing and deploying optimization algorithms (e.g., multi-objective optimization, bandits, constrained optimization)
            - listitem [ref=e67]: Proficiency in Python and ML tooling such as PyTorch, Spark, and MLflow
            - listitem [ref=e68]: A strong product sense and ability to translate business objectives into technical solutions
            - listitem [ref=e69]: M.S. or Ph.D. in a quantitative field (e.g., Computer Science, Statistics, Operations Research, Economics, Mathematics)
            - listitem [ref=e70]: Excellent communication skills and a track record of cross-functional leadership
