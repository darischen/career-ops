            - heading "About Zip" [level=1] [ref=e35]:
              - strong [ref=e36]: About Zip
            - paragraph [ref=e37]
            - paragraph [ref=e38]:
              - text: Zip is the AI platform for enterprise procurement — built for humans and agents working together. By orchestrating procurement across teams, tools, and suppliers with the help of AI agents, companies can secure the resources they need to innovate faster than ever before.
              - text: The world’s most influential enterprises trust Zip, including T-Mobile, OpenAI, AMD, Mars, Dollar Tree, and more. Together they’ve saved over $8 billion and processed over $500 billion in spend. Zip’s team includes product leaders from Apple, Airbnb, and Meta, as well as former procurement leaders from United Health, Sanofi, MGM Resorts, Discover, and NASA.
              - text: Backed by Adams Street, Alkeon, BOND, CRV, DST, Tiger Global, and Y Combinator, Zip has raised $371 million, most recently at a $2.2 billion valuation and has been recognized by Forbes Fintech 50, Fast Company's Most Innovative Companies, Inc. Best in Business, and LinkedIn Top Startups.
            - paragraph [ref=e39]
            - heading "Your Role" [level=2] [ref=e40]:
              - strong [ref=e41]: Your Role
            - paragraph [ref=e42]: As a Software Engineer Intern, you will be shown how to build Zip’s core products and architecture. You will ship features that will be immediately used by our users and will work with a tight-knit team that values open communication and cross-functional collaboration. We move quickly to solve a wide range of complex technical and product challenges. While we are an experienced team that can provide constant guidance and mentorship, we value engineers who can scope and solve difficult technical challenges.
            - paragraph [ref=e43]: "Previous interns have worked on:"
            - list [ref=e44]:
              - listitem [ref=e45]:
                - paragraph [ref=e46]: "Internal AI bot: a bot that uses generative AI to aggregate info from various sources (e.g. google doc, notion, Slack, Zip help site) and generate answers - it’s now actively used by both engineering and customer teams at Zip"
              - listitem [ref=e47]:
                - paragraph [ref=e48]: "Devbox: building a prototype that bootstraps the development environment in AWS cloud for all zip engineers - this project is now being used by 80+ engineers"
              - listitem [ref=e49]:
                - paragraph [ref=e50]: "Virtual Card Auto Lock: a feature that automatically locks virtual cards based on various policies, such as after a certain expiration date, when reported lost, or in the event of an overdraft. This feature, along with a self-serve onboarding tool, is now live in our virtual card product"
            - paragraph [ref=e51]
            - heading "You Will" [level=2] [ref=e52]:
              - strong [ref=e53]: You Will
            - list [ref=e54]:
              - listitem [ref=e55]:
                - paragraph [ref=e56]: Design and build highly reliable and resilient products and features
              - listitem [ref=e57]:
                - paragraph [ref=e58]: Work closely with cross-functional product and customer-facing teams to understand requirements and ship thoughtful solutions
              - listitem [ref=e59]:
                - paragraph [ref=e60]: Write high-quality, extensible, and maintainable code
              - listitem [ref=e61]:
                - paragraph [ref=e62]: Design and build scalable frontend applications and components
              - listitem [ref=e63]:
                - paragraph [ref=e64]: Design and build APIs to drive existing and new features for a web-based application
