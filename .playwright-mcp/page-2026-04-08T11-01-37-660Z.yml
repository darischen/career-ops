          - generic [ref=e17]:
            - paragraph [ref=e18]:
              - strong [ref=e19]: Who is Tenable?
            - paragraph [ref=e20]: Tenable® is the Exposure Management company. 44,000 organizations around the globe rely on Tenable to understand and reduce cyber risk. Our global employees support 65 percent of the Fortune 500, 45 percent of the Global 2000, and large government agencies. Come be part of our journey!
            - paragraph [ref=e21]:
              - strong [ref=e22]: What makes Tenable such a great place to work?
            - paragraph [ref=e23]: "Ask a member of our team and they’ll answer, “Our people!” We work together to build and innovate best-in-class cybersecurity solutions for our customers; all while creating a culture of belonging, respect, and excellence where we can be our best selves. When you’re part of our #OneTenable team, you can expect to partner with some of the most talented and passionate people in the industry, and have the support and resources you need to do work that truly matters. We deliver results that exceed expectations and we win together!"
          - generic [ref=e24]:
            - generic [ref=e26]:
              - generic [ref=e27]:
                - paragraph [ref=e28]: "Your Role:"
                - paragraph [ref=e29]:
                  - text: Tenable OT Security was established through the acquisition of a pioneering Israeli cybersecurity startup, marking a major milestone in Tenable’s mission to
                  - text: provide proactive security for the world's most sensitive environments. Our solution offers critical visibility and risk management for Industrial Control Systems (ICS/SCADA), protecting essential infrastructures such as power plants, manufacturing floors, and smart buildings. While traditionally an on-premises solution designed to ensure operational continuity and prevent costly downtime, we are now evolving our technology to deliver market-leading risk visibility through advanced architectures and AI-driven capabilities. By combining deep on-premises expertise with proactive AI insights, we empower organizations to identify threats and network anomalies before any damage occurs.
                  - generic [ref=e30]: "Your Opportunity:"
                - list [ref=e31]:
                  - listitem [ref=e32]: "Operates as a Product Solutions Engineer with a dual-expert skillset: deep L2-L7 networking knowledge and the ability to read, write, and debug production code"
                  - listitem [ref=e33]: Serve as the primary technical bridge between the Product team and strategic customers, focusing 75% on customer-facing engineering initiatives
                  - listitem [ref=e34]: Diagnose and resolve system issues using scripting, hot-patching, or by implementing long-term solutions within the system code
                  - listitem [ref=e35]: Act as a liaison between Clients, Support, Sales, and R&D to translate complex customer requirements into engineering specifications
                  - listitem [ref=e36]: Engineer solutions for unique deployment challenges and integration gaps by developing 3rd party integrations or custom scripts
                  - listitem [ref=e37]: Leverage expert networking knowledge to troubleshoot complex connectivity issues
                  - listitem [ref=e38]: Advocate for product features and quality improvements based on field feedback
              - generic [ref=e39]:
                - paragraph [ref=e40]:
                  - generic [ref=e41]: "What You'll Need:"
                - list [ref=e42]:
                  - listitem [ref=e43]: 4+ years of technical experience in L2-L7 networking and IT infrastructure, combined with a solid R&D background
                  - listitem [ref=e44]: Proficiency in reading, writing, and debugging code (Go, Python, Bash, etc.) to "hot patch" issues or build integration glue-code
                  - listitem [ref=e45]: 2+ years of experience in a customer-facing technical role (e.g., Solutions Architect, TAM, Field Engineer) handling enterprise accounts
                  - listitem [ref=e46]: Exceptional communication skills with the ability to de-escalate critical situations
                  - listitem [ref=e47]: Ability to travel occasionally (up to 20%)
                  - listitem [ref=e48]: Bachelor’s degree in Computer Science, Software Engineering, or a related field
                  - listitem [ref=e49]: Full professional proficiency in English
                - paragraph [ref=e50]:
                  - generic [ref=e51]: "And Ideally:"
                - list [ref=e52]:
                  - listitem [ref=e53]: Familiarity with industrial environments (OT) or specialized hardware
                  - listitem [ref=e54]: Cybersecurity domain expertise with a focus on network-level anomalies
                  - listitem [ref=e55]: Experience facilitating customer onboarding transitions from Sales to Support
