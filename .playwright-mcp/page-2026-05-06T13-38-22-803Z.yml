            - paragraph [ref=e132]
            - paragraph [ref=e133]: About Us
            - paragraph [ref=e134]: Innovation is in HP’s DNA. From our origins in a Palo Alto garage in 1939, to our current position as one of the world’s leading technology companies, HP has grown to become a leader in technology and corporate culture, inspiring innovators, and entrepreneurs around the globe.
            - paragraph [ref=e135]
            - paragraph [ref=e136]: "HP brings together a portfolio that spans printing, personal computing, software and services to serve more than 1 billion customers in over 170 countries. We are committed to fostering a diverse and inclusive workplace that attracts exceptional talent and to supporting our employees to succeed at all levels. We dream in over 35 languages and share one mission: to engineer experiences that amaze."
            - paragraph [ref=e137]
            - paragraph [ref=e138]: "The Program:"
            - paragraph [ref=e139]: Our future success depends on the innovation and fresh ideas you bring to HP, Inc. We are hiring students and new graduates with a diverse set of skills and experiences to join us, across the different organizations that make us HP, Inc. Our new grad program is intended to help you learn and grow at HP, give you an opportunity to make an impact, and work with leading edge technology. At HP, you’ll use advanced tools and technology to tackle complex challenges that make a real impact on people’s lives.
            - paragraph [ref=e140]
            - paragraph [ref=e141]: "The Team:"
            - paragraph [ref=e142]: At HP, we believe in the power of ideas. And we believe that ideas thrive best in a culture of teamwork. That is why everyone, in every function, is encouraged to develop, express and share their creativity to deliver better outcomes for our customers. HP’s printing technology is the foundation for products as diverse as Inkjet printers and custom orthotics. We continually innovate and evolve our technology to deliver better printing experiences for our customers. Our printing solutions are designed with award-winning reliability, globally renowned quality, constant innovation, and business recognized trust. We have our best portfolio ever and are eager to proactively get the word out to key audiences on our expanding services and solutions.
