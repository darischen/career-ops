            - heading "Sofar's Commitment to Climate Justice" [level=3] [ref=e78]:
              - strong [ref=e79]: Sofar's Commitment to Climate Justice
            - paragraph [ref=e80]: We at Sofar Ocean acknowledge that careers in the marine sciences “... have traditionally been, and remain, non-diverse work environments”, thereby limiting the entry and prosperity of underrepresented groups in the space. (Johri et al., 2021) Many of these same groups are disproportionately affected by climate change, and are often excluded from decision-making that directly address their interests and needs.
            - paragraph [ref=e81]: We are committed to addressing these climate injustices and highly encourage people who identify as women, LGBTQ+, Black, Indigenous, and people of color (BIPOC) to apply.
