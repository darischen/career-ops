          - generic [ref=e37]:
            - heading "The Role:" [level=3] [ref=e38]:
              - strong [ref=e39]: "The Role:"
            - paragraph [ref=e40]: We are looking for a product-driven software engineer to join our team as we scale our groundbreaking Wayfinder weather routing service for the maritime transport industry. This is a great opportunity for someone early in their career who is eager to learn, grow and make a real impact. In this position you will help design, develop, and maintain services in the Wayfinder Optimization Engine – an optimal ship-routing tool that combines weather data with ship performance models and user-specified constraints to find the most efficient routes across the worlds' oceans, saving fuel, emissions and reducing risk.
            - paragraph [ref=e41]: You’ll develop a deep understanding of our customers, their workflows, and critical data they need to operate. You will collaborate with a top-notch team of engineers, ocean scientists and product designers to translate these unique user needs into high quality software that helps users and saves carbon. You’ll spend a lot of time making internal workflows more efficient, improving core algorithms to drive top-line optimization metrics, and rolling out new features which delight our clients.
            - paragraph [ref=e42]: You’ll be primarily be working on our routing optimization system, which is written in Rust with some elements in Python. You should be comfortable working with both high- and low-level languages. You will be collaborating with engineers to deliver end-to-end features to users.
            - heading "About You:" [level=3] [ref=e43]:
              - strong [ref=e44]: "About You:"
            - list [ref=e45]:
              - listitem [ref=e46]:
                - paragraph [ref=e47]: Deeply committed to building a product with a positive impact on the world
              - listitem [ref=e48]:
                - paragraph [ref=e49]: Passionate about the craft of software engineering. Loves making beautiful, functional interfaces for humans and maintainable, extendable interfaces for systems.
              - listitem [ref=e50]:
                - paragraph [ref=e51]: Curious and experimental in the face of rapid tech change like LLM’s
              - listitem [ref=e52]:
                - paragraph [ref=e53]: Enthusiastically leverages agentic programming techniques
              - listitem [ref=e54]:
                - paragraph [ref=e55]: Exposure to Rust, C++, C,or othercompiled, non-garbage-collected language
              - listitem [ref=e56]:
                - paragraph [ref=e57]: Clear communicator who enjoys collaborating with other engineers, designers, PMs, and scientists
              - listitem [ref=e58]:
                - paragraph [ref=e59]: Can rapidly acquire new technical skills and knowledge in a fast-paced, high-delivery environment
              - listitem [ref=e60]:
                - paragraph [ref=e61]: Excited to be be a part of a small but growing startup team
              - listitem [ref=e62]:
                - paragraph [ref=e63]: Understands the realities of startup life and is energized by the pace, ambiguity, and hands-on nature of a small but growing team.
            - paragraph [ref=e64]:
