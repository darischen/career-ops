            - listitem [ref=e34]: Conduct advanced research in perception algorithms to address complex, real-world scenarios, focusing on areas like object detection, segmentation, road understanding, and motion prediction.
            - listitem [ref=e35]: Leverage multi-modal sensor fusion techniques to build robust architectures tailored for autonomous driving.
