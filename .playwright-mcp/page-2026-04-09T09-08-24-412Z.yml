            - listitem [ref=e28]: "Team Introduction:"
          - generic [ref=e29]: "The Perception team is responsible for developing CV/ML algorithms to understand the surroundings of ego vehicles in real time , including obstacle detection, online mapping, and scene understanding. The perception system takes inputs from multiple sensors across time, and outputs various obstacle-level and scene-level understandings for downstream modules such as prediction and planning, etc. In the Perception team, you will:"
