          - generic [ref=e33]:
            - paragraph [ref=e34]:
              - strong [ref=e36]: About the role
            - paragraph [ref=e37]: You will join one of the talented product development teams to work on feature development, with a primary focus on the company's business growth, on projects such as the evolution of the company's plans and pricing strategy, the trial experience, the payment experience, or the onboarding experience of our customers. As a team member within the organization, you will collaborate closely with the product manager, product designer, engineering manager, and front-end engineers within the team. You will play a pivoting role in innovating the ways the team could deliver value to impact the company's trajectory, both in the short-term and long-term.
            - paragraph [ref=e38]
            - paragraph [ref=e39]:
              - strong [ref=e40]: "Location-Specific Information:"
            - paragraph [ref=e41]: "You will be based in Lisbon, with English as your working language. At Dashlane, we embrace a hybrid culture that combines the best of both worlds: the creativity and energy of in-person collaboration with the flexibility of remote work. Our model is designed to strengthen team connections while supporting individual productivity and work-life balance. To maximize collaboration, we come together in the office on Mondays, Tuesdays, and Thursdays, while Wednesdays and Fridays offer more flexibility for focused work."
            - paragraph [ref=e42]
            - paragraph [ref=e43]:
              - strong [ref=e45]: "About our stack:"
            - list [ref=e46]:
              - listitem [ref=e47]:
                - text: "Programming language:"
                - list [ref=e48]:
                  - listitem [ref=e49]: "Backend (85% of codebase): NodeJS, Typescript"
                  - listitem [ref=e50]: "Frontend / internal tooling (15% of codebase): React, Typescript"
              - listitem [ref=e51]: "Infrastructure and storage layer: AWS EC2, Amazon ECS, MySQL on RDS, Redis, S3"
              - listitem [ref=e52]: "CI/CD: Sonarqube, Gitlab, Terraform, Ansible"
              - listitem [ref=e53]: "Logging and monitoring: ELK (Elasticsearch, Logstash, Kibana)"
              - listitem [ref=e54]: "Documentation and tooling: Confluence, Jira, Zoom, Slack"
            - paragraph [ref=e55]
            - paragraph [ref=e56]:
              - strong [ref=e58]: "At Dashlane you will:"
            - list [ref=e59]:
              - listitem [ref=e60]: Innovate! As an engineering member, you'll work closely with the teams to discover creative solutions that drive the company's expansion. Your efforts will not only enhance the trial and payment experience for our customers but also enable us to significantly increase and broaden the reach of our application.
              - listitem [ref=e61]: Pair with other engineers, work with product managers, project managers, and also our quality engineering teams in a highly collaborative environment where everyone shares ownership of the company's success
              - listitem [ref=e62]: Learn every day, and share your knowledge with your co-workers.
              - listitem [ref=e63]: Participate in and propose cross-team initiatives for improving the happiness and efficiency of your fellow Dashlaners.
            - paragraph [ref=e64]
            - paragraph [ref=e65]:
              - strong [ref=e67]: "Requirements:"
            - list [ref=e68]:
              - listitem [ref=e69]: 4+ years of experience in software development
              - listitem [ref=e70]: 3+ years of experience in developing backend applications, used by a reasonable amount of users
              - listitem [ref=e71]: 2+ years of experience working in a product-focused company
              - listitem [ref=e72]: Ability to work collaboratively in a team
              - listitem [ref=e73]: Willingness to learn and assist in the design and implementation of backend solutions
              - listitem [ref=e74]: Fluent in English
            - paragraph [ref=e75]:
              - strong [ref=e77]: "We're Also Looking For:"
            - list [ref=e78]:
              - listitem [ref=e79]: Have prior knowledge on payments, user management system or business growth
              - listitem [ref=e80]: Willing to develop a T-shaped skillset
              - listitem [ref=e81]: Have prior knowledge of AWS
              - listitem [ref=e82]: Know how to code, but also to deploy, test, and monitor cloud applications
              - listitem [ref=e83]: Enjoy writing clean code that is easy to maintain and understand
              - listitem [ref=e84]: Ability to actively use AI tools to drive efficiency, creativity and impact in the engineering scope
            - strong [ref=e87]: "What Dashlane offers you:"
            - list [ref=e88]:
              - listitem [ref=e89]: Flex Benefits - allocate a monthly amount to a pool of benefits
              - listitem [ref=e90]: Health insurance covered by Dashlane
              - listitem [ref=e91]: 5 extra vacation days each year, plus your birthday off
              - listitem [ref=e92]: Company wide well-being days (one per quarter)
              - listitem [ref=e93]: Equal Parental leave - up to 20 weeks fully paid leave, within the first year of birth or adoption
              - listitem [ref=e94]: Work schedule exemption - plan your work schedule in alignment with your manager
              - listitem [ref=e95]: Donation matching program - Dashlane will match your donations to organizations driving positive impact in historically marginalized communities
              - listitem [ref=e96]: Access mental health services through Spring Health, available for you and your family members
              - listitem [ref=e97]: Team building & social events - weekly lunch in the office and monthly happy hour
              - listitem [ref=e98]: and much more
            - paragraph [ref=e99]
