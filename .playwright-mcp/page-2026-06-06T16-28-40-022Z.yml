          - generic [ref=e41]:
            - heading "About the Company" [level=2] [ref=e42]:
              - strong [ref=e43]: About the Company
            - paragraph [ref=e44]:
              - text: Valon is building the AI-native operating system for regulated finance, starting with mortgage servicing.
              - text: We're a Series C company backed by a16z, transforming industries that others have written off as too complex to innovate.
              - text: "Rather than build on top of broken legacy systems, we took a different approach: we built and operate our own mortgage servicing business managing $110+ billion in loans. This wasn't the end goal, it was how we deeply understood the complexity needed to build software that actually works in regulated industries."
              - text: The results speak for themselves. We've transformed mortgage servicing from a 0% margin business into 60%+ margins while dramatically improving customer experience. Major enterprise contracts are now deploying across the industry.
              - text: ValonOS is our unified platform that makes every process structured and programmable and it is perfectly positioned for the AI era. When everything flows through one system with rich data, AI agents don't just automate tasks, they continuously improve entire operations. Mortgage servicing is just the beginning of our vision to transform regulated industries and beyond.
            - paragraph [ref=e45]
            - heading "Engineering at Valon" [level=2] [ref=e46]:
              - strong [ref=e47]: Engineering at Valon
            - paragraph [ref=e48]: Our engineering team is here to power the software ecosystem to disrupt one of the most outdated and regulated spaces in the financial sector - the mortgage industry. We’ve built out the foundation of a modern mortgage servicing platform that can accurately handle billions of dollars at scale, but we’re just getting started. At Valon, we want you to do the best work of your life. You'll be surrounded by a tight-knit community of exceptional people from places like Stripe, Jane Street, Meta, and Google who care deeply about their work and each other. Our problem space is complex, but you’ll get a lot of autonomy so that you can learn quickly, execute effectively, and deliver the highest level of business impact. Our tech stack is built on Python, React, Docker, Kubernetes, and Google Cloud Platform.
            - paragraph [ref=e49]
            - paragraph [ref=e50]: Our headquarters are in New York City, and this year, we’re excited to open a new office in San Francisco. Plus, we fully support remote work!
            - paragraph [ref=e51]
            - heading "Responsibilities" [level=2] [ref=e52]:
              - strong [ref=e53]: Responsibilities
            - list [ref=e54]:
              - listitem [ref=e55]:
                - paragraph [ref=e56]: Responsible for learning new concepts and technologies quickly and apply them to challenging problems.
              - listitem [ref=e57]:
                - paragraph [ref=e58]: Designing and building robust and extensible infrastructure to handle evolving and complex federal, state, and agency regulations.
              - listitem [ref=e59]:
                - paragraph [ref=e60]: Dive deep to understand the inner workings of a highly complex industry.
              - listitem [ref=e61]:
                - paragraph [ref=e62]: Work with Product and Design to define the best experience for our customers.
            - paragraph [ref=e63]
            - heading "Ideal Background" [level=2] [ref=e64]:
              - strong [ref=e65]: Ideal Background
            - list [ref=e66]:
              - listitem [ref=e67]:
                - paragraph [ref=e68]: Bachelor’s degree in Computer Science or related field.
              - listitem [ref=e69]:
                - paragraph [ref=e70]: Requires 1 year of software engineering experience building quality software applications at scale, including ability to work cross-functionally to balance product and technical requirements, building scalable systems from scratch with a fast turnaround.
              - listitem [ref=e71]:
                - paragraph [ref=e72]: "Experience with one of the following: web application development, mobile application development, building large-scale distributed systems, or infrastructure management."
              - listitem [ref=e73]:
                - paragraph [ref=e74]: Must have legal authority to work in the U.S. EEOE.
            - paragraph [ref=e75]
            - heading "Benefits" [level=2] [ref=e76]:
              - strong [ref=e77]: Benefits
            - list [ref=e78]:
              - listitem [ref=e79]:
                - paragraph [ref=e80]: "Compensation: competitive salary with a meaningful stake in the company via equity, and 401k plan. NB: The base salary range reflects multiple levels. We assess level based on a combination of past experience and interview performance"
              - listitem [ref=e81]:
                - paragraph [ref=e82]: "Health & well-being: we’ll invest in your physical and mental well-being with comprehensive medical, dental, & vision benefits"
              - listitem [ref=e83]:
                - paragraph [ref=e84]: "Commuter benefits: We offer pre-tax deductions for public transportation, rideshare services, and parking expenses to make your commute more affordable and convenient"
              - listitem [ref=e85]:
                - paragraph [ref=e86]: "Grow together: Company wide orientation for you to successfully onboard and other learning & development opportunities including regular review cycles that feature 360 degree feedback"
              - listitem [ref=e87]:
                - paragraph [ref=e88]: "Play together: quarterly budgets for team and company outings. Use it for team swag, cooking classes, or team dinners!"
              - listitem [ref=e89]:
                - paragraph [ref=e90]: "Generous time off: flexible paid time off, sick days, and 11 company holidays"
              - listitem [ref=e91]:
                - paragraph [ref=e92]: "Baby bonding time!: 12 weeks off for both birthing and non-birthing parents - fully paid so you can focus your energy on your newest addition"
            - paragraph [ref=e93]
            - paragraph [ref=e94]:
              - emphasis [ref=e95]: Throughout the interview process, please remember that emails will only be from
              - link "valon.com" [ref=e96] [cursor=pointer]:
