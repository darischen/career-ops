              - generic [ref=e40]:
                - paragraph [ref=e41]: CyberArk is seeking a Software Engineer to join the NGTS (Next Generation Trust Services) team, focused on building and scaling platform services that power machine identity and certificate lifecycle management.
                - paragraph [ref=e42]: As organizations increasingly adopt AI-driven systems and autonomous services, secure machine identity and trusted service-to-service communication are becoming foundational to modern cloud infrastructure.
                - paragraph [ref=e43]: This is an early-career role designed for engineers who want to grow in backend and platform development, working on distributed systems, APIs, and cloud-based services at scale. You’ll collaborate closely with experienced engineers to build reliable systems that operate across complex environments.
                - paragraph [ref=e44]:
                  - strong [ref=e45]: What You’ll Do
                - list [ref=e46]:
                  - listitem [ref=e47]: Build and enhance backend services that support machine identity and certificate lifecycle workflows
                  - listitem [ref=e48]: Contribute to the development of APIs and service components used across the platform
                  - listitem [ref=e49]: Work with senior engineers to design, implement, and test scalable distributed systems
                  - listitem [ref=e50]: Debug and troubleshoot issues across services, APIs, and system components
                  - listitem [ref=e51]: Write unit and integration tests to improve system reliability and quality
                  - listitem [ref=e52]: Participate in code reviews and team design discussions
                  - listitem [ref=e53]: Collaborate with engineers, product managers, and other teams to deliver features end-to-end
                  - listitem [ref=e54]: Learn and apply best practices in performance, reliability, and system design
                - list
