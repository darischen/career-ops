              - generic [ref=e331]:
                - generic [ref=e332]:
                  - generic [ref=e333]: Form CC-305
                  - generic [ref=e334]: Page 1 of 1
                - generic [ref=e335]:
                  - generic [ref=e336]: OMB Control Number 1250-0005
                  - generic [ref=e337]: Expires 04/30/2026
              - strong [ref=e338]: Why are you being asked to complete this form?
              - paragraph [ref=e339]: We are a federal contractor or subcontractor. The law requires us to provide equal employment opportunity to qualified people with disabilities. We have a goal of having at least 7% of our workers as people with disabilities. The law says we must measure our progress towards this goal. To do this, we must ask applicants and employees if they have a disability or have ever had one. People can become disabled, so we need to ask this question at least every five years.
              - paragraph [ref=e340]:
                - text: Completing this form is voluntary, and we hope that you will choose to do so. Your answer is confidential. No one who makes hiring decisions will see it. Your decision to complete the form and your answer will not harm you in any way. If you want to learn more about the law or this form, visit the U.S. Department of Labor’s Office of Federal Contract Compliance Programs (OFCCP) website at
                - link "www.dol.gov/ofccp" [ref=e341] [cursor=pointer]:
                  - /url: https://www.dol.gov/ofccp
                - text: .
              - strong [ref=e342]: How do you know if you have a disability?
              - paragraph [ref=e343]:
                - text: A disability is a condition that substantially limits one or more of your “major life activities.” If you have or have ever had such a condition, you are a person with a disability.
                - strong [ref=e344]: "Disabilities include, but are not limited to:"
              - list [ref=e345]:
                - listitem [ref=e346]: Alcohol or other substance use disorder (not currently using drugs illegally)
                - listitem [ref=e347]: Autoimmune disorder, for example, lupus, fibromyalgia, rheumatoid arthritis, HIV/AIDS
                - listitem [ref=e348]: Blind or low vision
                - listitem [ref=e349]: Cancer (past or present)
                - listitem [ref=e350]: Cardiovascular or heart disease
                - listitem [ref=e351]: Celiac disease
                - listitem [ref=e352]: Cerebral palsy
                - listitem [ref=e353]: Deaf or serious difficulty hearing
                - listitem [ref=e354]: Diabetes
                - listitem [ref=e355]: Disfigurement, for example, disfigurement caused by burns, wounds, accidents, or congenital disorders
                - listitem [ref=e356]: Epilepsy or other seizure disorder
                - listitem [ref=e357]: Gastrointestinal disorders, for example, Crohn's Disease, irritable bowel syndrome
                - listitem [ref=e358]: Intellectual or developmental disability
                - listitem [ref=e359]: Mental health conditions, for example, depression, bipolar disorder, anxiety disorder, schizophrenia, PTSD
                - listitem [ref=e360]: Missing limbs or partially missing limbs
                - listitem [ref=e361]: Mobility impairment, benefiting from the use of a wheelchair, scooter, walker, leg brace(s) and/or other supports
                - listitem [ref=e362]: Nervous system condition, for example, migraine headaches, Parkinson’s disease, multiple sclerosis (MS)
                - listitem [ref=e363]: Neurodivergence, for example, attention-deficit/hyperactivity disorder (ADHD), autism spectrum disorder, dyslexia, dyspraxia, other learning disabilities
                - listitem [ref=e364]: Partial or complete paralysis (any cause)
                - listitem [ref=e365]: Pulmonary or respiratory conditions, for example, tuberculosis, asthma, emphysema
                - listitem [ref=e366]: Short stature (dwarfism)
                - listitem [ref=e367]: Traumatic brain injury
