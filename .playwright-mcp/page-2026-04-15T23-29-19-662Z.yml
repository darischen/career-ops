        - generic [ref=e17]:
          - generic [ref=e18]:
            - paragraph [ref=e19]:
              - strong [ref=e20]: About Scale
            - paragraph [ref=e21]: "At Scale AI, our mission is to accelerate the development of AI applications. For 8 years, Scale has been the leading AI data foundry, helping fuel the most exciting advancements in AI, including: generative AI, defense applications, and autonomous vehicles. With our recent Series F round, we’re accelerating the abundance of frontier data to pave the road to Artificial General Intelligence (AGI), and building upon our prior model evaluation work with enterprise customers and governments, to deepen our capabilities and offerings for both public and private evaluations."
            - paragraph [ref=e22]:
              - strong [ref=e23]: About Data Engine
            - paragraph [ref=e24]: Our Generative AI Data Engine powers the world’s most advanced LLMs and generative models through world-class RLHF (Reinforcement Learning with Human Feedback), human data generation, model evaluation, safety, and alignment. The data we are producing is some of the most important work for how humanity will interact with AI.
            - paragraph [ref=e25]:
              - strong [ref=e26]: Our Approach
            - paragraph [ref=e27]: As part of the interview process, you’ll be considered for opportunities across several teams within the GenAI Engineering organization, based on your interests, expertise, and business needs. Potential team placements include Allocation, Growth, Frontier Data, Trust & Safety, Pay, Operator, or Tasking Experience. Together, these teams power Scale’s AI data operations - from building high-impact datasets that push the boundaries of LLM capabilities, to optimizing contributor onboarding and incentives, to safeguarding data integrity through advanced trust, safety, and security measures. They work at the intersection of ML, operations, and analytics to ensure we deliver the highest-quality data at scale.
            - heading "Responsibilities:" [level=3] [ref=e28]:
              - strong [ref=e29]: "Responsibilities:"
            - list [ref=e30]:
              - listitem [ref=e31]: Design and implement features end-to-end across front-end, back-end, and infrastructure
              - listitem [ref=e32]: Build features end-to-end using technologies like TypeScript, MongoDB, and Elasticsearch, and contribute to our compute orchestration layer powered by Temporal
              - listitem [ref=e33]: Own high-impact technical systems that are critical to Scale’s revenue delivery
              - listitem [ref=e34]: Build and iterate on complex systems that scale to millions of tasks per week
              - listitem [ref=e35]: Collaborate with model teams, Forward Deployed Engineers, and cross-functional stakeholders
              - listitem [ref=e36]: Help shape the engineering culture, values, and best practices of a fast-growing team
            - heading "Requirements:" [level=3] [ref=e37]:
              - strong [ref=e38]: "Requirements:"
            - list [ref=e39]:
              - listitem [ref=e40]: 3+ years of relevant software engineering experience
              - listitem [ref=e41]: Track record of building and shipping products at scale
              - listitem [ref=e42]: Ability to thrive in a fast-paced, high-ownership environment
              - listitem [ref=e43]: Strong product intuition and problem-solving skills
              - listitem [ref=e44]: "Experience across the stack: React, Typescript, Node, Python, etc."
              - listitem [ref=e45]: Excited to join a hybrid team based in San Francisco or New York City
            - paragraph [ref=e46]
          - generic [ref=e48]:
            - paragraph [ref=e52]:
              - emphasis [ref=e53]: "Compensation packages at Scale for eligible roles include base salary, equity, and benefits. The range displayed on each job posting reflects the minimum and maximum target for new hire salaries for the position, determined by work location and additional factors, including job-related skills, experience, interview performance, and relevant education or training. Scale employees in eligible roles are also granted equity based compensation, subject to Board of Director approval. Your recruiter can share more about the specific salary range for your preferred location during the hiring process, and confirm whether the hired role will be eligible for equity grant. You’ll also receive benefits including, but not limited to: Comprehensive health, dental and vision coverage, retirement benefits, a learning and development stipend, and generous PTO. Additionally, this role may be eligible for additional benefits such as a commuter stipend."
            - paragraph [ref=e54]: "Please reference the job posting's subtitle for where this position will be located. For pay transparency purposes, the base salary range for this full-time position in the locations of San Francisco, New York, Seattle is:"
            - paragraph [ref=e55]: $180,000 - $225,000 USD
          - generic [ref=e56]:
            - paragraph [ref=e57]:
              - strong [ref=e58]:
                - emphasis [ref=e59]: "PLEASE NOTE:"
              - emphasis [ref=e60]: Our policy requires a 90-day waiting period before reconsidering candidates for the same role. This allows us to ensure a fair and thorough evaluation of all applicants.
            - paragraph [ref=e61]:
              - strong [ref=e62]: "About Us:"
            - paragraph [ref=e63]:
              - emphasis [ref=e64]: At Scale, our mission is to develop reliable AI systems for the world's most important decisions. Our products provide the high-quality data and full-stack technologies that power the world's leading models, and help enterprises and governments build, deploy, and oversee AI applications that deliver real impact. We work closely with industry leaders like Meta, Cisco, DLA Piper, Mayo Clinic, Time Inc., the Government of Qatar, and U.S. government agencies including the Army and Air Force. We are expanding our team to accelerate the development of AI applications.
            - paragraph [ref=e65]:
              - emphasis [ref=e66]: We believe that everyone should be able to bring their whole selves to work, which is why we are proud to be an inclusive and equal opportunity workplace. We are committed to equal employment opportunity regardless of race, color, ancestry, religion, sex, national origin, sexual orientation, age, citizenship, marital status, disability status, gender identity or Veteran status.
            - paragraph [ref=e67]:
              - emphasis [ref=e68]: We are committed to working with and providing reasonable accommodations to applicants with physical and mental disabilities. If you need assistance and/or a reasonable accommodation in the application or recruiting process due to a disability, please contact us at accommodations@scale.com. Please see the United States Department of Labor's
              - link "Know Your Rights poster" [ref=e69] [cursor=pointer]:
                - /url: https://www.eeoc.gov/sites/default/files/2023-06/22-088_EEOC_KnowYourRights6.12ScreenRdr.pdf
                - emphasis [ref=e70]: Know Your Rights poster
              - emphasis [ref=e71]: for additional information.
            - paragraph [ref=e72]:
              - emphasis [ref=e73]: We comply with the United States Department of Labor's
              - emphasis [ref=e74]: Pay Transparency provision
              - emphasis [ref=e75]: .
            - paragraph [ref=e76]:
              - emphasis [ref=e77]:
                - strong [ref=e78]: "PLEASE NOTE:"
                - text: We collect, retain and use personal data for our professional business purposes, including notifying you of job opportunities that may be of interest and sharing with our affiliates. We limit the personal data we collect to that which we believe is appropriate and necessary to manage applicants’ needs, provide our services, and comply with applicable laws. Any information we collect in connection with your application will be treated in accordance with our internal policies and programs designed to protect personal data. Please see our
                - link "privacy policy" [ref=e79] [cursor=pointer]:
                  - /url: https://scale.com/legal/privacy
                - text: for additional information.
