        - generic [ref=e24]:
          - generic [ref=e25]:
            - paragraph [ref=e26]: THE COMPANY
            - paragraph [ref=e27]:
              - strong [ref=e28]: Silvus Technologies
              - text: ", a leading provider of advanced MANET and MIMO communications systems, is reshaping mesh network technology for mission-critical applications – on the ground, in the air and at sea. Its battle-proven StreamCaster family of MANET radios and proprietary MN-MIMO waveform provides the vital communications link for defense, law enforcement and public safety agencies around the world, and in the toughest operational environments."
            - paragraph [ref=e29]: With deep roots in DARPA research, Silvus Technologies develops world-class advanced communications technologies that are reshaping the tactical communications landscape. From pure line-of-sight to extreme non-line-of-sight, Silvus radios form a self-healing, self-forming mesh network, enabling secure and reliable connectivity, including video and high-bandwidth data.
            - paragraph [ref=e30]: Silvus Technologies is a wholly owned subsidiary of Motorola Solutions, Inc.
            - paragraph [ref=e31]:
              - emphasis [ref=e32]: Would you like to join an incredibly talented group of people, doing very challenging work, with the prime directive of “
              - strong [ref=e33]:
                - link "Keeping Our Heroes Connected" [ref=e35] [cursor=pointer]:
                  - /url: https://www.youtube.com/watch?v=VCJ-amP0GLc
                  - emphasis [ref=e36]: Keeping Our Heroes Connected
              - emphasis [ref=e37]: ”?
          - generic [ref=e38]:
            - paragraph [ref=e39]: THE OPPORTUNITY
            - paragraph [ref=e40]:
              - text: Silvus is seeking a
              - strong [ref=e41]:
                - emphasis [ref=e42]: Machine Learning Engineer
              - strong [ref=e43]:
                - emphasis [ref=e44]
              - text: who will report to the
              - emphasis [ref=e45]: R&D Director, Machine Learning
              - text: on the R&D team. The successful individual in this role will focus on applying machine learning and data-driven techniques to improve the performance, efficiency, and adaptability of Silvus’ advanced MIMO radios and wireless networking systems. This individual will work closely with experts in wireless communications, DSP, networking, and embedded systems to develop ML-driven features that solve real-world problems in dynamic and challenging RF environments.
            - paragraph [ref=e46]:
              - text: This
              - emphasis [ref=e47]
              - text: position is based at Silvus Technologies’ headquarters in the heart of vibrant
              - strong [ref=e48]: West Los Angeles, CA,
              - text: and is on a hybrid schedule. A minimum of 3 days onsite per week is expected. On-site days are Mondays, Wednesdays, and Thursdays.
            - paragraph [ref=e49]: The following is a list of at least some of the current essential job functions of the position. Management may assign or reassign duties and responsibilities at any time at its discretion.
            - paragraph [ref=e50]:
              - emphasis [ref=e51]
              - text: ROLE AND RESPONSIBILITIES
            - list [ref=e52]:
              - listitem [ref=e53]: Research, design, and implement machine learning algorithms to enhance performance in wireless communication systems (e.g., link adaptation, interference mitigation, anomaly detection, spectrum sensing).
              - listitem [ref=e54]: Analyze real-world RF datasets to extract insights and develop predictive models.
              - listitem [ref=e55]: Develop software prototypes and integrate ML algorithms with Silvus’ radio firmware and networking stack.
              - listitem [ref=e56]: Collaborate with cross-functional teams to define ML use cases and evaluate the impact of deployed models.
              - listitem [ref=e57]: Contribute to the design of data pipelines and infrastructure for training, testing, and validating models.
              - listitem [ref=e58]: Participate in performance benchmarking and iterative improvement cycles.
              - listitem [ref=e59]: Stay current with the latest Machine Learning research for wireless and embedded systems.
              - listitem [ref=e60]: Perform other related duties of which the above are representative.
            - paragraph [ref=e61]: REQUIRED QUALIFICATIONS
            - list [ref=e62]:
              - listitem [ref=e63]: Bachelor of Science degree in Electrical Engineering, Computer Science, Computer Engineering, or related field plus a minimum of 2 years of experience in machine learning, with demonstrated application to real-world problems; no experience required with an advance degree (MS or PhD)
              - listitem [ref=e64]: Strong foundation in supervised and unsupervised learning and statistical modeling.
              - listitem [ref=e65]: Experience with Python ML frameworks (e.g., TensorFlow, PyTorch, scikit-learn, etc.).
              - listitem [ref=e66]: Exposure to MATLAB or C/C++ for signal processing algorithm development.
              - listitem [ref=e67]:
                - strong [ref=e68]: Must be a U.S. Citizen
                - text: due to clients under U.S. government contracts.
              - listitem [ref=e69]:
                - strong [ref=e70]: All employment is contingent upon the successful clearance of a background check and drug test.
            - paragraph [ref=e71]:
              - strong [ref=e72]
              - text: PREFERRED KNOWLEDGE, SKILLS, AND ABILITIES
            - list [ref=e73]:
              - listitem [ref=e74]: MS. or Ph.D. in Electrical Engineering, Computer Science, or a related field.
              - listitem [ref=e75]: Demonstrated experience with RF signal classification, anomaly detection, or spectrum monitoring.
              - listitem [ref=e76]: Proficiency in MATLAB or C/C++ for signal processing algorithm development.
              - listitem [ref=e77]: Familiarity with wireless communication concepts (e.g., PHY/MAC layers, MIMO, OFDM, spectrum access).
              - listitem [ref=e78]: Familiarity with embedded ML, real-time systems, or deploying ML on edge devices.
              - listitem [ref=e79]: Background in adaptive modulation, beamforming, or cognitive radio techniques.
              - listitem [ref=e80]: Experience working with wireless standards such as 3GPP, IEEE 802.11/15, or military waveforms.
              - listitem [ref=e81]: Experience with GPU acceleration or model optimization for constrained environments.
              - listitem [ref=e82]: Excellent communication and collaboration skills.
            - paragraph [ref=e83]: WORKING CONDITIONS AND PHYSICAL REQUIREMENTS
            - list [ref=e84]:
              - listitem [ref=e85]: Office environment.
              - listitem [ref=e86]: Outdoor environment for demos.
              - listitem [ref=e87]: Occasional exposure to heat, cold, and allergens while performing tests or demonstrations in the field.
              - listitem [ref=e88]:
                - text: "While performing the duties of this job, the employee is required to do the following:"
                - list [ref=e89]:
                  - listitem [ref=e90]: Lift equipment up to 20 lbs. for the set-up of demonstrations and testing.
                  - listitem [ref=e91]: Perform bending and reaching movements to place items on lower and higher shelves.
            - paragraph [ref=e92]: "#silvuscareers"
