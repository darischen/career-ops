            - paragraph [ref=e38]
            - heading "About Corgi" [level=3] [ref=e39]:
              - strong [ref=e40]: About Corgi
            - paragraph [ref=e41]: "Corgi is a full-stack insurance carrier building better, faster insurance products from the ground up. We're not just a broker: we design, underwrite, price, and issue policies directly, with fewer handoffs and less friction. Insurance is the largest unautomated industry in financial services, and we're rebuilding it using AI. We've raised $374M from Kindred, TCV, and others to do so. YC S24."
            - heading "What You'll Do" [level=3] [ref=e42]:
              - strong [ref=e43]: What You'll Do
            - list [ref=e44]:
              - listitem [ref=e45]:
                - paragraph [ref=e46]: This is a unique role for someone who likes to find the answer in the numbers and build quantitative driven solutions to help us solve some of the hardest problems in insurance and portfolio management.
              - listitem [ref=e47]:
                - paragraph [ref=e48]: Build and maintain quantitative models to support pricing, underwriting, forecasting, and business decision-making.
              - listitem [ref=e49]:
                - paragraph [ref=e50]: "Support the Head of Underwriting in:"
                - list [ref=e51]:
                  - listitem [ref=e52]:
                    - paragraph [ref=e53]: The management of the Corgi insurance portfolio and development of underwriting strategy.
                  - listitem [ref=e54]:
                    - paragraph [ref=e55]: Analyze large and complex datasets to identify insurance trends, risks, and opportunities
                  - listitem [ref=e56]:
                    - paragraph [ref=e57]: Partner with engineering and product teams to implement the results of your findings.
              - listitem [ref=e58]:
                - paragraph [ref=e59]: Support the Head of Quantitative Strategy in the management of the Corgi investment portfolio and the development of our investment strategy.
                - list [ref=e60]:
                  - listitem [ref=e61]:
                    - paragraph [ref=e62]: Design experiments and evaluate outcomes using statistical methods.
                  - listitem [ref=e63]:
                    - paragraph [ref=e64]: Build and stress-test trade ideas from concept to execution that will directly contribute to the management of the investment portfolio.
              - listitem [ref=e65]:
                - paragraph [ref=e66]: Support strategic initiatives across insurance, operations, finance, and growth.
            - heading "What We're Looking For" [level=3] [ref=e67]:
              - strong [ref=e68]: What We're Looking For
            - list [ref=e69]:
              - listitem [ref=e70]:
