          - paragraph [ref=e19]: Dallas, TX | Hybrid
          - heading "Entry Level Developer" [level=2] [ref=e20]:
            - strong [ref=e21]: Entry Level Developer
          - paragraph [ref=e22]:
            - emphasis [ref=e23]: Launch your Career at Further
          - paragraph [ref=e24]: Are you graduating with a bachelor’s or master’s degree and ready to dive into the world of data and AI? Further’s Graduate hiring program offers a full-time role where you'll apply your university training to real-world client challenges and technology solutions.
          - paragraph [ref=e25]: Further is a data, cloud, and AI company whose focus is helping companies turn raw data into the right decisions. You’ll drive powerful insights for brands like Verizon, American Cancer Society, Behr Paint, and more right from the start. Located in the heart of Cleveland in the Flats East Bank (OR Located in the heart of Dallas at The Link Uptown, OR the heart of Midtown Atlanta in Atlantic Station), you’ll gain cross-functional experience and build a strong foundation to kickstart your career by turning data into information, information into insights, and insights into business decisions in a professional services environment.
          - paragraph [ref=e26]
          - paragraph [ref=e27]:
            - strong [ref=e28]: "Your first year will include:"
          - list [ref=e29]:
            - listitem [ref=e30]: Contributing to client projects and strategic solutions early.
            - listitem [ref=e31]: Growing your skillset with certifications and hands-on mentorship.
            - listitem [ref=e32]: Helping shape our client success stories — your work will matter.
            - listitem [ref=e33]: While starting with support, you will progress to completing tasks and assignments independently with limited oversight by the end of the year.
            - listitem [ref=e34]: Contributing to a positive and fun work environment, building strong relationships across the company beyond just your team.
            - listitem [ref=e35]: Writing clean, efficient code based on detailed technical specifications, ensuring your logic is performant, maintainable, and strictly adheres to the project’s architectural standards.
            - listitem [ref=e36]: Mastering the Git lifecycle, including branching for features, resolving merge conflicts, and maintaining a clean commit history to ensure seamless collaboration within the main repository.
            - listitem [ref=e37]: Actively participating in the Software Development Life Cycle by engaging in Agile ceremonies, such as daily stand-ups to sync on progress, sprint planning to estimate tasks, and retrospectives to refine team processes.
            - listitem [ref=e38]: Leveraging AI coding agents (like GitHub Copilot or Cursor) to accelerate boilerplate generation and unit testing; however, you are expected to audit all AI output to ensure it is secure, accurate, and fits the specific context of your codebase.
            - listitem [ref=e39]: Receiving constructive feedback on your own submissions and learning to analyze your peers’ code to ensure the entire team maintains a high standard of quality.
          - paragraph [ref=e40]
          - paragraph [ref=e41]:
            - strong [ref=e42]: Why Further?
          - paragraph [ref=e43]: We believe great careers are built on strong foundations. Our Graduate Program is designed as a launchpad, bridging university theory with real-world impact and helping high-potential graduates grow into industry leaders.
          - list [ref=e44]:
            - listitem [ref=e45]:
              - strong [ref=e46]: "Immersive Learning:"
              - text: Your first three months are a curated mix of immersive workshops, shadow rotations, and learning by doing. You’ll gain a 360-degree view of how our business operates, from product strategy to client delivery.
            - listitem [ref=e47]:
              - strong [ref=e48]: "Hands-on Experience Early:"
              - text: You’ll be embedded early into high-performing teams where your ideas are heard and your work reaches our clients, giving you exposure to real-world projects from the start.
            - listitem [ref=e49]:
              - strong [ref=e50]: "Mentorship that Matters:"
              - text: Our program is designed around strong mentorship and connection, pairing you with meaningful mentors to shape your career. Build deep professional and social bonds, ensuring you have a support network of mentors and fellow graduates to grow alongside.
            - listitem [ref=e51]:
              - strong [ref=e52]: "Technology at your Fingertips:"
              - text: To do your best work, you need the best tools. You will be equipped with cutting-edge tech and industry-leading technology from your first day. You’ll have the resources to work smarter, experiment faster, and stay at the forefront of digital innovation.
            - listitem [ref=e53]:
              - strong [ref=e54]: "Harnessing the power of AI:"
              - text: You will receive training on how to integrate AI tools into your daily workflow, ensuring you stay at the forefront of the modern digital economy.
          - paragraph [ref=e55]
          - paragraph [ref=e56]:
            - strong [ref=e57]: "What we’re looking for:"
            - text: You don’t need to check every box — what matters most is your drive to grow.
          - paragraph [ref=e58]: "Fast learner, committed to continuous learning with passion, curiosity, and some of the following foundations:"
          - paragraph [ref=e59]:
            - strong [ref=e60]: "Required:"
          - list [ref=e61]:
            - listitem [ref=e62]: Completed a Bachelor’s or Master’s Degree between Fall 2025 and Spring 2026 in Computer Science, Software Engineering, or a related software engineering major.
            - listitem [ref=e63]: Beginner proficiency or coursework in application development using Git, Typescript, Python, HTML5
            - listitem [ref=e64]: "AI Fluency & Curiosity: A baseline understanding of Generative AI tools (such as ChatGPT, Claude, or GitHub Copilot) with a demonstrated ability to apply prompts to accelerate delivery. We are looking for builders who leverage AI to speed up tasks, automate workflows, and proactively ship high-quality work faster than traditional methods allow."
          - paragraph [ref=e65]:
            - strong [ref=e66]: "Preferred:"
          - list [ref=e67]:
            - listitem [ref=e68]: Relevant internships or project experience.
          - paragraph [ref=e69]:
            - strong [ref=e70]: "Additional Notes:"
          - list [ref=e71]:
            - listitem [ref=e72]: This is a hybrid position. Tuesday, Wednesday, and Thursday are required in-office in Dallas.
            - listitem [ref=e73]: Please note, we do not offer sponsorship for this role.
          - paragraph [ref=e74]
          - paragraph [ref=e75]:
            - strong [ref=e76]: Rewards & Benefits at Further
          - paragraph [ref=e77]: Being part of Further means joining a group of incredible people dedicated to delivering value, impact, and innovation through true grit and agility. We believe in taking care of ourselves and each other to continuously improve each day.
          - paragraph [ref=e78]:
            - text: Our
            - link "total rewards program" [ref=e79] [cursor=pointer]:
              - /url: https://www.gofurther.com/who-we-are/total-rewards
            - text: is designed for your protection, peace of mind, and overall wellbeing. In addition to the basics, we offer a net-zero cost medical option, company contributions to your HSA, fertility support, fully-paid parental leave, a monthly stipend for your lifestyle spending account, and much more.
          - paragraph [ref=e80]: If all this resonates with you and you want to add to our team and culture, APPLY TODAY!
