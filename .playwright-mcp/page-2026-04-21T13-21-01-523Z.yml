            - heading [level=2] [ref=e217]:
              - generic [ref=e91]: At Cadence, we hire and develop leaders and innovators who want to make an impact on the world of technology.
            - paragraph [ref=e92]: Cadence Design Systems is looking for a highly motivated software engineer to work as a member of the R&D staff on Cadence’s Innovus product.
            - paragraph [ref=e93]: Innovus is a complete digital implementation product that encompasses physical design and logic synthesis. The product breadth means we are looking for skilled and motivated candidates with backgrounds in placement, routing, optimization, logic synthesis, extraction, static timing and power analysis.
            - paragraph [ref=e94]
            - paragraph [ref=e95]: You will be part of a team responsible for creating the innovative technologies required for technology leadership in this space. Development responsibilities include designing, developing, troubleshooting, debugging and supporting the Innovus product.
            - paragraph [ref=e96]
            - paragraph [ref=e97]: This specific role will require physical design and synthesis domain knowledge on how each engine and what roles it plays in the digital implementation flows, together with strong data exploration and data analysis skills to then find out the most critical optimization needs in the flow and create plan and/or high-level algorithms to solve it to meet critical customer needs.
            - paragraph [ref=e98]
            - paragraph [ref=e99]: "The successful candidate will possess the following combination of education and experience:"
            - paragraph [ref=e100]: • MS in Computer Science or Engineering, PhD is preferred
            - paragraph [ref=e101]: • Strong analysis and problem solving skills
            - paragraph [ref=e102]: • Strong ability to learn quickly
            - paragraph [ref=e103]: • Excellent programming and software engineering skills, especially C/C++ and UNIX platforms
            - paragraph [ref=e104]: • Proficient in Tcl
            - paragraph [ref=e105]: • Prior experience with large software development projects is highly recommended
            - paragraph [ref=e106]
            - paragraph [ref=e107]: Most importantly, we are looking for hard working, innovative engineers who enjoy working with a great team in a high-performance culture.
            - paragraph [ref=e108]: "The annual salary range for California is $88,900 to $165,100. You may also be eligible to receive incentive compensation: bonus, equity, and benefits. Sales positions generally offer a competitive On Target Earnings (OTE) incentive compensation structure. Please note that the salary range is a guideline and compensation may vary based on factors such as qualifications, skill level, competencies and work location. Our benefits programs include: paid vacation and paid holidays, 401(k) plan with employer match, employee stock purchase plan, a variety of medical, dental and vision plan options, and more."
            - heading [level=2] [ref=e218]:
              - generic [ref=e110]: We’re doing work that matters. Help us solve what others can’t.
