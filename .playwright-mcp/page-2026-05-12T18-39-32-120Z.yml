                  - generic [ref=e62]:
                    - paragraph [ref=e63]: Job Summary
                    - paragraph [ref=e64]:
                      - text: General Atomics (GA), and its affiliated companies, is one of the world’s leading resources for high-technology systems development ranging from the nuclear fuel cycle to remotely piloted aircraft, airborne sensors, and advanced electric, electronic, wireless and laser technologies.
                      - text: General Atomics Electromagnetic Systems (GA-EMS) designs and manufactures first-of-a-kind electromagnetic and electric power generation systems. GA-EMS' expanding portfolio of specialized products and integrated system solutions support critical fleet, space systems and satellites, missile defense, power and energy, and process and monitoring applications for defense, industrial, and commercial customers worldwide.
                      - text: This software engineering position is for the development of embedded software for control systems. The role includes the analysis, investigation, and resolution of embedded software and control system problems under general supervision. Contributes to the completion of assigned engineering tasks which involve the exercise of independent judgment and discretion about matters of significance. Documents findings and implemented solutions and communicates results. Contacts are primarily internal within the software team working at the discretion of a software lead. May provide direction to support staff or technicians.
                      - strong [ref=e65]: DUTIES & RESPONSIBILITIES
                      - list [ref=e66]:
                        - listitem [ref=e67]: Applies technical knowledge to analyze, investigate and resolve assigned engineering problems.
                        - listitem [ref=e68]: Performs functional testing and troubleshooting of equipment and systems in assigned area by utilizing standard engineering and scientific principles.
                        - listitem [ref=e69]: Obtains and analyzes test data.
                        - listitem [ref=e70]: Develops appropriate documentation of findings and implemented solutions. May be required to make brief technical presentations.
                        - listitem [ref=e71]: May provide direction to design and/or technical staff.
                        - listitem [ref=e72]: Maintains the strict confidentiality of sensitive information.
                        - listitem [ref=e73]: Performs other duties as assigned. 8.Responsible for observing all laws, regulations and other applicable obligations wherever and whenever business is conducted on behalf of the Company.
                        - listitem [ref=e74]: Expected to work in a safe manner in accordance with established operating procedures and practices.
                      - text: We recognize and appreciate the value and contributions of individuals with diverse backgrounds and experiences and welcome all qualified individuals to apply.
                  - generic [ref=e75]:
                    - paragraph [ref=e76]: Job Qualifications
                    - paragraph [ref=e77]:
                      - list [ref=e78]:
                        - listitem [ref=e79]: Typically requires a bachelors degree, masters degree or PhD in engineering or a related technical discipline from an accredited institution and progressive engineering experience as follows; four or more years of experience with a bachelors degree or two or more years of experience with a masters degree. May substitute equivalent engineering experience in lieu of education.
                        - listitem [ref=e80]: Must have a complete understanding of engineering concepts, principles, codes, and theory; experience demonstrating a broad application of those concepts; and, expanding knowledge of principles, concepts, theory, and practices in related technical specialties.
                        - listitem [ref=e81]: Must possess the ability to understand new concepts quickly; apply them accurately throughout an evolving environment; organize, schedule, and coordinate work phases; and, determine the appropriate approach at the task level or, with assistance, at the project level to provide solutions to a range of complex problems.
                        - listitem [ref=e82]: Must have excellent communication, computer, documentation, presentation, and interpersonal skills, ability to work independently and as part of a team; able to perform complex tasks in one engineering area; and, lead a team of less experienced professional employees on semi-routine tasks.
                        - listitem [ref=e83]: Able to work extended hours as required. A Professional Engineering License is desirable.
                        - listitem [ref=e84]: Ability to obtain and maintain DoD Secret Clearance is required.
