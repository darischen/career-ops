          - paragraph [ref=e171]: Tokyo Electron (TEL) is a leader in semiconductor manufacturing equipment. We provide key parts of the manufacturing process for the world’s largest foundries. TEL Technology AI and Design Inc is our Silicon Valley AI lab, where we do groundbreaking, long-term research and technology development in AI/ML for semiconductor equipment.
