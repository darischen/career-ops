        - generic [ref=e17]:
          - generic [ref=e18]:
            - paragraph [ref=e19]: "At Scale, our mission is to accelerate the development of AI applications. For 8 years, Scale has been the leading AI data foundry, helping fuel the most exciting advancements in AI, including: generative AI, defense applications, and autonomous vehicles. With our recent Series F round, we’re accelerating the abundance of frontier data to pave the road to Artificial General Intelligence (AGI), and building upon our prior model evaluation work with enterprise customers and governments, to deepen our capabilities and offerings for both public and private evaluations."
            - paragraph [ref=e20]
            - paragraph [ref=e21]:
              - strong [ref=e22]: "Example Projects:"
            - list [ref=e23]:
              - listitem [ref=e24]: Ship tools to accelerate the growth of new qualified contributors on Scale’s labeling platform
              - listitem [ref=e25]: Build methodical fraud-detection systems to remove bad actors and keep Scale’s contributor base safe and trusted.
              - listitem [ref=e26]: Use models to estimate the quality of tasks and labelers, and guarantee quality on requests at large scale.
              - listitem [ref=e27]: Devise advanced matching algorithms to match labelers to customers for optimal turnaround and accuracy.
              - listitem [ref=e28]: Build methods to automatically measure, train, and optimally match labelers to tasks based on performance
              - listitem [ref=e29]: Create optimized and efficient UI/UX tooling, in combination with ML algorithms, for 100k+ labelers to complete billions of complex tasks
              - listitem [ref=e30]: Develop new AI infrastructure products to visualize, query, and explore Scale data
              - listitem [ref=e31]: Create a customer service RAG application that handles 1000s of questions a day
              - listitem [ref=e32]: Integrate a cutting-edge ML model that predicts churn with a customer's retention system
            - paragraph [ref=e33]
            - paragraph [ref=e34]:
              - strong [ref=e35]: "Requirements:"
            - list [ref=e36]:
              - listitem [ref=e37]: A graduation date in Fall 2025 or Spring 2026 with a Bachelor’s degree (or equivalent) in a relevant field (Computer Science, EECS, Computer Engineering, Statistics)
              - listitem [ref=e38]: Product engineering experience such as building web apps full-stack, integrating with relevant APIs and services, talking to customers, figuring out ‘what’ to build and then iterating
              - listitem [ref=e39]: Previous Product/Software Engineering Internship experience
              - listitem [ref=e40]: Track record of shipping high-quality products and features at scale
              - listitem [ref=e41]: Experience building systems that process large volumes of data
              - listitem [ref=e42]: Experience with Python, Typescript, React, and/or MongoDB
          - generic [ref=e44]:
            - paragraph [ref=e48]:
              - emphasis [ref=e49]: "Compensation packages at Scale for eligible roles include base salary, equity, and benefits. The range displayed on each job posting reflects the minimum and maximum target for new hire salaries for the position, determined by work location and additional factors, including job-related skills, experience, interview performance, and relevant education or training. Scale employees in eligible roles are also granted equity based compensation, subject to Board of Director approval. Your recruiter can share more about the specific salary range for your preferred location during the hiring process, and confirm whether the hired role will be eligible for equity grant. You’ll also receive benefits including, but not limited to: Comprehensive health, dental and vision coverage, retirement benefits, a learning and development stipend, and generous PTO. Additionally, this role may be eligible for additional benefits such as a commuter stipend."
            - paragraph [ref=e50]: "The base salary range for this full-time position in the location of San Francisco is:"
            - paragraph [ref=e51]: $124,000 - $155,000 USD
          - generic [ref=e52]:
            - paragraph [ref=e53]:
              - strong [ref=e54]:
                - emphasis [ref=e55]: "PLEASE NOTE:"
              - emphasis [ref=e56]: Our policy requires a 90-day waiting period before reconsidering candidates for the same role. This allows us to ensure a fair and thorough evaluation of all applicants.
            - paragraph [ref=e57]:
              - strong [ref=e58]: "About Us:"
            - paragraph [ref=e59]:
              - emphasis [ref=e60]: At Scale, our mission is to develop reliable AI systems for the world's most important decisions. Our products provide the high-quality data and full-stack technologies that power the world's leading models, and help enterprises and governments build, deploy, and oversee AI applications that deliver real impact. We work closely with industry leaders like Meta, Cisco, DLA Piper, Mayo Clinic, Time Inc., the Government of Qatar, and U.S. government agencies including the Army and Air Force. We are expanding our team to accelerate the development of AI applications.
            - paragraph [ref=e61]:
              - emphasis [ref=e62]: We believe that everyone should be able to bring their whole selves to work, which is why we are proud to be an inclusive and equal opportunity workplace. We are committed to equal employment opportunity regardless of race, color, ancestry, religion, sex, national origin, sexual orientation, age, citizenship, marital status, disability status, gender identity or Veteran status.
            - paragraph [ref=e63]:
              - emphasis [ref=e64]: We are committed to working with and providing reasonable accommodations to applicants with physical and mental disabilities. If you need assistance and/or a reasonable accommodation in the application or recruiting process due to a disability, please contact us at accommodations@scale.com. Please see the United States Department of Labor's
              - link "Know Your Rights poster" [ref=e65] [cursor=pointer]:
                - /url: https://www.eeoc.gov/sites/default/files/2023-06/22-088_EEOC_KnowYourRights6.12ScreenRdr.pdf
                - emphasis [ref=e66]: Know Your Rights poster
              - emphasis [ref=e67]: for additional information.
            - paragraph [ref=e68]:
              - emphasis [ref=e69]: We comply with the United States Department of Labor's
              - emphasis [ref=e70]: Pay Transparency provision
              - emphasis [ref=e71]: .
            - paragraph [ref=e72]:
              - emphasis [ref=e73]:
                - strong [ref=e74]: "PLEASE NOTE:"
                - text: We collect, retain and use personal data for our professional business purposes, including notifying you of job opportunities that may be of interest and sharing with our affiliates. We limit the personal data we collect to that which we believe is appropriate and necessary to manage applicants’ needs, provide our services, and comply with applicable laws. Any information we collect in connection with your application will be treated in accordance with our internal policies and programs designed to protect personal data. Please see our
                - link "privacy policy" [ref=e75] [cursor=pointer]:
                  - /url: https://scale.com/legal/privacy
                - text: for additional information.
