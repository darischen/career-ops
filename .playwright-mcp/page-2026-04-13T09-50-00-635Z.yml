              - heading "Voluntary Self-Identification of Disability" [level=2] [ref=e324]
              - generic [ref=e325]:
                - generic [ref=e326]:
                  - generic [ref=e327]: Form CC-305
                  - generic [ref=e328]: Page 1 of 1
                - generic [ref=e329]:
                  - generic [ref=e330]: OMB Control Number 1250-0005
                  - generic [ref=e331]: Expires 04/30/2026
              - strong [ref=e332]: Why are you being asked to complete this form?
              - paragraph [ref=e333]: We are a federal contractor or subcontractor. The law requires us to provide equal employment opportunity to qualified people with disabilities. We have a goal of having at least 7% of our workers as people with disabilities. The law says we must measure our progress towards this goal. To do this, we must ask applicants and employees if they have a disability or have ever had one. People can become disabled, so we need to ask this question at least every five years.
              - paragraph [ref=e334]:
                - text: Completing this form is voluntary, and we hope that you will choose to do so. Your answer is confidential. No one who makes hiring decisions will see it. Your decision to complete the form and your answer will not harm you in any way. If you want to learn more about the law or this form, visit the U.S. Department of Labor’s Office of Federal Contract Compliance Programs (OFCCP) website at
                - link "www.dol.gov/ofccp" [ref=e335] [cursor=pointer]:
                  - /url: https://www.dol.gov/ofccp
                - text: .
              - strong [ref=e336]: How do you know if you have a disability?
              - paragraph [ref=e337]:
                - text: A disability is a condition that substantially limits one or more of your “major life activities.” If you have or have ever had such a condition, you are a person with a disability.
                - strong [ref=e338]: "Disabilities include, but are not limited to:"
              - list [ref=e339]:
                - listitem [ref=e340]: Alcohol or other substance use disorder (not currently using drugs illegally)
                - listitem [ref=e341]: Autoimmune disorder, for example, lupus, fibromyalgia, rheumatoid arthritis, HIV/AIDS
                - listitem [ref=e342]: Blind or low vision
                - listitem [ref=e343]: Cancer (past or present)
                - listitem [ref=e344]: Cardiovascular or heart disease
                - listitem [ref=e345]: Celiac disease
                - listitem [ref=e346]: Cerebral palsy
                - listitem [ref=e347]: Deaf or serious difficulty hearing
                - listitem [ref=e348]: Diabetes
                - listitem [ref=e349]: Disfigurement, for example, disfigurement caused by burns, wounds, accidents, or congenital disorders
                - listitem [ref=e350]: Epilepsy or other seizure disorder
                - listitem [ref=e351]: Gastrointestinal disorders, for example, Crohn's Disease, irritable bowel syndrome
                - listitem [ref=e352]: Intellectual or developmental disability
                - listitem [ref=e353]: Mental health conditions, for example, depression, bipolar disorder, anxiety disorder, schizophrenia, PTSD
                - listitem [ref=e354]: Missing limbs or partially missing limbs
                - listitem [ref=e355]: Mobility impairment, benefiting from the use of a wheelchair, scooter, walker, leg brace(s) and/or other supports
                - listitem [ref=e356]: Nervous system condition, for example, migraine headaches, Parkinson’s disease, multiple sclerosis (MS)
                - listitem [ref=e357]: Neurodivergence, for example, attention-deficit/hyperactivity disorder (ADHD), autism spectrum disorder, dyslexia, dyspraxia, other learning disabilities
                - listitem [ref=e358]: Partial or complete paralysis (any cause)
                - listitem [ref=e359]: Pulmonary or respiratory conditions, for example, tuberculosis, asthma, emphysema
                - listitem [ref=e360]: Short stature (dwarfism)
                - listitem [ref=e361]: Traumatic brain injury
