              - generic [ref=e419]:
                - generic [ref=e420]:
                  - generic [ref=e421]: Form CC-305
                  - generic [ref=e422]: Page 1 of 1
                - generic [ref=e423]:
                  - generic [ref=e424]: OMB Control Number 1250-0005
                  - generic [ref=e425]: Expires 04/30/2026
              - strong [ref=e426]: Why are you being asked to complete this form?
              - paragraph [ref=e427]: We are a federal contractor or subcontractor. The law requires us to provide equal employment opportunity to qualified people with disabilities. We have a goal of having at least 7% of our workers as people with disabilities. The law says we must measure our progress towards this goal. To do this, we must ask applicants and employees if they have a disability or have ever had one. People can become disabled, so we need to ask this question at least every five years.
              - paragraph [ref=e428]:
                - text: Completing this form is voluntary, and we hope that you will choose to do so. Your answer is confidential. No one who makes hiring decisions will see it. Your decision to complete the form and your answer will not harm you in any way. If you want to learn more about the law or this form, visit the U.S. Department of Labor’s Office of Federal Contract Compliance Programs (OFCCP) website at
                - link "www.dol.gov/ofccp" [ref=e429] [cursor=pointer]:
                  - /url: https://www.dol.gov/ofccp
                - text: .
              - strong [ref=e430]: How do you know if you have a disability?
              - paragraph [ref=e431]:
                - text: A disability is a condition that substantially limits one or more of your “major life activities.” If you have or have ever had such a condition, you are a person with a disability.
                - strong [ref=e432]: "Disabilities include, but are not limited to:"
              - list [ref=e433]:
                - listitem [ref=e434]: Alcohol or other substance use disorder (not currently using drugs illegally)
                - listitem [ref=e435]: Autoimmune disorder, for example, lupus, fibromyalgia, rheumatoid arthritis, HIV/AIDS
                - listitem [ref=e436]: Blind or low vision
                - listitem [ref=e437]: Cancer (past or present)
                - listitem [ref=e438]: Cardiovascular or heart disease
                - listitem [ref=e439]: Celiac disease
                - listitem [ref=e440]: Cerebral palsy
                - listitem [ref=e441]: Deaf or serious difficulty hearing
                - listitem [ref=e442]: Diabetes
                - listitem [ref=e443]: Disfigurement, for example, disfigurement caused by burns, wounds, accidents, or congenital disorders
                - listitem [ref=e444]: Epilepsy or other seizure disorder
                - listitem [ref=e445]: Gastrointestinal disorders, for example, Crohn's Disease, irritable bowel syndrome
                - listitem [ref=e446]: Intellectual or developmental disability
                - listitem [ref=e447]: Mental health conditions, for example, depression, bipolar disorder, anxiety disorder, schizophrenia, PTSD
                - listitem [ref=e448]: Missing limbs or partially missing limbs
                - listitem [ref=e449]: Mobility impairment, benefiting from the use of a wheelchair, scooter, walker, leg brace(s) and/or other supports
                - listitem [ref=e450]: Nervous system condition, for example, migraine headaches, Parkinson’s disease, multiple sclerosis (MS)
                - listitem [ref=e451]: Neurodivergence, for example, attention-deficit/hyperactivity disorder (ADHD), autism spectrum disorder, dyslexia, dyspraxia, other learning disabilities
                - listitem [ref=e452]: Partial or complete paralysis (any cause)
                - listitem [ref=e453]: Pulmonary or respiratory conditions, for example, tuberculosis, asthma, emphysema
                - listitem [ref=e454]: Short stature (dwarfism)
                - listitem [ref=e455]: Traumatic brain injury
