        - generic [ref=e20]:
          - generic [ref=e21]:
            - paragraph [ref=e22]
            - paragraph [ref=e23]
          - generic [ref=e24]:
            - paragraph [ref=e25]: Sigma unlocks the value of data by delivering cloud-scale analytics and business intelligence with the simplicity of a spreadsheet, complete with pivot tables and next generation dashboards. We empower business professionals, non-technical users, and data teams to quickly explore, analyze, visualize, and collaborate, leveraging all of their data across the organization.
            - heading "Our New Grad (Temp-to-Hire) Program at Sigma:" [level=4] [ref=e26]:
              - strong [ref=e27]: "Our New Grad (Temp-to-Hire) Program at Sigma:"
            - paragraph [ref=e28]: Sigma’s early career program is the launchpad for the next generation of engineers and innovators. As a Software Engineering New Grad at Sigma, you’ll work on various production features and learn efficient engineering for large scalable systems. Our new grads work directly with our engineers, product leaders, and designers across the organization everyday. We’re looking for recent graduates who bring curiosity, a spirit for collaboration, and a desire for shaping the future of business insights and data exploration.
            - paragraph [ref=e29]:
              - strong [ref=e30]: "Note: Our New Grad Program is a temp-to-hire program. Participants will be hired in a 3 month temp role and converted to a FTE based on positive performance and evaluation."
            - paragraph [ref=e31]: "New Grad Program Qualifications:"
            - list [ref=e32]:
              - listitem [ref=e33]:
                - strong [ref=e34]: Authorization
                - text: ":"
              - list [ref=e35]:
                - listitem [ref=e36]: You must be legally authorized to work in the US
                - listitem [ref=e37]: Visa sponsorship is not available for our new grad positions
              - listitem [ref=e38]:
                - strong [ref=e39]: "Location:"
              - list [ref=e40]:
                - listitem [ref=e41]: Our new grad roles are in-person and located within San Francisco, CA or New York, NY. Relocation assistance will be provided for recent graduates who will need to relocate in the form of a relocation bonus.
                - listitem [ref=e42]: Applicants must be able to work in-person in our offices either in San Francisco or New York City for the duration of their 3 month internship.
            - paragraph [ref=e43]:
              - strong [ref=e44]: "About the role:"
            - paragraph [ref=e45]:
              - text: Sigma’s Engineering organization is a dynamic, high performing team of Software Engineers who complement each other's skills. Our Engineers design, implement, and scale technical solutions that power our core product and enable our users to make data driven decisions in their businesses. As a
              - strong [ref=e46]: Software Engineering New Grad
              - text: ", you will experiment, prototype, and implement features that help our global user base analyze and gather insights from their data. During your new grad program, you’ll partner directly with your engineering mentor, as well as collaborate with other teams across the business."
              - strong [ref=e47]: Our New Grad Program (Temp-to-Hire) is a direct pipeline into a full-time role and conversion will be available based on successful performance.
              - text: From Product Designers, Product Managers, Sales, and, of course, actual users, you will collaborate across the company to determine the best solution for your technical challenge. New Grads will take their project from ideation through implementation, iterating and gathering feedback along the way. As a New Grad, you will deploy features and gather insights from customer metrics to aid you in making better development decisions and improve your business acumen.
            - paragraph [ref=e48]:
              - strong [ref=e49]: "Note: Our New Grad Program is a temp-to-hire program. Participants will be hired in a 3 month temp role and converted to a FTE based on positive performance and evaluation."
            - paragraph [ref=e50]:
              - strong [ref=e51]: "During your new grad program you will:"
            - list [ref=e52]:
              - listitem [ref=e53]: Learn how to build production software and understand how large Single Page Applications are built and extended with the user experience top of mind
              - listitem [ref=e54]: Experience how backend scales to handle multiple customers and billions of data points while keeping user information secure
              - listitem [ref=e55]: Gain an understanding of how to own a development project from beginning to end
              - listitem [ref=e56]: Develop automated unit tests to get the relevant code coverage and work with product owners and techpubs to document your work
              - listitem [ref=e57]: Partner with other Engineers, Product Managers, and Designers
              - listitem [ref=e58]: Design and deliver innovative solutions to improve the Sigma user experience by implementing new features into our product
              - listitem [ref=e59]: Find new ways to optimize the performance of one or more components of the product
            - heading "What we’re looking for:" [level=4] [ref=e60]:
              - strong [ref=e61]: "What we’re looking for:"
            - list [ref=e62]:
              - listitem [ref=e63]: Applicants must be a recent graduate (within the last 12 months) of a Bachelor’s or a Master’s degree program in Computer Science or a related field
              - listitem [ref=e64]: Able to begin a 3 month temp-to-hire role beginning in May 2025 or thereafter
              - listitem [ref=e65]: Have an intermediate to advanced grasp of Operating Systems, Data structures, algorithms and at least one modern programming language such as Java, Python, JavaScript, etc.
              - listitem [ref=e66]: Excited to learn and build complex user interfaces, data visualizations, or backend systems
              - listitem [ref=e67]: Solid project management and communication abilities. You love to find the right resources and can own tasks end to end with minimal supervision.
              - listitem [ref=e68]: Have a drive and desire to navigate unknowns, after all, that’s what unlocks realizations
              - listitem [ref=e69]: Ability to collaborate and work in a team environment
              - listitem [ref=e70]: Able to commit 40 hrs a week for 12 weeks in-person in one of our office locations
            - paragraph [ref=e71]:
              - strong [ref=e72]: Additional Job details
            - paragraph [ref=e73]: New Grads at Sigma are compensated with an hourly rate and relocation bonus (where applicable). Our hourly rate for this role is $65.00 per hour.
          - generic [ref=e74]:
            - heading "About us:" [level=4] [ref=e75]:
              - strong [ref=e76]: "About us:"
            - paragraph [ref=e77]: Sigma is the AI apps and analytics platform connected to the cloud data warehouse. Using Sigma, business and technical teams can build intelligent, production-ready AI apps that accelerate and automate operational workflows. Sigma provides a spreadsheet interface, SQL and Python editors, visual builders, and native AI to help teams turn live data into interactive applications, analysis, reports, and embedded experiences.
            - paragraph [ref=e78]: Sigma announced its $200M in Series D financing in May 2024, to continue transforming BI through its innovations in AI infrastructure, data application development, enterprise-wide collaboration, and business user adoption. Spark Capital and Avenir Growth Capital co-led the Series D funding round, with additional participation from a group of past investors including Snowflake Ventures and Sutter Hill Ventures.The Series D funding, raised at a valuation 60% higher than the company’s Series C round three years ago, promises to further accelerate Sigma’s growth.
            - paragraph [ref=e79]: Come join us!
            - heading "Benefits For Our Full-Time Employees:" [level=4] [ref=e80]:
              - strong [ref=e81]: "Benefits For Our Full-Time Employees:"
            - list [ref=e82]:
              - listitem [ref=e83]: Equity
              - listitem [ref=e84]: Generous health benefits
              - listitem [ref=e85]: Flexible time off policy. Take the time off you need!
              - listitem [ref=e86]: Paid bonding time for all new parents
              - listitem [ref=e87]: Traditional and Roth 401k
              - listitem [ref=e88]: Commuter and FSA benefits
              - listitem [ref=e89]: Lunch Program
              - listitem [ref=e90]: Dog friendly office
            - paragraph [ref=e91]:
              - text: Sigma Computing is an equal opportunity employer.
              - generic [ref=e92]:
                - text: We are committed to building a smart and strong team regardless of race, color, ancestry, religion, sex, national origin, sexual orientation, age, citizenship, marital status, disability, gender, gender identity or expression, or veteran status. We look forward to learning how your experience can enable all of us to grow
                - emphasis [ref=e93]: .
            - paragraph [ref=e94]:
              - emphasis [ref=e96]: "Note: We have an in-office work environment in all our offices in SF, NYC, and London."
            - paragraph [ref=e97]:
              - strong [ref=e98]: Our Privacy Practices
            - paragraph [ref=e99]:
              - text: When you submit a job application on this site, Sigma processes your personal data for the purposes of evaluating your candidacy for employment at Sigma and as otherwise needed throughout the recruitment and hiring process. Please review Sigma’s
              - link "Candidate Privacy Notice" [ref=e100] [cursor=pointer]:
                - /url: https://www.sigmacomputing.com/legal/candidate-privacy-notice
              - text: for more details. Please note that your personal data may be transferred to a country other than the one in which it was provided (including to USA, the UK, and Canada).
            - paragraph [ref=e101]:
              - strong [ref=e102]: Sigma’s use of AI
            - paragraph [ref=e103]: This hiring process utilizes artificial intelligence tools to assist in candidate screening and assessment. Our AI tools are designed to complement, not replace, human decision-making.
