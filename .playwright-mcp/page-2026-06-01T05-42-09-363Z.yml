            - listitem [ref=e43]: Two years of software engineering experience.
            - listitem [ref=e44]: Experience with TypeScript and tools such as GraphQL, Relay, React, and Node.js.
            - listitem [ref=e45]: Experience working at early-stage companies where you shipped products end-to-end and wore many hats.
