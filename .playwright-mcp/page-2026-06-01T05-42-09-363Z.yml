            - strong [ref=e22]: About Loop
          - paragraph [ref=e23]: Loop is the data platform for the global supply chain. Logistics runs on messy, unstructured data—trapped in PDFs, emails, and legacy systems. We use AI to structure this chaos, creating a "source of truth" that automates payments and audits for the Fortune 100.
          - paragraph [ref=e24]: We are building the financial nervous system for a $100 trillion physical economy. Our technology ensures freight moves efficiently and carriers get paid instantly.
          - paragraph [ref=e25]: Backed by Founders Fund, Index Ventures and 8VC, we are scaling rapidly. We are looking for engineers ready to deploy production AI that powers the physical economy.
          - paragraph [ref=e26]:
            - strong [ref=e27]: About You
            - strong
            - text: As a full-stack engineer, you will work closely with founders and customers to understand and solve their logistics billing and payment pain points. You will help define the product and ship features that directly impact our customers. You will face and solve many complex technical challenges while you receive guidance and feedback from the team. You will shape the Loop DNA and define how we grow as a company.
          - paragraph [ref=e28]:
            - strong [ref=e29]: Responsibilities
          - list [ref=e30]:
            - listitem [ref=e31]: Work cross-functionally with product, design, and sales to understand requirements and ship thoughtful solutions.
            - listitem [ref=e32]: Write high-quality code optimized for extensibility.
            - listitem [ref=e33]: Engage in code reviews to maintain a high bar of engineering excellence.
            - listitem [ref=e34]: Lead discussions and documentation to communicate and arrive at the best technical design.
            - listitem [ref=e35]: Work across different component boundaries, from frontend to backend, and even infrastructure layers.
            - listitem [ref=e36]: Adopt AI technologies such as Cursor/Codex/Claude to accelerate software development and champion adoption of AI tools across the organization for increased productivity.
            - listitem [ref=e37]: Promote better practices and share technical knowledge across the team.
            - listitem [ref=e38]: Help grow Loop through deliberate feedback on product, process, and culture.
          - paragraph [ref=e39]:
