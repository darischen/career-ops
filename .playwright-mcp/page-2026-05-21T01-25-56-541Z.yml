            - heading "About Zip" [level=1] [ref=e35]:
              - strong [ref=e36]: About Zip
            - paragraph [ref=e37]
            - paragraph [ref=e38]:
              - text: Zip is the AI platform for enterprise procurement — built for humans and agents working together. By orchestrating procurement across teams, tools, and suppliers with the help of AI agents, companies can secure the resources they need to innovate faster than ever before.
              - text: The world’s most influential enterprises trust Zip, including T-Mobile, OpenAI, AMD, Mars, Dollar Tree, and more. Together they’ve saved over $8 billion and processed over $500 billion in spend. Zip’s team includes product leaders from Apple, Airbnb, and Meta, as well as former procurement leaders from United Health, Sanofi, MGM Resorts, Discover, and NASA.
              - text: Backed by Adams Street, Alkeon, BOND, CRV, DST, Tiger Global, and Y Combinator, Zip has raised $371 million, most recently at a $2.2 billion valuation and has been recognized by Forbes Fintech 50, Fast Company's Most Innovative Companies, Inc. Best in Business, and LinkedIn Top Startups.
            - heading "Your Role" [level=2] [ref=e39]:
              - strong [ref=e40]: Your Role
            - paragraph [ref=e41]: As a Software Engineer, you will be responsible for building Zip’s core products and architecture. We have a wide product surface area, covering request management, no-code workflow builders, customer-facing reporting dashboards, connections to ticketing systems, integrations with financial systems, B2B payment processing, and more. You will ship features that will be immediately used by our users and will work with a tight-knit team that values open communication and cross-functional collaboration. We move quickly to solve a wide range of complex technical and product challenges. While we are an experienced team that can provide guidance and mentorship, we value engineers who can autonomously scope and solve difficult technical challenges.
            - paragraph [ref=e42]
            - heading "You Will" [level=2] [ref=e43]:
              - strong [ref=e44]: You Will
            - list [ref=e45]:
              - listitem [ref=e46]:
                - paragraph [ref=e47]: Design and build highly reliable and resilient products and features.
              - listitem [ref=e48]:
                - paragraph [ref=e49]: Work closely with cross-functional product and customer-facing teams to understand requirements and ship thoughtful solutions.
              - listitem [ref=e50]:
                - paragraph [ref=e51]: Write high-quality, extensible, and maintainable code.
              - listitem [ref=e52]:
                - paragraph [ref=e53]: Design and build scalable frontend applications and components.
              - listitem [ref=e54]:
                - paragraph [ref=e55]: Design and build APIs to drive existing and new features for a web-based application.
                - paragraph [ref=e56]
            - heading "Qualifications" [level=2] [ref=e57]
            - list [ref=e58]:
              - listitem [ref=e59]:
                - paragraph [ref=e60]: We are hiring software engineers across all levels. Most of our open roles are targeting individuals with at least 5 years experience if past work is highly relevant
              - listitem [ref=e61]:
                - paragraph [ref=e62]: BS or higher, in Computer Science or related technical field involving coding (e.g. physics or math)
              - listitem [ref=e63]:
                - paragraph [ref=e64]: Experience with web application and API development in production environments. At Zip, our stack includes Python, Javascript, React, and GraphQL.
              - listitem [ref=e65]:
                - paragraph [ref=e66]: Experience with industry-standard build, test, and deploy tools. At Zip, our stack includes Kubernetes, Spinnaker, Jenkins, Kibana, Prometheus, and Grafana.
              - listitem [ref=e67]:
                - paragraph [ref=e68]: Ability and interest to quickly learn new frameworks, architecture patterns, and programming languages as needed
              - listitem [ref=e69]:
                - paragraph [ref=e70]: Experience working at a small company with diverse responsibilities is a bonus, but not required.
              - listitem [ref=e71]:
                - paragraph [ref=e72]: Experience working with API connections with external systems like Jira, ServiceNow, Slack, etc is a bonus, but not required.
              - listitem [ref=e73]:
                - paragraph [ref=e74]: Exposure to AI-driven automation or interest in working with AI/ML teams to build intelligent workflows.
            - paragraph [ref=e75]: The salary range for this role is $160,000 - $280,000. The salary for this position is determined based on a variety of job-related factors that may include location, relevant experience, education, or particular skills and expertise.
