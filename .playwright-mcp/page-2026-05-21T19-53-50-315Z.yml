        - generic [ref=e96]:
          - text: AI Engineer
          - paragraph [ref=e97]:
            - text: "The Opportunity:"
            - text: As an experienced AI engineer, you know that AI systems are critical to understanding and processing massive datasets in an organization. Your ability to conduct statistical analyses on business processes using ML techniques makes you an integral part of delivering a customer-focused solution. We need your technical knowledge and desire to problem-solve to support optimizing organizational efficiency. As an AI Developer on our Air Power team, you’ll train, test, deploy, and maintain models that learn from data.
          - paragraph [ref=e98]
          - paragraph [ref=e99]: In this role, you’ll own and define the direction of critical solutions by applying cutting edge Agentic frameworks. You’ll be part of a large community of AI professionals across the company and collaborate with data engineers, data scientists, solutions architects, and product owners to deliver world class solutions to transform how the Air Force manages its day-to-day business. Your skills and extensive technical expertise will guide clients as they navigate the landscape of Agentic Frameworks.
          - paragraph [ref=e100]
          - paragraph [ref=e101]: Work with us to solve real-world challenges and define ML strategy for the Department of War.
          - paragraph [ref=e102]
          - paragraph [ref=e103]: Join us. The world can’t wait.
          - paragraph [ref=e104]
          - paragraph [ref=e105]: "You Have:"
          - list [ref=e106]:
            - listitem [ref=e107]:
              - paragraph [ref=e108]: 2+ years of experience building production-grade software in Python, TypeScript, or Java with APIs and data services, such as FastAPI, Flask, REST, GraphQL, or SQL, and software engineering fundamentals, including testing, code review, and CI/CD
            - listitem [ref=e109]:
              - paragraph [ref=e110]: Experience developing and deploying AI-enabled applications, such as LLMs, RAG, GraphRAG, agentic workflows, or tool-calling, to solve mission problems in industry, government, or national security
            - listitem [ref=e111]:
              - paragraph [ref=e112]: Experience building secure data foundations on enterprise cloud platforms, such as AWS, governed ingest and file exchange, data catalog and metadata, and data mesh-style data products to enable reuse across teams and bases
            - listitem [ref=e113]:
              - paragraph [ref=e114]: Experience designing event-driven integrations and workflow automation, such as asynchronous messaging, job orchestration, or audit logging, to move from insight to action
            - listitem [ref=e115]:
              - paragraph [ref=e116]: Experience implementing MLOps or DevSecOps practices, such as CI/CD, containerization, automated testing, or model evaluation and monitoring, in constrained or regulated environments
            - listitem [ref=e117]:
              - paragraph [ref=e118]: Secret clearance
            - listitem [ref=e119]:
              - paragraph [ref=e120]: Bachelor’s degree
          - paragraph [ref=e121]
          - paragraph [ref=e122]: "Nice If You Have:"
          - list [ref=e123]:
            - listitem [ref=e124]:
              - paragraph [ref=e125]: Experience working with geospatial or 3D data, such as point clouds, LiDAR, or photogrammetry, digital-twin, or facility and asset data models
            - listitem [ref=e126]:
              - paragraph [ref=e127]: Experience with knowledge-centric data systems, such as vector databases, knowledge graphs, or semantic search, to improve information findability and decision support
            - listitem [ref=e128]:
              - paragraph [ref=e129]: Experience integrating sensor streams or IoT telemetry and edge-to-cloud data flows, such as Kafka, NATS, or RabbitMQ for asset monitoring and situational awareness
            - listitem [ref=e130]:
              - paragraph [ref=e131]: Experience deploying software and data or ML pipelines in disconnected, air-gapped, or classified environments
            - listitem [ref=e132]:
              - paragraph [ref=e133]: Experience with cross-domain data handling constraints
            - listitem [ref=e134]:
              - paragraph [ref=e135]: Experience with Kubernetes or OpenShift, cloud-native patterns, and Infrastructure as Code, such as Terraform, in DoD or IL environments
            - listitem [ref=e136]:
              - paragraph [ref=e137]: Experience with RMF or STIG-aligned delivery
            - listitem [ref=e138]:
              - paragraph [ref=e139]: Experience with AI-assisted software development tools and practices, such as code copilots, automated tests, or secure-by-design patterns, to increase delivery velocity responsibly
            - listitem [ref=e140]:
              - paragraph [ref=e141]: Experience developing computer vision and multimodal analytics pipelines, such as imagery segmentation or classification, point cloud processing, and report generation, and integrating outputs into downstream workflows
            - listitem [ref=e142]:
              - paragraph [ref=e143]: Experience partnering with domain SMEs, such as civil engineers, to translate tacit knowledge into explicit playbooks, decision logic, and human-in-the-loop tools that improve proficiency and consistency
          - paragraph [ref=e144]
          - paragraph [ref=e145]: "Clearance:"
          - paragraph [ref=e146]: Applicants selected will be subject to a security investigation and may need to meet eligibility requirements for access to classified information; Secret clearance is required.
          - paragraph [ref=e147]
          - paragraph [ref=e148]: Compensation
          - paragraph [ref=e149]: At Booz Allen, we celebrate your contributions, provide you with opportunities and choices, and support your total well-being. Our offerings include health, life, disability, financial, and retirement benefits, as well as paid leave, professional development, tuition assistance, work-life programs, and dependent care. Our recognition awards program acknowledges employees for exceptional performance and superior demonstration of our values. Full-time and part-time employees working at least 20 hours a week on a regular basis are eligible to participate in Booz Allen’s benefit programs. Individuals that do not meet the threshold are only eligible for select offerings, not inclusive of health benefits. We encourage you to learn more about our total benefits by visiting the Resource page on our Careers site and reviewing Our Employee Benefits page.
          - paragraph [ref=e150]
          - text: Salary at Booz Allen is determined by various factors, including but not limited to location, the individual’s particular combination of education, knowledge, skills, competencies, and experience, as well as contract-specific affordability and organizational requirements. The projected compensation range for this position is $77,600.00 to $176,000.00 (annualized USD). The estimate displayed represents the typical salary range for this position and is just one component of Booz Allen’s total compensation package for employees. This posting will close within 90 days from the Posting Date.
          - paragraph [ref=e151]
          - paragraph [ref=e152]: Identity Statement
          - paragraph [ref=e153]: As part of the hiring process, we will ask you to complete an identity verification process that leverages advanced biometrics and artificial intelligence to ensure authenticity and protect against identity fraud. You are expected to be on camera during interviews and assessments. We reserve the right to take your picture to verify your identity and prevent fraud.
          - paragraph [ref=e154]
          - paragraph [ref=e155]: Candidate AI Usage Policy
          - paragraph [ref=e156]: AI is a part of our daily work at Booz Allen, and we are committed to the responsible and ethical use of AI tools. However, we want to ensure a fair candidate process based on your own skills and knowledge. As part of this commitment, the use of artificial intelligence (AI) or other tools to assist with responses during interviews (whether in-person or virtual) is prohibited unless permission is explicitly provided.
          - paragraph [ref=e157]
          - paragraph [ref=e158]:
            - text: Work Model
            - text: Our people-first culture prioritizes the benefits of collaboration, whether it occurs in person or virtually. To support engagement and effective communication, employees working virtually are generally expected to have their cameras on during meetings.
          - list [ref=e159]:
            - listitem [ref=e160]:
              - paragraph [ref=e161]: "Remote: If this position is listed as remote, there may still be occasions when you are required to work in person at a Booz Allen or customer facility."
            - listitem [ref=e162]:
              - paragraph [ref=e163]: "Hybrid: If this position is listed as hybrid, you will be expected to work from a Booz Allen facility frequently, in alignment with leadership expectations and the needs of the role. You may also be required to work from or visit a customer facility."
            - listitem [ref=e164]:
              - paragraph [ref=e165]: "Onsite: If this position is listed as onsite, work will primarily be performed at a Booz Allen office or customer facility, where employees will collaborate directly with colleagues and customers as required by the role."
          - paragraph [ref=e166]
          - paragraph [ref=e167]: Commitment to Non-Discrimination
          - paragraph [ref=e168]: All qualified applicants will receive consideration for employment without regard to disability, status as a protected veteran or any other status protected by applicable federal, state, local, or international law.
