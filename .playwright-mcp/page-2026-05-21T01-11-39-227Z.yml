        - generic [ref=e19]:
          - generic [ref=e20]:
            - paragraph [ref=e21]: Cerebras Systems builds the world's largest AI chip, 56 times larger than GPUs. Our novel wafer-scale architecture provides the AI compute power of dozens of GPUs on a single chip, with the programming simplicity of a single device. This approach allows Cerebras to deliver industry-leading training and inference speeds and empowers machine learning users to effortlessly run large-scale ML applications, without the hassle of managing hundreds of GPUs or TPUs.
            - paragraph [ref=e22]:
              - text: Cerebras' current customers include top model labs, global enterprises, and cutting-edge AI-native startups.
              - link "OpenAI recently announced a multi-year partnership with Cerebras" [ref=e23] [cursor=pointer]:
                - /url: https://openai.com/index/cerebras-partnership/
              - text: ", to deploy 750 megawatts of scale, transforming key workloads with ultra high-speed inference."
            - paragraph [ref=e24]: Thanks to the groundbreaking wafer-scale architecture, Cerebras Inference offers the fastest Generative AI inference solution in the world, over 10 times faster than GPU-based hyperscale cloud inference services. This order of magnitude increase in speed is transforming the user experience of AI applications, unlocking real-time iteration and increasing intelligence via additional agentic computation.
          - generic [ref=e25]:
            - heading "About The Role" [level=4] [ref=e26]
            - paragraph [ref=e27]: As an Applied Machine Learning Research Scientist at Cerebras, you will play a key role in turning modern machine learning techniques into scalable, high-performance systems. This role sits at the intersection of modeling and systems focused not on publishing new algorithms, but on understanding how they work and making them run effectively at scale. Your work will directly impact how large language models (LLMs) are trained, optimized, and deployed on one of the most advanced AI platforms in the world.
            - paragraph [ref=e28]: You will work closely with researchers and senior engineers to implement and improve workflows for LLM pretraining, fine-tuning, and reinforcement learning-based post-training. This includes building training pipelines, debugging complex system behaviors, improving model quality, and iterating on data and evaluation strategies. Your contributions will help translate cutting-edge ML ideas into reliable, production-ready systems that solve real-world problems.
            - paragraph [ref=e29]: This role is ideal for candidates who enjoy hands-on engineering, want to build deep intuition for ML systems, and are excited about working on LLMs and reinforcement learning in practice, not just in theory.
            - paragraph [ref=e30]:
              - strong [ref=e31]:
                - generic [ref=e32]: Responsibilities
            - list [ref=e33]:
              - listitem [ref=e34]: Apply post-training techniques (e.g. RLVR, RLHF, GRPO etc.) techniques to improve model performance.
              - listitem [ref=e35]: Build and maintain evaluation pipelines to measure model performance across tasks and domains.
              - listitem [ref=e36]: Debug issues across the ML stack, including data pipelines, training jobs, model outputs and mixed or lower precision computation.
              - listitem [ref=e37]: Collaborate with researchers to translate ML ideas into efficient, scalable implementation.
              - listitem [ref=e38]: Design, implement, and scale ML pipelines across all stages of LLM development (pretraining, fine-tuning, alignment).
              - listitem [ref=e39]: Work with large datasets, including dataset generation, filtering, and synthetic data approaches.
              - listitem [ref=e40]: Optimize training and inference workflows for performance, efficiency, and reliability.
              - listitem [ref=e41]: Contribute high-quality, maintainable code to shared ML infrastructure.
            - paragraph [ref=e42]:
              - strong [ref=e43]:
                - generic [ref=e44]: Skills & Qualifications
            - list [ref=e45]:
              - listitem [ref=e46]: Bachelor’s or Master’s degree in Computer Science, Engineering, or a related field.
              - listitem [ref=e47]: 0 - 5 years of experience (including internships, research, or industry experience) working with machine learning systems; we are hiring multiple positions for various levels.
              - listitem [ref=e48]: Strong programming skills in Python.
              - listitem [ref=e49]: Experience with ML frameworks such as PyTorch.
              - listitem [ref=e50]: Solid understanding of machine learning fundamentals.
              - listitem [ref=e51]: Familiarity with deep learning architectures, particularly transformers.
              - listitem [ref=e52]: Ability to read and understand modern ML papers and implement key ideas.
            - paragraph [ref=e53]:
              - strong [ref=e54]: Preferred Skills & Qualifications
            - list [ref=e55]:
              - listitem [ref=e56]: Experience working with large language models (training, fine-tuning, and evaluation).
              - listitem [ref=e57]: Familiarity with reinforcement learning concepts.
              - listitem [ref=e58]: Experience with distributed training frameworks (e.g., FSDP, Megatron).
              - listitem [ref=e59]: Experience working with large-scale datasets and data pipelines.
              - listitem [ref=e60]:
                - text: Experience debugging or optimizing ML systems for performance.
                - text: • Contributions to meaningful codebases, projects, or open-source systems
          - generic [ref=e61]:
            - heading "Why Join Cerebras" [level=4] [ref=e62]:
              - strong [ref=e63]: Why Join Cerebras
            - paragraph [ref=e64]: "People who are serious about software make their own hardware. At Cerebras we have built a breakthrough architecture that is unlocking new opportunities for the AI industry. With dozens of model releases and rapid growth, we’ve reached an inflection point in our business. Members of our team tell us there are five main reasons they joined Cerebras:"
            - list [ref=e65]:
              - listitem [ref=e66]: Build a breakthrough AI platform beyond the constraints of the GPU.
              - listitem [ref=e67]: Publish and open source their cutting-edge AI research.
              - listitem [ref=e68]: Work on one of the fastest AI supercomputers in the world.
              - listitem [ref=e69]: Enjoy job stability with startup vitality.
              - listitem [ref=e70]: Our simple, non-corporate work culture that respects individual beliefs.
            - paragraph [ref=e71]:
              - text: "Read our blog:"
              - link "Five Reasons to Join Cerebras in 2026." [ref=e72] [cursor=pointer]:
