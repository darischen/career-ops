            - paragraph [ref=e59]:
              - generic [ref=e60]: "About Us:"
            - paragraph [ref=e61]:
              - generic [ref=e62]: At Fullbay, our mission is simple — to create safer roads for our families and yours. As leaders in the heavy-duty repair industry, we power shops with technology that helps them run smarter and more efficiently. As an AI-First company, we invite artificial intelligence to eliminate friction, spark innovation, and drive efficiencies in every conversation— for our teams and our customers.
            - paragraph [ref=e63]:
              - generic [ref=e65]: "Position Overview:"
              - generic [ref=e66]: The Software Engineer I will design, code, and test software functions and modules, under the guidance of senior engineers. This junior role involves understanding problems, developing solutions, and engaging with key stakeholders to refine approaches. The successful candidate will write complete, efficient, and well-commented code that meets customer experience needs and project requirements. They will also create unit and feature tests to ensure compliance with performance, scalability, and security standards. Additionally, the engineer will address bugs within the product, continuously learn, and explore in-depth project requirements.
            - paragraph [ref=e67]: "Primary Duties & Responsibilities:"
            - list [ref=e68]:
              - listitem [ref=e69]: You develop a design (including system architecture, layout of services, APIs, backend and frontend changes) for your project and area, consider possible options to solve the problem, contribute to estimations while considering cost and long term impact of the design with support from senior engineers. You address currently planned use cases as well as required extensibility to support future applicable use cases. You review your design with your peers and collect feedback, incorporate it.
              - listitem [ref=e70]: You write software that consistently meets horizontal quality standards — scalability, performance, security, accessibility, and localizability — while building a working understanding of the cloud infrastructure your work runs on. With guidance, you apply the company's design principles, frameworks, and third-party tooling to your solutions, and you take ownership of identifying cross-system dependencies early, ensuring the services and integrations your code relies on are in place before you ship.
              - listitem [ref=e71]: You develop high quality code that is efficient (address space and time complexity), is modular, follows coding guidelines including naming conventions and other code etiquette. Your code is production-ready. You learn from your past mistakes and any future feedback reflects improvement in the quality of your code. The code reviews of your code progresses smoothly and with no fundamental issues in the logic, semantics and syntax.
              - listitem [ref=e72]: You solve problems that have ambiguity in requirements, risks, and conflicting constraints. You make good tradeoffs between short-term delivery and long-term maintainability of your organization’s architecture with guidance from senior teammates. You learn to recognize & identify risks that are not readily apparent and proactively take action to prevent problems before they occur.
              - listitem [ref=e73]: You drive bug fixing and resolution throughout the Product life cycle to ensure the stakeholders have a view of what sequence and order we fix issues. This includes all sources of bugs including feature testing and QA testing issues found, customer issues and pain points reported
              - listitem [ref=e74]: You test your work by creating unit and feature tests needed to complete the work and ensure it is ready for handing off to QA. You ensure your code is reviewed and you have incorporated the feedback appropriately with guidance from the senior engineer
              - listitem [ref=e75]: Adheres to all confidentiality and compliance regulations.
              - listitem [ref=e76]:
                - generic [ref=e77]: Performs other duties as assigned.
            - paragraph [ref=e78]: "Minimum Education & Work Experience:"
            - list [ref=e79]:
              - listitem [ref=e80]:
                - generic [ref=e81]: B.S in Computer Science or equivalent with 1-3 years of experience in developing design, code and testing software in modern systems and languages.
            - paragraph [ref=e83]: "Key Skills and Qualifications:"
            - list [ref=e84]:
              - listitem [ref=e85]: Growing proficiency in modern software design and programming paradigms, including Java, React, Dynamo, and AWS, among others
              - listitem [ref=e86]: Proficient using AI-assisted development tools (e.g., Claude Code, GitHub Copilot, Cursor) as part of your daily workflow
              - listitem [ref=e87]: Awareness and knowledge of Software Design and Coding methodologies
              - listitem [ref=e88]: Familiarity with development and design best practices, with a commitment to continuous learning
              - listitem [ref=e89]: Exposure to third-party technologies and a developing ability to evaluate tradeoffs when making software decisions
              - listitem [ref=e90]: Knowledge and experience with Development and Test methodologies and tools to develop design, code and test
              - listitem [ref=e91]: Contribute to the process and frameworks for how development will happen in Engineering
              - listitem [ref=e92]: Communicate clearly and professionally with peers & others throughout the company
              - listitem [ref=e93]:
                - generic [ref=e94]: Foundational understanding of Performance, Scale and Availability of software and modern capabilities like processor, caching and backend accelerators of performance
            - paragraph [ref=e95]: "Physical Demands and Work Environment:"
            - paragraph [ref=e96]: The physical demands described here are representative of those that must be met by an employee to successfully perform the essential functions of this job. Reasonable accommodations may be made to enable individuals with disabilities to perform the essential functions
            - list [ref=e97]:
              - listitem [ref=e98]: Regularly required to sit at a desk in front of a computer and use hands to finger, handle, or feel objects, tools, or controls (including a computer keyboard and operating a telephone), lift and/or move up to 10 pounds.
              - listitem [ref=e99]: Frequently requires the use of hands and arms for reaching, as well as the ability to walk and communicate effectively through speaking and listening.
              - listitem [ref=e100]: Specific vision abilities required by this position include close vision, color vision, and the ability to adjust focus.
              - listitem [ref=e101]: Noise level in the work environment is usually moderate.
              - listitem [ref=e102]: Type on a computer keyboard and look at a computer monitor, and operate a cell phone or a computer-based phone.
