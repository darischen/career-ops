            - paragraph [ref=e23]:
              - strong [ref=e24]: "About Us:"
            - paragraph [ref=e25]: Trusted and loved by 25 million educators, students, and families worldwide, Seesaw is the only elementary learning experience platform, offering a suite of award-winning tools, resources, and curriculum for teachers to deliver joyful, inclusive instruction. Through interactive lessons, digital portfolios, and two-way communication features, Seesaw keeps everyone in the learning loop by providing continuous visibility into the student's learning experience to support and celebrate their learning.
            - paragraph [ref=e26]
            - paragraph [ref=e27]:
              - strong [ref=e28]: "Our Mission:"
            - paragraph [ref=e29]: Seesaw’s mission is to provide every elementary student with joyful and connected learning experiences that lay the foundation for success in life.
            - paragraph [ref=e30]
            - paragraph [ref=e31]:
              - strong [ref=e32]: "Your Team:"
              - strong
            - paragraph [ref=e33]: You’ll join Seesaw’s Product-Led Growth (PLG) team, a highly cross-functional group of engineers, product managers, designers, and data partners focused on improving teacher activation, engagement, and monetization. This team works on some of the most visible and impactful parts of the product—onboarding, AI-powered experiences, and upgrade flows—and collaborates closely with International, Platform, and Classroom Product teams. It’s a fast-moving environment where engineers have strong ownership and a direct line to product and business outcomes.
            - paragraph [ref=e34]
            - paragraph [ref=e35]:
              - strong [ref=e36]: "Your Role:"
            - paragraph [ref=e37]: You’ll own and deliver product experiences that help teachers quickly realize value in Seesaw and deepen their usage over time. This includes building systems that drive activation, engagement, and monetization—from first-time onboarding to expansion into higher-tier plans. You’ll work closely with product, design, and data to ship and iterate on features that directly impact growth.
            - paragraph [ref=e38]
            - paragraph [ref=e39]:
              - strong [ref=e40]: "Your Responsibilities:"
            - list [ref=e41]:
              - listitem [ref=e42]: Deliver end-to-end product features that improve activation, engagement, and monetization
              - listitem [ref=e43]: Build and optimize onboarding and early user experiences to reduce time-to-value
              - listitem [ref=e44]: Design and implement scalable systems for AI-powered and growth-related features
              - listitem [ref=e45]: Partner with product, design, and data to run experiments and measure impact
              - listitem [ref=e46]: Use data and user insights to continuously improve product experiences
              - listitem [ref=e47]: Contribute to a high-quality codebase and mentor other engineers
            - paragraph [ref=e48]
            - paragraph [ref=e49]:
              - strong [ref=e50]: "Your Requirements:"
            - list [ref=e51]:
              - listitem [ref=e52]: Experience building and shipping production software (frontend, backend, or full-stack)
              - listitem [ref=e53]: Ability to independently own features or projects from concept to launch
              - listitem [ref=e54]: Comfort working in ambiguous problem spaces and making pragmatic decisions
              - listitem [ref=e55]: Experience collaborating with product and design partners
              - listitem [ref=e56]: Interest in building user-facing products that drive measurable impact
            - paragraph [ref=e57]
            - paragraph [ref=e58]:
              - strong [ref=e59]: "Compensation & Benefits:"
            - paragraph [ref=e60]: Our salary ranges are based on paying competitively for our size and industry. Salary is just one part of our total compensation package that includes equity, perks & benefits, and development opportunities at Seesaw. Individual pay decisions are based on several factors, including qualifications for the role, experience level, skillset, geography, and balancing internal equity relative to other Seesawers. It is our expectation that the majority of candidates who are offered roles at Seesaw will land well within our salary ranges based on these factors.
            - paragraph [ref=e61]
            - paragraph [ref=e62]: "The Annual base salary range for this position is: $172,500 - $200,000"
            - paragraph [ref=e63]: This is an Exempt position.
            - paragraph [ref=e64]: "Benefits include: Medical/Dental + Orthodontics/Vision Coverage, 401k Match, Flexible Paid Time Off, Mindfulness First Fridays, Monthly Technology Stipend, Home Office Setup Stipend, Professional Development Stipend, Paid Parental Leave, Charitable Donation Matching, Volunteer Days."
            - paragraph [ref=e65]: Seesaw cares about building a diverse and inclusive team to better advocate for the needs of our incredibly diverse K-12 users.
            - paragraph [ref=e66]
            - paragraph [ref=e67]: We prioritize work-life balance and actually walk the walk — we care a lot about our work, but care more about our employee's well-being. We encourage everyone to work at a sustainable pace and have a flexible vacation policy that people actually use.
            - paragraph [ref=e68]
            - paragraph [ref=e69]: Seesaw provides equal employment opportunities (EEO) to all employees and applicants for employment without regard to race, religious creed, color, sex, sex stereotype, gender, gender identity/gender expression/transgender, national origin, ancestry, physical or mental disability, medical condition, genetic information/characteristics, marital status/registered domestic partner status, age, sexual orientation, or military or veteran status. In addition to federal law requirements, Seesaw complies with applicable state and local laws governing nondiscrimination in employment in every location in which the company has facilities. This policy applies to all terms and conditions of employment, including recruiting, hiring, placement, promotion, termination, layoff, recall, transfer, leaves of absence, compensation, and training.
            - paragraph [ref=e70]
            - paragraph [ref=e71]:
