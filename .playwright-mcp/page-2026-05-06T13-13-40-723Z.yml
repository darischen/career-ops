              - text: "- 0+ years of related professional experience."
            - listitem [ref=e155]: Experience with server-side Java development, ideally including exposure to Java EE/Jakarta EE, WildFly, EJBs, or Spring / Spring Boot
            - listitem [ref=e156]: Proficiency with server-side languages, with a strong emphasis on Java; experience with C#, NodeJS, or Python is a plus
            - listitem [ref=e157]: Familiarity with APIs particularly RESTful APIs, including designing, implementing, or consuming REST services
            - listitem [ref=e158]: Familiarity with relational databases and SQL, such as Microsoft SQL Server, PostgreSQL, or MySQL
            - listitem [ref=e159]: Proficiency in JavaScript, HTML, and CSS, with exposure to React and ideally MUI (Material UI) for front-end development
            - listitem [ref=e160]: Comfortable working in both Windows and Linux environments
            - listitem [ref=e161]: Familiarity with version control systems, especially Git
            - listitem [ref=e162]: Demonstrated problem-solving skills; ability to identify issues, analyze root causes, and construct solutions
            - listitem [ref=e163]: Self-driven, motivated, and able to work both independently and as part of a team
            - listitem [ref=e164]: Excellent oral and written communication skills
            - listitem [ref=e165]: Willingness to learn, adapt, and grow in a full-stack Java development environment
