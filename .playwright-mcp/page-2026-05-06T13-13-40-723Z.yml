            - generic [ref=e107]: "Job Description:"
          - paragraph [ref=e108]: The Parsons Smart Mobility team is seeking a talented Full-Stack Software Developer to join our team! In this role, you will have the opportunity to expand your skills and knowledge as a software developer, working alongside excellent mentors.
          - paragraph [ref=e109]
          - paragraph [ref=e110]: "What You’ll Be Doing:"
          - list [ref=e111]:
            - listitem [ref=e112]:
              - text: Full-Stack Web Application Development
              - list [ref=e113]:
                - listitem [ref=e114]: Design, develop, test, and maintain web-based applications end-to-end using Java on the server side and JavaScript/React on the client side.
                - listitem [ref=e115]: Implement new features and improve existing ones across the full stack (database, APIs, backend, frontend).
            - listitem [ref=e116]:
              - text: Server-Side Java Development
              - list [ref=e117]:
                - listitem [ref=e118]:
                  - text: "Develop and maintain backend services using Java, including:"
                  - list [ref=e119]:
                    - listitem [ref=e120]: WildFly application server
                    - listitem [ref=e121]: Enterprise Java Beans (EJBs) and related Java EE/Jakarta EE technologies
                    - listitem [ref=e122]: Spring or Spring Boot application server
                - listitem [ref=e123]: Implement business logic, data access layers, and integration points with other services.
            - listitem [ref=e124]:
              - text: API Development
              - list [ref=e125]:
                - listitem [ref=e126]: Design, implement, and consume RESTful APIs for communication between front-end applications and backend services.
                - listitem [ref=e127]: Work with JSON-based request/response payloads and standard HTTP methods and status codes.
            - listitem [ref=e128]:
              - text: Front-End Development (React & MUI)
              - list [ref=e129]:
                - listitem [ref=e130]:
                  - text: "Build responsive, user-friendly interfaces using:"
                  - list [ref=e131]:
                    - listitem [ref=e132]: React for component-based front-end development
                    - listitem [ref=e133]: MUI (Material UI) for consistent, modern UI components
                    - listitem [ref=e134]: Core web technologies including JavaScript, HTML, and CSS
                - listitem [ref=e135]: Ensure cross-browser compatibility, accessibility, and a high-quality user experience.
            - listitem [ref=e136]:
              - text: Database and SQL Development
              - list [ref=e137]:
                - listitem [ref=e138]:
                  - text: "Work with relational databases including:"
                  - list [ref=e139]:
                    - listitem [ref=e140]: Microsoft SQL Server
                    - listitem [ref=e141]: PostgreSQL
                    - listitem [ref=e142]: MySQL
                - listitem [ref=e143]: Write and optimize SQL queries, stored procedures, and database schemas to support application features and performance requirements.
            - listitem [ref=e144]:
              - text: Additional Technologies & Responsibilities
              - list [ref=e145]:
                - listitem [ref=e146]: Collaborate with cross-functional teams (product, QA, DevOps, UX) in an Agile environment.
                - listitem [ref=e147]: Apply best coding practices, participate in code reviews, and contribute to continuous improvement.
                - listitem [ref=e148]: Work with other technologies as needed, such as NodeJS, .NET, Python, HTML, CSS, JavaScript
                - listitem [ref=e149]: Leverage machine learning or other AI related tool and technologies during the development and deployment phases
                - listitem [ref=e150]: Implement application-level security, basic performance tuning, and error handling.
          - paragraph [ref=e151]
          - paragraph [ref=e152]: "What Qualifications You’ll Bring:"
          - list [ref=e153]:
            - listitem [ref=e154]:
