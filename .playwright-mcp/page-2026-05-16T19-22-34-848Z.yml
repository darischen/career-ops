          - generic [ref=e21]:
            - heading "About Hightouch" [level=1] [ref=e22]
            - paragraph [ref=e23]: Hightouch is an Agentic Marketing Platform powered by the industry-leading Composable CDP. With complete brand context, customer data, and performance history in one place, every marketer finally has the power to build and ship end-to-end campaigns themselves. Teams move faster, stay on brand, and get AI marketing that actually works.
            - paragraph [ref=e24]: Founded in 2019 and headquartered in San Francisco, Hightouch enables marketing teams to analyze performance, brainstorm ideas, and generate creative at a speed and quality that wasn't previously possible.
            - paragraph [ref=e25]: Named a Leader in the 2026 Gartner® Magic Quadrant™ for Customer Data Platforms, Hightouch is trusted by leading enterprises like Domino's, Spotify, Aritzia, Cars.com, Ramp, and PetSmart.
            - paragraph [ref=e26]: At Hightouch, our mission is to help our customers leverage data and AI to grow their businesses. The team is ambitious, impact-driven, efficient — and we believe humility, kindness, and compassion are essential to our success. If you're energized by velocity, obsessed with raising the bar, and want to build alongside people who care deeply about each other and our customers, we'd love to meet you.
          - generic [ref=e27]:
            - heading "About The Role" [level=2] [ref=e28]
            - paragraph [ref=e29]: AI is changing how GTM teams operate. Most companies are responding by buying a few licenses and hoping for the best. We want to do something different.
            - paragraph [ref=e30]: We're hiring a GTM AI Operations lead to embed within our RevOps team and rewire how our sales, marketing, and CS teams work. You'll find the biggest opportunities for agentic automation across the GTM org, build the workflows, own the context layer that makes AI actually useful, and make sure the whole team knows how to use what you build.
            - paragraph [ref=e31]: This space moves weekly, not quarterly. We need someone who's obsessed with staying on the edge of what's possible and has the instinct to turn what they learn into something the team can use tomorrow. You're equal parts builder and teacher.
            - heading "What You'll Do" [level=2] [ref=e32]
            - list [ref=e33]:
              - listitem [ref=e34]: Audit GTM workflows across sales, marketing, and CS to identify high-impact opportunities for AI and agentic automation.
              - listitem [ref=e35]: Design and build agentic workflows using tools like Clay, Claude, and Hightouch that replace manual busywork and accelerate pipeline
              - listitem [ref=e36]: Own the AI context layer. Build and maintain Claude skills, Glean knowledge resources, knowledge graphs, and other systems that make our AI tools smarter over time
              - listitem [ref=e37]: Stay obsessively current on new AI releases, models, and tooling. Prototype fast, cut what doesn't work, and bring what does back to the team
              - listitem [ref=e38]: Lead enablement across GTM teams. Train reps, marketers, and CSMs on new AI-powered workflows and drive sustained adoption.
              - listitem [ref=e39]: Work closely with the RevOps and Systems team to make sure everything you build plugs cleanly into the existing stack
            - heading "Who You Are" [level=2] [ref=e40]
            - list [ref=e41]:
              - listitem [ref=e42]: You've probably already built something with Clay or Claude that nobody asked you to build
              - listitem [ref=e43]: You've worked in RevOps, GTM Operations, or Solutions Engineering and understand how go-to-market teams actually operate day-to-day
              - listitem [ref=e44]: You're a learner first. You stay on top of AI releases, you experiment constantly, and you get excited when a new model drops because you immediately see how it applies
              - listitem [ref=e45]: You're also a natural teacher. You can take something complex and make it click for a rep who just wants to know how to close faster
              - listitem [ref=e46]: You're comfortable with APIs, prompts, and stitching tools together
              - listitem [ref=e47]: You thrive when there's no playbook. This role is new and you'll be writing the rules as you go
            - heading "Nice To Have" [level=2] [ref=e48]
            - list [ref=e49]:
              - listitem [ref=e50]: Experience building enrichment and outreach workflows with Clay
              - listitem [ref=e51]: Experience building with Claude, including skills, custom prompts, and agentic workflows
              - listitem [ref=e52]: Familiarity with knowledge graphs and building AI context layers (Glean, vector search, RAG systems)
              - listitem [ref=e53]: Background at a data or developer tools company
              - listitem [ref=e54]: Experience with Hightouch or the composable CDP / data activation ecosystem
              - listitem [ref=e55]: You've run internal enablement or training programs before and people actually showed up to the second session
            - heading "Compensation" [level=2] [ref=e56]
            - paragraph [ref=e57]: Hightouch's on-target earnings range for this position is $160,000 - $200,000 USD per year. We also offer meaningful equity compensation in the form of ISO options, and offer early exercise and a 10-year post-termination exercise window.
