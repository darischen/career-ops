        - separator [ref=e109]
        - heading "Voluntary self-identification of disability" [level=4] [ref=e110]
        - paragraph [ref=e111]: Form CC-305 / OMB Control Number 1250-0005 / Expires 04/30/2026
        - heading "Why are you being asked to complete this form?" [level=5] [ref=e112]
        - paragraph [ref=e113]: We are a federal contractor or subcontractor. The law requires us to provide equal employment opportunity to qualified people with disabilities. We have a goal of having at least 7% of our workers as people with disabilities. The law says we must measure our progress towards this goal. To do this, we must ask applicants and employees if they have a disability or have ever had one. People can become disabled, so we need to ask this question at least every five years.
        - paragraph [ref=e114]:
          - text: Completing this form is voluntary, and we hope that you will choose to do so. Your answer is confidential. No one who makes hiring decisions will see it. Your decision to complete the form and your answer will not harm you in any way. If you want to learn more about the law or this form, visit the U.S. Department of Labor’s Office of Federal Contract Compliance Programs (OFCCP) website at
          - link "www.dol.gov/ofccp" [ref=e115] [cursor=pointer]:
            - /url: http://www.dol.gov/ofccp
          - text: .
        - heading "How do you know if you have a disability?" [level=5] [ref=e116]
        - paragraph [ref=e117]: "A disability is a condition that substantially limits one or more of your “major life activities.” If you have or have ever had such a condition, you are a person with a disability. Disabilities include, but are not limited to:"
        - list [ref=e118]:
          - listitem [ref=e119]: Alcohol or other substance use disorder (not currently using drugs illegally)
          - listitem [ref=e120]: Autoimmune disorder, for example, lupus, fibromyalgia, rheumatoid arthritis, HIV/AIDS
          - listitem [ref=e121]: Blind or low vision
          - listitem [ref=e122]: Cancer (past or present)
          - listitem [ref=e123]: Cardiovascular or heart disease
          - listitem [ref=e124]: Celiac disease
          - listitem [ref=e125]: Cerebral palsy
          - listitem [ref=e126]: Deaf or serious difficulty hearing
          - listitem [ref=e127]: Diabetes
          - listitem [ref=e128]: Disfigurement, for example, disfigurement caused by burns, wounds, accidents, or congenital disorders
          - listitem [ref=e129]: Epilepsy or other seizure disorder
          - listitem [ref=e130]: Gastrointestinal disorders, for example, Crohn's Disease, irritable bowel syndrome
          - listitem [ref=e131]: Intellectual or developmental disability
          - listitem [ref=e132]: Mental health conditions, for example, depression, bipolar disorder, anxiety disorder, schizophrenia, PTSD
          - listitem [ref=e133]: Missing limbs or partially missing limbs
          - listitem [ref=e134]: Mobility impairment, benefiting from the use of a wheelchair, scooter, walker, leg brace(s) and/or other supports
          - listitem [ref=e135]: Nervous system condition, for example, migraine headaches, Parkinson’s disease, multiple sclerosis (MS)
          - listitem [ref=e136]: Neurodivergence, for example, attention-deficit/hyperactivity disorder (ADHD), autism spectrum disorder, dyslexia, dyspraxia, other learning disabilities
          - listitem [ref=e137]: Partial or complete paralysis (any cause)
          - listitem [ref=e138]: Pulmonary or respiratory conditions, for example, tuberculosis, asthma, emphysema
          - listitem [ref=e139]: Short stature (dwarfism)
          - listitem [ref=e140]: Traumatic brain injury
