        - separator [ref=e230]
        - heading "U.S. Equal Employment Opportunity information (Completion is voluntary and will not subject you to adverse treatment)" [level=4] [ref=e231]
        - paragraph [ref=e232]: Hermeus provides equal employment opportunities to applicants and employees without regard to race, color, religion, sex, sexual orientation, gender identity, national origin, protected veteran status, or disability.
        - paragraph [ref=e233]: Hermeus is a federal contractor or subcontractor subject to certain governmental recordkeeping and reporting requirements for the administration of civil right laws and regulations. Employment decisions are made on the basis of job-related criteria without regard to race, ethnicity, color, religion, sex, sexual orientation, gender identity, marital status, age, genetic information, national origin, disability, military, or veteran status, or any other classification protected by applicable law.
        - paragraph [ref=e234]: We invite all applicants to voluntarily self-identify their race, ethnicity, and/or gender. Submission of the information on this form is strictly voluntary and refusal to provide it will not subject you to any adverse treatment. Information obtained will be retained in a confidential file and separate from personnel records. This information may only be used in accordance with the provision of applicable federal laws, executive orders, and regulations. If you want more information about any of the sections, please check with a company representative.
