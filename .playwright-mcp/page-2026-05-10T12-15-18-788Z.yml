        - separator [ref=e252]
        - heading "Self-identification of veteran status (Completion is voluntary and will not subject you to adverse treatment)" [level=4] [ref=e253]
        - paragraph [ref=e254]: "Hermeus is a Government contractor subject to the Section 4212 of the Vietnam Era Veterans’ Readjustment Assistance Act of 1974, as amended by the Jobs for Veterans Act of 2002, which requires Government contractors to take affirmative action to employ and advance in employment: (1) Disabled veterans – A veteran who served on active duty in the U.S. military and is entitled to disability compensation (or who but for the receipt of military retired pay would be entitled to disability compensation) under laws administered by the Secretary of Veterans Affairs, or was discharged or released from active duty because of a service-connected disability; (2) Recently separated veteran – A veteran separated during the three-year period beginning on the date of the veteran's discharge or release from active duty in the U.S military, ground, naval, or air service; (3) Active duty wartime or campaign badge veteran – A veteran who served on active duty in the U.S. military during a war, or in a campaign or expedition for which a campaign badge was authorized under the laws administered by the Department of Defense; (4) Armed forces service medal veteran – A veteran who, while serving on active duty in the U.S. military ground, naval, or air service, participated in a United States military operation for which an Armed Forces service medal was awarded pursuant to Executive Order 12985 (61 Fed. Reg. 1209). If you believe that you belong to any of the categories of protected veterans, please indicate by making the appropriate selection."
        - generic [ref=e256]:
          - generic [ref=e257]: Veteran status
          - combobox "Veteran status" [ref=e260]:
            - option "Select ..." [selected]
            - option "I identify as one or more of the classifications of protected veteran listed above"
            - option "I am not a protected veteran"
            - option "I decline to self-identify for protected veteran status"
        - separator [ref=e261]
        - heading "Voluntary self-identification of disability" [level=4] [ref=e262]
        - paragraph [ref=e263]: Form CC-305 / OMB Control Number 1250-0005 / Expires 04/30/2026
        - heading "Why are you being asked to complete this form?" [level=5] [ref=e264]
        - paragraph [ref=e265]: We are a federal contractor or subcontractor. The law requires us to provide equal employment opportunity to qualified people with disabilities. We have a goal of having at least 7% of our workers as people with disabilities. The law says we must measure our progress towards this goal. To do this, we must ask applicants and employees if they have a disability or have ever had one. People can become disabled, so we need to ask this question at least every five years.
        - paragraph [ref=e266]:
          - text: Completing this form is voluntary, and we hope that you will choose to do so. Your answer is confidential. No one who makes hiring decisions will see it. Your decision to complete the form and your answer will not harm you in any way. If you want to learn more about the law or this form, visit the U.S. Department of Labor’s Office of Federal Contract Compliance Programs (OFCCP) website at
          - link "www.dol.gov/ofccp" [ref=e267] [cursor=pointer]:
            - /url: http://www.dol.gov/ofccp
          - text: .
        - heading "How do you know if you have a disability?" [level=5] [ref=e268]
        - paragraph [ref=e269]: "A disability is a condition that substantially limits one or more of your “major life activities.” If you have or have ever had such a condition, you are a person with a disability. Disabilities include, but are not limited to:"
        - list [ref=e270]:
          - listitem [ref=e271]: Alcohol or other substance use disorder (not currently using drugs illegally)
          - listitem [ref=e272]: Autoimmune disorder, for example, lupus, fibromyalgia, rheumatoid arthritis, HIV/AIDS
          - listitem [ref=e273]: Blind or low vision
          - listitem [ref=e274]: Cancer (past or present)
          - listitem [ref=e275]: Cardiovascular or heart disease
          - listitem [ref=e276]: Celiac disease
          - listitem [ref=e277]: Cerebral palsy
          - listitem [ref=e278]: Deaf or serious difficulty hearing
          - listitem [ref=e279]: Diabetes
          - listitem [ref=e280]: Disfigurement, for example, disfigurement caused by burns, wounds, accidents, or congenital disorders
          - listitem [ref=e281]: Epilepsy or other seizure disorder
          - listitem [ref=e282]: Gastrointestinal disorders, for example, Crohn's Disease, irritable bowel syndrome
          - listitem [ref=e283]: Intellectual or developmental disability
          - listitem [ref=e284]: Mental health conditions, for example, depression, bipolar disorder, anxiety disorder, schizophrenia, PTSD
          - listitem [ref=e285]: Missing limbs or partially missing limbs
          - listitem [ref=e286]: Mobility impairment, benefiting from the use of a wheelchair, scooter, walker, leg brace(s) and/or other supports
          - listitem [ref=e287]: Nervous system condition, for example, migraine headaches, Parkinson’s disease, multiple sclerosis (MS)
          - listitem [ref=e288]: Neurodivergence, for example, attention-deficit/hyperactivity disorder (ADHD), autism spectrum disorder, dyslexia, dyspraxia, other learning disabilities
          - listitem [ref=e289]: Partial or complete paralysis (any cause)
          - listitem [ref=e290]: Pulmonary or respiratory conditions, for example, tuberculosis, asthma, emphysema
          - listitem [ref=e291]: Short stature (dwarfism)
          - listitem [ref=e292]: Traumatic brain injury
