            - heading "Job Description Summary" [level=1] [ref=e68]:
              - generic [ref=e71]: Job Description Summary
            - text: GE Vernova is seeking a AI Engineer to support the development and deployment of AI-driven systems that enable intelligent automation across AEMS, ADMS, and DERMS applications. This is a hands-on role ideal for early-career engineers looking to build experience in AI systems, backend development, and real-time grid applications.
            - text: You will work alongside other Engineers to design, develop, and maintain AI-powered services and components that integrate with grid data platforms and operational systems.
            - paragraph
            - paragraph
            - paragraph
            - heading "Job Description" [level=1] [ref=e72]:
              - generic [ref=e73]: Job Description
            - paragraph [ref=e74]:
              - generic [ref=e75]: "Responsibilities:"
            - list [ref=e76]:
              - listitem [ref=e77]:
                - paragraph [ref=e78]: Assist in developing components of AI agent frameworks, including orchestration workflows, tool integrations, and basic state management.
              - listitem [ref=e79]:
                - paragraph [ref=e80]: Build and maintain backend services in Python (or Java/Go/C++) to support AI inference and data processing.
              - listitem [ref=e81]:
                - paragraph [ref=e82]: Support development of LLM-based applications, including prompt design, tool usage, and evaluation workflows.
              - listitem [ref=e83]:
                - paragraph [ref=e84]: Contribute to model integration and deployment, including working with APIs and inference endpoints.
              - listitem [ref=e85]:
                - paragraph [ref=e86]: Help develop microservices and data pipelines for processing time-series and streaming data.
              - listitem [ref=e87]:
                - paragraph [ref=e88]: Assist in integrating AI services with grid systems such as SCADA and simulation tools.
              - listitem [ref=e89]:
                - paragraph [ref=e90]: Participate in performance tuning and debugging of distributed systems under guidance.
              - listitem [ref=e91]:
                - paragraph [ref=e92]: Contribute to CI/CD pipelines, testing, and monitoring for AI services.
              - listitem [ref=e93]:
                - paragraph [ref=e94]: Implement logging and basic explainability features for AI outputs.
              - listitem [ref=e95]:
                - paragraph [ref=e96]: Collaborate in code reviews and contribute to shared codebases following engineering best practices.
            - paragraph
            - paragraph [ref=e97]:
              - generic [ref=e98]: "Requirements:"
            - list [ref=e99]:
              - listitem [ref=e100]:
                - paragraph [ref=e101]: Bachelor’s or Master’s degree in Computer Science, AI/ML, or a related field.
              - listitem [ref=e102]:
                - paragraph [ref=e103]: 0–3 years of software development or AI/ML experience (internships/projects included).
            - paragraph
            - paragraph [ref=e104]:
              - generic [ref=e105]: "Preferred:"
            - list [ref=e106]:
              - listitem [ref=e107]:
                - paragraph [ref=e108]: Proficiency in Python; exposure to Java, C++, or Go is a plus.
              - listitem [ref=e109]:
                - paragraph [ref=e110]: Basic understanding of machine learning concepts and LLM applications.
              - listitem [ref=e111]:
                - paragraph [ref=e112]: Familiarity with APIs, backend development, and microservices concepts.
              - listitem [ref=e113]:
                - paragraph [ref=e114]: Exposure to cloud, containers (Docker), or orchestration (Kubernetes) is a plus.
              - listitem [ref=e115]:
                - paragraph [ref=e116]: Understanding of data structures, algorithms, and software engineering fundamentals.
              - listitem [ref=e117]:
                - paragraph [ref=e118]: Interest in distributed systems and real-time data processing.
              - listitem [ref=e119]:
                - paragraph [ref=e120]: Familiarity with power systems (EMS, DMS, SCADA) is a plus but not required.
            - paragraph
            - paragraph [ref=e121]:
              - generic [ref=e122]: "What You’ll Gain:"
            - list [ref=e123]:
              - listitem [ref=e124]:
                - paragraph [ref=e125]: Hands-on experience building production AI systems in a mission-critical domain.
              - listitem [ref=e126]:
                - paragraph [ref=e127]: Mentorship from experienced engineers in AI, distributed systems, and grid software.
              - listitem [ref=e128]:
                - paragraph [ref=e129]: Exposure to real-world applications of AI in energy and infrastructure.
              - listitem [ref=e130]:
                - paragraph [ref=e131]: Opportunities to grow into more advanced engineering roles.
