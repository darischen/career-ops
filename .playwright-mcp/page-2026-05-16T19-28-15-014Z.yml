            - text: For candidates applying to a U.S. based position, the pay range for this position is between $108,560.00 and $162,840.00. The Company pays a geographic differential of 110%, 120% or 130% of salary in certain areas. The specific pay offered may be influenced by a variety of factors, including the candidate’s experience, education, and skill set.
