        - tabpanel "Overview" [ref=e35]:
          - generic [ref=e36]:
            - paragraph [ref=e37]: Are you passionate about bringing cutting-edge robotics into real-world environments and delivering exceptional customer experiences? Do you thrive at the intersection of technology and people, where every deployment is an opportunity to build trust and drive impact? At Cobot, our Deployment Engineers are on the front lines—partnering closely with customers to ensure seamless rollouts, solve complex challenges in real time, and turn first deployments into long-term success stories. This role is ideal for someone who combines strong technical instincts with outstanding communication and relationship-building skills, and who is excited to shape how collaborative robots (cobots) are introduced, adopted, and scaled across diverse industries. This role is intended to support programs subject to U.S. export control regulations – specifically, ITAR export compliance restrictions. Candidates must be able to meet U.S. person status requirements at the time of hire.
            - paragraph [ref=e38]
            - paragraph [ref=e39]: Join us to reimagine the future of human-robot interaction.
            - paragraph [ref=e40]
            - paragraph [ref=e41]: Collaborative Robotics is a team of innovators and builders redefining the future of human-robot interaction. We are working to realize a world where robots are a trusted extension of your surroundings. They work, adapt, and react around you. Not the other way around.
            - paragraph [ref=e42]
            - paragraph [ref=e43]: We're hiring virtually in the US (preference towards the Midwest region), and require close proximity to a major airport. Must be willing and able to travel 75-90% of the time.
            - paragraph [ref=e44]
            - paragraph [ref=e45]:
              - strong [ref=e46]: "Key Responsibilities:"
            - list [ref=e47]:
              - listitem [ref=e48]:
                - paragraph [ref=e49]: Deliver exceptional deployment support and elevate the customer experience.
              - listitem [ref=e50]:
                - paragraph [ref=e51]: Lead onsite hardware and software testing to ensure optimal cobot performance.
              - listitem [ref=e52]:
                - paragraph [ref=e53]: Troubleshoot, document, and resolve issues to enhance system reliability, and user experience.
              - listitem [ref=e54]:
                - paragraph [ref=e55]: Perform parts replacements and robot retrofits to maintain high operational standards.
              - listitem [ref=e56]:
                - paragraph [ref=e57]: Build and maintain strong customer relationships grounded in trust, reliability and mutual success.
              - listitem [ref=e58]:
                - paragraph [ref=e59]: Prepare sites for deployment through readiness assessments, checklists, and testing.
              - listitem [ref=e60]:
                - paragraph [ref=e61]: Create clear operational and technical documentation to build a foundation for excellence.
              - listitem [ref=e62]:
                - paragraph [ref=e63]: Partner with Program Manager to drive consistent communication and project progress.
            - paragraph [ref=e64]
            - paragraph [ref=e65]:
              - strong [ref=e66]: "Minimum Qualifications:"
            - list [ref=e67]:
              - listitem [ref=e68]:
                - paragraph [ref=e69]: Bachelor’s Degree in Engineering (Mechanical, Electrical, Industrial) or Supply Chain Management.
              - listitem [ref=e70]:
                - paragraph [ref=e71]: A customer-first mindset with proven success in building positive relationships.
              - listitem [ref=e72]:
                - paragraph [ref=e73]: Proficiency in Linux, Python, and Git or equivalent version control tools.
              - listitem [ref=e74]:
                - paragraph [ref=e75]: Hands-on experience in electrical and mechanical debugging.
              - listitem [ref=e76]:
                - paragraph [ref=e77]: A data-oriented approach, with skills in data visualization or presentation.
              - listitem [ref=e78]:
                - paragraph [ref=e79]: Previous experience deploying and integrating systems into logistics, healthcare, or manufacturing industry.
              - listitem [ref=e80]:
                - paragraph [ref=e81]: Highly motivated teammate with excellent oral and written communication skills.
              - listitem [ref=e82]:
                - paragraph [ref=e83]: Enjoy working in a fast paced, collaborative and dynamic start-up environment as part of a small team.
              - listitem [ref=e84]:
                - paragraph [ref=e85]: Willingness to travel (90-100%) for on-site deployments.
              - listitem [ref=e86]:
                - paragraph [ref=e87]: Candidates must be able to meet all US person status requirements at the time of hire.
            - paragraph [ref=e88]
            - paragraph [ref=e89]:
              - strong [ref=e90]: "Preferred Qualifications:"
            - list [ref=e91]:
              - listitem [ref=e92]:
                - paragraph [ref=e93]: Experience with ROS or similar robotic operating systems.
              - listitem [ref=e94]:
                - paragraph [ref=e95]: Comprehensive understanding of both hardware and software in complex robotic systems.
              - listitem [ref=e96]:
                - paragraph [ref=e97]: Basic networking skills, including familiarity with WiFi and VPN.
              - listitem [ref=e98]:
                - paragraph [ref=e99]: Ability to leverage AI tools to automate repetitive tasks, improving efficiency and reliability.
              - listitem [ref=e100]:
                - paragraph [ref=e101]: Skilled in creating detailed operational workflows, training materials, and documentation.
              - listitem [ref=e102]:
                - paragraph [ref=e103]: Prior experience in managing deployment programs or deploying robotic systems, with strong project management skills.
              - listitem [ref=e104]:
                - paragraph [ref=e105]: Experience working with and configuring JIRA.
              - listitem [ref=e106]:
                - paragraph [ref=e107]: Innovative problem-solving skills, with a history of streamlining deployment processes.
            - paragraph [ref=e108]
            - paragraph [ref=e109]:
              - emphasis [ref=e110]: The annual base salary range for this position is $110,000 - $145,000 plus equity and comprehensive benefits including medical/dental/vision plans, 401(k) plan, unlimited paid vacation time, paid sick leave, and parental leave. Our salary ranges are determined by role and experience level. The range reflects the minimum and maximum target for new hire salaries for the position in the noted geographic area. Within the range, individual pay is determined by additional factors, including job-related skills, experience, and relevant education or training.
            - paragraph [ref=e111]
            - paragraph [ref=e112]:
              - emphasis [ref=e113]: Cobot is an Equal Opportunity Employer. All qualified applicants will receive consideration for employment without regard to legally protected characteristics. We are committed to providing reasonable accommodations for candidates with disabilities in our recruiting process. If you need any assistance or accommodations due to a disability, please let your recruiter know.
            - paragraph [ref=e114]
