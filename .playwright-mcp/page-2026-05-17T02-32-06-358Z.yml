          - generic [ref=e35]:
            - paragraph [ref=e36]:
              - emphasis [ref=e37]: Spellbook is the most comprehensive AI copilot for transactional lawyers. It works directly inside Microsoft Word to help legal teams draft, review, and negotiate contracts up to 10x faster and with greater precision. Today, more than 4,000 law firms, in-house teams, and solo practitioners rely on Spellbook to simplify their workflows and eliminate the drudgery of everyday contract work.
            - paragraph [ref=e38]:
              - emphasis [ref=e39]: We are backed by leading investors including Khosla Ventures, Thomson Reuters Ventures, Inovia Capital, The LegalTech Fund, Bling Capital, and Moxxie Ventures. The company recently raised $50 million in Series B funding, led by Keith Rabois at Khosla Ventures, bringing its total funding to more than $80 million.
            - paragraph [ref=e40]
            - paragraph [ref=e41]:
              - emphasis [ref=e42]:
                - strong [ref=e43]: "*This is an existing vacancy"
            - paragraph [ref=e44]
            - heading "ABOUT THE ROLE" [level=2] [ref=e45]:
              - strong [ref=e46]: ABOUT THE ROLE
            - paragraph [ref=e47]: Spellbook is seeking a Forward Deployed Engineer to join our team. In this role, you’ll work directly with large law firms and in-house legal teams to integrate Spellbook into real-world enterprise environments and workflows. You’ll be responsible for deploying and customizing AI-powered systems that integrate seamlessly with document management systems, internal tools, knowledge stores, identity systems, and other enterprise infrastructure.
            - paragraph [ref=e48]: "As a Forward Deployed Engineer, you’ll be a critical member of our growing engineering team. You’ll operate at the intersection of engineering, product, and customer success, with a focus on three key areas:"
            - list [ref=e49]:
              - listitem [ref=e50]:
                - paragraph [ref=e51]:
                  - strong [ref=e52]: "Owning enterprise deployments:"
                  - text: Partner closely with customers to understand legal workflows and technical environments. Lead end-to-end implementation of Spellbook in complex enterprise organizations and translate ambiguous requirements into production-ready systems.
              - listitem [ref=e53]:
                - paragraph [ref=e54]:
                  - strong [ref=e55]: "Building AI-native workflows:"
                  - text: Design and implement workflow-heavy solutions that integrate cleanly into enterprise tools and processes, including approvals, permissions, routing, auditability, and review loops.
              - listitem [ref=e56]:
                - paragraph [ref=e57]:
                  - strong [ref=e58]: "Driving customer impact:"
                  - text: Work directly with end users to iterate quickly on feedback, improve adoption, and identify repeatable patterns that help shape the future direction of the platform.
            - paragraph [ref=e59]
            - heading "THE TECH STACK" [level=2] [ref=e60]:
              - strong [ref=e61]: THE TECH STACK
            - paragraph [ref=e62]: Node.js, TypeScript, Express, tRPC, MongoDB, Docker, AWS, CDK, LLM providers (OpenAI, Anthropic, and others)
            - paragraph [ref=e63]
            - heading "RESPONSIBILITIES" [level=2] [ref=e64]:
              - strong [ref=e65]: RESPONSIBILITIES
            - list [ref=e66]:
              - listitem [ref=e67]:
                - paragraph [ref=e68]: "Own enterprise deployments end-to-end: Partner with customers to understand legal workflows and technical environments; lead implementations in complex organizations; translate ambiguous requirements into production systems."
              - listitem [ref=e69]:
                - paragraph [ref=e70]: "Build integrations and AI-native workflows: Integrate Spellbook with document management systems (e.g. iManage, NetDocuments), identity systems, and internal APIs. Design and implement workflow-heavy solutions (approvals, routing, permissions, auditability) tailored to real enterprise constraints and tools."
              - listitem [ref=e71]:
                - paragraph [ref=e72]: "Tailor and extend the product for customers: Tune model inference, augment context, and adapt the product experience to meet specific customer needs across deployments."
              - listitem [ref=e73]:
                - paragraph [ref=e74]: "Drive adoption and impact: Work closely with end users (lawyers and legal ops), iterate rapidly based on feedback, and ensure solutions are reliable, performant, and actively used."
              - listitem [ref=e75]:
                - paragraph [ref=e76]: "Feed insights back into the platform: Identify repeatable patterns across deployments and influence core roadmap and platform capabilities by turning custom work into scalable features."
                - paragraph [ref=e77]
