            - paragraph [ref=e119]
            - heading "WHY JOIN SPELLBOOK?" [level=2] [ref=e120]
            - list [ref=e121]:
              - listitem [ref=e122]:
                - paragraph [ref=e123]: Embrace autonomy and accountability in a flexible work environment; we focus on outcomes and empower you to determine how to get the job done
              - listitem [ref=e124]:
