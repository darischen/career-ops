            - paragraph [ref=e117]: WHO WE ARE
            - paragraph [ref=e118]
            - paragraph [ref=e119]:
              - generic [ref=e121]: Apex Fintech Solutions (Apex) powers innovation and the future of digital wealth management by building tech-forward solutions that help simplify, automate, and facilitate access to financial markets for all. Our robust suite of fintech software enables us to support clients such as Stash, Betterment, SoFi, Webull, and eToro, amongst many others; collectively, Apex powers access to the stock market for over 22+ million end customers.
            - paragraph [ref=e122]
            - paragraph [ref=e125]:
              - generic [ref=e126]: At Apex, we are changing how the securities industry operates by reinventing the status quo, which was manual, slow, and accessible only by the ultra-wealthy. We're digitizing and democratizing systems so that everyone has an opportunity to invest.
            - paragraph [ref=e127]
            - paragraph [ref=e130]:
              - generic [ref=e131]: "When you're at Apex, you drive this change. You're part of a global team with a clear vision: to be the trusted technology that powers the digital economy. Our offices in Austin, Dallas, Chicago, New York, Portland, Belfast, and Manila are home to over 1,000 employees."
            - paragraph [ref=e132]
            - paragraph [ref=e135]:
              - generic [ref=e136]: Together, we’re shaping the future of financial innovation. Embrace change. Solve big. Win together. And be G.R.E.A.T. — grit, results, empathy, accountability, and teamwork — with Apex.
            - paragraph [ref=e137]
            - paragraph [ref=e140]:
              - generic [ref=e141]: "We’re proud to be recognized for the innovative work we do, the purpose-driven nature of our work, and the collaborative culture we’ve created. Here are just a few of the many awards we’ve recently received:"
