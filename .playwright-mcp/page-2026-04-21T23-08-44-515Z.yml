            - paragraph [ref=e167]: ABOUT THIS ROLE
            - paragraph [ref=e168]
            - generic [ref=e179]:
              - paragraph [ref=e180]: This is an incredible opportunity to join Apex's Account Transfer team in Austin, Texas. As a software engineer you will work closely with other engineers, tech leads, product managers, and architects to build the next generation version of Apex Account Transfer services. The Software Engineer will be an integral part of our team supporting the technology organization in a transformation toward a highly scalable and resilient system. This is a role for someone who flourishes in a fast-paced and collaborative environment. Duties/Responsibilities
              - list [ref=e181]:
                - listitem [ref=e182]:
                  - paragraph [ref=e183]: Working with a variety of languages/frameworks, such as Java, Go, and technologies such as RDBMS, Kubernetes, and Docker, Google Cloud Platform
                - listitem [ref=e184]:
                  - paragraph [ref=e185]: Designing, developing, testing, deploying, maintaining and improving software
                - listitem [ref=e186]:
                  - paragraph [ref=e187]: Building resilient, self-scaling, self-healing services that allow you to sleep through the night
                - listitem [ref=e188]:
                  - paragraph [ref=e189]: Writing high-quality, well-tested code. Maintaining high code-quality standards across your team via code reviews
                - listitem [ref=e190]:
                  - paragraph [ref=e191]: Encouraging innovation by questioning business processes throughout the company
              - paragraph [ref=e192]: Education And/or Experience
              - list [ref=e193]:
                - listitem [ref=e194]:
                  - paragraph [ref=e195]: Bachelor’s degree in Computer Science, Software Engineering, Electrical or Computer Engineering, or a related field.
                - listitem [ref=e196]:
                  - paragraph [ref=e197]: 1+ years of prior work experience preferred
              - paragraph [ref=e198]: Required Skills/Abilities
              - list [ref=e199]:
                - listitem [ref=e200]:
                  - paragraph [ref=e201]: Experience of software development skills in a modern object-oriented programming language ideally in Golang is also considered a plus, an RDBMS or SQL, and the ability to learn new languages and technologies quickly
                - listitem [ref=e202]:
                  - paragraph [ref=e203]: Excellent problem-solving skills with high attention to detail
                - listitem [ref=e204]:
                  - paragraph [ref=e205]: Effective communication skills
                - listitem [ref=e206]:
                  - paragraph [ref=e207]: Previous knowledge in financial markets isn’t required, but interest is a plus
                - listitem [ref=e208]:
                  - paragraph [ref=e209]: "Adaptability: while you enjoy establishing process and standards, you understand the need to be flexible and enjoy trying new things"
