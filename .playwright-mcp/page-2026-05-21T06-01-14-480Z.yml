            - listitem [ref=e103]: The primary work location for this position is Rosemead, CA.
          - paragraph [ref=e104]
          - paragraph [ref=e105]
          - paragraph [ref=e106]
          - paragraph [ref=e107]:
            - strong [ref=e109]: About Southern California Edison
          - paragraph [ref=e110]: The people at SCE don't just keep the lights on. Our mission is so much bigger. We’re fueling the kind of innovation that’s changing an entire industry, and quite possibly the planet. Join us and create a future with cleaner energy, while providing our customers with the safety and reliability they demand. At SCE, you’ll have a chance to grow personally and professionally, making a real impact in Southern California and around the world.
          - paragraph [ref=e111]
