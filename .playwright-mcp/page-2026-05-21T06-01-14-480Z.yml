            - strong [ref=e53]: Join the Clean Energy Revolution
          - paragraph [ref=e54]:
            - generic [ref=e55]:
              - text: Become an
              - strong [ref=e56]: App Software & AI Engineer, Associate Specialist
              - text: at Southern California Edison (SCE) and be part of a team building modern, intelligent applications that support critical utility and clean‑energy initiatives. In this role, you’ll contribute across the full stack—helping deliver user-facing experiences, connecting them to backend services and data, and ensuring solutions are reliable, secure, and well-tested—while working within a defined product area under the guidance of experienced engineers. You’ll also gain hands‑on exposure to AI‑enabled features, supporting the integration of foundational AI capabilities into applications and participating in simple proof‑of‑concept efforts that validate how AI can improve productivity and customer outcomes. As an
              - strong [ref=e57]: App Software & AI Engineer, Associate Specialist
              - text: ", you’ll collaborate with cross‑functional partners, learn modern engineering practices, and grow your skills while contributing to solutions that help power our planet, reduce carbon emissions, and create cleaner air for everyone."
          - paragraph [ref=e58]
          - paragraph [ref=e59]
          - generic [ref=e60]:
            - generic [ref=e61]:
              - heading "Responsibilities" [level=2] [ref=e63]
              - list [ref=e65]:
                - listitem [ref=e66]: Assists in the development, deployment, and maintenance of applications (using React, Angular, Node.js, Python, and Express deployed on Azure or GCP cloud platforms), mobile applications (using iOS Swift, React Native, etc.), and low-code/no-code tools such as Power Platform, under direct supervision and following established guidelines and procedures.
                - listitem [ref=e67]: Under the mentorship of senior team members, assists in designing and implementing AI‐integrated solutions using technologies such as Azure OpenAI, Copilot Studio, and RAG architectures to support the development of LLM‐powered agents, voice‐to‐text, image‐to‐text capabilities, and custom machine learning models, while adhering to established guidelines and procedures.
                - listitem [ref=e68]: Under the guidance of leadership, explores and analyzes emerging technologies, tools, practices, and proof‐of‐concepts to validate the technical viability of AI or other innovative solutions.
                - listitem [ref=e69]: A material job duty of all positions within the Company is ensuring the protection of all its physical, financial, and cybersecurity assets and properly accessing and managing private customer data, proprietary information, confidential medical records, and other types of highly sensitive information and data with the highest standards of conduct and integrity.
            - generic [ref=e70]:
              - heading "Minimum Qualifications" [level=2] [ref=e72]
              - list [ref=e74]:
                - listitem [ref=e75]: Academic background in computer science or information science.
                - listitem [ref=e76]: Understanding of various types of AI (computer vision, NLP, predictive analytics, etc.) and Generative AI concepts (LLM models, agents, prompting, etc.).
          - paragraph [ref=e77]
          - paragraph [ref=e78]:
            - strong [ref=e80]: Preferred Qualifications
          - list [ref=e81]:
            - listitem [ref=e82]: Experience contributing to end to end application features, with exposure to both user facing components and backend logic within a single application or product area.
            - listitem [ref=e83]: Hands on experience supporting full cycle software delivery, including requirements interpretation, development, testing, and production support under guidance.
            - listitem [ref=e84]: Exposure to integrating basic AI enabled capabilities into applications or participating in simple proof of concept efforts that demonstrate how AI can improve productivity or user outcomes.
            - listitem [ref=e85]: Familiarity with modern engineering practices, including secure coding, testing approaches, documentation, and adherence to established development standards.
            - listitem [ref=e86]: Interest in learning and leveraging low code or no code development approaches alongside traditional software development methods.
            - listitem [ref=e87]: Ability to collaborate effectively within a team environment, communicate progress clearly, and partner with peers to deliver features aligned with defined acceptance criteria.
            - listitem [ref=e88]: Strong problem solving skills, attention to detail, and a positive mindset with openness to feedback and continuous learning in full stack and AI driven development.
          - paragraph [ref=e89]
          - paragraph [ref=e90]
          - paragraph [ref=e91]:
            - strong [ref=e93]: Additional Information
          - list [ref=e94]:
            - listitem [ref=e95]:
