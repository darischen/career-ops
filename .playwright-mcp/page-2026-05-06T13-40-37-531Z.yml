            - paragraph [ref=e218]: About Amcor
            - paragraph [ref=e219]: "Amcor is the global leader in developing and producing responsible consumer packaging and dispensing solutions across a variety of materials for nutrition, health, beauty and wellness categories. Our global product innovation and sustainability expertise enables us to solve packaging challenges around the world every day, producing a range of flexible packaging, rigid packaging, cartons and closures that are more sustainable, functional and appealing for our customers and their consumers. We are guided by our purpose of elevating customers, shaping lives and protecting the future. Supported by a commitment to safety, over 75,000 people generate $23 billion in annualized sales from operations that span over 400 locations in more than 40 countries. NYSE: AMCR; ASX: AMC"
