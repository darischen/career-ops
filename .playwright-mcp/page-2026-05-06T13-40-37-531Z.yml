            - heading [level=1] [ref=e275]: Accelerate the possible by joining a winning Amcor team that’s transforming the packaging industry and improving lives around the world.
            - paragraph [ref=e87]: At Amcor, we unpack possibility through our innovative and responsible packaging to provide solutions that benefit our customers, our people and our planet. More than 10,000 consumers worldwide encounter our products every second and rely on us for safe access to food, medicine and other goods. We value their trust by making safety our guiding principle. It’s our core value and integral to how we do business.
            - paragraph [ref=e88]: Beyond this core principle, our shared values and behaviors unite us as we work together to elevate customers, shape lives and protect the future. We champion our customers and help them succeed. We play to win – adapting quickly in an everchanging world – and make smart choices to safeguard our business, our communities and the people we serve for generations to come. And we invest in our world-class team, empowering our colleagues to unpack their potential, because we believe when our people grow, so does our business.
