            - heading [level=1] [ref=e281]: Job Description
            - paragraph [ref=e98]: About the role
            - paragraph [ref=e99]
            - paragraph [ref=e100]: An AI Full Stack Engineer is responsible for designing, developing, and deploying machine learning, AI models and algorithms to enhance products and services, collaborates with key business data owners, data governance, data engineering, and IT application business analysts to align strategies, maintain execution transparency, and support effective delivery. This role leads the design and execution of regional or multi-site AI/ Gen AI/ML Models that drive operational efficiency, sustainability, and supply chain visibility. Defines and manages AI/ML roadmaps within a business domain, manages cross-functional teams, and translates business needs into scalable data solutions. Operates with moderate autonomy, influences data architecture decisions, and ensures alignment with global standards. Skilled in cloud platforms, data modelling, and stakeholder engagement. In addition to AI/ML expertise, this role encompasses full stack development — building and maintaining frontend user interfaces, RESTful and GraphQL APIs, backend services, and database layers — to deliver end-to-end AI-powered applications from model to production UI.
            - paragraph [ref=e101]
            - paragraph [ref=e102]: Key Job Accountabilities
            - list [ref=e103]:
              - listitem [ref=e104]: "Model Development: Design and develop machine learning models and algorithms tailored to specific business needs. Design and implement production‑ready RAG systems that connect LLMs to enterprise data sources (data lake, Microsoft Fabric, SAP, MES, document repositories); own prompt templates, retrieval strategies, and evaluation; optimize for accuracy, latency, and cost. Build AI agents that orchestrate multi‑step workflows"
              - listitem [ref=e105]: "Collaboration: Work closely with data scientists, software engineers, and cross-functional teams to integrate models into production systems."
              - listitem [ref=e106]: "Data Analysis: Analyze large and complex datasets to extract actionable insights and improve model performance."
              - listitem [ref=e107]: "Optimization: Tune and enhance model performance and accuracy through iterative testing and validation.\""
              - listitem [ref=e108]: "Documentation: Maintain thorough documentation of AI/ML models, experiments, and processes to ensure reproducibility and knowledge sharing."
              - listitem [ref=e109]: "Stay Updated: Keep abreast of the latest advancements in AI and ML technologies to apply innovative solutions in projects."
              - listitem [ref=e110]: Establish and maintain working relationships with Amcor business stakeholders. Engage enterprise decision makers and stakeholders to facilitate group decisions and outcomes.
              - listitem [ref=e111]: "Full Stack Development: Design and build end-to-end AI-powered applications encompassing frontend user interfaces, backend APIs, and integration layers that surface AI/ML model outputs to end users."
              - listitem [ref=e112]: "API & Backend Services: Develop and maintain RESTful and/or GraphQL APIs and backend microservices that connect AI/ML models to enterprise data sources and front-end applications."
              - listitem [ref=e113]: "Database Design & Management: Design, implement, and optimize relational and NoSQL database schemas to support AI application data needs, including vector databases for embedding storage and retrieval."
              - listitem [ref=e114]: "Cloud Deployment & DevOps: Deploy and manage full stack applications on cloud platforms (Azure/AWS/GCP); implement CI/CD pipelines, containerization (Docker/Kubernetes), and infrastructure-as-code practices to ensure reliable, scalable delivery of AI solutions."
            - paragraph [ref=e115]
            - paragraph [ref=e116]
            - paragraph [ref=e117]:
              - generic [ref=e118]: Qualifications/Requirements
            - list [ref=e119]:
              - listitem [ref=e120]: "Educational Background: Bachelor’s in computer science, Machine Learning, or a related field."
              - listitem [ref=e121]: 2 - 4 years’ experience as an AI/ML Engineer or in a similar role, with a strong understanding of machine learning algorithms and principles
              - listitem [ref=e122]: Experienced in Large Language Models, Transformers, CNN, Scikit-learn, NLP libraries, Embedding Models, Vector Databases, AI Agents, and Agentic orchestrations.
              - listitem [ref=e123]: "Technical Proficiency: Familiarity with deep learning frameworks such as TensorFlow or PyTorch, Kerasand proficiency in programming languages like Python, PySpark, R, or Java."
              - listitem [ref=e124]: Experience with data visualization tools (Power BI and Tableau)
              - listitem [ref=e125]: "Frontend Development: Proficiency in modern frontend web technologies and frameworks (e.g. component-based UI libraries, HTML5, CSS3) to build responsive, user-friendly interfaces for AI-powered applications."
              - listitem [ref=e126]: "Backend & API Development: Experience designing and building RESTful and/or GraphQL APIs using Python-based frameworks (e.g. FastAPI, Flask, Django) or Node.js; understanding of microservices architecture and API security best practices."
              - listitem [ref=e127]: "Database Skills: Hands-on experience with relational databases (e.g. SQL Server, PostgreSQL) and NoSQL/vector databases; ability to design schemas, write optimized queries, and manage data pipelines that feed AI applications."
              - listitem [ref=e128]: "Cloud & DevOps: Familiarity with containerization (Docker, Kubernetes), CI/CD tooling, and infrastructure-as-code on major cloud platforms (Azure, AWS, or GCP) to deploy and operate full stack AI solutions reliably at scale."
