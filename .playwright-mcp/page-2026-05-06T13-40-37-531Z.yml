            - heading [level=1] [ref=e286]: Compensation
            - text: The starting salary for this position is expected to be between $85 600 to $107 000; however, base pay offered may vary within the full salary range $85 600 to $128 400 depending on job-related knowledge, skills, and experience. Base pay information is based on national averages and a geographic differential may be applied based on work location. Position may also be eligible for Amcor’s Management Incentive Plan / Sales Incentive Plan, which is an annual bonus program based on business and individual performance, as well as medical coverage and other health and welfare benefits. The salary range provided reflects the anticipated base pay for this role at the time of this posting. This range is applicable to positions performed in jurisdictions with pay transparency requirements, including CA, CO, CT, HI, IL, MD, MA, MN, NV, NJ, NY, RI, VT, WA, Washington DC, as well as remote roles that may be performed in these locations. Compensation for roles performed outside of these jurisdictions may vary. The Company reserves the right to modify this range at any time.
