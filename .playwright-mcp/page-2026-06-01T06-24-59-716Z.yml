                          - paragraph [ref=f8e357]: We are a federal contractor or subcontractor. The law requires us to provide equal employment opportunity to qualified people with disabilities. We have a goal of having at least 7% of our workers as people with disabilities. The law says we must measure our progress towards this goal. To do this, we must ask applicants and employees if they have a disability or have ever had one. People can become disabled, so we need to ask this question at least every five years.
                          - paragraph [ref=f8e358]:
                            - text: Completing this form is voluntary, and we hope that you will choose to do so. Your answer is confidential. No one who makes hiring decisions will see it. Your decision to complete the form and your answer will not harm you in any way. If you want to learn more about the law or this form, visit the U.S. Department of Labor’s Office of Federal Contract Compliance Programs (OFCCP) website at
                            - link "www.dol.gov/ofccp" [ref=f8e359] [cursor=pointer]:
                              - /url: https://www.dol.gov/ofccp
                            - text: .
                          - strong [ref=f8e360]: How do you know if you have a disability?
                          - paragraph [ref=f8e361]:
                            - text: A disability is a condition that substantially limits one or more of your “major life activities.” If you have or have ever had such a condition, you are a person with a disability.
                            - strong [ref=f8e362]: "Disabilities include, but are not limited to:"
                          - list [ref=f8e363]:
                            - listitem [ref=f8e364]: Alcohol or other substance use disorder (not currently using drugs illegally)
                            - listitem [ref=f8e365]: Autoimmune disorder, for example, lupus, fibromyalgia, rheumatoid arthritis, HIV/AIDS
                            - listitem [ref=f8e366]: Blind or low vision
                            - listitem [ref=f8e367]: Cancer (past or present)
                            - listitem [ref=f8e368]: Cardiovascular or heart disease
                            - listitem [ref=f8e369]: Celiac disease
                            - listitem [ref=f8e370]: Cerebral palsy
                            - listitem [ref=f8e371]: Deaf or serious difficulty hearing
                            - listitem [ref=f8e372]: Diabetes
                            - listitem [ref=f8e373]: Disfigurement, for example, disfigurement caused by burns, wounds, accidents, or congenital disorders
                            - listitem [ref=f8e374]: Epilepsy or other seizure disorder
                            - listitem [ref=f8e375]: Gastrointestinal disorders, for example, Crohn's Disease, irritable bowel syndrome
                            - listitem [ref=f8e376]: Intellectual or developmental disability
                            - listitem [ref=f8e377]: Mental health conditions, for example, depression, bipolar disorder, anxiety disorder, schizophrenia, PTSD
                            - listitem [ref=f8e378]: Missing limbs or partially missing limbs
                            - listitem [ref=f8e379]: Mobility impairment, benefiting from the use of a wheelchair, scooter, walker, leg brace(s) and/or other supports
                            - listitem [ref=f8e380]: Nervous system condition, for example, migraine headaches, Parkinson’s disease, multiple sclerosis (MS)
                            - listitem [ref=f8e381]: Neurodivergence, for example, attention-deficit/hyperactivity disorder (ADHD), autism spectrum disorder, dyslexia, dyspraxia, other learning disabilities
                            - listitem [ref=f8e382]: Partial or complete paralysis (any cause)
                            - listitem [ref=f8e383]: Pulmonary or respiratory conditions, for example, tuberculosis, asthma, emphysema
                            - listitem [ref=f8e384]: Short stature (dwarfism)
                            - listitem [ref=f8e385]: Traumatic brain injury
