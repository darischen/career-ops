              - heading "About DAT" [level=5] [ref=e72]
              - paragraph [ref=e73]: At DAT Freight & Analytics, we're more than just a technology company – we're the backbone of North America's transportation industry. Since 1978, we've been transforming how freight moves across the continent, combining cutting-edge technology with deep industry expertise to create solutions that matter. Our success is built on integrity, innovation, and collaboration. We take pride in delivering on our promises, challenging the status quo, and fostering an environment where diverse perspectives drive our success. Processing over $100 billion in freight transactions annually, we're the industry's most trusted source for rates, capacity, and market intelligence. Join us as we take the uncertainty out of freight and write the next chapter in transportation innovation.
