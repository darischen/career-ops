                        - strong [ref=f8e23]: About DAT
                      - paragraph [ref=f8e24]:
                        - generic [ref=f8e25]:
                          - strong [ref=f8e26]: DAT
                          - text: is an award-winning employer of choice and a next-generation SaaS technology company that has been at the leading edge of innovation in transportation supply chain logistics for 45 years. We continue to transform the industry year over year, by deploying a suite of software solutions to millions of customers every day - customers who depend on DAT for the most relevant data and most accurate insights to help them make smarter business decisions and run their companies more profitably. We operate the largest marketplace of its kind in North America, with 400 million freights posted in 2022, and a database of $150 billion of annual global shipment market transaction data. Our headquarters are in Denver, CO, and Beaverton, OR, with additional offices in Seattle, WA; Springfield, MO; and Bangalore, India. For additional information, see
                          - link [ref=f8e27] [cursor=pointer]:
                            - /url: http://www.dat.com/company
                          - link "www.DAT.com/company" [ref=f8e28] [cursor=pointer]:
