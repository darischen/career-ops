                        - link [ref=f8e30] [cursor=pointer]:
                          - /url: https://www.dat.com/company/news-events/news-releases/built-in-colorado-honors-dat-freight-analytics-in-its-esteemed-2023-best-places-to-work-awards?_gl=1*1f7bb2i*_ga*MTEwNjQzODc2OC4xNjcxMTQwMTMz*_ga_C36TRC5CVZ*MTY3NDc1ODM4My4xOS4xLjE2NzQ3NTg5MTYuNjAuMC4w*_ga_QYVEY2GZSM*MTY3NDc1ODM4Ni4yLjAuMTY3NDc1ODUwOC4wLjAuMA..
                      - separator [ref=f8e31]
                      - paragraph [ref=f8e32]:
                        - strong [ref=f8e33]: "Job Application Deadline:"
                        - text: 06/30/2026
                      - paragraph [ref=f8e34]
                      - paragraph [ref=f8e35]:
                        - strong [ref=f8e36]: The Opportunity
                      - paragraph [ref=f8e37]: "Broker Tech builds products for the Convoy Platform at DAT, enabling brokers to match and execute shipments while they work seamlessly within their Transportation Management Systems (TMS). We partner with brokers to transform how they work, grow, and succeed by:"
                      - list [ref=f8e38]:
                        - listitem [ref=f8e39]:
                          - strong [ref=f8e40]: "Empowering Matching:"
                          - text: Building smarter tools and visibility that boost broker match rates and strengthen carrier connections.
                        - listitem [ref=f8e41]:
                          - strong [ref=f8e42]: "Fueling Growth:"
                          - text: Enabling brokers to expand through better pricing, new freight categories, and integrations.
                        - listitem [ref=f8e43]:
                          - strong [ref=f8e44]: "Ensuring Payments:"
                          - text: Strengthening and automating broker payment processes to reduce risk and ensure reliability.
                        - listitem [ref=f8e45]:
                          - strong [ref=f8e46]: "Enabling Ideal Experiences:"
                          - text: Delivering seamless workflows via APIs and webhooks between the Convoy Platform and TMSs, with self-service configuration and onboarding tools.
                      - paragraph [ref=f8e47]:
                        - strong [ref=f8e48]: What You’ll Do
                      - paragraph [ref=f8e49]: Hands-on Development
                      - list [ref=f8e50]:
                        - listitem [ref=f8e51]: Write, test, and deploy production-quality code with guidance from senior engineers.
                        - listitem [ref=f8e52]:
                          - text: Build and maintain backend services in
                          - strong [ref=f8e53]: Node.js/TypeScript
                          - text: and contribute to
                          - strong [ref=f8e54]: React
                          - text: frontends as needed.
                        - listitem [ref=f8e55]: Implement and support message-driven workflows (Kafka/RabbitMQ) using existing patterns and reusable components.
                        - listitem [ref=f8e56]: Improve code quality and maintainability as you deliver features (tests, refactors, documentation).
                      - paragraph [ref=f8e57]: Collaboration & Growth
                      - list [ref=f8e58]:
                        - listitem [ref=f8e59]: Partner with product and business stakeholders to clarify requirements in a complex domain.
                        - listitem [ref=f8e60]: Participate in code reviews (both receiving and giving) and incorporate feedback quickly.
                        - listitem [ref=f8e61]: "Learn the team’s operational practices: monitoring, alerts, on-call support, and incident follow-ups."
                        - listitem [ref=f8e62]: "Grow ownership over time: take on increasingly complex tickets, then small projects."
                      - paragraph [ref=f8e63]:
                        - strong [ref=f8e64]: What Excites Us About This Role
                      - list [ref=f8e65]:
                        - listitem [ref=f8e66]: As the Convoy platform expands into a critical marketplace for brokers, this team shapes outcomes that matter for broker workflows and reliability.
                        - listitem [ref=f8e67]: "High ownership with support: you’ll ship meaningful work while learning from senior engineers in a complex, real-world domain."
                        - listitem [ref=f8e68]: "Lots of surface area: integrations, workflows, payments, messaging, and partner-facing APIs."
                      - paragraph [ref=f8e69]:
                        - strong [ref=f8e70]: The Skills and Experience You’ll Bring
                      - list [ref=f8e71]:
                        - listitem [ref=f8e72]:
                          - strong [ref=f8e73]: 2–5+ years
                          - text: of professional software engineering experience (or equivalent).
                        - listitem [ref=f8e74]:
                          - text: Experience building production services in
                          - strong [ref=f8e75]: TypeScript/Node.js
                          - text: (or strong Java/C#/Go experience with willingness to ramp).
                        - listitem [ref=f8e76]:
                          - text: Familiarity with
                          - strong [ref=f8e77]: React
                          - text: and modern frontend development fundamentals.
                        - listitem [ref=f8e78]: Comfort working with APIs (REST preferred; GraphQL a plus) and collaborating on contracts.
                        - listitem [ref=f8e79]: Familiarity with SQL databases (schema basics, writing queries, migrations with guidance).
                        - listitem [ref=f8e80]: Exposure to async systems (queues/events) such as Kafka/RabbitMQ/SQS is a plus, or willingness to learn.
                        - listitem [ref=f8e81]: "Solid engineering fundamentals: debugging, testing, code quality, and clear written communication."
                      - paragraph [ref=f8e82]:
                        - strong [ref=f8e83]: Bonus Skills
                      - list [ref=f8e84]:
                        - listitem [ref=f8e85]: Experience with microservices in production.
                        - listitem [ref=f8e86]: Hands-on exposure to Kafka/RabbitMQ patterns (retries, DLQs, idempotency).
                        - listitem [ref=f8e87]: Docker/Kubernetes familiarity.
                        - listitem [ref=f8e88]: CI/CD experience (tests in pipeline, safe deploy patterns, feature flags).
                        - listitem [ref=f8e89]: Background in transportation/logistics or complex B2B integrations.
                      - paragraph [ref=f8e90]
                      - paragraph [ref=f8e91]:
                        - strong [ref=f8e92]: Why DAT?
                        - text: DAT is an award winning employer of choice.
                      - paragraph [ref=f8e93]: "For starters, we have a hybrid work environment, but we also know what makes a great workplace. We have a time-tested and resolute set of operating values predicated on integrity, mutual respect, open communication, and executing with excellence. These values inform our strategic vision as much as any one of our products does. We’ve been an employer of choice in the Portland metropolitan area for four decades, and within one year of opening our Denver office, DAT was #26 on Built In Colorado’s 100 Best Places to Work In Colorado."
                      - list [ref=f8e94]:
                        - listitem [ref=f8e95]: Medical, Dental, Vision, Life, and AD&D insurance
                        - listitem [ref=f8e96]: Parental Leave
                        - listitem [ref=f8e97]: Flexible Vacation Time (FVT)
                        - listitem [ref=f8e98]: An additional 10 holidays of paid time off per calendar year
                        - listitem [ref=f8e99]: 401k matching (immediately vested)
                        - listitem [ref=f8e100]: Employee Stock Purchase Plan
                        - listitem [ref=f8e101]: Short- and Long-term disability sick leave
                        - listitem [ref=f8e102]: Flexible Spending Accounts
                        - listitem [ref=f8e103]: Health Savings Accounts
                        - listitem [ref=f8e104]: Employee Assistance Program
                        - listitem [ref=f8e105]: Additional programs - Employee Referral, Internal Recognition, and Wellness
                        - listitem [ref=f8e106]: Free TriMet transit pass (Beaverton Office)
                        - listitem [ref=f8e107]: Competitive salary and benefits package
                        - listitem [ref=f8e108]: Work on impactful projects in a cutting-edge environment
                        - listitem [ref=f8e109]: Collaborative and supportive team culture
                        - listitem [ref=f8e110]: Opportunity to make a real difference in the trucking industry
                        - listitem [ref=f8e111]: Employee Resource Groups
                      - paragraph [ref=f8e112]
                      - paragraph [ref=f8e113]:
                        - emphasis [ref=f8e114]: "**This position is not eligible for visa sponsorship**"
                      - paragraph [ref=f8e115]:
                        - emphasis [ref=f8e116]: For Washington-based candidates, in compliance with the Washington State Pay Transparency Law, the salary range for this role is $122,000.00 - $157,000.00 + Target Bonus. DAT considers factors such as scope and responsibilities of the position, candidate's work experience, education and training, core skills, internal equity, and market and business elements when extending an offer.
                      - paragraph [ref=f8e117]
                      - paragraph [ref=f8e118]:
                        - text: DAT
                        - strong [ref=f8e119]: embraces the value of a diverse workforce, and believes it is a core strength of our company that we encourage those values in every DAT employee, at every level of our organization, regardless of tenure or rank. We provide equal employment opportunities (EEO) to all employees and applicants without regard to race, color, religion, gender, sexual orientation, gender identity or expression, national origin, age, disability, genetic information, marital status, amnesty, or status as a covered veteran in accordance with applicable federal, state, and local laws.
                      - paragraph [ref=f8e120]:
                        - strong [ref=f8e121]: Equal Opportunity Employer/Protected Veterans/Individuals with Disabilities
                      - paragraph [ref=f8e122]: The contractor will not discharge or in any other manner discriminate against employees or applicants because they have inquired about, discussed, or disclosed their own pay or the pay of another employee or applicant. However, employees who have access to the compensation information of other employees or applicants as a part of their essential job functions cannot disclose the pay of other employees or applicants to individuals who do not otherwise have access to compensation information, unless the disclosure is (a) in response to a formal complaint or charge, (b) in furtherance of an investigation, proceeding, hearing, or action, including an investigation conducted by the employer, or (c) consistent with the contractor’s legal duty to furnish information. 41 CFR 60-1.35(c)
