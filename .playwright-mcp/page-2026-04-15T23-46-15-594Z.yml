  - heading "Backend / API Engineer, Billing" [level=1] [ref=e44]
  - generic [ref=e52]:
    - generic [ref=e53]:
      - generic [ref=e54]:
        - heading "Who we are" [level=2] [ref=e55]
        - heading "About Stripe" [level=3] [ref=e56]
        - paragraph [ref=e57]: Stripe is a financial infrastructure platform for businesses. Millions of companies—from the world’s largest enterprises to the most ambitious startups—use Stripe to accept payments, grow their revenue, and accelerate new business opportunities. Our mission is to increase the GDP of the internet, and we have a staggering amount of work ahead. That means you have an unprecedented opportunity to put the global economy within everyone’s reach while doing the most important work of your career.
        - heading "About the team" [level=3] [ref=e58]
        - paragraph [ref=e59]: The Revenue and Financial Automation (RFA) team at Stripe is building a modern, revenue-focused, financial management platform for fast growing, digital native companies.
        - list [ref=e60]:
          - listitem [ref=e61]: "Billing: Hundreds of thousands of businesses of all sizes and types use Stripe Billing to collect revenue for recurring and one-time payments across a variety of different pricing models—from selling SaaS subscriptions, to orchestrating multi-stage contracts, delivering Usage-Based Billing, and providing recovery and retention tools to prevent customer churn."
        - paragraph [ref=e62]:
          - text: "Note: exact team matching for one of the pods will begin during final stages. Please note we may also consider you for different orgs based on your experience, location, etc. More information on our team matching process can be found"
          - link "here" [ref=e63] [cursor=pointer]:
            - /url: https://docs.google.com/document/d/1zvJkO2c7GzukHG-_oqc5wbOLajpuh5FjbmZPcZPU1o0/edit?tab=t.0#heading=h.ahb3b6nrktv1
          - text: .
        - heading "What you’ll do" [level=2] [ref=e64]
        - paragraph [ref=e65]: As an engineer on the team, you’ll be responsible for shaping and building a suite of products that let our users model and operate their business more efficiently. You will work on projects that span technologies, systems, and processes where you will design, build, test, and ship great code every day. In this cross functional role, you will collaborate with experts in infrastructure, security, design, and operations to build mission critical internal and external features that power Stripe users around the world.
        - heading "Responsibilities" [level=3] [ref=e66]
        - list [ref=e67]:
          - listitem [ref=e68]: Design the next generation of Stripe products, to meet the high growth needs of our company and customers for years to come.
          - listitem [ref=e69]: Deliver value through a strong collaborative and users-first approach with stakeholders and customers.
          - listitem [ref=e70]: Mentor engineers to help them grow
          - listitem [ref=e71]: Debug and solve critical production issues across services and multiple levels of the stack
        - heading "Who you are" [level=2] [ref=e72]
        - paragraph [ref=e73]: We’re looking for someone who meets the minimum requirements to be considered for the role. If you meet these requirements, you are encouraged to apply. The preferred qualifications are a bonus, not a requirement.
        - heading "Minimum requirements" [level=3] [ref=e74]
        - list [ref=e75]:
          - listitem [ref=e76]: 2-12+ years of experience in backend software development
          - listitem [ref=e77]: Ability to write high quality code (in programming languages like Go, Java, C/C++, etc.)
          - listitem [ref=e78]: Hands-on experience contributing to or building large scale distributed systems
          - listitem [ref=e79]: Strong collaboration skills, can work across workstreams within your team and contribute to your peers’ success
          - listitem [ref=e80]: Have the ability to thrive on a high level of autonomy, responsibility, and think of yourself as entrepreneurial
        - heading "Preferred Qualifications" [level=3] [ref=e81]
        - list [ref=e82]:
          - listitem [ref=e83]: Familiarity with event-driven architectures
          - listitem [ref=e84]: Experience with subscription management, usage-based billing, or financial reporting systems
          - listitem [ref=e85]: Interest in financial infrastructure and how businesses manage their revenue operations
          - listitem [ref=e86]: Direct leadership and mentorship experience
      - generic [ref=e87]:
        - generic [ref=e88]:
          - heading "Hybrid work at Stripe" [level=1] [ref=e90]
          - paragraph [ref=e92]: This role is available either in an office or a remote location (35+ miles or 56+ km from a Stripe office).
        - generic [ref=e93]:
          - heading "In-office expectations" [level=1] [ref=e95]
          - generic [ref=e96]: Office-assigned Stripes spend at least 50% of the time in a given month in their local office or with users. This hits a balance between bringing people together for in-person collaboration and learning from each other, while supporting flexibility about how to do this in a way that makes sense for individuals and their teams.
        - generic [ref=e97]:
          - heading "Working remotely at Stripe" [level=1] [ref=e99]
          - generic [ref=e100]: A remote location is defined as being 35 miles (56 kilometers) or more from one of our offices. While you would be welcome to come into the office for team/business meetings, on-sites, meet-ups, and events, our expectation is you would regularly work from home rather than a Stripe office. Stripe does not cover the cost of relocating to a remote location. We encourage you to apply for roles that match the location where you currently live or plan to live.
      - generic [ref=e101]:
        - heading "Pay and benefits" [level=1] [ref=e103]
        - generic [ref=e104]:
          - paragraph [ref=e105]: The annual US base salary range for this role is $156,800 - $285,600. For sales roles, the range provided is the role’s On Target Earnings ("OTE") range, meaning that the range includes both the sales commissions/sales bonuses target and annual base salary for the role. This salary range may be inclusive of several career levels at Stripe and will be narrowed during the interview process based on a number of factors, including the candidate’s experience, qualifications, and location. Applicants interested in this role and who are not located in the US may request the annual salary range for their location during the interview process.
          - paragraph [ref=e106]: "Additional benefits for this role may include: equity, company bonus or sales commissions/bonuses; 401(k) plan; medical, dental, and vision benefits; and wellness stipends."
