        - generic [ref=e19]:
          - generic [ref=e20]:
            - paragraph [ref=e21]: At Instabase, we're passionate about democratizing access to cutting-edge AI innovation to enable any organization to solve previously unsolvable unstructured data problems in their industry. With customers representing some of the largest and most complex organizations in the world, and investors like Greylock, Andreessen Horowitz, and Index Ventures, our market opportunity is near infinite.
            - paragraph [ref=e22]: Instabase offers a consumption-based pricing model where customers can pay only for what they use, aligning directly with the value our products deliver. It empowers our clients to explore our AI Hub platform features extensively, enabling them to uncover crucial business insights. This customer-centric model allows Instabase to glean insights from diverse use cases and behaviors, ensuring we deliver top-tier solutions that provide unmatched advantages for everyday business operations.
            - paragraph [ref=e23]:
              - generic [ref=e24]:
                - text: With offices in San Francisco and Bengaluru, Instabase is a truly global company. We are
                - strong [ref=e25]: people-first
                - text: ", and we've built a fearlessly experimental, endlessly curious, customer obsessed team who work together and help organizations around the world turn their unstructured data into insights instantly."
          - generic [ref=e26]:
            - paragraph [ref=e27]:
              - strong [ref=e28]: Our Engineering Team
              - text: architects the underlying operating system, core services, platform infrastructure, dev toolkits, core algorithms, machine learning models, packaged end-user apps, and app store marketplace. Instabase engineers are excited to solve hard problems for complex organizations and are self-starters from day one.
            - paragraph [ref=e29]:
              - strong [ref=e30]: As a Software Engineer
              - text: ", you’ll design and develop Instabase services and applications, touching various layers of the stack. Our product and infrastructure is written in Go, Python, Java, and C++. Our tech stack is React and Typescript on the frontend. We operate using the micro-services model and leverage Docker and Kubernetes for our deployments."
            - paragraph [ref=e31]: We're hiring across all teams and technical areas, which includes Product Engineering and Infrastructure Engineering!
            - paragraph [ref=e32]:
              - strong [ref=e33]: "What you’ll do:"
            - list [ref=e34]:
              - listitem [ref=e35]: Collaborate with other engineers, product designers, and product managers to drive new features and applications from ideation to implementation to production
              - listitem [ref=e36]: Develop the user interfaces of applications, the core platform, and reusable components
              - listitem [ref=e37]: Evaluating new frontend libraries and technologies to fit our needs and iterating on and maintaining Instabase's frontend stack
              - listitem [ref=e38]: Develop new features that can be leveraged by the other Instabase teams to develop apps and solutions
              - listitem [ref=e39]: Move fast and be empowered to make product and design decisions. You will start contributing to our codebase during your first week, and as an early team member, you will help shape the UI and direction of our product
            - paragraph [ref=e40]:
              - strong [ref=e41]: "About you:"
            - list [ref=e42]:
              - listitem [ref=e43]: Bachelor’s, Master’s, or PhD program in Computer Science, Human Computer Interaction, Applied Mathematics, Computer Engineering, or a degree in a related field
              - listitem [ref=e44]: Preferred graduation date between May 2026 - June 2026
              - listitem [ref=e45]: "Proficient in one of more of the following languages and frameworks: Python, Go, React, and REST APIs."
              - listitem [ref=e46]: Solid communication and collaboration and a strong eagerness to learn
            - paragraph [ref=e47]:
              - strong [ref=e48]: "Compensation:"
              - text: The base salary range for this role is
              - strong [ref=e49]: $140,000 to $145,455
              - text: + bonus, equity, and US benefits. The actual pay may vary based on factors such as location, experience, and skills.
            - paragraph [ref=e50]:
              - strong [ref=e51]: "US Benefits:"
            - list [ref=e52]:
              - listitem [ref=e53]: "Flexible PTO: Because life is better when you actually live it!"
              - listitem [ref=e54]: "Comprehensive Coverage: Top-notch medical, dental, and vision insurance."
              - listitem [ref=e55]: "401(k) with Matching: We’ve got your back for a secure future."
              - listitem [ref=e56]: "Parental Leave & Fertility Benefits: Supporting you in growing your family, your way."
              - listitem [ref=e57]: "Therapy Sessions Covered: Mental health matters—10 free sessions through Samata Health."
              - listitem [ref=e58]: "Wellness Stipend: For gym memberships, fitness tech, or whatever keeps you thriving."
              - listitem [ref=e59]: "Lunch on Us: Enjoy a lunch credit when you’re in the office."
            - paragraph [ref=e60]: "#Li-Hybrid"
          - paragraph [ref=e62]:
            - generic [ref=e63]: Instabase is an Equal Opportunity Employer. Qualified applicants will receive consideration for employment without regard to race, color, religion, sex, sexual orientation, gender perception or identity, national origin, age, marital status, protected veteran status, or disability status. Research shows that in order to apply for a job, women feel they need to meet 100% of the criteria while men usually apply after meeting about 60%. Regardless of how you identify, if you believe you can do the job and are a good match, we encourage you to apply.
