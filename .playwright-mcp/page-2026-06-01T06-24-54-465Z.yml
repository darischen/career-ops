        - generic [ref=e17]:
          - paragraph [ref=e19]: SpaceX was founded under the belief that a future where humanity is out exploring the stars is fundamentally more exciting than one where we are not. Today SpaceX is actively developing the technologies to make this possible, with the ultimate goal of enabling human life on Mars.
          - generic [ref=e20]:
            - paragraph [ref=e21]:
              - strong [ref=e22]: FULL STACK SOFTWARE ENGINEER (APPLICATION SOFTWARE)
            - paragraph [ref=e23]: The application software team is the central nervous system of SpaceX – we create mission critical applications that are used throughout SpaceX to accelerate launch vehicle production and flight as well as systems that allow Starlink to grow into a worldwide fast, reliable Internet service. We are looking for engineers who treat fellow teammates with fairness, respect, and support.
            - paragraph [ref=e24]: Our team is currently creating and evolving systems to enable rapid build and reuse of Starship as well as designing the next generation manufacturing software that will be used in high throughput factories for Starlink. Other applications range from platforms that support concurrent streams of data from many always-on assets to manage the world’s largest satellite constellation to public facing systems where customers can join our Starlink network globally. We work closely with engineers throughout the company to create and update our systems with respect to crewed launches, Starship flights, changes to the Starlink network and much more.
            - paragraph [ref=e25]: Aerospace experience is not required to be successful here - rather we look for smart, motivated, respectful, collaborative engineers who love solving problems and want to make an impact on a super inspiring mission. You will have full ownership of challenging problems, working with a team of enthusiastic engineers with diverse perspectives to design and produce solutions that enable SpaceX to move towards our goals at a rapid pace. The success of the missions at SpaceX depends on the software that you and your team produce.
            - paragraph [ref=e26]:
              - strong [ref=e27]: "RESPONSIBILITIES:"
            - list [ref=e28]:
              - listitem [ref=e29]: Develop highly reliable software solutions that are used across SpaceX
              - listitem [ref=e30]: Create new applications that improve how SpaceX operates
              - listitem [ref=e31]: Build prototypes to prove out key design concepts and quantify technical constraints
              - listitem [ref=e32]: Own all aspects of software engineering and product development
              - listitem [ref=e33]: Deep dive into your users’ problems to find and create efficient solutions
              - listitem [ref=e34]: Bring your voice to the table in team collaborations on architecture, design, and code reviews
            - paragraph [ref=e35]:
              - strong [ref=e36]: "BASIC QUALIFICATIONS:"
            - list [ref=e37]:
              - listitem [ref=e38]: Bachelor's degree in computer science, engineering, math, or scientific discipline; OR 2+ years of professional experience building software in lieu of a degree
              - listitem [ref=e39]: 1+ years of experience in full stack development
            - paragraph [ref=e40]:
              - strong [ref=e41]: "PREFERRED SKILLS AND EXPERIENCE:"
            - list [ref=e42]:
              - listitem [ref=e43]: Programming experience in Python, C#.NET, Go, Scala, Java, or similar object-oriented language
              - listitem [ref=e44]: 1+ years of rigorous experience building single page web applications
              - listitem [ref=e45]: Experience with version control, continuous integration, and continuous delivery concepts
              - listitem [ref=e46]: Expertise in designing software systems
              - listitem [ref=e47]: Deep understanding of testing, continuous integration, build, deployment & monitoring
              - listitem [ref=e48]: Expertise in profiling and improving application performance
              - listitem [ref=e49]: Experience with build systems (Make, Bazel/Pants/Buck, Gradle) and package management tools (pip, npm)
              - listitem [ref=e50]: Experience with UNIX-like operating systems and tools like Terraform, Ansible, Puppet for managing them
              - listitem [ref=e51]: Experience working with in-stream data processing using Apache Kafka, RabbitMQ, ActiveMQ, or similar technologies
              - listitem [ref=e52]: Production experience with Docker and Kubernetes
              - listitem [ref=e53]: Front-end experience in Angular, React, or similar JavaScript framework
              - listitem [ref=e54]: Database experience with PostgreSQL, SQL Server, or similar database technologies
            - paragraph [ref=e55]:
              - strong [ref=e56]: "ADDITIONAL REQUIREMENTS:"
            - list [ref=e57]:
              - listitem [ref=e58]: You may be asked to work extended hours/weekends dependent on launch cadence
              - listitem [ref=e59]: This role requires you to be onsite. Remote and/or hybrid work will not be considered
            - generic [ref=e60]:
              - strong [ref=e61]: "COMPENSATION AND BENEFITS:"
              - text: "Pay Range:"
              - text: "Software Engineer/Level I: $125,000.00 - $145,000.00/per year"
              - text: "Software Engineer/Level II: $145,000.00 - $175,000.00/per year"
            - generic [ref=e62]:
              - paragraph [ref=e63]: "Your actual level and base salary will be determined on a case-by-case basis and may vary based on the following considerations: job-related knowledge and skills, education, and experience."
              - paragraph [ref=e64]: Base salary is just one part of your total rewards package at SpaceX. You may also be eligible for long-term incentives, in the form of company stock, stock options, or long-term cash awards, as well as potential discretionary bonuses and the ability to purchase additional stock at a discount through an Employee Stock Purchase Plan. You will also receive access to comprehensive medical, vision, and dental coverage, access to a 401(k) retirement plan, short and long-term disability insurance, life insurance, paid parental leave, and various other discounts and perks. You may also accrue 3 weeks of paid vacation and will be eligible for 10 or more paid holidays per year. Employees accrue paid sick leave pursuant to Company policy which satisfies or exceeds the accrual, carryover, and use requirements of the law.
          - generic [ref=e65]:
