              - strong [ref=e550]: How do you know if you have a disability?
              - paragraph [ref=e551]:
                - text: A disability is a condition that substantially limits one or more of your “major life activities.” If you have or have ever had such a condition, you are a person with a disability.
                - strong [ref=e552]: "Disabilities include, but are not limited to:"
              - list [ref=e553]:
                - listitem [ref=e554]: Alcohol or other substance use disorder (not currently using drugs illegally)
                - listitem [ref=e555]: Autoimmune disorder, for example, lupus, fibromyalgia, rheumatoid arthritis, HIV/AIDS
                - listitem [ref=e556]: Blind or low vision
                - listitem [ref=e557]: Cancer (past or present)
                - listitem [ref=e558]: Cardiovascular or heart disease
                - listitem [ref=e559]: Celiac disease
                - listitem [ref=e560]: Cerebral palsy
                - listitem [ref=e561]: Deaf or serious difficulty hearing
                - listitem [ref=e562]: Diabetes
                - listitem [ref=e563]: Disfigurement, for example, disfigurement caused by burns, wounds, accidents, or congenital disorders
                - listitem [ref=e564]: Epilepsy or other seizure disorder
                - listitem [ref=e565]: Gastrointestinal disorders, for example, Crohn's Disease, irritable bowel syndrome
                - listitem [ref=e566]: Intellectual or developmental disability
                - listitem [ref=e567]: Mental health conditions, for example, depression, bipolar disorder, anxiety disorder, schizophrenia, PTSD
                - listitem [ref=e568]: Missing limbs or partially missing limbs
                - listitem [ref=e569]: Mobility impairment, benefiting from the use of a wheelchair, scooter, walker, leg brace(s) and/or other supports
                - listitem [ref=e570]: Nervous system condition, for example, migraine headaches, Parkinson’s disease, multiple sclerosis (MS)
                - listitem [ref=e571]: Neurodivergence, for example, attention-deficit/hyperactivity disorder (ADHD), autism spectrum disorder, dyslexia, dyspraxia, other learning disabilities
                - listitem [ref=e572]: Partial or complete paralysis (any cause)
                - listitem [ref=e573]: Pulmonary or respiratory conditions, for example, tuberculosis, asthma, emphysema
                - listitem [ref=e574]: Short stature (dwarfism)
                - listitem [ref=e575]: Traumatic brain injury
