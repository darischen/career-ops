          - generic [ref=e23]:
            - heading "About Anthropic" [level=2] [ref=e24]:
              - strong [ref=e25]: About Anthropic
            - paragraph [ref=e26]: Anthropic’s mission is to create reliable, interpretable, and steerable AI systems. We want AI to be safe and beneficial for our users and for society as a whole. Our team is a quickly growing group of committed researchers, engineers, policy experts, and business leaders working together to build beneficial AI systems.
          - generic [ref=e27]:
            - heading "About the role" [level=2] [ref=e28]
            - paragraph [ref=e29]: The Computer Use team teaches Claude to see and operate computer interfaces, and builds the agent harness and end-user products that turn that capability into real tools. The team sits inside Anthropic's research organization and closes the loop between product and model.
            - paragraph [ref=e30]: As a Product Engineer on this team, you'll own end-to-end delivery of our computer-use and browser-control product surfaces. You'll build across the full stack, from the user interface to the agent runtime to the backend services behind it. You'll work directly alongside researchers, with no layers between you and the model or the user.
            - paragraph [ref=e31]: This is a dynamic role in which priorities evolve frequently. Success depends on a high tolerance for ambiguity, the adaptability to shift focus as needs change, and the agility and discernment to continuously prioritize the highest impact work.
            - heading "Key responsibilities" [level=2] [ref=e32]
            - list [ref=e33]:
              - listitem [ref=e34]:
                - paragraph [ref=e35]: "Own end-to-end delivery of computer-use and browser-control product surfaces: scope, build, ship, measure, and iterate"
              - listitem [ref=e36]:
                - paragraph [ref=e37]: Diagnose and resolve reliability and robustness issues in the computer-use agent harness that block real-world usage
              - listitem [ref=e38]:
                - paragraph [ref=e39]: Partner with computer-use researchers
              - listitem [ref=e40]:
                - paragraph [ref=e41]: Partner with the Claude Cowork team on shared surfaces, integrations, and knowledge-worker workflows
              - listitem [ref=e42]:
                - paragraph [ref=e43]: Instrument products and use usage data to drive prioritization and measure progress
              - listitem [ref=e44]:
                - paragraph [ref=e45]: Translate fuzzy user pain points into concrete, shippable features for knowledge workers
            - heading "Minimum qualifications" [level=2] [ref=e46]
            - list [ref=e47]:
              - listitem [ref=e48]:
                - paragraph [ref=e49]: Experience building and shipping a product from zero to one with end-to-end ownership, as a founding or early engineer at a startup or with equivalent ownership inside a larger company
              - listitem [ref=e50]:
                - paragraph [ref=e51]: Strong full-stack engineering skills, including production web frontend and backend development
              - listitem [ref=e52]:
                - paragraph [ref=e53]: Hands-on experience building with LLM APIs, prompting, or agent frameworks
              - listitem [ref=e54]:
                - paragraph [ref=e55]: A track record of shipping to external users and iterating based on their feedback
            - heading "Preferred qualifications" [level=2] [ref=e56]
            - list [ref=e57]:
              - listitem [ref=e58]:
                - paragraph [ref=e59]: Strong product design instincts and the ability to produce a clean, usable interface without a dedicated designer
              - listitem [ref=e60]:
                - paragraph [ref=e61]: Experience with browser automation, desktop automation, or robotic process automation systems
              - listitem [ref=e62]:
                - paragraph [ref=e63]: Experience building evals or quality harnesses for machine learning systems
              - listitem [ref=e64]:
                - paragraph [ref=e65]: Comfort with lightweight data analysis, such as SQL, notebooks, and defining and tracking product metrics
              - listitem [ref=e66]:
                - paragraph [ref=e67]: Experience designing agent loops, tool integrations, or guardrails for LLM-based systems
            - heading "Representative projects" [level=2] [ref=e68]
            - list [ref=e69]:
              - listitem [ref=e70]:
                - paragraph [ref=e71]: Own and resolve the top reliability and robustness issues on the computer-control and browser-control product surfaces, with measurable improvement in task success rate
              - listitem [ref=e72]:
                - paragraph [ref=e73]: Take a net-new computer-use powered workflow from concept to external users, including instrumentation and a readout on usage
