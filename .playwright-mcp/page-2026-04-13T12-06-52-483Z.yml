          - generic [ref=e21]:
            - paragraph [ref=e22]: At Underdog, we make sports more fun.
            - paragraph [ref=e23]: "Our thesis is simple: build the best products and we’ll build the biggest company in the space, because there’s so much more to be built for sports fans. We’re just over five years in, and we’re one of the fastest-growing sports companies ever, most recently valued at $1.3B. And it’s still the early days."
            - paragraph [ref=e24]: We’ve built and scaled multiple games and products across fantasy sports, sports betting, and prediction markets, all united in one seamless, simple, easy to use, intuitive and fun app.
            - paragraph [ref=e25]: Underdog isn’t for everyone. One of our core values is give a sh*t. The people who win here are the ones who care, push, and perform. If that’s you, come join us.
            - paragraph [ref=e26]: Winning as an Underdog is more fun.
          - generic [ref=e27]:
            - paragraph [ref=e28]: As an Associate Software Engineer, you’ll work on meaningful, user-facing features while learning from experienced engineers across the full development lifecycle. You’ll gain hands-on experience, contribute to real product decisions, and build features used by millions of sports fans. This is a strong opportunity to grow quickly and make a visible impact early in your career.
            - heading "About the role" [level=3] [ref=e29]:
              - strong [ref=e30]: About the role
            - list [ref=e31]:
              - listitem [ref=e32]: Work on cutting-edge projects that gamify and enhance the user experience across our products
              - listitem [ref=e33]: Design and build clean, reusable, and performant features that will be used by millions of sports fans
              - listitem [ref=e34]: Collaborate closely with product managers, designers, and engineers to deliver experiences
              - listitem [ref=e35]: Contribute to the upkeep and ongoing development of our design system and components
              - listitem [ref=e36]: Write well-tested, high-quality code while participating in code reviews and ensuring engineering best practices
              - listitem [ref=e37]: Work in a high-agency environment where your voice matters in technical discussions and product direction
              - listitem [ref=e38]: Learn from talented engineers and leaders in the fantasy and sports betting space while contributing your own unique perspective and expertise
            - heading "Who you are" [level=3] [ref=e39]:
              - strong [ref=e40]: Who you are
            - list [ref=e41]:
              - listitem [ref=e42]: B.S. (or higher) in Computer Science or a related STEM field; this role is best suited for candidates graduating in Spring 2026, given the Summer 2026 start date.
              - listitem [ref=e43]: Experience with one or more object-oriented programming languages
              - listitem [ref=e44]: Track record of shipping high-quality, feature-rich products with a portfolio of side projects
              - listitem [ref=e45]: Desire to work in a fast-paced environment, continuously grow, and master your craft
              - listitem [ref=e46]: Strong communication skills and a collaborative, consumer-facing, product-forward mindset
              - listitem [ref=e47]: Extreme passion for sports; bonus points for sports or sports gaming–related side projects (e.g., apps, content, models, communities)
