          - generic [ref=e82]: Apply now
        - generic [ref=e84]: Meta is seeking a data center Critical Facility Engineer to join our Data Center Facility Operations team. Our data centers serve as the foundation upon which our software operates to meet the demands of our customers. The Critical Facility Engineer will be a part of the Facility Operations team responsible for operating and maintaining critical systems in our data centers.
        - separator [ref=e85]
        - generic [ref=e86]:
          - heading [level=2] [ref=e87]: Critical Facility Engineer Responsibilities
          - list [ref=e88]:
            - generic [ref=e89]:
              - listitem [ref=e90]: Perform hands-on operations and maintenance which includes all physical and administrative operations tasks, service, and maintenance in accordance with site processes and procedures to ensure the highest levels of uptime, efficiency, and safety without disruption to the business
              - listitem [ref=e91]: Complete work order requests accurately and on time in an enterprise asset management (EAM) system (Hexagon)
              - listitem [ref=e92]: Achieve and maintain a high-level of technical knowledge regarding data center infrastructure and operations. Successfully complete personnel qualification standards (PQS) training
              - listitem [ref=e93]: Provides technical expertise and assistance as required
              - listitem [ref=e94]: Respond quickly, using Meta procedures or emergency operating procedures to data center facility emergencies
              - listitem [ref=e95]: Regularly inspect equipment, buildings, safety routes and grounds to check or identify any abnormal or unsafe conditions or faults
              - listitem [ref=e96]: Troubleshoot, evaluate and recommend system upgrades
              - listitem [ref=e97]: Order parts and supplies for maintenance and repairs
              - listitem [ref=e98]: Work with vendors and contractors to ensure work is in accordance with the agreed Meta processes, procedures, and standards
              - listitem [ref=e99]: Escalate issues to facility management appropriately and timely
              - listitem [ref=e100]: Assist in scheduling and supervising vendors/subcontractors during equipment/systems maintenance and service
              - listitem [ref=e101]: Provide recommendation of improvements to the operations and maintenance program on an on-going basis
              - listitem [ref=e102]: Required to work on a shift schedule, which may include nights and holidays
              - listitem [ref=e103]: Utilize computerized tooling, in a control room environment, to operate remote equipment, monitor system alerts, centralize communications, diagnose faults, and prioritize dispatching of resources
        - generic [ref=e104]:
          - heading [level=2] [ref=e105]: Minimum Qualifications
          - list [ref=e106]:
            - generic [ref=e107]:
              - listitem [ref=e108]: 6+ years of experience in electrical, HVAC, mechanical, controls, or other technical maintenance field
              - listitem [ref=e109]: Associate's degree in engineering plus 4+ years experience or Bachelor's degree in related field plus 2+ years experience in electrical, HVAC, mechanical, or controls will be considered in lieu of 6+ years experience
              - listitem [ref=e110]: Use hands and fingers
              - listitem [ref=e111]: Reach/push/pull with arms/hands/shoulders
              - listitem [ref=e112]: Stoop, kneel, crouch and crawl
              - listitem [ref=e113]: Lift and/or otherwise move 45 pounds or more
              - listitem [ref=e114]: Sit or stand at a workstation for extended periods of time
              - listitem [ref=e115]: The candidate will need to be experienced in a broad range of industries such as electrical generation, electrical distribution, cooling technologies, building control and fire protection systems
        - generic [ref=e116]:
          - heading [level=2] [ref=e117]: Preferred Qualifications
          - list [ref=e118]:
            - generic [ref=e119]:
              - listitem [ref=e120]: Experience adhering to and implementing responsible, ethical AI practices (e.g., risk assessment, bias mitigation, quality and accuracy reviews)
              - listitem [ref=e121]: Demonstrated ability to integrate AI tools to optimize/redesign workflows and drive measurable impact (e.g., efficiency gains, quality improvements)
              - listitem [ref=e122]: Demonstrated ongoing AI skill development (e.g., prompt/context engineering, agent orchestration) and staying current with emerging AI technologies
        - separator [ref=e123]
        - generic [ref=e124]:
          - heading [level=2] [ref=e125]: About Meta
          - generic [ref=e128]: Meta builds technologies that help people connect, find communities, and grow businesses. When Facebook launched in 2004, it changed the way people connect. Apps like Messenger, Instagram and WhatsApp further empowered billions around the world. Now, Meta is moving beyond 2D screens toward immersive experiences like augmented and virtual reality to help build the next evolution in social technology. People who choose to build their careers by building with us at Meta help shape a future that will take us beyond what digital connection makes possible today—beyond the constraints of screens, the limits of distance, and even the rules of physics.
