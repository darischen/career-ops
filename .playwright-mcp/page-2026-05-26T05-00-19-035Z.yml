                - listitem [ref=e446]: Autoimmune disorder, for example, lupus, fibromyalgia, rheumatoid arthritis, HIV/AIDS
                - listitem [ref=e447]: Blind or low vision
                - listitem [ref=e448]: Cancer (past or present)
                - listitem [ref=e449]: Cardiovascular or heart disease
                - listitem [ref=e450]: Celiac disease
                - listitem [ref=e451]: Cerebral palsy
                - listitem [ref=e452]: Deaf or serious difficulty hearing
                - listitem [ref=e453]: Diabetes
                - listitem [ref=e454]: Disfigurement, for example, disfigurement caused by burns, wounds, accidents, or congenital disorders
                - listitem [ref=e455]: Epilepsy or other seizure disorder
                - listitem [ref=e456]: Gastrointestinal disorders, for example, Crohn's Disease, irritable bowel syndrome
                - listitem [ref=e457]: Intellectual or developmental disability
                - listitem [ref=e458]: Mental health conditions, for example, depression, bipolar disorder, anxiety disorder, schizophrenia, PTSD
                - listitem [ref=e459]: Missing limbs or partially missing limbs
                - listitem [ref=e460]: Mobility impairment, benefiting from the use of a wheelchair, scooter, walker, leg brace(s) and/or other supports
                - listitem [ref=e461]: Nervous system condition, for example, migraine headaches, Parkinson’s disease, multiple sclerosis (MS)
                - listitem [ref=e462]: Neurodivergence, for example, attention-deficit/hyperactivity disorder (ADHD), autism spectrum disorder, dyslexia, dyspraxia, other learning disabilities
                - listitem [ref=e463]: Partial or complete paralysis (any cause)
