        - generic [ref=e23]:
          - heading "Build, Deploy, and Maintain AI for an Unpredictable World" [level=2] [ref=e24]:
            - strong [ref=e25]: Build, Deploy, and Maintain AI for an Unpredictable World
          - paragraph [ref=e26]: Striveworks helps organizations harness the power of artificial intelligence to solve real-world national security and business challenges by serving as the command center between data, models, and business outcomes. Founded by data scientists and engineers, Striveworks set out to make the journey from deployment to ongoing optimization simple and effective.
          - paragraph [ref=e27]: With Striveworks, organizations aren’t just deploying AI—they’re building systems that remain reliable, adaptable, and ready to scale in an unpredictable world. Mission-critical operations require models that perform where they’re deployed, scale as workloads grow, and adapt rapidly as AI capabilities advance. Striveworks meets these demands—increasing reliability and performance while lowering costs and enabling confident, data-driven decision-making in dynamic environments.
          - heading "The Role" [level=2] [ref=e28]:
            - strong [ref=e29]: The Role
          - paragraph [ref=e30]: As a Machine Learning Engineer at Striveworks, you’ll be challenged—and trusted—on day one to be a core contributor to both the customer-driven projects and the enduring products of the company. You will represent Striveworks as a technology builder on projects and solutions that leverage Chariot, our proprietary AI operations (AIOps) platform, and you will inform and contribute to future capabilities of that platform. You will inform, envision, and help extend Striveworks’ core software products. You will work alongside data scientists, software engineers, and DevOps engineers to transform machine learning models into operational capabilities.
          - paragraph [ref=e31]: You’re right for this opportunity if you value and possess technical expertise and enjoy pushing the boundaries of your own capabilities. You’re outcome-driven and are passionate about applying both software engineering and data science to solve real-world problems. You know that building customer-centric solutions, communicating clearly, and capturing repeatable value into productized capabilities are all important.
          - paragraph [ref=e32]: "Your day-to-day will include:"
          - list [ref=e33]:
            - listitem [ref=e34]: Developing machine learning models and custom analytics that are applied to image, video, text, geospatial, time series, and structured data
            - listitem [ref=e35]: Orchestrating and automating complex data engineering and analytic pipelines
            - listitem [ref=e36]: Envisioning, specifying, and, at times, designing and implementing core product functionality
            - listitem [ref=e37]: Conducting mission-critical fieldwork in support of customers and other stakeholders
          - paragraph [ref=e38]: This position offers a hybrid/on-site work environment at our office in northwest Austin, TX. You will be expected to travel up to 30% of the time.
          - heading "The Right Fit" [level=2] [ref=e39]:
            - strong [ref=e40]: The Right Fit
          - paragraph [ref=e41]: In addition to the specific skills and expertise detailed below, we are looking for individuals who share our values. Sharing a set of values allows us to move at the speed of trust.
          - paragraph [ref=e42]: We value a high-trust work environment where people respect each other and use candor kindly and constructively. We value work that intersects passion and perseverance, we geek out about the potential of our contributions, and we find joy in working hard on things that matter. Finally, we value taking ownership, having agency, and feeling individual responsibility for collective results.
          - paragraph [ref=e43]: "Here’s what we’re looking for:"
          - list [ref=e44]:
            - listitem [ref=e45]: BS degree in computer science, machine learning, or a related discipline and 2+ years of relevant experience
            - listitem [ref=e46]: Experience contributing to data-centric systems (e.g., data engineering, data cleaning, ETL pipelines, machine learning, and other production analytics)
            - listitem [ref=e47]: Proficiency in software engineering fundamentals to include algorithms, data structures, design patterns, and at least one systems programming language (e.g., Go, Rust, C++, Java, Scala, etc.)
            - listitem [ref=e48]: Proficiency in Python and exposure to libraries like TensorFlow, PyTorch, and/or scikit-learn
            - listitem [ref=e49]: Exposure to modern software engineering tools and processes (Agile, version control, issue tracking, CI/CD, debugging, etc.)
            - listitem [ref=e50]: Active Secret (or above) US security clearance
            - listitem [ref=e51]: Due to the nature of this role, candidates must have US citizenship
          - heading "The Wish List" [level=2] [ref=e52]:
            - strong [ref=e53]: The Wish List
          - paragraph [ref=e54]: "We’re very interested in candidates who possess the above qualifications, and we appreciate and consider the addition of:"
          - list [ref=e55]:
            - listitem [ref=e56]: Advanced degree in data science, machine learning, computer science, or a related discipline
            - listitem [ref=e57]: Excellence in Python and deep knowledge of libraries like TensorFlow, PyTorch, and/or scikit-learn
            - listitem [ref=e58]: Knowledge of relevant architectures and design patterns for client-server systems (e.g., asynchronous programming, REST, GraphQL, React, Vue, Angular)
            - listitem [ref=e59]: Experience implementing and deploying software into containerized or cloud environments (e.g., Docker, Kubernetes, infrastructure as code, major cloud architectures)
            - listitem [ref=e60]: Experience with machine learning applied to imagery and/or video data
            - listitem [ref=e61]: Experience building agentic systems, agentic workflows, or AI agents
            - listitem [ref=e62]: Experience defining, scoping, planning, and delivering complex technical solutions
            - listitem [ref=e63]: Experience delivering technology solutions in secure government environments
          - paragraph [ref=e64]: The anticipated base pay range for this position is $140,000–$165,000/year. Striveworks’ total compensation package includes a competitive base salary, equity grants, and cash bonuses.
          - heading "The Benefits" [level=2] [ref=e65]:
            - strong [ref=e66]: The Benefits
          - list [ref=e67]:
            - listitem [ref=e68]: Medical/dental/vision insurance
            - listitem [ref=e69]: Voluntary life, long-term disability, accident, and hospital indemnity insurance
            - listitem [ref=e70]: HSA and FSA (including dependent care FSA) plans
            - listitem [ref=e71]: 401(k) plan
            - listitem [ref=e72]: Unlimited PTO
            - listitem [ref=e73]: Paid parental leave
          - paragraph [ref=e74]:
            - text: Check us out on
            - link "Built In" [ref=e75] [cursor=pointer]:
              - /url: https://builtin.com/company/striveworks
            - text: "!"
          - paragraph [ref=e76]:
            - emphasis [ref=e77]: Striveworks is an Equal Opportunity Employer and does not discriminate in employment on the basis of race, color, religion, belief, sex (including pregnancy and gender identity or expression), national origin, social or ethnic origin, political affiliation, sexual orientation, marital status, disability, genetic information, age, membership in an employee organization, retaliation, parental status, military service, or other non-merit factors. Striveworks will not tolerate discrimination or harassment of any kind.
