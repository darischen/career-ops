            - paragraph [ref=e23]:
              - strong [ref=e24]: About the Company
            - paragraph [ref=e25]:
              - text: At Torc, we have always believed that autonomous vehicle technology will transform how we travel, move freight, and do business.
              - text: A leader in autonomous driving since 2007, Torc has spent over a decade commercializing our solutions with experienced partners.
              - link "Now a part of the Daimler family" [ref=e26] [cursor=pointer]:
                - /url: https://torc.ai/daimler-testing-automated-trucks-public/
                - generic [ref=e27]: Now a part of the Daimler family
              - text: ", we are focused solely on developing software for automated trucks to transform how the world moves freight."
              - text: Join us and catapult your career with the company that helped pioneer autonomous technology, and the first AV software company with the vision to partner directly with a truck manufacturer.
            - paragraph [ref=e28]:
              - strong [ref=e29]: Meet the Team
            - paragraph [ref=e30]:
              - generic [ref=e34]: The Operating System Team develops and maintains a light-weight in-house modified Linux distribution based on the usage of open source technologies. This also comprises the integration of third party libraries to efficiently run Machine Learning based Applications on NVIDIA target SoCs as wall as the development, operation and maintenance of the required build-system technologies.
            - paragraph [ref=e35]:
