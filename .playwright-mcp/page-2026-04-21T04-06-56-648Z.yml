            - paragraph [ref=e336]: SNC is a trusted global leader in aerospace and national security. Our innovative solutions enable connected protection through command, control and communications systems, as well as ISR, cyber, electromagnetic spectrum management, and other high capabilities for systems across all domains – sea, land, air, space and cyber.
            - paragraph [ref=e337]
            - paragraph [ref=e338]: As a longstanding leader in defense technology, SNC is the optimum intersection of commercial, defense and non-traditional contractors. We are one of the only privately owned mid-tier A&D contractors and we pride ourselves on our ability to invest early and often to ensure mission success on or ahead of schedule. It’s part of our mission to always stay one step ahead; working on solutions today to solve the problems of tomorrow.
