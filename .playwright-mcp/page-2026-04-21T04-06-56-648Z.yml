                - text: Learn more about the background check process for Security Clearances.
            - paragraph [ref=e165]
            - paragraph [ref=e166]
            - paragraph [ref=e167]: SNC is a global leader in aerospace and national security committed to moving the American Dream forward. We’re known and respected for our mission and execution focus, agility, and disruptive and rapid innovation. We provide leading edge technologies and transformative solutions that support our nation’s most critical security needs. If you are mission-focused, thrive in collaborative environments, and want to make our country stronger with state-of-the-art technologies that safeguard freedom, join our team!
