            - paragraph [ref=e99]
            - paragraph [ref=e100]
            - text: Do you enjoy developing new products and services? Join us! Our Software Engineers work in an agile, collective environment. As a Software Engineer I, you will assist in the development and maintenance of software systems for aerospace applications. You will collaborate with cross-functional teams to ensure software quality and performance throughout the development lifecycle.
            - paragraph [ref=e101]
            - paragraph [ref=e102]
            - text: The Mission Solutions and Technologies (MST) business area provides affordable, turn-key command/control, communications, integrated ISR, force protection and security solutions worldwide. The MST team has a long legacy of supporting the Department of Defense, Department of Homeland Security, commercial and international customers with years of experience in platform operations, engineering and full lifecycle management across domains – air, land, sea, space and cyber.
            - paragraph [ref=e103]
            - paragraph [ref=e104]
            - paragraph [ref=e105]: "Responsibilities:"
            - list [ref=e106]:
              - listitem [ref=e107]: Assist in the design, development, and testing of software components.
              - listitem [ref=e108]: Debug and troubleshoot software issues.
              - listitem [ref=e109]: Write and maintain code documentation.
              - listitem [ref=e110]: Collaborate with team members to ensure code quality and adherence to standards.
              - listitem [ref=e111]: Participate in code reviews and provide constructive feedback.
              - listitem [ref=e112]: Support the integration of software with hardware systems.
            - paragraph [ref=e113]
            - paragraph [ref=e114]: "Qualifications You Must Have:"
            - list [ref=e115]:
              - listitem [ref=e116]: Bachelor's degree in Computer Science, Software Engineering, or related field.
              - listitem [ref=e117]: 0-2+ years of experience in software development.
              - listitem [ref=e118]: Basic proficiency in programming languages such as C++, Java, or Python.
              - listitem [ref=e119]: Familiarity with Linux-based Operating Systems, preferably RedHat or its equivalents.
              - listitem [ref=e120]: Foundational understanding of engineering principles and software development best practices.
              - listitem [ref=e121]: Willingness to collaborate and learn as part of multi-disciplinary teams.
              - listitem [ref=e122]: Demonstrated eagerness to learn and adapt to new technological requirements.
              - listitem [ref=e123]: Basic knowledge of Linux OS system administration tasks (e.g., navigating file systems, managing files and processes).
              - listitem [ref=e124]: Understanding of at least one compiled, object-oriented programming language (e.g., C++, Java), as distinct from interpreted or scripting languages.
              - listitem [ref=e125]: Exposure to scripting languages such as Python or Bash (Bourne-Again Shell).
              - listitem [ref=e126]: Familiarity with software development tools (e.g., version control, issue tracking, code review tools) is a plus.
              - listitem [ref=e127]: Awareness of software development methodologies, such as Agile/Scrum or Waterfall.
              - listitem [ref=e128]: Basic understanding of common data structures (e.g., linked lists, hash tables, arrays) and their use in problem-solving.
              - listitem [ref=e129]: Entry-level role is designed for candidates with 0–2 years of experience. We value a willingness to learn, teamwork, and foundational technical skills. You’ll have the opportunity to grow and develop your expertise in a collaborative environment.
            - paragraph [ref=e130]
            - paragraph [ref=e131]: "Qualifications We Prefer:"
            - list [ref=e132]:
              - listitem [ref=e133]: Internship or cooperative education experience in software development.
              - listitem [ref=e134]: Exposure to the Aerospace and Defense industry.
              - listitem [ref=e135]: Understanding of industry standard software languages such as C, C#, C++, HTML, Java, Python, and Bash.
              - listitem [ref=e136]: Experience with software tools for requirements tracking, code reviews, static analysis, library and artifact repository, and automated build.
              - listitem [ref=e137]: Knowledge of software development methodologies such as Agile/Scrum, Waterfall, and Spiral.
              - listitem [ref=e138]: Familiarity with data structures.
            - paragraph [ref=e139]
            - paragraph [ref=e140]: "Essential Functions:"
            - list [ref=e141]:
              - listitem [ref=e142]: Ability to work on a computer for extended periods.
              - listitem [ref=e143]: Hand/finger dexterity for coding and testing.
              - listitem [ref=e144]: Ability to work in a hybrid environment with occasional travel.
            - paragraph [ref=e145]
            - paragraph [ref=e146]
            - paragraph [ref=e147]
            - paragraph [ref=e148]: This posting will be open for application for a minimum of 5 days and may be extended based on business needs.
