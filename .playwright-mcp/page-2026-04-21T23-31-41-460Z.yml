          - generic [ref=e122]:
            - paragraph [ref=e123]: Kickstart your consulting career by joining Accenture's Technology Development Program! Leverage your skills and strengths to help our clients solve their most pressing business challenges, embracing the latest technology to become the next best version of themselves.
            - paragraph [ref=e124]: Not only will you have amazing opportunities to learn, develop and grow your skills, you will join a collaborative environment that unleashes innovation, allows our people to perform at their very best and supports a culture in which everyone feels they have an equal opportunity to belong and build a career.
            - paragraph [ref=e125]
            - paragraph [ref=e126]: Looking to expand your AI technical skills using Claude and the broader Anthropic ecosystem? Check out the Anthropic/Claude Analyst Role within our Technology Development Program.
            - paragraph [ref=e127]
            - paragraph [ref=e128]: The Role
            - paragraph [ref=e129]: This role is designed for non‑Claude certified candidates who will be trained and certified in Claude and grow into a Claude Analyst role supporting clients. As an Anthropic/Claude Analyst, work at the intersection of business, technology, and AI – using Claude models and the broader Anthropic ecosystem, including the Claude API, Claude Code, etc. to design, build, and deploy intelligent solutions that solve real client problems.
            - paragraph [ref=e130]
            - paragraph [ref=e131]: Key Responsibilities
            - list [ref=e132]:
              - listitem [ref=e133]:
                - paragraph [ref=e134]: Design, test, and iterate on prompts and system instructions to optimize Claude's output quality across diverse client projects.
              - listitem [ref=e135]:
                - paragraph [ref=e136]: Identify, prioritize, and document high-impact opportunities for Claude integration across client projects (e.g., customer support, research, legal review, software development).
              - listitem [ref=e137]:
                - paragraph [ref=e138]: Define and track KPIs to evaluate the effectiveness, accuracy, and ROI of Claude-powered workflows, present insights and recommendations to clients.
              - listitem [ref=e139]:
                - paragraph [ref=e140]: Collaborate with engineering teams to support API integrations, tool use implementations, and agentic workflow design using Anthropic's platform.
            - paragraph [ref=e141]
            - paragraph [ref=e142]: Ways of Working
            - paragraph [ref=e143]: We are looking for candidates who actively and frequently use AI in their day to‑day work or studies. Successful candidates can demonstrate practical, everyday examples of how they leverage AI; ability to write effective prompts, iterate on outputs, and adapt AI responses to solve real problems.
            - paragraph [ref=e144]: Candidates should demonstrate sound judgment when using AI, validate outputs, understand limitations, and show curiosity about how AI is reshaping modern software engineering.
