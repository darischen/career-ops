        - generic [ref=e20]:
          - paragraph [ref=e21]: Junior Software Engineer (Backend + AI)
          - paragraph [ref=e22]:
            - text: About Newton Research
            - text: Newton Research builds an AI-powered research and analysis platform used by enterprises to unlock insights from their data. Our platform connects to major data warehouses (BigQuery, Snowflake, Databricks, Redshift), runs autonomous AI agents that reason over structured and unstructured data, and presents findings through a rich interactive frontend. We're a small, high-output team where interns work on production code from week one.
          - paragraph [ref=e23]: "Our stack is real, and we want you to know what you're getting into:"
          - list [ref=e24]:
            - listitem [ref=e25]: "Backend: Python 3.13, Django 5.2, Django REST Framework, PostgreSQL, Redis"
            - listitem [ref=e26]: "AI/ML: OpenAI, Anthropic, and Google LLM APIs; LangChain + LangGraph agent orchestration; sentence-transformers for vector embeddings; RAGAS for evaluation"
            - listitem [ref=e27]: "Data Science: NumPy, Pandas, Polars, scikit-learn, XGBoost, PyMC (Bayesian), Prophet, Plotly"
            - listitem [ref=e28]: "Frontend: React 19, TypeScript, Vite, Ant Design, TanStack Query, SCSS Modules"
            - listitem [ref=e29]: "Infra: Docker, GitHub Actions CI/CD, AWS (S3, ECR), MinIO, Sentry, RQ (Redis Queue) for async workers"
            - listitem [ref=e30]: "Testing: pytest with 4,700+ tests, Vitest, Playwright E2E, parallel execution via xdist"
          - paragraph [ref=e31]:
            - text: What You'll Actually Do
            - text: This isn't a "shadow an engineer and take notes" internship. You'll touch production code in a codebase with 7,700+ lines of Django models, complex multi-table relationships, and AI agent pipelines that call LLMs, execute tools, and reason over enterprise data.
            - text: "Typical intern-level work here looks like:"
            - text: Build API endpoints — Write DRF serializers and viewsets that serve data to our React frontend. Our models have real complexity (JSONFields, custom managers, mixin patterns) so you'll learn to think about data modeling.
            - text: Extend AI agent capabilities — Add new tools to our LangGraph-based agents. Understand how retrieval-augmented generation works by working on our memory system (vector embeddings + semantic search).
            - text: Write async task workers — Our RQ workers process everything from document parsing (PDF/Excel/PowerPoint) to LLM inference pipelines. You'll write and debug distributed task logic.
          - list [ref=e32]:
            - listitem [ref=e33]: Improve test coverage — We take testing seriously. You'll write pytest tests with real database fixtures, mock external APIs with responses and moto, and learn to catch N+1 queries with nplusone.
            - listitem [ref=e34]: Ship frontend features — Build React components with TypeScript, wire them to TanStack Query for data fetching, and style them with SCSS Modules. Our frontend includes rich text editing (Milkdown), interactive charts (Nivo, Plotly, Highcharts), and virtualized data tables.
            - listitem [ref=e35]: Debug AI output — When an agent hallucinates or a retrieval pipeline returns irrelevant results, you'll help diagnose and fix it. This is the skill that separates AI-era developers from everyone else.
          - paragraph [ref=e36]:
            - text: Who We're Looking For
            - text: "We're realistic: true full-stack engineers are rare at the intern level. We're looking for someone who's strong on backend fundamentals, curious about AI, and willing to learn frontend. Here's what matters:"
            - text: "Required:"
          - list [ref=e37]:
            - listitem [ref=e38]: Solid Python fundamentals — you can write a class, debug a traceback, and reason about data structures without AI autocomplete
            - listitem [ref=e39]: Familiarity with web APIs (you understand HTTP methods, JSON serialization, request/response cycles)
            - listitem [ref=e40]: Comfort with Git (branching, rebasing, resolving merge conflicts)
            - listitem [ref=e41]: Experience with at least one database (SQL queries, basic schema design)
            - listitem [ref=e42]: Genuine curiosity about AI/ML — you've used LLM APIs, built a RAG pipeline, fine-tuned a model, or at least experimented seriously beyond just chatting with ChatGPT
            - listitem [ref=e43]: Ability to debug AI-generated code — we use AI tools extensively, but shipping broken AI output is worse than writing it yourself
          - paragraph [ref=e44]: "Nice to Have:"
          - list [ref=e45]:
            - listitem [ref=e46]: Django or Flask experience
            - listitem [ref=e47]: React/TypeScript exposure (even a personal project)
            - listitem [ref=e48]: Familiarity with Docker and containerized development
            - listitem [ref=e49]: Experience with vector databases, embeddings, or LLM orchestration frameworks (LangChain, etc.)
            - listitem [ref=e50]: Contributions to open-source projects
            - listitem [ref=e51]: A deployed project you can demo (we value this more than your GPA)
          - paragraph [ref=e52]: "What We Value (Read: What Our Code Says About Us)"
          - list [ref=e53]:
            - listitem [ref=e54]: Testing is non-negotiable. 4,700+ tests, parallel CI execution, time-mocking with freezegun, AWS mocking with moto. If you write a feature, you write the test.
            - listitem [ref=e55]: Automation over manual process. We have 40+ CI/CD deployment pipelines, automated versioning with semantic-release, pre-commit hooks with husky + lint-staged. We invest in tooling.
            - listitem [ref=e56]: Clean architecture matters. Mixins, custom model managers, structured serializer patterns, typed frontend components. The codebase is organized, and we expect contributions to match.
            - listitem [ref=e57]: AI is a tool, not magic. We build AI products and we use AI to build them. We expect you to be fluent with AI coding tools, but also to understand what they produce and when they're wrong.
          - paragraph [ref=e58]: What You'll Learn
          - list [ref=e59]:
            - listitem [ref=e60]: How a production AI platform works end-to-end — from data ingestion to LLM inference to user-facing results
            - listitem [ref=e61]: Django at scale — complex querysets, database optimization, async task processing
            - listitem [ref=e62]: Modern AI engineering — not just calling APIs, but building retrieval systems, managing embeddings, evaluating output quality with RAGAS
            - listitem [ref=e63]: Real software engineering practices — code review, CI/CD, testing, observability (Sentry, LangSmith)
            - listitem [ref=e64]: How to work with enterprise data connectors (BigQuery, Snowflake, Databricks) in a production system
          - paragraph [ref=e65]: Logistics
          - list [ref=e66]:
            - listitem [ref=e67]: Permanent, Full-time
            - listitem [ref=e68]: "Format: Hybrid — we value in-person collaboration but offer flexibility"
            - listitem [ref=e69]: "Compensation: $90,000-$110,000"
          - paragraph [ref=e70]:
            - text: How to Apply
            - text: "Send us:"
            - text: Your GitHub (or equivalent portfolio) — a deployed project, an open-source contribution, or even a well-documented experiment beats a resume
          - list [ref=e71]:
            - listitem [ref=e72]:
              - text: A short note on what you've built with AI tools (not what you've
              - emphasis [ref=e73]: used
              - text: — what you've
              - emphasis [ref=e74]: built
              - text: )
            - listitem [ref=e75]: "Your resume (we'll read it, but #1 and #2 matter more)"
          - paragraph [ref=e76]:
            - text: We review applications on a rolling basis. The best candidates move fast — don't wait.
            - emphasis [ref=e77]: Newton Research Inc is an equal opportunity employer. We hire based on skill, curiosity, and demonstrated ability — not pedigree.
            - text: (edited)
