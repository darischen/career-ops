      - heading "Discover Your Career at Emory University" [level=2] [ref=e59]
      - paragraph [ref=e63]: Emory University is a leading research university that fosters excellence and attracts world-class talent to innovate today and prepare leaders for the future. We welcome candidates who can contribute to the excellence of our academic community.
      - heading "Description" [level=2] [ref=e64]
      - generic [ref=e67]:
        - paragraph [ref=e68]: "KEY RESPONSIBILITIES:"
        - list [ref=e69]:
          - listitem [ref=e70]: Provides software development support including the identification and generation of software specifications and the designing, development, implementation and revision of software applications to meet business needs.
          - listitem [ref=e71]: Supports software applications and associated operating systems.
          - listitem [ref=e72]: Reviews software specifications, systems, models and coding using analytical and investigative methods and techniques to ensure required specifications meet system needs.
          - listitem [ref=e73]: Participates in software testing and subsequent modifications.
          - listitem [ref=e74]: Writes and edits reports to provide recommendations, conclusions and other data.
          - listitem [ref=e75]: Performs related responsibilities as required.
        - paragraph [ref=e76]: "MINIMUM QUALIFICATIONS:"
        - list [ref=e77]:
          - listitem [ref=e78]: A bachelor's degree in computer science, math, engineering or a related field and one year of related experience in programming and software systems or an equivalent combination of education, training and experience.
          - listitem [ref=e79]: Knowledge of software development in a research institution context preferred.
        - paragraph [ref=e80]: "PREFERRED QUALIFICATIONS:"
        - list [ref=e81]:
          - listitem [ref=e82]: Master's Degree in Computer Science, Mathematics, Engineering, or a related field.
          - listitem [ref=e83]: Experience with containerization technologies (e.g., Docker, Kubernetes).
          - listitem [ref=e84]: Experience with JavaScript libraries for data visualization (e.g., d3.js).
          - listitem [ref=e85]: Experience with web frameworks for building web applications (e.g., React, Angular).
          - listitem [ref=e86]: Basic knowledge of linguistics or neuroscience and neuroanatomy.
        - paragraph [ref=e87]: "ADDITIONAL JOB DETAILS:"
        - paragraph [ref=e88]:
          - generic [ref=e89]:
            - text: Join the Emory University's Language Biomarker Lab. The Language Biomarker Lab focuses on using
            - text: AI and NLP to predict and better understand conditions such as Psychosis, Depression, and Alzheimer’s Disease.
        - paragraph [ref=e90]
        - paragraph [ref=e91]:
          - text: As a Software Engineer, you will play a key role in developing and maintaining bioinformatic pipelines
          - text: for a 42-site international project investigating language, facial, and acoustic indicators of psychosis.
        - paragraph [ref=e92]: "Data Engineering:"
        - list [ref=e93]:
          - listitem [ref=e94]: Design, develop, and maintain high-performance data processing pipelines for large datasets.
          - listitem [ref=e95]: Implement robust quality control (QC) measures and data provenance tracking.
          - listitem [ref=e96]: Develop and maintain databases and APIs for efficient data management and sharing.
          - listitem [ref=e97]: Support data extraction, transformation, and loading (ETL) processes.
          - listitem [ref=e98]: Containerize and deploy software and workflows on high-performance computing platforms (e.g., clusters, cloud).
        - paragraph [ref=e99]: "Natural Language Processing:"
        - list [ref=e100]:
          - listitem [ref=e101]: Develop and maintain NLP tools for language analyses of large samples of language.
          - listitem [ref=e102]: Collaborate with neuroscientists to analyze convergences between language analyses and neuroimaging data.
          - listitem [ref=e103]: Design and implement user-friendly interfaces for data exploration and analysis.
        - paragraph [ref=e104]: "Other key activities:"
        - list [ref=e105]:
          - listitem [ref=e106]: Support web and application server configuration and deployment.
          - listitem [ref=e107]: Maintain and optimize the lab's computing infrastructure. Support data engineering efforts, including database and API design, data extraction/transformation/load, and data aggregation/integration
        - paragraph [ref=e108]: "Required skills:"
        - list [ref=e109]:
          - listitem [ref=e110]: Strong programming skills in Python and Bash.
          - listitem [ref=e111]: Excellent Linux/Unix system administration skills.
          - listitem [ref=e112]: Proficiency with version control systems (e.g., Git).
          - listitem [ref=e113]: Strong communication and interpersonal skills.
        - paragraph [ref=e114]
        - paragraph [ref=e115]: "NOTE: Position tasks are generally required to be performed in-person at an Emory University location. Remote work from home day options may be granted at department discretion. Emory reserves the right to change remote work status with notice to employee."
