        - generic [ref=e178]:
          - paragraph [ref=e179]: At Allstate, great things happen when our people work together to protect families and their belongings from life’s uncertainties. And for more than 90 years, our innovative drive has kept us a step ahead of our customers’ evolving needs. From advocating for seat belts, air bags and graduated driving laws, to being an industry leader in pricing sophistication, telematics, and, more recently, device and identity protection.
          - paragraph [ref=e180]
          - paragraph [ref=e181]
          - paragraph [ref=e182]: Job Description
          - paragraph [ref=e183]
          - paragraph [ref=e184]
          - paragraph [ref=e185]: "Business Title: Software Engineer Consultant II"
          - paragraph [ref=e186]
          - paragraph [ref=e187]: Org, Team, and Work scope
          - list [ref=e188]:
            - listitem [ref=e189]:
              - paragraph [ref=e190]: Enterprise Shared Services Org, and Employee Experience team
            - listitem [ref=e191]:
              - paragraph [ref=e192]: As a software engineer, you will help elevate, automate, and continuously iterate on an in-house LLM-powered chatbot that enables internal employees to access critical information and delivers new features that streamline and automate everyday tasks. This role blends full stack development with applied AI work. You’ll be supported by senior engineers and product partners while owning real deliverables.
            - listitem [ref=e193]:
              - paragraph [ref=e194]: Primary work currently will be an internal AI chatbot designed to help employees get the answers they need—fast, accurately, and at scale. This chatbot supports everyday questions, workflows, and knowledge discovery, reducing friction and enabling teams to focus on meaningful work.
            - listitem [ref=e195]:
              - paragraph [ref=e196]: Our ideal candidate is collaborative, approachable, and enjoys working closely with others. They are eager to dive into new and sometimes unfamiliar technologies, driven by a strong desire to learn, grow, and communicate effectively.
          - paragraph [ref=e197]
          - paragraph [ref=e198]: What’s exciting?
          - list [ref=e199]:
            - listitem [ref=e200]:
              - paragraph [ref=e201]: This role offers engineers the opportunity to sharpen their skills with some of the most innovative and fast emerging technologies. It’s an investment in your future growth while contributing to work that is actively transforming the industry.
            - listitem [ref=e202]:
              - paragraph [ref=e203]: You will work in a paired programming environment, collaborating daily with other engineers to design and implement solutions that remove blockers across a large enterprise ecosystem.
            - listitem [ref=e204]:
              - paragraph [ref=e205]: You’ll build on top of a mature, production LLM application, delivering new features that enhance internal employee workflows and overall experience.
          - paragraph [ref=e206]
          - paragraph [ref=e207]: "Growth & Development. This role is designed as a launchpad. With strong performance, growth paths may include:"
          - list [ref=e208]:
            - listitem [ref=e209]:
              - paragraph [ref=e210]: Full Stack Engineer
            - listitem [ref=e211]:
              - paragraph [ref=e212]: AI / Machine Learning Engineer
            - listitem [ref=e213]:
              - paragraph [ref=e214]: Platform or Product focused Engineering roles
            - listitem [ref=e215]:
              - paragraph [ref=e216]: You’ll grow through hands on work, mentorship, and exposure to real business problems—not just training modules.
          - paragraph [ref=e217]
          - paragraph [ref=e218]: Day to day
          - list [ref=e219]:
            - listitem [ref=e220]:
              - paragraph [ref=e221]: You’ll begin your day pairing with another engineer to design and implement features using test driven development, writing tests before code and iterating through small, meaningful changes.
            - listitem [ref=e222]:
              - paragraph [ref=e223]: You’ll participate in daily standups and planning sessions to align on priorities and unblock work.
            - listitem [ref=e224]:
              - paragraph [ref=e225]: Throughout the day, you’ll refactor and integrate code frequently through CI pipelines, ensuring production ready quality.
            - listitem [ref=e226]:
              - paragraph [ref=e227]: You’ll collaborate closely with teammates and stakeholders, sharing feedback and learning continuously in a highly communicative, XP driven environment.
          - paragraph [ref=e228]
          - paragraph [ref=e229]: "Essential Functions:"
          - list [ref=e230]:
            - listitem [ref=e231]:
              - paragraph [ref=e232]: Deliver high value solutions leveraging LLM technologies while championing best practices in AI driven development.
            - listitem [ref=e233]:
              - paragraph [ref=e234]: Serve as an active contributor to shaping and advancing the company’s evolving AI engineering experience.
            - listitem [ref=e235]:
              - paragraph [ref=e236]: Actively collaborate across teams, proactively stepping in to support and contribute whenever opportunities arise.
            - listitem [ref=e237]:
              - paragraph [ref=e238]: Confidently demonstrate and share solutions with other teams to promote learning and adoption.
            - listitem [ref=e239]:
              - paragraph [ref=e240]: Embrace a team first mindset; success is shared, and we win together.
          - paragraph [ref=e241]
          - paragraph [ref=e242]: Required qualifications
          - list [ref=e243]:
            - listitem [ref=e244]:
              - paragraph [ref=e245]: 0–3 years of experience (or equivalent internships, projects, or bootcamp work)
            - listitem [ref=e246]:
              - paragraph [ref=e247]: Working knowledge of at least one modern programming language or related tools (React, JavaScript, Python, etc.) and willingness to learn new frameworks and tools quickly.
            - listitem [ref=e248]:
              - paragraph [ref=e249]: Experience or strong interest in collaborative software development practices, including pair programming or close team-based development.
            - listitem [ref=e250]:
              - paragraph [ref=e251]: Familiarity with automated testing concepts such as unit testing or test-driven development (TDD).
            - listitem [ref=e252]:
              - paragraph [ref=e253]: Understanding the use of Agile principles and iterative software delivery.
            - listitem [ref=e254]:
              - paragraph [ref=e255]: Strong communication skills and an eagerness to collaborate, learn, and grow within a team first environment.
          - paragraph [ref=e256]
          - paragraph [ref=e257]: Preferred skills and experiences
          - list [ref=e258]:
            - listitem [ref=e259]:
              - paragraph [ref=e260]: Interest or experience working with LLMs, AI enabled applications, or data driven systems.
            - listitem [ref=e261]:
              - paragraph [ref=e262]: Hands on experience practicing Extreme Programming (XP), including pair programming, TDD, and continuous integration.
            - listitem [ref=e263]:
              - paragraph [ref=e264]: Experience building or contributing to production web applications using modern front end and/or back-end frameworks.
            - listitem [ref=e265]:
              - paragraph [ref=e266]: Familiarity with CI/CD pipelines, frequent code integration, and trunk-based development workflows.
            - listitem [ref=e267]:
              - paragraph [ref=e268]: Familiarity with DevOps tools such as Jenkins, GitHub, Docker
            - listitem [ref=e269]:
              - paragraph [ref=e270]: Familiarity with MSSQL, Vectorization, RAG databases
            - listitem [ref=e271]:
              - paragraph [ref=e272]: Familiarity with AI / LLM tools or platforms such as Azure’s Open AI Models, GPT4, CoPilot, Microsoft Copilot, Copilot Studios, etc.
            - listitem [ref=e273]:
              - paragraph [ref=e274]: Exposure to cloud environments (AWS or similar) and containerized development.
            - listitem [ref=e275]:
              - paragraph [ref=e276]: Experience working in environments that emphasize collective code ownership, refactoring, and continuous improvement.
            - listitem [ref=e277]:
              - paragraph [ref=e278]: You have an opensource portfolio to share and showcase personal projects related to AI or full stack development
          - paragraph [ref=e279]
          - paragraph [ref=e280]: You don’t need to know everything on day one. We care more about your foundation, curiosity, and ability to grow.
          - paragraph [ref=e281]
          - paragraph [ref=e282]
          - paragraph [ref=e283]
          - paragraph [ref=e284]: Skills
          - text: Agile Principles, DevOps, Extreme Programming (XP), GitHub, Pair Programming, Peer to Peer Learning, Python (Programming Language), Software Development, Willingness to Learn
          - paragraph [ref=e285]
          - paragraph [ref=e286]
          - paragraph [ref=e287]: Compensation
          - text: Compensation offered for this role is 70,100.00 - 121,475.00 annually and is based on experience and qualifications.
          - paragraph [ref=e288]
          - paragraph [ref=e289]: The candidate(s) offered this position will be required to submit to a background investigation.
          - paragraph [ref=e290]
