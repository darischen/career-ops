        - generic [ref=e17]:
          - paragraph [ref=e19]:
            - text: Astranis builds advanced satellites for high orbits, expanding humanity’s reach into the solar system. Today, Astranis satellites provide dedicated, secure networks to highly-sophisticated customers across the globe— large enterprises, sovereign governments, and the US military. With five satellites on orbit and many more set to launch soon, the company is servicing a backlog of more than $1 billion of commercial contracts.
            - text: Astranis is the preferred satellite communications partner for buyers with stringent requirements for uptime, data security, network visibility, and customization. Astranis has raised over $750 million from some of the world’s best investors, from Andreessen Horowitz to Blackrock and Fidelity, and employs a team of 450 engineers and entrepreneurs. Astranis designs, builds, and operates its satellites out of its 153,000 sq. ft. headquarters in Northern California, USA.
          - generic [ref=e20]:
            - heading "Software Engineer Intern - Data Platform (Summer 2026)" [level=4] [ref=e21]:
              - strong [ref=e22]: Software Engineer Intern - Data Platform (Summer 2026)
            - paragraph [ref=e23]: As a Software Engineer Intern, you'll build and extend the systems that ingest, store, and query the massive streams of telemetry flowing from our satellite fleet in real time. From designing data pipelines that handle thousands of channels per spacecraft to building monitoring rules that catch anomalies before they become problems, your work will give mission operators the visibility they need to keep satellites healthy and online.
            - paragraph [ref=e24]: You'll be working at the intersection of data engineering and space operations, building tools that turn raw satellite signals into actionable insight.
            - paragraph [ref=e25]: This role will contribute to both our commercial and US government programs.
            - heading "Role" [level=4] [ref=e26]:
              - strong [ref=e27]: Role
            - list [ref=e28]:
              - listitem [ref=e29]: Design and build monitoring rules and anomaly detection capabilities for our telemetry data platform
              - listitem [ref=e30]: Contribute across the data platform by building out client libraries, data pipelines, query interfaces, and APIs
              - listitem [ref=e31]: Collaborate with mission operations and engineering teams to define monitoring requirements and data needs
            - heading "Requirements" [level=4] [ref=e32]:
              - strong [ref=e33]: Requirements
            - list [ref=e34]:
              - listitem [ref=e35]: Currently pursuing a B.S. or M.S. in Computer Science, or equivalent degree
              - listitem [ref=e36]: Strong proficiency in Python
              - listitem [ref=e37]: Experience and understanding of databases (Postgres, time-series databases, etc)
              - listitem [ref=e38]: Experience and understanding of API design (REST, gRPC, Protocol Buffers)
              - listitem [ref=e39]: Don't meet them all? Not a problem. Please apply even if you do not meet all these criteria.
            - heading "Bonus" [level=4] [ref=e40]:
              - strong [ref=e41]: Bonus
            - list [ref=e42]:
              - listitem [ref=e43]: Experience with time-series data or telemetry systems
              - listitem [ref=e44]: Experience with async Python programming
              - listitem [ref=e45]: Experience with Kubernetes
