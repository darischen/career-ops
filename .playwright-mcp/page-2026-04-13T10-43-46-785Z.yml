            - paragraph [ref=e96]:
              - strong [ref=e97]: Why Work at Artemis?
            - list [ref=e98]:
              - listitem [ref=e99]:
                - paragraph [ref=e100]:
                  - strong [ref=e101]: Make a real world impact
                  - text: . Help empower cybersecurity teams around the world to keep people safe from the most advanced cyber threats.
              - listitem [ref=e102]:
                - paragraph [ref=e103]:
                  - strong [ref=e104]: Be challenged to be better than ever before.
                  - text: Our team includes some of the smartest and most driven people in the world. We guarantee you will learn more in 1 year here than 10 years in another place.
              - listitem [ref=e105]:
                - paragraph [ref=e106]:
                  - strong [ref=e107]: Push the boundaries of technology
                  - text: . Work with and build the most advanced AI capabilities in the world of cybersecurity, including cutting-edge analytics and agentic platforms. Your ideas will shape the product and the industry.
              - listitem [ref=e108]:
                - paragraph [ref=e109]:
                  - strong [ref=e110]: Innovative culture.
                  - text: We obsess about customers, move fast with high quality, and value open communication, mentorshi,p and learning. You will have autonomy to drive projects and support to grow.If you are passionate about building resilient distributed systems and want to apply your expertise to defend against AI‑powered adversaries, we’d love to hear from you.
                - paragraph [ref=e111]: If you are passionate about cybersecurity and want to apply your expertise to build AI-powered defenses against advanced threats, we'd love to hear from you.
            - paragraph [ref=e112]:
              - strong [ref=e113]: Compensation
              - text: We offer a competitive compensation of 180,000$- 250,000$ per year, and a top-of-market equity component. A variety of factors are considered when determining the compensation, including a candidate’s professional experience. Final offer amounts may vary from the amounts listed.
            - paragraph [ref=e114]:
              - strong [ref=e115]: Equal Opportunity
              - text: At Artemis, we believe the best ideas come from diverse teams. We’re committed to creating an inclusive environment where people of all backgrounds, experiences, and perspectives can do their best work. We welcome everyone, regardless of race, gender, age, religion, identity, or anything else that makes you, you.
