              - text: (ex-Abnormal Security, Twitter) have previously built, launched, and scaled cybersecurity products loved and trusted by tens of thousands of customers, and have the customer, technology, and security know-hows to deliver this vision.
            - paragraph [ref=e41]: Our exceptionally strong team includes software engineers, AI researchers, security engineers, and product designers hailing from Google, Abnormal AI, Wiz, Meta, AWS, CERN, SentinelOne, and more.
            - paragraph [ref=e42]: We are growing our team and looking for passionate builders to join us and support our expanding customer base.
            - paragraph [ref=e43]
            - paragraph [ref=e44]:
              - strong [ref=e45]: Job Overview
            - paragraph [ref=e46]: Artemis ingests and analyzes exabytes of streaming data from cloud platforms, identity providers, network logs, and more. We’re building a new, large-scale, AI-native data platform from the ground up – and we’re looking for exceptional AI/ML Engineers to help shape and build it. You’ll work alongside engineers who architected some of the world’s biggest distributed systems.
            - paragraph [ref=e47]:
              - text: A core part of this effort is using
              - strong [ref=e48]: agents as the primary classification and reasoning layer
              - text: across our platform – enabling us to move beyond static rules and traditional approaches to understand and act on complex security data.
            - paragraph [ref=e49]:
              - text: This is a high-impact role with significant ownership. You’ll work across critical parts of the system – from LLM-powered classification and detection to large-scale data and analytics infrastructure – depending on your strengths and the problems at hand.
              - text: You will help define architecture, make key technical decisions, and drive projects from concept through production. This role is for engineers who are comfortable operating in ambiguity, care deeply about quality, and want to build intelligent systems that matter.
            - paragraph [ref=e50]
            - paragraph [ref=e51]:
              - strong [ref=e52]: Responsibilities
            - list [ref=e53]:
              - listitem [ref=e54]:
                - paragraph [ref=e55]: Own and deliver major ML-driven initiatives – Design, build, and ship end-to-end features and systems that use LLMs to power Artemis’ detection, classification, and analytics.
              - listitem [ref=e56]:
                - paragraph [ref=e57]: Build and scale LLM-powered systems – Work on services and pipelines that apply LLMs to ingest, process, and classify massive volumes of security telemetry with high reliability and performance.
              - listitem [ref=e58]:
                - paragraph [ref=e59]: Contribute across the stack – Depending on the problem, this may include LLM pipelines, backend services, APIs, data infrastructure, or user-facing applications. You’re not boxed into a single layer.
              - listitem [ref=e60]:
                - paragraph [ref=e61]: Make architectural decisions – Evaluate trade-offs across prompting vs fine-tuning, model selection, retrieval strategies, and system design to ensure scalability, accuracy, and cost-efficiency.
              - listitem [ref=e62]:
                - paragraph [ref=e63]: Bring strong engineering and ML judgment – Balance speed and quality, know when to iterate and when to invest, and raise the bar for model performance, system design, and operational excellence.
              - listitem [ref=e64]:
                - paragraph [ref=e65]: Collaborate deeply – Work closely with product, design, security, and platform teams to turn complex problems into reliable, LLM-driven solutions.
              - listitem [ref=e66]:
                - paragraph [ref=e67]: Leverage AI-native development practices – We actively use AI tools to increase velocity and quality. You’ll be expected to embrace and evolve how we build and deploy LLM-powered systems in an AI-first environment.
            - paragraph [ref=e68]
            - paragraph [ref=e69]:
              - strong [ref=e70]: Qualifications
            - list [ref=e71]:
              - listitem [ref=e72]:
                - paragraph [ref=e73]: Experience training, deploying, and monitoring ML models from scratch (without relying on extensive existing infrastructure)
              - listitem [ref=e74]:
                - paragraph [ref=e75]: Experience optimizing generative AI systems, including developing metrics, building validation sets, and working with domain experts
              - listitem [ref=e76]:
                - paragraph [ref=e77]: Able to build statistical models from scratch and justify them mathematically
              - listitem [ref=e78]:
                - paragraph [ref=e79]: Strong intuition for feature engineering tradeoffs spanning code, systems, and model performance
              - listitem [ref=e80]:
                - paragraph [ref=e81]: Ability to spot and debug model degradations in production applications
              - listitem [ref=e82]:
                - paragraph [ref=e83]: Strong intuition for how to represent complex structured data to an LLM
                - paragraph [ref=e84]
              - listitem [ref=e85]:
