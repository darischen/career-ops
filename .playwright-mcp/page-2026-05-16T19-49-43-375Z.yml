            - heading "Who We Are" [level=2] [ref=e38]:
              - strong [ref=e39]: Who We Are
            - paragraph [ref=e40]: Maybern is transforming the way private fund managers effectively manage their funds through cutting edge technology. Maybern is founded by top engineering experts with deep knowledge of the fund management space.
            - paragraph [ref=e41]: Private funds manage $15T in capital and are growing at 20% YoY, but with increasing regulatory scrutiny and investor demands for transparency, the need for world class software to help private fund CFOs is crucial.
            - paragraph [ref=e42]: This is where Maybern comes in.
            - paragraph [ref=e43]:
              - text: "We are equipping fund managers with intuitive, flexible fund management software, enabling private investment managers to focus on what they do best:"
              - strong [ref=e44]: driving returns for their investors.
              - text: We are backed by leading venture capital firms and a large number of strategic investors.
            - paragraph [ref=e45]: Maybern is an NYC based company with a strong in-office culture to drive collaboration, and we are looking to make strong additions to our team.
            - paragraph [ref=e46]
            - heading "What We're Looking For" [level=2] [ref=e47]:
              - strong [ref=e48]: What We're Looking For
            - paragraph [ref=e49]: Maybern is building a brand new Forward Deployed Engineering function to work directly with customers on strategic applications that extend the Maybern platform. This team sits at the intersection of customer deployment, applied AI, quantitative modeling, and product development. The work includes custom applications, analytical systems, scenario tools, forecasting workflows, optimization engines, and other high-value extensions for sophisticated private-markets customers.
            - paragraph [ref=e50]: We are looking for a strong Forward Deployed Engineer who can independently own meaningful customer work. This is a builder role for someone who can move from vague requirements to working systems, partner effectively with stakeholders, and balance speed with rigor.
            - paragraph [ref=e51]
            - heading "What You'll Do" [level=2] [ref=e52]:
