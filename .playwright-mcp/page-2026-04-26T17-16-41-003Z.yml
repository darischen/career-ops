        - paragraph [ref=e14]: Freeform builds AI-native manufacturing systems that unify software, hardware, and physics to produce industrial-scale parts at the speed of human ideation. By treating manufacturing as a single integrated system, we unlock a new era of innovation where complex hardware is designed, built, and scaled without limits.
        - paragraph [ref=e15]
        - paragraph [ref=e16]: "We are a team of first-principles thinkers driven by a shared mission: to build the fundamental technology that moves the world forward. We believe that solving the foundational challenges of production requires a massive diversity of expertise, deep collaboration, low ego, and a healthy sense of humor. Whether you are an engineer, a builder of systems, or a creative problem-solver in any field, we invite you to help us align the physical world with the pace of human imagination."
        - paragraph [ref=e17]
        - paragraph [ref=e18]: Even if you don’t see a role that perfectly matches your background today, we are always looking for exceptional people to join us on the road ahead. Reach out at careers@freeform.co and let’s see where you fit into the future we’re building.
