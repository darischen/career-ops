            - heading "New Grad Leadership Engineer -Software/Computer Engineering" [level=1] [ref=e85]
            - generic [ref=e89]: "Requisition Number: 29938"
            - generic [ref=e93]: "Company: Westinghouse Electric Co"
            - generic [ref=e97]:
              - text: "Location:"
              - paragraph [ref=e99]: Cranberry Township, US
            - generic [ref=e105]:
              - paragraph [ref=e106]
              - paragraph [ref=e107]: Are you interested in being part of an innovative team that supports Westinghouse's mission to provide clean energy solutions? At Westinghouse, we recognize that our employees are our most valuable asset and we seek to identify, attract and recruit the most qualified talent while recognizing and encouraging the value of diversity in the global workplace.
              - paragraph [ref=e108]
              - heading "About the role:" [level=3] [ref=e109]
              - paragraph [ref=e110]
              - paragraph [ref=e111]: As a Leadership Engineer - Computer Science you will work with Westinghouse's Digital and Innovation for the Catalyst Program, a program designed to expose potential leaders to multiple departments with growing responsibility. You will rotate through several departments at Westinghouse, such as
              - list [ref=e112]:
                - listitem [ref=e113]: AI Delivery
                - listitem [ref=e114]: APX Product Operations
                - listitem [ref=e115]: Outage & Maintenance Services
              - paragraph [ref=e116]: The intent of the Catalyst Program is to support our growing business, develop leadership, display aspects of being a corporate steward and identify future career interests.
              - paragraph [ref=e117]: You will report to the Senior Staff Application Security and work a hybrid position based in Cranberry, PA. This position is open to local Pittsburgh candidates only.
              - paragraph [ref=e118]: Upon successful completion of the two-year Catalyst rotational program, the participant will transition into a permanent position on the AI & Innovation Digital Technologies team. The participant will use the experience gained through rotations to provide strategic impact and ensure long-term career growth.
              - paragraph [ref=e119]
              - heading "Key Responsibilities:" [level=3] [ref=e120]
              - paragraph [ref=e121]
              - list [ref=e122]:
                - listitem [ref=e123]: Through a series of rotations, lead project to deliver value across multiple departments and global locations. Gain hands-on experience and develop an understanding of different departments.
                - listitem [ref=e124]: For each rotation/department, develop an understanding of the strategic direction of the department and the business environment and evaluate how business strategies align with the direction of the business.
                - listitem [ref=e125]: Identify areas of improvement and use data analysis skills to propose solutions to enhance the efficiency of each rotational department.
                - listitem [ref=e126]: Develop a foundation of leadership
                - listitem [ref=e127]: Use Artificial Intelligence (AI) and advanced digital technologies to improve Westinghouse products, services, and processes, driving innovation for long-term operation and new nuclear builds worldwide.
                - listitem [ref=e128]: Collaborate across Westinghouse, bringing AI and Innovation technological know-how to diverse teams to deliver strategic value and promote digital transformation across projects.
              - paragraph [ref=e129]
              - heading "Qualifications:" [level=3] [ref=e130]
              - list [ref=e131]:
                - listitem [ref=e132]: Bachelor's degree in software engineering, Computer Engineering, Computer Science or similar degrees with an emphasis on AI systems and business application alongside fundamental understanding of architectural foundations
                - listitem [ref=e133]: Demonstrated leadership capabilities
                - listitem [ref=e134]: Knowledge of digital technologies and Artificial Intelligence (AI), with the ability to identify and apply these solutions to create value.
                - listitem [ref=e135]: Business-oriented mindset to connect technological capabilities with strategic goals and operational needs across the organization.
                - listitem [ref=e136]: Enthusiasm for delivering Innovation and Quality across Westinghouse technological solutions.
              - paragraph [ref=e137]
              - paragraph [ref=e138]
              - paragraph [ref=e139]: We are committed to transparency and equity in all of our people practices. The base salary range for this position, which is dependent upon experience, qualifications and skills, is estimated to be $58,400 to $73,000 per year.
              - paragraph [ref=e140]
              - paragraph [ref=e141]: "#LI-Hybrid"
              - paragraph [ref=e142]
              - paragraph [ref=e143]
              - heading "Why Westinghouse?" [level=3] [ref=e144]
              - paragraph [ref=e145]:
                - strong [ref=e146]: "Our benefits package is tailored to meet the diverse needs of our employees, while also promoting wellness and career growth. The following are representative of what we offer:"
              - list [ref=e147]:
                - listitem [ref=e148]: Comprehensive Medical benefits which could include medical, dental, vision, prescription coverage and Health Savings Account (HSA) with employer contributions options
                - listitem [ref=e149]: Wellness Programs designed to support employees in maintaining their health and well-being including Employee Assistance Program providing support for our employees and their household members
                - listitem [ref=e150]: 401(k) with Company Match Contributions to support employees' retirement
                - listitem [ref=e151]: Paid Vacations and Company Holidays
                - listitem [ref=e152]: Opportunities for Flexible Work Arrangements to promote work-life balance
                - listitem [ref=e153]: Educational Reimbursement and Comprehensive Career Programs to help employees grow in their careers
                - listitem [ref=e154]: Global Recognition and Service Programs to celebrate employee accomplishments and service
                - listitem [ref=e155]: Employee Referral Program
              - paragraph [ref=e156]
              - paragraph [ref=e157]
              - paragraph [ref=e158]:
                - strong [ref=e159]: "Westinghouse Electric Company is the global nuclear energy industry's first choice for safe, clean, and efficient energy solutions. We enable our delivery of this vision by living our value system:"
