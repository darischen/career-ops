                  - generic [ref=e62]:
                    - paragraph [ref=e63]: Job Summary
                    - paragraph [ref=e64]:
                      - text: General Atomics (GA), and its affiliated companies, is one of the world’s leading resources for high-technology systems development ranging from the nuclear fuel cycle to remotely piloted aircraft, airborne sensors, and advanced electric, electronic, wireless and laser technologies.
                      - text: General Atomics Electromagnetic Systems (GA-EMS) designs and manufactures first-of-a-kind electromagnetic and electric power generation systems. GA-EMS' expanding portfolio of specialized products and integrated system solutions support critical fleet, space systems and satellites, missile defense, power and energy, and process and monitoring applications for defense, industrial, and commercial customers worldwide.
                      - text: This software engineering position is for the development of user interface software for control systems. This position requires applying innovative approaches to resolving unusual or complex engineering problems. The role includes the analysis, investigation, and resolution of software and control system problems under general direction with limited review. Responsible for the completion of assigned engineering tasks which involve the exercise of independent judgment and discretion about matters of significance. Assignments are normally outlined in terms of overall objectives and reviewed largely at completion. Documents findings, communicates results to engineering staff, makes technical presentations, and may represent the organization as the prime technical contact with customers. Provides direction to design or technical staff and may lead a team of moderately experienced software engineering staff.
                      - strong [ref=e65]: "DUTIES & RESPONSIBILITIES:"
                      - list [ref=e66]:
                        - listitem [ref=e67]: Leads a software team to ensure timely completion of development activities, along with direct supervision of support staff and technicians.
                        - listitem [ref=e68]: Initiates the planning of engineering projects and develops innovative designs or modifications to meet project goals.
                        - listitem [ref=e69]: Independently performs difficult/complex engineering work with instructions as to the general expected results.
                        - listitem [ref=e70]: Performs functional testing of software and control systems by utilizing standard engineering and scientific principles.
                        - listitem [ref=e71]: Applies technical knowledge to train others in how to analyze, investigate and resolve engineering problems.
                        - listitem [ref=e72]: Supports operation of engineering systems, develops appropriate documentation of findings, implements solutions, and communicates results to project leadership which may include technical presentations to a wider audience.
                        - listitem [ref=e73]: Responsible for observing all laws, regulations, and other applicable obligations wherever and whenever business is conducted on behalf of the company.
                        - listitem [ref=e74]: Expected to work in a safe manner in accordance with established operating procedures and practices.
                      - text: We recognize and appreciate the value and contributions of individuals with diverse backgrounds and experiences and welcome all qualified individuals to apply
                  - generic [ref=e75]:
                    - paragraph [ref=e76]: Job Qualifications
                    - paragraph [ref=e77]:
                      - list [ref=e78]:
                        - listitem [ref=e79]: Typically requires a bachelor’s degree, master’s degree, or PhD in engineering or a related technical discipline from an accredited institution and progressive engineering experience as follows; six or more years of experience with a bachelor’s degree, four or more years of experience with a master’s degree, or two or more years with a PhD. May substitute equivalent engineering experience in lieu of education.
                        - listitem [ref=e80]: Must have a thorough understanding of software engineering concepts, principles, coding languages, and theory with technical experience demonstrating the application of those concepts. And general knowledge of related technical specialties such as electrical engineering, mechanical engineering, and systems engineering.
                        - listitem [ref=e81]: Demonstrates the ability to follow and apply engineering knowledge, adapt standard techniques, and utilize the required diagnostics, tools, and equipment, while ensuring safety and regulatory compliance.
                        - listitem [ref=e82]: Must be able to understand new concepts quickly to apply them throughout an evolving environment and organize, schedule, and coordinate work assignments to meet established timetables.
                        - listitem [ref=e83]: Good communication, computer, and interpersonal skills are required to enable an effective interface with other professionals, to produce appropriate documentation, and to present results to a wider audience.
                        - listitem [ref=e84]: Must be able to work both independently and on a team. Able to work extended hours as required.
                        - listitem [ref=e85]: Solid understanding of user interface design practices. E.g. object oriented design, design patterns, and principles.
                        - listitem [ref=e86]: Must have strong knowledge of and experience with the C# language and the .NET Framework.
                        - listitem [ref=e87]: Must have experience with WPF/XAML.
                        - listitem [ref=e88]: Should have knowledge of the MVVM design pattern.
                        - listitem [ref=e89]: Experience with GUI design for a tactical user is a plus.
                        - listitem [ref=e90]: The ability to obtain and maintain a DoD Security Clearance is required.
