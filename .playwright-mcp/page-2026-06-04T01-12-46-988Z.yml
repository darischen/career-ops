                  - button "Apply" [ref=f1e20] [cursor=pointer]
                - generic [ref=f1e22]:
                  - heading "Who We Are" [level=2] [ref=f1e23]:
                    - strong [ref=f1e24]: Who We Are
                  - paragraph [ref=f1e25]: Nuro is a self-driving technology company on a mission to make autonomy accessible to all. Founded in 2016, Nuro is building the world’s most scalable driver, combining cutting-edge AI with automotive-grade hardware. Nuro licenses its core technology, the Nuro Driver™, to support a wide range of applications, from robotaxis and commercial fleets to personally owned vehicles. With technology proven over years of self-driving deployments, Nuro gives the automakers and mobility platforms a clear path to AVs at commercial scale, empowering a safer, richer, and more connected future.
                  - heading "About the Role" [level=2] [ref=f1e26]:
                    - strong [ref=f1e27]: About the Role
                  - paragraph [ref=f1e28]: We are looking for talented engineers to join our Performance team to optimize the performance of Nuro’s AV software, ensuring our vehicles can react quickly and safely to the world around them. The team builds systems and tools for continuous performance analysis and drives latency reduction and resource efficiency efforts to ensure the autonomy teams can implement an autonomy stack that is efficient and performant for the current and future generations of the Nuro Driver.
                  - heading "About the Work" [level=2] [ref=f1e29]:
                    - strong [ref=f1e30]: About the Work
                  - list [ref=f1e31]:
                    - listitem [ref=f1e32]: Analyze, profile, debug, monitor, and optimize the performance of AV software
                    - listitem [ref=f1e33]: Design and develop systems and tools for memory management, thread prioritization, process/thread lifetime management
                    - listitem [ref=f1e34]: Work with engineers from different teams to define the system-level architecture and building blocks
                    - listitem [ref=f1e35]: Build core libraries and APIs to enable autonomy engineers to write high-performance code
                    - listitem [ref=f1e36]: Drive and encourage best practices within the team and the rest of the organization
                  - heading "About You" [level=2] [ref=f1e37]:
                    - strong [ref=f1e38]: About You
                  - list [ref=f1e39]:
                    - listitem [ref=f1e40]: Strong system fundamentals and proficiency in C++
                    - listitem [ref=f1e41]: Expertise in computer architecture and operating systems
                    - listitem [ref=f1e42]: Experience developing in a highly concurrent, multi-processor, and multi-threaded environment
                    - listitem [ref=f1e43]: Experience with performance optimizations and software porting across a variety of compute architectures - like x86, ARM, GPUs, SoCs
                    - listitem [ref=f1e44]: Experience with performance profiling tools such as perf, VTune, BPF, Nvidia Nsight Systems
                    - listitem [ref=f1e45]: BS, MS or PhD in CS, or related technical field
                  - heading "Bonus Points:" [level=2] [ref=f1e46]:
                    - strong [ref=f1e47]: "Bonus Points:"
                    - emphasis
                  - list [ref=f1e48]:
                    - listitem [ref=f1e49]: Experience with GPU programming (e.g. CUDA, OpenCL) and low-level driver optimization for Nvidia GPUs.
                    - listitem [ref=f1e50]: Experience with Nvidia DriveOS or ROS.
                  - paragraph [ref=f1e51]: At Nuro, your base pay is one part of your total compensation package. For this position, the reasonably expected base pay range is between $153,000 and $175,000 for the level at which this job has been scoped. Your base pay will depend on several factors, including your experience, qualifications, education, location, and skills. In the event that you are considered for a different level, a higher or lower pay range would apply. This position is also eligible for an annual performance bonus, equity, and a competitive benefits package.
                  - paragraph [ref=f1e52]:
                    - emphasis [ref=f1e53]: At Nuro, we celebrate differences and are committed to a diverse workplace that fosters inclusion and psychological safety for all employees. Nuro is proud to be an equal opportunity employer and expressly prohibits any form of workplace discrimination based on race, color, religion, gender, sexual orientation, gender identity or expression, national origin, age, genetic information, disability, veteran status, or any other legally protected characteristics.
