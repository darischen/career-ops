          - generic [ref=e35]:
            - heading "About Solva" [level=2] [ref=e36]
            - paragraph [ref=e37]: Solva is building AI for insurers to transform an $8 trillion industry, starting with claims. We’re backed by $6m from First Round, Y Combinator, SV Angel and angel investors, including Paul Graham, that have funded companies such as OpenAI, Google, Stripe, Anthropic, Databricks and Github. We have an advisory board of experienced insurance executives and founders.
            - paragraph [ref=e38]: Our team was previously part of building Europe’s fastest growing InsurTech and founded a licensed EU bank processing payments of €1B/yr+. Now we are taking on one of the world’s largest industries and rebuilding it from the ground up with AI.
            - paragraph [ref=e39]: Solva is a Y Combinator S25 company and has emerged as one of the fastest growing and best-funded startups.
            - heading "About the role" [level=2] [ref=e41]
            - paragraph [ref=e42]: As founding engineer you will work alongside a team of experienced 2x-founders and ex-Apple engineers. Set the bar for AI security and accountability - there are no (good) best practices so we're creating them ourselves. If it makes sense; we do the hard stuff most only say they do. Read a paper or 10 if you must. We’re looking for someone who truly wants to innovate.
            - paragraph [ref=e43]: You’ll have a defining role in building the core product and further expanding the engineering team.
            - paragraph [ref=e44]: One week you’ll be deep in backend systems and cloud infrastructure, the next you’ll be making the architectural decisions that define how claims decisions worth multiple billions are made.
            - paragraph [ref=e45]: This is a true ownership role. You won’t just ship code, you’ll help set the technical direction, lead initiatives on new projects, and take part in building the engineering team and culture from the ground up.
            - heading "What you’ll do" [level=2] [ref=e46]
            - list [ref=e47]:
              - listitem [ref=e48]:
                - paragraph [ref=e49]: Architect and build production systems for our core products
              - listitem [ref=e50]:
                - paragraph [ref=e51]: Lead on infrastructure and backend (Go, Python, Postgres, GCP/AWS, Kubernetes, Terraform, CI/CD)
              - listitem [ref=e52]:
                - paragraph [ref=e53]: Work across the stack where needed (React, Vite, TypeScript)
              - listitem [ref=e54]:
                - paragraph [ref=e55]: Ship fast, iterate with customers and turn messy problems into clean, scalable systems
              - listitem [ref=e56]:
                - paragraph [ref=e57]: Help build a great engineering culture and play a key role in shaping the long term technical vision
            - heading "What we’re looking for" [level=2] [ref=e58]
