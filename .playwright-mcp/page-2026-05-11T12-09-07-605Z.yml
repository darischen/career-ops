          - generic [ref=e39]:
            - paragraph [ref=e40]:
              - strong [ref=e41]: About Handshake
            - paragraph [ref=e42]: Handshake was founded on a simple belief that everyone deserves a path to a great career, regardless of where they went to school or who they know. Today, we power 25 million job seekers, 1 million+ employers, and 1,600 educational institutions.
            - paragraph [ref=e43]: In 2025, we started Handshake AI and built the fastest-growing AI data business in history. We work directly with frontier AI lab researchers to create evaluations, publish benchmarks, and push the boundary of data. We’ve grown from $0 to ~$1B run rate and pay ~$60M to over 30K individuals every month.
            - paragraph [ref=e44]:
              - strong [ref=e45]: "Why join Handshake now:"
            - list [ref=e46]:
              - listitem [ref=e47]:
                - paragraph [ref=e48]: Shape how every career evolves in the AI economy, at global scale, with impact your friends, family and peers can see and feel
              - listitem [ref=e49]:
                - paragraph [ref=e50]: Partner hand-in-hand with world-class AI labs, Fortune 500 partners and the world’s top educational institutions
              - listitem [ref=e51]:
                - paragraph [ref=e52]: Work together with engineers, scientists, operators, and more from Palantir, Meta, Scale AI, and former YC founders
              - listitem [ref=e53]:
                - paragraph [ref=e54]: Build a massive, fast-growing business with billions in revenue
            - paragraph [ref=e55]:
              - strong [ref=e56]: About Handshake AI
            - paragraph [ref=e57]: Human data is the core infrastructure to AI advancement. Frontier AI labs currently improve model capabilities with various data-intensive post-training techniques. We believe that data spend for AI training will increase by 3-5x in the next few years and continue for much longer as models take on new domains. Handshake AI supports all of the frontier AI labs, working on their most complex data at the largest scale.
            - paragraph [ref=e58]:
              - strong [ref=e59]: "The ML Opportunity at Handshake:"
            - paragraph [ref=e60]:
              - text: Machine Learning is at the heart of Handshake's mission to democratize access to opportunity. Every student deserves to be seen, not just by any employer, but by the
              - emphasis [ref=e61]: right
              - text: one. Machine learning is how we personalize discovery, match intent with opportunity, and drive better outcomes at scale.
