          - generic [ref=e21]:
            - paragraph [ref=e22]: "The future of defense will be decided by those who field intelligent machines at scale. At Scout AI, we’re developing Fury, the first robotic foundation model for defense, to give U.S. forces overwhelming, adaptable, and autonomous power across every domain. Fury enables human operators to command fleets of robots through natural language, and empowers those machines to sense, decide, and act together as one. This mission will ask everything of us: urgency, precision, and relentless work."
            - paragraph [ref=e23]:
              - strong [ref=e24]: The Role
              - strong
              - text: We're looking for an AI Engineer to join the Fury Team with a deep passion for building next-generation autonomous systems. You’ll work across the stack of perception, reasoning, and control, helping architect and deploy cutting-edge multimodal models that will become the cognitive engine of our robotic platforms. Your work will run on robots in complex, adversarial environments. Expect to move fast, test ideas aggressively, and break new ground as we create the first robotic foundation model for defense.
            - paragraph [ref=e25]:
              - text: We’re a startup. You’ll be moving fast, context-switching daily, and helping define the culture and process as we go. This is a rare opportunity to come in early and architect the future of defense.
              - emphasis [ref=e26]
            - paragraph [ref=e27]:
              - strong [ref=e28]: Responsibilities
            - list [ref=e29]:
              - listitem [ref=e30]: Design, train, and evaluate state-of-the-art VLA models for robotic systems
              - listitem [ref=e31]: Implement scalable architectures for multimodal model fusion, continual learning, and domain adaptation
              - listitem [ref=e32]: Develop dynamic memory, communication, and tool use faculties for AI agents
              - listitem [ref=e33]: Translate foundational research into deployable, real-time perception and decision-making systems
              - listitem [ref=e34]: Collaborate across engineering, robotics, and mission teams to integrate ML pipelines with onboard autonomy
              - listitem [ref=e35]: Develop and maintain codebases for training, simulation, and real-world inference
              - listitem [ref=e36]: Conduct experiments to benchmark performance and robustness in diverse, unstructured environments
              - listitem [ref=e37]: Track, digest, and incorporate breakthroughs from the latest literature in VLMs, RL, CV, and autonomous agents
              - listitem [ref=e38]: Support field trials and mission operations to validate model performance under real-world constraints
            - paragraph [ref=e39]:
              - strong [ref=e40]: Qualifications
            - list [ref=e41]:
              - listitem [ref=e42]: 2+ years of hands-on experience building and deploying AI models, ideally in agentic AI, robotics, autonomous systems, or real-time applications
              - listitem [ref=e43]: Strong background in computer vision, deep learning, or multimodal architectures (VLMs, transformers, or agents)
              - listitem [ref=e44]: Proficiency in Python and frameworks like PyTorch or TensorFlow; bonus for JAX, CUDA, or real-time inference experience
              - listitem [ref=e45]: Solid grasp of modern model training techniques including distributed training, fine-tuning, and reinforcement learning
              - listitem [ref=e46]: Bachelor's degree or higher in Computer Science, AI, or related technical field, MS/PhD preferred
              - listitem [ref=e47]: Demonstrated ability to take research from prototype to product in fast-moving environments
              - listitem [ref=e48]: Must be a U.S. Person due to required access to U.S. export controlled information or facilities
              - listitem [ref=e49]: "Bonus: Experience with embodied AI systems or mission-oriented deployments (DoD, aerospace, robotics)"
            - paragraph [ref=e50]:
              - strong [ref=e51]: Why Join Scout
            - list [ref=e52]:
              - listitem [ref=e53]: Work on the world’s most important frontier, ensuring U.S. and allied dominance in the age of intelligent machines
              - listitem [ref=e54]: Be a core part of a team building the first defense-specific robotic foundation model
              - listitem [ref=e55]: Collaborate with some of the top engineers in autonomy, AI, and national security
              - listitem [ref=e56]: See your work deployed on real systems
              - listitem [ref=e57]: Help define the future of intelligent defense systems
              - listitem [ref=e58]: Backed by Draper Associates, Booz Allen Ventures, and other top investors
