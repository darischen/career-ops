            - paragraph [ref=e123]: At CDW, we make it happen, together. Trust, connection, and commitment are at the heart of how we work together to deliver for our customers. It’s why we’re coworkers, not just employees. Coworkers who genuinely believe in supporting our customers and one another. We collectively forge our path forward with a level of commitment that speaks to who we are and where we’re headed. We’re proud to share our story and Make Amazing Happen at CDW.
            - paragraph [ref=e124]: As a Software Engineer, Frontend you will work with Product Managers, Product Designers, and Backend Engineers to build effective tools for our customers to manage their services. You will ship world-class, accessible, and impactful features to our customers across a range of managed cloud and consulting services.
            - paragraph [ref=e125]
            - paragraph [ref=e126]: At CDW, we understand that experience comes in many forms. We’re dedicated to adding new perspectives to the team, so if your experience is close to what we’re looking for, please consider applying.
            - paragraph [ref=e127]
            - paragraph [ref=e128]: This position is 100% remote.
            - paragraph [ref=e129]: Responsibilities
            - list [ref=e130]:
              - listitem [ref=e131]:
                - paragraph [ref=e132]: Work with Product Managers, Product Designers, and Engineers to strategize, scope, and develop front-end web experiences that scale and perform across various browsers and devices
              - listitem [ref=e133]:
                - paragraph [ref=e134]: Use the latest web standards in HTML, CSS, and JavaScript, and modern technologies, frameworks, and tools like Tailwind, React, TypeScript, GraphQL, and Storybook
              - listitem [ref=e135]:
                - paragraph [ref=e136]: Create fast, scalable, accessible, documented, and tested code that improves application experiences
              - listitem [ref=e137]:
                - paragraph [ref=e138]: Clearly articulate and advocate for improvements to the product quality, security, accessibility, and performance to a wide variety of audiences
              - listitem [ref=e139]:
                - paragraph [ref=e140]: Balance your time correctly between shipping large and complex initiatives and mentoring and unblocking other engineers on the team
              - listitem [ref=e141]:
                - paragraph [ref=e142]: Drive critical decisions that fully consider software best practices, Mission Cloud’s system realities, stakeholder concerns, and existing roadmap obligations
            - paragraph [ref=e143]: Requirements
            - list [ref=e144]:
              - listitem [ref=e145]:
                - paragraph [ref=e146]: Professional experience developing web interfaces in React/JS consuming REST and GraphQL APIs
              - listitem [ref=e147]:
                - paragraph [ref=e148]: Expert-level knowledge of Javascript, React, and their ecosystems
              - listitem [ref=e149]:
                - paragraph [ref=e150]: A deep appreciation for semantic HTML, accessibility, & implementing design systems or component libraries
              - listitem [ref=e151]:
                - paragraph [ref=e152]: Ability to create and maintain bundling and build tools, package dependencies, and CI/CD deployments in Gitlab or other common code delivery tools
              - listitem [ref=e153]:
                - paragraph [ref=e154]: Ability to mentor frontend engineers and provide clear feedback on technical work
              - listitem [ref=e155]:
                - paragraph [ref=e156]: Ability to write tests in automated testing frameworks such as Jest, Playwright or similar
              - listitem [ref=e157]:
                - paragraph [ref=e158]: Strong teamwork, listening, verbal and written communication skills, with an ability to communicate technical needs to both engineering and non-engineering teams
              - listitem [ref=e159]:
                - paragraph [ref=e160]: AWS Cloud Practitioner certification (to be achieved within one year of hire)
            - paragraph [ref=e161]
            - paragraph [ref=e162]: CDW is committed to being an AI-fluent organization
            - text: We’re looking for people who bring curiosity, a learner’s mindset, and a willingness to engage with ever-evolving technology and tools. We value adopting AI as a partner, openness to experimentation, and a shared interest in learning together on AI. Our goal is to create a culture where AI enhances—not replaces—human creativity and decision-making. You don’t need to be an expert today; what matters is your readiness to explore, adapt, and grow with us as we integrate AI responsibly and effectively into our work.
            - paragraph [ref=e163]
            - paragraph [ref=e164]: Additionally, CDW is committed to fostering an equitable, transparent, and respectful hiring process for all applicants. During our application process, our goal is to understand your experience, strengths, skills, and qualifications. As an AI forward company, we see AI not just as a tool, but as a catalyst for new ways of thinking, creating, and communicating. We encourage candidates to embrace an AI mindset, one that’s curious, adaptive, and ready to explore what’s possible. We welcome thoughtful use of AI to expand your perspective and elevate how you share your story, while ensuring your application remains rooted in your own background, judgment, and voice.
            - paragraph [ref=e165]
            - paragraph [ref=e166]: We make technology work so people can do great things.
            - paragraph [ref=e167]: CDW is a leading multi-brand provider of information technology solutions to business, government, education and healthcare customers in the United States, the United Kingdom and Canada. A Fortune 500 company and member of the S&P 500 Index, CDW helps its customers to navigate an increasingly complex IT market and maximize return on their technology investments. Together, we unite. Together, we win. Together, we thrive.
            - paragraph [ref=e168]
            - paragraph [ref=e169]: CDW is an equal opportunity employer. All qualified applicants will receive consideration for employment without regards to race, color, religion, sex, sexual orientation, gender identity, national origin, disability status, protected veteran status or any other basis prohibited by state and local law.
