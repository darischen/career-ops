                  - strong [ref=e61]: Build end-to-end product experiences
                  - text: that drive adoption of scientific AI, from onboarding flows to in-product discovery, education, and feedback loops.
              - listitem [ref=e62]:
                - paragraph [ref=e63]:
                  - strong [ref=e64]: Work directly with customers
                  - text: to understand use cases, gather feedback, and onboard scientific teams.
              - listitem [ref=e65]:
                - paragraph [ref=e66]:
                  - strong [ref=e67]: Experiment rapidly
                  - text: ", designing and running A/B tests, instrumentation, and data analyses to identify the biggest levers for user activation and retention."
              - listitem [ref=e68]:
                - paragraph [ref=e69]:
                  - strong [ref=e70]: Continuously improve our growth platform
                  - text: ", developing frameworks and tooling that make it easier to test, measure, and scale successful experiments."
              - listitem [ref=e71]:
                - paragraph [ref=e72]:
                  - strong [ref=e73]: Shape how we build AI at Benchling
                  - text: ", evolving our engineering and product development practices to define what great AI adoption looks like in the scientific world."
            - paragraph [ref=e74]
