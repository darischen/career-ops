  - heading "Software Engineering, New Grad" [level=1] [ref=e44]
  - generic [ref=e52]:
    - generic [ref=e53]:
      - generic [ref=e54]:
        - heading "Who we are" [level=2] [ref=e55]
        - heading "About Stripe" [level=3] [ref=e56]
        - paragraph [ref=e57]: Stripe is a financial infrastructure platform for businesses. Millions of companies—from the world’s largest enterprises to the most ambitious startups—use Stripe to accept payments, grow their revenue, and accelerate new business opportunities. Our mission is to increase the GDP of the internet, and we have a staggering amount of work ahead. That means you have an unprecedented opportunity to put the global economy within everyone’s reach while doing the most important work of your career.
        - heading "About the team" [level=3] [ref=e58]
        - paragraph [ref=e59]: Stripe offers an interesting middle ground between joining a small startup and going to work for a multinational company. We have systems and processes optimized for early-career professionals. You will be in an environment that prizes rigor, discipline, and reliability—from our products, from our ways of working, and from our colleagues. You will learn how the best teams put together extremely reliable systems, and you will be responsible for operating these systems, with adequate backup when things get tough.
        - heading "What you’ll do" [level=2] [ref=e60]
        - paragraph [ref=e61]:
          - text: As a company, we believe in end-to-end ownership of projects. For any given project, we have one person on point. While they don't necessarily have to do all the work themselves, it's their job to make sure all the work gets done. We launch betas and prototypes as early as we can. This helps ensure that we're building what users actually want. We contribute back to the community, often by building things we think are cool and by releasing
          - link "open-source software" [ref=e62] [cursor=pointer]:
            - /url: https://github.com/stripe
          - text: .
        - heading "Responsibilities" [level=3] [ref=e63]
        - list [ref=e64]:
          - listitem [ref=e65]: Work on cross-functional projects, directly collaborating with other engineers
          - listitem [ref=e66]: Give meaningful feedback on code reviews and technical designs
          - listitem [ref=e67]: Ensure that the systems your team operates continue running well and can scale to meet the needs of our users
          - listitem [ref=e68]: Build the skills to own a project from beginning to end, learning project management and technical leadership skills
        - heading "Who you are" [level=2] [ref=e69]
        - paragraph [ref=e70]: We’re looking for someone who meets the minimum requirements to be considered for the role. If you meet these requirements, you are encouraged to apply. The preferred qualifications are a bonus, not a requirement.
        - heading "Minimum requirements" [level=3] [ref=e71]
        - list [ref=e72]:
          - listitem [ref=e73]: A Bachelor’s, Master’s, or PhD degree in computer science or a directly related field, obtained by summer 2026, or equivalent work experience
          - listitem [ref=e74]: Some experience and familiarity with programming, either through side projects or classwork. We work mostly in Java, Ruby, JavaScript, Scala, and Go. We believe new programming languages can be learned if the fundamentals and general knowledge are present
          - listitem [ref=e75]: Experience from either previous internships or working collaboratively on multi-person coding projects (in a university or professional setting)
          - listitem [ref=e76]: Ability to learn unfamiliar systems and form an understanding of those systems, through independent research and working with a mentor and subject matter experts
        - heading "Preferred qualifications" [level=3] [ref=e77]
        - list [ref=e78]:
          - listitem [ref=e79]: One or more areas of specialized knowledge balanced with general skills and knowledge, such as knowing more frontend technologies and, at a high level, how a service handles an HTTP request
          - listitem [ref=e80]: Experience in code review practices, and an understanding of how to safely update production systems
          - listitem [ref=e81]: Familiarity with navigating and managing work in large code bases
      - generic [ref=e82]:
        - heading "In-office expectations" [level=1] [ref=e84]
        - generic [ref=e85]: Office-assigned Stripes in most of our locations are currently expected to spend at least 50% of the time in a given month in their local office or with users. This expectation may vary depending on role, team and location. For example, Stripes in Stripe Delivery Center roles in Mexico City, Mexico, Bengaluru, India, and Dublin, Ireland work 100% from the office. Also, some teams have greater in-office attendance requirements, to appropriately support our users and workflows, which the hiring manager will discuss. This approach helps strike a balance between bringing people together for in-person collaboration and learning from each other, while supporting flexibility when possible.
      - generic [ref=e86]:
        - heading "Pay and benefits" [level=1] [ref=e88]
        - generic [ref=e89]:
          - paragraph [ref=e90]: The annual salary range for this role in the primary location is S$86,400 - S$129,600. This range may change if you are hired in another location. For sales roles, the range provided is the role’s On Target Earnings (“OTE”) range, meaning that the range includes both the sales commissions/sales bonuses target and annual base salary for the role. This salary range may be inclusive of several career levels at Stripe and will be narrowed during the interview process based on a number of factors, including the candidate’s experience, qualifications, and specific location. Applicants interested in this role and who are not located in the primary location may request the annual salary range for their location during the interview process.
          - paragraph [ref=e91]: "Specific benefits and details about what compensation is included in the salary range listed above will vary depending on the applicant’s location and can be discussed in more detail during the interview process. Benefits/additional compensation for this role may include: equity, company bonus or sales commissions/bonuses; retirement plans; health benefits; and wellness stipends."
