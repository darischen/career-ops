        - strong [ref=e22]: A World-Changing Company
        - generic [ref=e24]: Palantir builds the world’s leading software for data-driven decisions and operations. By bringing the right data to the people who need it, our platforms empower our partners to develop lifesaving drugs, forecast supply chain disruptions, locate missing children, and more.
        - strong [ref=e27]: The Role
        - generic [ref=e29]: "Software Engineers at Palantir drive large-scale transformation through data, AI and world-leading infrastructure that supports mission-critical workloads. In this role, you’ll have an opportunity to grow more quickly than you ever envisioned as you contribute high-quality code directly to:"
        - generic [ref=e31]:
          - text: •
          - link "Rubix" [ref=e32] [cursor=pointer]:
            - /url: https://www.palantir.com/rubix
          - text: and
          - link "Apollo" [ref=e33] [cursor=pointer]:
            - /url: https://www.palantir.com/platforms/apollo
          - text: ", platforms deployed at the most important institutions across the public and private sectors"
        - generic [ref=e34]:
          - text: • Shaping
          - link "Mission Manager" [ref=e35] [cursor=pointer]:
            - /url: https://www.palantir.com/mission-manager
          - text: ", our new internal-infrastructure business line, used by advanced civil and defense agencies worldwide to power their infrastructure in highly sensitive environments"
        - generic [ref=e36]: • Building the core capabilities used by advanced civil and defense agencies worldwide to power their infrastructure
        - generic [ref=e37]: • Providing the substrate on which Palantir deploys its other platforms, Foundry and Gotham, which power workflows for research scientists, aerospace engineers, intelligence analysts and economic forecasters
        - generic [ref=e39]: "You’ll join our Production Infrastructure organization, made up of small teams of engineers working on:"
        - generic [ref=e41]: "• Environment Platform: a Kubernetes-based PaaS spanning hundreds of production clusters"
        - generic [ref=e42]: "• Apollo: secure, fleet-wide deployment and change-management for complex microservice suites"
        - generic [ref=e43]: "• Signals: our full suite of observability and alerting tools"
        - strong [ref=e47]: Core Responsibilities
        - generic [ref=e49]: As a Software Engineer at Palantir, you’ll own every phase of the product lifecycle—from generating ideas and designing prototypes to executing features and shipping releases—while being paired with a dedicated mentor who champions your growth. You’ll work hand-in-hand with both technical and non-technical colleagues to uncover real customer problems and deliver solutions that address them. To gain firsthand insight, you might sit side-saddle at a military exercise or partner directly with vendors using Palantir’s Apollo & Rubix to put our software into the hands of warfighters and government workers.
        - strong [ref=e52]: "SWE principles include:"
        - generic [ref=e54]: "• Ownership: We see projects through from beginning to end in spite of obstacles we may encounter."
        - generic [ref=e55]: "• Collaboration: We work internally with people from a variety of backgrounds — such as other Software Engineers, Product Managers, Designers and Product Reliability Engineers. We also partner with our business development teams (Forward Deployed Engineers, Deployment Strategists) in order to understand and solve our customers' problems."
        - generic [ref=e56]: "• Trust: We trust each other to effectively handle time and priorities, and don't micromanage. We want people to have the space to think for themselves, while feeling supported by their team."
        - strong [ref=e60]: Technologies We Use
        - generic [ref=e62]: "It doesn’t matter what languages you know when you join us; what matters is that you can write clean, effective code and learn new languages quickly. Our software is constantly evolving, so we need engineers who can do the same. Alongside peers that bring diverse experience - whether you’re a former university Teaching Assistant, switched to computer science recently, or are a hackathon enthusiast — you'll build your skills to apply the best technology to solve a given problem. Right now, we use:"
        - generic [ref=e64]: • A variety of languages, including Java and Go for backend and Typescript for frontend
        - generic [ref=e65]: • Open-source technologies like Kubernetes, Cilium, Envoy, Grafana, React, and Redux
        - generic [ref=e66]: • Industry-standard tooling, including Gradle and GitHub, and agentic tools like Windsurf & Cline
