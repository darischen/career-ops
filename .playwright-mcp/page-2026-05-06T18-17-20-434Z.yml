          - generic [ref=e40]:
            - heading "Our mission is to make exceptional healthcare accessible anytime, anywhere, for anyone." [level=1] [ref=e41]:
              - strong [ref=e42]: Our mission is to make exceptional healthcare accessible anytime, anywhere, for anyone.
            - paragraph [ref=e43]: At Assort Health, we believe healthcare should feel effortless and connected — quick answers, clear communication, and seamless access to care. That’s why we’re building a new foundation for how patients and providers connect, driven by AI, built to embrace the complexities of healthcare, and tailored to each provider’s unique needs.
            - paragraph [ref=e44]: Assort is the most comprehensive patient experience platform powered by specialty-specific agentic AI. Assort’s omnichannel AI agents seamlessly integrate with EHR/PMS and complicated provider preferences to eliminate lengthy hold times and inefficiencies that stand in the way of patients getting the care they need.
            - paragraph [ref=e45]:
              - text: Since launching in 2023, Assort has managed
              - strong [ref=e46]: over 145M+ patient interactions
              - text: ", slashing average hold times from"
              - strong [ref=e47]: 11 minutes to 1 minute
              - text: . Our platform now handles calls for
              - strong [ref=e48]: thousands of providers
              - text: with
              - strong [ref=e49]: 98%+ resolution rates
              - text: and
              - strong [ref=e50]: 99% scheduling accuracy
              - text: . Patient satisfaction averages
              - strong [ref=e51]: 4.5/5 over 52K reviews
              - text: ", and we’ve achieved"
              - strong [ref=e52]: 20× revenue growth in 2025
              - text: . We’re scaling rapidly and expanding adoption across the entire healthcare industry.
            - paragraph [ref=e53]
            - paragraph [ref=e54]
            - heading "About the Role" [level=1] [ref=e55]:
              - strong [ref=e56]: About the Role
            - paragraph [ref=e57]: We're on the hunt for driven, hacky and scrappy product-minded Engineers to join our team at an exciting stage of our startup's journey. If you're eager to contribute to building and scaling innovative products, this role is your ticket to making a significant impact. You'll gain hands-on experience in a dynamic startup environment, working with and contributing to cutting-edge generative AI and voice/transcription models + technologies.
            - paragraph [ref=e58]: As part of our engineering department, you will be a cornerstone to our company's growth and success. If you are a self-starter who is ready to wear many hats and build and scale products from zero-one, then this is the perfect role for you. You’ll have lots of autonomy and will need to be comfortable operating in ambiguous situations with an entrepreneurial mindset.
            - paragraph [ref=e59]:
              - strong [ref=e60]: The anticipated start date for this role is Summer 2026.
            - paragraph [ref=e61]
            - heading "What You'll Do" [level=1] [ref=e62]:
