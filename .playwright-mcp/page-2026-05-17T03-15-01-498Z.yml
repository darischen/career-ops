          - generic [ref=e17]:
            - heading "About Us:" [level=3] [ref=e18]:
              - strong [ref=e19]: "About Us:"
            - paragraph [ref=e20]: Perpay is a certified B Corp and Philadelphia’s most impactful growth-stage startup. We are driven by a mission to significantly improve the financial stability of everyday Americans. For the past decade, we have established strong product-market fit and a profitable, efficient operating model across a suite of products, positioning Perpay as the premier financial partner for consumers with subprime credit.
            - paragraph [ref=e21]: With over 500,000 customers who have utilized more than $1 billion in spending power, we are at a pivotal moment. We are scaling our operations, building new offerings, and deepening our impact. We are looking for teammates eager to join us on this journey.
            - paragraph [ref=e22]: Our venture partners include First Round Capital and L Catterton.
            - paragraph [ref=e23]: "Products we’ve built to make an impact:"
            - list [ref=e24]:
              - listitem [ref=e25]: "Perpay Marketplace: Combines interest-free payments and modern e-commerce to reduce cost of ownership and promote healthy repayment behavior."
              - listitem [ref=e26]: "Perpay+: Leverages Marketplace repayment history to help members monitor and build credit with all 3 credit bureaus."
              - listitem [ref=e27]: "Perpay Credit Card: Expands access to the flexibility and benefits of a World Mastercard by removing common barriers like high security deposits and low approval odds."
            - paragraph [ref=e28]: Our team thrives on in-person collaboration, operating from our unique center-city Philadelphia office. This comfortable "home away from home" space offers river views and fosters rapid product development, strong relationships, and career growth. The energy from achieving big wins is palpable here. While we primarily work in the office, we offer sensible flexibility for personal needs, such as sick children or urgent errands, and coordinate official remote weeks around major holidays. If you are passionate about a meaningful mission, collaboration, equity, and generous perks, Perpay is the best place to be in Philadelphia right now.
          - generic [ref=e29]:
            - paragraph [ref=e30]:
              - strong [ref=e31]: "About the Role:"
            - paragraph [ref=e32]: We are looking for motivated graduates to join our Software Engineering team in 2026! You’ll contribute to our codebase, test & release features into production, and collaborate with other teams like product, design, data science, analytics, and operations. The ideal candidate has software development internship experience and is enthusiastic about learning and growing! We're particularly interested in working with candidates excited about joining a mission-driven startup. On our team, you’ll sharpen your skills, learn new tools alongside other new graduates, and learn from experienced engineers. Plus, our team organizes events and social gatherings outside of work hours. We believe having a fun and engaging work environment is essential to fostering a positive company culture and creating a strong foundation for career growth.
            - paragraph [ref=e33]: "Much of our team is fullstack, so we look for team members excited to learn new technologies and work across all stacks, even if it’s not something you’ve done before! Our tech stack: Javascript, React, React Native, Redux, Python, Django, Kubernetes, AWS, Docker, Terraform, and more."
            - paragraph [ref=e34]: Our greatest strength is our people, and we’d love for you to be one of them!
            - paragraph [ref=e35]
            - paragraph [ref=e36]:
              - strong [ref=e37]: "Responsibilities:"
            - list [ref=e38]:
              - listitem [ref=e39]: Develop, test, and release features for our customer-facing and internal platforms alongside the engineering team
              - listitem [ref=e40]: Write clean, efficient, and maintainable code
              - listitem [ref=e41]: Collaborate cross-functionally to develop efficient and user-friendly solutions to support the complex needs of our business
              - listitem [ref=e42]: Actively participate in design reviews, code reviews, and discussions to improve our software architecture and implement efficient processes within our engineering team
            - heading [level=3] [ref=e43]
            - paragraph [ref=e44]:
              - strong [ref=e45]: "What You’ll Bring:"
            - list [ref=e46]:
              - listitem [ref=e47]: Currently pursuing a Bachelor’s degree or higher or a recent graduate studying Computer Science, Mathematics, or a related technical field
              - listitem [ref=e48]: 1 to 2 previous Software Engineering internships with a focus on fullstack software development
              - listitem [ref=e49]: Experience with at least one backend application framework such as Django or Flask
              - listitem [ref=e50]: Experience with frontend technologies such as React, Angular, or Vue.js
              - listitem [ref=e51]: Knowledge of RESTful API design and integration
              - listitem [ref=e52]: Experience with Python or another dynamically typed language
              - listitem [ref=e53]: A strong focus on writing and deploying clear, readable, testable code
              - listitem [ref=e54]: Ability to pick up new technologies quickly, with software engineering fundamentals being valued more than familiarity with specific tools or languages
              - listitem [ref=e55]: Eagerness to learn, grow, and seek feedback from team members
              - listitem [ref=e56]: Strong communication skills
            - paragraph [ref=e57]: Even if you don't check all the boxes, please apply if interested. You might be exactly what we're looking for!
          - generic [ref=e58]:
            - heading "What We’ll Bring to Full-time Team Members:" [level=3] [ref=e59]:
              - strong [ref=e60]: "What We’ll Bring to Full-time Team Members:"
            - list [ref=e61]:
              - listitem [ref=e62]: Meaningful compensation and equity
              - listitem [ref=e63]: Premium medical benefits (fully paid base plan, and very reasonable premium for the buy-up option)
              - listitem [ref=e64]: 4% employer 401k match
              - listitem [ref=e65]: Unlimited PTO policy
              - listitem [ref=e66]: Remote weeks around major holidays + extra holiday on weekends like MDW and LDW
              - listitem [ref=e67]: High quality catered lunch by local chefs, 4 days / week
              - listitem [ref=e68]: Gym subsidy
              - listitem [ref=e69]: Paid cell phone + plan
              - listitem [ref=e70]: Student loan repayment program
              - listitem [ref=e71]: Relocation assistance
              - listitem [ref=e72]: Generous team member discounts
            - paragraph [ref=e73]: This is not a remote opportunity; it is 100% onsite (#LI-Onsite) (#LI-TH1) (#LI-AK1)
            - paragraph [ref=e74]:
              - emphasis [ref=e75]: Perpay is proud to be an equal opportunity employer. We value diversity in all its forms and are committed to creating an inclusive environment. We do not discriminate on the basis of race, religion, color, national origin, gender identity, sexual orientation, sex (including pregnancy), marital status, political affiliation, age, veteran status, disability status or other non-merit factor. Please contact us at careers@perpay.com to request accommodation.
