            - generic [ref=e26]:
              - heading "Company Description" [level=2] [ref=e28]
              - generic [ref=e29]:
                - paragraph [ref=e30]:
                  - strong [ref=e31]: Visa
                  - text: is a world leader in payments and technology, with over 259 billion payments transactions flowing safely between consumers, merchants, financial institutions, and government entities in more than 200 countries and territories each year. Our mission is to connect the world through the most innovative, convenient, reliable, and secure payments network, enabling individuals, businesses, and economies to thrive while driven by a common purpose – to uplift everyone, everywhere by being the best way to pay and be paid.
                - paragraph [ref=e32]: Make an impact with a purpose-driven industry leader. Join us today and experience Life at Visa.
                - paragraph [ref=e33]:
                  - strong [ref=e34]: Visa’s Technology Organization
                  - text: is a community of problem solvers and innovators reshaping the future of commerce. We operate the world’s most sophisticated processing networks capable of handling more than 65k secure transactions a second across 80M merchants, 15k Financial Institutions, and billions of everyday people. While working with us you’ll get to work on complex distributed systems and solve massive scale problems centered on new payment flows, business and data solutions, cyber security, and B2C platforms.
            - generic [ref=e35]:
              - heading "Job Description" [level=2] [ref=e37]
              - generic [ref=e38]:
                - paragraph [ref=e39]:
                  - strong [ref=e40]: "The Opportunity:"
                - paragraph [ref=e41]: We are looking for Versatile, curious, and energetic Software Engineers who embrace solving complex challenges on a global scale. As a Visa Software Engineer, you will be an integral part of a multi-functional development team inventing, designing, building, and testing software products that reach a truly global customer base. While building components of powerful payment technology, you will get to see your efforts shaping the digital future of monetary transactions.
                - paragraph [ref=e42]:
                  - strong [ref=e43]: "The Work itself:"
                - list [ref=e44]:
                  - listitem [ref=e45]: Design code and systems that touch 40% of the world population while influencing Visa’s internal standards for scalability, security, and reusability
                  - listitem [ref=e46]: Collaborate multi-functionally to create design artifacts and develop best-in-class software solutions for multiple Visa technical offerings
                  - listitem [ref=e47]: Actively contribute to product quality improvements, valuable service technology, and new business flows in diverse agile squads
                  - listitem [ref=e48]: Develop robust and scalable products intended for a myriad of customers including end-user merchants, b2b, and business to government solutions.
                  - listitem [ref=e49]: Leverage innovative technologies to build the next generation of Payment Services, Transaction Platforms, Real-Time Payments, and Buy Now Pay Later Technology
                  - listitem [ref=e50]: Opportunities to make a difference on a global or local scale through mentorship and continued learning opportunities
                - paragraph [ref=e51]
                - paragraph [ref=e52]:
                  - strong [ref=e53]: "Essential Functions:"
                - list [ref=e54]:
                  - listitem [ref=e55]: Supports relationship with product owners to gather and refine requirements for one product task, adding and taking into account existing tools and solutions within a product.
                  - listitem [ref=e56]: Begins to develop and design architect solutions, considering integrations with other solutions.
                  - listitem [ref=e57]: Provides relevant knowledge on the development of user documentation of solutions and follows standard processes in user documentation.
                  - listitem [ref=e58]: Plays a minor role in the development and delivery of new features within a product.
                - paragraph [ref=e59]
                - paragraph [ref=e60]:
                  - strong [ref=e61]: "The Skills You Bring:"
                - list [ref=e62]:
                  - listitem [ref=e63]: "Energy and Experience: A growth mindset that is curious and passionate about technologies and enjoys challenging projects on a global scale"
                  - listitem [ref=e64]: "Challenge the Status Quo: Comfort in pushing the boundaries, “hacking” beyond traditional solutions"
                  - listitem [ref=e65]: "Language Expertise: Expertise in one or more general development languages (e.g., Java, C#, C++)"
                  - listitem [ref=e66]: "Builder: Experience building and deploying modern services and web applications with quality and scalability"
                  - listitem [ref=e67]: "Learner: Constant drive to learn new technologies such as Angular, React, Kubernetes, Docker, etc."
                  - listitem [ref=e68]: "Partnership: Experience collaborating with Product, Test, Dev-ops, and Agile/Scrum teams"
                - paragraph [ref=e69]
                - paragraph [ref=e70]: "**We do not expect that any single candidate would fulfill all of these characteristics. For instance, we have exciting team members who are really focused on building scalable systems but didn’t work with payments technology or web applications before joining Visa"
                - paragraph [ref=e71]: "**Visa does not support immigration for this role."
                - paragraph [ref=e72]: "**Visa is not offering relocation assistance for this role."
            - generic [ref=e73]:
              - heading "Qualifications" [level=2] [ref=e75]
              - generic [ref=e76]:
                - paragraph [ref=e77]: Basic Qualifications
                - list [ref=e78]:
                  - listitem [ref=e79]:
                    - text: Bachelor's degree in Math, Science, Engineering, or Computer Science, Information Systems or related field. OR
                    - list [ref=e80]:
                      - listitem [ref=e81]: Minimum 6 months to 2 years of experience
                - paragraph [ref=e82]
                - paragraph [ref=e83]: Preferred Qualifications
                - list [ref=e84]:
                  - listitem [ref=e85]: Knowledge of and ability to develop front-end code (e.g. HTML, CSS, and JavaScript) in support of package and product development. This includes the extension of capabilities of packages and products.
                  - listitem [ref=e86]: The ability to select the "best available" values of some objective function to improve the functional effectiveness of web browsers.
                  - listitem [ref=e87]: Knowledge of user interface design, which is the interaction where users and computers interact. This includes an understanding of how to provide an optimal industrial design experience through User Interface (UI) Design.
                  - listitem [ref=e88]: Knowledge of and ability to develop back-end (e.g. Python, Java, C++, PHP) code in support of package and product development. This includes the extension of capabilities of packages and products.
                  - listitem [ref=e89]: The ability to develop and use Application Program Interfaces (APIs), a set of routines, protocols, and tools for building software applications that specify how software components should interact and are used when programming graphical user interface (GUI) components. An API may be for a web-based system, operating system, database system, computer hardware, or software library.
                  - listitem [ref=e90]: Knowledge of and the ability to use database software (e.g., applications, web-based applications, information systems) to maintain, modify, and output data.
                  - listitem [ref=e91]: Knowledge of systems integration process in which separately produced components or subsystems are combined and problems in their interactions are addressed.
                  - listitem [ref=e92]: Knowledge of data structures, which consist of data organization, management, and storage formats that enable efficient access and modifications. This includes a collection of data values, the relationships among them, and the functions or operations that can be applied to the data.
