        - generic [ref=e84]: The Client Solutions Manager for Meta’s Global Business Group is a professional with proven experience in scoping, developing and implementing strategies and plans that increase impact, putting our customers at the core of everything we do. This is an opportunity to build and manage key client relationships, leverage analytical skills, and develop platform and product expertise to become a trusted consultant in media planning, strategy, and measurement for Meta's top advertisers. With a proven understanding of performance marketing, this role is responsible for partnering with the sales team to develop client relationships and drive revenue by negotiating and optimizing complex opportunities. Success in this position requires data and analytical skills that allow the individual to translate a business objective into an analysis framework, in order to provide data-driven consultative sales solutions data-driven consultative sales solutions.
        - separator [ref=e85]
        - generic [ref=e86]:
          - heading [level=2] [ref=e87]: Client Solutions Manager Responsibilities
          - list [ref=e88]:
            - generic [ref=e89]:
              - listitem [ref=e90]: Act as a product & insights expert, in partnership with Client Partner, to identify and implement marketing solutions that drive measurable business results for our partners
              - listitem [ref=e91]: Build and manage relationships with key clients and agency partners
              - listitem [ref=e92]: Craft narratives and recommendations from custom analyses, build presentations, and present findings to business stakeholders
              - listitem [ref=e93]: Design experimentation initiatives, develop experiment tracking, analyze results and present recommendations
              - listitem [ref=e94]: Serve as external product consultant educating clients and agencies on product solutions and best practices, and ultimately grow existing business partnership
              - listitem [ref=e95]: Drive proactive media & measurement strategy, implementation, and optimizations to increase performance and investments
              - listitem [ref=e96]: Oversee account operations (e.g. troubleshooting issues, account set up, etc.)
              - listitem [ref=e97]: Work and collaborate with diverse group of internal cross-functional teams to project manage complex workstreams
              - listitem [ref=e98]: Travel as needed
        - generic [ref=e99]:
          - heading [level=2] [ref=e100]: Minimum Qualifications
          - list [ref=e101]:
            - generic [ref=e102]:
              - listitem [ref=e103]: Advanced experience structuring and manipulating raw data into datasets for analysis
              - listitem [ref=e104]: Expertise analyzing data from a variety of different sources (quantitative and qualitative), presenting the data in a clear and concise manner, and developing actionable insights
              - listitem [ref=e105]: Proven track record in leveraging data, developing insight-backed hypotheses and driving learning plans to build compelling business cases
              - listitem [ref=e106]: Experience delivering insights to both technical and non-technical audiences
              - listitem [ref=e107]: Experience working with diverse set of cross-functional teams
              - listitem [ref=e108]: Experience influencing executive level clients
              - listitem [ref=e109]: 5+ years of experience in online advertising/online media
        - generic [ref=e110]:
          - heading [level=2] [ref=e111]: Preferred Qualifications
          - list [ref=e112]:
            - generic [ref=e113]:
              - listitem [ref=e114]: Knowledge and experience with data querying (e.g., SQL)
              - listitem [ref=e115]: Demonstrated ability to integrate AI tools to optimize/redesign workflows and drive measurable impact (e.g., efficiency gains, quality improvements)
              - listitem [ref=e116]: Experience working cross-functionally with Product teams to improve product features and functionalities
              - listitem [ref=e117]: Demonstrated ongoing AI skill development (e.g., prompt/context engineering, agent orchestration) and staying current with emerging AI technologies
              - listitem [ref=e118]: Experience adhering to and implementing responsible, ethical AI practices (e.g., risk assessment, bias mitigation, quality and accuracy reviews)
              - listitem [ref=e119]: Knowledge of statistics and experience with statistical packages as R, SAS, SPSS
              - listitem [ref=e120]: Experience with Meta’s full suite of advertising solutions
              - listitem [ref=e121]: Experience with business case modeling and market/opportunity sizing
