        - generic [ref=e21]: Belvedere Trading is a leading proprietary trading firm proudly headquartered in downtown Chicago. Our traders work hard to provide liquidity to the market through their market-making activities and are the masters of a diverse set of commodities, interest rates, exchange-traded funds (ETF), and equity index options. From the beginning, we began iteratively investing in our proprietary technology and committing to building our systems from the ground up. Our trading models and software systems are continually re-engineered, optimized, and maintained to stay on top of the industry. This wouldn’t be possible without the dedicated efforts of our technology teams who utilize and perfect our innovative technology solutions.
        - generic [ref=e23]: High-performance proprietary development is the source of our success and competitive advantage at Belvedere, further fueling our passion for performance. We are a team driven by intellectual curiosity, seeking answers that will change not only how we trade in this technological age, but also the future landscape of the trading industry. We place a high premium on defining, developing, and deploying high-performance trading software using a team-based, holistic development approach. We look for passionate team members that excel and their contribution is critical to our continued success.
        - generic [ref=e25]: At Belvedere Trading, our pragmatic Software Engineers develop our low latency, high-performance, proprietary trading systems. They participate in all aspects of our software development lifecycle, from design to testing to deployment, and have both a love of technology and a demonstrated interest in the financial markets. We’re looking for graduating seniors who fit this bill.
        - generic [ref=e27]: Don’t know a lot about finance or trading? No sweat. Belvedere Trading University (BTU) program will teach you everything you need to know once you join the team.
      - generic [ref=e29]:
        - heading "What our Software Engineers do" [level=3] [ref=e30]
        - list [ref=e33]:
          - listitem [ref=e34]: Strong development – enhance the proprietary trading software platform that our traders use every day and deliver software solutions to drive business needs
          - listitem [ref=e35]: Design, implement, and debug complex low latency trading applications
          - listitem [ref=e36]: Efficient programming – Balance optimization and readability to create efficient and extendable applications
          - listitem [ref=e37]: Partner with team members to ensure that our software meets requirements and follows Belvedere's coding standards, which ensures that it fits into our architecture and has proper automated testing
          - listitem [ref=e38]: Communicate with project managers and team leadership to develop work strategies
          - listitem [ref=e39]: Collaborate – Work in a collaborative team environment which encourages constant learning and innovation from all levels of the company to build the future of technology and finance
          - listitem [ref=e40]: BTU – Participate in our in-house learning and development curriculum via peer-led lectures to obtain knowledge about the fundamentals of trading and our proprietary trading systems
      - generic [ref=e42]:
