          - generic [ref=e20]:
            - paragraph [ref=e21]:
              - strong [ref=e22]: Why Sony Interactive Entertainment?
            - paragraph [ref=e23]: Sony Interactive Entertainment isn’t just the Best Place to Play — it’s also the Best Place to Work. Sony Interactive Entertainment (SIE) is the company behind the PlayStation brand. As a subsidiary of Sony Group Corporation, we’re part of a proud legacy of innovation and excellence. SIE is a dynamic technology company, delivering cutting-edge hardware and network services to more than 100 million people and an entertainment leader, home to some of the most beloved and recognizable intellectual properties (IP) in the world. Our role at SIE is to create and nurture the experiences under the PlayStation brand, a name synonymous with entertainment excellence and creativity.
          - generic [ref=e24]:
            - heading "Software Engineer I – Trust & Safety Platform" [level=1] [ref=e25]:
              - strong [ref=e26]: Software Engineer I – Trust & Safety Platform
            - paragraph [ref=e27]
            - paragraph [ref=e28]: PlayStation isn’t just the Best Place to Play — it’s also the Best Place to Work. Today, we’re recognized as a global leader in entertainment producing The PlayStation family of products and services including PlayStation®5, PlayStation®4, PlayStation®VR2, PlayStation®Plus, PlayStation™PC, acclaimed PlayStation software titles from PlayStation Studios, and more.
            - paragraph [ref=e29]: PlayStation also strives to create an inclusive environment that empowers employees and embraces diversity. We welcome and encourage everyone who has a passion and curiosity for innovation, technology, and play to explore our open positions and join our growing global team.
            - paragraph [ref=e30]: The PlayStation brand falls under Sony Interactive Entertainment, a wholly owned subsidiary of Sony Corporation.
            - paragraph [ref=e31]
            - heading "Location" [level=2] [ref=e32]:
              - strong [ref=e33]: Location
            - paragraph [ref=e34]: San Diego
            - heading "About the Team" [level=2] [ref=e35]:
              - strong [ref=e36]: About the Team
            - paragraph [ref=e37]: We are building scalable Trust & Safety platforms and developer tools that help create safer online gaming experiences for players and creators worldwide. Our teams develop moderation systems, safety tooling, policy enforcement workflows, telemetry platforms, and operational infrastructure that support modern multiplayer and user-generated ecosystems.
            - paragraph [ref=e38]: This role sits at the intersection of backend systems, cloud infrastructure, web applications, analytics, and operational tooling. You will partner closely with platform engineers, trust & safety teams, game studios, and product stakeholders to design and deliver reliable systems that improve player safety, operational efficiency, and developer productivity.
            - heading "What You’ll Do" [level=2] [ref=e39]:
              - strong [ref=e40]: What You’ll Do
            - paragraph [ref=e41]: "As a Software Engineer I, you will:"
            - list [ref=e42]:
              - listitem [ref=e43]: Design and build scalable web applications and backend services that power Trust & Safety operations and player protection systems.
              - listitem [ref=e44]: Develop modern frontend experiences using React/TypeScript and backend services using Node.js, Python, Go, or similar technologies.
              - listitem [ref=e45]: Build internal moderation tools, policy enforcement systems, telemetry dashboards, analytics platforms, and operational workflows.
              - listitem [ref=e46]: Design APIs and platform services that integrate with multiplayer and live-service gaming ecosystems.
              - listitem [ref=e47]: Contribute to cloud-native infrastructure running on Kubernetes/GCP/AWS, including CI/CD pipelines, observability, and deployment automation.
              - listitem [ref=e48]: Improve reliability, scalability, and operational visibility across safety and platform services.
              - listitem [ref=e49]: Partner with cross-functional teams including product managers, data engineers, security teams, policy stakeholders, and game studios.
              - listitem [ref=e50]: Help drive automation and developer productivity through tooling, operational frameworks, and platform improvements.
              - listitem [ref=e51]: Contribute to technical discussions and collaborate with senior engineers on platform design and implementation.
              - listitem [ref=e52]: Learn and grow within a collaborative engineering culture focused on quality, innovation, and continuous improvement.
            - heading "Areas You May Work On" [level=2] [ref=e53]:
              - strong [ref=e54]: Areas You May Work On
            - paragraph [ref=e55]: "Depending on your background and interests, you may contribute to:"
            - list [ref=e56]:
              - listitem [ref=e57]: Trust & Safety platforms and moderation systems
              - listitem [ref=e58]: Policy enforcement workflows and operational tooling
              - listitem [ref=e59]: Telemetry, analytics, and observability platforms
              - listitem [ref=e60]: AI-assisted moderation and safety workflows
              - listitem [ref=e61]: Developer tools and internal operational dashboards
              - listitem [ref=e62]: Game platform APIs and backend services
              - listitem [ref=e63]: CI/CD and deployment automation systems
              - listitem [ref=e64]: Cloud-native infrastructure and orchestration
              - listitem [ref=e65]: Reliability engineering and operational excellence initiatives
              - listitem [ref=e66]: Studio-facing integrations and safety enablement tooling
            - heading "Qualifications" [level=2] [ref=e67]:
              - strong [ref=e68]: Qualifications
            - heading "Required Qualifications" [level=3] [ref=e69]:
              - strong [ref=e70]: Required Qualifications
            - list [ref=e71]:
              - listitem [ref=e72]: Bachelor’s degree in Computer Science or related field, or equivalent practical experience.
              - listitem [ref=e73]: 1-3 years of software engineering experience through internships, academic projects, or professional work.
              - listitem [ref=e74]: Experience with modern frontend technologies such as React, TypeScript, JavaScript, or similar frameworks.
              - listitem [ref=e75]: Experience developing backend services or APIs using Node.js, Python, Java, Go, or similar languages.
              - listitem [ref=e76]: Experience building and consuming RESTful APIs and microservices.
              - listitem [ref=e77]: Experience with cloud platforms such as GCP, AWS, or Azure.
              - listitem [ref=e78]: Familiarity with containerization and orchestration technologies such as Docker and Kubernetes.
              - listitem [ref=e79]: Strong understanding of software engineering fundamentals, data structures, and problem-solving skills.
              - listitem [ref=e80]: Experience working in collaborative Agile development environments.
              - listitem [ref=e81]: Good communication and collaboration skills with a willingness to learn from cross-functional teams.
            - heading "Preferred Qualifications" [level=3] [ref=e82]:
              - strong [ref=e83]: Preferred Qualifications
            - list [ref=e84]:
              - listitem [ref=e85]: Internship, academic, or project experience working on scalable applications, gaming platforms, or live-service systems is a plus.
              - listitem [ref=e86]: Familiarity with telemetry, analytics, operational tooling, or cloud technologies is a plus.
              - listitem [ref=e87]: Interest in building developer tools, operational platforms, or internal web applications.
              - listitem [ref=e88]: Interest in Trust & Safety systems, moderation tooling, abuse prevention, or player safety technologies.
              - listitem [ref=e89]: Familiarity with CI/CD workflows, Git-based development, or cloud infrastructure is a plus.
              - listitem [ref=e90]: Interest in automation, AI-assisted workflows, or platform engineering is a plus.
              - listitem [ref=e91]: Passion for player safety, developer experience, and platform innovation.
            - heading "What We Value" [level=2] [ref=e92]:
              - strong [ref=e93]: What We Value
            - paragraph [ref=e94]: "We are looking for engineers who:"
            - list [ref=e95]:
              - listitem [ref=e96]: Demonstrate curiosity, initiative, and a willingness to learn.
              - listitem [ref=e97]: Enjoy solving technical problems and collaborating with others.
              - listitem [ref=e98]: Communicate effectively and work well within a team environment.
              - listitem [ref=e99]: Care about engineering quality, reliability, and user experience.
              - listitem [ref=e100]: Are excited about building scalable systems and tools.
              - listitem [ref=e101]: Have an interest in gaming, Trust & Safety, and platform technology.
              - listitem [ref=e102]: Bring a growth mindset and a collaborative attitude.
            - heading "Why Join Us" [level=2] [ref=e103]:
              - strong [ref=e104]: Why Join Us
            - paragraph [ref=e105]: You’ll have the opportunity to help shape the future of Trust & Safety technology in gaming while working on large-scale distributed systems, operational tooling, and developer platforms used across live gaming ecosystems.
            - paragraph [ref=e106]: You’ll tackle technically challenging problems involving scalability, reliability, moderation workflows, telemetry, and cloud infrastructure — all while collaborating with talented engineers and cross-functional partners focused on creating safer and more inclusive player experiences.
            - paragraph [ref=e107]: If you are passionate about building scalable platforms, solving complex engineering challenges, and improving player safety through technology, we’d love to hear from you.
