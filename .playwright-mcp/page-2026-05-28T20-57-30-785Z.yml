          - generic [ref=e30]:
            - paragraph [ref=e31]:
              - strong [ref=e32]: SPACE SYSTEMS
            - paragraph [ref=e33]: At Rocket Lab, we’re not just launching rockets — we're building the future of space. Our Space Systems team builds everything from complete spacecraft, precision payloads to the components and subsystems that allow them to thrive in space, like solar panels, flight software, star trackers, optical systems, separation systems, radios, and more.
            - paragraph [ref=e34]: Our Space Systems team has enabled more than 1,700 missions, ranging from interplanetary exploration, in-space manufacturing to national security and defense initiatives. The team has built spacecraft, payloads, and components for missions to the Moon and Mars, working with partners including NASA, the Space Development Agency, and the U.S. Space Force. Whether it’s a single high-performance spacecraft, constellation, or the vertically integrated components that help them get to space — our world class Space Systems team is empowering some of the boldest and most ambitious space missions.
            - generic [ref=e35]:
              - paragraph [ref=e36]:
                - strong [ref=e37]: FLIGHT SOFTWARE ENGINEER I
              - paragraph [ref=e38]:
                - text: We are currently seeking a
                - strong [ref=e39]: Flight Software Engineer I
                - text: for our team based out our Littleton, CO site. In this role, you will play a key role in supporting the development of flight software for our Space Systems programs. You’ll spend your days participating in all aspects of software design and development, from requirements definition through coding and testing. And when we say test, we mean your software will be on orbit within weeks and months, not years. Thanks to having our own rockets and launch sites, we have frequent opportunities to test and operate our software on orbit. To be successful in this role, you must want to see your software make a big impact on the way we explore space and use it as a platform for discovery and innovation. Join a driven team of pioneers relentlessly tackling challenging projects, delivering on the impossible, and making an impact on the future of space!
            - paragraph [ref=e40]:
              - strong [ref=e41]: "WHAT YOU’LL GET TO DO:"
            - list [ref=e42]:
              - listitem [ref=e43]: Develop application software to run within a Real Time Operating System (RTOS) and/or embedded Linux
              - listitem [ref=e44]: Develop hardware drivers to interface to Inertial Measurement Units (IMUs), Star Trackers, Reaction Wheels and other spacecraft sensors and actuators
              - listitem [ref=e45]: Develop and maintain comprehensive unit tests to run within a Continuous Integration framework
              - listitem [ref=e46]: Collaborate with hardware-in-the-loop test engineers to verify and validate combined software and hardware functionality
              - listitem [ref=e47]: Collaborate with systems engineers and embedded systems engineers in developing, documenting and validating requirements
              - listitem [ref=e48]: Participate in review of source code changes and ensure all changes meet company coding standards
              - listitem [ref=e49]: Participate in design reviews such as a PDR and CDR
              - listitem [ref=e50]: Assist with on-orbit (and interplanetary!) flight operations
            - paragraph [ref=e51]:
              - strong [ref=e52]: "YOU’LL BRING THESE QUALIFICATIONS AS FLIGHT SOFTWARE ENGINEER I:"
            - list [ref=e53]:
              - listitem [ref=e54]: Bachelor's degree in aerospace engineering, computer science, electrical engineering, or equivalent technical degree
              - listitem [ref=e55]: Experience in embedded software development
              - listitem [ref=e56]: Proficiency in C and C++ languages
              - listitem [ref=e57]: Experience with Real Time Operating Systems (RTOS) or with Embedded Linux
              - listitem [ref=e58]: U.S. citizenship is required, due to program requirements
            - paragraph [ref=e59]:
              - strong [ref=e60]: "THESE QUALIFICATIONS WOULD BE NICE TO HAVE:"
            - list [ref=e61]:
              - listitem [ref=e62]: Active Secret or TS/SCI security clearance
              - listitem [ref=e63]: Advanced Degree
              - listitem [ref=e64]: Experience developing software and drivers with CAN/CAN-FD and/or UDP/TCP within an embedded system
              - listitem [ref=e65]: Experience developing software for autonomous vehicles operating in harsh environments, such as satellites or autonomous vehicles
            - paragraph [ref=e66]:
              - strong [ref=e67]:
                - generic [ref=e68]: "ADDITIONAL REQUIREMENTS:"
            - list [ref=e69]:
              - listitem [ref=e70]: Specific vision abilities required by this job include close vision, distance vision, peripheral vision, depth perception, and the ability to focus.
              - listitem [ref=e71]: Regularly required to sit, use hands and fingers, operate computer keyboard and controls, and communicate verbally and in writing.
              - listitem [ref=e72]: Must be physically able to commute to buildings
              - listitem [ref=e73]: Occasional exposure to dust, fumes and moderate levels of noise.
            - paragraph [ref=e74]
          - generic [ref=e76]:
            - paragraph [ref=e80]:
              - text: The expected salary range for the position is displayed in accordance with the Colorado Equal Pay for Equal Work Act. Final agreed upon compensation is based upon individual qualifications and experience.
              - generic [ref=e81]: Base salary is only one part of Rocket Lab’s compensation package for this role. You may be eligible for company stock, or cash incentives, and can purchase discounted stock through Rocket Lab’s Employee Stock Purchase Program. Employee benefits also include medical, dental, and vision insurance coverage; 401(k) retirement plan options; paid vacation, holidays, and sick leave; paid parental leave; and other discounts and perks.
            - paragraph [ref=e82]: Base Pay Range (CO Only)
            - paragraph [ref=e83]: $85,000 - $100,000 USD
          - generic [ref=e84]:
            - paragraph [ref=e85]
            - paragraph [ref=e86]:
              - strong [ref=e87]: WHAT TO EXPECT
            - paragraph [ref=e88]: We’re on a mission to unlock the potential of space to improve life on Earth, but that’s not an easy task. It takes hard work, determination, relentless innovation, teamwork, grit, and an unwavering commitment to achieving what others often deem impossible. Our people out-think, out-work, and out-pace. We pride ourselves on having each other’s backs, checking our egos at the door, and rolling up our sleeves on all tasks big and small. We thrive under pressure, work to tight deadlines, and our focus is always on how we can deliver, rather than dwelling on the challenges that stand in the way.
            - paragraph [ref=e89]: "Important information:"
            - paragraph [ref=e90]:
              - strong [ref=e92]: "FOR CANDIDATES SEEKING TO WORK IN US OFFICES ONLY:"
            - paragraph [ref=e93]:
              - emphasis [ref=e94]:
                - text: To conform to U.S. Government space technology export regulations, including the International Traffic in Arms Regulations (ITAR), Rocket Lab Employees must be a U.S. citizen, lawful U.S. permanent resident (i.e., current Green Card holder), or lawfully admitted into the U.S. as a refugee or granted asylum, or be eligible to obtain the required authorizations from the U.S. Department of State and/or the U.S. Department of Commerce, as applicable. Learn more about ITAR
                - link "here" [ref=e95] [cursor=pointer]:
                  - /url: https://urldefense.us/v2/url?u=https-3A__www.pmddtc.state.gov_-3Fid-3Dddtc-5Fkb-5Farticle-5Fpage-26sys-5Fid-3D24d528fddbfc930044f9ff621f961987&d=DwMFog&c=N_fLK0KxmM34zjMadXHMx_SQYmXWO3FX0MRVr1hBcn4&r=prjnch9sxomG2ahCicblmM3m-FuPObepspoR1qvWq2I&m=ExC44mBPk2emo4Fr0xPSGZN0UraQ1ZtkDTxwR7iWw5rixcFQb-Wjlv7lJcecLldz&s=0lfm4LyRtFwK220WHBK11DGHWSVvVhQEcfa5G_2Nf18&e=
                - text: .
            - paragraph [ref=e96]:
              - emphasis [ref=e97]: Rocket Lab provides equal employment opportunities to all employees and applicants for employment and prohibits discrimination and harassment of any type without regard to race, color, religion, age, sex, national origin, disability status, genetics, protected veteran status, sexual orientation, gender identity or expression, or any other characteristic protected by federal, state, or local laws. This policy applies to all terms and conditions of employment at Rocket Lab, including recruiting, hiring, placement, promotion, termination, layoff, recall, transfer, leaves of absence, compensation, and training.
            - paragraph [ref=e98]:
              - emphasis [ref=e99]:
                - text: Applicants requiring a reasonable accommodation for the application/interview process for a job in the United States should contact Giulia Johnson at
                - link "g.biow@rocketlabusa.com." [ref=e100] [cursor=pointer]:
                  - /url: mailto:g.biow@rocketlabusa.com
                - text: This dedicated resource is intended solely to assist job seekers with disabilities whose disability prevents them from being able to apply/interview. Only messages left for this purpose will be considered. A response to your request may take up to two business days.
            - paragraph [ref=e101]
            - paragraph [ref=e102]:
              - strong [ref=e104]: "FOR CANDIDATES SEEKING TO WORK IN NEW ZEALAND OFFICES ONLY:"
            - paragraph [ref=e105]:
              - emphasis [ref=e106]: For security reasons, background checks will be undertaken prior to any employment offers being made to an applicant. These checks will include nationality checks as it is a requirement of this position that you be eligible to access equipment and data regulated by the United States' International Traffic in Arms Regulations.
            - paragraph [ref=e107]:
              - emphasis [ref=e108]:
                - text: Under these Regulations, you may be ineligible for this role if you do not hold citizenship of Australia, Japan, New Zealand, Switzerland, the European Union, or a country that is part of NATO, or if you hold ineligible dual citizenship or nationality. For more information on these Regulations, click here
                - link "ITAR Regulations." [ref=e109] [cursor=pointer]:
                  - /url: https://www.federalregister.gov/documents/2020/01/23/2020-00574/international-traffic-in-arms-regulations-us-munitions-list-categories-i-ii-and-iii
