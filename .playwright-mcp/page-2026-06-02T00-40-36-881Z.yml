        - generic [ref=e145]:
          - paragraph [ref=e146]: As the global leader in high-speed connectivity, Ciena is committed to a people-first approach. Our teams enjoy a culture focused on prioritizing a flexible work environment that empowers individual growth, well-being, and belonging. We’re a technology company that leads with our humanity—driving our business priorities alongside meaningful social, community, and societal impact.
          - paragraph [ref=e147]
          - generic [ref=e148]:
            - generic [ref=e149]: Ciena is seeking highly motivated new graduates to contribute to the platform software that powers its optical networking systems. This role plays a key part in building reliable, high-performance embedded software that enables scalable and secure global communications. The position offers exposure to complex systems development within a collaborative engineering environment.
            - heading "How you will make an impact:" [level=3] [ref=e150]
            - list [ref=e151]:
              - listitem [ref=e152]: Design, implement, and debug high-performance software for real-time embedded systems used in optical networking platforms.
              - listitem [ref=e153]: Collaborate with hardware, quality assurance, and system engineering teams to define software requirements and interfaces.
              - listitem [ref=e154]: Develop and maintain software components spanning operating systems, drivers, control plane, and data plane functionality.
              - listitem [ref=e155]: Troubleshoot and resolve complex software issues in multi-threaded and distributed environments.
              - listitem [ref=e156]: Apply industry trends and emerging technologies to embedded systems and networking challenges.
            - paragraph [ref=e157]
            - heading "The must haves:" [level=3] [ref=e158]
            - list [ref=e159]:
              - listitem [ref=e160]: "Education: Master’s degree in Computer Science, Computer Engineering, Electrical Engineering OR Bachelor’s degree in Computer Science, Computer Engineering, Electrical Engineering, or a related field, graduating in 2026."
              - listitem [ref=e161]: "Experience: Application of C and C++ programming in academic or project-based software development."
              - listitem [ref=e162]: Background in embedded systems development, including interaction with real-time operating systems and multi-threaded execution models.
              - listitem [ref=e163]: Application of data structures, algorithms, and object-oriented design principles in software implementations.
              - listitem [ref=e164]: Utilization of Linux-based development environments, including scripting with languages such as Python or Bash.
              - listitem [ref=e165]: Use of software development tools including debuggers, version control systems, and automated build tools.
              - listitem [ref=e166]: Demonstrated analytical, debugging, and problem-solving capabilities in a team-oriented development setting.
            - paragraph [ref=e167]
            - heading "Nice to haves:" [level=3] [ref=e168]
            - list [ref=e169]:
              - listitem [ref=e170]: Exposure to networking protocols and concepts such as TCP/IP and Ethernet.
              - listitem [ref=e171]: Background working with control plane or data plane software components.
              - listitem [ref=e172]: Familiarity with distributed system behaviors in embedded or networking contexts.
            - paragraph [ref=e173]
            - heading "Pay Range:" [level=3] [ref=e174]
