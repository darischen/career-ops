            - paragraph [ref=e35]: Netic is the AI revenue engine for essential services who are the backbone of the American economy.
            - paragraph [ref=e36]:
              - strong [ref=e37]: With $43M in funding from Founders Fund, Greylock, Hanabi, and Dylan Field who led our Series B, we helped our customers book hundreds of thousands of jobs across services industries in North America.
              - text: There are now companies operating entirely AI-first on Netic.
            - paragraph [ref=e38]: You’ll join our team with relentless builders from Scale, Databricks, HRT, Meta, MIT, Stanford, and Harvard in bringing frontier AI to the physical economy, where the problems are hard, the data is complex, and the impact is immediate and tangible.
            - paragraph [ref=e39]: At Netic, we build features that put AI in the hands of real businesses. As an new grad, you'll have a dedicated mentor to guide you through the end-to-end process of supporting customers, shipping features, and iterating quickly.
            - paragraph [ref=e40]
            - paragraph [ref=e41]: New grads are expected to start in Summer of 2026 or earlier.
