              - strong [ref=e37]: Job Description
            - paragraph [ref=e38]: We are looking for engineers who are passionate about building consumer products. You have experience with metrics-driven iterative product development at a fast pace. You get excited by working on customer problems closely with our customer support and servicing teams. You care about prioritizing and measuring impact, and driving towards impact-driven goals and metrics. You have built consumer interfaces at scale. You have built consumer interfaces that work in all network conditions and gracefully degrade as the network worsens. You care about the debounce time on a typeahead, or the layout of a card on different devices. You obsess over what contrast will get you the best engagement on a specific UI element. You worry about how your current feature will interact with the existing UX.
