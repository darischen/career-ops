            - paragraph [ref=e114]
            - heading "Inclusive Hiring at Spellbook" [level=2] [ref=e115]:
              - strong [ref=e116]: Inclusive Hiring at Spellbook
            - paragraph [ref=e117]:
              - emphasis [ref=e118]: We are committed to creating an inclusive and supportive candidate experience. Should you require any accommodation whatsoever during the interview process, please inform us without any hesitation. Spellbook is dedicated to ensuring equal treatment and opportunity in all phases of recruitment, selection, and employment, in compliance with employment law. We do not discriminate based on gender, race, religion, national origin, ethnicity, disability, gender identity/expression, sexual orientation, veteran or military status, or any other protected category. Spellbook is proud to be an equal opportunity employer, fostering a culture of inclusivity and maintaining a work environment that is free from discrimination, harassment, and retaliation.
            - paragraph [ref=e119]
            - heading "Use of Artificial Intelligence in Recruitment" [level=2] [ref=e120]:
              - strong [ref=e121]: Use of Artificial Intelligence in Recruitment
            - paragraph [ref=e122]:
              - emphasis [ref=e123]: Spellbook uses artificial intelligence (AI) responsibly to support administrative and efficiency-focused aspects of our recruitment process. This includes activities such as drafting job descriptions, generating interview questions, note-taking and recordings, and supporting sourcing and scheduling workflows. All candidate evaluations, interviews, and hiring decisions are made by members of the Spellbook team. While AI tools may assist with screening and assessment, they do not replace human judgment in selection decisions. Our use of AI is intended to streamline routine tasks, improve consistency, and enhance the overall candidate experience. We are committed to upholding principles of fairness, transparency, and accountability in all hiring activities. Spellbook regularly reviews its recruitment practices to mitigate bias and to ensure alignment with applicable laws and evolving best practices.
            - paragraph [ref=e124]
            - heading "Our Compensation Philosophy" [level=2] [ref=e125]:
              - strong [ref=e126]: Our Compensation Philosophy
            - paragraph [ref=e127]:
              - emphasis [ref=e128]: Spellbook uses industry benchmark data to establish compensation bands for all roles. The salary range listed for a position reflects the expected total wage range for the role—including base salary and on-target commissions, where applicable—and may span multiple career levels. Final compensation is determined during the interview process based on factors such as experience, skills, scope, and role level. In addition to base salary and applicable commissions, total rewards may include equity, health and wellness benefits, and other company programs. Full details will be shared during the interview process.
