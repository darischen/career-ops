              - listitem [ref=e52]:
                - paragraph [ref=e53]: Designing, architecting, and implementing new features in the Spellbook application.
              - listitem [ref=e54]:
                - paragraph [ref=e55]: Using the latest large language models (LLMs) from OpenAI, Anthropic, and other LLM providers to add and improve application functionality such as providing our customers with review suggestions they can use to improve their documents.
              - listitem [ref=e56]:
                - paragraph [ref=e57]: Collaborate with our product management team on changes to our React application to improve customer experience.
              - listitem [ref=e58]:
