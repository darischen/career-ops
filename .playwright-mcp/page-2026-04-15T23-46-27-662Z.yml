                - generic [ref=f45e292]:
                  - paragraph [ref=f45e293]: This role is available either in an office or a remote location (typically, 35+ miles or 56+ km from a Stripe office).
                  - paragraph [ref=f45e294]: Office-assigned Stripes spend at least 50% of the time in a given month in their local office or with users. This hits a balance between bringing people together for in-person collaboration and learning from each other, while supporting flexibility about how to do this in a way that makes sense for individuals and their teams.
                  - paragraph [ref=f45e295]: A remote location, in most cases, is defined as being 35 miles (56 kilometers) or more from one of our offices. While you would be welcome to come into the office for team/business meetings, on-sites, meet-ups, and events, our expectation is you would regularly work from home rather than a Stripe office. Stripe does not cover the cost of relocating to a remote location. We encourage you to apply for roles that match the location where you currently or plan to live.
