                - generic [ref=f45e420]:
                  - generic [ref=f45e421]:
                    - generic [ref=f45e422]: Form CC-305
                    - generic [ref=f45e423]: Page 1 of 1
                  - generic [ref=f45e424]:
                    - generic [ref=f45e425]: OMB Control Number 1250-0005
                    - generic [ref=f45e426]: Expires 04/30/2026
                - strong [ref=f45e427]: Why are you being asked to complete this form?
                - paragraph [ref=f45e428]: We are a federal contractor or subcontractor. The law requires us to provide equal employment opportunity to qualified people with disabilities. We have a goal of having at least 7% of our workers as people with disabilities. The law says we must measure our progress towards this goal. To do this, we must ask applicants and employees if they have a disability or have ever had one. People can become disabled, so we need to ask this question at least every five years.
                - paragraph [ref=f45e429]:
                  - text: Completing this form is voluntary, and we hope that you will choose to do so. Your answer is confidential. No one who makes hiring decisions will see it. Your decision to complete the form and your answer will not harm you in any way. If you want to learn more about the law or this form, visit the U.S. Department of Labor’s Office of Federal Contract Compliance Programs (OFCCP) website at
                  - link "www.dol.gov/ofccp" [ref=f45e430] [cursor=pointer]:
                    - /url: https://www.dol.gov/ofccp
                  - text: .
                - strong [ref=f45e431]: How do you know if you have a disability?
                - paragraph [ref=f45e432]:
                  - text: A disability is a condition that substantially limits one or more of your “major life activities.” If you have or have ever had such a condition, you are a person with a disability.
                  - strong [ref=f45e433]: "Disabilities include, but are not limited to:"
                - list [ref=f45e434]:
                  - listitem [ref=f45e435]: Alcohol or other substance use disorder (not currently using drugs illegally)
                  - listitem [ref=f45e436]: Autoimmune disorder, for example, lupus, fibromyalgia, rheumatoid arthritis, HIV/AIDS
                  - listitem [ref=f45e437]: Blind or low vision
                  - listitem [ref=f45e438]: Cancer (past or present)
                  - listitem [ref=f45e439]: Cardiovascular or heart disease
                  - listitem [ref=f45e440]: Celiac disease
                  - listitem [ref=f45e441]: Cerebral palsy
                  - listitem [ref=f45e442]: Deaf or serious difficulty hearing
                  - listitem [ref=f45e443]: Diabetes
                  - listitem [ref=f45e444]: Disfigurement, for example, disfigurement caused by burns, wounds, accidents, or congenital disorders
                  - listitem [ref=f45e445]: Epilepsy or other seizure disorder
                  - listitem [ref=f45e446]: Gastrointestinal disorders, for example, Crohn's Disease, irritable bowel syndrome
                  - listitem [ref=f45e447]: Intellectual or developmental disability
                  - listitem [ref=f45e448]: Mental health conditions, for example, depression, bipolar disorder, anxiety disorder, schizophrenia, PTSD
                  - listitem [ref=f45e449]: Missing limbs or partially missing limbs
                  - listitem [ref=f45e450]: Mobility impairment, benefiting from the use of a wheelchair, scooter, walker, leg brace(s) and/or other supports
                  - listitem [ref=f45e451]: Nervous system condition, for example, migraine headaches, Parkinson’s disease, multiple sclerosis (MS)
                  - listitem [ref=f45e452]: Neurodivergence, for example, attention-deficit/hyperactivity disorder (ADHD), autism spectrum disorder, dyslexia, dyspraxia, other learning disabilities
                  - listitem [ref=f45e453]: Partial or complete paralysis (any cause)
                  - listitem [ref=f45e454]: Pulmonary or respiratory conditions, for example, tuberculosis, asthma, emphysema
                  - listitem [ref=f45e455]: Short stature (dwarfism)
                  - listitem [ref=f45e456]: Traumatic brain injury
