          - paragraph [ref=e24]: Figure is an AI robotics company developing autonomous general-purpose humanoid robots. Our goal is to build embodied AI systems that can perceive, reason, and act in the real world. Figure is headquartered in San Jose, CA, and this role requires 5 days/week in-office collaboration.
          - paragraph [ref=e25]:
            - text: Our Helix team is responsible for developing the core AI systems that power humanoid autonomy. We are looking for a
            - strong [ref=e26]: Helix AI Engineer, Generative AI
            - text: to build and scale generative models that enable robots to understand, simulate, and interact with the physical world. This role focuses on training and deploying diffusion and generative models across vision, video, and multimodal domains, with applications spanning perception, data generation, and model-based reasoning.
          - heading "Responsibilities" [level=2] [ref=e27]:
            - strong [ref=e28]: Responsibilities
          - list [ref=e29]:
            - listitem [ref=e30]: Design, train, and deploy large-scale generative models, with a focus on diffusion-based approaches for vision, video, and multimodal data
            - listitem [ref=e31]: Develop models that improve robot perception, world modeling, and prediction from raw sensory inputs
            - listitem [ref=e32]: Build generative systems for synthetic data creation, augmentation, and dataset scaling for robot learning
            - listitem [ref=e33]: Explore and implement state-of-the-art techniques in diffusion, generative modeling, and multimodal foundation models
            - listitem [ref=e34]: Optimize training pipelines for large-scale generative models across distributed systems
            - listitem [ref=e35]: Work closely with data, training infrastructure, and agent teams to integrate generative models into the full autonomy stack
            - listitem [ref=e36]: Evaluate model quality, robustness, and generalization across real-world scenarios
            - listitem [ref=e37]: Contribute to the design of scalable experimentation frameworks for generative model development
          - heading "Requirements" [level=2] [ref=e38]:
            - strong [ref=e39]: Requirements
          - list [ref=e40]:
            - listitem [ref=e41]: Experience training and deploying generative models (diffusion, autoregressive, or related approaches) at scale
            - listitem [ref=e42]: Strong understanding of modern deep learning techniques for vision and/or multimodal systems
            - listitem [ref=e43]: Proficiency in Python and deep learning frameworks such as PyTorch
            - listitem [ref=e44]: Experience working with large-scale datasets and distributed training systems
            - listitem [ref=e45]: Strong experimental rigor and ability to iterate quickly on model performance
            - listitem [ref=e46]: Solid software engineering skills and ability to build reliable, maintainable systems
            - listitem [ref=e47]: Ability to operate independently and own ambiguous, high-impact technical problems
          - heading "Bonus Qualifications" [level=2] [ref=e48]:
            - strong [ref=e49]: Bonus Qualifications
          - list [ref=e50]:
            - listitem [ref=e51]: Experience with diffusion models for image or video generation
            - listitem [ref=e52]: Experience with multimodal foundation models (vision-language or vision-language-action)
            - listitem [ref=e53]: Background in synthetic data generation or simulation for robotics or embodied AI
            - listitem [ref=e54]: Experience optimizing large-scale training (multi-node, GPU clusters, etc.)
            - listitem [ref=e55]: Familiarity with 3D, video prediction, or world models
            - listitem [ref=e56]: Prior work in robotics, embodied AI, or real-world ML systems
            - listitem [ref=e57]: Publication record in machine learning, computer vision, or generative modeling
