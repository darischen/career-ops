                  - strong [ref=e278]: Voluntary Race/Gender Self-Identification
              - paragraph [ref=e279]: The Trade Desk is subject to Executive Order 11246, which requires government contractors to ensure nondiscrimination and take affirmative action in employment to employ and advance qualified individuals without regard to sex, gender identity, sexual orientation, race, color, religious creed, and national origin. As a government contractor, we are required to report certain data regarding our applicants and employees to the government.
              - generic "Page 1" [ref=e280]:
                - paragraph [ref=e283]: In order to comply with these requirements, we are required to ask you if you want to provide information regarding your gender, race, and ethnicity. In answering the questions regarding your race/ethnicity, please use the race/ethnicity definitions established by the federal government listed below. Submission of this information is voluntary, and failure to provide it will not subject you to any adverse treatment. The information provided will be maintained confidentially and used only in ways that are consistent with applicable law. Your cooperation is appreciated.
