                        - paragraph [ref=e427]: The Trade Desk is an equal opportunity corporation and does not discriminate on the basis of sex, gender identity, sexual orientation, race, color, religious creed, national origin, physical or mental disability, protected Veteran status, or any other characteristic protected by law with regard to any employment practices, including recruitment, advertising, job application procedures, hiring, and/or other terms, conditions, or privileges of employment, provided the individual is qualified, with or without reasonable accommodations, to perform the essential functions of the job.
                        - paragraph [ref=e428]:
                          - strong [ref=e430]: Voluntary Veteran Self-Identification
                        - paragraph [ref=e431]:
                          - emphasis [ref=e432]: Why are you being asked to provide this information?
                        - generic "Page 1" [ref=e433]:
                          - generic [ref=e435]:
                            - paragraph [ref=e436]: The Trade Desk is a Government contractor subject to the Vietnam Era Veterans’ Readjustment Assistance Act of 1974, as amended (VEVRAA) which requires government contractors to take affirmative action to employ and advance in employment protected veterans. To help us measure the effectiveness of our outreach and recruitment efforts of veterans, we are asking you to tell us if you are a veteran covered by VEVRAA.
                            - paragraph [ref=e437]: We hope you will share this information with us, but submission of this information is voluntary and refusal to provide it will not subject you to any adverse treatment. The information provided will be maintained confidentially and used only in ways that are consistent with VEVRAA.
                            - generic "Page 1" [ref=e438]:
                              - generic [ref=e440]:
                                - paragraph [ref=e441]:
                                  - emphasis [ref=e442]: How Do You Know If You Are a Veteran Protected by VEVRAA?
                                - generic "Page 1" [ref=e443]:
                                  - generic [ref=e445]:
                                    - paragraph [ref=e446]: Contrary to the name, VEVRAA does not just cover Vietnam Era veterans. It covers several categories of veterans from World War II, the Korean conflict, the Vietnam era, and the Persian Gulf War which is defined as occurring from August 2, 1990 to the present. For more information, see the definitions below.
                                    - generic "Page 1" [ref=e447]:
                                      - paragraph [ref=e450]:
                                        - emphasis [ref=e451]: What Categories of Veterans are “Protected” by VEVRAA?
                                    - generic "Page 2" [ref=e452]:
                                      - generic [ref=e454]:
                                        - paragraph [ref=e455]: "The law defines protected veterans using four categories: (1) disabled Veteran; (2) recently separated Veteran; (3) Active duty wartime or campaign badge Veteran; and (4) Armed Forces service medal Veteran."
                                        - list [ref=e456]:
                                          - listitem [ref=e457]:
                                            - text: "A “disabled Veteran” is one of the following:"
                                            - list [ref=e458]:
                                              - listitem [ref=e459]: A Veteran of the U.S. military, ground, naval, or air service who is entitled to compensation (or who, but for the receipt of military retired pay, would be entitled to compensation) under laws administered by the Secretary of Veterans Affairs; or
                                              - listitem [ref=e460]: A person who was discharged or released from active duty because of a service- connected disability
                                          - listitem [ref=e461]: A “recently separated Veteran” means any Veteran during the three-year period beginning on the date of such Veteran's discharge or release from active duty in the U.S. military, ground, naval, or air service
                                          - listitem [ref=e462]: An “active duty wartime or campaign badge Veteran” means a Veteran who served on active duty in the U.S. military, ground, naval, or air service during a period of war outlined in 38 YSC Section 101, or in a campaign or expedition for which a campaign badge has been authorized under the laws administered by the Department of Defense
                                          - listitem [ref=e463]: An “Armed Forces service medal Veteran” means a Veteran who, while serving on active duty in the U.S. military, ground, naval, or air service, participated in a United States military operation for which an Armed Forces service medal was awarded pursuant to Executive Order 12985
                                        - paragraph [ref=e464]:
                                          - strong [ref=e465]: Voluntary Self-Identification of Disability
                                        - paragraph [ref=e466]:
