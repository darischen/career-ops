      - heading "Experience" [level=2] [ref=e311]
      - heading "The right people don’t always think they’re right" [level=1] [ref=e312]
    - generic [ref=e314]:
      - generic [ref=e317]:
        - paragraph [ref=e318]: Successful Stripes are rigorous thinkers who appreciate that things worth doing are rarely simple. We want people who are not afraid to be wrong, who can enthusiastically back proposals they initially opposed, and who know how to support decisions with numbers and narrative. We operate in situations of substantial uncertainty and cannot afford either timidity or recklessness.
        - paragraph [ref=e319]:
          - text: The global financial system can seem like a
          - link "mystifying domain" [ref=e320] [cursor=pointer]:
            - /url: https://jvns.ca/blog/so-you-want-to-be-a-wizard/
          - text: . It is not. It is composed of people and computers, just like many other systems you’ve worked on. Most Stripes don’t have a background in finance, and they’ve thrived here because they bring fresh perspectives. We want generalists capable of parachuting anywhere into our operations, learning about a field they have never touched before, and executing competently in areas far outside their formal remit.
      - generic [ref=e323]:
        - paragraph [ref=e324]: We also want specialists who are already experts and want to spend several years advancing the state of the art in their fields.
        - paragraph [ref=e325]: We know that we cannot be successful without nurturing the careers of both generalists and the experts. People who thrive in high-conflict work environments often do not enjoy the experience here. We try to embrace kindness while still encouraging Stripes to take measured risks and act boldly, even in the absence of consensus.
