                  - paragraph [ref=e205]:
                    - link "EK Wholesale" [ref=e206] [cursor=pointer]:
                      - /url: https://ekwholesale.co.uk/
                    - text: has been in the game for more than 30 years, making it a go-to supplier in Europe. Based in Scotland, it focuses on quality
                    - link "wholesale clothing" [ref=e207] [cursor=pointer]:
