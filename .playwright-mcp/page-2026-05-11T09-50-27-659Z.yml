                  - generic [ref=e265]:
                    - paragraph [ref=e266]: Skip the tariff guesswork
                    - paragraph [ref=e267]: When importing products from international suppliers to the U.S., use Shopify's Tariff Guide to quickly find the correct HS codes and U.S. tariff rates for your products. Enter your product details to get accurate information without the complexity of customs jargon.
                    - link "Find tariff rates" [ref=e268] [cursor=pointer]:
                      - /url: https://tariffguide.ai/
                  - heading "Other considerations for finding suitable wholesale suppliers" [level=2] [ref=e269]
                  - paragraph [ref=e270]: "Finding the right supplier takes some digging. Here are some common pitfalls to watch out for:"
                  - heading "Location matters" [level=3] [ref=e271]
                  - paragraph [ref=e272]: Fast delivery is a must for today's shoppers. Think about where your customers are. If you're selling to European customers, shipping from a German supplier will be faster and cheaper than shipping from China.
                  - paragraph [ref=e273]:
                    - text: Also consider
                    - link "navigating tariffs and customs requirements" [ref=e274] [cursor=pointer]:
                      - /url: /blog/international-import-shipping
                    - text: when sourcing internationally, as these can significantly impact your costs and delivery times.
                  - paragraph [ref=e275]: Global tariffs can wipe out margin overnight. After recent Section 301 rate increases, for example, soft goods vendors switched cashmere beanie and scarf production from China to the Philippines to avoid added duties.
                  - paragraph [ref=e276]: The move preserved unit costs but triggered knock-on expenses—20,000 warehouse units and 40, 000 store units needed re-ticketing, plus system-wide price updates.
                  - paragraph [ref=e277]: When vetting suppliers, confirm they have contingency factories in non-tariffed countries and written plans for quick migration.
                  - heading "Budget wisely" [level=3] [ref=e278]
                  - paragraph [ref=e279]: "Find the sweet spot with your spending:"
                  - list [ref=e280]:
                    - listitem [ref=e281]: Order enough to get wholesale benefits.
                    - listitem [ref=e282]: Don't overcommit to untested products.
                    - listitem [ref=e283]: Set clear budget limits.
                    - listitem [ref=e284]:
                      - link "Calculate costs" [ref=e285] [cursor=pointer]:
                        - /url: /blog/product-pricing-for-wholesale-and-retail
                      - text: before ordering.
                  - heading "Watch for hidden costs" [level=3] [ref=e286]
                  - paragraph [ref=e287]: "Most wholesale suppliers charge membership fees—that's normal. But make sure you understand all the costs upfront. Ask about:"
                  - list [ref=e288]:
                    - listitem [ref=e289]: Membership fees
                    - listitem [ref=e290]: Minimum order requirements
                    - listitem [ref=e291]: Shipping costs
                    - listitem [ref=e292]: Payment terms
                  - heading "Check legitimacy" [level=3] [ref=e293]
                  - paragraph [ref=e294]: Be wary of wholesale suppliers that sell to the public. Real wholesale suppliers need to see your business ID—it's how they protect their wholesale pricing.
                  - generic [ref=e295]:
                    - paragraph [ref=e296]: Source suppliers with Shopify Collective
                    - paragraph [ref=e297]: Connect with US-based Shopify brands to easily sell their products. Use Shopify Collective to curate items from like-minded stores and ship directly to your customers. Free for eligible Shopify users.
                    - link "Learn more" [ref=e298] [cursor=pointer]:
                      - /url: /collective/retailer
                  - heading "How wholesale suppliers help your business" [level=3] [ref=e299]
                  - paragraph [ref=e300]:
                    - text: "Wholesale suppliers let you focus on what matters: picking great products (so you don't have to"
                    - link "develop your own products" [ref=e301] [cursor=pointer]:
                      - /url: /blog/product-development-process
                    - text: "), marketing them well, and providing excellent customer service. Working with wholesalers gives you several advantages:"
                  - list [ref=e302]:
                    - listitem [ref=e303]: Buy what as you need without expensive storage costs.
                    - listitem [ref=e304]: Quickly restock popular items through established supplier relationships.
                    - listitem [ref=e305]: Get better prices that lead to healthy profit margins.
                    - listitem [ref=e306]:
                      - text: Skip the
                      - link "product development" [ref=e307] [cursor=pointer]:
                        - /url: /blog/product-development-strategy
                      - text: process—saving money and time.
                  - heading "Understanding dropshipping suppliers" [level=3] [ref=e308]
                  - paragraph [ref=e309]:
                    - text: Dropshipping is a different
                    - link "fulfillment method" [ref=e310] [cursor=pointer]:
                      - /url: /blog/shipping-and-fulfillment
                    - text: from traditional wholesale. Instead of keeping inventory, you purchase products from third-party suppliers who ship directly to your customers. Think of it as combining wholesale purchasing with third-party fulfillment.
                  - paragraph [ref=e311]:
                    - text: The
                    - link "dropshipping business model" [ref=e312] [cursor=pointer]:
                      - /url: /blog/what-is-dropshipping
                    - text: "helps you avoid:"
                  - list [ref=e313]:
                    - listitem [ref=e314]: Managing inventory
                    - listitem [ref=e315]: Packing orders
                    - listitem [ref=e316]: Handling shipping
                  - paragraph [ref=e317]: "Popular dropshipping apps that integrate with Shopify include:"
                  - list [ref=e318]:
                    - listitem [ref=e319]:
                      - strong [ref=e320]:
                        - link "DropCommerce" [ref=e321] [cursor=pointer]:
                          - /url: https://apps.shopify.com/dropcommerce
                        - text: ":"
                      - text: Connects you with US and Canadian suppliers offering two to seven day shipping within North America.
                    - listitem [ref=e322]:
                      - strong [ref=e323]:
                        - link "Syncee" [ref=e324] [cursor=pointer]:
                          - /url: https://apps.shopify.com/syncee-1
                        - text: ":"
                      - text: Provides access to more than 12,000 global brands, ideal for international selling.
                    - listitem [ref=e325]:
                      - strong [ref=e326]:
                        - link "AI Dropship" [ref=e327] [cursor=pointer]:
                          - /url: https://apps.shopify.com/dropshipper-ai
                        - text: ":"
                      - text: Offers US and EU suppliers with delivery in under seven days for many locations.
                  - paragraph [ref=e328]: These supplier networks have warehouses or fulfillment capabilities across the US or Europe, so customers can receive orders quickly. Most offer free plans that let you explore the platform before subscribing.
                  - paragraph [ref=e329]:
                    - text: Just starting out? Consider using a
                    - link "dropshipping app" [ref=e330] [cursor=pointer]:
                      - /url: https://apps.shopify.com/categories/finding-products-sourcing-options-dropshipping
                    - text: that connects with your online store. If you're more experienced or have a specific niche, you might prefer working directly with wholesale suppliers for better pricing.
                  - paragraph [ref=e331]:
                    - strong [ref=e332]: "Learn more:"
                    - link "150+ Dropshipping Products to Sell for Profit" [ref=e333] [cursor=pointer]:
                      - /url: /blog/best-dropshipping-products
                  - generic [ref=e334]:
                    - paragraph [ref=e335]: Dropship products with Shopify
                    - paragraph [ref=e336]: Connect dropshipping apps to your store to discover, list, and sell products—no inventory or shipping to manage.
                    - link "Browse apps" [ref=e337] [cursor=pointer]:
                      - /url: https://apps.shopify.com/categories/finding-products-sourcing-options-dropshipping
                  - heading "Questions to ask potential suppliers" [level=2] [ref=e338]
                  - paragraph [ref=e339]:
                    - text: Before reaching out to suppliers, gather your
                    - link "business license" [ref=e340] [cursor=pointer]:
                      - /url: /blog/business-license
                    - text: "and tax documents—many won't even discuss pricing without them. This is normal: certified wholesalers can only sell to businesses, not consumers."
                  - paragraph [ref=e341]: "When you do call, here are key questions to ask:"
                  - heading "Minimum orders and pricing" [level=3] [ref=e342]
                  - list [ref=e343]:
                    - listitem [ref=e344]: What are your MOQs? If you're looking to order 100 pieces of jewelry but the supplier only offers discounts on orders of 500 pieces or more, then that's an issue.
                    - listitem [ref=e345]: What's the cost per unit?
                    - listitem [ref=e346]: Do you offer volume discounts?
                  - paragraph [ref=e347]: Don't order more than you need just to get a better price. An unsold product that seemed like a bargain can quickly become a costly mistake.
                  - heading "Policies and timing" [level=3] [ref=e348]
                  - list [ref=e349]:
                    - listitem [ref=e350]: What's your return policy? Who covers shipping for returns?
                    - listitem [ref=e351]: How long does it typically take to fulfill orders?
                    - listitem [ref=e352]: How do you handle out-of-stock situations?
                    - listitem [ref=e353]: How quickly can you pivot production to another country if tariffs or trade rules change?
                  - paragraph [ref=e354]: Clear shipping times help you set customer expectations. Long delays or unclear restocking timelines can lead to unhappy customers.
                  - paragraph [ref=e355]: "Remember: Most terms are negotiable, especially once you build a relationship with your supplier."
                  - paragraph [ref=e356]:
                    - strong [ref=e357]: "Learn more:"
                    - link "The Ultimate Wholesale Terminology Glossary" [ref=e358] [cursor=pointer]:
                      - /url: /blog/wholesale-terminology
                  - heading "Documentation and compliance" [level=3] [ref=e359]
                  - paragraph [ref=e360]: Make sure the supplier fits how and where you sell. Some suppliers allow sales on your own website but ban sites like Amazon, Walmart, or eBay.
                  - paragraph [ref=e361]: "Be sure to ask:"
                  - list [ref=e362]:
                    - listitem [ref=e363]: Do you authorize resale on marketplaces?
                    - listitem [ref=e364]: What paperwork will you provide with each order?
                  - paragraph [ref=e365]: You'll need proof of every purchase. If there is ever a problem with customs or a customer, you have to prove the origin of your inventory. Clear invoices make returns, disputes, and compliance checks easier.
                  - heading "Final checks before partnering" [level=3] [ref=e366]
                  - paragraph [ref=e367]: "Before signing any agreements, take these important last steps:"
                  - paragraph [ref=e368]:
                    - strong [ref=e369]: Ask for references.
                    - text: Request contact information for current customers. Be cautious if a supplier hesitates to share references—this could be a red flag.
                  - paragraph [ref=e370]:
                    - strong [ref=e371]: Check insurance.
                    - text: Make sure they have
                    - link "product liability insurance" [ref=e372] [cursor=pointer]:
                      - /url: /blog/product-liability-insurance
                    - text: . This protects you if customers are injured by faulty products. A supplier without insurance puts your business at risk.
                  - paragraph [ref=e373]:
                    - strong [ref=e374]: Review the numbers.
                    - text: Start small with new suppliers, even if bigger discounts are tempting. Calculate all your costs upfront, including shipping or handling fees. Remember that unsold inventory ties up money you could use elsewhere in your business, so don't let exciting deals push you to overextend your budget.
                  - heading "How to build strong relationships with suppliers" [level=2] [ref=e375]
                  - paragraph [ref=e376]: "Strong supplier relationships can make or break your business. Here's how to create partnerships that last and help both sides succeed:"
                  - heading "Communicate clearly" [level=3] [ref=e377]
                  - paragraph [ref=e378]: Wholesale suppliers work with many brands at once, so respect their time with direct communication. Instead of vague inquiries like "I'm thinking about starting a dropshipping business," ask specific questions like, "What's your best price for 250 units per month?"
                  - heading "Think beyond your needs" [level=3] [ref=e379]
                  - paragraph [ref=e380]:
                    - text: Don't just reach out when you want something. Find ways to make the relationship work for both sides. For example, ask for their preferred order form template or get the right email for
                    - link "accounts payable" [ref=e381] [cursor=pointer]:
                      - /url: /blog/accounts-payable
                    - text: . Small things that streamline their processes can make a big difference in how they work with you.
                  - heading "Pay on time" [level=3] [ref=e382]
                  - paragraph [ref=e383]: Most suppliers give you a month after delivery to pay for orders, letting you sell some inventory first. Meeting these payment schedules is crucial—suppliers are running a business too. Late payment might lead to stricter terms or even losing the supplier altogether.
                  - generic [ref=e384]:
                    - paragraph [ref=e385]: Take control of your cash flow with Shopify Payments
                    - paragraph [ref=e386]: Only with Shopify Payments can you track your orders and payments all in one place. Have a complete view of your finances, and accept local currencies and payment types for a smooth checkout experience.
                    - link "Discover Shopify Payments" [ref=e387] [cursor=pointer]:
                      - /url: /payments?itcat=coreblog&itterm=shopify-payments-cta
                  - heading "Give and receive feedback" [level=3] [ref=e388]
                  - paragraph [ref=e389]: It's rare to get the working relationship right the first time. Both you and your wholesale supplier are learning about each other. Stay open to feedback—it helps solve issues quickly and builds rapport.
                  - heading "Show appreciation" [level=3] [ref=e390]
                  - paragraph [ref=e391]:
                    - text: When you find a reliable wholesale supplier, let them know. A strong relationship helps secure steady inventory and
                    - link "reduces stockouts" [ref=e392] [cursor=pointer]:
                      - /url: /blog/what-causes-a-stockout
                    - text: . Suppliers who feel valued are more likely to prioritize your orders and offer you new items first, helping keep your
                    - link "product assortment" [ref=e393] [cursor=pointer]:
                      - /url: /blog/product-assortment
                    - text: fresh.
                  - heading "Popular wholesale products" [level=2] [ref=e394]
                  - paragraph [ref=e395]: When choosing suppliers, consider your specific product needs. While many suppliers offer general merchandise, some excel in particular niches.
                  - paragraph [ref=e396]:
                    - text: Here's what to look for in
                    - link "trending product" [ref=e397] [cursor=pointer]:
                      - /url: /blog/trending-products
                    - text: "categories:"
                  - heading "Wholesale jewelry" [level=3] [ref=e398]
                  - paragraph [ref=e399]:
                    - text: Before placing a large order for your
                    - link "jewelry business" [ref=e400] [cursor=pointer]:
                      - /url: /blog/203365449-start-a-jewellery-making-business
                    - text: ", check these key details. If a supplier doesn't provide this information, keep looking:"
                  - list [ref=e401]:
                    - listitem [ref=e402]: Product reviews and quality ratings—do products meet customer expectations?
                    - listitem [ref=e403]: Current client list—well-known retailers build confidence in the supplier.
                    - listitem [ref=e404]: Shipping insurance and damage policies—jewelry is small and delicate, so clarify who covers losses before ordering.
                  - paragraph [ref=e405]:
                    - strong [ref=e406]: "Learn more:"
                    - link "How To Get Started Dropshipping Jewelry" [ref=e407] [cursor=pointer]:
                      - /url: /blog/dropshipping-jewelry
                  - heading "Wholesale clothing" [level=3] [ref=e408]
                  - paragraph [ref=e409]: "Fashion is popular with dropshippers and constantly evolves with trends. When evaluating fashion wholesalers, focus on:"
                  - list [ref=e410]:
                    - listitem [ref=e411]:
                      - text: Clear niche focus (women's, children's, or
                      - link "men's wholesale clothing" [ref=e412] [cursor=pointer]:
                        - /url: /blog/wholesale-mens-clothing
                      - text: ).
                    - listitem [ref=e413]: Brand customization options, like custom t-shirts or hoodies.
                    - listitem [ref=e414]: Professional packaging—it's the only channel that reaches 100% of your customers.
                  - paragraph [ref=e415]:
                    - strong [ref=e416]: "Learn more:"
                    - link "What Is Print on Demand and How To Start a Business" [ref=e417] [cursor=pointer]:
                      - /url: /blog/print-on-demand
                  - heading "Wholesale tea and coffee" [level=3] [ref=e418]
                  - paragraph [ref=e419]:
                    - link "Selling coffee online" [ref=e420] [cursor=pointer]:
                      - /url: /blog/sell-coffee
                    - text: "offers an easy entry point into ecommerce, but has unique considerations:"
                  - list [ref=e421]:
                    - listitem [ref=e422]:
                      - link "Product packaging" [ref=e423] [cursor=pointer]:
                        - /url: /blog/ecommerce-packaging
                      - text: quality is crucial since customers don't see a logo while drinking.
                    - listitem [ref=e424]: Brand identity support—good suppliers in the food industry should help you build your brand.
                  - paragraph [ref=e425]:
                    - strong [ref=e426]: "Learn more:"
                    - link "How To Start Dropshipping Coffee" [ref=e427] [cursor=pointer]:
                      - /url: /blog/dropshipping-coffee
                  - heading "Wholesale wellness and personal care" [level=3] [ref=e428]
                  - paragraph [ref=e429]: The wellness industry is a high-growth sector for wholesalers. When looking for suppliers in personal care, lotions, or skin care, make sure they provide a full ingredient list.
                  - paragraph [ref=e430]: "Focus on:"
                  - list [ref=e431]:
                    - listitem [ref=e432]: Transparency and safety for certified care and first aid products to build trust with buyers.
                    - listitem [ref=e433]: Verification that products meet standard quality ratings.
                  - heading "Wholesale home and lifestyle" [level=3] [ref=e434]
                  - paragraph [ref=e435]: "Expanding into home decor or pet supplies requires finding suppliers that can handle a range of shipping needs for both fragile and bulk items. Consider:"
                  - list [ref=e436]:
                    - listitem [ref=e437]: Clarifying who covers shipping for returns or damaged goods.
                    - listitem [ref=e438]: Who offers specialized goods or gift wraps to increase AOV.
                    - listitem [ref=e439]: Who offers samples to check the quality for yourself before placing a large order.
                  - heading "Find your perfect wholesale supplier today" [level=2] [ref=e440]
                  - paragraph [ref=e441]: Starting an online store might feel overwhelming if you don't have products to sell. But finding reliable wholesale suppliers is easier than ever. Look for well-reviewed suppliers who know your niche, order samples, negotiate prices, and get started. Shopify is there with you at every step.
