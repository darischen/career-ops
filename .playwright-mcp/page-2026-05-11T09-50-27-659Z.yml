                    - link "Alibaba" [ref=e179] [cursor=pointer]:
                      - /url: /blog/16665772-alibaba-101-how-to-safely-source-products-from-the-worlds-biggest-supplier-directory
                    - text: and its partner site,
                    - link "AliExpress," [ref=e180] [cursor=pointer]:
                      - /url: /blog/117607173-the-definitive-guide-to-dropshipping-with-aliexpress
                    - text: are common destinations for global retailers looking to
                    - link "source products" [ref=e181] [cursor=pointer]:
                      - /url: /source-products
                    - text: from Chinese wholesalers.
                  - paragraph [ref=e182]: "Just starting out? Try AliExpress first, purchase a single product before jumping into Alibaba's world of wholesale bulk buying. These platforms are great for:"
                  - list [ref=e183]:
                    - listitem [ref=e184]: Finding affordable, new products from China.
                    - listitem [ref=e185]: Exploring tons of products at different price points, from hair care to home decor.
                    - listitem [ref=e186]:
                      - text: Creating your own
