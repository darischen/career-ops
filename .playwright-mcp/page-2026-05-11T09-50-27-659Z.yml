                  - heading "1. Shopify Collective" [level=3] [ref=e158]
                  - figure "Sell high-quality products from other retailers on your online store with Shopify Collective." [ref=e159]:
                    - img "A product SKU that a retailer has imported and made $53,000 in sales from." [ref=e160]
                    - generic [ref=e161]: Sell high-quality products from other retailers on your online store with Shopify Collective.
                  - paragraph [ref=e162]:
                    - link "Shopify Collective" [ref=e163] [cursor=pointer]:
                      - /url: /collective
                    - text: is a free supplier network that lets eligible Shopify users sell products from other Shopify brands. After browsing products and choosing items to sell, Shopify Collective makes it easy to contact suppliers and import product listings to your store.
                  - paragraph [ref=e164]: At checkout, Shopify Collective calculates shipping rates and routes orders to suppliers for delivery to customers. Products ship globally, with shipping rates and destinations depending on the supplier's shipping service.
                  - paragraph [ref=e165]: "This platform is perfect if you:"
                  - list [ref=e166]:
                    - listitem [ref=e167]: Don't have much storage space but want to sell more products.
                    - listitem [ref=e168]: Want to keep cash flow healthy (you only pay suppliers after making a sale).
                    - listitem [ref=e169]: Dream of creating an online department store with multiple brands.
                    - listitem [ref=e170]: Want access to thousands of products across categories including clothing, beauty, home, food and beverage, and electronics.
                  - paragraph [ref=e171]: You can view product descriptions, prices, ratings, and supplier information with verified reviews. Shopify Collective also provides product recommendations based on your store's existing bestsellers, with margins that typically range from 20% to 50%.
                  - paragraph [ref=e172]:
                    - text: Take luxury fashion brand
                    - link "Larroude" [ref=e173] [cursor=pointer]:
                      - /url: /case-studies/larroude
                    - text: ", for example. It uses Shopify Collective for \"Colléct\"—its curated marketplace of emerging brands. \"Through a seamless expansion into other luxury brands, Shopify Collective drove an impressive 21% month-over-month revenue increase, showcasing the power of brand collaborations and the ability to tap into new categories,\" says Bianca Inocencio, business solution specialist at Larroude."
                  - heading "2. Alibaba and AliExpress" [level=3] [ref=e174]
                  - figure "Find Chinese wholesale suppliers on Alibaba and AliExpress." [ref=e175]:
