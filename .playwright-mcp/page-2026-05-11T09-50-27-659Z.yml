                        - /url: /blog/private-label
                      - text: products.
                  - paragraph [ref=e188]:
                    - text: Shipping from China has gotten much better thanks to
                    - link "ePacket" [ref=e189] [cursor=pointer]:
                      - /url: /blog/epacket-delivery-explained-everything-you-need-to-know-about-epacket-shipping
                    - text: delivery. This means getting products from Chinese suppliers is now faster and cheaper than ever.
                  - heading "3. DHgate" [level=3] [ref=e190]
