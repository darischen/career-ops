                  - paragraph [ref=e94]:
                    - text: The US wholesale industry has generated around
                    - link "$9.7 trillion" [ref=e95] [cursor=pointer]:
                      - /url: https://www.statista.com/markets/423/topic/532/wholesale/#overview
                    - text: in total goods sales—a market too big for sellers to ignore. While more businesses are entering wholesale ecommerce, finding wholesale suppliers and sourcing products can feel overwhelming.
                  - paragraph [ref=e96]:
                    - text: This guide will help you understand how wholesale buying works, explore your sourcing options, and learn how to find wholesale or
                    - link "dropshipping suppliers" [ref=e97] [cursor=pointer]:
                      - /url: /blog/dropshipping-suppliers
                    - text: that match your business needs.
                  - paragraph [ref=e98]: Whether you're just starting out or looking to expand your product line, you'll discover practical strategies to build reliable supply partnerships.
                  - heading "What is a wholesale supplier?" [level=2] [ref=e99]
                  - paragraph [ref=e100]: A wholesale supplier buys products directly from the manufacturers and sells them to retailers. The wholesale model gained popularity during the rise of mass production in the 19th century.
                  - paragraph [ref=e101]:
                    - text: Wholesalers serve as intermediaries in the
                    - link "supply chain" [ref=e102] [cursor=pointer]:
                      - /url: /blog/supply-chain-management
                    - text: ", buying products from"
                    - link "manufacturers" [ref=e103] [cursor=pointer]:
                      - /url: /blog/13975985-how-to-find-a-manufacturer-or-supplier-for-your-product-idea
                    - text: or
                    - link "distributors" [ref=e104] [cursor=pointer]:
                      - /url: /blog/wholesale-distributor
                    - text: in large quantities at discount rates. They pass these savings on to retailers, who typically pay between 60% and 70% of the final consumer price. Most wholesale suppliers have product licenses and offer special pricing that's only available to retail partners.
                  - generic [ref=e105]:
                    - paragraph [ref=e106]: Sell wholesale and direct to consumers with Shopify
                    - paragraph [ref=e107]: Only Shopify comes with built-in features that help you sell B2B and DTC from a single store or platform. Tailor the shopping experience for each buyer with customized product and pricing publishing, quantity rules, payment terms, and more—no third-party apps or coding required.
                    - link "Explore B2B on Shopify" [ref=e108] [cursor=pointer]:
                      - /url: /plus/solutions/b2b-ecommerce?itcat=coreblog&itterm=shopify-b2b-cta
                  - heading "How to find and vet reputable wholesale suppliers" [level=2] [ref=e109]
                  - paragraph [ref=e110]: "Finding the right partner for your business is a two-step process: first, you need to know where to look, and second, you need to know how to evaluate your options. Here's how to do both."
                  - heading "Where to find suppliers" [level=3] [ref=e111]
                  - paragraph [ref=e112]:
                    - text: While online wholesale marketplaces are a common starting point, building direct connections can lead to better partners and deals. Explore these avenues for
                    - link "wholesale opportunities" [ref=e113] [cursor=pointer]:
                      - /url: /blog/wholesale-opportunities-how-to-scale-your-retail-business-through-bulk-selling
                    - text: ":"
                  - list [ref=e114]:
                    - listitem [ref=e115]:
                      - strong [ref=e116]: "Industry trade shows:"
                      - text: Meet suppliers face-to-face to build rapport and see products firsthand.
                    - listitem [ref=e117]:
                      - strong [ref=e118]: "Niche social media groups:"
                      - text: Connect with other merchants and get real-world recommendations.
                    - listitem [ref=e119]:
                      - strong [ref=e120]: "Trade organizations:"
                      - text: Memberships often include access to directories of pre-vetted suppliers in your product category.
                  - heading "What to look for in a supplier" [level=3] [ref=e122]
                  - paragraph [ref=e123]: "Once you have a list of potential suppliers, use these criteria to choose the best one:"
                  - list [ref=e124]:
                    - listitem [ref=e125]:
                      - strong [ref=e126]: "Product quality:"
                      - text: Always get samples before placing a large order. This helps you check the quality yourself and avoid getting stuck with products you can't sell. Do some
                      - link "market research" [ref=e127] [cursor=pointer]:
                        - /url: /blog/what-is-market-research
                      - text: to ensure the products meet customer expectations.
                    - listitem [ref=e128]:
                      - strong [ref=e129]: "Pricing and negotiation:"
                      - text: Keep track of typical wholesale prices and don't be afraid to negotiate. Most suppliers offer better deals on bulk purchases. A 10% discount is a common starting point and shows you're getting a fair rate.
                    - listitem [ref=e130]:
                      - strong [ref=e131]: "Customer service:"
                      - text: Choose suppliers with a track record of solving problems quickly. Check reviews and ask how they handle issues like damaged items or shipping delays. This is especially critical if you're
                      - link "dropshipping" [ref=e132] [cursor=pointer]:
                        - /url: /blog/what-is-dropshipping
                      - text: .
                    - listitem [ref=e133]:
                      - strong [ref=e134]: "Shipping speed:"
                      - text: Since most customers consider fast delivery to be under
                      - link "three business days" [ref=e135] [cursor=pointer]:
                        - /url: https://www.pitneybowes.com/us/blog/speed-expectations-2024.html
                      - text: ", ask about order processing times, shipping carriers, and typical delivery windows. Check if they offer expedited options for rush orders."
                  - paragraph
                  - paragraph
