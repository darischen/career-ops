                    - generic [ref=e255]: Use Thomasnet to find suppliers based in the USA, Canada, and Mexico.
                  - paragraph [ref=e256]:
                    - link "Thomasnet" [ref=e257] [cursor=pointer]:
                      - /url: https://www.thomasnet.com/
                    - text: is a free-to-use supplier discovery platform listing 500,000+ North American OEMs, custom manufacturers, wholesale distributors, and service companies across more than six million industrial products.
                  - paragraph [ref=e258]: Retailers and private label brands use it to source domestically, shorten lead times, and avoid import duties. Buyers can filter results by location, diversity status, and quality certifications, then send RFIs or download CAD drawings directly from a supplier's profile.
                  - paragraph [ref=e259]: "Thomasnet is perfect if you:"
