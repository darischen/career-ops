                    - heading "Software Engineer | Growth & Transformation" [level=1] [ref=f10e11]
                    - generic [ref=f10e12]:
                      - img [ref=f10e13]
                      - generic [ref=f10e15]: Charlotte, NC; New York, NY
                  - button "Apply" [ref=f10e16]
                - generic [ref=f10e17]:
                  - generic [ref=f10e18]:
                    - paragraph [ref=f10e19]:
                      - strong [ref=f10e20]: This role is not open to visa sponsorship or transfer of visa sponsorship including those on H1-B, F-1, OPT, STEM-OPT, or TN visa, nor is it available to work corp-to-corp.
                    - paragraph [ref=f10e21]:
                      - strong [ref=f10e22]: This role requires a hybrid schedule and will be based in our South Charlotte, NC or New York, NY office (Tuesday through Thursday) and optional remote days on Mondays and Fridays each week.
                    - paragraph [ref=f10e23]: Red Ventures is looking for a Software Engineer to join our Banking Client Services organization. You’ll build and operate financial services web platforms for our banking partners using Next.js, hosted in high-availability multi-cloud Kubernetes environments. You’ll do it within a team that treats AI and automation as fundamental to how modern software gets built.
                    - paragraph [ref=f10e24]: Our engineering group is AI-forward. We’ve integrated agentic workflows and automation into coding, ticket management, compliance, and cross-functional problem-solving and we expect every engineer to actively contribute to that momentum. You’ll use AI-assisted tools daily, build automation that makes the team faster, and partner with business and data science teams to apply AI to real problems.
                    - paragraph [ref=f10e25]: This is an IC engineering role reporting to an Engineering Manager with a clear path for growth as our client partnerships expand.
                    - paragraph [ref=f10e26]:
                      - text: Curious how Growth and Transformation fits into Red Ventures?
                      - link "Click here" [ref=f10e27] [cursor=pointer]:
                        - /url: https://www.redventures.com/
                      - text: .
                    - paragraph [ref=f10e28]:
                      - strong [ref=f10e29]: "What You’ll Do:"
                    - paragraph [ref=f10e30]:
                      - emphasis [ref=f10e31]: Engineering Delivery
                    - list [ref=f10e32]:
                      - listitem [ref=f10e33]: Build and maintain financial services web platforms using Next.js (React, TypeScript) with a focus on performance, reliability, and partner-grade quality.
                      - listitem [ref=f10e34]: Deploy and operate applications in high-availability, multi-cloud Kubernetes environments, contributing to infrastructure-as-code, CI/CD pipelines, and deployment automation.
                      - listitem [ref=f10e35]: "Contribute to SRE practices: observability, alerting, incident response, and operational maturity for client-facing web properties."
                      - listitem [ref=f10e36]: Write well-tested, reviewable code and actively participate in code reviews, advocating for quality across the team.
                      - listitem [ref=f10e37]: Collaborate with designers, business stakeholders, and data science partners to deliver solutions that strengthen client trust.
                    - paragraph [ref=f10e38]:
                      - emphasis [ref=f10e39]: AI & Automation
                    - list [ref=f10e40]:
                      - listitem [ref=f10e41]: Build and maintain agentic workflows and automation that improve engineering delivery, spanning coding assistance, ticket management, compliance processes, and operational tasks.
                      - listitem [ref=f10e42]: Use AI-assisted development tools (IDE integrations, CLI agents, code review automation) as a core part of your daily workflow to accelerate output and improve quality.
                      - listitem [ref=f10e43]: Partner with business and data science teams to identify automation opportunities and build AI-driven solutions to operational and client-facing problems.
                      - listitem [ref=f10e44]: Evaluate emerging AI/ML tooling for software development and recommend adoption where it reduces toil or improves outcomes.
                      - listitem [ref=f10e45]: Develop internal tooling and developer experience improvements that help engineers across teams move faster.
                    - paragraph [ref=f10e46]:
                      - strong [ref=f10e47]: "What We’re Looking For:"
                    - paragraph [ref=f10e48]:
                      - emphasis [ref=f10e49]: Software Engineering (3–5 Years Experience)
                    - list [ref=f10e50]:
                      - listitem [ref=f10e51]: Strong proficiency in JavaScript/TypeScript, React, and Node.js. Hands-on experience with Next.js is strongly preferred.
                      - listitem [ref=f10e52]: Experience deploying and operating applications on Kubernetes in production environments. Familiarity with multi-cloud architectures (AWS, GCP, or Azure) is a plus.
                      - listitem [ref=f10e53]: "Solid understanding of web application architecture: client-server models, RESTful APIs, microservices, and server-side rendering."
                      - listitem [ref=f10e54]: "Demonstrated emphasis on code quality: testing strategies (unit, integration, end-to-end), code review practices, and engineering best practices."
                      - listitem [ref=f10e55]: Experience with CI/CD pipelines and deployment tooling (e.g., Harness, GitHub Actions).
                      - listitem [ref=f10e56]: Familiarity with Agile/Scrum methodologies and iterative delivery within sprint-based workflows.
                    - paragraph [ref=f10e57]:
                      - emphasis [ref=f10e58]: AI Fluency & Automation
                    - list [ref=f10e59]:
                      - listitem [ref=f10e60]: Demonstrated experience building automation, internal tooling, or agentic workflows.
                      - listitem [ref=f10e61]: Proficiency with AI-assisted development tools such as GitHub Copilot, Cursor, Claude Code, or similar IDE and CLI integrations.
                      - listitem [ref=f10e62]: "A builder’s mindset: you actively look for opportunities to automate repetitive work, streamline processes, and apply AI to engineering problems."
                      - listitem [ref=f10e63]: Willingness to experiment with emerging AI capabilities and drive adoption through working examples and documentation.
                    - paragraph [ref=f10e64]:
                      - emphasis [ref=f10e65]: Collaboration & Communication
                    - list [ref=f10e66]:
                      - listitem [ref=f10e67]: Clear written and verbal communication skills. Ability to explain technical decisions to peers and cross-functional partners.
                      - listitem [ref=f10e68]: Comfort working across functions, you’ll collaborate regularly with data science, business, and design teams.
                      - listitem [ref=f10e69]: A collaborative, team-first approach. You contribute to a psychologically safe environment and share knowledge freely.
                    - paragraph [ref=f10e70]:
                      - strong [ref=f10e71]: "Nice to Have:"
                    - list [ref=f10e72]:
                      - listitem [ref=f10e73]: Familiarity with web analytics tools (e.g., Google Analytics, Mixpanel) and using data to inform engineering decisions.
                      - listitem [ref=f10e74]: Experience with databases (SQL and/or NoSQL) and their integration with web applications.
                      - listitem [ref=f10e75]: Understanding of container orchestration and cloud-native tooling beyond Kubernetes basics.
                    - paragraph [ref=f10e76]:
                      - strong [ref=f10e77]: "Compensation:"
                    - paragraph [ref=f10e78]:
                      - emphasis [ref=f10e79]: This range reflects total cash compensation, which may include base salary only or base salary plus target bonus, depending on the role. Where eligible, equity may also be offered separately and not included below. Actual compensation varies based on location, experience, and qualifications.
                    - list [ref=f10e80]:
                      - listitem [ref=f10e81]:
                        - text: "Total Cash Compensation Range:"
                        - list [ref=f10e82]:
                          - listitem [ref=f10e83]: "Charlotte, NC Hybrid Compensation Range: $80,000 – $140,000 per year"
                          - listitem [ref=f10e84]: "New York, NY Hybrid Compensation Range: $100,000 – $175,000"
                    - paragraph [ref=f10e85]: Additionally, the following benefits are provided by Red Ventures, subject to eligibility requirements.
                    - list [ref=f10e86]:
                      - listitem [ref=f10e87]: Health Insurance Coverage (medical, dental, and vision)
                      - listitem [ref=f10e88]: Life Insurance
                      - listitem [ref=f10e89]: Short and Long-Term Disability Insurance
                      - listitem [ref=f10e90]: Flexible Spending Accounts
                      - listitem [ref=f10e91]: Holiday Pay
                      - listitem [ref=f10e92]: 401(k) with match
                      - listitem [ref=f10e93]: Employee Assistance Program
                      - listitem [ref=f10e94]: Paid Parental Bonding Benefit Program
                      - listitem [ref=f10e95]: "Flexible Paid Time Off (PTO): We believe time to rest and recharge is essential. That’s why we offer a generous and flexible PTO policy. Full-time employees accrue 20 days of PTO for a full calendar year annually, with an increase to 25 days after five years of service."
                    - paragraph [ref=f10e96]:
                      - strong [ref=f10e97]: "Who We Are:"
                    - paragraph [ref=f10e98]:
                      - text: Red Ventures is a global portfolio of high-growth companies — spanning several U.S. businesses,
                      - strong [ref=f10e99]
                      - text: a joint venture in the health services industry,
                      - strong [ref=f10e100]
                      - text: and strategic investments in Europe. Their businesses include The Points Guy, Lonely Planet, Bankrate, the Allconnect Platform, RV Home Client Growth, RV Growth & Transformation, Sage Home Loans Corporation, and more. Across the portfolio, Red Ventures businesses deliver seamless digital experiences for consumers, help Fortune 100 clients solve large-scale digital growth challenges, and create world-class experiences and opportunities for employees. Learn more at
                      - link "redventures.com" [ref=f10e101] [cursor=pointer]:
                        - /url: http://redventures.com/
                      - text: and follow @RedVentures on LinkedIn and Instagram.
                    - paragraph [ref=f10e102]:
                      - text: "At Red Ventures, we believe diverse, inclusive teams are better. To help you better understand our core values and beliefs, we encourage you to watch this brief YouTube video:"
                      - link "Our Belief Statements" [ref=f10e103] [cursor=pointer]:
                        - /url: https://www.youtube.com/watch?v=rH8sAwf4T34
                      - text: . This will give you insight into the principles that guide our work and our commitment to fostering an inclusive environment.
                    - paragraph [ref=f10e104]: We offer competitive salaries and a comprehensive benefits program for full-time employees, including medical, dental and vision coverage, paid time off, life insurance, disability coverage, employee assistance program, 401(k) plan and a paid parental leave program.
                    - paragraph [ref=f10e105]: Red Ventures is an equal opportunity employer that does not discriminate against any employee or applicant because of race, creed, color, religion, gender, sexual orientation, gender identity/expression, national origin, disability, age, genetic information, veteran status, marital status, pregnancy or any other basis protected by law. Employment at Red Ventures is based solely on a person's merit and qualifications.
                    - paragraph [ref=f10e106]: We are committed to providing equal employment opportunities to qualified individuals with disabilities. This includes providing reasonable accommodation where appropriate. Should you require a reasonable accommodation to apply or participate in the job application or interview process, please contact accommodation@redventures.com.
                    - paragraph [ref=f10e107]:
                      - text: If you are based in California, we encourage you to read this important information for California residents linked
                      - link "here" [ref=f10e108] [cursor=pointer]:
                        - /url: https://nam02.safelinks.protection.outlook.com/?url=https%3A%2F%2Fwww.redventures.com%2Flegal%2Fus-emp-privacy-notice&data=05%7C02%7Cacrowley%40redventures.com%7Cea997034b72842b377fa08dc57e4bb6b%7C4289d6102cfd46218c9644a1518ddb0a%7C0%7C0%7C638481887104427040%7CUnknown%7CTWFpbGZsb3d8eyJWIjoiMC4wLjAwMDAiLCJQIjoiV2luMzIiLCJBTiI6Ik1haWwiLCJXVCI6Mn0%3D%7C0%7C%7C%7C&sdata=PRPMbTtl0hah8XH0gW55ohdL4VLjIou2X7wbZAmhbac%3D&reserved=0
                      - text: .
                    - paragraph [ref=f10e109]: "At Red Ventures, we believe in real human connection. That’s why we do not hire someone through text, social media, or email only. As part of the hiring process, you should expect live conversations with RV teammates before any offer is made. Also, keep an eye on the sender: we only use official @redventures.com email addresses at the portfolio level or business specific email addresses (e.g., @thepointsguy.com), not ones like “redventurescareer.com.” We will never ask candidates to send money, buy equipment, or share financial account info during your journey with us. You can always find our open roles on redventures.com— if you receive a message that seems suspicious, please use redventures.com to verify the opportunity."
                    - paragraph [ref=f10e110]: For more, the U.S. Federal Trade Commission has published helpful articles to help individuals learn more about protecting themselves from recruiter scams. If you think you’ve been targeted, feel free to report it to your local authorities. Stay safe out there!
                    - paragraph [ref=f10e111]: "#LI-KS1 #LI-HYBRID"
                  - generic [ref=f10e112]:
