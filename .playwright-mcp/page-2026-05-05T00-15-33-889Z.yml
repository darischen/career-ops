            - generic [ref=e24]:
              - heading "Company Description" [level=2] [ref=e26]
              - paragraph [ref=e28]: It all started in sunny San Diego, California in 2004 when a visionary engineer, Fred Luddy, saw the potential to transform how we work. Fast forward to today — ServiceNow stands as a global market leader, bringing innovative AI-enhanced technology to over 8,100 customers, including 85% of the Fortune 500®. Our intelligent cloud-based platform seamlessly connects people, systems, and processes to empower organizations to find smarter, faster, and better ways to work. But this is just the beginning of our journey. Join us as we pursue our purpose to make the world work better for everyone.
            - generic [ref=e29]:
              - heading "Job Description" [level=2] [ref=e31]
              - list [ref=e33]:
                - listitem [ref=e34]: Build out core infrastructure services and microservices that impact our machine learning, frontend, and platform teams.
                - listitem [ref=e35]: "Build out core infrastructure for various functionalities such as: distributed configuration management, rate limiting, feature flag, A/B testing, and traffic capture and replay."
                - listitem [ref=e36]: Improve the performance, scalability and observability of the Moveworks cloud infrastructure.
                - listitem [ref=e37]: Deliver deadline sensitive work regularly that is interdependent with other engineering teams.
                - listitem [ref=e38]: Own features end-to-end, and regularly influence the infrastructure roadmap.
                - listitem [ref=e39]: This is a highly collaborative, in-person role, working cross functionally with Core and ML engineering teams, and more.
            - generic [ref=e40]:
              - heading "Qualifications" [level=2] [ref=e42]
              - list [ref=e44]:
                - listitem [ref=e45]: 0-3 years of experience
                - listitem [ref=e46]: Familiarity with Python/Golang/Java/C++.
                - listitem [ref=e47]: Experience with containers/Docker, and with cloud infrastructure like AWS/GCP/Azure.
                - listitem [ref=e48]: Experience working with and operating open source technologies like Kafka, Elasticsearch or Opensearch, Istio, Vector DB, etc. at scale.
                - listitem [ref=e49]: Desire to work at a startup pace with a high degree of ownership.
                - listitem [ref=e50]: Experience solving for performance, optimization, scalability, latency, and monitoring.
                - listitem [ref=e51]: Strong motivation, gumption, and an appetite for continuous, incremental changes and completing challenging projects quickly.
                - listitem [ref=e52]: BS in computer science or a related field.
                - listitem [ref=e53]: High level of curiosity about engineering outside of your immediate discipline and an incessant desire to learn.
            - generic [ref=e54]:
