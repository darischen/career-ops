              - generic [ref=e57]:
                - paragraph [ref=e58]:
                  - strong [ref=e59]: Work Personas
                - paragraph [ref=e60]:
                  - text: We approach our distributed world of work with flexibility and trust. Work personas (flexible, remote, or required in office) are categories that are assigned to ServiceNow employees depending on the nature of their work and their assigned work location.
                  - link "Learn more here" [ref=e61] [cursor=pointer]:
                    - /url: https://www.servicenow.com/content/dam/servicenow-assets/public/en-us/doc-type/other-document/careers/new-world-of-work-personas.pdf
                  - text: . To determine eligibility for a work persona, ServiceNow may confirm the distance between your primary residence and the closest ServiceNow office using a third-party service.
                - paragraph [ref=e62]:
                  - strong [ref=e63]: Equal Opportunity Employer
                - paragraph [ref=e64]: ServiceNow is an equal opportunity employer. All qualified applicants will receive consideration for employment without regard to race, color, creed, religion, sex, sexual orientation, national origin or nationality, ancestry, age, disability, gender identity or expression, marital status, veteran status, or any other category protected by law. In addition, all qualified applicants with arrest or conviction records will be considered for employment in accordance with legal requirements.
                - paragraph [ref=e65]:
