            - paragraph [ref=e23]: EverDriven is the nation’s leading provider of alternative student transportation, partnering with school districts to serve students who need it most—including those experiencing homelessness, living with disabilities, or outside traditional bus routes. Our tech-enabled, human-led model helps remove barriers to learning through safe, reliable transportation.
            - paragraph [ref=e24]: Since 2006, we’ve helped organizations solve complex transportation challenges through strong partnerships, dependable service, and a people-first approach. Guided by integrity, ownership, and collaboration, we move with urgency, lead with data, and never settle. Our success is driven by people who bring curiosity, accountability, and a commitment to continuous growth.
            - paragraph
          - generic [ref=e25]:
            - paragraph [ref=e26]:
              - strong [ref=e27]: "Position Summary:"
            - paragraph [ref=e28]: The ideal candidate is passionate about building high-quality, innovative, and scalable products and can iterate rapidly. You’ll get the chance to own and deliver multiple features and be a driving force behind the evolution of our product.
            - paragraph [ref=e29]:
              - strong [ref=e30]: "Salary Range:"
              - text: $115,000-$130,000/year, based on experience + bonus potential
              - strong [ref=e31]
            - paragraph [ref=e32]:
              - strong [ref=e33]: Location - Greenwood Village, CO.
              - text: Hybrid role - 4 days in the office and 1 days remote.
            - paragraph [ref=e34]:
              - strong [ref=e35]: "Responsibilities:"
            - list [ref=e36]:
              - listitem [ref=e37]:
                - text: Deliver results on complex projects, including leading some projects end-to-end
                - list [ref=e38]:
                  - listitem [ref=e39]: Prototype, develop and extend our front-end and backend systems in support of our portals.
                  - listitem [ref=e40]: Assist with design and definition of business and system level services, APIs, and front-end portal using modern design principles and patterns
                  - listitem [ref=e41]: Work with Frontend and Backend engineers to ensure seamless delivery
                  - listitem [ref=e42]: Help to provide an accurate timeline and scoping estimations on engineering projects
                  - listitem [ref=e43]: Deliver high-quality maintainable code
              - listitem [ref=e44]: Provide leadership in feature implementation & code quality
              - listitem [ref=e45]: Contribute to a positive and productive team culture by supporting your team and collaborating with others
              - listitem [ref=e46]: Follow agile/continuous integration engineering best practices
            - paragraph [ref=e47]:
              - strong [ref=e48]: "Qualifications:"
            - list [ref=e49]:
              - listitem [ref=e50]: 2 years of engineering experience building features end-to-end
              - listitem [ref=e51]: Have a passion for technology and a drive to think out of the box
              - listitem [ref=e52]: Diverse experience with a broad range of technologies and services – some of our key technologies are Microsoft Azure, C#, React/HTML/CSS, Docker, Kubernetes
              - listitem [ref=e53]: Understanding of RESTful API patterns and how to optimize for front-end applications
              - listitem [ref=e54]: Outstanding written and verbal communication skills
              - listitem [ref=e55]: Ability to work across environments and teams
              - listitem [ref=e56]: BA/BS in Computer Science or a related field preferred
