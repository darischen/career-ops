        - generic [ref=e19]:
          - generic [ref=e20]:
            - paragraph [ref=e21]: Cerebras Systems builds the world's largest AI chip, 56 times larger than GPUs. Our novel wafer-scale architecture provides the AI compute power of dozens of GPUs on a single chip, with the programming simplicity of a single device. This approach allows Cerebras to deliver industry-leading training and inference speeds and empowers machine learning users to effortlessly run large-scale ML applications, without the hassle of managing hundreds of GPUs or TPUs.
            - paragraph [ref=e22]:
              - text: Cerebras' current customers include top model labs, global enterprises, and cutting-edge AI-native startups.
              - link "OpenAI recently announced a multi-year partnership with Cerebras" [ref=e23] [cursor=pointer]:
                - /url: https://openai.com/index/cerebras-partnership/
              - text: ", to deploy 750 megawatts of scale, transforming key workloads with ultra high-speed inference."
            - paragraph [ref=e24]: Thanks to the groundbreaking wafer-scale architecture, Cerebras Inference offers the fastest Generative AI inference solution in the world, over 10 times faster than GPU-based hyperscale cloud inference services. This order of magnitude increase in speed is transforming the user experience of AI applications, unlocking real-time iteration and increasing intelligence via additional agentic computation.
          - generic [ref=e25]:
            - paragraph [ref=e26]:
              - strong [ref=e27]: About the Role
            - paragraph [ref=e28]: As a Full Stack Engineer focusing on Cerebras’ manufacturing test platform, you will design, build, and maintain a comprehensive test software solution for all stages of manufacturing – from individual components to complete Cerebras systems. You will collaborate cross-functionally with hardware design, engineering, operations, and data analytics teams to develop user interfaces and data processing frameworks that directly impact manufacturing efficiency, quality, and scalability.
            - paragraph [ref=e29]:
              - strong [ref=e30]: Responsibilities
            - list [ref=e31]:
              - listitem [ref=e32]: Collaborate with hardware engineers and test developers to create frameworks that facilitate the development, validation, and deployment of manufacturing tests.
            - list [ref=e33]:
              - listitem [ref=e34]: Create an intuitive, functional, and flexible user interface for executing a wide variety of manufacturing tests.
            - list [ref=e35]:
              - listitem [ref=e36]: Create a distributed data storage framework to sync test data across multiple manufacturing facilities.
            - list [ref=e37]:
              - listitem [ref=e38]: Collaborate with data engineers and data scientists to create interactive reports for visualizing test results.
            - list [ref=e39]:
              - listitem [ref=e40]: Support cross-functional initiatives across manufacturing, operations, and reliability teams to improve manufacturing efficiency, quality, and scalability throughout the entire product lifecycle.
            - paragraph [ref=e41]
            - paragraph [ref=e42]:
              - strong [ref=e43]: Skills and Qualifications
            - paragraph [ref=e44]: Required
            - list [ref=e45]:
              - listitem [ref=e46]: Bachelor’s degree in computer science, computer engineering, or related field.
            - list [ref=e47]:
              - listitem [ref=e48]: 3+ years of professional experience in full-stack software development.
            - list [ref=e49]:
              - listitem [ref=e50]: Strong proficiency in at least one advanced programming language (e.g. Python, C++).
            - list [ref=e51]:
              - listitem [ref=e52]: Experience with SQL databases (e.g. PostgreSQL, MySQL) and/or NoSQL databases (e.g. MongoDB, Redis).
            - list [ref=e53]:
              - listitem [ref=e54]: Experience with front-end technologies and frameworks (e.g. HTML, JavaScript).
            - paragraph [ref=e55]: Preferred
            - list [ref=e56]:
              - listitem [ref=e57]: Experience with hardware manufacturing and/or related disciplines such as manufacturing test automation, manufacturing software, or manufacturing quality control.
            - list [ref=e58]:
              - listitem [ref=e59]: Experience with application development in Windows and/or Linux.
            - list [ref=e60]:
              - listitem [ref=e61]: Experience with cloud platforms (e.g. AWS, GCP).
            - list [ref=e62]:
              - listitem [ref=e63]: Experience with data engineering, data analytics, and/or business intelligence.
            - list [ref=e64]:
              - listitem [ref=e65]: Experience with UI/UX.
            - list [ref=e66]:
              - listitem [ref=e67]: Experience with networking and cybersecurity.
            - paragraph [ref=e68]
            - paragraph [ref=e69]: The base salary range for this position is $175,000 to $220,000 annually. Actual compensation may include bonus and equity, and will be determined based on factors such as experience, skills, and qualifications.
          - generic [ref=e70]:
            - heading "Why Join Cerebras" [level=4] [ref=e71]:
              - strong [ref=e72]: Why Join Cerebras
            - paragraph [ref=e73]: "People who are serious about software make their own hardware. At Cerebras we have built a breakthrough architecture that is unlocking new opportunities for the AI industry. With dozens of model releases and rapid growth, we’ve reached an inflection point in our business. Members of our team tell us there are five main reasons they joined Cerebras:"
            - list [ref=e74]:
              - listitem [ref=e75]: Build a breakthrough AI platform beyond the constraints of the GPU.
              - listitem [ref=e76]: Publish and open source their cutting-edge AI research.
              - listitem [ref=e77]: Work on one of the fastest AI supercomputers in the world.
              - listitem [ref=e78]: Enjoy job stability with startup vitality.
              - listitem [ref=e79]: Our simple, non-corporate work culture that respects individual beliefs.
            - paragraph [ref=e80]:
              - text: "Read our blog:"
              - link "Five Reasons to Join Cerebras in 2026." [ref=e81] [cursor=pointer]:
                - /url: https://www.cerebras.net/blog/5-reasons-to-join-cerebras
            - heading "Apply today and become part of the forefront of groundbreaking advancements in AI!" [level=4] [ref=e82]
            - separator [ref=e83]
            - paragraph [ref=e84]:
              - emphasis [ref=e85]: Cerebras Systems is committed to creating an equal and diverse environment and is proud to be an equal opportunity employer.
              - emphasis [ref=e86]: We celebrate different backgrounds, perspectives, and skills. We believe inclusive teams build better products and companies.
              - emphasis [ref=e87]: We try every day to build a work environment that empowers people to do their best work through continuous learning, growth and support of those around them.
