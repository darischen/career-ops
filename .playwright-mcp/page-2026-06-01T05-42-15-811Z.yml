                - generic [ref=f2e15]:
                  - heading "SeatGeek believes live events are powerful experiences that unite humans. With our technological savvy and fan-first attitude we’re simplifying and modernizing the ticketing industry." [level=3] [ref=f2e16]:
                    - strong [ref=f2e17]: SeatGeek believes live events are powerful experiences that unite humans. With our technological savvy and fan-first attitude we’re simplifying and modernizing the ticketing industry.
                  - paragraph [ref=f2e18]: We’re building an awesome entertainment ecosystem where fans have effortless access to incredible live experiences, while sports teams, venues, and shows have unprecedented access to their audiences – because everyone should expect more from the ticketing industry.
                  - heading "Open roles for new graduates" [level=3] [ref=f2e19]:
                    - strong [ref=f2e20]: Open roles for new graduates
                  - paragraph [ref=f2e21]: We are looking for the best and brightest Spring/Summer 2026 college graduates to help us make live entertainment even better! Experience is preferred, but not required – in fact, we look forward to supporting you by teaching you new technologies and mentoring you in software development craft as a member of our world-class engineering team.
                  - paragraph [ref=f2e22]: "We have roles open in the following technologies:"
                  - list [ref=f2e23]:
                    - listitem [ref=f2e24]: Backend (Python, Go, C#)
                    - listitem [ref=f2e25]: Frontend Web (Typescript + React)
                    - listitem [ref=f2e26]: Mobile (Kotlin, Swift)
                    - listitem [ref=f2e27]: Platform (AWS, Docker, Python, Go)
                  - heading "What you'll do" [level=3] [ref=f2e28]:
                    - strong [ref=f2e29]: What you'll do
                  - list [ref=f2e30]:
                    - listitem [ref=f2e31]: Solve unique and challenging customer problems
                    - listitem [ref=f2e32]: Work with leading-edge tech in the cloud or on web and mobile
                    - listitem [ref=f2e33]: Help scale our software as we grow our booming business
                    - listitem [ref=f2e34]: Take on the challenges of building software for a many-sided marketplace
                    - listitem [ref=f2e35]: Empower decision-making at a rapidly growing data-driven company
                    - listitem [ref=f2e36]: Run experiments and evaluate new technologies that will determine the future of our business for years to come
                    - listitem [ref=f2e37]: Build performant, beautiful, inclusive user interfaces that delight our users and enhance our brand
                  - heading "What you have" [level=3] [ref=f2e38]:
                    - strong [ref=f2e40]: What you have
                  - list [ref=f2e41]:
                    - listitem [ref=f2e42]: You are a college student graduating in the Spring/Summer of 2026, ideally in computer science or a related degree
                    - listitem [ref=f2e43]: Experience in building software. We'll be interested in hearing about what you've built and how you built it
                    - listitem [ref=f2e44]: Problem solving abilities, adept at handling technical challenges. SeatGeek engineers create custom solutions to unique ticketing problems, including venue mapping, inventory tracking, and event matching. We'll be excited to hear about the problems you've solved
                    - listitem [ref=f2e45]: Passion for software craftsmanship and product. You hold yourself and your code to a high standard
                    - listitem [ref=f2e46]: Commitment to your teammates. You enjoy working with a diverse group of people with different experiences and take pride in mentoring and learning from others
                  - heading "Our stack" [level=3] [ref=f2e47]:
                    - strong [ref=f2e48]: Our stack
                  - paragraph [ref=f2e49]: You do not need experience with all of these, but we thought you might be curious. What we care about is your experience, skills, and approach to problem-solving. Tools can be learned.
                  - list [ref=f2e50]:
                    - listitem [ref=f2e51]:
                      - strong [ref=f2e52]: "Languages:"
                      - text: Python, Go, C#+.NET Core, React+Typescript, Swift, Kotlin
                    - listitem [ref=f2e53]:
                      - strong [ref=f2e54]: "Datastores:"
                      - text: Postgres, Redis, Elasticsearch
                    - listitem [ref=f2e55]:
                      - strong [ref=f2e56]: "Cloud:"
                      - text: AWS
                    - listitem [ref=f2e57]:
                      - strong [ref=f2e58]: "Version control:"
                      - text: Gitlab
                  - heading "Perks" [level=3] [ref=f2e59]:
                    - strong [ref=f2e60]: Perks
                  - list [ref=f2e61]:
                    - listitem [ref=f2e62]: Equity stake
                    - listitem [ref=f2e63]: Discretionary annual bonus
                    - listitem [ref=f2e64]: Flexible work environment, allowing you to work as many days a week in the office as you’d like or 100% remotely
                    - listitem [ref=f2e65]: A WFH stipend to support your home office setup
                    - listitem [ref=f2e66]: Unlimited PTO
                    - listitem [ref=f2e67]: Eligible for the SG discretionary annual bonus based on individual and company performance
                    - listitem [ref=f2e68]: Up to 16 weeks of fully-paid family leave
                    - listitem [ref=f2e69]: 401(k) matching
                    - listitem [ref=f2e70]: Student loan matching program
                    - listitem [ref=f2e71]: Health, vision, dental, and life insurance
                    - listitem [ref=f2e72]: Up to $25k towards family building, reproductive health services and Gender-affirming care
                    - listitem [ref=f2e73]: $500 per year for wellness expenses
                    - listitem [ref=f2e74]: Subscriptions to Headspace (meditation), Headspace Care (therapy), and One Medical
                    - listitem [ref=f2e75]: $120 per month to spend on tickets to live events
                    - listitem [ref=f2e76]: Annual subscription to Spotify, Apple Music, or Amazon music
                  - heading "**Please note you are expected to come into the SeatGeek New York City Office at least 3 days a week**" [level=3] [ref=f2e77]:
