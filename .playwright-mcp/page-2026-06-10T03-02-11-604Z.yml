              - paragraph [ref=e276]
              - paragraph [ref=e277]: At Chime we are committed to providing a welcoming and inclusive work environment, and that starts with our application process. To hold ourselves accountable for equitable and inclusive hiring practices, we ask candidates to voluntarily complete the following survey that helps us in our efforts to ensure equal employment opportunities.
              - paragraph [ref=e278]: We believe that diversity, equity, and belonging—DEB— is essential to our ability to help our diverse member base and continue delivering on our mission to provide them with financial peace of mind. Anyone who wants to work with us will be considered without regard to their race/ethnicity, religion, national origin, age, sex, marital status, ancestry, disability, gender identity, or sexual orientation.
              - paragraph [ref=e279]:
                - emphasis [ref=e280]: Your responses will be reported in aggregate only. Please be assured that your responses (or choosing not to identify) will have zero impact on your candidacy; this information is maintained confidentially and always stored separately from your application.
              - paragraph [ref=e281]:
                - text: This information will be stored in Greenhouse (
                - link "you can review Greenhouse’s privacy policy here" [ref=e282] [cursor=pointer]:
                  - /url: https://www.greenhouse.io/privacy-policy
                - text: ). Access inside Chime to this information is restricted to selected members of the People team, who are committed to keeping details confidential.. Greenhouse will retain this information, along with the rest of the information provided in your application, 18 months from your application date, after which all application information will be anonymized and stored only in that form. Once information is anonymized, neither we nor Greenhouse can determine the individual to whom it once belonged.
