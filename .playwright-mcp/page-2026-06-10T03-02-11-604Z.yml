            - heading "AI/ML Engineer" [level=1] [ref=e16]
            - generic [ref=e17]:
              - img [ref=e18]
              - generic [ref=e20]: San Francisco, CA, USA
          - button "Apply" [ref=e21] [cursor=pointer]
        - generic [ref=e22]:
          - generic [ref=e23]:
            - heading "About the role" [level=2] [ref=e24]:
              - strong [ref=e25]: About the role
            - paragraph [ref=e26]: Chime’s AI/ML Trust & Safety team is building models, insights, and decisioning systems that help protect millions of members while enabling safe, reliable financial progress. We are looking for an AI/ML Engineer who is growing strong technical depth in machine learning, experimentation, and analytical problem solving, with an interest in applying those skills to trust, safety, and risk challenges across Chime.
            - paragraph [ref=e27]: You’ll contribute to end-to-end model development, analysis, and production-facing decision systems with guidance from senior team members. Your work will help improve how Chime detects risk, understands member behavior, evaluates tradeoffs, and scales trustworthy member experiences. This role is a strong opportunity to build deeper expertise in applied ML, risk systems, experimentation, generative AI, sequence models, and cross-functional product impact in a high-scale environment.
            - paragraph [ref=e28]: The base salary offered for this role and level of experience will begin at$125,000.00 and up to $173,000.00. Full-time employees are also eligible for a bonus, competitive equity package, and benefits. The actual base salary offered may be higher, depending on your location, skills, qualifications, and experience.
            - heading "In this role, you can expect to" [level=2] [ref=e29]:
              - strong [ref=e30]: In this role, you can expect to
            - list [ref=e31]:
              - listitem [ref=e32]: Contribute to the design and implementation of training pipeline components for AI/ML models that support Chime’s risk decisioning systems.
              - listitem [ref=e33]: Develop, test, and iterate on model features within clear requirements and with support from senior team members.
              - listitem [ref=e34]: Support offline model evaluation and contribute to online experiment analysis to understand performance, tradeoffs, and member impact.
              - listitem [ref=e35]: Write modular, testable, and maintainable code following engineering best practices.
              - listitem [ref=e36]: Collaborate with Product Managers, Engineers, and Risk teams to translate model findings into clear recommendations and measurable member impact.
              - listitem [ref=e37]: Contribute to production-facing model workflows, including model training, tuning, inference, and monitoring.
              - listitem [ref=e38]: Contribute to projects that apply modern AI/ML methods, such as generative AI, sequence models, and automation workflows, to improve Risk decisioning.
            - heading "To thrive in this role, you have" [level=2] [ref=e39]:
              - strong [ref=e40]: To thrive in this role, you have
            - list [ref=e41]:
              - listitem [ref=e42]: 1–2 years of experience in applied data science or AI/ML engineering, including relevant internship, academic, or project experience.
              - listitem [ref=e43]: Working knowledge of machine learning fundamentals, including feature development, model training, validation, tuning, and evaluation.
              - listitem [ref=e44]: Familiarity with cloud platforms, preferably AWS, orchestration tools, and version control.
              - listitem [ref=e45]: Familiarity with offline model evaluation, experimentation, and model performance tradeoffs.
              - listitem [ref=e46]: Ability to communicate analyses and model findings clearly, clarify requirements, and collaborate effectively with technical and non-technical partners.
            - heading "Nice to have" [level=2] [ref=e47]:
              - strong [ref=e48]: Nice to have
            - list [ref=e49]:
              - listitem [ref=e50]: Exposure to production ML workflows, including inference, monitoring, retraining, orchestration, model deployment.
              - listitem [ref=e51]: Experience using AI-assisted development tools such as Cursor, Claude Code, or similar tools.
              - listitem [ref=e52]: Exposure to deep learning methods, such as embeddings, sequence models, representation learning, or behavioral modeling.
            - paragraph [ref=e53]: "#LI-GC1 #LI-Hybrid"
          - generic [ref=e54]:
            - heading "A little about us" [level=2] [ref=e55]:
              - strong [ref=e57]: A little about us
            - paragraph [ref=e58]: At Chime, we believe that everyone can achieve financial progress. We created Chime—a financial technology company, not a bank*—on the premise that core banking services should be helpful, easy, and free. Through our user-friendly tools and intuitive platforms, we empower our members to take control of their finances and work towards their goals. Whether it's starting a savings account, purchasing a first car or home, launching a business, or pursuing higher education, we're proud to have helped millions unlock their financial potential.
            - paragraph [ref=e59]: "We're a team of problem solvers, dreamers, and builders with one shared obsession: our members. From day one, Chimers have worked tirelessly to out-hustle and out-execute competitors to bring our mission to life. Their grit and determination inspire us to work harder every day to deliver the very best experience possible. We each bring an owner's mindset to our work, refusing to be outdone and holding ourselves accountable to meet and exceed the highest bars for our teams, our company, and our members."
            - paragraph [ref=e60]: We believe in being bold, dreaming big, and taking risks, while also working together, embracing our diverse perspectives, and giving each other honest feedback. Our culture remains deeply entrepreneurial, encouraging every Chimer to see themselves as stewards of our mission to help everyday Americans unlock their financial progress.
            - paragraph [ref=e61]: We know that to achieve our mission, we must earn and keep people's trust—so we hold ourselves to the highest standards of integrity in everything we do. These aren't just words on a wall—our values are embedded in every aspect of our business, serving as a north star that guides us as we work to help millions achieve their financial potential.
            - paragraph [ref=e62]: Because if we don't—who will?
            - paragraph [ref=e63]: "*Chime is a financial technology company, not a bank. Banking services provided by The Bancorp Bank, N.A. or Stride Bank, N.A., Members FDIC."
            - heading "What we offer for our full-time, regular employees" [level=2] [ref=e64]:
              - strong [ref=e66]: What we offer for our full-time, regular employees
            - list [ref=e67]:
              - listitem [ref=e68]: 🏢 Our in-office work policy is designed to keep you connected - with four days a week in the office and Fridays from home for those near one of our offices, plus team and company-wide events depending on location. Whether you’re coming in regularly or are part of our fully remote program, you’ll stay engaged with your work and teammates.
              - listitem [ref=e69]: 💻 In-office perks including backup child, elder, and/or pet care, plus a subsidized commuter benefit to support your regular commute
              - listitem [ref=e70]: 💰 Competitive salary based on experience
              - listitem [ref=e71]: ✨ 401k match plus great medical, dental, vision, life, and disability benefits
              - listitem [ref=e72]: 🏝 Generous vacation policy and company-wide Chime Days, bonus company-wide paid days off
              - listitem [ref=e73]: 🫂 1% of your time off to support local community organizations of your choice
              - listitem [ref=e74]: 👟 Annual wellness stipend to use towards eligible wellness related expenses
              - listitem [ref=e75]: 👶 Up to 24 weeks of paid parental leave for birthing parents and 12 weeks of paid parental leave for non-birthing parents
              - listitem [ref=e76]: 👪 Access to Maven, a family planning tool, with $15k lifetime reimbursement for egg freezing, fertility treatments, adoption, and more.
              - listitem [ref=e77]: 🎉 In-person and virtual events to connect with your fellow Chimers—think cooking classes, guided meditations, music festivals, mixology classes, paint nights, etc., and delicious snack boxes, too!
              - listitem [ref=e78]: 💚 A challenging and fulfilling opportunity to join one of the most experienced teams in FinTech and help millions unlock financial progress
            - paragraph [ref=e79]: We know that great work can’t be done without a diverse team and inclusive environment. That’s why we specifically look for individuals of varying strengths, skills, backgrounds, and ideas to join our team. We believe this gives us a competitive advantage to better serve our members and helps us all grow as Chimers and individuals.
            - paragraph [ref=e80]:
              - generic [ref=e81]:
                - text: "Chime is proud to be an Equal Opportunity Employer. We consider qualified applicants without regard to race, color, ancestry, religion, sex, national origin, sexual orientation, gender identity, age, marital or family status, disability, genetic information, veteran status, or any other legally protected basis under provincial, federal, state, and local laws, regulations, or ordinances. We will also consider qualified applicants with criminal histories in a manner consistent with the requirements of state and local laws, including the San Francisco Fair Chance Ordinance, Cook County Ordinance, NYC Fair Chance Act, and the LA City Fair Chance Ordinance, and consistent with Canadian provincial and federal laws. If you have a disability or special need that requires accommodation during any stage of the application process, please contact:"
                - link "benefits@chime.com" [ref=e83] [cursor=pointer]:
                  - /url: mailto:benefits@chime.com
                - text: .
            - paragraph [ref=e84]:
              - generic [ref=e85]:
                - text: To learn more about how Chime collects and uses your personal information during the application process, please see the
                - link "Chime Applicant Privacy Notice." [ref=e86] [cursor=pointer]:
                  - /url: https://www.chime.com/careers/chime-applicant-privacy-notice/
