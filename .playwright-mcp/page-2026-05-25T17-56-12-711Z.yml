                - listitem [ref=e414]: Blind or low vision
                - listitem [ref=e415]: Cancer (past or present)
                - listitem [ref=e416]: Cardiovascular or heart disease
                - listitem [ref=e417]: Celiac disease
                - listitem [ref=e418]: Cerebral palsy
                - listitem [ref=e419]: Deaf or serious difficulty hearing
                - listitem [ref=e420]: Diabetes
