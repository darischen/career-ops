        - generic [ref=e20]:
          - generic [ref=e21]:
            - strong [ref=e23]: About Us
            - generic [ref=e24]:
              - paragraph [ref=e25]: At Cloudflare, we are on a mission to help build a better Internet. Today the company runs one of the world’s largest networks that powers millions of websites and other Internet properties for customers ranging from individual bloggers to SMBs to Fortune 500 companies. Cloudflare protects and accelerates any Internet application online without adding hardware, installing software, or changing a line of code. Internet properties powered by Cloudflare all have web traffic routed through its intelligent global network, which gets smarter with every request. As a result, they see significant improvement in performance and a decrease in spam and other attacks. Cloudflare was named to Entrepreneur Magazine’s Top Company Cultures list and ranked among the World’s Most Innovative Companies by Fast Company.
              - paragraph [ref=e26]: At Cloudflare, we’re not looking for people who wait for a polished roadmap; we’re looking for the builders who see the cracks in the Internet that everyone else has simply learned to live with. We value candidates who have the instinct to spot a "normalized" problem and the AI-native curiosity to create a solution using the latest tools. Our culture is built on iteration, leveraging AI to ship faster today to make it better tomorrow, while ensuring that every improvement, no matter how small, is shared across the team to lift everyone up. If you’re the type of person who values curiosity over bureaucracy, and that AI is a partner in solving tough problems to keep the Internet moving forward, you’ll fit right in.
          - generic [ref=e27]:
            - paragraph [ref=e28]:
              - strong [ref=e29]: "Available Locations:"
              - text: Austin, Texas, US
              - strong [ref=e30]: "Internship Dates:"
              - text: June 22 - September 11
            - heading "About the team" [level=4] [ref=e31]:
              - strong [ref=e32]: About the team
            - paragraph [ref=e33]: The Data Intelligence & Analytics team at Cloudflare is responsible for building a unified data & ML platform that enables our internal Business Partners and Product teams with actionable analytics, insights and recommendations. Our goal is to democratize data & intelligence, support Cloudflare’s critical business needs, and provide self-service data & AI applications to fuel existing and new business critical initiatives.
            - heading "About the role" [level=4] [ref=e34]:
              - strong [ref=e35]: About the role
            - paragraph [ref=e36]: We are looking for a Machine Learning Engineer Intern to join our Austin team to build and operate the pipelines behind AI-driven applications, Agents, Chatbots that power teams across the company, including go-to-market, engineering, and product. As an intern, you’ll work alongside experienced data scientists and machine learning engineers to tackle real-world challenges in AI development.
            - paragraph [ref=e37]:
              - strong [ref=e38]: What you'll do
            - list [ref=e39]:
              - listitem [ref=e40]: Deploy, monitor & support ML Applications & Services on Kubernetes in cloud.
              - listitem [ref=e41]: Understand MLOps landscape i.e tooling, tech stack, source systems etc. and work on new tools and solutions for ML & AI initiatives.
              - listitem [ref=e42]: Partner and align with Data Scientists, Data Engineers and internal teams to deliver ML solutions in a globally distributed environment.
              - listitem [ref=e43]: Leverage Cloudflare products and services for AI & ML initiatives and applications.
              - listitem [ref=e44]: Use software engineering best practices to publish model scores/insights/learnings at scale within the company.
            - paragraph [ref=e45]:
              - strong [ref=e46]: Examples of desirable skills, knowledge and experience
            - list [ref=e47]:
              - listitem [ref=e48]: B.S. or M.S in Computer Science, Statistics, Mathematics, or other quantitative fields
              - listitem [ref=e49]: Experience working with programming languages such as Python, Go or Javascript.
              - listitem [ref=e50]: Strong software engineering mindset, proficiency in shell scripts, CLI utilities, and version control with git.
              - listitem [ref=e51]: Knowledge of AI agents, inference-time optimization, LLM evaluations.
              - listitem [ref=e52]: Excellent communication & problem solving skills.
              - listitem [ref=e53]: Ability to collaborate with cross functional teams and work through ambiguous business requirements.
              - listitem [ref=e54]: Ability to commit to a 12 week summer internship.
              - listitem [ref=e55]: In office 3-5 days a week in Austin, TX.
            - paragraph [ref=e56]:
              - strong [ref=e57]: Bonus Points
            - list [ref=e58]:
              - listitem [ref=e59]: Familiarity with container based deployments such as Docker & Kubernetes in cloud.
              - listitem [ref=e60]: Experience with AI-assisted coding, building with cloudflare developer platform.
          - generic [ref=e61]:
            - paragraph [ref=e62]:
              - strong [ref=e63]: What Makes Cloudflare Special?
            - paragraph [ref=e64]: We’re not just a highly ambitious, large-scale technology company. We’re a highly ambitious, large-scale technology company with a soul. Fundamental to our mission to help build a better Internet is protecting the free and open Internet.
            - paragraph [ref=e65]:
              - link "Project Galileo" [ref=e66] [cursor=pointer]:
                - /url: https://blog.cloudflare.com/protecting-free-expression-online/
                - strong [ref=e67]: Project Galileo
              - text: ": Since 2014, we've equipped more than 2,400 journalism and civil society organizations in 111 countries with powerful tools to defend themselves against attacks that would otherwise censor their work, technology already used by Cloudflare’s enterprise customers--at no cost."
            - paragraph [ref=e68]:
              - strong [ref=e69]:
                - link "Athenian Project" [ref=e70] [cursor=pointer]:
                  - /url: https://www.cloudflare.com/athenian/
              - text: ": In 2017, we created the Athenian Project to ensure that state and local governments have the highest level of protection and reliability for free, so that their constituents have access to election information and voter registration. Since the project, we've provided services to more than 425 local government election websites in 33 states."
            - paragraph [ref=e71]:
              - link "1.1.1.1" [ref=e72] [cursor=pointer]:
                - /url: https://1.1.1.1/
                - strong [ref=e73]: 1.1.1.1
              - text: ": We released"
              - link "1.1.1.1" [ref=e74] [cursor=pointer]:
                - /url: https://1.1.1.1/
              - text: to help fix the foundation of the Internet by building a faster, more secure and privacy-centric public DNS resolver. This is available publicly for everyone to use - it is the first consumer-focused service Cloudflare has ever released. Here’s the deal - we don’t store client IP addresses never, ever. We will continue to abide by our
              - link "privacy commitment" [ref=e75] [cursor=pointer]:
                - /url: https://developers.cloudflare.com/1.1.1.1/privacy/public-dns-resolver
              - text: and ensure that no user data is sold to advertisers or used to target consumers.
            - paragraph [ref=e76]: Sound like something you’d like to be a part of? We’d love to hear from you!
            - paragraph [ref=e77]: Please note that applicants who progress to the offer stage of the interview process may be asked to attend an in-person interview within one of the Cloudflare Offices or Cloudflare Hubs. More details about this will be available at that stage of the interview process.
            - paragraph [ref=e78]: This position may require access to information protected under U.S. export control laws, including the U.S. Export Administration Regulations. Please note that any offer of employment may be conditioned on your authorization to receive software or technology controlled under these U.S. export laws without sponsorship for an export license.
            - paragraph [ref=e79]: Cloudflare is proud to be an equal opportunity employer. We are committed to providing equal employment opportunity for all people and place great value in both diversity and inclusiveness. All qualified applicants will be considered for employment without regard to their, or any other person's, perceived or actual race, color, religion, sex, gender, gender identity, gender expression, sexual orientation, national origin, ancestry, citizenship, age, physical or mental disability, medical condition, family care status, or any other basis protected by law. We are an AA/Veterans/Disabled Employer.
            - paragraph [ref=e80]: Cloudflare provides reasonable accommodations to qualified individuals with disabilities. Please tell us if you require a reasonable accommodation to apply for a job. Examples of reasonable accommodations include, but are not limited to, changing the application process, providing documents in an alternate format, using a sign language interpreter, or using specialized equipment. If you require a reasonable accommodation to apply for a job, please contact us via e-mail at hr@cloudflare.com or via mail at 101 Townsend St. San Francisco, CA 94107.
