          - paragraph [ref=e190]
          - heading "What Is the Opportunity?" [level=2] [ref=e298]
          - text: Travelers is seeking a Software Engineer I to join our Personal Insurance organization as we grow and transform our Technology landscape. Individual will complete intermediate end to end engineering tasks for specific system assignments including developing, analyzing, configuring, testing, debugging, troubleshooting, documenting, health monitoring/alerting, and implementing based on user or system design specifications, as well as participating in troubleshooting, conducting impact analysis and escalating appropriately.
          - text: Applicants must be authorized to work for ANY employer in the U.S. The company does not sponsor/support H-1B petitions, TN, or Forms I-983/STEM OPT, for this role.
          - heading "What Will You Do?" [level=2] [ref=e299]
          - list [ref=e300]:
            - listitem [ref=e301]: Perform analysis, design, development, and configuration functions as well as define technical requirements for assignments of intermediate complexity.
            - listitem [ref=e302]: Participate with team to perform analysis, assessment and resolution for defects and incidents of intermediate complexity and escalate appropriately.
            - listitem [ref=e303]: Work within guidelines set by team to independently tackle well-scoped problems.
            - listitem [ref=e304]: Seek opportunities to expand technical knowledge and capabilities.
            - listitem [ref=e305]: Perform other responsibilities as assigned.
          - heading "What Will Our Ideal Candidate Have?" [level=2] [ref=e306]
          - list [ref=e307]:
            - listitem [ref=e308]:
              - generic [ref=e310]: Three years of programming/development experience.
            - listitem [ref=e311]:
              - generic [ref=e313]: Proficient in building scalable web applications using TypeScript.
            - listitem [ref=e314]:
              - generic [ref=e316]: Backend experience building scalable applications with Node.js and C#.
            - listitem [ref=e317]:
              - generic [ref=e319]: Practical exposure to AI and Generative AI integration.
            - listitem [ref=e320]: Delivery - Intermediate delivery skills including the ability to deliver work at a steady, predictable pace to achieve commitments, decompose work assignments into small batch releases and contribute to tradeoff and negotiation discussions.
            - listitem [ref=e321]: Domain Expertise - Demonstrated track record of domain expertise including the ability to understand technical concepts necessary to do the job effectively, demonstrate willingness, cooperation, and concern for business issues and possess in-depth knowledge of immediate systems worked on.
            - listitem [ref=e322]: Problem Solving - Proven problem solving skills including debugging skills, allowing you to determine source of issues in unfamiliar code or systems and the ability to recognize and solve repetitive problems rather than working around them, recognize mistakes using them as learning opportunities and break down large problems into smaller, more manageable ones.
            - listitem [ref=e323]: Communication - Strong communication skills with the ability to clearly and concisely interact with team members, document work in a clear, easy to follow manner, collaborate well with team members, take in well- scoped requirements and ask the right questions to ensure clarification, seek out and receive constructive criticism well and listen when others are speaking.
            - listitem [ref=e324]: Leadership - Intermediate leadership skills with a proven track record of self-motivation in identifying personal growth opportunities.
          - paragraph [ref=e325]
          - heading "What is a Must Have?" [level=2] [ref=e326]
          - list [ref=e327]:
            - listitem [ref=e328]: Bachelor’s degree in computer science, related STEM field, or its equivalent in education and/or work experience.
            - listitem [ref=e329]: 2 additional years of software engineering experience.
          - paragraph [ref=e330]
          - generic [ref=e331]:
            - heading "What Is in It for You?" [level=2] [ref=e332]
            - list [ref=e333]:
              - listitem [ref=e334]: "Health Insurance: Employees and their eligible family members – including spouses, domestic partners, and children – are eligible for coverage from the first day of employment."
              - listitem [ref=e335]: "Retirement: Travelers matches your 401(k) contributions dollar-for-dollar up to your first 5% of eligible pay, subject to an annual maximum. If you have student loan debt, you can enroll in the Paying it Forward Savings Program. When you make a payment toward your student loan, Travelers will make an annual contribution into your 401(k) account. You are also eligible for a Pension Plan that is 100% funded by Travelers."
              - listitem [ref=e336]: "Paid Time Off: Start your career at Travelers with a minimum of 20 days Paid Time Off annually, plus nine paid company Holidays."
              - listitem [ref=e337]: "Wellness Program: The Travelers wellness program is comprised of tools, discounts and resources that empower you to achieve your wellness goals and caregiving needs. In addition, our mental health program provides access to free professional counseling services, health coaching and other resources to support your daily life needs."
              - listitem [ref=e338]: "Volunteer Encouragement: We have a deep commitment to the communities we serve and encourage our employees to get involved. Travelers has a Matching Gift and Volunteer Rewards program that enables you to give back to the charity of your choice."
            - paragraph [ref=e339]
