            - generic [ref=e64]: to join the Product Engineering department within our Incentives business. This early-career full-stack engineer will help build and improve customer-facing product experiences across the frontend, backend, APIs, and cloud while learning how to operate inside a modern product engineering model that connects product outcomes, technical delivery, instrumentation, and post-release learning.
        - paragraph [ref=e65]:
          - generic [ref=e67]: This role is a fit for an early-career engineer who wants to grow by working in a customer-obsessed environment where secure, scalable, iterative delivery matters, and practical exposure to AI-assisted workflows.
