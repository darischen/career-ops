      - heading "About Blackhawk Network:" [level=2] [ref=e42]
      - generic [ref=e45]:
        - paragraph [ref=e46]:
          - generic [ref=e48]: At Blackhawk Network (BHN), we shape the future of global branded payments through the prepaid products, technologies and network that connect brands and people. Our collaborative innovation and scalable, security-minded solutions help our partners to increase reach, loyalty and revenue. We believe our future holds great things for Blackhawk Network and its partners. We believe that together, we can shape the future. Our beliefs? Win as one team, be innovative, global excellence and be inspiring!
        - paragraph [ref=e49]:
          - generic [ref=e51]: Blackhawk Network (BHN) is building a digital platform and products that bring people and brands together. We facilitate cross channel payments via cash-in, cash-out and mobile payments. By leveraging blockchain, smart contracts, serverless technology, and real time payment systems, we are unlocking the next million users through innovation.
        - paragraph [ref=e52]
        - paragraph [ref=e53]:
          - generic [ref=e55]: Our employees are our biggest assets! Come find out how we engage, with the biggest brands in the world. We look for people who collaborate, who are inspirational, who have passion that can make a difference by working as a team while striving for global excellence. You can expect a strong investment in your professional growth, and a dedication to crafting a successful, sustainable career for you. Our teams are composed of highly talented and passionate 'A' players, who are also invested in mentoring and enabling the best qualities. Our vibrant culture and high expectations will kindle your passion and bring out the best in you!
      - heading "Overview:" [level=2] [ref=e56]
