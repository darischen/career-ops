                - listitem [ref=e444]: Blind or low vision
                - listitem [ref=e445]: Cancer (past or present)
                - listitem [ref=e446]: Cardiovascular or heart disease
                - listitem [ref=e447]: Celiac disease
                - listitem [ref=e448]: Cerebral palsy
                - listitem [ref=e449]: Deaf or serious difficulty hearing
                - listitem [ref=e450]: Diabetes
                - listitem [ref=e451]: Disfigurement, for example, disfigurement caused by burns, wounds, accidents, or congenital disorders
                - listitem [ref=e452]: Epilepsy or other seizure disorder
                - listitem [ref=e453]: Gastrointestinal disorders, for example, Crohn's Disease, irritable bowel syndrome
                - listitem [ref=e454]: Intellectual or developmental disability
                - listitem [ref=e455]: Mental health conditions, for example, depression, bipolar disorder, anxiety disorder, schizophrenia, PTSD
                - listitem [ref=e456]: Missing limbs or partially missing limbs
                - listitem [ref=e457]: Mobility impairment, benefiting from the use of a wheelchair, scooter, walker, leg brace(s) and/or other supports
                - listitem [ref=e458]: Nervous system condition, for example, migraine headaches, Parkinson’s disease, multiple sclerosis (MS)
                - listitem [ref=e459]: Neurodivergence, for example, attention-deficit/hyperactivity disorder (ADHD), autism spectrum disorder, dyslexia, dyspraxia, other learning disabilities
                - listitem [ref=e460]: Partial or complete paralysis (any cause)
                - listitem [ref=e461]: Pulmonary or respiratory conditions, for example, tuberculosis, asthma, emphysema
                - listitem [ref=e462]: Short stature (dwarfism)
                - listitem [ref=e463]: Traumatic brain injury
