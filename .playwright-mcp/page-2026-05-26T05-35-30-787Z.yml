            - heading "Software Engineer I - Core Product - Notification Platform Team" [level=1] [ref=e16]
            - generic [ref=e17]:
              - img [ref=e18]
              - generic [ref=e20]: Toronto
          - button "Apply" [ref=e21] [cursor=pointer]
        - generic [ref=e22]:
          - paragraph [ref=e24]: PagerDuty (NYSE:PD) is a leader in Digital Operations Management. In an always-on world, organizations of all sizes trust PagerDuty to help them deliver a perfect digital experience to their customers, every time. Teams use PagerDuty to identify issues and opportunities in real time and bring together the right people to fix problems faster and prevent them in the future. Over 13,000 organizations (including 60 of Fortune 100) rely on PagerDuty to succeed with Digital Transformation, Cloud Migration, and DevOps Modernization. Notable customers include GE, Cisco, Genentech, Electronic Arts, Cox Automotive, Netflix, Shopify, Zoom, DoorDash, Lululemon and more. We are expanding rapidly as a platform for Digital Operations Management using AI/ML and Automation and growing our adoption by Development, IT, Customer Service, Security, and other teams across the organization.
          - generic [ref=e25]:
            - paragraph [ref=e26]:
              - text: We're seeking a
              - strong [ref=e27]: Software Engineer I
              - text: to join PagerDuty's Notification Platform team. You'll be instrumental in developing and enhancing our event-driven notification systems, ensuring our customers receive critical alerts promptly and reliably. Our platform is a leader in high-reliability and resiliency, delivering notifications across SMS, Voice, Push, email, and other vital channels.
            - paragraph [ref=e28]:
              - text: As a
              - strong [ref=e29]: Software Development Engineer I
              - text: ", you’ll contribute to a core platform that sits at the heart of our Operations Cloud, learning from experienced mentors while shipping impactful, reliable software. You’ll collaborate across teams, grow your systems thinking, and see your work translate into meaningful outcomes for customers—faster recovery, fewer disruptions, and more time for teams to innovate."
            - heading "Key Responsibilities" [level=4] [ref=e30]:
              - strong [ref=e31]: Key Responsibilities
            - list [ref=e32]:
              - listitem [ref=e33]: "Ship product features end-to-end with guidance: design, implement, test, deploy, and iterate"
              - listitem [ref=e34]: Write clean, maintainable, and well-tested code in our primary stack (e.g., Elixir, Java, JavaScript/Typescript, React)
              - listitem [ref=e35]: Review peers’ code and incorporate feedback to raise code quality and consistency
              - listitem [ref=e36]: Build and maintain automated tests (unit, integration) and help keep CI/CD pipelines healthy
              - listitem [ref=e37]: Use dashboards to monitor and improve performance and reliability
              - listitem [ref=e38]: Fix bugs, address regressions quickly, and learn from incidents
              - listitem [ref=e39]: Follow secure coding practices and help protect user data and systems
              - listitem [ref=e40]: Document decisions, APIs, and onboarding notes for future maintainers
              - listitem [ref=e41]: Participate in agile rituals (standups, planning, retros) and communicate progress/risks early
              - listitem [ref=e42]: Participate in the team's on-call rotation, after extensive training & mentorship
              - listitem [ref=e43]: Collaborate closely with product, design, and other engineers to scope work and break down tasks
            - heading "Basic Qualifications" [level=4] [ref=e44]:
              - strong [ref=e45]: Basic Qualifications
            - list [ref=e46]:
              - listitem [ref=e47]: "Strong CS fundamentals: data structures, algorithms, complexity, and basic systems design"
              - listitem [ref=e48]: Basic understanding of modern distributed asynchronous systems
              - listitem [ref=e49]: Proficiency in at least one modern programming language (e.g., Python, Java, TypeScript/JavaScript, Go, or Ruby)
              - listitem [ref=e50]: Solid understanding of web or service development basics (APIs, HTTP, JSON, REST)
              - listitem [ref=e51]: Familiarity with version control and collaborative workflows (Git, pull requests, code reviews)
              - listitem [ref=e52]: "Test-first mindset: can write unit/integration tests and reason about correctness"
            - heading "Preferred Qualifications" [level=4] [ref=e53]:
              - strong [ref=e54]: Preferred Qualifications
            - list [ref=e55]:
              - listitem [ref=e56]: Clear, concise communication and a collaborative, growth-oriented attitude
              - listitem [ref=e57]: Bachelor’s degree in Computer Science or related field, or equivalent practical experience
            - paragraph [ref=e58]
            - paragraph [ref=e59]: PagerDuty is a flexible, hybrid workplace. We embrace and encourage in-person working as an integral part of our culture. Both our employees and external research tells us that co-located collaboration strengthens connections, drives innovation, and accelerates learning.
            - paragraph [ref=e60]:
              - strong [ref=e61]: This role is expected to
              - text: come into our
              - strong [ref=e62]: Toronto office 2 days per week
              - text: ", so you can thrive in your new role and fully embrace being a Dutonian!"
            - paragraph [ref=e63]:
              - strong [ref=e64]: The base salary range for this position is 97,000 - 147,000 CAD.
              - text: This role may also be eligible for bonus, commission, equity, and/or benefits.
            - paragraph [ref=e65]: Our base salary ranges are determined by role, level, and location. The range, which is subject to change based on primary work location, reflects the minimum and maximum base salary we expect to pay newly hired employees for the position. Within the range, we determine pay for an individual based on a number of factors including market location, job-related knowledge, skills/competencies and experience.
            - paragraph [ref=e66]: Your recruiter can share more about the specific offerings for this role, as well as the salary range for your primary work location during the hiring process.
