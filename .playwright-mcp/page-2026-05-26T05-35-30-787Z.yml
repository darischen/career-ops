              - strong [ref=e84]: How we work
            - paragraph [ref=e85]:
              - link "Our values" [ref=e86] [cursor=pointer]:
                - /url: https://careers.pagerduty.com/#values
              - text: guide how we support customers, collaborate with colleagues, develop products, and foster a culture of belonging. They define not just our actions, but what it means to be Dutonian.
            - paragraph [ref=e87]: "People Leaders at PagerDuty are responsible for creating high performance environments that drive accountability. PagerDuty has four key dimensions that define our Leadership Impact: Lead Self, Lead the Team, Lead the Business, and Lead the Future. Each dimension has three associated competencies to give leaders a shared language for guiding their development, career, promotion, and succession planning discussions. Our Manager Expectations serve as a practical guide for managers to understand their responsibilities, prioritize their efforts, and drive engagement and performance."
            - paragraph [ref=e88]:
              - strong [ref=e89]: What we offer
            - paragraph [ref=e90]:
              - text: As a global organization, our total rewards approach is competitive with industry standards and aligned with local laws and regulations. Learn more, including country-specific offerings, on our
              - link "benefits site" [ref=e91] [cursor=pointer]:
                - /url: https://careers.pagerduty.com/global-benefits
              - text: .
            - paragraph [ref=e92]:
              - strong [ref=e93]: "Your package may include:"
            - list [ref=e94]:
              - listitem [ref=e95]: Competitive salary
              - listitem [ref=e96]: Comprehensive benefits package
              - listitem [ref=e97]: Flexible work arrangements
              - listitem [ref=e98]: Company equity*
              - listitem [ref=e99]: ESPP (Employee Stock Purchase Program)*
              - listitem [ref=e100]: Retirement or pension plan*
              - listitem [ref=e101]: Generous paid vacation time
              - listitem [ref=e102]: Paid holidays and sick leave
              - listitem [ref=e103]: Dutonian Wellness Days & HibernationDuty - companywide paid days off in addition to PTO
              - listitem [ref=e104]: "Paid parental leave: 22 weeks for pregnant parent, 12 weeks for non-pregnant parent (some countries have longer leave standards and we comply with local laws)*"
              - listitem [ref=e105]: "Paid volunteer time off: 20 hours per year"
              - listitem [ref=e106]: Company-wide hack weeks
              - listitem [ref=e107]: Mental wellness programs
            - paragraph [ref=e108]: "*Eligibility may vary by role, region, and tenure"
            - paragraph [ref=e109]:
              - strong [ref=e110]: About PagerDuty
            - paragraph [ref=e111]: PagerDuty, Inc. (NYSE:PD) is a global leader in digital operations management. The PagerDuty Operations Cloud is an AI-powered platform that empowers business resilience and drives operational efficiency for enterprises. With a generative AI assistant at its core, PagerDuty empowers teams to detect and resolve issues in real time, orchestrate complex workflows, and drive continuous improvement across their digital operations. Trusted by nearly half of both the Fortune 500 and the Forbes AI 50, as well as approximately two-thirds of the Fortune 100, PagerDuty is essential for delivering always-on digital experiences to modern businesses
            - paragraph [ref=e112]: PagerDuty is Great Place to Work-certified™, a Fortune Best Workplace for Millennials, a Fortune Best Medium Workplace, a Fortune Best Workplace in Technology, and a top rated product on TrustRadius and G2.
            - paragraph [ref=e113]:
              - text: Go behind-the-scenes on our
              - link "careers site" [ref=e114] [cursor=pointer]:
                - /url: https://careers.pagerduty.com/home
              - text: and @pagerduty on Instagram.
            - paragraph [ref=e115]:
              - strong [ref=e116]: Additional Information
            - paragraph [ref=e117]:
              - text: PagerDuty is an equal opportunity employer. PagerDuty does not discriminate on the basis of race, religion, color, national origin, gender, sexual orientation, age, marital status, parental status, veteran status, or disability status. Your privacy is important to us. By submitting an application, you confirm that you have read and understand PagerDuty's
              - link "Privacy Policy" [ref=e118] [cursor=pointer]:
                - /url: https://www.pagerduty.com/privacy-policy/
              - text: .
            - paragraph [ref=e119]: PagerDuty is committed to providing reasonable accommodations for qualified individuals with disabilities in our job application process. Should you require accommodation, please email accommodation@pagerduty.com and we will work with you to meet your accessibility needs.
            - paragraph [ref=e120]: PagerDuty uses the E-Verify employment verification program.
