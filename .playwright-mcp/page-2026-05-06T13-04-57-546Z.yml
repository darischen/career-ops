  - main [ref=e21]:
    - generic [ref=e22]:
      - article [ref=e23]:
        - heading "Overview" [level=2] [ref=e24]
        - paragraph
        - paragraph [ref=e25]: At Esri, our users come first. With thousands of customers and millions of users worldwide, we want your help building the next generation of ArcGIS Enterprise, a suite of products delivering state-of-the-art mapping and analytics capability. Our team builds cutting-edge, highly scalable, and reliable distributed software for on-premises and the cloud to make maps, geographic information, and analyses available on any device, anywhere, at any time.
        - paragraph [ref=e26]: As a Software Engineer with focus on Agentic AI development, you will build and operate intelligent, goal driven features within production software systems. In this role, you will apply strong software engineering fundamentals to ship reliable software embedding agentic AI capabilities into APIs, services, and applications that scale, integrate cleanly with existing systems, and meet product and operational requirements.
      - article [ref=e27]:
        - heading "Responsibilities" [level=2] [ref=e28]
        - paragraph
        - list [ref=e29]:
          - listitem [ref=e30]: Design, implement and own production features and services that support agentic AI behavior
          - listitem [ref=e31]: Develop backend systems, APIs, and data integrations that support agentic workflows as scale
          - listitem [ref=e32]: Add logging, metrics, and tracing to ensure systems are observable and debuggable in production
          - listitem [ref=e33]: Collaborate with product, design, and platform teams to translate workflows and requirements into technical solutions
          - listitem [ref=e34]: Participate actively in code reviews, design discussions, and security reviews
      - article [ref=e35]:
        - heading "Requirements" [level=2] [ref=e36]
        - paragraph
        - list [ref=e37]:
          - listitem [ref=e38]: 1+ years professional software engineering experience, with strong proficiency in Python or a similar backend language
          - listitem [ref=e39]: Experience designing and operating production services or distributed systems
          - listitem [ref=e40]: Hands on experience using LLMs or generative AI APIs in real applications
          - listitem [ref=e41]: Solid understanding of agentic AI patterns, including tool use, task decomposition, planning, and feedback loops
          - listitem [ref=e42]: Experience integrating with REST APIs, databases, queues, and third party services
          - listitem [ref=e43]: Experience with observability and evaluation of AI systems (logging, tracing, offline or online evaluation)
          - listitem [ref=e44]: Ability to reason about scalability, latency, reliability, and cost trade offs
          - listitem [ref=e45]: Clear written and verbal communication skills, with attention to detail
          - listitem [ref=e46]: Bachelor's degree in computer science, engineering, or related field
      - article [ref=e47]:
        - heading "Recommended Qualifications" [level=2] [ref=e48]
        - paragraph
        - list [ref=e49]:
          - listitem [ref=e50]: Experience using agentic AI or orchestration frameworks (such as LangChain/LangGraph, CrewAI, and more)
          - listitem [ref=e51]: Familiarity with cloud infrastructure, containerization, and CI/CD pipelines
          - listitem [ref=e52]: Demonstrated ability to learn and apply emerging AI tools and patterns quickly
          - listitem [ref=e53]: Exposure to ArcGIS Enterprise, ArcGIS Online or other geospatial technologies
        - paragraph [ref=e54]: "#LI-TA1"
        - paragraph [ref=e55]: "#LI-Onsite"
        - generic [ref=e57]:
          - generic [ref=e58]:
            - paragraph [ref=e59]:
              - strong [ref=e60]: Total Rewards
            - paragraph [ref=e61]: "Esri’s competitive total rewards strategy includes industry-leading health and welfare benefits: medical, dental, vision, basic and supplemental life insurance for employees (and their families), 401(k) and profit-sharing programs, minimum accrual of 80 hours of vacation leave, twelve paid holidays throughout the calendar year, and opportunities for personal and professional growth. Base salary is one component of our total rewards strategy. Compensation decisions and the base range for this role take into account many factors including but not limited to skill sets; experience and training; licensure and certifications; and other business and organizational needs."
          - generic [ref=e62]: A reasonable estimate of the base salary range is
          - generic [ref=e63]: $79,040-$133,016 USD
      - article [ref=e64]:
        - heading "About Esri" [level=2] [ref=e65]
        - paragraph
        - paragraph [ref=e66]:
          - text: At Esri, diversity is more than just a word on a map. When employees of different experiences, perspectives, backgrounds, and cultures come together, we are more innovative and ultimately a better place to work. We believe in having a diverse workforce that is unified under our mission of creating positive global change. We understand that diversity, equity, and inclusion is not a destination but an ongoing process. We are committed to the continuation of learning, growing, and changing our workplace so every employee can contribute to their life’s best work. Our commitment to these principles extends to the global communities we serve by creating positive change with GIS technology. For more information on Esri’s Racial Equity and Social Justice initiatives, please visit our website
          - link "here" [ref=e67] [cursor=pointer]:
            - /url: https://www.esri.com/en-us/racial-equity/overview#engage-communities
          - text: .
        - paragraph [ref=e68]:
          - strong [ref=e69]: If you don’t meet all of the preferred qualifications for this position, we encourage you to still apply!
        - paragraph [ref=e70]:
          - text: Esri is an equal opportunity employer (EOE) and all qualified applicants will receive consideration for employment without regard to race, color, religion, sex, sexual orientation, gender identity, national origin, disability status, protected veteran status, or any other characteristic protected by law. If you need reasonable accommodation for any part of the employment process, please email
          - link "askcareers@esri.com" [ref=e71] [cursor=pointer]:
            - /url: mailto:askcareers@esri.com
          - text: and let us know the nature of your request and your contact information. Please note that only those inquiries concerning a request for reasonable accommodation will be responded to from this e-mail address.
        - paragraph [ref=e72]:
          - link "Esri Privacy" [ref=e73] [cursor=pointer]:
            - /url: https://www.esri.com/en-us/privacy/overview
          - text: Esri takes our responsibility to protect your privacy seriously. We are committed to respecting your privacy by providing transparency in how we acquire and use your information, giving you control of your information and preferences, and holding ourselves to the highest national and international standards, including CCPA and GDPR compliance.
