                  - generic [ref=f1e21]:
                    - paragraph [ref=f1e22]: Old Mission is a global proprietary trading firm that leverages state-of-the-art technology and research to identify and execute profitable trading strategies across multiple asset classes around the world. Our offices in Chicago, New York, and London are all composed of naturally-curious individuals who thrive in a team environment and constantly strive for improvement.
                    - paragraph [ref=f1e23]: Old Mission does not seek capital from outside investors, allowing us the flexibility to aggressively invest in our team members and keep them engaged in the firm’s growth.
                  - generic [ref=f1e24]:
                    - generic [ref=f1e25]:
                      - strong [ref=f1e27]: About the Position
                      - generic [ref=f1e28]: As a Junior Full-Stack Engineer at Old Mission, you will work alongside experienced engineers to help build performant and scalable frontend systems that power a best-in-class trading experience for our end users. You'll collaborate with traders, quantitative researchers, and senior developers to contribute to new systems and improve existing ones, while learning our standards for safety, reliability, and user experience. This role is for 2026 college graduates to begin in August.
                      - strong [ref=f1e31]: Responsibilities
                      - list [ref=f1e32]:
                        - listitem [ref=f1e33]: Contribute to the development of intuitive trading interfaces using modern web tools like TypeScript and React
                        - listitem [ref=f1e34]: Write clean, well-tested code under the guidance of senior engineers
                        - listitem [ref=f1e35]: Participate in code reviews to learn and uphold coding standards and design philosophy
                        - listitem [ref=f1e36]: Assist in building internal tools to increase efficiency of data mining, risk management, and more
                        - listitem [ref=f1e37]: Collaborate closely with teammates to understand user needs and translate them into effective UI solutions
                      - paragraph [ref=f1e38]:
                        - strong [ref=f1e39]: Required Skills
                      - list [ref=f1e40]:
                        - listitem [ref=f1e41]: An undergraduate or an advanced degree in a quantitative field such as Computer Science, Engineering, or one of the hard sciences
                        - listitem [ref=f1e42]: Passion for UX and front-end development
                        - listitem [ref=f1e43]: Internship experience in a front-end focused role coding in TypeScript, JavaScript, or React
                        - listitem [ref=f1e44]: Minimum 3.0 GPA
                        - listitem [ref=f1e45]: Understanding of systems programming, data structures, and algorithms
                        - listitem [ref=f1e46]: Familiarity working in a Linux environment
                        - listitem [ref=f1e47]: Strong analytical and problem solving skills
                        - listitem [ref=f1e48]: Great communication skills, both written and verbal
                        - listitem [ref=f1e49]: A strong work ethic and ability to adapt quickly in a fast-paced environment
                      - strong [ref=f1e51]: Benefits and Perks
                      - list [ref=f1e52]:
                        - listitem [ref=f1e53]: Competitive salary with discretionary annual bonus
                        - listitem [ref=f1e54]: Fully paid Medical, Dental, Vision, Disability, and Life Insurance
                        - listitem [ref=f1e55]: Fully stocked kitchen; free breakfast and lunch every day on-site
                        - listitem [ref=f1e56]: Tuition Reimbursement Program
                        - listitem [ref=f1e57]: 401(k) with employer match
                        - listitem [ref=f1e58]: Flexible Spending Plan
                        - listitem [ref=f1e59]: Commuter Benefit Program
                    - paragraph [ref=f1e60]: In accordance with Chicago’s Pay Transparency Law, the anticipated base salary range for this role is $125,000 to $145,000. Base salary does not include other forms of compensation or benefits offered to employees.
                  - paragraph [ref=f1e62]:
                    - emphasis [ref=f1e63]: Old Mission is not accepting unsolicited resumes from any staffing/search firms. All resumes submitted by staffing/search firms to any employee at Old Mission via-email, the Internet or directly without a valid signed search agreement will be deemed the sole property of Old Mission, and no fee will be paid in the event the candidate is hired by Old Mission.
