                      - generic [ref=f1e431]:
                        - generic [ref=f1e432]:
                          - generic [ref=f1e433]: Form CC-305
                          - generic [ref=f1e434]: Page 1 of 1
                        - generic [ref=f1e435]:
                          - generic [ref=f1e436]: OMB Control Number 1250-0005
                          - generic [ref=f1e437]: Expires 04/30/2026
                      - strong [ref=f1e438]: Why are you being asked to complete this form?
                      - paragraph [ref=f1e439]: We are a federal contractor or subcontractor. The law requires us to provide equal employment opportunity to qualified people with disabilities. We have a goal of having at least 7% of our workers as people with disabilities. The law says we must measure our progress towards this goal. To do this, we must ask applicants and employees if they have a disability or have ever had one. People can become disabled, so we need to ask this question at least every five years.
                      - paragraph [ref=f1e440]:
                        - text: Completing this form is voluntary, and we hope that you will choose to do so. Your answer is confidential. No one who makes hiring decisions will see it. Your decision to complete the form and your answer will not harm you in any way. If you want to learn more about the law or this form, visit the U.S. Department of Labor’s Office of Federal Contract Compliance Programs (OFCCP) website at
                        - link "www.dol.gov/ofccp" [ref=f1e441] [cursor=pointer]:
                          - /url: https://www.dol.gov/ofccp
                        - text: .
                      - strong [ref=f1e442]: How do you know if you have a disability?
                      - paragraph [ref=f1e443]:
                        - text: A disability is a condition that substantially limits one or more of your “major life activities.” If you have or have ever had such a condition, you are a person with a disability.
                        - strong [ref=f1e444]: "Disabilities include, but are not limited to:"
                      - list [ref=f1e445]:
                        - listitem [ref=f1e446]: Alcohol or other substance use disorder (not currently using drugs illegally)
                        - listitem [ref=f1e447]: Autoimmune disorder, for example, lupus, fibromyalgia, rheumatoid arthritis, HIV/AIDS
                        - listitem [ref=f1e448]: Blind or low vision
                        - listitem [ref=f1e449]: Cancer (past or present)
                        - listitem [ref=f1e450]: Cardiovascular or heart disease
                        - listitem [ref=f1e451]: Celiac disease
                        - listitem [ref=f1e452]: Cerebral palsy
                        - listitem [ref=f1e453]: Deaf or serious difficulty hearing
                        - listitem [ref=f1e454]: Diabetes
                        - listitem [ref=f1e455]: Disfigurement, for example, disfigurement caused by burns, wounds, accidents, or congenital disorders
                        - listitem [ref=f1e456]: Epilepsy or other seizure disorder
                        - listitem [ref=f1e457]: Gastrointestinal disorders, for example, Crohn's Disease, irritable bowel syndrome
                        - listitem [ref=f1e458]: Intellectual or developmental disability
                        - listitem [ref=f1e459]: Mental health conditions, for example, depression, bipolar disorder, anxiety disorder, schizophrenia, PTSD
                        - listitem [ref=f1e460]: Missing limbs or partially missing limbs
                        - listitem [ref=f1e461]: Mobility impairment, benefiting from the use of a wheelchair, scooter, walker, leg brace(s) and/or other supports
                        - listitem [ref=f1e462]: Nervous system condition, for example, migraine headaches, Parkinson’s disease, multiple sclerosis (MS)
                        - listitem [ref=f1e463]: Neurodivergence, for example, attention-deficit/hyperactivity disorder (ADHD), autism spectrum disorder, dyslexia, dyspraxia, other learning disabilities
                        - listitem [ref=f1e464]: Partial or complete paralysis (any cause)
                        - listitem [ref=f1e465]: Pulmonary or respiratory conditions, for example, tuberculosis, asthma, emphysema
                        - listitem [ref=f1e466]: Short stature (dwarfism)
                        - listitem [ref=f1e467]: Traumatic brain injury
