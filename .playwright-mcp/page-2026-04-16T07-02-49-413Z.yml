          - text: We anticipate the application window for this opening will close on - 17 Apr 2026
          - paragraph [ref=e137]
          - paragraph [ref=e138]: At Medtronic you can begin a life-long career of exploration and innovation, while helping champion healthcare access and equity for all. You’ll lead with purpose, breaking down barriers to innovation in a more connected, compassionate world.
          - paragraph [ref=e139]
          - paragraph [ref=e140]
          - heading "A Day in the Life" [level=1] [ref=e141]
          - text: At Medtronic, we bring bold ideas forward with speed and decisiveness to put patients first in everything we do. In-person exchanges are invaluable to our work. We’re working a minimum of 4 days a week onsite as part of our commitment to fostering a culture of professional growth and cross-functional collaboration as we work together to engineer the extraordinary.
          - text: This position is onsite in Lafayette, Colorado and will require travel up to 50% of the time.
          - paragraph [ref=e142]
          - paragraph [ref=e143]
          - paragraph [ref=e144]: The Acute Care & Monitoring group develops products that are designed to collect patient information from around the hospital and ensure that caregivers can make the right decisions at the right time. We strive to improve patient outcomes by ensuring that when a problem emerges at the bedside, caregivers are aware of it and can respond quickly. We analyze and learn from patient data to find better ways to provide quality care for patients. Our products are deployed in care facilities across the globe and help to save and improve lives every day. A career at Medtronic is like no other. We’re purposeful. We’re committed. And we’re driven by our Mission to alleviate pain, restore health and extend life for millions of people worldwide.
          - paragraph [ref=e145]
          - paragraph [ref=e146]: This position is primarily responsible for investigating field issues related to our products, determining root cause and potential fixes, and providing workaround procedures to customers. The position also requires regular travel to customer sites to assist with new product installs, upgrades, or troubleshooting of existing installs, allowing you to learn about our customer environments, products, and user needs. You will act as the conduit between R&D and our customers, ensuring that R&D gets feedback on product performance and that customers get the information and support they need. You will also use your software development skills to fix field issues and maintain the cloud-based demo site used for sales and training.
          - paragraph [ref=e147]
          - paragraph [ref=e148]
          - paragraph [ref=e149]: "Position Responsibilities:"
          - paragraph [ref=e150]: "- Become subject matter expert on full suite of AC&M product offerings"
          - paragraph [ref=e151]: "- Engage remotely and on-site with customers to investigate and document product issues"
          - paragraph [ref=e152]: "- Collaborate with support team and services team and provide them with technical documentation as needed"
          - paragraph [ref=e153]: "- Provide support and code changes for the cloud-based demo website used for sales and training"
          - paragraph [ref=e154]: "- Thoroughly document and share field observations with R&D team"
          - paragraph [ref=e155]: "- Engage in Beta, Pilot and Limited Market Release efforts when bringing new products to the market."
          - paragraph [ref=e156]: "- Collaborate with engineers cross-functionally to develop of new product features and capabilities"
          - paragraph [ref=e157]: "- Must be available for after-hours or weekend support if emergency customer situations occur"
          - paragraph [ref=e158]: "- Provide guidance to customers on how best to configure their environment for our products"
          - paragraph [ref=e159]: "- Support efforts that ensure our products are available to be demonstrated by our Sales Team"
          - paragraph [ref=e160]: "- Examine product code to root cause issues and develop fixes"
          - paragraph [ref=e161]: "- Participate in cross-functional reviews of field issues"
          - paragraph [ref=e162]: "- Provide feedback to R&D on how to make products easier to deploy and support in the field"
          - paragraph [ref=e163]: "- Flexibility to travel to customer locations with minimal notice when needed"
          - paragraph [ref=e164]
          - paragraph [ref=e165]: "Minimum Qualifications:"
          - paragraph [ref=e166]
          - paragraph [ref=e167]: "- Bachelor’s degree in computer engineering, software engineering or computer science"
          - paragraph [ref=e168]: "- Experience with C# programming language or similar"
          - paragraph [ref=e169]
          - paragraph [ref=e170]
          - paragraph [ref=e171]: "Nice to Have:"
          - paragraph [ref=e172]
          - paragraph [ref=e173]: "- Experience with SQL Server or other relational databases"
          - paragraph [ref=e174]: "- Experience with non-relational databases, such as MongoDB"
          - paragraph [ref=e175]: "- Experience with RabbitMQ or similar"
          - paragraph [ref=e176]: "- Experience with cloud environments, such as AWS or Azure"
          - paragraph [ref=e177]: "- Experience with using Active Directory for authentication and authorization"
          - paragraph [ref=e178]: "- Experience with virtualization technologies including VMWare and Azure"
          - paragraph [ref=e179]: "- Experience with networking concepts and troubleshooting"
          - paragraph [ref=e180]: "- Effective communication both verbally and in written form"
          - paragraph [ref=e181]: For Baccalaureate degrees earned outside of the United States, a degree that satisfies the requirements of 8 C.F.R. § 214.2(h)(4)(iii)(A) is required.
          - paragraph [ref=e182]
          - paragraph [ref=e183]
          - paragraph [ref=e184]: Physical Job Requirements
          - paragraph [ref=e185]
          - paragraph [ref=e186]: The above statements are intended to describe the general nature and level of work being performed by employees assigned to this position, but they are not an exhaustive list of all the required responsibilities and skills of this position.
          - paragraph [ref=e187]
          - paragraph [ref=e188]: "The physical demands described within the Responsibilities section of this job description are representative of those that must be met by an employee to successfully perform the essential functions of this job. Reasonable accommodations may be made to enable individuals with disabilities to perform the essential functions. For Office Roles: While performing the duties of this job, the employee is regularly required to be independently mobile. The employee is also required to interact with a computer, and communicate with peers and co-workers. Contact your manager or local HR to understand the Work Conditions and Physical requirements that may be specific to each role."
          - paragraph [ref=e189]
          - paragraph [ref=e190]: U.S. Work Authorization & Sponsorship
          - paragraph [ref=e191]: At Medtronic, we are committed to fostering an environment where employees can thrive and make a meaningful impact. In alignment with our enterprise-wide workforce planning approach, U.S. work authorization sponsorship (H-1B, TN, J, etc.) is offered exclusively for Principal-level roles and above, where specialized expertise aligns with long-term business needs. Roles below the Principal level require candidates to possess unrestricted U.S. work authorization at the time of hire and for the duration of employment.
          - paragraph [ref=e192]: Join us in our mission to alleviate pain, restore health, and extend life—where your unique background and perspective are valued.
