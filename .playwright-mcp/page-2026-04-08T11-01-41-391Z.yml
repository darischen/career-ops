            - heading "About Ramp" [level=1] [ref=e43]:
              - strong [ref=e44]: About Ramp
            - paragraph [ref=e45]: "Ramp is building the smart infrastructure for finance teams, embedded in the transaction flow of every dollar a business spends. We automate how over $100B in annualized spend flows in and out of 50,000+ companies: authorizing payments, flagging risk, categorizing spend, and closing books."
            - paragraph [ref=e46]: The problems are high-stakes, data-dense, and unforgiving.
            - paragraph [ref=e47]: We hire people with high agency and high urgency. We look for slope over intercept. We care less about where you trained and more about what you’ve built. At Ramp, everyone is a builder who owns problems end to end and makes consequential decisions that shape the outcome.
            - paragraph [ref=e48]: The median Ramp customer saves 5% and grows revenue 16% in their first year – far in excess of businesses operating without Ramp. We believe every ambitious company deserves the same.
            - paragraph [ref=e49]: If you want to build systems that directly shape how companies move and manage billions, Ramp is the place to do it.
            - paragraph [ref=e50]
