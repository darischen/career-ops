        - heading "Why Asana?" [level=5] [ref=e149]
        - generic [ref=e150]:
          - paragraph [ref=e151]: Asana is a leading work management platform for human + AI collaboration. Over 170,000 customers like Accenture, Amazon, Anthropic, and Suzuki rely on Asana to align teams and accelerate organizational impact. Whether it’s managing strategic initiatives, cross-functional programs, or company-wide goals, Asana helps organizations bring clarity to complexity—turning plans into action with AI working alongside teams every step of the way. We believe investing in our culture and our employees is what fuels our individual and collective growth, allowing us to achieve our mission. Asana is an equal opportunity employer, and building a diverse, equitable, and inclusive company is core to our mission. Join us to make a big impact—on our mission, our customers’ missions, and your career.
          - paragraph [ref=e152]:
            - text: Can’t find the right role at Asana today?
            - link "Join Asana’s Talent Network" [ref=e153] [cursor=pointer]:
