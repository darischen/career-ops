      - main [ref=e90]:
        - heading "Software Engineer, Product (Early Career)" [level=1] [ref=e91]
        - heading "Vancouver, BC" [level=4] [ref=e92]
        - link "Apply" [ref=e94] [cursor=pointer]:
          - /url: "#grnhse_app"
        - generic [ref=e95]:
          - paragraph [ref=e96]:
            - strong [ref=e97]: Applications for this role will close on Wednesday, June 17th at 12:00 AM Pacific Daylight Time.
          - paragraph [ref=e98]: We are looking for a Software Engineer to join our Product team in Vancouver, where we build features end-to-end, from designing our data models to implementing the subtle interaction behaviors that differentiate good software from great software. In this role, you won’t just code—you will be an integral part of the entire product development process from conception to post-launch reflection, manifesting continuous improvements to help us achieve our mission of enabling all teams to work together effortlessly. Partnering closely with UI designers and supported by our infrastructure team, you will aim to delight users with both large new features and daily product enhancements through our continuous deployment architecture. If you care deeply about building products that improve how millions of teams work together, we would love to hear from you.
          - heading "What You’ll Achieve" [level=2] [ref=e99]:
            - strong [ref=e100]: What You’ll Achieve
          - list [ref=e101]:
            - listitem [ref=e102]: Build end-to-end features by delivering technical designs and clean code.
            - listitem [ref=e103]: Lead initiatives across the organization, maintaining a balance between technical excellence and alignment with key stakeholders.
            - listitem [ref=e104]: Leverage a strong sense of ownership and collaborative spirit to drive product outcomes efficiently.
            - listitem [ref=e105]: Champion robust engineering standards and operational health through code reviews and peer mentorship.
            - listitem [ref=e106]: Guide design discussions by articulating technical limitations and helping colleagues navigate trade-offs.
            - listitem [ref=e107]: Help shape the long-term roadmap and technical strategy for our evolving product suite.
          - heading "About You" [level=2] [ref=e108]:
            - strong [ref=e109]: About You
          - list [ref=e110]:
            - listitem [ref=e111]: Recently graduated (or are about to graduate in summer 2026) with a degree in Computer Science, Software Engineering, or a related technical field.
            - listitem [ref=e112]: Holds foundational experience, ideally 1+ year of working in software engineering environments, such as technical internships, co-ops, or early career roles
            - listitem [ref=e113]: Demonstrates a solid understanding of computer science fundamentals, data structures, and programming concepts
            - listitem [ref=e114]: Possesses a growth mindset, looking for an environment to empower teammates and move collaboratively toward shared goals.
            - listitem [ref=e115]: Exhibits empathetic collaboration with the ability to partner effectively across different roles and engineering functions.
            - listitem [ref=e116]: Shows a track record of being a fast learner who is excited to contribute to product development and grow technical skills from day one.
            - listitem [ref=e117]: Demonstrates curiosity about AI tools and emerging technologies, with a willingness to learn and leverage them to enhance productivity, collaboration, or decision-making.
          - paragraph [ref=e118]: At Asana, we're committed to building teams that include a variety of backgrounds, perspectives, and skills, as this is critical to helping us achieve our mission. If you're interested in this role and don't meet every listed requirement, we still encourage you to apply.
          - paragraph [ref=e119]:
            - strong [ref=e120]: What we’ll offer
          - paragraph [ref=e121]: Our comprehensive compensation package plays a big part in how we recognize you for the impact you have on our path to achieving our mission. We believe that compensation should be reflective of the value you create relative to the market value of your role. To ensure pay is fair and not impacted by biases, we're committed to looking at market value which is why we check ourselves and conduct a yearly pay equity audit.
          - paragraph [ref=e122]: For this role, the estimated base salary range is between $117,000 - $130,000 CAD. The actual base salary will vary based on various factors, including market and individual qualifications objectively assessed during the interview process. The listed range above is a guideline, and the base salary range for this role may be modified.
          - paragraph [ref=e123]: In addition to base salary, your compensation package may include additional components such as equity, sales incentive pay (for most sales roles), and benefits. If you're interviewing for this role, speak with your recruiter to learn more about the total compensation and benefits for this role.
          - paragraph [ref=e124]: "We strive to provide equitable and competitive benefits packages that support our employees worldwide and include:"
          - list [ref=e125]:
            - listitem [ref=e126]: Mental health, wellness & fitness benefits
            - listitem [ref=e127]: Career coaching & support (including mentorship tailored for early-career engineers)
            - listitem [ref=e128]: Inclusive family building benefits
            - listitem [ref=e129]: Long-term savings or retirement plans
            - listitem [ref=e130]: In-office culinary options to cater to your dietary preferences
          - paragraph [ref=e131]: These are just some of the benefits we offer, and benefits may vary based on role, country, and local regulations. If you're interviewing for this role, speak with your recruiter to learn more about the total compensation and benefits for this role.
          - paragraph [ref=e132]: "#LI-Hybrid"
          - paragraph [ref=e133]
          - generic [ref=e134]:
            - paragraph [ref=e135]:
              - strong [ref=e136]: About us
            - paragraph [ref=e137]: Asana is a leading platform for human + AI collaboration. Millions of teams around the world rely on Asana to achieve their most important goals, faster. Asana has been named to Fortune's Best Workplaces for 7+ years and recognized by Fast Company, Forbes, and Gartner for excellence in workplace culture and innovation. We offer an exceptional office-centric culture while adopting the best elements of hybrid models to ensure that every one of our global team members can work together effortlessly. With 13+ offices all over the world, we are always looking for individuals who care about building technology that drives positive change in the world and a culture where everyone feels that they belong.
            - paragraph [ref=e138]:
              - strong [ref=e139]:
                - link "Join Asana’s Talent Network" [ref=e140] [cursor=pointer]:
                  - /url: https://www.gem.com/form?formID=fbcdec8c-3442-43b9-9b45-d2b5f4ea25db
              - text: to stay up to date on job opportunities and life at Asana.
