          - generic [ref=e35]:
            - heading "Power to the buyers" [level=1] [ref=e36]:
              - strong [ref=e37]: Power to the buyers
            - paragraph [ref=e38]: BRM is growing our team of passionate teammates on a mission to arm people with the right tools to do their best work. BRM’s digital assistants automagically help companies find and manage tools. Whether it is collaborating on a renewal, locating misplaced contracts, intelligently negotiating, or automating compliance reviews––BRM’s assistants are bringing power back to the buyer!
            - heading "Entry Level Software Engineer" [level=1] [ref=e39]
            - paragraph [ref=e40]:
              - strong [ref=e41]: Why we need you
              - text: We're at a pivotal moment with a roadmap brimming with opportunity. We're looking for ambitious junior engineers and new graduates who are eager to learn, grow, and contribute to cutting-edge AI-driven solutions. You'll work alongside experienced engineers to revolutionize the inbox experience, refine legal and finance request workflows, and empower AI-driven assistants. This is your chance to learn by doing – shipping real features that deliver tangible business value while building your skills in modern technologies and best practices. We value curiosity, enthusiasm, and a strong desire to make an impact over years of experience.
            - paragraph [ref=e42]:
              - strong [ref=e43]: What you'll do
            - list [ref=e44]:
              - listitem [ref=e45]:
                - paragraph [ref=e46]: Collaborate with senior engineers to design, develop, and maintain software solutions using TypeScript, NodeJS, PostgreSQL, Redis, and modern AI technologies
              - listitem [ref=e47]:
                - paragraph [ref=e48]: Learn and apply best practices in code quality, testing, and documentation while contributing to production features
              - listitem [ref=e49]:
                - paragraph [ref=e50]: Participate in code reviews, technical discussions, and planning sessions to accelerate your learning and contribute fresh perspectives
              - listitem [ref=e51]:
                - paragraph [ref=e52]: Take ownership of well-scoped features and tasks, with mentorship and support to help you succeed
              - listitem [ref=e53]:
                - paragraph [ref=e54]: Gain hands-on experience with cloud services (GCP), containerization (Docker), and modern development workflows
              - listitem [ref=e55]:
                - paragraph [ref=e56]: Work closely with cross-functional teams to understand how engineering decisions impact product and business outcomes
            - paragraph [ref=e57]:
              - strong [ref=e58]: Who you are
            - list [ref=e59]:
              - listitem [ref=e60]:
                - paragraph [ref=e61]:
                  - strong [ref=e62]: "Education & Experience:"
                  - text: Recent graduate (within 3 years) with a degree in Computer Science, Engineering, or related field AND at least 1 internship, significant class project, or demonstrable coding experience through personal projects or open source contributions
              - listitem [ref=e63]:
                - paragraph [ref=e64]:
                  - strong [ref=e65]: "Hard worker:"
                  - text: Excited about the opportunity to work hard alongside experienced developers and accelerate your career growth. You understand that rapid learning requires dedication and are eager to put in the effort to level up your skills
              - listitem [ref=e66]:
                - paragraph [ref=e67]:
                  - strong [ref=e68]: "Foundation:"
                  - text: Strong programming fundamentals and familiarity with at least one modern programming language (JavaScript/TypeScript experience is a plus)
              - listitem [ref=e69]:
                - paragraph [ref=e70]:
                  - strong [ref=e71]: "Eager learner:"
                  - text: Genuine enthusiasm for learning new technologies and solving complex problems. You ask thoughtful questions and seek to understand the "why" behind decisions
              - listitem [ref=e72]:
                - paragraph [ref=e73]:
                  - strong [ref=e74]: "Hands-on mindset:"
                  - text: You're excited to write code and see your work in production. You value practical experience over theoretical knowledge
              - listitem [ref=e75]:
                - paragraph [ref=e76]:
                  - strong [ref=e77]: "Team player:"
                  - text: Strong communication skills and ability to work collaboratively. You're comfortable asking for help when needed and offering support to teammates
              - listitem [ref=e78]:
                - paragraph [ref=e79]:
                  - strong [ref=e80]: "Growth-oriented:"
                  - text: Self-motivated with a desire to continuously improve your skills and take on increasing responsibility
              - listitem [ref=e81]:
                - paragraph [ref=e82]:
                  - strong [ref=e83]: "Problem solver:"
                  - text: Analytical thinking skills with attention to detail and a systematic approach to debugging
            - paragraph [ref=e84]:
              - strong [ref=e85]: Nice to have (at least two of these apply)
            - list [ref=e86]:
              - listitem [ref=e87]:
                - paragraph [ref=e88]: Experience with TypeScript, NodeJS, or similar backend technologies
              - listitem [ref=e89]:
