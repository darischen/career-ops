          - generic [ref=e65]:
            - heading "About the Team" [level=2] [ref=e66]:
              - strong [ref=e67]: About the Team
            - paragraph [ref=e68]: "The Codex App team builds and maintains the Codex desktop app and IDE extension — the primary ways developers interact with Codex. Our goal is to make AI feel like a real software engineering teammate inside real workflows: editing code, running tasks, reviewing changes, and coordinating long-running work."
            - paragraph [ref=e69]: We sit at the intersection of research, product, and design. We ship quickly, learn from real usage, and continuously refine both the experience and the harness that connects users to the model.
            - paragraph [ref=e70]
            - heading "About the Role" [level=2] [ref=e71]:
              - strong [ref=e72]: About the Role
            - paragraph [ref=e73]: "We’re hiring a Frontend Software Engineer to build a top-tier desktop experience and push forward the interface for working with agents. This is a craft-heavy role: you’ll partner closely with design to prototype, iterate, and polish new interaction models — then turn them into reliable, high-performance product."
            - paragraph [ref=e74]: "You’ll help define what great looks like for “human ↔ agent” collaboration: what belongs in the UI, how state is represented, how progress and uncertainty are communicated, and how users stay oriented across long-running and multi-step work."
            - paragraph [ref=e75]
            - heading "What You’ll Do" [level=2] [ref=e76]:
              - strong [ref=e77]: What You’ll Do
            - list [ref=e78]:
              - listitem [ref=e79]:
                - paragraph [ref=e80]: Build and ship polished, high-performance UI across the Codex desktop app and IDE extension.
              - listitem [ref=e81]:
                - paragraph [ref=e82]: Partner tightly with design to turn prototypes into production-quality experiences (layout, motion, typography, interaction details).
              - listitem [ref=e83]:
                - paragraph [ref=e84]: "Iterate on future interfaces for interacting with agents: delegation, task timelines, status/progress, handoffs, review, and control surfaces."
              - listitem [ref=e85]:
                - paragraph [ref=e86]: Own frontend architecture decisions (component systems, state management, navigation, rendering performance).
              - listitem [ref=e87]:
                - paragraph [ref=e88]: Improve quality and reliability through testing, instrumentation, and thoughtful UX for failure modes.
              - listitem [ref=e89]:
                - paragraph [ref=e90]: Collaborate with platform/model/backend partners to integrate new capabilities into cohesive product flows.
            - heading "You Might Thrive Here If You" [level=2] [ref=e91]:
              - strong [ref=e92]: You Might Thrive Here If You
            - list [ref=e93]:
              - listitem [ref=e94]:
                - paragraph [ref=e95]: Have strong experience with modern frontend stacks (React, TypeScript) and a high bar for UI craft.
              - listitem [ref=e96]:
                - paragraph [ref=e97]: "Love design engineering: sweating the details while keeping velocity."
              - listitem [ref=e98]:
                - paragraph [ref=e99]: Have built desktop-caliber product experiences (Electron or similar), and care about performance, responsiveness, and “it just feels right.”
              - listitem [ref=e100]:
                - paragraph [ref=e101]: Enjoy exploring ambiguous problems and iterating rapidly with design and product.
              - listitem [ref=e102]:
                - paragraph [ref=e103]: Think in end-to-end workflows, not isolated screens.
              - listitem [ref=e104]:
                - paragraph [ref=e105]: Have experience with developer tools or IDE extensions (nice-to-have).
            - paragraph [ref=e106]
            - paragraph [ref=e107]
            - paragraph [ref=e108]:
              - strong [ref=e109]: About OpenAI
            - paragraph [ref=e110]: OpenAI is an AI research and deployment company dedicated to ensuring that general-purpose artificial intelligence benefits all of humanity. We push the boundaries of the capabilities of AI systems and seek to safely deploy them to the world through our products. AI is an extremely powerful tool that must be created with safety and human needs at its core, and to achieve our mission, we must encompass and value the many different perspectives, voices, and experiences that form the full spectrum of humanity.
            - paragraph [ref=e111]: We are an equal opportunity employer, and we do not discriminate on the basis of race, religion, color, national origin, sex, sexual orientation, age, veteran status, disability, genetic information, or other applicable legally protected characteristic.
