          - tabpanel [ref=e124]:
            - paragraph [ref=e125]: Ashby is easily the best ATS I’ve used in my 10+ years of recruiting. Loving the power of the system and the customization. I feel like it’s sparked a renewed passion for me when it comes to the abilities of an ATS. Happy we made the switch.
            - generic [ref=e126]:
              - img "Chase Johnson" [ref=e130]
              - generic [ref=e131]:
                - paragraph [ref=e132]: Chase Johnson
                - paragraph [ref=e133]: Talent at Replit
          - tabpanel [ref=e134]:
            - paragraph [ref=e135]: The biggest reason I recommend Ashby is because of how much you can automate activities within different stages. When you first set up a new vacancy on Ashby, you can set up all the different things that you want to be automated between each step of the process. It saves you countless hours of admin time throughout the process.
            - generic [ref=e136]:
              - img [ref=e140]
              - generic [ref=e141]:
                - paragraph [ref=e142]: Huw Sensier
                - paragraph [ref=e143]: Talent Acquisition Manager at Deel
          - tabpanel [ref=e144]:
            - paragraph [ref=e145]: We just switched from Legacy ATS. Long story short - Ashby is amazing. They are taking an end-to-end approach to recruiting that is startup-friendly. They combine the functionality of sourcing, outreach, applicant tracking, analytics (much better than Legacy ATS), scheduling automation and more. Best of all they have a strong & responsive support team, they make on-boarding super easy. I wish Ashby had been around when we launched so we could have just started with them from the beginning.
            - generic [ref=e146]:
              - img [ref=e150]
              - generic [ref=e151]:
                - paragraph [ref=e152]: Chandan Lohdan
                - paragraph [ref=e153]: Hiring at Cointracker
          - tabpanel [ref=e154]:
            - paragraph [ref=e155]: I am really impressed so far! It was tricky to get other hiring managers using other ATS's and they seem to be enjoying Ashby for collaboration.
            - generic [ref=e156]:
              - img [ref=e160]
              - generic [ref=e161]:
