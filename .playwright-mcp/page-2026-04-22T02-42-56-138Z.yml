          - generic [ref=e103]:
            - text: What if the work you did every day could impact the lives of people you know? Or all of humanity?
            - paragraph [ref=e104]
            - text: At Illumina, we are expanding access to genomic technology to realize health equity for billions of people around the world. Our efforts enable life-changing discoveries that are transforming human health through the early detection and diagnosis of diseases and new treatment options for patients.
            - paragraph [ref=e105]
            - text: Working at Illumina means being part of something bigger than yourself. Every person, in every role, has the opportunity to make a difference. Surrounded by extraordinary people, inspiring leaders, and world changing projects, you will do more and become more than you ever thought possible.
            - paragraph [ref=e106]
            - paragraph [ref=e107]: "Job Title: Software Engineer 1"
            - paragraph [ref=e108]: "Location: Cambridge"
            - paragraph [ref=e109]: "Job Type: Full-time"
            - paragraph [ref=e110]: "Experience Level: Entry-Level / Junior (SE1)"
            - paragraph [ref=e111]
            - paragraph [ref=e112]
            - paragraph [ref=e113]: Are you interested in solving real-world customer problems with rigorous engineering? Do you have a strong technical background and excellent communication skills? Do you want to work on products that have a real positive impact on the world? If so, you might be the perfect fit for our Software Engineer 1 role within the End-To-End Solutions Software team in Cambridge (UK).
            - paragraph [ref=e114]
            - paragraph [ref=e115]
            - paragraph [ref=e116]: Why Us
            - paragraph [ref=e117]
            - paragraph [ref=e118]: We develop a range of software products, in product areas such as Oncology and NIPT (non-invasive prenatal testing), which truly make a difference to human health. The initial focus of the role will be in the support and development of our on-market portfolio, initially working on NIPT which is a method of screening for genetic disorders in unborn babies. You will have the opportunity to work with multi-disciplinary teams to develop end-to-end solutions that address critical customer problems in a variety of areas.
            - paragraph [ref=e119]
            - paragraph [ref=e120]
            - paragraph [ref=e121]: Why You
            - paragraph [ref=e122]
            - paragraph [ref=e123]: As Software Engineer 1 here at Illumina in Cambridge, you will join the End‑To‑End Solutions Software team, contributing to software products that have a meaningful impact on human health. Guided by our people‑first culture and shared commitment to integrity, collaboration, and innovation, you will work on on‑market solutions within areas such as Oncology and Non‑Invasive Prenatal Testing (NIPT). In this role, you will collaborate openly with cross‑functional and multi‑disciplinary teams, applying curiosity, analytical thinking, and engineering rigour to solve real‑world customer problems. You will be encouraged to learn continuously, share ideas, and take ownership of your work while contributing to inclusive team environments where diverse perspectives are valued. This is an exciting opportunity for a graduate or early‑career engineer (1-2 years experience) to build strong technical foundations while helping to push the boundaries of what’s possible in genomics and precision health.
            - paragraph [ref=e124]
            - paragraph [ref=e125]
            - paragraph [ref=e126]: "Responsibilities of the role:"
            - list [ref=e127]:
              - listitem [ref=e128]: Work collaboratively in cross-functional teams to design, code, and maintain high quality on-market solutions using established processes in a scrum team setting
              - listitem [ref=e129]: Implement bugfixes, improvements and new features in products, in areas such as generating reports from genetic analyses, RESTful APIs, web UI, database operations
              - listitem [ref=e130]: Write clean, maintainable code while adhering to best practices
              - listitem [ref=e131]: Participate in code reviews and continuous learning
              - listitem [ref=e132]: Occasionally provide technical assistance to escalated on-market issues
            - paragraph [ref=e133]
            - paragraph [ref=e134]
            - paragraph [ref=e135]: "Skills and qualifications:"
            - list [ref=e136]:
              - listitem [ref=e137]: University degree in a technical or analytical subject
              - listitem [ref=e138]: "0-2 years of software-lifecycle experience: software requirements, design, implementation, testing and maintenance"
              - listitem [ref=e139]: Knowledge and experience with Java, Python or similar high-level language
              - listitem [ref=e140]: Be curious, detail oriented, and analytical, with a proven ability to learn quickly
              - listitem [ref=e141]: Be customer-focused, team-oriented, and motivated, taking ownership of assigned tasks
              - listitem [ref=e142]: Have proven verbal and written communication skills
            - paragraph [ref=e143]
            - paragraph [ref=e144]
            - paragraph [ref=e145]: "Desired but not essential:"
            - list [ref=e146]:
              - listitem [ref=e147]: Collaborating in a team environment and delivering high-quality software products using established agile development methodologies (such as Scrum, Kanban, etc.) against formal schedules
              - listitem [ref=e148]: Understanding of object-oriented analysis and design
              - listitem [ref=e149]: Experience with source control management tools (such as Git) and CM practices
              - listitem [ref=e150]: Experience with data persistence technologies (such as relational databases)
              - listitem [ref=e151]: Experience with Java based frameworks such as Hibernate (JPA), Jersey (JAX-RS), Unit testing
              - listitem [ref=e152]: Experience in container-based app development such as Docker or Podman
              - listitem [ref=e153]: Understanding of Genomics, Bioinformatics, or related field of biology
            - paragraph [ref=e154]
            - paragraph [ref=e155]
            - paragraph [ref=e156]: "What can you expect:"
            - paragraph [ref=e157]
            - paragraph [ref=e158]: Our team members are bright, energetic, and dedicated - they are the driving force behind our innovation and impact. To attract the best and brightest, we offer a competitive employee benefits program. We view it as a smart investment in our people, one that recognizes the tremendous value they bring to our business every day.
            - paragraph [ref=e159]: This role is primarily based out of Illumina’s European headquarters, just outside of Cambridge, UK. Partial remote working may be possible, but some office-based work will be required.
            - paragraph [ref=e160]
            - paragraph [ref=e161]
            - text: "We are a company deeply rooted in belonging, promoting an inclusive environment where employees feel valued and empowered to contribute to our mission. Built on a strong foundation, Illumina has always prioritized openness, collaboration, and seeking alternative perspectives to propel innovation in genomics. We are proud to confirm a zero-net gap in pay, regardless of gender, ethnicity, or race. We also have several Employee Resource Groups (ERG) that deliver career development experiences, increase cultural awareness, and offer opportunities to engage in social responsibility. We are proud to be an equal opportunity employer committed to providing employment opportunity regardless of sex, race, creed, color, gender, religion, marital status, domestic partner status, age, national origin or ancestry, physical or mental disability, medical condition, sexual orientation, pregnancy, military or veteran status, citizenship status, and genetic information. Illumina conducts background checks on applicants for whom a conditional offer of employment has been made. Qualified applicants with arrest or conviction records will be considered for employment in accordance with applicable local, state, and federal laws. Background check results may potentially result in the withdrawal of a conditional offer of employment. The background check process and any decisions made as a result shall be made in accordance with all applicable local, state, and federal laws. Illumina prohibits the use of generative artificial intelligence (AI) in the application and interview process. If you require accommodation to complete the application or interview process, please contact accommodations@illumina.com. To learn more, visit: https://www.dol.gov/ofccp/regs/compliance/posters/pdf/eeopost.pdf. The position will be posted until a final candidate is selected or the requisition has a sufficient number of qualified applicants. This role is not eligible for visa sponsorship."
