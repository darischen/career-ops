        - generic [ref=e22]:
          - paragraph [ref=e24]: Airtable is the no-code app platform that empowers people closest to the work to accelerate their most critical business processes. More than 500,000 organizations, including 80% of the Fortune 100, rely on Airtable to transform how work gets done.
          - generic [ref=e25]:
            - paragraph [ref=e26]: As a Software Engineer at Airtable, you will have the opportunity to work with customers to deeply understand their needs and workflows. You will collaborate with cross-functional partners across product management and design to create innovative new features that enable our customers to do their best work. You will be responsible for owning and executing the end-to-end implementation of these new features that will contribute to making our toolkit even more powerful and successful.
            - paragraph [ref=e27]:
              - strong [ref=e28]:
                - emphasis [ref=e29]: "Please note: while we employ a hybrid working model at Airtable (flexible in working from the office or elsewhere), we are only hiring in the following locations at this time:"
            - list [ref=e30]:
              - listitem [ref=e31]:
                - strong [ref=e32]:
                  - emphasis [ref=e33]: Based in the San Francisco Bay Area and are open to coming into our office (Embarcadero) at least ~2-3 times/week for team collaboration
              - listitem [ref=e34]:
                - strong [ref=e35]:
                  - emphasis [ref=e36]: Based in New York City and are open to coming into our office (Soho) at least ~2-3 times/week for team collaboration
              - listitem [ref=e37]:
                - strong [ref=e38]:
                  - emphasis [ref=e39]: Based remotely in the greater Seattle area
            - heading "What you'll do" [level=1] [ref=e40]:
              - strong [ref=e41]: What you'll do
            - list [ref=e42]:
              - listitem [ref=e43]: Spec and build product features that are beautiful, consistent, and fast, that encourage exploration, and that earn the trust of our customers through predictable, reliable, and thoughtful interactions.
              - listitem [ref=e44]: Work at all levels of the stack, from AWS, Node.js, and SQL to React and HTML to build and maintain end-to-end products on Airtable.
              - listitem [ref=e45]: Partner with product managers and designers to understand the needs of potential users and build a product that unlocks their potential.
              - listitem [ref=e46]: Design and implement maintainable APIs, implement complex business logic by building backend systems, and build products that are intuitive and useful.
            - heading "Who you are" [level=1] [ref=e47]:
              - strong [ref=e48]: Who you are
            - list [ref=e49]:
              - listitem [ref=e50]: You have a Bachelor's degree, or foreign equivalent, in Computer Science, Engineering (any field), or closely related quantitative discipline, and two (2) years of experience in the job offered or in any occupation in a related field.
              - listitem [ref=e51]: "You have these skills: (1) Node.js; (2) SQL; (3) SQS; (4) Git; (5) JavaScript; (6) React and HTML; (7) Scala; (8) Kafka; (9) Java; (10) Python; (11) Rust; (12) AWS; (13) DynamoDB; and (14) AWS Lambda."
              - listitem [ref=e52]: Any suitable combination of education, training and experience is acceptable. Experience can be gained through coursework, scholastic achievement, or work experience.
              - listitem [ref=e53]: Part-time telecommuting is an option. Hybrid work from Airtable's offices in New York, NY.
            - paragraph [ref=e54]: Submit resume with references using the apply button on this posting
            - paragraph [ref=e55]:
              - text: Airtable is an equal opportunity employer. We embrace diversity and strive to create a workplace where everyone has an equal opportunity to thrive. We welcome people of different backgrounds, experiences, abilities, and perspectives. All qualified applicants will receive consideration for employment without regard to race, color, religion, sex, sexual orientation, gender identity, national origin, disability, protected veteran status or any characteristic protected by applicable federal and state laws, regulations and ordinances. Learn more about your
              - link "EEO rights as an applicant" [ref=e56] [cursor=pointer]:
