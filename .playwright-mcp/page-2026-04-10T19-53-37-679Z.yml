                - listitem [ref=e363]: Autoimmune disorder, for example, lupus, fibromyalgia, rheumatoid arthritis, HIV/AIDS
                - listitem [ref=e364]: Blind or low vision
                - listitem [ref=e365]: Cancer (past or present)
                - listitem [ref=e366]: Cardiovascular or heart disease
                - listitem [ref=e367]: Celiac disease
                - listitem [ref=e368]: Cerebral palsy
                - listitem [ref=e369]: Deaf or serious difficulty hearing
                - listitem [ref=e370]: Diabetes
                - listitem [ref=e371]: Disfigurement, for example, disfigurement caused by burns, wounds, accidents, or congenital disorders
                - listitem [ref=e372]: Epilepsy or other seizure disorder
                - listitem [ref=e373]: Gastrointestinal disorders, for example, Crohn's Disease, irritable bowel syndrome
                - listitem [ref=e374]: Intellectual or developmental disability
                - listitem [ref=e375]: Mental health conditions, for example, depression, bipolar disorder, anxiety disorder, schizophrenia, PTSD
                - listitem [ref=e376]: Missing limbs or partially missing limbs
                - listitem [ref=e377]: Mobility impairment, benefiting from the use of a wheelchair, scooter, walker, leg brace(s) and/or other supports
                - listitem [ref=e378]: Nervous system condition, for example, migraine headaches, Parkinson’s disease, multiple sclerosis (MS)
                - listitem [ref=e379]: Neurodivergence, for example, attention-deficit/hyperactivity disorder (ADHD), autism spectrum disorder, dyslexia, dyspraxia, other learning disabilities
                - listitem [ref=e380]: Partial or complete paralysis (any cause)
                - listitem [ref=e381]: Pulmonary or respiratory conditions, for example, tuberculosis, asthma, emphysema
                - listitem [ref=e382]: Short stature (dwarfism)
