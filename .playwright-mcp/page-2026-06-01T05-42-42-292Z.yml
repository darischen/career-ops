              - generic [ref=e417]:
                - generic [ref=e418]:
                  - generic [ref=e419]: Form CC-305
                  - generic [ref=e420]: Page 1 of 1
                - generic [ref=e421]:
                  - generic [ref=e422]: OMB Control Number 1250-0005
                  - generic [ref=e423]: Expires 04/30/2026
              - strong [ref=e424]: Why are you being asked to complete this form?
              - paragraph [ref=e425]: We are a federal contractor or subcontractor. The law requires us to provide equal employment opportunity to qualified people with disabilities. We have a goal of having at least 7% of our workers as people with disabilities. The law says we must measure our progress towards this goal. To do this, we must ask applicants and employees if they have a disability or have ever had one. People can become disabled, so we need to ask this question at least every five years.
              - paragraph [ref=e426]:
                - text: Completing this form is voluntary, and we hope that you will choose to do so. Your answer is confidential. No one who makes hiring decisions will see it. Your decision to complete the form and your answer will not harm you in any way. If you want to learn more about the law or this form, visit the U.S. Department of Labor’s Office of Federal Contract Compliance Programs (OFCCP) website at
                - link "www.dol.gov/ofccp" [ref=e427] [cursor=pointer]:
                  - /url: https://www.dol.gov/ofccp
                - text: .
              - strong [ref=e428]: How do you know if you have a disability?
              - paragraph [ref=e429]:
                - text: A disability is a condition that substantially limits one or more of your “major life activities.” If you have or have ever had such a condition, you are a person with a disability.
                - strong [ref=e430]: "Disabilities include, but are not limited to:"
              - list [ref=e431]:
                - listitem [ref=e432]: Alcohol or other substance use disorder (not currently using drugs illegally)
                - listitem [ref=e433]: Autoimmune disorder, for example, lupus, fibromyalgia, rheumatoid arthritis, HIV/AIDS
                - listitem [ref=e434]: Blind or low vision
                - listitem [ref=e435]: Cancer (past or present)
                - listitem [ref=e436]: Cardiovascular or heart disease
                - listitem [ref=e437]: Celiac disease
                - listitem [ref=e438]: Cerebral palsy
                - listitem [ref=e439]: Deaf or serious difficulty hearing
                - listitem [ref=e440]: Diabetes
                - listitem [ref=e441]: Disfigurement, for example, disfigurement caused by burns, wounds, accidents, or congenital disorders
                - listitem [ref=e442]: Epilepsy or other seizure disorder
                - listitem [ref=e443]: Gastrointestinal disorders, for example, Crohn's Disease, irritable bowel syndrome
                - listitem [ref=e444]: Intellectual or developmental disability
                - listitem [ref=e445]: Mental health conditions, for example, depression, bipolar disorder, anxiety disorder, schizophrenia, PTSD
                - listitem [ref=e446]: Missing limbs or partially missing limbs
                - listitem [ref=e447]: Mobility impairment, benefiting from the use of a wheelchair, scooter, walker, leg brace(s) and/or other supports
                - listitem [ref=e448]: Nervous system condition, for example, migraine headaches, Parkinson’s disease, multiple sclerosis (MS)
                - listitem [ref=e449]: Neurodivergence, for example, attention-deficit/hyperactivity disorder (ADHD), autism spectrum disorder, dyslexia, dyspraxia, other learning disabilities
                - listitem [ref=e450]: Partial or complete paralysis (any cause)
                - listitem [ref=e451]: Pulmonary or respiratory conditions, for example, tuberculosis, asthma, emphysema
                - listitem [ref=e452]: Short stature (dwarfism)
                - listitem [ref=e453]: Traumatic brain injury
