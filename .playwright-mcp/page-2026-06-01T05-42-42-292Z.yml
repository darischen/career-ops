          - generic [ref=e20]:
            - strong [ref=e23]: "About Glean:"
            - generic [ref=e25]: Glean is the Work AI platform that helps everyone work smarter with AI. What began as the industry’s most advanced enterprise search has evolved into a full-scale Work AI ecosystem, powering intelligent Search, an AI Assistant, and scalable AI agents on one secure, open platform. With over 100 enterprise SaaS connectors, flexible LLM choice, and robust APIs, Glean gives organizations the infrastructure to govern, scale, and customize AI across their entire business - without vendor lock-in or costly implementation cycles.
            - generic [ref=e27]: "At its core, Glean is redefining how enterprises find, use, and act on knowledge. Its Enterprise Graph and Personal Knowledge Graph map the relationships between people, content, and activity, delivering deeply personalized, context-aware responses for every employee. This foundation powers Glean’s agentic capabilities - AI agents that automate real work across teams by accessing the industry’s broadest range of data: enterprise and world, structured and unstructured, historical and real-time. The result: measurable business impact through faster onboarding, hours of productivity gained each week, and smarter, safer decisions at every level."
            - generic [ref=e29]: Recognized by Fast Company as one of the World’s Most Innovative Companies (Top 10, 2025), by CNBC’s Disruptor 50, Bloomberg’s AI Startups to Watch (2026), Forbes AI 50, and Gartner’s Tech Innovators in Agentic AI, Glean continues to accelerate its global impact. With customers across 50+ industries and 1,000+ employees in more than 25 countries, we’re helping the world’s largest organizations make every employee AI-fluent, and turning the superintelligent enterprise from concept into reality.
            - generic [ref=e31]: If you’re excited to shape how the world works, you’ll help build systems used daily across Microsoft Teams, Zoom, ServiceNow, Zendesk, GitHub, and many more - deeply embedded where people get things done. You’ll ship agentic capabilities on an open, extensible stack, with the craft and care required for enterprise trust, as we bring Work AI to every employee, in every company.
          - generic [ref=e32]:
            - strong [ref=e36]: "About the Role:"
            - generic [ref=e38]: "Are you a recent university graduate with a passion for software engineering and a desire to make a difference in the tech world? We are seeking highly motivated and creative graduates to join our team in various software engineering roles: Backend Engineer, Product Engineer, and ML Engineer. As a University Graduate Software Engineer, you will participate in designing, developing, and maintaining software solutions that power our products and services. Team placements will be made at the end of the process based on interest and open roles."
            - strong [ref=e42]: "You will:"
            - list [ref=e44]:
              - listitem [ref=e45]: Own impactful infrastructure problems from inception and architecture to production launch
              - listitem [ref=e46]: Write well thought out design documents and ship robust, high-quality, well-tested code
              - listitem [ref=e47]: Work collaboratively with a strong team to identify the most impactful projects we should be prioritizing in our roadmap
              - listitem [ref=e48]: Mentor more junior engineers and learn from experienced ones
            - strong [ref=e51]: "About you:"
            - list [ref=e53]:
              - listitem [ref=e54]: Undergraduate/graduate degree in Computer Science, or related degree - degree must be completed before joining
              - listitem [ref=e55]: Strong coding skills (e.g., Go, Python, Java, Javascript, or C++) with solid understanding of data structures, algorithms, and software design principles
              - listitem [ref=e56]: Experience working on infrastructure for distributed systems or cloud-native applications
              - listitem [ref=e57]: Experience building and shipping ML models and/or solving NLP problems
              - listitem [ref=e58]: A team player who thrives in a fast-paced, customer-focused environment, with a passion for learning and staying current with industry trends
            - strong [ref=e61]: "Location:"
            - list [ref=e63]:
              - listitem [ref=e64]: This role is hybrid (3-4 days a week in one of our SF Bay Area offices)
            - strong [ref=e67]: "Compensation & Benefits:"
            - generic [ref=e69]: The standard base salary range for this position is $150,000 - $160,000 annually. Compensation offered will be determined by factors such as location, level, job-related knowledge, skills, and experience. Certain roles may be eligible for variable compensation, equity, and benefits.
            - generic [ref=e71]: We offer a comprehensive benefits package including competitive compensation, Medical, Vision, and Dental coverage, generous time-off policy, and the opportunity to contribute to your 401k plan to support your long-term goals. When you join, you'll receive a home office improvement stipend, as well as an annual education and wellness stipends to support your growth and wellbeing. We foster a vibrant company culture through regular events, and provide healthy lunches daily to keep you fueled and focused.
            - generic [ref=e73]: We are a diverse bunch of people and we want to continue to attract and retain a diverse range of people into our organization. We're committed to an inclusive and diverse company. We do not discriminate based on gender, ethnicity, sexual orientation, religion, civil or family status, age, disability, or race.
            - generic [ref=e75]: "#LI-HYBRID"
          - generic [ref=e76]:
            - strong [ref=e80]: "AI-First Mindset at Glean:"
            - generic [ref=e83]:
              - text: At Glean, AI fluency is core to how we work and we're committed to ensuring every new hire feels confident integrating AI into their everyday work.
              - strong [ref=e84]: As part of the interview process, you'll complete a brief AI-focused exercise or discussion so we can understand how you think about, design, and use AI to drive impact in your role.
              - text: Feel free to reference any tools, platforms, or workflows you use today — prior Glean experience isn't required.
            - strong [ref=e88]: "Global Data Privacy Notice for Job Candidates and Applicants:"
            - generic [ref=e91]:
              - text: Depending on your location, the General Data Protection Regulation (GDPR), California Consumer Privacy Act (CCPA), or other privacy laws may regulate the way we manage the data of job applicants. Our full notice outlining how data will be processed as part of the application procedure for applicable locations is available in our
