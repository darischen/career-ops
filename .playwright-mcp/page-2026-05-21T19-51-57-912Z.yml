            - generic [ref=e190]: "Job Description:"
          - paragraph [ref=e191]:
            - generic [ref=e192]: Own your opportunity to shape the future of AI at GDIT
            - text: As an AI Engineer supporting the mission of the United States Postal Service (USPS), you will help design, develop, and deploy AI solutions that modernize and optimize essential nationwide operations. Your work will directly contribute to improved efficiency, automated processes, and data‑driven decision making across a high‑impact federal environment.
          - paragraph [ref=e193]
          - paragraph [ref=e194]:
            - text: MEANINGFUL WORK AND PERSONAL IMPACT
            - text: "As an AI Engineer, you will play a critical role in identifying where AI can streamline business processes and deliver measurable outcomes. You will:"
          - list [ref=e195]:
            - listitem [ref=e196]: Develop and advance AI capabilities across USPS business functions.
            - listitem [ref=e197]: Build tools that automate requirements and test case generation using technologies such as Visual Studio Code, Python, Microsoft Copilot, CrewAI, and other USPS‑approved platforms.
            - listitem [ref=e198]: Integrate AI solutions with existing automation frameworks to reduce manual effort and enhance quality.
            - listitem [ref=e199]: Evaluate opportunities to embed AI across enterprise workflows and design solutions aligned with mission needs.
            - listitem [ref=e200]: Collaborate with cross‑functional teams and communicate technical concepts to both technical and non‑technical stakeholders.
            - listitem [ref=e201]: Ensure all AI solutions meet USPS security, compliance, and execution requirements.
            - listitem [ref=e202]: Train designated team members to maintain and operate AI‑driven tools and scripts.
          - paragraph [ref=e203]: WHAT YOU’LL NEED TO SUCCEED
          - paragraph [ref=e204]: Education
          - list [ref=e205]:
            - listitem [ref=e206]: Bachelor’s degree in a related field with strong mathematics
            - listitem [ref=e207]: OR an additional four years of relevant professional experience in lieu of a degree.
          - paragraph [ref=e208]:
            - text: Required Experience
            - text: "Candidates will be evaluated for one of the following levels:"
          - list [ref=e209]:
            - listitem [ref=e210]: "Associate AI Engineer: 1–2 years of experience developing AI or automation solutions."
            - listitem [ref=e211]: "Senior AI Engineer: 3–7 years of hands‑on AI development experience."
            - listitem [ref=e212]: "Principal AI Engineer: 8+ years of experience leading or delivering AI, automation, or software development projects."
          - paragraph [ref=e213]: "Additional expectations for all levels:"
          - list [ref=e214]:
            - listitem [ref=e215]: Proven experience contributing to or leading AI/automation initiatives.
            - listitem [ref=e216]: Experience working in analytics, data‑driven environments, or team leadership roles is highly desirable.
            - listitem [ref=e217]:
              - generic [ref=e218]: Strong agentic AI experience, including familiarity with agent frameworks, orchestration tools, and automation workflows.
            - listitem [ref=e219]:
              - generic [ref=e220]: Experience working across the infrastructure plane to ensure AI systems operate reliably within enterprise environments.
            - listitem [ref=e221]:
              - generic [ref=e222]: Strong mathematical foundation in algebra, statistics, calculus, or related fields applied to AI/ML model development.
            - listitem [ref=e223]:
              - generic [ref=e224]: Hands‑on experience developing, training, and evaluating AI or ML models.
            - listitem [ref=e225]:
              - generic [ref=e226]: Experience performing optimization to improve model performance, scalability, or efficiency.
            - listitem [ref=e227]: Practical experience applying machine learning methods to real‑world business or operational challenges.
          - paragraph [ref=e228]: Required Technical Skills
          - list [ref=e229]:
            - listitem [ref=e230]: Proficiency in building AI solutions using Python, Visual Studio Code, and relevant programming or scripting languages.
            - listitem [ref=e231]: Strong understanding of generative AI, LLM integration, and modern AI frameworks.
            - listitem [ref=e232]: Ability to develop AI‑driven tools that convert business user stories into technical requirements.
            - listitem [ref=e233]: Experience integrating AI capabilities into existing enterprise automation frameworks.
            - listitem [ref=e234]: Ability to deliver AI scripts and programs that run reliably on USPS‑approved environments.
            - listitem [ref=e235]: Capability to document, train, and transition AI tools to operational teams.
          - paragraph [ref=e236]: Preferred Skills
          - list [ref=e237]:
            - listitem [ref=e238]: Strong analytical and problem‑solving skills with a creative approach to complex technical challenges.
            - listitem [ref=e239]: Excellent communication skills with the ability to explain sophisticated AI concepts to non‑technical stakeholders.
            - listitem [ref=e240]: Demonstrated ability to work in a collaborative, cross‑functional team environment.
            - listitem [ref=e241]: Familiarity with Agile methodologies, cloud platforms, or enterprise‑scale AI deployments is a plus.
          - paragraph [ref=e242]: "Security Clearance Level:"
          - list [ref=e243]:
            - listitem [ref=e244]: Ability to obtain and maintain a Public Trust clearance and successfully pass a thorough Government background screening process requiring the completion of detailed forms and fingerprinting
            - listitem [ref=e245]:
              - generic [ref=e247]: "This position has a U.S. residency requirement. The USPS security clearance process requires the selected candidate to have resided in the U.S. (including U.S. Territories) for the last five years as follows: U.S. Citizens cannot have left the U.S. (including U.S. Territories) for longer than 6 months consecutively in the last 3 years (unless they meet certain exceptions). Non-U.S. Citizens cannot have left the U.S. (including U.S. Territories) for longer than 90 days consecutively in the last 3 years."
          - paragraph [ref=e248]: "Location:"
          - list [ref=e249]:
