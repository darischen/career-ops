          - paragraph [ref=e251]: GDIT IS YOUR PLACE
          - paragraph [ref=e252]: At GDIT, the mission is our purpose, and our people are at the center of everything we do.
          - list [ref=e253]:
            - listitem [ref=e254]: "Growth: AI-powered career tool that identifies career steps and learning opportunities"
            - listitem [ref=e255]: "Support: An internal mobility team focused on helping you achieve your career goals"
