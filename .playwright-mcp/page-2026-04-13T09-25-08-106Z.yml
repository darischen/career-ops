        - generic [ref=e19]:
          - paragraph [ref=e21]: Affirm is reinventing credit to make it more honest and friendly, giving consumers the flexibility to buy now and pay later without any hidden fees or compounding interest.
          - generic [ref=e22]:
            - paragraph [ref=e23]: The Home and Search Experience team owns the end-to-end search and discovery experience in the Affirm app, spanning user experience, application-level APIs, and the underlying search and ranking systems. Our goal is to define and deliver meaningful initiatives that improve how users discover merchants, brands, and categories, and understand and engage with their available credit.
            - paragraph [ref=e24]: We work closely with product, data science, design, and partner engineering teams to identify opportunities, ship new features, and continuously raise the quality, reliability, and scalability of these experiences in support of Affirm’s growth.
            - paragraph [ref=e25]: We are looking for a highly motivated Software Engineer to help define and deliver critical experiences at the heart of Affirm’s marketplace. In this role, you will own high-leverage technical and product initiatives whose outcomes directly influence user discovery, credit engagement, and the growth of Affirm’s merchant network.
            - paragraph [ref=e26]: We are only just getting started! Come join us as we build a beloved, lasting financial services brand predicated on honesty and trust. It’s going to be an amazing ride!
            - paragraph [ref=e27]
            - heading "What You'll Do" [level=2] [ref=e28]
            - list [ref=e29]:
              - listitem [ref=e30]: With the support of your team, you will work on tasks that contribute to the team's projects and goals.
              - listitem [ref=e31]: You will work collaboratively and proactively with your team and stakeholders, bringing them along for your work and helping to create visibility and dialog regarding the risks and trade-offs related to your work.
              - listitem [ref=e32]: You will strike the right balance of speed and quality in your work, ensuring that we hit our business goals while protecting our systems from downtime.
              - listitem [ref=e33]: You will contribute to a sense of community on your team by engaging in growth and development activities.
            - heading "What We Look For" [level=2] [ref=e34]
            - list [ref=e35]:
              - listitem [ref=e36]: You have previous work or internship experience designing, developing and launching backend systems at scale and are experienced using one of Python or Kotlin.
              - listitem [ref=e37]: You are familiar with the building blocks of distributed systems, and the technologies like AWS, MySQL and Kubernetes.
              - listitem [ref=e38]: You have previous work or internship designing, developing and launching APIs at scale using languages like Python or Kotlin.
              - listitem [ref=e39]: You have mastered taking a simple problem or business scenario into a solution that interacts with multiple software components, and executing on it by writing clear, easily understood, well tested and extensible code.
              - listitem [ref=e40]: You are comfortable navigating a large code base, debugging others' code, and providing feedback to other engineers through code reviews.
              - listitem [ref=e41]: Your experience demonstrates that you take ownership of your growth, proactively seeking feedback from your team, your manager, and your stakeholders.
              - listitem [ref=e42]: You have strong verbal and written communication skills that support effective collaboration with our global engineering team.
              - listitem [ref=e43]: This position requires either equivalent practical experience or a Bachelor’s degree in a related field.
            - paragraph [ref=e44]
            - paragraph [ref=e45]:
              - strong [ref=e46]: Pay Grade - J
            - paragraph [ref=e47]:
              - strong [ref=e48]: Equity Grade - 5
            - paragraph [ref=e49]:
              - text: Employees new to Affirm typically come in at the start of the pay range. Affirm focuses on providing a simple and transparent pay structure which is based on a variety of factors, including location, experience and job-related skills.
              - text: Base pay is part of a total compensation package that may include equity rewards, monthly stipends for health, wellness and tech spending, and benefits (including 100% subsidized medical coverage, dental and vision for you and your dependents.)
              - text: "USA base pay range (CA, WA, NY, NJ, CT) per year: $130,000 - $170,000"
              - text: "USA base pay range (all other U.S. states) per year: $115,000 - $155,000"
            - paragraph [ref=e50]
            - paragraph [ref=e52]: "#LI-Remote"
          - generic [ref=e53]:
            - generic [ref=e54]:
              - paragraph [ref=e55]: Affirm is proud to be a remote-first company! The majority of our roles are remote and you can work almost anywhere within the country of employment. Affirmers in proximal roles have the flexibility to work remotely, but will occasionally be required to work out of their assigned Affirm office. A limited number of roles remain office-based due to the nature of their job responsibilities.
              - paragraph [ref=e56]: "We’re extremely proud to offer competitive benefits that are anchored to our core value of people come first. Some key highlights of our benefits package include:"
              - list [ref=e57]:
                - listitem [ref=e58]: Health care coverage - Affirm covers all premiums for all levels of coverage for you and your dependents
                - listitem [ref=e59]: Flexible Spending Wallets - generous stipends for spending on Technology, Food, various Lifestyle needs, and family forming expenses
                - listitem [ref=e60]: Time off - competitive vacation and holiday schedules allowing you to take time off to rest and recharge
                - listitem [ref=e61]: ESPP - An employee stock purchase plan enabling you to buy shares of Affirm at a discount
              - paragraph [ref=e62]: We believe It’s On Us to provide an inclusive interview experience for all, including people with disabilities. We are happy to provide reasonable accommodations to candidates in need of individualized support during the hiring process.
              - paragraph [ref=e63]: "[For U.S. positions that could be performed in Los Angeles or San Francisco] Pursuant to the San Francisco Fair Chance Ordinance and Los Angeles Fair Chance Initiative for Hiring Ordinance, Affirm will consider for employment qualified applicants with arrest and conviction records."
            - paragraph [ref=e65]:
              - text: By clicking "Submit Application," you acknowledge that you have read Affirm's
              - link "Global Candidate Privacy Notice" [ref=e66] [cursor=pointer]:
                - /url: https://www.affirm.com/global-candidate-privacy-notice
              - text: and hereby freely and unambiguously give informed consent to the collection, processing, use, and storage of your personal information as described therein.
