        - heading "Work Environment:" [level=2] [ref=e95]
        - paragraph [ref=e96]: This position primarily works in an office setting and is largely sedentary with the majority of the position working with a computer. The role typically requires the use of basic office equipment such as a phone, video, computer, keyboard, mouse, and printer.
        - paragraph [ref=e97]
        - paragraph [ref=e98]: We believe in-person connection drives innovation, strengthens mentorship, and builds culture, while flexibility enables employees to do their best work. Under Iridium’s Hybrid Work Policy, employees are expected to work at least three days per week (approximately 60%) in an Iridium office to support collaboration, relationship-building, and professional growth.
