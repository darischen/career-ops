              - heading "Voluntary Self-Identification of Disability" [level=2] [ref=e328]
              - generic [ref=e329]:
                - generic [ref=e330]:
                  - generic [ref=e331]: Form CC-305
                  - generic [ref=e332]: Page 1 of 1
                - generic [ref=e333]:
                  - generic [ref=e334]: OMB Control Number 1250-0005
                  - generic [ref=e335]: Expires 04/30/2026
              - strong [ref=e336]: Why are you being asked to complete this form?
              - paragraph [ref=e337]: We are a federal contractor or subcontractor. The law requires us to provide equal employment opportunity to qualified people with disabilities. We have a goal of having at least 7% of our workers as people with disabilities. The law says we must measure our progress towards this goal. To do this, we must ask applicants and employees if they have a disability or have ever had one. People can become disabled, so we need to ask this question at least every five years.
              - paragraph [ref=e338]:
                - text: Completing this form is voluntary, and we hope that you will choose to do so. Your answer is confidential. No one who makes hiring decisions will see it. Your decision to complete the form and your answer will not harm you in any way. If you want to learn more about the law or this form, visit the U.S. Department of Labor’s Office of Federal Contract Compliance Programs (OFCCP) website at
                - link "www.dol.gov/ofccp" [ref=e339] [cursor=pointer]:
                  - /url: https://www.dol.gov/ofccp
                - text: .
              - strong [ref=e340]: How do you know if you have a disability?
              - paragraph [ref=e341]:
                - text: A disability is a condition that substantially limits one or more of your “major life activities.” If you have or have ever had such a condition, you are a person with a disability.
                - strong [ref=e342]: "Disabilities include, but are not limited to:"
              - list [ref=e343]:
                - listitem [ref=e344]: Alcohol or other substance use disorder (not currently using drugs illegally)
                - listitem [ref=e345]: Autoimmune disorder, for example, lupus, fibromyalgia, rheumatoid arthritis, HIV/AIDS
                - listitem [ref=e346]: Blind or low vision
                - listitem [ref=e347]: Cancer (past or present)
                - listitem [ref=e348]: Cardiovascular or heart disease
                - listitem [ref=e349]: Celiac disease
                - listitem [ref=e350]: Cerebral palsy
                - listitem [ref=e351]: Deaf or serious difficulty hearing
                - listitem [ref=e352]: Diabetes
                - listitem [ref=e353]: Disfigurement, for example, disfigurement caused by burns, wounds, accidents, or congenital disorders
                - listitem [ref=e354]: Epilepsy or other seizure disorder
                - listitem [ref=e355]: Gastrointestinal disorders, for example, Crohn's Disease, irritable bowel syndrome
                - listitem [ref=e356]: Intellectual or developmental disability
                - listitem [ref=e357]: Mental health conditions, for example, depression, bipolar disorder, anxiety disorder, schizophrenia, PTSD
                - listitem [ref=e358]: Missing limbs or partially missing limbs
                - listitem [ref=e359]: Mobility impairment, benefiting from the use of a wheelchair, scooter, walker, leg brace(s) and/or other supports
                - listitem [ref=e360]: Nervous system condition, for example, migraine headaches, Parkinson’s disease, multiple sclerosis (MS)
                - listitem [ref=e361]: Neurodivergence, for example, attention-deficit/hyperactivity disorder (ADHD), autism spectrum disorder, dyslexia, dyspraxia, other learning disabilities
                - listitem [ref=e362]: Partial or complete paralysis (any cause)
                - listitem [ref=e363]: Pulmonary or respiratory conditions, for example, tuberculosis, asthma, emphysema
                - listitem [ref=e364]: Short stature (dwarfism)
                - listitem [ref=e365]: Traumatic brain injury
