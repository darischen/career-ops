        - generic [ref=e20]:
          - paragraph [ref=e22]: Airtable is the no-code app platform that empowers people closest to the work to accelerate their most critical business processes. More than 500,000 organizations, including 80% of the Fortune 100, rely on Airtable to transform how work gets done.
          - generic [ref=e23]:
            - paragraph [ref=e24]: Join Airtable as an CX AI Architect and own the technical foundation that powers our AI-native customer support experience. You'll design and optimize how our AI agents reason, retrieve, decide, and act—architecting the knowledge systems, decision logic, and guardrails that enable reliable, scalable AI resolution at scale. This role requires deep fluency in how large language models work, hands-on experience with AI agent architectures, and the ability to partner closely with Engineering on production systems.
            - heading "What you'll do" [level=1] [ref=e25]:
              - strong [ref=e26]: What you'll do
            - list [ref=e27]:
              - listitem [ref=e28]:
                - strong [ref=e29]: Own Agent retrieval accuracy and relevance
                - text: . Architect the knowledge systems that enable AI agents to surface the right answer on the first try. Measure and improve retrieval precision, contextual relevance, and hallucination rates.
              - listitem [ref=e30]:
                - strong [ref=e31]: Drive automated resolution rates
                - text: . Build the decision frameworks that allow agents to take confident actions. What APIs do agents need to access? When can they make account modifications? You're accountable for encoding business logic into auditable, predictable systems that resolve issues without human intervention.
              - listitem [ref=e32]:
                - strong [ref=e33]: Manage AI safety and trust.
                - text: Establish the guardrails that keep resolution rates high while failure rates stay low. You're responsible for what the agent
                - emphasis [ref=e34]: doesn't
                - text: "do wrong: edge cases caught, prompt injection blocked, unintended behaviors prevented."
              - listitem [ref=e35]:
                - strong [ref=e36]: Own the feedback loop.
                - text: Monitor the observability layer that turns agent behavior into actionable insights. Instrument retrieval accuracy, action success rates, and failure patterns. Use this data to drive measurable week-over-week improvements in agent performance.
              - listitem [ref=e37]:
                - strong [ref=e38]: Continuously improve agent quality.
                - text: Develop and maintain the prompt architecture that governs how agents reason and respond. Build systematic approaches to versioning, A/B testing, and performance evaluation, measuring consistency, accuracy, and adaptability across scenarios.
              - listitem [ref=e39]:
                - strong [ref=e40]: Drive integration strategy.
                - text: Architect how agents connect to external systems—billing platforms, CRMs, internal tools, Airtable APIs. Define authentication patterns, error handling, and data transformation. Uptime, error rates, and data accuracy are your metrics.
            - heading "Who you are" [level=1] [ref=e41]:
              - strong [ref=e42]: Who you are
            - list [ref=e43]:
              - listitem [ref=e44]: You understand how large language models work—not just how to use them, but how they reason, where they fail, and why. You're familiar with concepts like RAG architectures, prompt engineering patterns, chain-of-thought reasoning, and agent frameworks. You've built or significantly contributed to AI-powered systems in production.
              - listitem [ref=e45]: You think in terms of data flows, state management, error handling, and edge cases. You can design complex systems that are both powerful and reliable. You've likely worked in roles like solutions architecture, platform engineering, or technical program management.
              - listitem [ref=e46]: You can write scripts, work with APIs, query databases, and prototype solutions. You're not a full-time software engineer, but you're dangerous enough to build, test, and validate technical approaches independently.
              - listitem [ref=e47]: You instrument systems, analyze logs, and use data to diagnose issues and validate improvements. You build dashboards, define metrics, and can tie technical changes to business outcomes like resolution rates and customer satisfaction.
              - listitem [ref=e48]: You can explain complex AI system behavior to non-technical stakeholders, write clear technical documentation, and translate business requirements into system specifications. You're effective working across engineering, product, and operations teams.
            - paragraph [ref=e49]:
              - text: Airtable is an equal opportunity employer. We embrace diversity and strive to create a workplace where everyone has an equal opportunity to thrive. We welcome people of different backgrounds, experiences, abilities, and perspectives. All qualified applicants will receive consideration for employment without regard to race, color, religion, sex, sexual orientation, gender identity, national origin, disability, protected veteran status or any characteristic protected by applicable federal and state laws, regulations and ordinances. Learn more about your
              - link "EEO rights as an applicant" [ref=e50] [cursor=pointer]:
