                - listitem [ref=e311]: Autoimmune disorder, for example, lupus, fibromyalgia, rheumatoid arthritis, HIV/AIDS
                - listitem [ref=e312]: Blind or low vision
                - listitem [ref=e313]: Cancer (past or present)
                - listitem [ref=e314]: Cardiovascular or heart disease
                - listitem [ref=e315]: Celiac disease
                - listitem [ref=e316]: Cerebral palsy
                - listitem [ref=e317]: Deaf or serious difficulty hearing
                - listitem [ref=e318]: Diabetes
                - listitem [ref=e319]: Disfigurement, for example, disfigurement caused by burns, wounds, accidents, or congenital disorders
                - listitem [ref=e320]: Epilepsy or other seizure disorder
                - listitem [ref=e321]: Gastrointestinal disorders, for example, Crohn's Disease, irritable bowel syndrome
                - listitem [ref=e322]: Intellectual or developmental disability
                - listitem [ref=e323]: Mental health conditions, for example, depression, bipolar disorder, anxiety disorder, schizophrenia, PTSD
                - listitem [ref=e324]: Missing limbs or partially missing limbs
                - listitem [ref=e325]: Mobility impairment, benefiting from the use of a wheelchair, scooter, walker, leg brace(s) and/or other supports
                - listitem [ref=e326]: Nervous system condition, for example, migraine headaches, Parkinson’s disease, multiple sclerosis (MS)
                - listitem [ref=e327]: Neurodivergence, for example, attention-deficit/hyperactivity disorder (ADHD), autism spectrum disorder, dyslexia, dyspraxia, other learning disabilities
                - listitem [ref=e328]: Partial or complete paralysis (any cause)
                - listitem [ref=e329]: Pulmonary or respiratory conditions, for example, tuberculosis, asthma, emphysema
                - listitem [ref=e330]: Short stature (dwarfism)
                - listitem [ref=e331]: Traumatic brain injury
