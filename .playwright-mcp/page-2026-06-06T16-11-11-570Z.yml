        - generic [ref=e84]: We are the Monetization Ranking AI Research organization, dedicated to delivering personalized ads that maximize both user utility and advertiser value. We focus on advancing AI and ML technologies for all aspects of Monetization, including ranking, retrieval, model architecture, and optimization. By consistently integrating cutting-edge AI/ML advancements, we help Meta’s products achieve long-term goals and have contributed tens of billions in revenue. With our growing impact, we’re seeking AI Research Scientists to join our team and drive SOTA research across the Monetization organization.
        - separator [ref=e85]
        - generic [ref=e86]:
          - heading [level=2] [ref=e87]: AI Research Scientist, CoreML - Monetization AI Responsibilities
          - list [ref=e88]:
            - generic [ref=e89]:
              - listitem [ref=e90]: Develop and implement large-scale model architectures, leveraging model scaling and transfer learning techniques
              - listitem [ref=e91]: Prioritize training scalability and signal scaling to optimize model performance, efficiency, and reliability
              - listitem [ref=e92]: Develop and apply NextGen sequence learning techniques to drive advancements in natural language processing and understanding
              - listitem [ref=e93]: Design and implement generative modeling solutions for data augmentation
              - listitem [ref=e94]: Research and develop graph-aware large language models
              - listitem [ref=e95]: Develop and deploy AutoML pipelines
              - listitem [ref=e96]: Apply Reinforcement Learning (RL) techniques, including long-term value optimization, RLHF, and RL4Reason
              - listitem [ref=e97]: Use causal learning to identify and understand the cause and effect of relationships across data
              - listitem [ref=e98]: Collaborate with cross-functional teams to design and optimize ML systems, leveraging expertise in hardware-software co-design, including quantization, compression, and resource-efficient AI, to drive performance improvements and efficiency gains
              - listitem [ref=e99]: Develop and implement innovative solutions for data-related challenges, utilizing knowledge of semi/self-supervised learning, generative techniques, sampling, debiasing, domain adaptation, continual learning, data augmentation, cold-start, content understanding, and large language models
        - generic [ref=e100]:
          - heading [level=2] [ref=e101]: Minimum Qualifications
          - list [ref=e102]:
            - generic [ref=e103]:
              - listitem [ref=e104]: Bachelor's degree in Computer Science, Computer Engineering, relevant technical field, or equivalent practical experience
              - listitem [ref=e105]: Has obtained a PhD in Computer Science, Computer Engineering, Artificial Intelligence, Machine Learning, or relevant technical field
              - listitem [ref=e106]: Experience holding an industry, faculty, or government researcher position
              - listitem [ref=e107]: Research experience in natural language processing, large language modeling, deep learning, reinforcement learning, recommendations, ranking, search, or related areas
              - listitem [ref=e108]: Publications in machine learning, artificial intelligence, or related field
              - listitem [ref=e109]: Programming experience in Python and hands-on experience with frameworks such as PyTorch
              - listitem [ref=e110]: Must obtain work authorization in the country of employment at the time of hire and maintain ongoing work authorization during employment
        - generic [ref=e111]:
