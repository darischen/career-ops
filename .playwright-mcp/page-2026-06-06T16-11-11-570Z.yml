              - listitem [ref=e116]: First author publications at peer-reviewed AI conferences (e.g., NeurIPS, CVPR, ICML, ICLR, ICCV, and ACL).
              - listitem [ref=e117]: Experience solving complex problems and comparing alternative solutions, tradeoffs, and different perspectives to determine a path forward.
