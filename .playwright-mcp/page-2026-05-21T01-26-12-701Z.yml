          - generic [ref=e47]:
            - paragraph [ref=e48]
            - paragraph [ref=e49]:
              - text: We are rebuilding biotech for the AI era.
              - text: When a breakthrough is delayed, the world waits. Getting a molecule from discovery to patients, or a crop from lab to field, involves thousands of slow, manual, disconnected steps. AI has the potential to change this, compressing decades of R&D work into years. But that only happens when clean, structured scientific data and AI are built into how science gets done.
              - text: Benchling is the AI platform for biotech R&D. Scientists use Benchling to design experiments, capture structured data, and run AI agents and models directly in their workflows. Over 200,000 scientists around the world trust Benchling to power their most important work, from academic labs to Sanofi, Moderna, and more than half of the world's top 50 biopharma.
              - text: We’re building an AI scientist for our customers. We can’t do that if we haven’t built the muscle ourselves. AI fluency is the foundation we build on; it's core to how we work, and we're committed to helping every new hire integrate it into their day-to-day. As part of our interview process, you'll complete a brief AI-focused exercise or discussion so we can understand how you think about and use AI to drive impact in your role. Feel free to reference any tools, platforms, or workflows you use today.
            - paragraph [ref=e50]
            - paragraph [ref=e51]
            - heading "ROLE OVERVIEW" [level=2] [ref=e52]:
              - strong [ref=e53]: ROLE OVERVIEW
            - paragraph [ref=e54]: "We’re a team focusing on shipping AI agents for scientists, helping them automate toil and accelerate breakthroughs. Our agents automate many parts of scientific work that take hours to weeks today: designing experiments, capturing data, analyzing data, and writing complex reports. As an engineer on the team, you’ll build these agents end-to-end, from designing the agent architecture to shipping intuitive interfaces for the agents within our scientific applications. It’s early days for AI agents, both at Benchling and in the industry at large. We’ll rapidly iterate with customers and change directions quickly, figuring out new patterns for how we develop and go to market. We’ll win if we stay curious and obsess over our customers."
            - heading "RESPONSIBILITIES" [level=2] [ref=e55]:
              - strong [ref=e56]: RESPONSIBILITIES
            - list [ref=e57]:
              - listitem [ref=e58]:
                - paragraph [ref=e59]:
                  - strong [ref=e60]: Build end-to-end AI agents
                  - text: ", prototyping and productionizing systems that automate scientific work, from experiment design to data analysis and reporting."
              - listitem [ref=e61]:
                - paragraph [ref=e62]:
                  - strong [ref=e63]: Work directly with customers
                  - text: to ideate use cases, gather feedback, build evaluations, and onboard scientific teams.
              - listitem [ref=e64]:
                - paragraph [ref=e65]:
                  - strong [ref=e66]: Engineer across the stack
                  - text: ", from developing new LLM-powered primitives to shipping intuitive user interfaces inside Benchling’s applications."
              - listitem [ref=e67]:
                - paragraph [ref=e68]:
                  - strong [ref=e69]: Continuously improve our agent platform
                  - text: ", contributing to frameworks, tooling, and infrastructure that accelerate future agent development."
              - listitem [ref=e70]:
                - paragraph [ref=e71]:
                  - strong [ref=e72]: Shape how we build AI at Benchling
                  - text: ", driving experimentation, contributing to technical direction, and helping evolve our engineering and product development practices as the field matures."
            - heading "QUALIFICATIONS" [level=2] [ref=e73]:
              - strong [ref=e74]: QUALIFICATIONS
            - list [ref=e75]:
              - listitem [ref=e76]:
                - paragraph [ref=e77]:
                  - strong [ref=e78]: 2+ years of professional software engineering experience
                  - text: ", building and maintaining production systems."
              - listitem [ref=e79]:
                - paragraph [ref=e80]:
                  - strong [ref=e81]: Experience across the stack
                  - text: ", comfort working with backend systems (Python or similar languages) and modern frontend frameworks (React or equivalent)."
              - listitem [ref=e82]:
                - paragraph [ref=e83]:
                  - strong [ref=e84]: Strong product sense
                  - text: ", with the ability to iterate quickly and refine solutions based on user feedback and data."
              - listitem [ref=e85]:
                - paragraph [ref=e86]:
                  - strong [ref=e87]: Curiosity and excitement about LLMs and AI agents
                  - text: ", and a desire to shape how they can transform scientific research."
              - listitem [ref=e88]:
