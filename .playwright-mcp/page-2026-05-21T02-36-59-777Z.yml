        - generic [ref=e23]:
          - paragraph [ref=e24]: Remote within Canada — applicants must be based in Ontario, BC, Alberta, or Manitoba.
          - paragraph [ref=e25]: Toast creates technology to help restaurants and local businesses succeed in a digital world, helping business owners operate, increase sales, engage customers, and keep employees happy.
          - paragraph [ref=e26]: Toast is a rapidly growing company that's revolutionizing how the restaurant industry does business by pairing technology with an extraordinary commitment to customer success. We help restaurants streamline operations, increase revenue, and deliver amazing guest experiences through our platform that combines restaurant point of sale, team management, guest-facing technology, and award-winning customer support. As a Toaster, you will be challenged to take on meaningful projects to help craft the company's future. Join us as we empower the restaurant community to delight guests, do what they love, and thrive.
          - paragraph [ref=e27]: We’re looking for a Software Developer to join our dynamic Employee Development team, which focuses on providing experiences that enable our customers to manage the performance and growth of their employees. You’ll play a key roll* in the design, development, and delivery of scalable software solutions that enable managers and operators to measure, incentivize, and grow their employees.
          - paragraph [ref=e28]:
            - strong [ref=e29]: A day in the life (Responsibilities)
          - list [ref=e30]:
            - listitem [ref=e31]: Leverage cutting edge AI tools to enhance your development workflow, improve velocity, and help pioneer new approaches to building - contributing to a culture of innovation and productivity across the team.
            - listitem [ref=e32]: Work with fellow developers, product managers, designers, and user researchers to build amazing product features with a goal of increasing our consumer footprint at Toast
            - listitem [ref=e33]: Flex your full-stack development muscles with challenging end-to-end tasks in a supportive, collaborative team environment
            - listitem [ref=e34]: Participate in designing, estimating, implementing, testing, and debugging end-to-end solutions
            - listitem [ref=e35]: Ship code that has a massive impact on the growth of Toast
            - listitem [ref=e36]: Learn and champion best practices for development, deployment, and quality life-cycles
            - listitem [ref=e37]: Actively contribute to product design and feature selection discussions
            - listitem [ref=e38]: Participate in code reviews to ensure technical implementations meet functional requirements
          - paragraph [ref=e39]:
            - strong [ref=e40]: What you'll need to thrive (Requirements)
          - list [ref=e41]:
            - listitem [ref=e42]: Strong foundation in a modern programming language
            - listitem [ref=e43]: Passionate about technology and learning new things
            - listitem [ref=e44]: Eager to deliver high impact features
            - listitem [ref=e45]: Willingness to to monitor, troubleshoot, and improve system performance through logging and metrics
            - listitem [ref=e46]: Ability and motivation to learn quickly and apply knowledge to solve real problems
            - listitem [ref=e47]: You’re hungry to take on challenging projects
          - paragraph [ref=e48]:
            - strong [ref=e49]: AI at Toast
          - paragraph [ref=e50]: At Toast, one of our company values is that we're hungry to build and learn. We believe learning new AI tools empowers us to build for our customers faster, more independently, and with higher quality. We provide these tools across all disciplines, from Engineering and Product to Sales and Support, and are inspired by how our Toasters are already driving real value with them. The people who thrive here are those who embrace changes that let us build more for our customers; it’s a core part of our culture.
          - paragraph [ref=e51]:
            - strong [ref=e52]: Our Total Rewards Philosophy
            - text: We strive to provide competitive compensation and benefits programs that help to attract, retain, and motivate the best and brightest people in our industry. Our total rewards package goes beyond great earnings potential and provides the means to a healthy lifestyle with the flexibility to meet Toasters’ changing needs. Learn more about our benefits at
            - link "https://careers.toasttab.com/toast-benefits" [ref=e53] [cursor=pointer]:
              - /url: https://careers.toasttab.com/toast-benefits
            - text: .
        - generic [ref=e55]:
