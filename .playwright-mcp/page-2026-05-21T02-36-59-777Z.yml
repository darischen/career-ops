          - paragraph [ref=e67]:
            - strong [ref=e68]:
              - strong [ref=e69]: Diversity, Equity, and Inclusion is Baked into our Recipe for Success
          - paragraph [ref=e70]: At Toast, our employees are our secret ingredient—when they thrive, we thrive. The restaurant industry is one of the most diverse, and we embrace that diversity with authenticity, inclusivity, respect, and humility. By embedding these principles into our culture and design, we create equitable opportunities for all and raise the bar in delivering exceptional experiences.
          - paragraph [ref=e71]:
            - strong [ref=e73]: We Thrive Together
          - paragraph [ref=e74]:
            - generic [ref=e75]:
              - text: "We embrace a hybrid work model that fosters in-person collaboration while valuing individual needs. Our goal is to build a strong culture of connection as we work together to empower the restaurant community. To learn more about how we work globally and regionally, check out:"
              - link "https://careers.toasttab.com/locations-toast" [ref=e76] [cursor=pointer]:
                - /url: https://careers.toasttab.com/locations-toast
