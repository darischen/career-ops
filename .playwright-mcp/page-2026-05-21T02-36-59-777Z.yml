            - strong [ref=e64]: How Toast Uses AI in its Hiring Process
          - paragraph [ref=e65]:
            - text: "Throughout the hiring process, our goal is to get to know you. We use AI tools to support our recruiters and interviewers with tasks like note-taking, summarization, and documentation of interviews to ensure they can be fully focused on your conversation. All hiring decisions are made by people. To learn more:"
            - link "https://careers.toasttab.com/ai-in-hiring" [ref=e66] [cursor=pointer]:
