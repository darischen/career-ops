          - paragraph [ref=e138]: "Job Description:"
          - paragraph [ref=e139]: Disney Entertainment and ESPN Product & Technology
          - paragraph [ref=e140]: Technology is at the heart of Disney’s past, present, and future. Disney Entertainment and ESPN Product & Technology is a global organization of engineers, product developers, designers, technologists, data scientists, and more – all working to build and advance the technological backbone for Disney’s media business globally.
          - paragraph [ref=e141]: The team marries technology with creativity to build world-class products, enhance storytelling, and drive velocity, innovation, and scalability for our businesses. We are Storytellers and Innovators. Creators and Builders. Entertainers and Engineers. We work with every part of The Walt Disney Company’s media portfolio to advance the technological foundation and consumer media touch points serving millions of people around the world.
          - paragraph [ref=e142]: "Here are a few reasons why we think you’d love working here:"
          - paragraph [ref=e143]: "Building the future of Disney’s media: Our Technologists are designing and building the products and platforms that will power our media, advertising, and distribution businesses for years to come."
          - paragraph [ref=e144]: "Reach, Scale & Impact: More than ever, Disney’s technology and products serve as a signature doorway for fans' connections with the company’s brands and stories. Disney+. Hulu. ESPN. ABC. ABC News…and many more. These products and brands – and the unmatched stories, storytellers, and events they carry – matter to millions of people globally."
          - paragraph [ref=e145]: "Innovation: We develop and implement groundbreaking products and techniques that shape industry norms, and solve complex and distinctive technical problems."
          - paragraph [ref=e146]
          - paragraph [ref=e147]: Product Engineering is a unified team responsible for the engineering of Disney Entertainment & ESPN digital and streaming products and platforms. This includes product engineering, media engineering, quality assurance, engineering behind personalization, commerce, lifecycle, and identity.
          - paragraph [ref=e148]
          - paragraph [ref=e149]: "Job Summary:"
          - paragraph [ref=e150]: The Search Experience Management and Images team at Disney Entertainment and ESPN Product & Technology is looking for Software Engineers to help build and support the metadata and artwork platform for Disney+, ESPN+, and other streaming services. Our systems are collectively responsible for integrating with the studios to bring all the metadata and artwork for Disney, Pixar, Marvel, Lucasfilm, Nat Geo, and Fox content onto the Disney Streaming platform for inclusion in Disney+. This includes distributed systems that handle metadata and artwork ingest, management, curation, personalization, localization, and syndication. Our metadata drives nearly every aspect of the user experience in Disney Streaming products.
          - paragraph [ref=e151]
          - paragraph [ref=e152]: We have an engineer-driven culture where teams are able to make their own technology choices based on the task at hand, and team members are encouraged to spend some time on professional development taking online courses, learning new technologies, working on open source or side projects, or writing blog posts. Some of the technologies currently used within Experience Management include Java, Typescript, NodeJS, Kotlin, Javascript, Angular, SQL, Spring Boot, ElasticSearch, Docker, and a wide array of AWS services (Lambda, ECS, S3, SQS, Kinesis, Postgres, DynamoDB, etc.).
          - paragraph [ref=e153]
          - paragraph [ref=e154]:
            - generic [ref=e155]: "Responsibilities and Duties of the Role:"
          - list [ref=e156]:
            - listitem [ref=e157]: Work with a team of engineers building software in a collaborative development process
            - listitem [ref=e158]: Build high-performance, stable, scalable systems to be deployed in an enterprise setting
            - listitem [ref=e159]: Assist with AI-related development tasks, such as integrating existing AI or machine-learning services and verifying basic inputs and outputs
            - listitem [ref=e160]: Participate in high-level architecture discussions and planning sessions
            - listitem [ref=e161]: Participate in the code review process by providing feedback on pull requests
            - listitem [ref=e162]: Participate in on-call rotation, supporting systems and services during production incidents
          - paragraph [ref=e163]
          - paragraph [ref=e164]:
            - generic [ref=e166]: "Required Experience/Skills/Training:"
          - list [ref=e168]:
            - listitem [ref=e169]: Strong problem-solving skills with the ability to work independently and learn quickly
            - listitem [ref=e170]: Demonstrated eagerness to learn and adapt to new technologies
            - listitem [ref=e171]: Experience with at least one programming language; preferred languages include TypeScript or Java, with C++ or JavaScript also acceptable
            - listitem [ref=e172]: Solid understanding of object-oriented programming principles
            - listitem [ref=e173]: Familiarity with RESTful services and API concepts
            - listitem [ref=e174]: Understanding of source control fundamentals, with exposure to Git
            - listitem [ref=e175]: Knowledge of data persistence technologies (SQL and/or NoSQL)
            - listitem [ref=e176]: Exposure to build and deployment tools such as Jenkins and Docker
            - listitem [ref=e177]: Excellent written and verbal communication skills
          - paragraph [ref=e178]
