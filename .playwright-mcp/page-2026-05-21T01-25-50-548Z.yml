            - paragraph [ref=e37]
            - paragraph [ref=e38]:
              - text: Zip is the AI platform for enterprise procurement — built for humans and agents working together. By orchestrating procurement across teams, tools, and suppliers with the help of AI agents, companies can secure the resources they need to innovate faster than ever before.
              - text: The world’s most influential enterprises trust Zip, including T-Mobile, OpenAI, AMD, Mars, Dollar Tree, and more. Together they’ve saved over $8 billion and processed over $500 billion in spend. Zip’s team includes product leaders from Apple, Airbnb, and Meta, as well as former procurement leaders from United Health, Sanofi, MGM Resorts, Discover, and NASA.
              - text: Backed by Adams Street, Alkeon, BOND, CRV, DST, Tiger Global, and Y Combinator, Zip has raised $371 million, most recently at a $2.2 billion valuation and has been recognized by Forbes Fintech 50, Fast Company's Most Innovative Companies, Inc. Best in Business, and LinkedIn Top Startups.
            - paragraph [ref=e39]:
              - text: We’re looking for a passionate
              - strong [ref=e40]: Software Engineer, Frontend (Mid-level to Senior)
              - text: to help us build beautiful, performant, and scalable user-facing experiences. In this role, you’ll take ownership of our core frontend architecture and ship features that have a direct and immediate impact on our customers.
            - paragraph [ref=e41]: You'll collaborate closely with a highly skilled, cross-functional team that values thoughtful design, fast iteration, and clean, maintainable code. Our engineers have a high degree of autonomy and are trusted to take features from concept to production, all while contributing towards improving our frontend practices as a company.
            - paragraph [ref=e42]
            - heading "You will" [level=2] [ref=e43]:
              - strong [ref=e44]: You will
            - list [ref=e45]:
              - listitem [ref=e46]:
                - paragraph [ref=e47]: Design and build highly reliable and resilient products and features.
              - listitem [ref=e48]:
                - paragraph [ref=e49]: Work closely with cross functional product and customer-facing teams to understand requirements and ship thoughtful solutions.
              - listitem [ref=e50]:
                - paragraph [ref=e51]: Write high-quality, extensible, and maintainable code.
              - listitem [ref=e52]:
                - paragraph [ref=e53]: Design and build scalable frontend applications and components.
              - listitem [ref=e54]:
                - paragraph [ref=e55]: Design and build APIs to drive existing and new features for a web-based application.
            - heading "Qualifications" [level=2] [ref=e56]:
