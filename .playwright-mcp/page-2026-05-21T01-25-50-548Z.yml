              - listitem [ref=e65]:
                - paragraph [ref=e66]: Experience with web application and API development in production environments. At Zip, our stack includes Python, Typescript, React, and GraphQL.
              - listitem [ref=e67]:
                - paragraph [ref=e68]: "Experience with industry standard build, test, deploy tools. At Zip, we work with: Kubernetes, Spinnaker, Jenkins, Segment, Github Actions, Datadog, Bugsnag and Fullstory."
              - listitem [ref=e69]:
