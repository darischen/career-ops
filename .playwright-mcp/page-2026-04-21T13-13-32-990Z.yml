            - heading "Software Engineer, Full Stack" [level=1] [ref=e14]
            - generic [ref=e15]:
              - img [ref=e16]
              - generic [ref=e18]: San Francisco, CA • New York, NY • United States
          - button "Apply" [ref=e19] [cursor=pointer]
        - generic [ref=e20]:
          - paragraph [ref=e22]: Figma is growing our team of passionate creatives and builders on a mission to make design accessible to all. Figma’s platform helps teams bring ideas to life—whether you're brainstorming, creating a prototype, translating designs into code, or iterating with AI. From idea to product, Figma empowers teams to streamline workflows, move faster, and work together in real time from anywhere in the world. If you're excited to shape the future of design and collaboration, join us!
          - generic [ref=e25]:
            - generic [ref=e26]: As a Full Stack Engineer, you’ll have the opportunity to build both the products and the platforms that empower millions of users—from startups to Fortune 500 companies—to create and collaborate in real time. Whether you’re designing core features, improving developer workflows, scaling enterprise infrastructure, or launching entirely new products, your work will directly shape the future of how teams bring ideas to life. You’ll take on complex technical challenges across the stack, building intuitive user experiences, optimizing performance in real-time collaborative systems, and designing secure, reliable, and scalable systems to support Figma’s rapid growth and global expansion.
            - generic [ref=e28]: Our engineers are highly cross-functional, partnering closely with Product, Design, Research, and Data to deliver best-in-class experiences. If you’re excited to work across the stack, push the boundaries of product development, and help scale the systems that power Figma, we’d love for you to join us.
            - generic [ref=e30]: This opportunity applies to openings at varying seniority levels across our teams, including but not limited to Figma Editor, FigJam, Figma Slides, Figma Sites, Figma Buzz, Growth & Monetization, Internal Tools, and our cross-product Foundations team. We’ll discuss more specifics about open roles during the interview process.
            - generic [ref=e32]: This is a full-time role that can be held from one of our US hubs or remotely in the United States.
            - strong [ref=e34]: "What you’ll do at Figma:"
            - list [ref=e35]:
              - listitem [ref=e36]: Design, build, and ship high-quality features across the stack, from polished front-end experiences to scalable back-end systems
              - listitem [ref=e37]: Contribute to both new product development and improvements to established products, balancing user experience craft with performance and architecture quality
              - listitem [ref=e38]: Own projects end-to-end — ideation, technical design, implementation, testing, launch, and iteration
              - listitem [ref=e39]: Collaborate with cross-functional partners in Product, Design, Research, and Data to shape product direction and strategy
              - listitem [ref=e40]: Operate, monitor, and continuously improve the systems you build, with a strong focus on reliability, security, and scalability
              - listitem [ref=e41]: Mentor teammates, contribute to team culture, and share knowledge through code reviews, design critiques, and pairing
            - strong [ref=e42]: "We’d love to hear from you if you have:"
            - list [ref=e43]:
              - listitem [ref=e44]: Proven experience in shipping and maintaining full-stack applications in production
              - listitem [ref=e45]: Strong proficiency in modern front-end frameworks (e.g., React/TypeScript) and back-end technologies (e.g., Ruby, Python, Go, C++, PostgreSQL)
              - listitem [ref=e46]: A product mindset, with the ability to translate user needs into scalable technical solutions
              - listitem [ref=e47]: Excellent collaboration and communication skills, with experience working effectively across cross-functional teams
              - listitem [ref=e48]: Passion for engineering craft and building polished, maintainable, and scalable systems
            - strong [ref=e49]: "While not required, it’s an added plus if you also have:"
            - list [ref=e50]:
              - listitem [ref=e51]: Experience leading large-scale projects or launching 0→1 products
              - listitem [ref=e52]: Familiarity with C++ and WebAssembly in user-facing applications
              - listitem [ref=e53]: Background in areas such as growth engineering, developer tooling, billing and payments infrastructure, or extensibility platforms (plugins, APIs, widgets)
              - listitem [ref=e54]: Exposure to technologies like Stripe, Salesforce, Snowflake, SCIM, SAML, or experimentation and observability tooling
              - listitem [ref=e55]: A passion for mentoring peers and helping shape engineering culture
            - generic [ref=e58]: At Figma, one of our values is Grow as you go. We believe in hiring smart, curious people who are excited to learn and develop their skills. If you’re excited about this role but your past experience doesn’t align perfectly with the points outlined in the job description, we encourage you to apply anyways. You may be just the right candidate for this or other roles.
          - generic [ref=e60]:
            - generic [ref=e63]:
              - paragraph [ref=e64]:
                - strong [ref=e65]: Pay Transparency Disclosure
              - paragraph [ref=e66]: If based in Figma’s San Francisco or New York hub offices, this role has the annual base salary range stated below.
              - paragraph [ref=e67]: Job level and actual compensation will be decided based on factors including, but not limited to, individual qualifications objectively assessed during the interview process (including skills and prior relevant experience, potential impact, and scope of role), market demands, and specific work location. The listed range is a guideline, and the range for this role may be modified. For roles that are available to be filled remotely, the pay range is localized according to employee work location by a factor of between 80% and 100% of range. Please discuss your specific work location with your recruiter for more information.
              - paragraph [ref=e68]: Figma offers equity to employees, as well a competitive package of additional benefits, including health, dental & vision, retirement with company contribution, parental leave & reproductive or family planning support, mental health & wellness benefits, generous PTO, company recharge days, a learning & development stipend, a work from home stipend, and cell phone reimbursement. Figma also offers sales incentive pay for most sales roles and an annual bonus plan for eligible non-sales roles. Figma’s compensation and benefits are subject to change and may be modified in the future.
            - paragraph [ref=e69]: "Annual Base Salary Range:"
            - paragraph [ref=e70]: $153,000 - $376,000 USD
          - generic [ref=e71]:
            - paragraph [ref=e72]:
              - text: At Figma we celebrate and support our differences. We know employing a team rich in diverse thoughts, experiences, and opinions allows our employees, our product and our community to flourish. Figma is an
              - link "equal opportunity workplace" [ref=e73] [cursor=pointer]:
                - /url: https://www.eeoc.gov/sites/default/files/2022-10/EEOC_KnowYourRights_screen_reader_10_20.pdf
              - text: "- we are dedicated to equal employment opportunities regardless of race, color, ancestry, religion, sex, national origin, sexual orientation, age, citizenship, marital status, disability, gender identity/expression, veteran status"
              - strong [ref=e74]: ","
              - text: or any other characteristic protected by law. We also consider qualified applicants regardless of criminal histories, consistent with legal requirements.
            - paragraph [ref=e75]:
              - text: We will work to ensure individuals with disabilities are provided reasonable accommodation to apply for a role, participate in the interview process, perform essential job functions, and receive other benefits and privileges of employment. If you require accommodation, please reach out to
              - link "accommodations-ext@figma.com" [ref=e76] [cursor=pointer]:
                - /url: mailto:accommodations-ext@figma.com
              - text: . These modifications enable an individual with a disability to have an equal opportunity not only to get a job, but successfully perform their job tasks to the same extent as people without disabilities.
            - paragraph [ref=e77]: "Examples of accommodations include but are not limited to:"
            - list [ref=e78]:
              - listitem [ref=e79]: Holding interviews in an accessible location
              - listitem [ref=e80]: Enabling closed captioning on video conferencing
              - listitem [ref=e81]: Ensuring all written communication be compatible with screen readers
              - listitem [ref=e82]: Changing the mode or format of interviews
            - paragraph [ref=e83]: To ensure the integrity of our hiring process and facilitate a more personal connection, we require all candidates keep their cameras on during video interviews. Additionally, if hired you will be required to attend in person onboarding.
            - paragraph [ref=e84]:
              - text: By applying for this job, the candidate acknowledges and agrees that any personal data contained in their application or supporting materials will be processed in accordance with
              - link "Figma's Candidate Privacy Notice" [ref=e85] [cursor=pointer]:
                - /url: https://www.figma.com/legal/candidate-privacy-notice/
              - text: .
