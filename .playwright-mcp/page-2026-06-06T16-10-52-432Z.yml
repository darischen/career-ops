          - button [ref=e80] [cursor=pointer]:
            - generic [ref=e83]: Apply now
          - generic [ref=e85]: Meta is seeking a Product Operations Manager to join WhatsApp Product Operations and drive product quality, AI-powered automation, and operational excellence across WhatsApp surfaces. We are in the middle of a transformation, becoming an AI-driven, individual-contributor-led organization that scales through orchestration, deep product expertise, and technical excellence. Our team is building and operating autonomous agents that handle end-to-end workflows (triage, bug resolution, launches, dogfooding, evals) with minimal human intervention. If you're energized by owning complex quality programs end-to-end, building and operating AI-driven workflows, and driving measurable product improvements in a fast-paced environment, this role is for you. You will be responsible for investigating and communicating the quality of WhatsApp's products to engineering, product, design, and other cross-functional partners. You will own AI builds for collecting, generating, and triaging reported quality issues. Additionally, you will partner with product and engineering teams to implement process and tooling improvements focused on driving developer efficiency, resolution of issues, and improved product quality.
          - separator [ref=e86]
          - generic [ref=e87]:
            - heading [level=2] [ref=e88]: Product Operations Manager, AI Implementations - WhatsApp Responsibilities
            - list [ref=e89]:
              - generic [ref=e90]:
                - listitem [ref=e91]: Become an expert in the health and quality of WhatsApp's products, identifying trends, regressions, and user pain points through data analysis and hands-on product usage
                - listitem [ref=e92]: Own end-to-end product quality programs for your area, including launches, dogfooding, root cause analyses, severity incidents, and app health regressions automating first and operating with high reliability
                - listitem [ref=e93]: "Design, build, and operate autonomous AI agents and workflows for your product area: bug triage, prioritization, classification, deduplication, and resolution"
                - listitem [ref=e94]: Partner with engineering and product teams to drive resolution of high-priority issues and influence product roadmap based on quality insights
                - listitem [ref=e95]: Prepare communication materials and progress tracking for multiple audiences including delivering updates to leadership stakeholders
                - listitem [ref=e96]: Collect, analyze, and leverage data to identify quality trends and inform product decisions; build dashboards and metrics to drive data-driven decision making
                - listitem [ref=e97]: Build and maintain an evals practice for your area, ensuring AI solutions meet accuracy thresholds through LLM judges, labellers, and governance frameworks
                - listitem [ref=e98]: Assess and improve existing AI solutions within your scope, driving migration to standard platforms and partnering with AI Implementations leadership on scaling decisions
                - listitem [ref=e99]: Coordinate with cross-functional teams and Foundations partners to align on org-wide priorities and share best practices
                - listitem [ref=e100]: Design and operate AI workflows that comply with WhatsApp's data sensitivity guardrails, ensuring quality signals are collected and processed within encryption boundaries and privacy-first constraints
          - generic [ref=e101]:
            - heading [level=2] [ref=e102]: Minimum Qualifications
            - list [ref=e103]:
              - generic [ref=e104]:
                - listitem [ref=e105]: Bachelor's degree in a directly related field, or equivalent practical experience
                - listitem [ref=e106]: Experience building or deploying AI/ML solutions or automation in production workflows
                - listitem [ref=e107]: 5+ years of related strategy, operations, consulting, or data analyst experience
                - listitem [ref=e108]: Experience breaking down ambiguous issues into component parts to develop structured solutions
                - listitem [ref=e109]: Currently has, or is in the process of obtaining a Bachelor's degree in a directly related field, or equivalent practical experience. Degree must be completed prior to joining Meta
                - listitem [ref=e110]: Analytical experience using data to tell a story and influence product direction using intermediate to advanced SQL
                - listitem [ref=e111]: Ability to design AI workflows that operate effectively within WhatsApp's data sensitivity constraints, balancing quality signal collection with privacy-first principles and encryption guardrails
                - listitem [ref=e112]: Experience with WhatsApp or similar messaging/communication platforms, with understanding of mobile-first product behaviors, encryption, and multi-platform feature parity
                - listitem [ref=e113]: Strong communication skills with ability to influence multiple cross-functional stakeholders and senior leadership
          - generic [ref=e114]:
            - heading [level=2] [ref=e115]: Preferred Qualifications
            - list [ref=e116]:
              - generic [ref=e117]:
                - listitem [ref=e118]: Experience in product quality, QA, or technical program management
                - listitem [ref=e119]: Experience working with global/remote teams
                - listitem [ref=e120]: Familiarity with LLMs, AI agents, or ML evaluation frameworks
                - listitem [ref=e121]: Prior experience working on or with WhatsApp or comparable large-scale messaging products
                - listitem [ref=e122]: Experience operating in flat, individual-contributor-heavy org structures with high individual autonomy
                - listitem [ref=e123]: Demonstrated ability to integrate AI tools to optimize/redesign workflows and drive measurable impact (e.g., efficiency gains, quality improvements)
                - listitem [ref=e124]: Experience adhering to and implementing responsible, ethical AI practices (e.g., risk assessment, bias mitigation, quality and accuracy reviews)
                - listitem [ref=e125]: Demonstrated ongoing AI skill development (e.g., prompt/context engineering, agent orchestration) and staying current with emerging AI technologies
          - separator [ref=e126]
          - generic [ref=e127]:
            - heading [level=2] [ref=e128]: About Meta
            - generic [ref=e131]: Meta builds technologies that help people connect, find communities, and grow businesses. When Facebook launched in 2004, it changed the way people connect. Apps like Messenger, Instagram and WhatsApp further empowered billions around the world. Now, Meta is moving beyond 2D screens toward immersive experiences like augmented and virtual reality to help build the next evolution in social technology. People who choose to build their careers by building with us at Meta help shape a future that will take us beyond what digital connection makes possible today—beyond the constraints of screens, the limits of distance, and even the rules of physics.
