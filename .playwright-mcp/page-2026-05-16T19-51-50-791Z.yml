        - generic [ref=e22]:
          - paragraph [ref=e23]: CLEAR is building THE secure identity company of the future. Our mission is to make experiences safer and easier—physically and digitally. With more than 38 million Members and a growing network of partners across the world, CLEAR's secure identity platform is transforming the way people live, work, and travel. Whether it’s at the airport, stadium, or throughout your everyday life, CLEAR unlocks the magic of frictionless experiences.
          - paragraph [ref=e24]: Today, CLEAR is well-known as a leader in digital and biometric identification, reducing friction for our members wherever an ID check is needed. We’re looking for a Fullstack Software Engineer to help us build the next generation of products that will go beyond just ID and enable our members to leverage the power of a networked digital identity. As a Software Engineer at CLEAR, you will participate in the design, implementation, testing, and deployment of applications to build and enhance our platform- one that interconnects dozens of attributes and qualifications while keeping member privacy and security at the core.
          - separator [ref=e25]
          - paragraph [ref=e26]:
            - emphasis [ref=e28]: Level and specific team/role matching will happen at the end of our interview process.
          - paragraph [ref=e29]: "A brief highlight of our tech stack:"
          - list [ref=e30]:
            - listitem [ref=e31]: Java / Python / React / Typescript
            - listitem [ref=e32]: AWS cloud
          - paragraph [ref=e33]:
            - strong [ref=e35]:
              - emphasis [ref=e36]: "What you’ll do:"
          - list [ref=e37]:
            - listitem [ref=e38]: Advance our capabilities across a wide array of industries and domains and gain hands-on experience with privacy, security, data modeling and architecture
            - listitem [ref=e39]: Develop and deliver code across the full stack, driving engineering excellence by defining best practices in testing, documentation and observability
            - listitem [ref=e40]: Partner with product and other stakeholders to uncover requirements, to innovate, and to solve complex problems
            - listitem [ref=e41]: Have a strong sense of ownership, responsible for architectural decision-making and strive for continuous improvement in technology and processes at CLEAR
          - paragraph [ref=e42]:
            - strong [ref=e44]:
              - emphasis [ref=e45]: "What you’re great at:"
          - list [ref=e46]:
            - listitem [ref=e47]: 3+ years of fullstack software development experience in languages such as Java, Python, React, Typescript
            - listitem [ref=e48]: "Working with cloud-based application development, and be fluent in at least a few of:"
            - list [ref=e49]:
              - listitem [ref=e50]: Cloud service providers like AWS
              - listitem [ref=e51]: Containerization technologies like Docker and Kubernetes
              - listitem [ref=e52]: Collaboration, integration, and deployment tools like GitHub and Argo
            - listitem [ref=e53]: Articulating technical concepts to a mixed audience of technical and non-technical stakeholders
            - listitem [ref=e54]: Collaborating and mentoring less experienced members of the team
            - listitem [ref=e55]: Comfort with ambiguity
            - listitem [ref=e56]: Curiosity about technology, belief in constant learning, and ability to be autonomous to figure out what's important
          - paragraph [ref=e57]:
            - strong [ref=e59]:
              - emphasis [ref=e60]: "How You’ll be Rewarded:"
          - paragraph [ref=e61]: At CLEAR we help YOU move forward - because when you’re at your best, we’re at our best. You’ll work with talented team members who are motivated by our mission of making experiences safer and easier. In our offices, you’ll enjoy benefits like meals and snacks. We invest in your well-being and learning & development with our stipend and reimbursement programs.
          - paragraph [ref=e62]:
            - generic [ref=e63]: We offer holistic total rewards, including comprehensive healthcare plans, family building benefits (fertility and adoption/surrogacy support), flexible time off, free OneMedical memberships for you and your dependents, and a 401(k) retirement plan with employer match.
          - paragraph [ref=e64]: The total compensation range for this role is $180,000 - $220,000, depending on levels of skills and experience.
          - paragraph [ref=e65]: This range represents the combined base salary, and new hire equity package (in Restricted Stock Units) for this position at CLEAR. Additionally, this role will be eligible for refresh equity grants as part of our ongoing compensation program. Actual compensation will vary based on factors including, but not limited to, location, education, skills, experience, and performance. All stock based compensation will be subject to the terms and conditions of applicable agreements
          - paragraph [ref=e66]:
            - emphasis [ref=e68]: CLEAR provides reasonable accommodation to qualified individuals with disabilities or protected needs. Please let us know if you require a reasonable accommodation to apply for a job or perform your job. Examples of reasonable accommodation include, but are not limited to, time off, extra breaks, making a change to the application process or work procedures, policy exceptions, providing documents in an alternative format, live captioning or using a sign language interpreter, or using specialized equipment.
          - paragraph [ref=e69]:
            - emphasis [ref=e71]: We are committed to a transparent and secure hiring process. All communications related to this role will come directly from a CLEAR employee through valid CLEAR channels (e.g., a valid @clearme.com email address or verified CLEAR LinkedIn profile). We encourage candidates to remain alert to job scams and to report any suspicious activity.
