            - /url: http://www.fieldai.com
          - text: ’s Irvine team is where embodied AI meets real robots, real sensors, and real field deployments. Based in the heart of Southern California’s robotics ecosystem, we build risk-aware, reliable, field-ready AI systems that solve the hardest problems in robotics and unlock the full potential of embodied intelligence. If you want your work to ship, get tested on hardware, and improve through real deployments, Irvine is the place. We go beyond typical data-driven approaches or pure transformer-only architectures, combining rigorous engineering with learning systems proven in globally deployed solutions that deliver results today and get better every time our robots run in the field.
        - paragraph [ref=e34]: "As an Agentic AI/ML Engineer, you will build agentic solutions that turn FieldAI’s data and tooling into actionable support and insights. Your work has a dual focus: creating internal agents that accelerate engineering and operational workflows, and building customer-facing agentic experiences that help users gain insights from their deployments."
        - paragraph [ref=e35]: A critical foundation of this work is the AI Ops platform you will help build—developing core infrastructure for orchestration, tool integration, memory, evaluation, and observability. This is a hands-on engineering role where you will prototype, evaluate, and deploy agent-native solutions that directly multiply the impact of our teams, customers, and technology.
        - paragraph [ref=e36]: This role is critical to how we scale. As our fleet, customer base, and team continue to grow, the agentic solutions and AI Ops infrastructure you build will enable us to support more customers, surface deeper insights, and operate more efficiently without scaling headcount linearly. Your work will directly amplify the effectiveness of engineers, field teams, and customers, making this a high-impact opportunity to contribute to FieldAI's next phase of growth.
        - paragraph [ref=e37]: This is a fixed-term engineering role intended for early-career candidates, including recent graduates and engineers with up to approximately one year of professional experience. The initial engagement is expected to last 3–6 months, with the possibility of extension or conversion to a full-time position based on performance, business needs, and organizational priorities.
