            - generic [ref=e58]:
              - heading "Discover your future at Citi" [level=2] [ref=e59]
              - paragraph [ref=e60]: Working at Citi is far more than just a job. A career with us means joining a team of more than 230,000 dedicated people from around the globe. At Citi, you’ll have the opportunity to grow your career, give back to your community and make a real impact.
              - heading "Job Overview" [level=2] [ref=e61]
              - paragraph [ref=e62]: Engineer the future of global finance. At Citi, our Tech team doesn't just support finance—we are helping to redefine it. Every day, $5 trillion crosses through our network. We do business in 180+ countries operating at a scale few can match. From deploying advanced AI to helping shape global markets, we build systems that matter. Look to join a team where your work helps influence economies, your ideas can drive innovation and outcomes, and your growth is backed by mentorship, continuous learning, and flexibility with potential hybrid work opportunities. Help solve real-world challenges that touch millions and get the opportunity to build the future of finance with Citi Tech.
              - paragraph [ref=e63]: We provide you with the knowledge and skills you need to succeed... We're committed to teaching you the ropes. For individuals starting their careers, we offer a supportive environment. Here at Citi, internal development paths are intended to help you build a broad skillset and accelerate your career growth by gaining exposure to more than one team in Software Development. Our supportive environment will help you discover the best fit for your skills and long-term career goals at Citi.
              - paragraph [ref=e64]: Your time here will look like this... You will thrive in an agile software development environment, crafting high-quality, scalable software solutions leveraging cutting-edge technologies, including AI-powered coding tools. Translating business requirements into robust code, you'll ensure adherence to stringent quality standards and provide essential support through testing cycles and post-production deployment.
              - paragraph [ref=e65]: "To deliver systems at the enterprise-level that are high quality, scalable, and resilient, you will skillfully utilize advanced tools for code testing and debugging, while learning from top technologists through design sessions and peer code reviews. Furthermore, you'll benefit from a comprehensive support system: you'll join a cohort of new hires, embarking on a shared journey to master our company culture, tools, processes, and the technical proficiencies vital to your success."
              - paragraph [ref=e66]: "While technologies may vary across teams, and AI tooling is rapidly evolving, developers will gain exposure to a wide range of technologies and tools across all aspects of the SDLC:"
              - paragraph [ref=e67]: "Back-End Microservices Development: Java, Spring Framework"
              - paragraph [ref=e68]: "Mobile Development:"
              - paragraph [ref=e69]: "iOS: Swift, Xcode, MVC Architecture"
              - paragraph [ref=e70]: "Android: Android Studio, JavaScript, CSS, AJAX, Java Web Services"
              - paragraph [ref=e71]: "Front-End Web Development: React or Angular, Apigee TypeScript, HTML5"
              - paragraph [ref=e72]: "Generative AI & AI Agents: Prompt Engineering, Workflow Design, and GenAI Optimization"
              - paragraph [ref=e73]: "Tools & Platforms: GitHub Copilot (multiple models), Citi Squad (automated code reviews), Devin.AI (agentic code generation), Stylus Workspaces (in‑house Gemini)"
              - paragraph [ref=e74]: "Large Language Models (LLMs): Gemini, OpenAI, Claude, Llama, Local Models"
              - paragraph [ref=e75]: "Frameworks: LangChain, LlamaIndex, Hugging Face"
              - paragraph [ref=e76]: "Orchestration: LangGraph, Multi-Agent Systems"
              - paragraph [ref=e77]: "Development Languages: Java, PythonFastAPI"
              - paragraph [ref=e78]: "Retrieval-Augmented Generation (RAG): PostgreSQL, Vector DBs, Advanced Retrieval"
              - paragraph [ref=e79]: "ML/DL Frameworks: PyTorch, TensorFlow, Fine-tuning"
              - paragraph [ref=e80]: "Deployment: Enterprise DevOps Pipeline, Docker, Monitoring Tooling"
              - paragraph [ref=e81]: "Data Analytics: Utilizing tools like Splunk, Tableau, and Adobe Analytics to track customer journey adoption and measure the business value of delivered products."
              - paragraph [ref=e82]: "As an individual contributor, you can expect exposure to:"
              - list [ref=e83]:
                - listitem [ref=e84]:
                  - paragraph [ref=e85]: "Gen AI Strategy & Cloud Deployment: Contributing to the adoption and deployment of cutting-edge Generative AI models and solutions on diverse cloud providers such as AWS, leveraging specialized AI/ML services for scalable and efficient inference. This includes advanced AI engineering practices to optimize model performance and reliability."
                - listitem [ref=e86]:
                  - paragraph [ref=e87]: "Engineering Excellence (AI/MLOps): Adhering to and implementing Citi's Minimum Development Standards and Minimum Operational Standards, with a strong focus on applying MLOps best practices, ethical AI guidelines, and responsible AI development principles, particularly for managing the lifecycle of Generative AI agents."
                - listitem [ref=e88]:
                  - paragraph [ref=e89]: "Architectural Patterns (Gen AI Focus): Exploring and applying the latest design and software architecture patterns and frameworks, including advanced Gen AI model architectures (e.g., Transformers, GANs), prompt engineering patterns, scalable inference solutions, Microservices, APIs, Spring Core/MVC/Boot/Cloud, and RESTful services. This includes designing and building agentic flows for complex business processes."
                - listitem [ref=e90]:
                  - paragraph [ref=e91]: "CI/CD & Gen AI Development Tools: Gaining exposure to various software development tools within Continuous Integration/Continuous Delivery pipelines, such as JIRA, Zephyr, GitHub, Harness, Artifactory, MLOps platforms, model versioning tools, AI-specific testing frameworks, and container orchestration platforms like OpenShift."
                - listitem [ref=e92]:
                  - paragraph [ref=e93]: "Event Streaming & Messaging (AI Data Pipelines): Working with event streaming and messaging systems, including Kafka, Flink, Solace, or similar technologies, specifically for real-time data ingestion for Gen AI model training, fine-tuning, and inference."
                - listitem [ref=e94]:
                  - paragraph [ref=e95]: "Containerization (AI Model Deployment): Hands-on experience with container technologies like Docker and Kubernetes for scalable and reproducible deployment of Gen AI models and related microservices."
              - paragraph [ref=e96]: "No matter your team placement, you can expect:"
              - list [ref=e97]:
                - listitem [ref=e98]:
                  - paragraph [ref=e99]: "Global Gen AI Exposure: Work on globally scoped Generative AI projects with cross-functional teams, gaining invaluable insights into how this transformative technology is reshaping the financial sector worldwide."
                - listitem [ref=e100]:
                  - paragraph [ref=e101]: "Continuous Learning & AI Advancement: Benefit from structured learning paths, extensive networking opportunities, mentorship, and development designed to sharpen your technical prowess in Generative AI, enhance your business acumen, and cultivate your leadership skills, staying abreast of the latest advancements in AI research and technologies. This includes gaining expertise in building agents on our proprietary ARC platform."
                - listitem [ref=e102]:
                  - paragraph [ref=e103]: "Real Impact with AI: Contribute to real-world projects that shape the future of banking, from developing cutting-edge Generative AI solutions and intelligent automation to strengthening cybersecurity defenses and driving data-powered innovations."
              - paragraph [ref=e104]: We want to hear from you if... We are actively seeking individuals with a profound passion for technology, especially Generative AI, and an unwavering drive to make a significant difference.
              - paragraph [ref=e105]: "To join Citi, you should meet the following criteria:"
              - list [ref=e106]:
                - listitem [ref=e107]:
                  - paragraph [ref=e108]: "Educational Background: Bachelor's degree in a technology-related discipline (e.g., Computer Science, Computer Engineering, Information Technology, MIS) with a specialization or strong coursework in Artificial Intelligence, Machine Learning, Data Science, or equivalent hands-on experience."
                - listitem [ref=e109]:
                  - paragraph [ref=e110]: "Work Authorization: Authorized to work in the United States without the need for employer sponsorship, now OR in the future."
                - listitem [ref=e111]:
                  - paragraph [ref=e112]: "Problem-Solving Acumen (AI-driven): A proactive problem-solver who thrives on innovation and embraces challenges with enthusiasm, leveraging Generative AI to address complex business problems and create novel solutions."
                - listitem [ref=e113]:
                  - paragraph [ref=e114]: "Global Mindset: Possess a global outlook and a strong willingness to collaborate effectively across diverse cultures and time zones, understanding the global implications of AI development."
                - listitem [ref=e115]:
                  - paragraph [ref=e116]: "Communication & Leadership: Demonstrate excellent communication skills, project management capabilities, leadership potential, keen attention to detail, and the ability to excel within diverse teams, particularly in articulating complex AI concepts."
                - listitem [ref=e117]:
                  - paragraph [ref=e118]: "Technical Proficiency (Gen AI): Capable of successfully passing technical interviews, including basic algorithmic programming exercises, with demonstrated proficiency in Generative AI frameworks (e.g., TensorFlow, PyTorch, Hugging Face), model development, prompt engineering, and understanding of AI architecture. Strong experience in AI engineering, particularly in building agentic flows and building agents on our proprietary ARC platform, is highly valued."
                - listitem [ref=e119]:
                  - paragraph [ref=e120]: "Collaboration & Adaptability: Must be collaborative and adaptable, with prior experience working on agile teams being highly desirable, especially in a fast-paced environment delivering AI solutions."
              - paragraph [ref=e121]: "Who we think will be a great fit... A steadfast dedication to continuous learning in Generative AI and a genuine passion for applying AI in business are paramount. As global industries continue to evolve, we are seeking professionals who bring a global perspective to the future of banking and are eager to make an impact at the corporate level using AI. We champion diversity, and we expect you to share that value. This role is ideally suited for individuals who:"
              - paragraph [ref=e122]: Are ambitious, with a relentless drive to succeed in a fast-paced, dynamic environment.
              - paragraph [ref=e123]: Are inherently curious about how Generative AI can revolutionize finance and are eager to be at the forefront of this transformation.
              - paragraph [ref=e124]: Aspire to grow into a future Gen AI leader, combining a passion for AI with its strategic application within the global financial industry.
              - paragraph [ref=e125]:
