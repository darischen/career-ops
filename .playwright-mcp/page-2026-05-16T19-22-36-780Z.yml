          - generic [ref=e21]:
            - heading "About Hightouch" [level=1] [ref=e22]
            - paragraph [ref=e23]: Hightouch is an Agentic Marketing Platform powered by the industry-leading Composable CDP. With complete brand context, customer data, and performance history in one place, every marketer finally has the power to build and ship end-to-end campaigns themselves. Teams move faster, stay on brand, and get AI marketing that actually works.
            - paragraph [ref=e24]: Founded in 2019 and headquartered in San Francisco, Hightouch enables marketing teams to analyze performance, brainstorm ideas, and generate creative at a speed and quality that wasn't previously possible.
            - paragraph [ref=e25]: Named a Leader in the 2026 Gartner® Magic Quadrant™ for Customer Data Platforms, Hightouch is trusted by leading enterprises like Domino's, Spotify, Aritzia, Cars.com, Ramp, and PetSmart.
            - paragraph [ref=e26]: At Hightouch, our mission is to help our customers leverage data and AI to grow their businesses. The team is ambitious, impact-driven, efficient — and we believe humility, kindness, and compassion are essential to our success. If you're energized by velocity, obsessed with raising the bar, and want to build alongside people who care deeply about each other and our customers, we'd love to meet you.
          - generic [ref=e27]:
            - heading "About the Role" [level=2] [ref=e28]:
              - strong [ref=e29]: About the Role
            - paragraph [ref=e30]:
              - text: We’re looking to add a
              - strong [ref=e31]: product-minded AI engineer
              - text: to the team. The ideal candidate will have strong customer and product thinking, and the ability to be highly creative with LLM applications. We are looking for someone who can both rapidly prototype and architect production LLM pipelines.
            - paragraph [ref=e32]: "Example workstreams include:"
            - list [ref=e33]:
              - listitem [ref=e34]: Quickly iterating and developing proofs of concept (POCs) to explore the maximum potential of integrating AI into data and marketing workflows
              - listitem [ref=e35]: Making key decisions about the choice of AI architecture and frameworks
              - listitem [ref=e36]: Building production data agents that can make use of a company’s data to seamlessly answer analytics and data science questions about their users and marketing efforts
              - listitem [ref=e37]: Developing a deep understanding of user workflows to create seamless AI-assisted user experiences
            - paragraph [ref=e38]: We're seeking talented, intellectually curious, and motivated individuals interested in exploring the forefront of AI. While no prior experience with LLMs and AI is required, strong technical skills, particularly in backend architecture, and product intuition are essential for understanding and executing these projects from start to finish.
            - paragraph [ref=e39]: This is a senior role, but we focus on impact and potential for growth more than years of experience. The salary range for this position is $180,000 - $320,000 USD per year, which is location independent in accordance with our remote-first policy.
            - heading "Interview Process" [level=2] [ref=e40]
            - paragraph [ref=e41]: "Our interview process focuses on evaluating fit for the most important dimensions of the role: product sense and creativity with LLMs, ability to architect backend systems, and alignment with Hightouch’s values. Notably, we don’t do any programming interviews as we believe they are low signal to noise and aren’t a good evaluation mechanism."
            - list [ref=e42]:
              - listitem [ref=e43]:
                - strong [ref=e44]: "Recruiter Screen [30m]:"
                - text: Introductory call with our recruiting team to get to know each other and see if the role could be a good mutual fit.
              - listitem [ref=e45]:
                - strong [ref=e46]: "System Design Screen [60m]:"
                - text: Designing a data processing feature end-to-end.
              - listitem [ref=e47]:
                - strong [ref=e48]: "Hiring Manager Interview [30m]:"
                - text: Chat with hiring manager about past experiences and future operating preferences to assess fit on company values and operating principles.
              - listitem [ref=e49]:
                - strong [ref=e50]: "Agent Building Systems Interview [75m]:"
                - text: Work with the interviewer to architect an agentic system at a conceptual level. The problem will be at a pretty high level - and have both product and customer requirements as well as technical.
            - paragraph [ref=e51]: We have limited inbound applications to one application per candidate. You will be auto-rejected if you apply to multiple roles. Please only apply to the position you are most qualified for.
            - paragraph [ref=e52]
