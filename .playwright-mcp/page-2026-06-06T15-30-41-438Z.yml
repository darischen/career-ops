        - heading "Description" [level=2] [ref=e79]
        - generic [ref=e80]:
          - paragraph [ref=e81]:
            - strong [ref=e82]: "About Pinterest:"
          - paragraph [ref=e83]: Millions of people around the world come to our platform to find creative ideas, dream about new possibilities and plan for memories that will last a lifetime. At Pinterest, we’re on a mission to bring everyone the inspiration to create a life they love, and that starts with the people behind the product.
          - paragraph [ref=e84]:
            - text: Discover a career where you ignite innovation for millions, transform passion into growth opportunities, celebrate each other’s unique experiences and embrace the
            - link "flexibility" [ref=e85] [cursor=pointer]:
              - /url: https://www.pinterestcareers.com/our-life/pinflex/
            - text: to do your best work. Creating a career you love? It’s Possible.
          - paragraph [ref=e86]: At Pinterest, AI isn't just a feature, it's a powerful partner that augments our creativity and amplifies our impact, and we’re looking for candidates who are excited to be a part of that. To get a complete picture of your experience and abilities, we’ll explore your foundational skills and how you collaborate with AI.
          - paragraph [ref=e87]:
            - text: Through our interview process, what matters most is that you can always explain your approach, showing us not just what you know, but how you think. You can read more about our AI interview philosophy and how we use AI in our recruiting process
            - link "here" [ref=e88] [cursor=pointer]:
              - /url: https://www.pinterestcareers.com/our-philosophy-on-ai-in-hiring/
            - text: .
        - paragraph [ref=e89]: We are looking for inquisitive, well-rounded Backend engineers to join our Monetization engineering teams. Working closely with product managers, designers, data scientists, and backend engineers, you’ll play an important role in enabling the newest technologies and experiences as we scale and evolve. You will build robust frameworks & features. You will accelerate velocity for one of the world’s largest public cloud workloads. You will empower both developers and Pinners alike. You’ll have the opportunity to find creative solutions to thought-provoking problems. Even better, because we covet the kind of courageous thinking that’s required in order for big bets and smart risks to pay off, you’ll be invited to create and drive new initiatives, seeing them from inception through to technical design, implementation, and release.
        - paragraph [ref=e90]:
          - strong [ref=e91]: "What you’ll do:"
        - list [ref=e92]:
          - listitem [ref=e93]: • Build out the backend for Pinner-facing features to power the future of inspiration on Pinterest
          - listitem [ref=e94]: • Contribute to and lead each step of the product development process, from ideation to implementation to release; from rapidly prototyping, running A/B tests, to architecting and building solutions that can scale to support millions of users
          - listitem [ref=e95]: • Partner with design, product, and backend teams to build end-to-end functionality
          - listitem [ref=e96]: • Put on your Pinner hat to suggest new product ideas and features
          - listitem [ref=e97]: • Employ automated testing to build features with a high degree of technical quality, taking responsibility for the components and features you develop
          - listitem [ref=e98]: • Grow as an engineer by working with world-class peers on varied and high impact projects
          - listitem [ref=e99]: • Design, develop, and operate large scale, distributed systems and networks
          - listitem [ref=e100]: • Work with Engineering customers to understand new requirements and address them in a scalable and efficient manner
          - listitem [ref=e101]: • Actively work to improve the developer process and experience in all phases from coding to operation
        - paragraph [ref=e102]:
          - strong [ref=e103]: "What we’re looking for:"
        - list [ref=e104]:
          - listitem [ref=e105]: • 1+ years of industry backend development experience, building consumer or business facing products
          - listitem [ref=e106]: • Proficiency in common backend tech stacks for RESTful API, online service, storage, caching and data processing
          - listitem [ref=e107]: • Experience building & operating large scale distributed systems and/or networks. Bonus points if you enjoy deploying and operating large scale workloads on a public cloud footprint
          - listitem [ref=e108]: • Experience in Python, Java, C++, or Go or another language and a willingness to learn
          - listitem [ref=e109]: • Experience in following best practices in writing reliable and maintainable code that may be used by many other engineers
          - listitem [ref=e110]: • Ability to keep up-to-date with new technologies to understand what should be incorporated
          - listitem [ref=e111]: • Strong collaboration and communication skills
          - listitem [ref=e112]: • Bachelor’s/Master’s degree in a relevant field such as Computer Science, or equivalent experience
        - paragraph [ref=e113]:
          - strong [ref=e114]: "Relocation Statement:"
        - list [ref=e115]:
          - listitem [ref=e116]:
            - text: • This position is not eligible for relocation assistance. Visit our
            - link "PinFlex" [ref=e117] [cursor=pointer]:
              - /url: https://www.pinterestcareers.com/pinflex/
            - text: page to learn more about our working model.
        - paragraph [ref=e118]:
          - strong [ref=e119]: "In-Office Requirement Statement:"
        - list [ref=e120]:
          - listitem [ref=e121]: • We let the type of work you do guide the collaboration style. That means we're not always working in an office, but we continue to gather for key moments of collaboration and connection.
          - listitem [ref=e122]: • This role will need to be in the office for in-person collaboration [1x per week] and therefore needs to be in a commutable distance from one of the following offices in Seattle.
        - paragraph [ref=e123]: "#LI-HYBRID"
