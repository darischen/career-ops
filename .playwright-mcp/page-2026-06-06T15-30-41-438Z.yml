                    - generic [ref=f16e185]:
                      - paragraph [ref=f16e186]: Individuals seeking employment at this company are considered without regards to race, color, religion, national origin, age, sex, marital status, ancestry, physical or mental disability, veteran status, gender identity, sexual orientation, or any other protected characteristic. You are being given the opportunity to provide the following information in order to help us better understand the demographics of our applicant pools.
                      - paragraph [ref=f16e187]: Completion of the form is entirely voluntary. Whatever your decision, it will not be considered in the hiring process or thereafter. Any information that you do provide will be recorded and maintained in a separate confidential file that will only be accessed by those working on inclusion efforts at Pinterest.
                      - paragraph [ref=f16e188]
                      - heading "We’re looking for all kinds of people." [level=4] [ref=f16e189]:
                        - strong [ref=f16e190]: We’re looking for all kinds of people.
                      - paragraph [ref=f16e191]: To build an app that’s used and loved by people all around the world, we need a team with all kinds of different perspectives, experiences and backgrounds.
                      - paragraph [ref=f16e192]: "To put it legally: Pinterest is an equal opportunity employer and makes employment decisions on the basis of merit. We want to have the best qualified people in every job. Pinterest policy prohibits unlawful discrimination based on race, color, religion or religious creed, sex (including pregnancy, childbirth, or related medical conditions), sexual orientation, gender, gender identity, gender expression, age, marital status, status as a protected veteran, physical or mental disability, medical condition, genetic information or characteristics (or those of a family member), or any other consideration made unlawful by applicable federal, state, or local laws. It also prohibits discrimination based on a perception that anyone has any of those characteristics, or is associated with a person who has or is perceived as having any of those characteristics. All such discrimination is unlawful. Pinterest is committed to compliance with all applicable laws providing equal opportunity employment opportunities. This commitment applies to all persons involved in the operations of Pinterest and prohibits unlawful discrimination by any employee of Pinterest."
                      - paragraph [ref=f16e193]:
                        - generic [ref=f16e194]:
                          - text: Pinterest is committed to providing reasonable accommodations for qualified individuals with disabilities and disabled veterans in our job application procedures. If you require a medical or religious accommodation during the job application process, please complete
                          - link "this form" [ref=f16e195] [cursor=pointer]:
                            - /url: https://forms.gle/sS24D4WboEKUZMQK6
                          - text: for support.
                      - paragraph [ref=f16e196]: Pinterest will consider qualified applicants with arrest and conviction records for positions in accordance with the San Francisco Fair Chance Ordinance, the Los Angeles Fair Chance Ordinance, and other applicable state or local laws.
                      - paragraph [ref=f16e197]:
                        - text: Pinterest also participates in the E-Verify program in certain locations, as required by law. See
                        - link "https://www.e-verify.gov/sites/default/files/everify/posters/EVerifyParticipationPoster.pdf" [ref=f16e198] [cursor=pointer]:
                          - /url: https://www.e-verify.gov/sites/default/files/everify/posters/EVerifyParticipationPoster.pdf
                        - text: and
                        - link "https://www.e-verify.gov/sites/default/files/everify/posters/IER_RighttoWorkPoster.pdf" [ref=f16e199] [cursor=pointer]:
                          - /url: https://www.e-verify.gov/sites/default/files/everify/posters/IER_RighttoWorkPoster.pdf
                      - paragraph [ref=f16e200]: "-----------------------------------------------------------------------------------------------------------------------------"
                      - heading "Veteran Status" [level=3] [ref=f16e201]:
                        - strong [ref=f16e202]: Veteran Status
                      - paragraph [ref=f16e203]:
                        - strong [ref=f16e204]: Why Are You Being Asked to Complete This Form?
                      - paragraph [ref=f16e205]: This employer is a Government contractor subject to the Vietnam Era Veterans' Readjustment Assistance Act of 1974, as amended by the Jobs for Veterans Act of 2002, 38 U.S.C. 4212 (VEVRAA). VEVRAA requires Government contractors to take affirmative action to employ and advance in employment protected veterans. To help us measure the effectiveness of our outreach and recruitment efforts of veterans, we are asking you to tell us if you are a veteran covered by VEVRAA. Completing this form is completely voluntary, but we hope you fill it out. Any answer you give will be kept private and will not be used against you in any way.
                      - paragraph [ref=f16e206]:
                        - generic [ref=f16e207]:
                          - text: For more information about this form or the equal employment obligations of Federal contractors, visit the U.S. Department of Labor’s Office of Federal Contract Compliance Programs (OFCCP) website at
                          - link "www.dol.gov/ofccp" [ref=f16e208] [cursor=pointer]:
                            - /url: http://www.dol.gov/ofccp
                          - text: .
                      - heading "How Do You Know If You Are a Veteran Protected by VEVRAA?" [level=4] [ref=f16e209]:
                        - strong [ref=f16e210]: How Do You Know If You Are a Veteran Protected by VEVRAA?
                      - paragraph [ref=f16e211]: Contrary to the name, VEVRAA does not just cover Vietnam Era veterans. It covers several categories of veterans from World War II, the Korean conflict, the Vietnam era, and the Persian Gulf War which is defined as occurring from August 2, 1990 to the present.
                      - paragraph [ref=f16e212]:
                        - text: If you believe you belong to any of the categories of protected veterans please indicate by checking the appropriate box below. The categories are defined on the next page and explained further in an “
                        - link "Am I a Protected Veteran?" [ref=f16e213] [cursor=pointer]:
                          - /url: https://www.dol.gov/agencies/ofccp/veterans/protected-veterans
                        - text: ” infographic provided by OFCCP.
                      - paragraph [ref=f16e214]
                      - heading "Disability Status" [level=3] [ref=f16e215]:
                        - strong [ref=f16e216]: Disability Status
                      - paragraph [ref=f16e217]: Form CC-305
                      - paragraph [ref=f16e218]: OMB Control Number 1250-0005
                      - paragraph [ref=f16e219]: Expires 05/31/2026
                      - paragraph [ref=f16e220]:
                        - strong [ref=f16e221]: Why are you being asked to complete these questions?
                      - paragraph [ref=f16e222]: We are a federal contractor or subcontractor required by law to provide equal employment
                      - paragraph [ref=f16e223]:
                        - text: opportunity to qualified people with disabilities. We are also required to measure our progress toward having at least 7% of our workforce be individuals with disabilities. To do this, we must ask applicants and employees if they have a disability or have ever had a disability. Because a person may become disabled at any time, we ask all of our employees to update their information at least every five years. Identifying yourself as an individual with a disability is voluntary, and we hope that you will choose to do so. Your answer will be maintained confidentially and not be seen by selecting officials or anyone else involved in making personnel decisions. Completing the form will not negatively impact you in any way, regardless of whether you have self-identified in the past. For more information about this form or the equal employment obligations of federal contractors under Section 503 of the Rehabilitation Act, visit the U.S. Department of Labor’s Office of Federal Contract Compliance Programs (OFCCP) website at
                        - link "www.dol.gov/ofccp" [ref=f16e224] [cursor=pointer]:
                          - /url: http://www.dol.gov/ofccp
                        - text: .
                      - paragraph [ref=f16e225]:
                        - strong [ref=f16e226]: How do you know if you have a disability?
                      - paragraph [ref=f16e227]: "You are considered to have a disability if you have a physical or mental impairment or medical condition that substantially limits a major life activity, or if you have a history or record of such an impairment or medical condition. Disabilities include, but are not limited to:"
                      - list [ref=f16e228]:
                        - listitem [ref=f16e229]: "Autoimmune disorder, for example: lupus, fibromyalgia, rheumatoid arthritis, or HIV/AIDS"
                        - listitem [ref=f16e230]: "Nervous system condition, for example: migraine headaches, Parkinson’s disease, or Multiple sclerosis (MS)"
                        - listitem [ref=f16e231]: "Psychiatric condition, for example: bipolar disorder, schizophrenia, PTSD, or major depression"
                        - listitem [ref=f16e232]: "Gastrointestinal disorders, for example: Crohn's Disease, or irritable bowel syndrome"
                        - listitem [ref=f16e233]: Depression or anxiety
                        - listitem [ref=f16e234]: Blind or low vision
                        - listitem [ref=f16e235]: Diabetes
                        - listitem [ref=f16e236]: Cancer
