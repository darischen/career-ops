          - text: Federal Reserve Bank of Atlanta
          - paragraph [ref=e100]
          - paragraph [ref=e101]
          - text: Federal Reserve Financial Services (FRFS) delivers a suite of payments services to financial institutions via FedLine® Solutions, Fedwire® Funds and Securities, the National Settlement Service (NSS), FedCash®1, FedACH®, Check Services, and the FedNow® Service. FRFS operates as a fully integrated organization with groups dedicated to customer experience, operations, technology, product and customer/industry management, enterprise services, payments system improvement, and one focused on the ongoing growth and development of the FedNow instant payment service. Our strategy defines our future direction, seeking to offer a fully integrated product suite that provides speed, resilience, and choice in meeting the payments needs of FRFS customers across the United States. Through our Enterprise structure, we strive to meet the needs of the marketplace for new products and services with speed and agility, seek to provide a robust and unified customer experience, and work to create career growth opportunities for FRFS staff.
          - text: The FRFS Enterprise operates with a customer-first mindset, comprised of team members seeking to do the best work of their careers in pursuit of our important central bank mission.
          - text: "Onsite Work Expectations: The Bank believes in flexibility to balance the demands of work and life while also recognizing the necessity of connecting and collaborating with our colleagues in person. Onsite work is an essential function of this position, and you are required to be onsite according to the schedule set by your management."
          - paragraph [ref=e102]
          - paragraph [ref=e103]
          - paragraph [ref=e104]: This position is located in Minneapolis, MN or New York City, NY and has an, on-site requirement that must be fulfilled in one of the Federal Reserve System banks.
          - paragraph [ref=e105]
          - paragraph [ref=e106]: "Key Activities:"
          - paragraph [ref=e107]: "We are looking for an entry-level developer to join our automation team to automate operational processes. Responsibilities for this position include:"
          - list [ref=e108]:
            - listitem [ref=e109]:
              - paragraph [ref=e110]: Working with subject matter experts to gather requirements for automation
            - listitem [ref=e111]:
              - paragraph [ref=e112]: Working with automation team to develop scripts using Ansible, Splunk, and Dynatrace
            - listitem [ref=e113]:
              - paragraph [ref=e114]: Maintaining automation documentation on standards, templates, and operational needs
            - listitem [ref=e115]:
              - paragraph [ref=e116]: Scheduling automated using Ansible Tower or similar software
            - listitem [ref=e117]:
              - paragraph [ref=e118]: Working with automation team to continually improve process, drive cost reduction activities and build domain knowledge
          - paragraph [ref=e119]: "Requirements:"
          - list [ref=e120]:
            - listitem [ref=e121]:
              - paragraph [ref=e122]: 0-2 years' experience for junior role | 3+ years for Software Engineer II level.
            - listitem [ref=e123]:
              - paragraph [ref=e124]: Typically requires 0-3 years web development experience
            - listitem [ref=e125]:
              - paragraph [ref=e126]: "1-3 years automation development using any automation software: Git, Scrum, and SDLC"
            - listitem [ref=e127]:
              - paragraph [ref=e128]: Prefer Python, Ansible, Splunk, and/or Dynatrace experience
            - listitem [ref=e129]:
              - paragraph [ref=e130]: AWS experience a plus
            - listitem [ref=e131]:
              - paragraph [ref=e132]: Typically requires an Associate's Degree in Information Technology or a related field
            - listitem [ref=e133]:
