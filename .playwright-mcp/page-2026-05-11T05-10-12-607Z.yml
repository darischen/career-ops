              - text: Graphite is growing rapidly, and
              - strong [ref=e53]: we're looking for a software engineer to help us define the company’s technical direction
              - text: . This person will
              - strong [ref=e54]: work up and down our stack
              - text: and
              - strong [ref=e55]: propose and lead new projects
              - text: .
            - paragraph [ref=e56]
            - paragraph [ref=e57]: Rethinking the way fast-moving eng teams write and review code every day is no small feat, and we believe that the best solutions are built when most talented, ambitious, and dedicated people from diverse backgrounds come together.
            - paragraph [ref=e58]
