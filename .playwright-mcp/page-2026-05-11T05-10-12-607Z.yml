              - strong [ref=e38]: modern code review for fast-moving teams
              - text: "- we help engineers"
              - strong [ref=e39]: write and review smaller pull requests, stay unblocked, and ship faster
              - text: .
            - paragraph [ref=e40]
            - paragraph [ref=e41]: Anyone can start using Graphite individually without needing their coworkers to change tools - we seamlessly sync code changes and reviews. We started Graphite because we missed internal code review tools like Phabricator (at Facebook) and Critique (Google) that help engineers create, approve, and ship small, incremental changes, and long-term we’re passionate about creating products & workflows that help fast-moving eng teams achieve more.
            - paragraph [ref=e42]
            - paragraph [ref=e43]:
              - strong [ref=e44]: Our company
            - paragraph [ref=e45]: Graphite is defining the future of code review and how high-quality software is built.
            - paragraph [ref=e46]: We believe great craft emerges through collaboration. That principle drives everything we build and the way we work.
            - paragraph [ref=e47]: If you’re excited about this next era of software development, there’s no better moment to do the most impactful work of your career.
            - paragraph [ref=e48]: Our culture centers on putting people first, applying science and craft, practicing disciplined ambition, and giving ownership - both literally (with equity) and in the responsibility and scope you’ll have as a part of our early team. Outside of work you’ll find us brewing espresso drinks, producing music, or practicing yoga. We can’t wait to see what you’ll add to the mix!
            - paragraph [ref=e49]
            - paragraph [ref=e50]:
