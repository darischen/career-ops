        - generic [ref=e21]:
          - generic [ref=e22]:
            - paragraph [ref=e23]: Cerebras Systems builds the world's largest AI chip, 56 times larger than GPUs. Our novel wafer-scale architecture provides the AI compute power of dozens of GPUs on a single chip, with the programming simplicity of a single device. This approach allows Cerebras to deliver industry-leading training and inference speeds and empowers machine learning users to effortlessly run large-scale ML applications, without the hassle of managing hundreds of GPUs or TPUs.
            - paragraph [ref=e24]:
              - text: Cerebras' current customers include top model labs, global enterprises, and cutting-edge AI-native startups.
              - link "OpenAI recently announced a multi-year partnership with Cerebras" [ref=e25] [cursor=pointer]:
                - /url: https://openai.com/index/cerebras-partnership/
              - text: ", to deploy 750 megawatts of scale, transforming key workloads with ultra high-speed inference."
            - paragraph [ref=e26]: Thanks to the groundbreaking wafer-scale architecture, Cerebras Inference offers the fastest Generative AI inference solution in the world, over 10 times faster than GPU-based hyperscale cloud inference services. This order of magnitude increase in speed is transforming the user experience of AI applications, unlocking real-time iteration and increasing intelligence via additional agentic computation.
          - generic [ref=e27]:
            - heading "About The Role" [level=3] [ref=e28]:
              - strong [ref=e29]: About The Role
            - paragraph [ref=e30]: You'll own model quality and performance for Cerebras' inference offerings. You will define what "good" looks like across the models we serve, building AI-driven systems to measure it at scale, and translating those signals into artifacts our customers and product team actually use.
            - paragraph [ref=e31]: You'll use AI agents to spin up custom eval suites per customer use case, mine trajectories for representative test data, automate the repetitive parts of release qual, and help build performance datasets and benchmarking workflows for customer use cases. We want someone whose first instinct is "how do I get an AI agent to do this on a loop."
            - paragraph [ref=e32]: You'll sit between engineering, product, and customer-facing teams.
            - paragraph [ref=e33]:
              - strong [ref=e34]: What You'll Do
            - list [ref=e35]:
              - listitem [ref=e36]:
                - strong [ref=e37]: Design eval suites with AI agents in the loop.
                - text: For every model release, curate a thoughtful mix of advanced, basic, long-context, and customer-use-case-specific evals. Use Claude to generate, validate, and prune candidate test cases at speed.
              - listitem [ref=e38]:
                - strong [ref=e39]: Build custom evals for target customers
                - text: by orchestrating AI agents to mine trajectories from their workloads and synthesize representative eval sets.
              - listitem [ref=e40]:
                - strong [ref=e41]: Automate eval execution end-to-end
                - text: with AI-driven pipelines on top of standard tooling (Docker, Git, CI). The goal is a system that runs itself between releases, not a script you re-run by hand.
              - listitem [ref=e42]:
                - strong [ref=e43]: Build automations
                - text: to forecast and benchmark model performance on Cerebras for our top customers, including modeling how fast customer-specific workloads will run in production.
              - listitem [ref=e44]:
                - strong [ref=e45]: Build product-quality tooling
                - text: that synthesizes quality + performance data into a single, easy-to-use view.
            - heading "Skills & Qualifications" [level=3] [ref=e46]
            - list [ref=e47]:
              - listitem [ref=e48]:
                - strong [ref=e49]: Experience building AI agents.
                - text: You ship real systems with Claude (or equivalent) as a force multiplier. You've built things that would have been infeasible solo without AI agents in the loop.
              - listitem [ref=e50]:
                - strong [ref=e51]: Strong math/stats background.
                - text: .
              - listitem [ref=e52]:
                - strong [ref=e53]: Comfort with Docker, Git, and the standard automation stack
              - listitem [ref=e54]:
                - strong [ref=e55]: A taste for tooling design.
                - text: You've shipped something that a non-engineer used without complaining. Bonus if AI helped you ship it.
            - heading "Assets" [level=3] [ref=e56]
            - list [ref=e57]:
              - listitem [ref=e58]: Performance-tuning experience on custom silicon, GPUs, or FPGAs.
              - listitem [ref=e59]: Experience designing evals for agentic / coding / long-context / multimodal use cases.
              - listitem [ref=e60]: Familiarity with open-source eval frameworks (EvalScope, lm-eval-harness, etc.).
              - listitem [ref=e61]: Experience building AI agents.
          - generic [ref=e62]:
            - heading "Why Join Cerebras" [level=4] [ref=e63]:
              - strong [ref=e64]: Why Join Cerebras
            - paragraph [ref=e65]: "People who are serious about software make their own hardware. At Cerebras we have built a breakthrough architecture that is unlocking new opportunities for the AI industry. With dozens of model releases and rapid growth, we’ve reached an inflection point in our business. Members of our team tell us there are five main reasons they joined Cerebras:"
            - list [ref=e66]:
              - listitem [ref=e67]: Build a breakthrough AI platform beyond the constraints of the GPU.
              - listitem [ref=e68]: Publish and open source their cutting-edge AI research.
              - listitem [ref=e69]: Work on one of the fastest AI supercomputers in the world.
              - listitem [ref=e70]: Enjoy job stability with startup vitality.
              - listitem [ref=e71]: Our simple, non-corporate work culture that respects individual beliefs.
            - paragraph [ref=e72]:
              - text: "Read our blog:"
              - link "Five Reasons to Join Cerebras in 2026." [ref=e73] [cursor=pointer]:
