                - text: .
              - strong [ref=e331]: How do you know if you have a disability?
              - paragraph [ref=e332]:
                - text: A disability is a condition that substantially limits one or more of your “major life activities.” If you have or have ever had such a condition, you are a person with a disability.
                - strong [ref=e333]: "Disabilities include, but are not limited to:"
              - list [ref=e334]:
                - listitem [ref=e335]: Alcohol or other substance use disorder (not currently using drugs illegally)
                - listitem [ref=e336]: Autoimmune disorder, for example, lupus, fibromyalgia, rheumatoid arthritis, HIV/AIDS
                - listitem [ref=e337]: Blind or low vision
                - listitem [ref=e338]: Cancer (past or present)
                - listitem [ref=e339]: Cardiovascular or heart disease
                - listitem [ref=e340]: Celiac disease
                - listitem [ref=e341]: Cerebral palsy
                - listitem [ref=e342]: Deaf or serious difficulty hearing
                - listitem [ref=e343]: Diabetes
                - listitem [ref=e344]: Disfigurement, for example, disfigurement caused by burns, wounds, accidents, or congenital disorders
                - listitem [ref=e345]: Epilepsy or other seizure disorder
                - listitem [ref=e346]: Gastrointestinal disorders, for example, Crohn's Disease, irritable bowel syndrome
                - listitem [ref=e347]: Intellectual or developmental disability
                - listitem [ref=e348]: Mental health conditions, for example, depression, bipolar disorder, anxiety disorder, schizophrenia, PTSD
                - listitem [ref=e349]: Missing limbs or partially missing limbs
                - listitem [ref=e350]: Mobility impairment, benefiting from the use of a wheelchair, scooter, walker, leg brace(s) and/or other supports
                - listitem [ref=e351]: Nervous system condition, for example, migraine headaches, Parkinson’s disease, multiple sclerosis (MS)
                - listitem [ref=e352]: Neurodivergence, for example, attention-deficit/hyperactivity disorder (ADHD), autism spectrum disorder, dyslexia, dyspraxia, other learning disabilities
                - listitem [ref=e353]: Partial or complete paralysis (any cause)
                - listitem [ref=e354]: Pulmonary or respiratory conditions, for example, tuberculosis, asthma, emphysema
                - listitem [ref=e355]: Short stature (dwarfism)
                - listitem [ref=e356]: Traumatic brain injury
