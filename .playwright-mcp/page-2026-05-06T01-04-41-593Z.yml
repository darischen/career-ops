          - generic [ref=e79]:
            - heading "Job Description" [level=2] [ref=e80]
            - article "Job Description" [ref=e81]:
              - strong [ref=e82]: About us
              - paragraph [ref=e83]: One team. Global challenges. Infinite opportunities. At Viasat, we’re on a mission to deliver connections with the capacity to change the world. For more than 35 years, Viasat has helped shape how consumers, businesses, governments and militaries around the globe communicate. We’re looking for people who think big, act fearlessly, and create an inclusive environment that drives positive impact to join our team.
              - strong [ref=e84]: What you'll do
              - paragraph [ref=e85]: We are thrilled to announce an exciting opportunity for an Agentic Software Developer to join our dynamic team in Carlsbad, CA, to start as soon as possible!
              - paragraph [ref=e86]: As an Entry Level Agentic Software Developer within Viasat’s Capacity Engineering Team, you will collaborate alongside Senior Engineers and Product Managers to build, test, and deploy AI-driven agentic workflows tailored to network capacity optimization and cloud engineering. You will help integrate Large Language Models (LLMs) into internal forecasting tools, automate complex resource allocation processes, and bridge the gap between generative AI and robust cloud infrastructure. By bringing a curious, experimental mindset to the team, you will help unlock new opportunities for our engineering teams to deliver cutting-edge, resilient capacity pipelines and autonomous cloud operations.
              - strong [ref=e87]: The day-to-day
              - list [ref=e88]:
                - listitem [ref=e89]: Design, construct, and iteratively test prompts and agent instructions specifically aimed at automating capacity modeling, data extraction, and cloud infrastructure tasks.
                - listitem [ref=e90]: Assist in integrating API-driven LLMs (e.g., Gemini, Claude, OpenAI) into our existing Capacity Engineering tools and predictive data pipelines.
                - listitem [ref=e91]: Monitor and evaluate the outputs of AI agents, tuning system prompts and context windows to safely process telemetric system constraints and network loads.
                - listitem [ref=e92]: Collaborate with cloud and data engineering teams to map out manual capacity planning workflows and prototype scalable, agentic replacements.
                - listitem [ref=e93]: Write clean, maintainable code (Python, TypeScript, or Rust) to securely deploy agentic scripts onto cloud architecture.
                - listitem [ref=e94]: Maintain clear documentation on agent behaviors, cloud infrastructure deployments, and reliability methodologies.
                - listitem [ref=e95]: Stay curious and continuously explore emerging methodologies in AI, such as Retrieval-Augmented Generation (RAG), alongside foundational cloud engineering practices.
              - paragraph [ref=e96]
              - paragraph [ref=e97]: "Additional Information:"
              - list [ref=e98]:
                - listitem [ref=e99]: This position is located onsite. Viasat embraces a flexible work environment and onsite/hybrid work is determined by individual roles and teams. Relocation assistance is available pending eligibility.
                - listitem [ref=e100]: As an Early Career hire, you will participate in our Graduate Development Program during your first 12+ months at Viasat. This program is designed to support your transition from university to the workplace through dedicated mentorship, building relationships with your cohort of new grad hires, technical upskilling, soft skills development and more to ensure you’re set up for success as you begin your professional journey with Viasat
              - strong [ref=e101]: What you'll need
              - list [ref=e102]:
                - listitem [ref=e103]:
                  - paragraph [ref=e104]: Completion of Bachelor’s degree or higher in computer science, software engineering, systems engineering or related field
                - listitem [ref=e105]:
                  - paragraph [ref=e106]: 0-3 years of full-time, relevant industry experience
                - listitem [ref=e107]: Proficiency in at least one modern programming language commonly used in AI and cloud development (e.g., Python, TypeScript/JavaScript, or Rust).
                - listitem [ref=e108]:
                  - paragraph [ref=e109]: Foundational understanding of Large Language Models (LLMs) and/or how to interact with them programmatically via APIs.
                - listitem [ref=e110]:
                  - paragraph [ref=e111]: Basic understanding of cloud computing principles (such as compute instances, scalable storage, and networking).
                - listitem [ref=e112]:
                  - paragraph [ref=e113]: Experience with basic software engineering practices, including version control (Git), debugging, and/or writing functional code.
                - listitem [ref=e114]:
                  - paragraph [ref=e115]: Strong analytical and problem-solving skills, with a willingness to experiment through rapid trial and error.
                - listitem [ref=e116]:
                  - paragraph [ref=e117]: Excellent communication skills, with the ability to explain technical AI behaviors and unexpected outputs clearly.
                - listitem [ref=e118]:
                  - paragraph [ref=e119]: A passion for both emerging AI technologies and high-resilience systems.
                - listitem [ref=e120]: "Citizenship: This position requires U.S. citizenship"
              - strong [ref=e121]: What will help you on the job
              - list [ref=e122]:
                - listitem [ref=e123]: Familiarity with agentic frameworks (e.g., LangChain, LlamaIndex, AutoGen) or experience building custom multi-agent interaction loops.
                - listitem [ref=e124]: Foundational knowledge of public cloud platforms, especially Google Cloud Platform (GCP) or AWS.
                - listitem [ref=e125]:
                  - text: Academic or personal project experience with Infrastructure as Code (e.g., Terraform) or container orchestration (e.g., Docker, Kubernetes).
                  - text: Exposure to processing telemetry, network logs, or handling capacity/performance metrics.
                - listitem [ref=e126]: Experience evaluating LLM responses programmatically using automated metrics or automated testing suites.
                - listitem [ref=e127]: Experience/familiarity with Telecom or Non-terrestrial communication concepts
                - listitem [ref=e128]: Familiarity with agile development methodologies such as Scrum or Kanban.
              - strong [ref=e129]: Salary range
              - text: $95,000.00 - $150,000.00 / annually. For specific work locations within San Jose, the San Francisco Bay area and New York City metropolitan area, the base pay range for this role is $118,000.00- $177,000.00/ annually
              - text: At Viasat, we consider many factors when it comes to compensation, including the scope of the position as well as your background and experience. Base pay may vary depending on job-related knowledge, skills, and experience. Additional cash or stock incentives may be provided as part of the compensation package, in addition to a range of medical, financial, and/or other benefits, dependent on the position offered. Learn more about Viasat’s comprehensive benefit offerings that are focused on your holistic health and wellness at careers.viasat.com/LifeAtViasat/Benefits.
              - strong [ref=e130]: EEO Statement
              - paragraph [ref=e131]:
                - text: Viasat is proud to be an equal opportunity employer, seeking to create a welcoming and diverse environment. All qualified applicants will receive consideration for employment without regard to race, color, religion, gender, gender identity or expression, sexual orientation, national origin, ancestry, physical or mental disability, medical condition, marital status, genetics, age, or veteran status or any other applicable legally protected status or characteristic. If you would like to request an accommodation on the basis of disability for completing this on-line application, please click
                - link "here" [ref=e132] [cursor=pointer]:
                  - /url: mailto:careers@viasat.com
                - text: .
