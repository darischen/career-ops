              - listitem "JOB_DESCRIPTION.TAGS2_ARIA_LABEL None" [ref=e74]: Clearance Requirement:None
              - listitem "JOB_DESCRIPTION.TAGS3_ARIA_LABEL US Citizenship" [ref=e75]: Citizenship Requirement:US Citizenship
