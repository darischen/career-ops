            - listitem [ref=e66]: Ability to effectively communicate in verbal and written communications
            - listitem [ref=e67]: Ability to multitask and adjust priorities as needed
        - paragraph
        - paragraph [ref=e68]: Altamira is an Equal Opportunity/Affirmative Action employer. All qualified applicants will receive consideration for employment without regard to race, color, religion, sex, sexual orientation, gender identity, national origin, disability, or protected veteran status. We focus on recruiting talented, self-motivated employees that find a way to get things done. Join our team of experts as we engineer national security!
