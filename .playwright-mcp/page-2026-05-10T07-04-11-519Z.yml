        - generic [ref=e22]: Software Engineer
        - generic [ref=e24]:
          - text: Altamira Technologies has a long and successful history of providing innovative solutions throughout the U.S. National Security community. Headquartered in McLean, Virginia, Altamira serves the defense, intelligence, and homeland security communities worldwide by focusing on creating innovative solutions leveraging common standards in architecture, data, and security. Altamira believes that our people and company culture differentiates us from other companies.
          - generic [ref=e25]: We focus on recruiting talented, self-motivated employees who strive to get things done. Join our team of experts as we engineer national security!
        - generic [ref=e35]: "Position Description: We are seeking multiple Software Engineers with a mix of experience talent in areas related to cloud-native full-stack development. As part of our team, you will provide software and web development services in support of our customer in Dayton, OH. We are seeking a diverse group of candidates that meet many of the desired skillsets below. Our ideal candidate would possess a broad range of skills as our scope of work spans various technologies, including JavaScript, Python, React, Angular, and others. Altamira Technologies Corporation encourages independent problem-solving and provides deep reach-back support and a collaborative environment for our engineering team. We are looking for candidates who have experience with developing and are not afraid to adapt to the right architecture, languages, and libraries to build the best systems for the mission and deliver the best user experience."
        - generic [ref=e41]: "Location: Dayton OH"
        - generic [ref=e42]:
          - generic [ref=e44]: Role and Responsibilities
          - list [ref=e45]:
            - listitem [ref=e46]: Produce software based on desired functionality provided by users and analysts
            - listitem [ref=e47]: Interpret mission needs and requirements to produce user-friendly software systems
            - listitem [ref=e48]: Leverage continuous integration to create sustainable and maintainable software
            - listitem [ref=e49]: Interact with teammates and users through whiteboard sessions and/or design documents to establish circular feedback
          - generic [ref=e51]: Education and Experience
          - list [ref=e52]:
            - listitem [ref=e53]: Bachelor’s in Computer Science, Computer Engineering, or a related field is required
            - listitem [ref=e54]:
              - generic [ref=e55]: "Experience in multiple of the following: Java, Python, Go, Rust, JavaScript, TypeScript, Angular, VueJs, NodeJS, OpenAPI, ArangoDB, Valkey, PostgreSQL, MinIO, Istio ServiceMesh, Redis, Knative, Kubernetes, Helm, Terraform, OpenContainer Initiative, OTEL, and/or Kafka is desired."
            - listitem [ref=e56]:
              - text: Additionally, experience with Artificial Intelligence/
              - generic [ref=e57]: Machine Learning technologies, such as Tensorflow, PyTorch, LangChain, vLLM, PyTorch Lightning, SK Learn, LibreChat, Streamlit, KubeFlow, MLFlow, Bedrock, Fast API, Tune, Ray Train, Safe Tensors, and/or ONNX is highly desired
            - listitem [ref=e58]: Kubernetes Certified Application Developer (CKAD) and Certified Kubernetes Administrator (CKA) certifications are highly desired
            - listitem [ref=e59]: Entry level through Senior level positions available
