        - generic [ref=e21]:
          - paragraph [ref=e22]: CHAOS builds distributed sensor networks that detect threats to warfighters, borders, and critical infrastructure faster than any system in the world. Our Coherent Distributed Networks (CDN™) technology fuses data from radars, EO/IR sensors, and electronic warfare systems across land, sea, and air-operating as one unified sensing platform.
          - paragraph [ref=e23]:
            - strong [ref=e24]: Role Overview
            - text: We're looking for a
            - strong [ref=e25]: Software Engineer
            - text: to build the data systems that make this possible. You'll design pipelines that move sensor data from the edge to decision-makers in real time, integrate feeds from dozens of heterogeneous sources, and create the data infrastructure that powers products like Vanquish™. This isn't abstract data work - every pipeline you build directly enables faster threat detection and better outcomes for defenders in the field.
            - text: You'll work across teams with hardware engineers, systems engineers, and operators to understand what data matters and how to get it where it needs to go. As we scale, you'll help shape the architecture of the CHAOS Operating System - a unified data backbone connecting engineering, operations, and manufacturing.
          - paragraph [ref=e26]:
            - strong [ref=e27]: Responsibilities
            - text: • Design and build data pipelines that ingest, transform, and deliver sensor and operational data in real time
            - text: • Integrate data from diverse sources - radars, sensors, enterprise systems - into unified, queryable formats
            - text: • Build and maintain data infrastructure including real-time streaming, batch processing, and storage systems
            - text: • Collaborate with hardware, systems, and software engineers to ensure data flows support mission-critical workflows
            - text: • Monitor, troubleshoot, and optimize pipeline performance for reliability and low latency
            - text: • Contribute to architectural decisions as the data platform evolves
            - text: • Work 3+ days per week from our San Francisco or Los Angeles office
          - paragraph [ref=e28]:
            - strong [ref=e29]: Minimum Requirements
            - text: • 1-2 years of experience in software development, data engineering, or a related field
            - text: • Proficiency in Python and SQL
            - text: • Experience building or maintaining data pipelines, ETL workflows, or backend data services
            - text: • Familiarity with data modeling concepts and working with structured/unstructured data
            - text: • Strong problem-solving skills and ability to debug complex data issues
          - paragraph [ref=e30]:
            - strong [ref=e31]: Preferred Requirements
            - text: • Experience with real-time data processing or streaming technologies (Kafka, Spark Streaming, Flink)
            - text: • Familiarity with Palantir Foundry or similar enterprise data platforms
            - text: • Experience with cloud platforms (Azure, AWS, GCP)
            - text: • Background in defense, aerospace, or sensor systems (radar, EO/IR, EW)
            - text: • Experience with containerization (Docker) and orchestration (Kubernetes)
            - text: • Familiarity with data warehousing solutions and NoSQL databases
          - paragraph [ref=e32]:
            - strong [ref=e33]: Why CHAOS?
          - list [ref=e34]:
            - listitem [ref=e35]:
              - strong [ref=e36]: "Health Benefits:"
              - text: Medical, dental, and vision benefits 100% paid for by the company
            - listitem [ref=e37]:
              - strong [ref=e38]: Additional benefits
              - text: ": 401k (+ 50% company match up to 6% of pay), FSA, HSA, life insurance, and more"
            - listitem [ref=e39]:
              - strong [ref=e40]: "Our Perks:"
              - text: Free daily lunch, ‘No meeting Fridays’, unlimited PTO, casual dress code
            - listitem [ref=e41]:
              - strong [ref=e42]: "Compensation Components:"
              - text: Competitive base salaries, generous pre-IPO stock option grants, relocation assistance, and (coming soon!) annual bonuses
            - listitem [ref=e43]:
              - strong [ref=e44]: "Team Growth:"
              - text: 200 employees and counting across 5 global offices
