                - text: .
              - strong [ref=e348]: How do you know if you have a disability?
              - paragraph [ref=e349]:
                - text: A disability is a condition that substantially limits one or more of your “major life activities.” If you have or have ever had such a condition, you are a person with a disability.
                - strong [ref=e350]: "Disabilities include, but are not limited to:"
              - list [ref=e351]:
                - listitem [ref=e352]: Alcohol or other substance use disorder (not currently using drugs illegally)
                - listitem [ref=e353]: Autoimmune disorder, for example, lupus, fibromyalgia, rheumatoid arthritis, HIV/AIDS
                - listitem [ref=e354]: Blind or low vision
                - listitem [ref=e355]: Cancer (past or present)
                - listitem [ref=e356]: Cardiovascular or heart disease
                - listitem [ref=e357]: Celiac disease
                - listitem [ref=e358]: Cerebral palsy
                - listitem [ref=e359]: Deaf or serious difficulty hearing
                - listitem [ref=e360]: Diabetes
                - listitem [ref=e361]: Disfigurement, for example, disfigurement caused by burns, wounds, accidents, or congenital disorders
                - listitem [ref=e362]: Epilepsy or other seizure disorder
                - listitem [ref=e363]: Gastrointestinal disorders, for example, Crohn's Disease, irritable bowel syndrome
                - listitem [ref=e364]: Intellectual or developmental disability
                - listitem [ref=e365]: Mental health conditions, for example, depression, bipolar disorder, anxiety disorder, schizophrenia, PTSD
                - listitem [ref=e366]: Missing limbs or partially missing limbs
                - listitem [ref=e367]: Mobility impairment, benefiting from the use of a wheelchair, scooter, walker, leg brace(s) and/or other supports
                - listitem [ref=e368]: Nervous system condition, for example, migraine headaches, Parkinson’s disease, multiple sclerosis (MS)
                - listitem [ref=e369]: Neurodivergence, for example, attention-deficit/hyperactivity disorder (ADHD), autism spectrum disorder, dyslexia, dyspraxia, other learning disabilities
                - listitem [ref=e370]: Partial or complete paralysis (any cause)
                - listitem [ref=e371]: Pulmonary or respiratory conditions, for example, tuberculosis, asthma, emphysema
                - listitem [ref=e372]: Short stature (dwarfism)
                - listitem [ref=e373]: Traumatic brain injury
