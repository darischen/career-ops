            - paragraph [ref=e184]: "Expected Pay Range:"
            - text: Our compensation reflects the cost of labor across several U.S. geographic markets, and we pay differently based on those defined markets. The U.S. pay range for this position is $93,200 -- $179,200 annually. Pay within this range varies by work location and may also depend on job-related knowledge, skills, and experience. Your recruiter can share more about the specific salary range for the job location during the hiring process.
            - paragraph [ref=e185]
            - text: In California, the pay range for this position is $123,700 - $179,200
            - paragraph [ref=e186]
            - paragraph [ref=e187]: At Adobe, for sales roles starting salaries are expressed as total target compensation (TTC = base + commission), and short-term incentives are in the form of sales commission plans. Non-sales roles starting salaries are expressed as base salary and short-term incentives are in the form of the Annual Incentive Plan (AIP).
            - paragraph [ref=e188]
            - paragraph [ref=e189]: In addition, certain roles may be eligible for long-term incentives in the form of a new hire equity award.
