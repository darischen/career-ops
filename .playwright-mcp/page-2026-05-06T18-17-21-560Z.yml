        - strong [ref=e80]: Salary
        - generic [ref=e82]: The estimated salary range for this position is estimated to be $145,000 - $155,000/year. Total compensation for this position may also include Restricted Stock units, sign-on bonus and other potential future incentives. Further note that total compensation for this position will be determined by each individual’s relevant qualifications, work experience, skills, and other factors. This estimate excludes the value of any potential sign-on bonus; the value of any benefits offered; and the potential future value of any long-term incentives.
        - generic [ref=e84]: Our benefits aim to promote health and wellbeing across all areas of Palantirians’ lives. We work to continuously improve our offerings and listen to our community as we design and update them. The list below details our available benefits and some of the perks that can be enjoyed as an employee of Palantir Technologies.
        - strong [ref=e87]: Benefits
        - generic [ref=e89]: • Employees (and their eligible dependents) can enroll in medical, dental, and vision insurance as well as voluntary life insurance
        - generic [ref=e90]: • Employees are automatically covered by Palantir’s basic life, AD&D and disability insurance
        - generic [ref=e91]: • Commuter benefits
        - generic [ref=e92]: • Relocation assistance
        - generic [ref=e93]: • Take what you need paid time off, not accrual based
        - generic [ref=e94]: • 2 weeks paid time off built into the end of each year (subject to team and business needs)
        - generic [ref=e95]: • 10 paid holidays throughout the calendar year
        - generic [ref=e96]: • Supportive leave of absence program including time off for military service and medical events
        - generic [ref=e97]: • Paid leave for new parents and subsidized back-up care for all parents
        - generic [ref=e98]: • Fertility and family building benefits including but not limited to adoption, surrogacy, and preservation
        - generic [ref=e99]: • Stipend to help with expenses that come with a new child
        - generic [ref=e100]: • Employees can enroll in Palantir’s 401k plan
        - strong [ref=e103]: Life at Palantir
        - generic [ref=e105]:
          - text: We want every Palantirian to achieve their best outcomes, that’s why we celebrate individuals’ strengths, skills, and interests, from your first interview to your longterm growth, rather than rely on traditional career ladders. Paying attention to the needs of our community enables us to optimize our opportunities to grow and helps ensure many pathways to success at Palantir. Promoting health and well-being across all areas of Palantirians’ lives is just one of the ways we’re investing in our community. Learn more at
          - link "Life at Palantir" [ref=e106] [cursor=pointer]:
            - /url: https://www.palantir.com/careers/life-at-palantir/
          - text: and note that our offerings may vary by region.
        - generic [ref=e108]: In keeping consistent with Palantir’s values and culture, we believe employees are “better together” and in-person work affords the opportunity for more creative outcomes. Therefore, we encourage employees to work from our offices to foster connectivity and innovation. Many teams do offer hybrid options (WFH a day or two a week), allowing our employees to strike the right trade-off for their personal productivity. Based on business need, there are a few roles that allow for “Remote” work on an exceptional basis. If you are applying for one of these roles, you must work from the state in which you are employed. If the posting is specified as Onsite, you are required to work from an office.
        - generic [ref=e110]:
          - text: If you want to empower the world's most important institutions, you belong here. Palantir values excellence regardless of background. We are proud to be an Equal Opportunity Employer for all, including but not limited to Veterans and those with disabilities. Palantir is committed to making the application and hiring process accessible to everyone and will provide a reasonable accommodation for those living with a disability. If you need an accommodation for the application or hiring process
