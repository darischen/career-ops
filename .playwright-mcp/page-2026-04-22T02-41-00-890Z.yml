            - heading "Job Overview" [level=2] [ref=e198]
            - paragraph [ref=e199]: Come join Intuit as a Software Engineer 1 on the Future of Discovery & Engagement (FODE) team within QuickBooks.
            - paragraph [ref=e200]:
              - text: FODE powers
              - strong [ref=e201]: adoption and awareness, upgrades and conversion, and repeat consumption
              - text: across high-traffic product surfaces. We are building the next-generation contextual discovery and personalization platform that embeds intelligent, real-time recommendations directly into customer workflows.
            - paragraph [ref=e202]: As an SWE1, you will contribute to building scalable, high-performance web experiences that support experimentation, personalization, and AI-driven discovery. You’ll work closely with senior engineers, product managers, designers, and data scientists to help deliver customer-centric experiences that drive measurable business outcomes.
            - paragraph [ref=e203]: This role is ideal for engineers early in their careers who are excited to build impactful customer-facing features, learn modern web architectures, and grow within a high-visibility, growth-focused platform team.
            - paragraph [ref=e204]:
