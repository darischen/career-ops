                - generic [ref=f1e12]:
                  - heading "Software Engineer, AI Platform - New Grad" [level=1] [ref=f1e13]
                  - generic [ref=f1e14]:
                    - img [ref=f1e15]
                    - generic [ref=f1e17]: Mountain View, California (HQ)
                - button "Apply" [ref=f1e18] [cursor=pointer]
              - generic [ref=f1e20]:
                - paragraph [ref=f1e21]:
                  - strong [ref=f1e22]: Who We Are
                - paragraph [ref=f1e23]: Nuro is a self-driving technology company on a mission to make autonomy accessible to all. Founded in 2016, Nuro is building the world’s most scalable driver, combining cutting-edge AI with automotive-grade hardware. Nuro licenses its core technology, the Nuro Driver™, to support a wide range of applications, from robotaxis and commercial fleets to personally owned vehicles. With technology proven over years of self-driving deployments, Nuro gives the automakers and mobility platforms a clear path to AVs at commercial scale—empowering a safer, richer, and more connected future.
                - paragraph [ref=f1e24]:
                  - strong [ref=f1e25]: About the Role
                  - text: Our software team is growing, and we are looking for talented engineers
                  - strong [ref=f1e26]: who are graduating by December 2026
                  - text: "to join us and be instrumental to one of the following areas: Data Platform, Onboard Systems, ML Infrastructure, Simulation, or Technical Infrastructure teams."
                - paragraph [ref=f1e27]:
                  - strong [ref=f1e28]: About the Work
                - paragraph [ref=f1e29]: "Depending on your skill set and areas of interest you will work on some or all of the following:"
                - list [ref=f1e30]:
                  - listitem [ref=f1e31]:
                    - strong [ref=f1e32]: "Data Platform:"
                    - text: The Data Platform serves as a comprehensive management system for Nuro AI Driver's data, labels, and metrics, facilitating seamless access functionality. The team focuses on data annotation across various domains, including 2D/3D perception, mapping, behavior trajectory, and language/text. It also handles data ingestion and mining, employing methods such as heuristics and embedding search. Additionally, the platform supports the autonomy evaluation infrastructure by providing detailed introspection.
                  - listitem [ref=f1e33]:
                    - strong [ref=f1e34]: "Onboard Systems:"
                    - text: Our onboard system team’s software engineers provide a reliable and high-performance platform that allows our autonomy teams to integrate their autonomy software and algorithms that work across various self-driving platforms. This work requires close collaboration with our software teams, hardware teams, and systems/safety team to make sure new software and hardware work together safely and reliably and resolve onboard error and performance problems.
                  - listitem [ref=f1e35]:
                    - strong [ref=f1e36]: "Technical Infrastructure:"
                    - text: "this group owns few fundamental services for entire engineering organizations: generic compute platform to host mission-critical workflows such as data processing and simulation, storage management service which manages hundreds of PB of data, cloud infrastructure serves as IaaC which provisions and maintains all cloud resources, engineering productivity provides tools such as build and CI/CD to make engineering work more efficient."
                - paragraph [ref=f1e37]:
                  - strong [ref=f1e38]: About You
                - paragraph [ref=f1e39]: "You have deep expertise and prior experience in some or many of the following areas:"
                - list [ref=f1e40]:
                  - listitem [ref=f1e41]:
                    - text: You are a current Bachelor’s Degree or Master’s Degree candidate in Computer Science, Electrical Engineering, Robotics, or related field,
                    - strong [ref=f1e42]: graduating before July 2026.
                  - listitem [ref=f1e43]: "You have experience in one or more of the following areas: large-scale distributed systems; data storage and processing systems; advanced algorithms using C++ and Python; machine learning, multithreading; x86 architecture; and software performance tuning and optimization, robotics software frameworks, different compute modalities (CPU, GPU, FPGA) etc."
                  - listitem [ref=f1e44]: You have strong problem-solving and programming skills.
                - paragraph [ref=f1e45]: At Nuro, your base pay is one part of your total compensation package. For this position, the reasonably expected base pay range is between $145,000 and $170,000 for the level at which this job has been scoped. Your base pay will depend on several factors, including your experience, qualifications, education, location, and skills. In the event that you are considered for a different level, a higher or lower pay range would apply. This position is also eligible for an annual performance bonus, equity, and a competitive benefits package
                - paragraph [ref=f1e46]:
                  - emphasis [ref=f1e47]: At Nuro, we celebrate differences and are committed to a diverse workplace that fosters inclusion and psychological safety for all employees. Nuro is proud to be an equal opportunity employer and expressly prohibits any form of workplace discrimination based on race, color, religion, gender, sexual orientation, gender identity or expression, national origin, age, genetic information, disability, veteran status, or any other legally protected characteristics.
