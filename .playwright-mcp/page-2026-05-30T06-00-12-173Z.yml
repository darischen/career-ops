                    - heading "Voluntary Self-Identification of Disability" [level=2] [ref=f1e272]
                    - generic [ref=f1e273]:
                      - generic [ref=f1e274]:
                        - generic [ref=f1e275]: Form CC-305
                        - generic [ref=f1e276]: Page 1 of 1
                      - generic [ref=f1e277]:
                        - generic [ref=f1e278]: OMB Control Number 1250-0005
                        - generic [ref=f1e279]: Expires 04/30/2026
                    - strong [ref=f1e280]: Why are you being asked to complete this form?
                    - paragraph [ref=f1e281]: We are a federal contractor or subcontractor. The law requires us to provide equal employment opportunity to qualified people with disabilities. We have a goal of having at least 7% of our workers as people with disabilities. The law says we must measure our progress towards this goal. To do this, we must ask applicants and employees if they have a disability or have ever had one. People can become disabled, so we need to ask this question at least every five years.
                    - paragraph [ref=f1e282]:
                      - text: Completing this form is voluntary, and we hope that you will choose to do so. Your answer is confidential. No one who makes hiring decisions will see it. Your decision to complete the form and your answer will not harm you in any way. If you want to learn more about the law or this form, visit the U.S. Department of Labor’s Office of Federal Contract Compliance Programs (OFCCP) website at
                      - link "www.dol.gov/ofccp" [ref=f1e283] [cursor=pointer]:
                        - /url: https://www.dol.gov/ofccp
                      - text: .
                    - strong [ref=f1e284]: How do you know if you have a disability?
                    - paragraph [ref=f1e285]:
                      - text: A disability is a condition that substantially limits one or more of your “major life activities.” If you have or have ever had such a condition, you are a person with a disability.
                      - strong [ref=f1e286]: "Disabilities include, but are not limited to:"
                    - list [ref=f1e287]:
                      - listitem [ref=f1e288]: Alcohol or other substance use disorder (not currently using drugs illegally)
                      - listitem [ref=f1e289]: Autoimmune disorder, for example, lupus, fibromyalgia, rheumatoid arthritis, HIV/AIDS
                      - listitem [ref=f1e290]: Blind or low vision
                      - listitem [ref=f1e291]: Cancer (past or present)
                      - listitem [ref=f1e292]: Cardiovascular or heart disease
                      - listitem [ref=f1e293]: Celiac disease
                      - listitem [ref=f1e294]: Cerebral palsy
                      - listitem [ref=f1e295]: Deaf or serious difficulty hearing
                      - listitem [ref=f1e296]: Diabetes
                      - listitem [ref=f1e297]: Disfigurement, for example, disfigurement caused by burns, wounds, accidents, or congenital disorders
                      - listitem [ref=f1e298]: Epilepsy or other seizure disorder
                      - listitem [ref=f1e299]: Gastrointestinal disorders, for example, Crohn's Disease, irritable bowel syndrome
                      - listitem [ref=f1e300]: Intellectual or developmental disability
                      - listitem [ref=f1e301]: Mental health conditions, for example, depression, bipolar disorder, anxiety disorder, schizophrenia, PTSD
                      - listitem [ref=f1e302]: Missing limbs or partially missing limbs
                      - listitem [ref=f1e303]: Mobility impairment, benefiting from the use of a wheelchair, scooter, walker, leg brace(s) and/or other supports
                      - listitem [ref=f1e304]: Nervous system condition, for example, migraine headaches, Parkinson’s disease, multiple sclerosis (MS)
                      - listitem [ref=f1e305]: Neurodivergence, for example, attention-deficit/hyperactivity disorder (ADHD), autism spectrum disorder, dyslexia, dyspraxia, other learning disabilities
                      - listitem [ref=f1e306]: Partial or complete paralysis (any cause)
                      - listitem [ref=f1e307]: Pulmonary or respiratory conditions, for example, tuberculosis, asthma, emphysema
                      - listitem [ref=f1e308]: Short stature (dwarfism)
                      - listitem [ref=f1e309]: Traumatic brain injury
