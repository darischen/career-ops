          - generic [ref=e82]: Apply now
        - generic [ref=e84]: Meta empowers millions of businesses to connect with customers and drive real business outcomes. Scaled Business Marketing (SBM) is looking for a Scaled Business Growth Marketer to design data-driven programs that help businesses discover, adopt, and maximize the value of Meta's products. You'll work with cross-functional teams to unlock new opportunities, remove friction in the customer journey, scale high-impact solutions that drive measurable results, and help millions of businesses around the world succeed. This role requires someone who can analyze data & understand market trends to identify opportunities/challenges, design globally scalable marketing strategies and experiment/iterate while operationalizing what works to drive sustained business impact.
        - separator [ref=e85]
        - generic [ref=e86]:
          - heading [level=2] [ref=e87]: Scaled Business Growth Responsibilities
          - list [ref=e88]:
            - generic [ref=e89]:
              - listitem [ref=e90]: Lead marketing growth strategy across a large area and drive cross-team alignment.
              - listitem [ref=e91]: Identify and size marketing opportunities to drive material business impact.
              - listitem [ref=e92]: Design comprehensive, multi-channel marketing programs that accelerate outcomes across the funnel with a variety of audiences.
              - listitem [ref=e93]: Execute on projects by working closely with Product, Sales, Data Science, and other partners.
              - listitem [ref=e94]: Lead experimentation from designing tests to analyzing results that drive business impact.
              - listitem [ref=e95]: Leverage AI and advanced analytics to accelerate business impact.
        - generic [ref=e96]:
          - heading [level=2] [ref=e97]: Minimum Qualifications
          - list [ref=e98]:
            - generic [ref=e99]:
              - listitem [ref=e100]: Bachelor's degree in a directly related field, or equivalent practical experience
              - listitem [ref=e101]: 8+ years of experience in growth marketing, digital marketing, marketing strategy, product growth, management consulting, or related field
              - listitem [ref=e102]: 7+ years of work experience in analytics - data extraction, querying, & interpretation with languages such as SQL including leveraging AI tooling
              - listitem [ref=e103]: 7+ years of experience developing and executing strategies to drive Marketing impact across multiple channels, combining quantitative analysis with qualitative customer insight to optimize performance and scale successful programs
              - listitem [ref=e104]: Experience developing & leveraging audience understanding via quantitative methods (segmentation, behavioral analysis) and qualitative methods (customer research, market insight), and translating findings into full-funnel marketing strategies
              - listitem [ref=e105]: Proficiency in quantitative analysis geared towards drawing actionable insights from complex datasets
              - listitem [ref=e106]: Experience designing & executing experiments, interpreting results, and translating findings into decisions
              - listitem [ref=e107]: Experience establishing KPIs, measurement frameworks, and attribution models, including incrementality and mixed media approaches, that connect marketing activities to business outcomes
              - listitem [ref=e108]: Proficiency in leveraging AI tools to accelerate business outcomes (e.g., audience research, personalization, content development, marketing optimization, etc.)
              - listitem [ref=e109]: Experience distilling complex data into compelling narratives and influence stakeholders at all levels of the organization
              - listitem [ref=e110]: Experience working with and influencing cross-functional teams including Product, Sales, Analytics, etc
              - listitem [ref=e111]: Experience working on marketing programs that reach a wide range of business customers
        - generic [ref=e112]:
          - heading [level=2] [ref=e113]: Preferred Qualifications
          - list [ref=e114]:
            - generic [ref=e115]:
              - listitem [ref=e116]: Familiarity with advanced analytics including statistical analysis, predictive analytics, or machine learning applications in marketing
              - listitem [ref=e117]: Experience with data visualization tools (e.g., Tableau, Python, etc.) and ability to design executive-level dashboards that communicate complex insights to diverse audiences
              - listitem [ref=e118]: Knowledge of Meta's products and platform capabilities, or experience with similar technologies
              - listitem [ref=e119]: Demonstrated use of AI tools to accelerate core marketing capabilities
              - listitem [ref=e120]: Demonstrated ability to integrate AI tools to optimize/redesign workflows and drive measurable impact (e.g., efficiency gains, quality improvements)
              - listitem [ref=e121]: Experience adhering to and implementing responsible, ethical AI practices (e.g., risk assessment, bias mitigation, quality and accuracy reviews)
              - listitem [ref=e122]: Demonstrated ongoing AI skill development (e.g., prompt/context engineering, agent orchestration) and staying current with emerging AI technologies
