        - paragraph
        - generic [ref=e20]: Altamira Technologies has a long and successful history providing innovative solutions throughout the U.S. National Security community. Headquartered in McLean, Virginia, Altamira serves the defense, intelligence and homeland security communities worldwide by focusing on creating innovative solutions leveraging common standards in architecture, data and security. Altamira believes that our people and the culture of our company differentiate us from other companies.
        - generic [ref=e21]:
          - generic [ref=e22]: Location
          - text: ": Chantilly, VA. OR McLean, VA."
        - generic [ref=e23]:
          - generic [ref=e24]: Position Description
          - text: ": We are seeking a Junior Software Engineers that possess a mix of talent areas related to full-stack development. As part of our team, you will provide software and web development services. Our ideal candidate would possess a broad range of skills as our scope of work spans various technologies. Examples of technologies we are currently using to support our customers include Java, Python, JavaScript, C, React, PostGIS, AWS Services, Git and Docker/K8s. Altamira Technologies Corporation encourages independent problem solving but also provides deep reach-back support and a collaborative environment for our engineering team. We are looking for candidates who have experience with developing and are not afraid to adapt to the right architecture, languages, and libraries to build the best systems for the mission and deliver the best user experience."
        - generic [ref=e25]:
          - generic [ref=e26]: Role and Responsibilities
          - text: ":"
          - text: • Produce software based on desired functionality provided by users and analysts
          - text: • Interpret mission needs and requirements to produce user-friendly software systems
          - text: • Leverage continuous integration to create sustainable and maintainable software
          - text: • Interact with teammates and users through whiteboard sessions and/or design documents to establish circular feedback.
        - generic [ref=e28]: "Education and Experience:"
        - list [ref=e29]:
          - listitem [ref=e30]: 1 year relevant experience
          - listitem [ref=e31]: Bachelors in computer science, Computer Engineering, Electrical Engineering, or a related field
          - listitem [ref=e32]: "Experience in full-stack web development with one or more of the following technologies: Java, C, Python, web frameworks, JS/Typescript, React, Web Services (REST), Containerization, Kubernetes, Helm, NoSQL and SQL databases, TIG Stack, AWS or other cloud providers, Linux, Gitlab CI/CD"
          - listitem [ref=e33]: CompTIA Security+ certification
        - generic [ref=e34]:
          - generic [ref=e35]: Abilities and Competencies
          - text: ":"
          - text: • Minimum of TS required, SCI and CI Poly preferred.
          - text: • Self-motivated and eager to work intently to satisfy mission requirements
          - text: • Adaptable and has the desire to maintain our company culture
          - text: • Ability to effectively communicate in verbal and written communications
          - text: • Ability to multitask and adjust priorities as needed
        - paragraph
        - paragraph [ref=e36]: Altamira is an Equal Opportunity/Affirmative Action employer. All qualified applicants will receive consideration for employment without regard to race, color, religion, sex, sexual orientation, gender identity, national origin, disability, or protected veteran status. We focus on recruiting talented, self-motivated employees that find a way to get things done. Join our team of experts as we engineer national security!
