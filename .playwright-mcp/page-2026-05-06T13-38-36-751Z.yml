                - paragraph [ref=e387]:
                  - generic [ref=e389]:
                    - text: HP’s privacy practices described in this Notice comply with the Global Cross Border Privacy Rules System (“CBPR”), including transparency, accountability, and choice regarding the collection and use of your personal data. The CBPR certification do not cover information that may be collected through downloadable software on third-party platforms. The CBPR system provides a framework for organizations to ensure protection of personal data transferred among participating Global
                    - text: CBPR members. More information about the Global framework can be found
