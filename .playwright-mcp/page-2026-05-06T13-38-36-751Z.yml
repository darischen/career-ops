                - paragraph [ref=e444]: Choices under the Data Privacy Framework Program
                - paragraph [ref=e445]: HP will offer job applicants and candidates the opportunity to choose (i.e., opt out) whether their personal data is (i) to be disclosed to a third party or (ii) to be used for a purpose that is materially different from the purpose(s) for which it was originally collected or subsequently authorized by the job applicant and candidate.
                - paragraph [ref=e446]
                - paragraph [ref=e447]:
                  - generic [ref=e450]: For sensitive data (i.e., personal information specifying medical or health conditions, racial or ethnic origin, political opinions, religious or philosophical beliefs, trade union membership or information specifying the sex life of the individual), HP will obtain affirmative express consent (i.e., opt in) from job applicants and candidates if such information is to be (i) disclosed to a third party or (ii) used for a purpose other than those for which it was originally collected or subsequently authorized by the job applicant and candidate through the exercise of opt-in choice. In addition, HP will treat as sensitive any personal data received from a third party where the third party identifies and treats it as sensitive.
