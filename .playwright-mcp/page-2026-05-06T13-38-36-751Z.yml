                - paragraph [ref=e400]
                - paragraph [ref=e401]:
                  - generic [ref=e403]: The Global CBPR System Certification Mark and Global PRP System Certification Mark™ are trademarks of the International Trade Administration/Office of Global Data Policy and Privacy, used with permission.
                - list [ref=e404]:
                  - listitem [ref=e405]:
                    - paragraph [ref=e406]: Binding Corporate Rules
                - paragraph [ref=e407]:
                  - generic [ref=e408]: International transfers of personal data to countries that don’t have an adequacy decision by the European Commission (or the UK Government or the Swiss Federal Council), are governed by our HP’s Binding Corporate Rules. Effective 2011, HP has established a set of Binding Corporate Rules (“EU BCR-C”), which have been approved by the data protection regulators in the European Economic Area (EEA) and Switzerland. Additionally, the UK HP Binding Corporate Rules for Controllers (“UK HP BCR-C”), were approved by the UK Information Commissioner (effective in 2024). HP’s BCRs allow us to legally transfer personal data of HP job applicants and candidates located in the EEA/UK/ Switzerland to HP entities located outside of those countries. To learn more about HP’s BCRs and the list of HP entities covered by them, please go
                  - link [ref=e409] [cursor=pointer]:
                    - /url: https://www.hp.com/gb-en/binding-corporate-rules.html
                    - generic [ref=e410]: here
                  - generic [ref=e411]: .
                - paragraph [ref=e413]
                - list [ref=e414]:
                  - listitem [ref=e415]:
                    - paragraph [ref=e416]: Data Privacy Framework Program
                - paragraph [ref=e418]:
                  - generic [ref=e419]: HP complies with the EU-U.S. Data Privacy Framework (EU-U.S. DPF) and the UK Extension to the EU-
                - generic [ref=e420]:
                  - paragraph [ref=e421]:
                    - generic [ref=e422]: U.S. DPF, and the Swiss-U.S. Data Privacy Framework (Swiss-U.S. DPF), as set forth by the U.S. Department of Commerce. HP has certified to the U.S. Department of Commerce that it adheres to the EU-U.S. Data Privacy Framework Principles (EU-U.S. DPF Principles) with regard to the processing of personal data received from the European Union and the United Kingdom in reliance on the EU-U.S. DPF and the UK Extension to the EU-U.S. DPF. HP has certified to the U.S. Department of Commerce that it adheres to the Swiss-U.S. Data Privacy Framework Principles (Swiss-U.S. DPF Principles) with regard to the processing of personal data received from Switzerland in reliance on the Swiss-U.S. DPF. If there is any conflict between the terms in this privacy policy and the EU-U.S. DPF Principles and/or the Swiss-U.S. DPF Principles, the Principles shall govern. To learn more about the Data Privacy Framework (DPF) program, and to view our certification, please visit
                    - link [ref=e423] [cursor=pointer]:
                      - /url: https://www.dataprivacyframework.gov/
                      - generic [ref=e425]: https://www.dataprivacyframework.gov/
                    - generic [ref=e426]: .
                  - paragraph [ref=e427]
                - paragraph [ref=e428]:
                  - generic [ref=e430]: HP is responsible for the processing of personal data it receives under the DPF and subsequently transfers to a third party acting as an agent on its behalf. HP complies with the DPF Principles for all onward transfers of personal data from the EU, UK, and Switzerland, including the onward transfer liability provisions.
                - paragraph [ref=e431]
                - paragraph [ref=e432]:
                  - text: In compliance with the EU-US Data Privacy Framework (EU-U.S. DPF), the UK Extension to the EU-U.S. DPF, and the Swiss-U.S. Data Privacy Framework (Swiss-U.S. DPF) HP commits to ensure the rights of EU, UK, and Swiss individuals and to resolve complaints about your privacy and our collection or use of your personal data transferred to the United States pursuant to the DPF Principles. EU and UK individuals and Swiss individuals with DPF inquiries or complaints should first contact HP through
                  - link [ref=e433] [cursor=pointer]:
                    - /url: https://www.hp.com/us-en/privacy/ww-privacy-form.html?jumpid=in_R11928_%2Fus%2Fen%2Fcorp%2Fprivacy-central%2Fprivacy-statements
                    - text: HP’s Privacy Office and Data Protection Officer form
                  - text: .
                - paragraph [ref=e434]
                - paragraph [ref=e435]: In compliance with the EU-U.S. DPF and the UK Extension to the EU-U.S. DPF and the Swiss-U.S. DPF, HP commits to cooperate and comply respectively with the advice of the panel established by the EU data protection authorities (DPAs) and the UK Information Commissioner’s Office (ICO) and the Swiss Federal Data Protection and Information Commissioner (FDPIC) with regard to unresolved complaints concerning our handling of human resources data received in reliance on the EU-U.S. DPF and the UK Extension to the EU-U.S. DPF and the Swiss-U.S. DPF in the context of the employment relationship.
                - paragraph [ref=e436]
                - paragraph [ref=e437]:
                  - text: If your DPF complaint cannot be resolved through the above channels, under certain conditions, you may invoke binding arbitration for some residual claims not resolved by other redress mechanisms. Further information can be found on the official
                  - link [ref=e438] [cursor=pointer]:
                    - /url: https://www.dataprivacyframework.gov/s/article/G-Arbitration-Procedures-dpf?tabset-35584=2
                    - text: DPF website
                  - text: .
                - paragraph [ref=e439]
                - paragraph [ref=e440]: The Federal Trade Commission has jurisdiction over HP’s compliance with the EU-U.S. Data Privacy Framework (EU-U.S. DPF) and the UK Extension to the EU-U.S. DPF, and the Swiss-U.S. Data Privacy Framework (Swiss-U.S. DPF).
                - paragraph [ref=e441]
                - paragraph [ref=e442]: "The specific US-based HP entities covered by the DPF include: Compaq Information Technologies, LLC; Hewlett-Packard Company Archives LLC; Hewlett-Packard Enterprises, LLC; HP Health Solutions Inc.; HP Jade Holding LLC; HP R&D Holding LLC; HP US Digital LLC; HPI Bermuda Holdings LLC; HPI Federal LLC; Indigo America, Inc.; HP Hewlett Packard Group LLC; Hewlett-Packard World Trade, LLC; HP Inc.; HP Licensing Holding LLC; HP Technology Holdings LLC; HP USA Manufacturing LLC; HPI Brazil Holdings LLC; HPI J1 Holdings LLC; HPQ Holdings, LLC; Tall Tree Insurance Company; Hewlett-Packard Development Company, L.P."
