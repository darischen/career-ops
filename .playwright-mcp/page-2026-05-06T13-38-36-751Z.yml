                  - generic [ref=e715]: and indicating you are a "Prospective HP employee". Your privacy request may be made to exercise your rights, or if you have any questions or concerns about this HP Job Applicant Privacy Notice, our privacy practices, our collection and use of your information or a possible data breach. Alternatively, if you have any questions or concerns about the hiring process, please contact your corresponding HP hiring entity. We will not discriminate against you for exercising your rights and choices.
                - paragraph [ref=e716]
                - paragraph [ref=e717]:
                  - generic [ref=e731]: How We Manage Your Privacy Requests
                - paragraph [ref=e732]:
                  - generic [ref=e745]: Upon receipt of your communication, our representative will contact you within a reasonable time to respond to your questions or concerns. In some cases, we may request further information to verify your identity, complete your request, clarify the nature of your request, remedy any deficiencies with your request, or let you know if we need more time, as permitted in applicable law. Please refrain from sending us sensitive personal data.
                - paragraph [ref=e746]
                - paragraph [ref=e747]:
                  - generic [ref=e759]: You can designate someone else to make a request on your behalf. To protect your data, we will ask for signed permission from you authorizing the other person to submit a request on your behalf. We will contact you to verify your identity before we respond to your authorized agent’s request, as permitted in applicable law.
                - paragraph [ref=e760]
                - paragraph [ref=e761]:
                  - generic [ref=e774]: Timing
                - paragraph [ref=e775]:
                  - generic [ref=e787]: We aim to ensure that your concerns are resolved in a timely and appropriate manner. If we fail to take any action regarding your request our or are unable to resolve your concerns, you may bring a complaint or lawsuit before the corresponding authority in the country or territory in which you reside according to local law, or where you consider that the data protection rules have been breached or seek a remedy through the courts.
