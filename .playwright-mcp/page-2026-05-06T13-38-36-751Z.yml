                - paragraph [ref=e214]: HP JOB APPLICANT PRIVACY NOTICE
                - paragraph [ref=e215]: HP recognizes that privacy is a fundamental human right and further recognizes the fundamental right of privacy, security and data protection to our job applicants and candidates worldwide. As a global organization, we strive to provide protections that exceed legal minimums, across all our operations, and to deploy consistent, rigorous policies and procedures. This notice outlines how we collect, use, disclose, retain, and otherwise process, the personal data of our job applicants and candidates. Please note that region- or country-specific privacy disclosure or notice may provide additional information.
                - paragraph [ref=e216]
                - paragraph [ref=e217]:
                  - generic [ref=e218]: Throughout this document references to “local law” or “applicable law” refer to laws applicable to where you reside or where HP operates and processes personal data. HP may refer to “you” as “job applicant” or “candidate”, depending on the scenario.
                - paragraph [ref=e219]
                - paragraph [ref=e220]: What Does this Notice Cover?
                - paragraph [ref=e221]: This notice provides information about how the HP company (herein "HP") to which you are applying, and any of our related affiliates and subsidiaries worldwide (collectively, "HP", "us" or "we"), protect your personal data in accordance with local law. It also describes what categories of personal data we collect about you, how we use the information we collect, where and from whom we obtain it, to whom we disclose your personal data, your respective rights regarding it, and how you can exercise your rights. More information about your rights, and how to exercise them, is set out in the Your Choices and Rights section.
                - paragraph [ref=e222]
                - paragraph [ref=e223]: What Data Do We Collect?
                - paragraph [ref=e224]: If you apply for a job with us, we collect, use, disclose, and otherwise process, as defined by applicable law, personal data about you in order to take steps prior to potentially entering into a contract of employment with you.
                - paragraph [ref=e225]
                - paragraph [ref=e226]: "To the extent permitted by law and at the appropriate time during the application process or the pre-employment background check, screening or vetting process, this may include:"
                - list [ref=e227]:
                  - listitem [ref=e228]:
                    - paragraph [ref=e229]: "Data you provide to us:"
                    - list [ref=e230]:
                      - listitem [ref=e231]:
                        - paragraph [ref=e232]: contact details (name, address, phone numbers, email, etc.);
                      - listitem [ref=e233]:
                        - paragraph [ref=e234]: qualification details (such as resume, CV, cover letter, work experience, education, transcripts);
                      - listitem [ref=e235]:
                        - paragraph [ref=e236]: application information (such as expected income, type of job wanted, availability, references);
                      - listitem [ref=e237]:
                        - paragraph [ref=e238]: identification details (such as passport number, nationality and residence), government ID numbers (e.g. national insurance number/social security number/national identification number), immigration status; and
                      - listitem [ref=e239]:
                        - paragraph [ref=e240]: any other data you submit to us, including any correspondence between you and HP exchanged during the application process.
                - paragraph [ref=e241]
                - list [ref=e242]:
                  - listitem [ref=e243]:
                    - paragraph [ref=e244]: "Data from other sources:"
                    - list [ref=e245]:
                      - listitem [ref=e246]:
                        - paragraph [ref=e247]: We may also obtain data about you from other sources, such as recruiters, market research companies, identity verification providers, and information you have made publicly available through third-party websites such as LinkedIn, where permitted by law.
                - paragraph [ref=e248]
                - list [ref=e249]:
                  - listitem [ref=e250]:
                    - paragraph [ref=e251]: "Data we collect automatically about you:"
                    - list [ref=e252]:
                      - listitem [ref=e253]:
                        - paragraph [ref=e254]: Most browsers automatically accept cookies (including some of HP), but this is typically something you can adjust. Please reference your browser’s settings to adjust your privacy preferences.
                - paragraph [ref=e255]
                - paragraph [ref=e256]: Please note that some of the data listed above will only be required for successful candidates in the pre-employment screening process.
                - paragraph [ref=e257]
                - paragraph [ref=e258]: How do We Use Data, and what is the Legal Basis for this Use?
                - paragraph [ref=e259]: "HP may collect, use, disclose, and otherwise process, as defined by applicable law, your personal data to:"
                - list [ref=e260]:
                  - listitem [ref=e261]:
                    - paragraph [ref=e262]: "Assess your job application, and for other recruiting and hiring purposes, such as to:"
                    - list [ref=e263]:
                      - listitem [ref=e264]:
                        - paragraph [ref=e265]: review your qualifications to determine your eligibility for a position;
                      - listitem [ref=e266]:
                        - paragraph [ref=e267]: contact you about your application, via electronic channels (e.g., email) and posts, reply to your inquiries, organize interviews, appointments and phone calls, and send updates to you about other recruitment opportunities;
                      - listitem [ref=e268]:
                        - paragraph [ref=e269]: process your application and verify your identity and eligibility for the role;
                      - listitem [ref=e270]:
                        - paragraph [ref=e271]: conduct assessments related to general and language skills, experiences, and job interviews;
                      - listitem [ref=e272]:
                        - paragraph [ref=e273]: assist with obtaining an immigration visa or work permit, if required;
                      - listitem [ref=e274]:
                        - paragraph [ref=e275]: complete enrolment in payroll and applicable employee benefit schemes, prepare the employment contract, and other administrative purposes necessary for a candidate to commence employment with HP;
                      - listitem [ref=e276]:
                        - paragraph [ref=e277]: performance of the employment contract between HP and candidates.
                - paragraph [ref=e278]
                - list [ref=e279]:
                  - listitem [ref=e280]:
                    - paragraph [ref=e281]: "Comply with applicable laws or regulations, including, but not limited to:"
                    - list [ref=e282]:
                      - listitem [ref=e283]:
                        - paragraph [ref=e284]: use in connection with legal claims;
                      - listitem [ref=e285]:
                        - paragraph [ref=e286]: health and safety compliance;
                      - listitem [ref=e287]:
                        - paragraph [ref=e288]: regulatory, investigative, and disciplinary purposes (including disclosure of such information in connection with legal process or litigation); and
                      - listitem [ref=e289]:
                        - paragraph [ref=e290]: other ethics, anti-corruption, and compliance reporting tools.
                - paragraph [ref=e291]
                - list [ref=e292]:
                  - listitem [ref=e293]:
                    - paragraph [ref=e294]: "Protect HP's legitimate business interests including:"
                    - list [ref=e295]:
                      - listitem [ref=e296]:
                        - paragraph [ref=e297]: the security of HP's premises, assets, systems, and intellectual property;
                      - listitem [ref=e298]:
                        - paragraph [ref=e299]: enforce company policies; and
                      - listitem [ref=e300]:
                        - paragraph [ref=e301]: permit the functionality of our online portal, including to authorize the creation of online accounts, provide customer service, and reset passwords.
                - paragraph [ref=e302]
                - list [ref=e303]:
                  - listitem [ref=e304]:
                    - paragraph [ref=e305]: "Improving hiring process: HP may use personal data to improve the recruitment and selection process. This may include demographic information."
                - paragraph [ref=e306]
                - list [ref=e307]:
                  - listitem [ref=e308]:
                    - paragraph [ref=e309]:
                      - text: We may also process your personal data, for example, if you consented to receive information about future job opportunities; where you have consented to providing data such as gender, ethnicity, etc.(which will help HP promote
                      - generic [ref=e310]: an inclusive workplace
                      - text: ); or where we need to ask your permission to conduct a criminal background check (where permitted by law).
                - paragraph [ref=e311]
                - list [ref=e312]:
                  - listitem [ref=e313]:
                    - paragraph [ref=e314]:
                      - generic [ref=e315]: If you agree to be part of the “Talent Network”,
                      - text: we may also process your personal data for the purposes of finding matches with other compatible current or future job opportunities through the use of profiling. For more information on the use of profiling, please visit the Automated Decision-Making section.
                - paragraph [ref=e316]
                - list [ref=e317]:
                  - listitem [ref=e318]:
                    - paragraph [ref=e319]: HP may use third-party video or audio platforms for conducting job interviews and candidate assessments virtually. If we do so, please take the interview in a neutral space or employ background filters/blurring and remove personal objects that may reveal sensitive personal data from view of the camera.
                - paragraph [ref=e320]
                - paragraph [ref=e321]: How we Use Sensitive Data
                - paragraph [ref=e322]: Some of the above information may also be considered sensitive personal data. Such information may include screening, background checks or vetting for certain positions, pre-employment health screens, and/or a disability status (when applicable) for eligibility for certain programs. In some geographies, a candidate may provide us with voluntary information related to their race or ethnicity in support of an inclusive workforce policy, or voluntary information about minors related to administration of benefits. In some cases, candidates will not be required to provide consent to processing of sensitive personal data and such processing will occur as required or permitted by applicable local law. HP implements robust measures to protect such information.
                - paragraph [ref=e323]
                - paragraph [ref=e324]: HP is committed to an equal employment opportunity. To that end, any sensitive data collected for the purposes mentioned above, will never be used for discrimination against any job applicant or candidate during the selection process.
                - paragraph [ref=e325]
                - paragraph [ref=e326]: Background Check
                - paragraph [ref=e327]: After receiving an offer of employment with HP, where permitted by local law, the candidates may be subject to the completion of certain background checks which are permitted or required by applicable employment laws.
                - paragraph [ref=e328]
                - paragraph [ref=e329]: Personal data provided by the candidate following an offer of employment may be used to facilitate a background check. No background checks will be undertaken prior to a conditional offer of employment being made. Failure to pass a background check may result in the withdrawal of the employment offer, in line with the requirements of applicable law.
                - paragraph [ref=e330]
                - paragraph [ref=e331]: Candidates may be requested to provide information related to their family members who hold government positions in order for HP to assess potential conflicts of interest and in accordance with legal requirements. When providing this information, it is the responsibility of the candidate to obtain the family member’s permission to disclose such information to HP.
                - paragraph [ref=e332]
                - paragraph [ref=e333]: Conducting background checks may involve the collection of additional information about the candidate from educational institutions, government agencies, previous employers, credit reporting agencies (where permitted by local law), information in the public domain, and law enforcement agencies at the international, national, or local level so far as is permitted by applicable law. If a candidate's prior employers and/or other referees are contacted, the report may include information obtained through personal interviews. Please note that it is your responsibility to obtain consent from referees before providing their personal data to HP.
                - paragraph [ref=e334]
                - paragraph [ref=e335]: Automated Decision-Making
                - paragraph [ref=e336]: HP uses automated matching and scoring (profiling) to aid in the identification of candidates during the selection processes. The profiling uses machine learning techniques. Data is used to produce a score corresponding to a predicted degree of match between a job and a candidate. The use of the match score can produce a list of candidates for a given job position in a rank-list manner. The model does not replace human decision making.
                - paragraph [ref=e337]
                - paragraph [ref=e338]: In the event that HP makes a decision based solely on automated processing, which produces legal effects or that similarly significantly affects you, HP will take the appropriate steps to ensure it takes place in accordance with applicable law. In these cases, HP will respect your ability to exercise your rights to obtain human intervention, to express your point of view and to contest the decision.
                - paragraph [ref=e339]
                - paragraph [ref=e340]:
                  - generic [ref=e341]: If you would like more information about the use of automated decision making in the recruitment context, please contact
                  - link [ref=e343] [cursor=pointer]:
                    - /url: https://www.hp.com/us-en/privacy/ww-privacy-form.html?jumpid=in_R11928_%2Fus%2Fen%2Fcorp%2Fprivacy-central%2Fprivacy-statements
                    - generic [ref=e344]: HP’s Privacy Office and Data Protection Officer
                  - generic [ref=e345]: .
                - paragraph [ref=e346]
                - paragraph [ref=e347]: How We Share Data
                - paragraph [ref=e348]: We may share your personal data with other HP entities for the purposes outlined in this Privacy Notice.
                - paragraph [ref=e349]
                - paragraph [ref=e350]: In some cases, personnel and authorized third-party service providers or processors, will process your personal data on behalf of HP for the purposes above. Such third parties include, but are not limited to, IT service providers, investigators, auditors, recruitment agencies, or online recruitment portals in which job applicants enter and submit their application, background check providers, etc. HP takes appropriate steps to ensure that such personnel and third-party suppliers are bound to duties of confidentiality. In addition, third parties that process personal data on behalf of HP are required by contract to implement safeguards that are no less protective than those implemented by HP in order to protect any personal data they receive from HP. Third party service providers are further prohibited from using the personal data for any purpose other than to perform the services as instructed by HP.
                - paragraph [ref=e351]
                - paragraph [ref=e352]: Corporate Transactions
                - paragraph [ref=e353]: Circumstances may arise where, whether for strategic or other business reasons, HP decides to sell, buy, merge or otherwise reorganize businesses. In such transactions, we may disclose or transfer your personal data to prospective or actual purchasers or receive personal data from sellers. Our practice is to seek appropriate protection for your personal data in these types of transactions.
                - paragraph [ref=e354]
                - paragraph [ref=e355]: Compliance with law
                - paragraph [ref=e356]: "We may also share your personal data when we believe, in good faith, that we have an obligation to: (i) respond to duly authorized information requests of law enforcement agencies, regulators, courts and other public authorities, including to meet national security or other law enforcement requirements; (ii) comply with any law, regulation, subpoena, or court order; (iii) investigate and help prevent security threats, fraud or other criminal or malicious activity; (iv) enforce/protect the rights and properties of HP or its subsidiaries; or (v) protect the rights or personal safety of HP, our employees, and third parties on or using HP property when allowed and in line with the requirements of applicable law."
                - paragraph [ref=e357]
                - paragraph [ref=e358]: International Data Transfers
                - paragraph [ref=e359]: "Your personal data may be transferred to HP companies operating in countries inside or outside of your home country for the purposes above. In addition, HP’s service providers with whom information is shared for the purposes above may be based outside of your home country. HP will address any applicable requirement to ensure that any transferred personal data remains protected and secure. Depending on your country of residence to such transferred data, we rely on the corresponding mechanism (listed purely in alphabetical order) in accordance with applicable local law:"
                - paragraph [ref=e360]
                - list [ref=e361]:
                  - listitem [ref=e362]:
                    - paragraph [ref=e363]: Adequacy Decisions
                - paragraph [ref=e364]:
                  - text: HP relies on determinations from relevant authorities (for example the
                  - link [ref=e365] [cursor=pointer]:
                    - /url: https://ico.org.uk/for-organisations/uk-gdpr-guidance-and-resources/international-transfers/international-transfers-a-guide/
                    - text: UK Government
                  - text: ", the"
                  - link [ref=e366] [cursor=pointer]:
                    - /url: https://commission.europa.eu/law/law-topic/data-protection/international-dimension-data-protection/adequacy-decisions_en
                    - text: European Commission
                  - text: ", or the"
                  - link [ref=e367] [cursor=pointer]:
                    - /url: https://www.fedlex.admin.ch/eli/cc/2022/568/en#annex_1/lvl_u1
                    - text: Swiss Federal Council
                  - text: ), about whether other countries, territories, international organizations or sectors have adequate levels of data protection. Where this occurs, the personal data is transferred to such third countries in reliance of such adequacy decision.
                - paragraph [ref=e368]
                - list [ref=e369]:
                  - listitem [ref=e370]:
                    - paragraph [ref=e371]:
                      - generic [ref=e373]: APE
                      - generic [ref=e375]: C Cross-Border Privacy Rules
                - paragraph [ref=e376]:
                  - generic [ref=e377]: HP’s privacy practices, described in this Privacy Notice, comply with the APEC Cross Border Privacy Rules (CBPR) System. The APEC CBPR provides a framework for organizations to ensure protection of personal information transferred among participating APEC economies. More information about the APEC framework can be found
                  - link [ref=e378] [cursor=pointer]:
