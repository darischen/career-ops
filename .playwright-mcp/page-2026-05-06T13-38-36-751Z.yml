                - paragraph [ref=e544]:
                  - generic [ref=e558]: How We Retain and Keep Your Data Secure
                - paragraph [ref=e559]:
                  - generic [ref=e572]: We maintain physical, electronic, and procedural safeguards to protect the confidentiality of your personal data, including security measures to protect against unlawful or unauthorized processing of personal data, and against the accidental loss of, or damage to, your personal data. In addition, we communicate our privacy and security policies to HP employees and strictly enforce privacy safeguards within HP.
                - paragraph [ref=e573]
                - paragraph [ref=e574]:
                  - generic [ref=e587]: "If your application to an HP job is not successful, you decline the offer or you withdraw from the process; HP will retain your information for a period after the application. HP will retain your information for different reasons, including but not limited to: dealing with legal challenges related to the recruitment decision; or considering you for other current or future jobs at HP."
                - paragraph [ref=e588]
                - paragraph [ref=e589]:
                  - generic [ref=e603]: We will retain your personal data in a form that identifies you for no longer than is necessary for the purposes needed for the application. This requirement is subject to other laws and obligations that require HP to retain information for certain periods.
                - paragraph [ref=e604]
                - paragraph [ref=e605]:
                  - generic [ref=e618]: As permitted with your consent, and depending on local laws, we keep your personal data for contacting you for future job opportunities, potential use in legal proceedings, or compliance purposes. Job applicants and candidates may subsequently withdraw at any time by contacting us via the information in the “Exercising Your Rights & Contacting Us” section.
                - paragraph [ref=e619]
                - paragraph [ref=e620]:
                  - generic [ref=e633]: When a candidate enters employment with HP, his or her personal data and relevant background check may be transferred to an employee personnel file and may be processed and retained in accordance with applicable law or our HP Global Employee Privacy Policy & Notice from time to time in force.
                - paragraph [ref=e634]
                - paragraph [ref=e635]:
                  - generic [ref=e649]: Exercising Your Rights & Contacting Us
                - paragraph [ref=e650]:
                  - generic [ref=e663]: If you are a job applicant or a candidate, you are entitled to request access to personal data that you have provided to us or that we maintain about you and ask us for a copy of such information. This includes the right to request an explanation about our policies and practices relating to the handling of your personal data. We must also provide you with details about what personal data we have collected about you and how we collect, use, disclose, and otherwise process such information. In addition, you have the right to request update, correction, amendment, restriction, or deletion of your personal data; and to obtain the personal data you provide with your consent or in connection with a contract in a structured, machine-readable format and to ask us to transfer this data to another processing entity.
                - paragraph [ref=e664]
                - paragraph [ref=e665]:
                  - generic [ref=e678]: You also have the rights to object and withdraw your consent at any time. The withdrawal of consent does not affect the lawfulness of processing based on consent before its withdrawal.
                - paragraph [ref=e679]
                - paragraph [ref=e680]:
                  - generic [ref=e693]: In certain cases, your rights may be limited, for example if fulfilling your request would reveal personal data about another person or if you ask us to delete information which we are required by law to keep it.
                - paragraph [ref=e694]
                - paragraph [ref=e695]:
