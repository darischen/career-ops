          - generic [ref=e20]:
            - strong [ref=e23]: "About Glean:"
            - generic [ref=e25]: Glean is the Work AI platform that helps everyone work smarter with AI. What began as the industry’s most advanced enterprise search has evolved into a full-scale Work AI ecosystem, powering intelligent Search, an AI Assistant, and scalable AI agents on one secure, open platform. With over 100 enterprise SaaS connectors, flexible LLM choice, and robust APIs, Glean gives organizations the infrastructure to govern, scale, and customize AI across their entire business - without vendor lock-in or costly implementation cycles.
            - generic [ref=e27]: "At its core, Glean is redefining how enterprises find, use, and act on knowledge. Its Enterprise Graph and Personal Knowledge Graph map the relationships between people, content, and activity, delivering deeply personalized, context-aware responses for every employee. This foundation powers Glean’s agentic capabilities - AI agents that automate real work across teams by accessing the industry’s broadest range of data: enterprise and world, structured and unstructured, historical and real-time. The result: measurable business impact through faster onboarding, hours of productivity gained each week, and smarter, safer decisions at every level."
            - generic [ref=e29]: Recognized by Fast Company as one of the World’s Most Innovative Companies (Top 10, 2025), by CNBC’s Disruptor 50, Bloomberg’s AI Startups to Watch (2026), Forbes AI 50, and Gartner’s Tech Innovators in Agentic AI, Glean continues to accelerate its global impact. With customers across 50+ industries and 1,000+ employees in more than 25 countries, we’re helping the world’s largest organizations make every employee AI-fluent, and turning the superintelligent enterprise from concept into reality.
            - generic [ref=e31]: If you’re excited to shape how the world works, you’ll help build systems used daily across Microsoft Teams, Zoom, ServiceNow, Zendesk, GitHub, and many more - deeply embedded where people get things done. You’ll ship agentic capabilities on an open, extensible stack, with the craft and care required for enterprise trust, as we bring Work AI to every employee, in every company.
          - generic [ref=e32]:
            - strong [ref=e36]: "About the Role:"
            - generic [ref=e38]: Glean is looking for software engineers to help build the world's best search and assistant product for work. Our engineers work on a range of systems across the stack, including generative AI, RAG, query understanding, document understanding, domain-adapted language models, natural language question-answering, evaluation, and experimentation. We interact regularly with customers, deeply understand their pain points, and use whatever tool is necessary, simple or complex, to solve their problems.
            - strong [ref=e42]: "You will:"
            - list [ref=e44]:
              - listitem [ref=e45]: Design, build, and improve AI/ML systems and data pipelines infrastructure, including platforms that power large language model serving, routing, and orchestration at scale.
              - listitem [ref=e46]: Work with and enable other engineers focused on modeling and Agentic capabilities
              - listitem [ref=e47]: Build agentic systems that leverage AI to proactively monitor, diagnose, debug and maintain infrastructure health at scale across cloud deployments
              - listitem [ref=e48]: Write robust code that's easy to read, maintain, and test
              - listitem [ref=e49]: Mentor more junior engineers, or learn from battle-tested ones
            - strong [ref=e52]: "About you:"
            - list [ref=e54]:
              - listitem [ref=e55]: 2-5 years of experience
              - listitem [ref=e56]: BA/BS in computer science, math, sciences, or a related degree
              - listitem [ref=e57]: Proven ability to design, build, and ship production-ready software, ideally around AI/ML infrastructure (Batch processing pipelines, Serving infrastructure, LLM orchestration etc.)
              - listitem [ref=e58]: Strong coding skills (Python, Go, Java)
              - listitem [ref=e59]: Thrive in a customer-focused, tight-knit and cross-functional environment — being a team player and willing to take on whatever is most impactful for the company is a must
              - listitem [ref=e60]: A proactive and positive attitude to lead, learn, troubleshoot and take ownership of both small tasks and large features
            - strong [ref=e63]: "Location:"
            - list [ref=e65]:
              - listitem [ref=e66]: This role is hybrid (3-4 days a week in our Mountain View office)
            - strong [ref=e69]: "Compensation & Benefits:"
            - generic [ref=e71]: The standard base salary range for this position is $175,000 - $270,000 annually. Compensation offered will be determined by factors such as location, level, job-related knowledge, skills, and experience. Certain roles may be eligible for variable compensation, equity, and benefits.
            - generic [ref=e73]: We offer a comprehensive benefits package including competitive compensation, Medical, Vision, and Dental coverage, generous time-off policy, and the opportunity to contribute to your 401k plan to support your long-term goals. When you join, you'll receive a home office improvement stipend, as well as an annual education and wellness stipends to support your growth and wellbeing. We foster a vibrant company culture through regular events, and provide healthy lunches daily to keep you fueled and focused.
            - generic [ref=e75]: We are a diverse bunch of people and we want to continue to attract and retain a diverse range of people into our organization. We're committed to an inclusive and diverse company. We do not discriminate based on gender, ethnicity, sexual orientation, religion, civil or family status, age, disability, or race.
            - generic [ref=e77]: "#LI-HYBRID"
          - generic [ref=e78]:
            - strong [ref=e82]: "AI-First Mindset at Glean:"
            - generic [ref=e85]:
              - text: At Glean, AI fluency is core to how we work and we're committed to ensuring every new hire feels confident integrating AI into their everyday work.
              - strong [ref=e86]: As part of the interview process, you'll complete a brief AI-focused exercise or discussion so we can understand how you think about, design, and use AI to drive impact in your role.
              - text: Feel free to reference any tools, platforms, or workflows you use today — prior Glean experience isn't required.
            - strong [ref=e90]: "Global Data Privacy Notice for Job Candidates and Applicants:"
            - generic [ref=e93]:
              - text: Depending on your location, the General Data Protection Regulation (GDPR), California Consumer Privacy Act (CCPA), or other privacy laws may regulate the way we manage the data of job applicants. Our full notice outlining how data will be processed as part of the application procedure for applicable locations is available in our
