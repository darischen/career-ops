        - button [ref=e78] [cursor=pointer]:
          - generic [ref=e81]: Apply now
        - generic [ref=e83]: Meta is at the forefront of developing innovative hardware that redefines how people experience the world — from virtual and augmented reality technology. The DFX team is a critical pillar of this mission, ensuring that our advanced devices are not only advanced in function but also manufacturable at scale with the highest standards of quality, cost-efficiency, and reliability. As a DFX Engineer, you will be a vital member of this team, directly influencing the quality, cost, and delivery of advanced Meta devices by creating and implementing solutions for complex manufacturing challenges. Your work will span the entire product lifecycle — from initial concept through to mass production — making this a uniquely impactful engineering role.
        - separator [ref=e84]
        - generic [ref=e85]:
          - heading [level=2] [ref=e86]: DFX Engineer Responsibilities
          - list [ref=e87]:
            - generic [ref=e88]:
              - listitem [ref=e89]: This position sits within the NPI & Manufacturing Engineering team and demands close partnership with Hardware Engineering, Quality, Test Engineering, and our external manufacturing partners. You will be responsible for defining and enforcing manufacturing process best practices as they relate to product design, serving as the critical bridge between design intent and production reality
              - listitem [ref=e90]: On a day-to-day basis, you will partner with cross-functional Engineering teams to identify and resolve manufacturing challenges by applying DFX principles and establishing robust Design for Manufacturing (DFM) guidelines. You will develop manufacturing assembly processes, fixtures, and equipment requirements, and will drive line and fixture qualifications to meet Meta's rigorous standards
              - listitem [ref=e91]: A core part of your mandate will be to engineer new or improved manufacturing processes through the application of both theoretical and practical engineering knowledge, with the goal of enhancing product quality and production efficiency
              - listitem [ref=e92]: You will also serve as the primary technical resource for all factory-related operational issues concerning final assembly processes, from pre-production builds through mass production and end-of-life. This includes providing expert production support engineering for technically complex assembly procedures, testing methods, and failure analysis
              - listitem [ref=e93]: Beyond individual problem-solving, you will offer direction, guidance, and resources to other engineering groups and factory technicians, fostering an environment of continuous improvement and knowledge sharing across the organization
              - listitem [ref=e94]: Willingness to travel domestically and internationally
        - generic [ref=e95]:
          - heading [level=2] [ref=e96]: Minimum Qualifications
          - list [ref=e97]:
            - generic [ref=e98]:
              - listitem [ref=e99]: Bachelor’s Degree in Mechanical, Electro-Mechanical, Manufacturing Engineering or related field
              - listitem [ref=e100]: 8+ years in engineering roles with experience in product design or manufacturing
              - listitem [ref=e101]: Experience with New product introduction and Manufacturing Operations
              - listitem [ref=e102]: Knowledge of GD&T
              - listitem [ref=e103]: Experience in creating tolerance analysis for assemblies and part level drawings
              - listitem [ref=e104]: Experience with NX or PTC Creo CAD
        - generic [ref=e105]:
          - heading [level=2] [ref=e106]: Preferred Qualifications
          - list [ref=e107]:
            - generic [ref=e108]:
              - listitem [ref=e109]: Experience in AI-driven manufacturing or Smart Factory initiatives
              - listitem [ref=e110]: Familiarity with liquid adhesives, hot bar, laser soldering/jetting a plus
              - listitem [ref=e111]: Working knowledge of optics principles as related to CCD cameras and optical alignment
              - listitem [ref=e112]: Proven ability to communicate effectively across audiences
              - listitem [ref=e113]: Demonstrated ongoing AI skill development (e.g., prompt/context engineering, agent orchestration) and staying current with emerging AI technologies
              - listitem [ref=e114]: Experience in precision assembly, inspection and automation equipment
              - listitem [ref=e115]: Demonstrated ability to integrate AI tools to optimize/redesign workflows and drive measurable impact (e.g., efficiency gains, quality improvements)
              - listitem [ref=e116]: Experience adhering to and implementing responsible, ethical AI practices (e.g., risk assessment, bias mitigation, quality and accuracy reviews)
        - separator [ref=e117]
        - generic [ref=e118]:
          - heading [level=2] [ref=e119]: About Meta
          - generic [ref=e122]: Meta builds technologies that help people connect, find communities, and grow businesses. When Facebook launched in 2004, it changed the way people connect. Apps like Messenger, Instagram and WhatsApp further empowered billions around the world. Now, Meta is moving beyond 2D screens toward immersive experiences like augmented and virtual reality to help build the next evolution in social technology. People who choose to build their careers by building with us at Meta help shape a future that will take us beyond what digital connection makes possible today—beyond the constraints of screens, the limits of distance, and even the rules of physics.
