          - generic [ref=e25]:
            - paragraph [ref=e26]:
              - strong [ref=e27]: ABOUT QUINCE
            - paragraph [ref=e28]: "Founded in 2018, Quince was built to challenge the idea that nice things have to cost a lot. Our mission is simple: to make really high quality essentials for really low prices, produced fairly and sustainably. We believe everyone deserves exceptional craftsmanship and timeless design without the traditional markups. Quince is a direct-to-consumer (DTC) model that cuts out middlemen and leverages just-in-time manufacturing to minimize waste and maximize value."
            - paragraph [ref=e29]: "Quince is a tech company disrupting the retail industry by putting AI, analytics and automation at the center of everything we do. Our unwavering commitment to excellence and company values guide our teams and actions:"
            - list [ref=e30]:
              - listitem [ref=e31]:
                - paragraph [ref=e32]:
                  - strong [ref=e33]: Customer First
                  - text: ": We prioritize customer satisfaction in every decision."
              - listitem [ref=e34]:
                - paragraph [ref=e35]:
                  - strong [ref=e36]: High Quality
                  - text: ": True quality means premium materials and rigorous production standards you can feel good about."
              - listitem [ref=e37]:
                - paragraph [ref=e38]:
                  - strong [ref=e39]: Essential Design
                  - text: ": We focus on timeless, functional essentials instead of chasing trends."
              - listitem [ref=e40]:
                - paragraph [ref=e41]:
                  - strong [ref=e42]: Always a Better Deal
                  - text: ": Innovation and transparency ensure value for both customers and partners."
              - listitem [ref=e43]:
                - paragraph [ref=e44]:
                  - strong [ref=e45]: Social & Environmental Responsibility
                  - text: ": We commit to sustainable materials, ethical production, and fair wages."
            - paragraph [ref=e46]: Quince partners with world-class manufacturers across the globe and serves millions of customers. With strong investor backing and a focus on sustainable growth, we are a company that is rapidly scaling while maintaining a commitment to quality, simplicity, and radical price transparency.
            - paragraph [ref=e47]:
              - strong [ref=e48]: OUR TEAM AND SUCCESS
            - paragraph [ref=e49]: At Quince, you will be part of a high-performing team that is redefining what quality, value, and sustainability mean in modern retail. We are a destination for builders, innovators, and operators to come together and challenge the status quo. Our collective ambition is bold. We are creating an entirely new category and customer experience – one that democratizes luxury and provides high quality products at radically low prices. That mission demands a world-class team committed to excellence.
            - paragraph [ref=e50]: If you are motivated by impact, growth, and purpose, you will find a strong sense of belonging at Quince.
          - generic [ref=e51]:
            - paragraph [ref=e52]:
              - strong [ref=e54]: THE ROLE
            - paragraph [ref=e55]:
              - strong [ref=e56]: Software Development Engineer [New Grad]
            - paragraph [ref=e57]: We are hiring upcoming undergraduate candidates to join our U.S.-based engineering team. As a SDE, you will design, build, and operate scalable software systems that power core business capabilities. Success in this role means shipping high-quality code, owning features end-to-end, and continuously improving performance, reliability, and engineering standards across the organization. This role is based in our Palo Alto office and requires in-office presence 3 days per week.
            - paragraph [ref=e58]:
              - strong [ref=e59]: RESPONSIBILITIES
            - list [ref=e60]:
              - listitem [ref=e61]: Designing and implementing software features and components, following best practices and coding standards.
              - listitem [ref=e62]: Support operational excellence by participating in monitoring, debugging, and issue resolution
              - listitem [ref=e63]: Maintain strong documentation and adhere to coding, data-quality, and architectural standards
              - listitem [ref=e64]: Keeping up-to-date with new technologies, frameworks, and best practices in software development, and applying them to improve the performance and reliability of software systems.
              - listitem [ref=e65]: Primarily hands-on role focused on programming, execution, and continuous improvement
            - paragraph [ref=e66]:
              - strong [ref=e67]: QUALIFICATIONS
            - paragraph [ref=e68]:
              - strong [ref=e69]: "Required:"
            - list [ref=e70]:
              - listitem [ref=e71]: You have excellent computer science fundamentals
              - listitem [ref=e72]: Bachelor's or Master's degree in Computer Science or a related field.
              - listitem [ref=e73]: Proficiency in at least one programming language (e.g. Java, JavaScript)
              - listitem [ref=e74]: Strong analytical and problem-solving abilities
              - listitem [ref=e75]: Experience using AI-powered development tools to improve coding efficiency, testing, and problem-solving
              - listitem [ref=e76]: High ownership, eagerness to learn, and ability to work in ambiguous, fast-paced environments
              - listitem [ref=e77]: Curious, quick learner, scrappy and someone who loves to experiment
            - paragraph [ref=e78]: All posted ranges are reflective of base salary and may vary depending upon experience level and location.
            - paragraph [ref=e79]: Bonus and equity may also be provided for eligible roles.
          - generic [ref=e81]:
