          - generic [ref=e90]:
            - paragraph [ref=e91]:
              - strong [ref=e92]: WHY QUINCE?
            - paragraph [ref=e93]: Joining Quince means being part of a mission-driven team reshaping retail. You will work alongside talented colleagues, tackle meaningful challenges, and contribute to building a more sustainable, accessible future for customers and partners alike.
            - paragraph [ref=e94]:
              - strong [ref=e95]: EQUAL OPPORTUNITY & HIRING INTEGRITY
            - paragraph [ref=e96]: Quince provides equal employment opportunities to all employees and applications for employment and prohibits discrimination and harassment of any type without regard to race, color, religion, age, sex, national origin, disability status, genetics, protected veteran or military status, sexual orientation, gender identity or expression, or any other characteristic protected by federal, state, or local laws.
            - paragraph [ref=e97]:
              - text: Quince is committed to providing reasonable accommodations to qualified individuals with disabilities. If you need a reasonable accommodation to complete your application or to perform the essential functions of a role at Quince, please let us know by completing
              - link "this accommodation form" [ref=e98] [cursor=pointer]:
                - /url: https://forms.gle/DpJ11jHa1WbqfUWB9
              - text: . We review all requests individually and will work with you to determine appropriate accommodations on a case-by-case basis.
            - paragraph [ref=e99]: Employment is contingent upon successful completion of a background check. Quince will conduct background checks in compliance with applicable federal, state, and local laws.
            - paragraph [ref=e100]:
              - emphasis [ref=e101]: "Security Advisory: Beware of Frauds"
            - paragraph [ref=e102]: At Quince, we're dedicated to recruiting top talent who share our drive for innovation. To safeguard candidates, Quince emphasizes legitimate recruitment practices. Initial communication is primarily via official Quince email addresses and LinkedIn; beware of deviations. Personal data and sensitive information will not be solicited during the application phase. Interviews are conducted via phone, in person, or through the approved platforms Google Meets or Zoom—never via messaging apps or other calling services. Offers are merit-based, communicated verbally, and followed up in writing. If personal information is requested to initiate the hiring process, rest assured it will be through secure and protected means.
