              - listitem [ref=e87]:
                - paragraph [ref=e88]: Can work collaboratively with cross-functional teams.
              - listitem [ref=e89]:
                - paragraph [ref=e90]: Thrive in fast-paced environments where priorities or deadlines may compete.
              - listitem [ref=e91]:
