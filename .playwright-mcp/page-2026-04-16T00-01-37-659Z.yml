            - listitem [ref=e36]: Solid EE fundamentals with hands-on experience designing, building, and testing PCBAs
            - listitem [ref=e37]: Mastery of Altium in both schematics and layout
            - listitem [ref=e38]: Mastery of debugging HW issues. You know how to attack a problem, document, and come up with solutions quickly
