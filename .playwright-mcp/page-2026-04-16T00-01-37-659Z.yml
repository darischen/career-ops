            - listitem [ref=e42]: Experience with Camera Electronics
            - listitem [ref=e43]: Designed high speed boards (PCIe Gen1-5, USB3/4, MIPI, GMSL, 10G Ethernet) with high current power supplies for compute modules
            - listitem [ref=e44]: Understanding of signal integrity issues and how to mitigate them
            - listitem [ref=e45]: Experience with very small boards (HDI, flex, rigid flex)
            - listitem [ref=e46]: Experience using LTspice and Python
            - listitem [ref=e47]: Embedded programming of DSPs, microcontrollers, and FPGAs
