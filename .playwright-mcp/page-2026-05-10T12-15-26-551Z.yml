        - list [ref=e65]:
          - listitem [ref=e66]: Hands-on experience with one of the HIL platforms is a plus (e.g. dSPACE, NI PXI/VeriStand, or Speedgoat with Simulink Real-Time).
          - listitem [ref=e67]: Experience in automotive, aerospace, or industrial automation industries.
          - listitem [ref=e68]: Exposure to Agile development processes and CI/CD pipelines (e.g., Jenkins).
          - listitem [ref=e69]: Knowledge of safety-critical systems and relevant standards (e.g., DO-178C, ISO 26262, IEC 61508).
          - listitem [ref=e70]: Experience with automated testing frameworks or tools (e.g., ECU-TEST, TestStand).
          - listitem [ref=e71]: Experience with requirements-based testing and tools like DOORS, Polarion, or Jama.
