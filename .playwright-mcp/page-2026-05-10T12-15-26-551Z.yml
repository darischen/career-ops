        - list [ref=e54]:
          - listitem [ref=e55]: Bachelor’s or Master’s degree in Electrical Engineering, Computer Engineering, Mechatronics, or a related field.
          - listitem [ref=e56]: Strong knowledge of MATLAB/Simulink and scripting languages (Python, Julia, etc.).
          - listitem [ref=e57]: Experience in developing and executing test cases for embedded control systems.
          - listitem [ref=e58]: Familiarity with communication protocols (CAN, Ethernet, RS-485).
          - listitem [ref=e59]: Strong problem-solving and analytical skills.
      - generic [ref=e61]:
