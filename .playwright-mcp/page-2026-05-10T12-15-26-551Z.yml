        - generic [ref=e30]: Hermeus is a venture-backed defense aviation company reclaiming the lost art of rapid iterative prototyping to build the fastest aircraft in the world today. By prioritizing relentless hardware iteration, we deliver high-speed systems at the pace of the modern battlefield. We work with the Department of War to provide the high-speed capabilities our nation and its allies need to maintain a durable, asymmetric advantage.
        - generic [ref=e32]: We are seeking a multidisciplinary engineer that will help us develop our next generation Hardware-in-the-Loop (HIL) testbeds for our hypersonic aircraft. In this role, you will be responsible for designing, developing, and maintaining HIL testbeds that will validate complex avionics systems. You will work closely with software, hardware, and systems engineers to ensure product reliability, functionality, and compliance with specifications.
        - generic [ref=e34]: We are open to hiring a fresh graduate with experience working on a highly integrated school project/team like Cubesat, Rocketry, Drone Racing or similar.
      - generic [ref=e36]:
        - heading "Key Responsibilities:" [level=3] [ref=e37]
        - list [ref=e40]:
          - listitem [ref=e41]: Design, implement, and maintain HIL test benches including low voltage harnesses.
          - listitem [ref=e42]: Develop test scripts, models, and automation frameworks to execute and validate embedded control software.
          - listitem [ref=e43]: Integrate HIL systems with other avionics components.
          - listitem [ref=e44]: Simulate sensor and actuator interfaces using real-time models and signal conditioning hardware.
          - listitem [ref=e45]: SIL (Software-in-the-Loop), and HIL test workflows throughout the development lifecycle.
          - listitem [ref=e46]: Troubleshoot hardware and software issues on the HIL bench and work cross-functionally to resolve defects.
          - listitem [ref=e47]: Create and maintain test documentation including test plans, test cases, and validation reports.
          - listitem [ref=e48]: Collaborate with system architects and software engineers to define test coverage and improve test strategies.
      - generic [ref=e50]:
