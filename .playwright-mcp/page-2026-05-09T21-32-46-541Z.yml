              - heading "Description" [level=2] [ref=e49]
              - paragraph [ref=e50]:
                - text: If you are interested in this position, please apply on Twitch's Career site https://www.twitch.tv/jobs/en/
                - text: "About Us:"
                - text: Twitch is the world’s biggest live streaming service, with global communities built around gaming, entertainment, music, sports, cooking, and more. It is where thousands of communities come together for whatever, every day.
                - text: We’re about community, inside and out. You’ll find coworkers who are eager to team up, collaborate, and smash (or elegantly solve) problems together. We’re on a quest to empower live communities, so if this sounds good to you, see what we’re up to on LinkedIn and X, and discover the projects we’re solving on our Blog. Be sure to explore our Interviewing Guide to learn how to ace our interview process.
                - text: About the Role
                - text: Join Twitch's Commerce Engineering organization, where we're revolutionizing how viewers engage with their favorite creators. We are the teams behind Subscriptions, Gifting, Bits, Hype Train and Turbo products. From experimental features to established systems used by millions, we're constantly pushing the boundaries of what's possible in live streaming.
                - text: You can work from Seattle, WA or San Francisco, CA.
                - text: You Will
                - text: "- Craft immersive, interactive experiences that keep viewers supporting creators while engaging with the Twitch Community"
                - text: "- Architect and build robust, scalable applications that can handle millions of concurrent users"
                - text: "- Collaborate across teams to create cohesive solutions that drive business impact"
                - text: "- Transform customer feedback into innovative features that enhance the Twitch experience"
                - text: Perks
                - text: "* Medical, Dental, Vision & Disability Insurance"
                - text: "* 401(k)"
                - text: "* Maternity & Parental Leave"
                - text: "* Flexible PTO"
                - text: "* Amazon Employee Discount"
                - text: About the team
                - text: Twitch is all about community, and our Community Team is a core pillar of what makes Twitch, Twitch. Teams within Community are responsible for a myriad of product areas impacting the creator, viewer, and moderator journeys on our platform. As a member of our team, you'll build solutions that improve g the experience of millions of daily active users on our platform and create tools that keep both streamers and viewers engaged and connected on our platform.
