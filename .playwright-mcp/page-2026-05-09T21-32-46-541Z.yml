                - text: "- A track record of building consumer-facing products that users love"
                - text: "- Demonstrable experience of modern programming languages and frameworks"
                - text: "- Sharp problem-solving skills with a focus on algorithms, data structures, and schema design"
            - generic [ref=e54]:
