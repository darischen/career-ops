          - generic [ref=e45]:
            - paragraph [ref=e46]:
              - strong [ref=e47]: About us
            - paragraph [ref=e48]: Encord is the universal data layer for AI that helps 300+ AI teams train and run models on the right data. Our platform indexes, curates, annotates, and evaluates data across the full AI lifecycle, from development through production.
            - paragraph [ref=e50]: Trusted by Woven by Toyota, AXA, UiPath, Zipline, and more. We're an ambitious team of 100+ working at the frontier of AI and have raised $60M in Series C funding from Wellington Management, CRV, Next47 and Y Combinator.
            - paragraph [ref=e52]:
              - strong [ref=e53]: The role
            - paragraph [ref=e54]: Encord is scaling rapidly. We've achieved strong product–market fit and have a clear path to significantly accelerate revenue this year. In Physical AI alone, we've grown revenue 10x over the past 12 months — and we're just getting started.
            - paragraph [ref=e56]: Now, we're looking for exceptional sales talent to help build and scale the Physical AI business from the ground up.
            - paragraph [ref=e58]: Reporting to the Head of Physical AI and partnering closely with our founders and leadership team, you'll take a category-defining AI infrastructure platform to market — selling to some of the most advanced AI teams in the world as we expand from Digital into Physical AI use cases. This is a high ownership, individual contributor role with a path to grow responsibilities from sourcing to supporting on deals and progressing into owning full cycle sales. This is not a traditional BDR role.
            - paragraph [ref=e60]: "You'll be an early sales hire with real ownership across the top and middle of the funnel. You'll help shape how we identify, engage, and convert the right customers as we scale — while building the foundations of a long-term sales career. You'll sit at the intersection of outbound strategy, customer discovery, and deal execution. From day one, you'll be expected to think like a seller: prioritizing the right accounts, crafting thoughtful outreach, and partnering closely with the quota carriers to move real opportunities forward."
            - paragraph [ref=e62]: "This is a rare opportunity to join at the inflection point: with proven PMF and clear dominance in Digital AI — and now doubling down on Physical AI, one of the most transformative technological revolutions of our time."
            - paragraph [ref=e64]: You won't just be joining a rocket ship — you'll help steer it.
            - paragraph [ref=e66]:
              - strong [ref=e67]: What you'll do
            - list [ref=e68]:
              - listitem [ref=e69]:
                - paragraph [ref=e70]: Identify, research, and prioritize high-potential accounts across Encord’s core verticals and regions
              - listitem [ref=e71]:
                - paragraph [ref=e72]: Develop strong points of view on who to target and why
              - listitem [ref=e73]:
                - paragraph [ref=e74]: Execute thoughtful, multi-channel outbound (email, LinkedIn, calls, creative plays)
              - listitem [ref=e75]:
                - paragraph [ref=e76]: Craft messaging that resonates with technical and commercial buyers
              - listitem [ref=e77]:
                - paragraph [ref=e78]: Partner with Growth and Sales to test campaigns, refine targeting, and improve conversion
              - listitem [ref=e79]:
                - paragraph [ref=e80]: Own outcomes, not just activity — quality opportunities matter more than volume
              - listitem [ref=e81]:
                - paragraph [ref=e82]: Work directly with Account Executives to progress live opportunities
              - listitem [ref=e83]:
                - paragraph [ref=e84]: Support discovery, demos, trials, and follow-ups
              - listitem [ref=e85]:
                - paragraph [ref=e86]: Help shape business cases and stakeholder mapping
              - listitem [ref=e87]:
                - paragraph [ref=e88]: Ensure a high-quality, consistent prospect experience
              - listitem [ref=e89]:
                - paragraph [ref=e90]: Learn how complex, technical B2B deals actually get done
            - paragraph [ref=e92]:
