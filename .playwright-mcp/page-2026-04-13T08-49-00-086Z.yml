            - generic [ref=e65]:
              - generic [ref=e67]: Electronic Arts creates next-level entertainment experiences that inspire players and fans around the world. Here, everyone is part of the story. Part of a community that connects across the globe. A place where creativity thrives, new perspectives are invited, and ideas matter. A team where everyone makes play happen.
              - generic [ref=e70]:
                - paragraph [ref=e71]: "As a Software Engineer I, you will develop essential internal tools and services that empower game teams and studios. You will ship full-stack features end-to-end: React frontends, NodeJS backends, and everything in between."
                - paragraph [ref=e72]: Reporting to the Engineering Manager, you will work inside an AI-First development culture where agentic tooling is how we build, iterate, and deliver faster than teams twice our size.
                - paragraph [ref=e73]: Our 24x7 live services mean on-call support is part of our responsibilities, as we support customers across broad time zones worldwide.
                - paragraph [ref=e74]
                - paragraph [ref=e75]:
                  - strong [ref=e76]: Responsibilities
                - list [ref=e77]:
                  - listitem [ref=e78]: You will collaborate with team members to define project requirements, technical specifications, and deliverables, ensuring understanding of our goals.
                  - listitem [ref=e79]: You will deliver quality features, identify risks and dependencies.
                  - listitem [ref=e80]: You will write automated tests and deliver high-quality software.
                  - listitem [ref=e81]: You will debug live incidents, even in unfamiliar territory or situations.
                  - listitem [ref=e82]: You will participate in code reviews, contribute to documentation, and help identify opportunities for process improvement.
                  - listitem [ref=e83]: You will use AI-powered coding agents (e.g., Claude Code, Copilot) as your primary development accelerator.
                  - listitem [ref=e84]: You will steer AI-generated code with an attention to correctness, security, and maintainability.
                - paragraph [ref=e85]
                - paragraph [ref=e86]:
                  - strong [ref=e87]: "Qualifications:"
                - list [ref=e88]:
                  - listitem [ref=e89]: 1+ years of software engineering experience
                  - listitem [ref=e90]: Experience with web platforms and related technologies, including JavaScript, TypeScript, NodeJS, React, and ExpressJS
                  - listitem [ref=e91]: Experience using AI-powered development tools as part of your workflow
                - paragraph [ref=e92]
                - paragraph [ref=e93]:
                  - strong [ref=e94]: "Bonus:"
                - list [ref=e95]:
                  - listitem [ref=e96]: Experience with Python, NextJS, or Vite
                  - listitem [ref=e97]: Familiarity with Git, CI/CD pipelines, and cloud deployments
                  - listitem [ref=e98]: Exposure to DevOps or infrastructure systems such as Docker and Kubernetes
                  - listitem [ref=e99]: Experience with AWS services (S3, EC2, RDS, CloudWatch, Lambda Functions)
                  - listitem [ref=e100]: Knowledge of database technologies (SQL and NoSQL)
                  - listitem [ref=e101]: Experience with testing solutions such as Cypress and Jest
                - paragraph [ref=e102]
                - paragraph [ref=e103]: The position is hybrid remote/in-office.
