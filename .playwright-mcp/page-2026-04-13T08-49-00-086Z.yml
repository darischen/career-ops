                - strong [ref=e113]: COMPENSATION AND BENEFITS
                - generic [ref=e115]: The ranges listed below are what EA in good faith expects to pay applicants for this role in these locations at the time of this posting. If you reside in a different location, a recruiter will advise on the applicable range and benefits. Pay offered will be determined based on a number of relevant business and candidate factors (e.g. education, qualifications, certifications, experience, skills, geographic location, or business needs).
                - strong [ref=e118]: PAY RANGES
              - generic [ref=e120]: "* British Columbia (depending on location e.g. Vancouver vs. Victoria) *$83,000 - $116,400 CAD"
              - generic [ref=e124]: Pay is just one part of the overall compensation at EA.
              - generic [ref=e127]: For Canada, we offer a package of benefits including vacation (3 weeks per year to start), 10 days per year of sick time, paid top-up to EI/QPIP benefits up to 100% of base salary when you welcome a new child (12 weeks for maternity, and 4 weeks for parental/adoption leave), extended health/dental/vision coverage, life insurance, disability insurance, retirement plan to regular full-time employees. Certain roles may also be eligible for bonus and equity.
