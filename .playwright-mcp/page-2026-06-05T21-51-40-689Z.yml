              - paragraph [ref=e31]
              - paragraph [ref=e32]:
                - strong [ref=e34]: About the role
              - paragraph [ref=e35]: Concept Plus is seeking a Junior Software Developer to support client IT systems development and operations within a CI/CD DevSecOps environment. This role contributes to application development, testing, and maintenance while supporting continuous integration, deployment, and delivery across development, security, and operations workflows. The position requires foundational knowledge of client IT processes and technology stack, including DevSecOps pipelines, Cloud One environments, and Oracle/Java-based systems operating across classified and unclassified DISA and cloud environments.
              - paragraph [ref=e36]
              - paragraph [ref=e37]: The Junior Developer works within Agile teams, collaborating with development, Cloud Engineering, DevSecOps, and QA resources to support backlog execution and delivery. This role participates in Agile ceremonies, develops code under guidance, supports testing and defect resolution, and contributes to continuous improvement and team collaboration to deliver high-quality solutions aligned with mission objectives.
              - paragraph [ref=e38]
              - paragraph [ref=e39]:
                - strong [ref=e41]: What you'll do
              - list [ref=e42]:
                - listitem [ref=e43]: Assist in designing, developing, and maintaining application components and services
                - listitem [ref=e44]: Support CI/CD pipeline activities, including code integration, testing, and deployment
                - listitem [ref=e45]: Collaborate with developers, QA, DevSecOps, and Cloud Engineering teams to support delivery
                - listitem [ref=e46]: Participate in Agile ceremonies and contribute to backlog execution
                - listitem [ref=e47]: Develop and maintain code, scripts, and basic integrations under guidance from senior team members
                - listitem [ref=e48]: Support automated testing and validation activities
                - listitem [ref=e49]: Troubleshoot and resolve defects with support from senior developers
                - listitem [ref=e50]: Contribute to documentation and knowledge sharing
                - listitem [ref=e51]: Assist in the development, maintenance, and monitoring of CI/CD pipelines using tools such as GitHub Actions, GitLab CI, Jenkins, or Azure DevOps
                - listitem [ref=e52]: Support infrastructure as code (IaC) efforts using tools like Terraform, CloudFormation, or ARM templates
                - listitem [ref=e53]: Help integrate security scanning and compliance checks into build and deployment pipelines (SAST, DAST, dependency scanning, container scanning)
                - listitem [ref=e54]: Support cloud infrastructure in AWS, Azure, or GCP, with an emphasis on security best practices
                - listitem [ref=e55]: Assist with containerization efforts using Docker and orchestration platforms such as Kubernetes
                - listitem [ref=e56]: Monitor environments, logs, and alerts; assist with troubleshooting and incident response
                - listitem [ref=e57]: Document configurations, processes, and security controls to support audits and compliance requirements
                - listitem [ref=e58]: Collaborate with development, operations, and security teams in an Agile/Scrum environment
                - listitem [ref=e59]: Learn and apply federal security frameworks such as NIST, FISMA, and FedRAMP
                - listitem [ref=e60]: Ensure pipelines and software meet security standards, including STIG hardening and providing documentation for Risk Management Framework (RMF) or Authority to Operate (ATO).
              - paragraph [ref=e61]:
