              - list [ref=e64]:
                - listitem [ref=e65]: Secret – Fully Cleared Only, must confirm clearance is active
                - listitem [ref=e66]: Client 8140 intermediate certification or client 8570 IAM Level II certifications or higher
                - listitem [ref=e67]: US Citizens Only
                - listitem [ref=e68]: 2 years experience in software development
                - listitem [ref=e69]: Familiarity with Java or similar programming languages
                - listitem [ref=e70]: Understanding of software development lifecycle (SDLC) and Agile concepts
                - listitem [ref=e71]: Exposure to version control systems (e.g., Git)
              - paragraph [ref=e72]:
                - strong [ref=e74]: Preferred
              - list [ref=e75]:
                - listitem [ref=e76]: Experience working with Agile development teams of 20+ FTEs and be familiar with Agile methodologies.
                - listitem [ref=e77]: Exposure to CI/CD pipelines or DevSecOps practices
                - listitem [ref=e78]: Familiarity with cloud environments (e.g., AWS or similar platforms)
                - listitem [ref=e79]: Basic understanding of APIs and system integration
                - listitem [ref=e80]: Experience with relational databases (e.g., Oracle or similar)
