                - listitem [ref=e82]: Within commuting distance of an Air Force Base, or Air Guard Base to access classified systems.
                - listitem [ref=e83]: Experience with Linux commands.
                - listitem [ref=e84]: Experience with WSL 2.
                - listitem [ref=e85]: Experience with PL/SQL.
                - listitem [ref=e86]: CompTIA Security+ certificate
