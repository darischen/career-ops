          - generic [ref=e47]:
            - paragraph [ref=e48]:
              - text: Perplexity is seeking an energetic engineer to join our highly driven Agents engineering team. The Agents team consists of AI/ML, backend, and full-stack engineers who collaborate to build delightful agentic experiences within our
              - link "Comet ecosystem" [ref=e49] [cursor=pointer]:
                - /url: https://www.perplexity.ai/comet
              - text: and
              - link "Perplexity Computer" [ref=e50] [cursor=pointer]:
                - /url: https://www.perplexity.ai/computer
              - text: ", our platform for generalized frontier intelligence. Our vision is to empower our users with AI agents that can faithfully actualize their intent, however and wherever expressed, through open-ended interactions with the world."
            - paragraph [ref=e51]: "As an engineer on our Agents team, you will bring AI expertise, sharp product intuition, and a tinkerer's mindset to advance the frontier of what agents can accomplish for our millions of devoted users. You will work across applied research and engineering to solve many open problems in AI, including:"
            - list [ref=e52]:
              - listitem [ref=e53]:
                - paragraph [ref=e54]: Designing AI agents to navigate the digital world and perform increasingly valuable units of work for our users;
              - listitem [ref=e55]:
                - paragraph [ref=e56]: Training action and decision models that determine, based on complex multimodal states, how to accomplish user-specified objectives;
              - listitem [ref=e57]:
                - paragraph [ref=e58]: Providing consistently excellent experiences across desktop, mobile, headless cloud, and other environments through flexible abstractions and frictionless backgrounding;
              - listitem [ref=e59]:
                - paragraph [ref=e60]: Developing permission architectures, payload classifiers, and other methods to implement secure-by-design agentic capabilities;
              - listitem [ref=e61]:
                - paragraph [ref=e62]: Designing optimal data representations and modes of interaction between agents and their environments;
              - listitem [ref=e63]:
                - paragraph [ref=e64]: and much, much more.
            - heading "Responsibilities" [level=2] [ref=e65]:
              - strong [ref=e66]: Responsibilities
            - list [ref=e67]:
              - listitem [ref=e68]:
                - paragraph [ref=e69]: Drive cutting-edge AI capabilities across multiple layers of a rapidly growing product in the AI agents space.
              - listitem [ref=e70]:
                - paragraph [ref=e71]: Develop and leverage cutting-edge AI models, infrastructure, and browser technologies to advance the capability frontier and scale those capabilities for a rapidly growing userbase.
              - listitem [ref=e72]:
                - paragraph [ref=e73]: Ensure a high craft and quality bar, in both AI agent performance and user experience.
              - listitem [ref=e74]:
                - paragraph [ref=e75]: Collaborate with fellow engineers, designers, product managers, data scientists, and others across the company to integrate core Perplexity functionality into our frontier agentic products and vice-versa.
              - listitem [ref=e76]:
                - paragraph [ref=e77]: Contribute to product reliability, code quality, AI evaluation, testing, and maintenance across the broader team.
            - heading "Qualifications" [level=2] [ref=e78]:
              - strong [ref=e79]: Qualifications
            - list [ref=e80]:
              - listitem [ref=e81]:
                - paragraph [ref=e82]: Strong foundational familiarity with the full AI product stack.
              - listitem [ref=e83]:
                - paragraph [ref=e84]: Proficiency in Python (bonus points for TypeScript, Go, and/or Rust).
              - listitem [ref=e85]:
