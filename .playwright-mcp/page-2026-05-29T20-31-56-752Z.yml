        - generic [ref=e19]:
          - generic [ref=e20]:
            - paragraph [ref=e21]: At Fuze Health, we put patients first and tirelessly address the most pressing needs in healthcare. We empower millions to digitally connect with care providers, essential health resources and needed treatments – and enable care providers, employers, health plans and life sciences companies to meaningfully enhance quality, outcomes and value. We are dedicated to helping our partners evolve and modernize to meet emerging patient and marketplace needs.
            - paragraph [ref=e22]: Fuze Health’s foundation is built upon the strategic combination of several proven, technology-powered innovators in the digital health, diagnostics, and pharmacy sectors. Our growing portfolio brings together the capabilities of industry leaders including LetsGetChecked, Truepill, and Alto Pharmacy, to create a distinctive, unified force in healthcare. Together, we have the shared vision, advanced capabilities and talented teams to deliver next-generation solutions that patients and healthcare partners need today and into the future.
          - generic [ref=e23]:
            - paragraph [ref=e24]: We are looking for a highly motivated Graduate Software Engineer to join our US technology team. This is a fantastic opportunity for an entry-level professional to gain hands-on experience in a real-world software environment. You will be at the intersection of product engineering, cloud computing, and complex data environments. You will play a crucial role in our engineering team, focusing on the analysis of logs and data to assist in the troubleshooting and resolution of key issues.
            - heading "Responsibilities" [level=3] [ref=e25]
            - list [ref=e26]:
              - listitem [ref=e27]:
                - strong [ref=e28]: "Log and Data Analysis:"
                - text: You will be responsible for reviewing application logs, system metrics, and operational data to identify patterns, errors, and potential issues.
              - listitem [ref=e29]:
                - strong [ref=e30]: "Issue Triage & Resolution:"
                - text: Work closely with our engineering teams to triage incoming bugs and support tickets, providing them with initial findings and relevant information from your log analysis.
              - listitem [ref=e31]:
                - strong [ref=e32]: "Feature Development:"
                - text: You will be introduced to bug fixing and the initial development of new features, helping to build out our products and solutions.
              - listitem [ref=e33]:
                - strong [ref=e34]: "Collaborate and Document:"
                - text: Serve as a key link between our Quality Assurance, Operations, and and Engineering teams, ensuring seamless communication and a quick path to resolution. Maintain clear and concise documentation of issues, findings, and resolutions in our knowledge base.
            - heading "What we are looking for….." [level=3] [ref=e35]
            - list [ref=e36]:
              - listitem [ref=e37]:
                - strong [ref=e38]: "Education:"
                - text: A Bachelor's degree in Computer Science, Software Engineering, or a related field.
              - listitem [ref=e39]:
                - strong [ref=e40]: "Problem-Solver:"
                - text: You have a natural curiosity and a passion for figuring out problems and getting to the root cause of an issue. You are a disciplined creator of automated tests for your own code.
              - listitem [ref=e41]:
                - strong [ref=e42]: "Eager to Learn:"
                - text: A genuine interest in software development and a strong desire to build a career in engineering.
              - listitem [ref=e43]:
                - strong [ref=e44]: "Independent & Adaptable:"
                - text: You can work autonomously to find solutions to complex problems and be flexible and responsive to changing requirements and priorities.
              - listitem [ref=e45]:
                - strong [ref=e46]: "Communicator:"
                - text: Excellent written and verbal communication skills, with the ability to explain complex technical issues to a variety of audiences.
              - listitem [ref=e47]:
                - strong [ref=e48]: "Technical Skills:"
                - text: Some familiarity with programming languages (e.g., Python, C#, JavaScript) and a basic understanding of software systems is a plus.
            - heading "Desired Skills" [level=3] [ref=e49]
            - list [ref=e50]:
              - listitem [ref=e51]: Experience with Application Observability tools such as Splunk or Datadog.
              - listitem [ref=e52]: Experience with Cloud Platforms (e.g., AWS, Azure, GCP).
            - paragraph
            - generic [ref=e53]:
              - paragraph [ref=e54]:
                - strong [ref=e55]: "Benefits:"
              - paragraph [ref=e56]:
                - text: Alongside a salary of
                - strong [ref=e57]: $76,240
                - text: "-"
                - strong [ref=e58]: $95,300
                - text: "(Depending on Experience), we offer a range of benefits including:"
              - paragraph [ref=e59]: "Full-time employee benefits include: dental, vision, and multiple group medical plans to choose from, a 401(k) retirement savings plan, group life insurance, (AD&D) insurance, flexible spending account (FSA) and health savings account (HSA), commuter benefits, employer-paid short-term (STD) and long-term disability (LTD) insurance, and additional supplemental insurance plans (spouse life insurance, legal insurance, an employee assistance program, home health testing kits, and a fertility medication discount program). Employees are also provided flexible vacation time, accrued paid sick time, 10 paid holidays, (2 floating holidays for full time non-exempt employees) , and up to 16 weeks of paid parental leave for a birthing parent, and up to 8 weeks of paid bonding leave for non-birthing parents, and up to 12 weeks of family caregiver leave, including 4 paid, to support care for a family member, and a Lifestyle Spending Account allowance each month."
            - paragraph [ref=e62]: "#LI-IF #LI-Remote"
            - paragraph
          - paragraph [ref=e64]:
            - text: At Fuze Health, we are committed to fostering an inclusive environment that celebrates diversity in all its forms. We believe that the diversity of thought, background, and experience strengthens our teams and drives innovation. We are an equal-opportunity employer and do not discriminate on the basis of race, ethnicity, religion, color, place of birth, sex, gender identity or expression, sexual orientation, age, marital status, military service status, or disability status. Our goal is to ensure that everyone feels valued and empowered to thrive.
            - text: Fuze Corporate Inc. and its subsidiaries respects your privacy and is committed to protecting your personal information. Please read our
            - link "Candidate Privacy Notice" [ref=e65] [cursor=pointer]:
              - /url: https://www.fuzehealth.com/candidate-privacy-notice
            - text: which explains how we collect, use, disclose, and protect personal information about job applicants during the recruitment and hiring process.
