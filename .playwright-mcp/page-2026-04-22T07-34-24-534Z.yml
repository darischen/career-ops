  - main [ref=e38]:
    - generic [ref=e39]:
      - article [ref=e40]:
        - heading "Overview" [level=2] [ref=e41]
        - paragraph
        - paragraph [ref=e42]: Motivation comes from turning complex information into systems people can trust, analyze, and act on, as well as from building core backend services that operate at global scale. This role offers the opportunity to help build the backend of ArcGIS Data Pipelines, a core geospatial data engineering product used by organizations to make timely decisions and support critical daily operations.
        - paragraph [ref=e43]: As a backend engineer on the Data Pipelines team, you’ll design, build, and own services that support diverse data workloads. You’ll collaborate closely with product engineers, front-end developers, and platform teams, and play an active role in shaping the technical direction of a growing system.
      - article [ref=e44]:
        - heading "Responsibilities" [level=2] [ref=e45]
        - paragraph
        - list [ref=e46]:
          - listitem [ref=e47]: Build services that power geospatial data processing and interactive user experiences
          - listitem [ref=e48]: Create and maintain connectors that integrate data from a wide variety of data sources
          - listitem [ref=e49]: Contribute to systems that run in multiple environments, from cloud-native SaaS to on-premises deployments
          - listitem [ref=e50]: Improve reliability and performance through thoughtful API design, testing, and observability
          - listitem [ref=e51]: Collaborate with teammates to establish requirements, make sound design decisions, and translate ideas into concrete implementations
      - article [ref=e52]:
        - heading "Requirements" [level=2] [ref=e53]
        - paragraph
        - list [ref=e54]:
          - listitem [ref=e55]: 1+ years of industry experience as a software engineer, or equivalent practical experience
          - listitem [ref=e56]: Proficient in one or more backend programming languages such as Python, Java, Scala, or C#
          - listitem [ref=e57]: Solid fundamentals in API design, software design, and system design
          - listitem [ref=e58]: Strong problem-solving, communication, and collaboration skills
          - listitem [ref=e59]: Bachelor's degree in computer science, engineering, or related field
      - article [ref=e60]:
        - heading "Recommended Qualifications" [level=2] [ref=e61]
        - paragraph
        - list [ref=e62]:
          - listitem [ref=e63]: Familiarity with data storage systems such as relational databases and object stores
          - listitem [ref=e64]: Exposure to distributed systems, batch processing, or large-scale data workflows
          - listitem [ref=e65]: Interest in applying AI to improve engineering workflows and end-user features
          - listitem [ref=e66]: An entrepreneurial mindset and a bias towards solutions that help users
        - paragraph [ref=e67]: "#LI-TA1"
        - paragraph [ref=e68]: "#LI-onsite"
        - generic [ref=e70]:
          - generic [ref=e71]:
            - paragraph [ref=e72]:
              - strong [ref=e73]: Total Rewards
            - paragraph [ref=e74]: "Esri’s competitive total rewards strategy includes industry-leading health and welfare benefits: medical, dental, vision, basic and supplemental life insurance for employees (and their families), 401(k) and profit-sharing programs, minimum accrual of 80 hours of vacation leave, twelve paid holidays throughout the calendar year, and opportunities for personal and professional growth. Base salary is one component of our total rewards strategy. Compensation decisions and the base range for this role take into account many factors including but not limited to skill sets; experience and training; licensure and certifications; and other business and organizational needs."
          - generic [ref=e75]: A reasonable estimate of the base salary range is
          - generic [ref=e76]: $79,040-$133,016 USD
      - article [ref=e77]:
        - heading "About Esri" [level=2] [ref=e78]
        - paragraph
        - paragraph [ref=e79]:
          - text: At Esri, diversity is more than just a word on a map. When employees of different experiences, perspectives, backgrounds, and cultures come together, we are more innovative and ultimately a better place to work. We believe in having a diverse workforce that is unified under our mission of creating positive global change. We understand that diversity, equity, and inclusion is not a destination but an ongoing process. We are committed to the continuation of learning, growing, and changing our workplace so every employee can contribute to their life’s best work. Our commitment to these principles extends to the global communities we serve by creating positive change with GIS technology. For more information on Esri’s Racial Equity and Social Justice initiatives, please visit our website
          - link "here" [ref=e80] [cursor=pointer]:
            - /url: https://www.esri.com/en-us/racial-equity/overview#engage-communities
          - text: .
        - paragraph [ref=e81]:
          - strong [ref=e82]: If you don’t meet all of the preferred qualifications for this position, we encourage you to still apply!
        - paragraph [ref=e83]:
          - text: Esri is an equal opportunity employer (EOE) and all qualified applicants will receive consideration for employment without regard to race, color, religion, sex, sexual orientation, gender identity, national origin, disability status, protected veteran status, or any other characteristic protected by law. If you need reasonable accommodation for any part of the employment process, please email
          - link "askcareers@esri.com" [ref=e84] [cursor=pointer]:
            - /url: mailto:askcareers@esri.com
          - text: and let us know the nature of your request and your contact information. Please note that only those inquiries concerning a request for reasonable accommodation will be responded to from this e-mail address.
        - paragraph [ref=e85]:
          - link "Esri Privacy" [ref=e86] [cursor=pointer]:
            - /url: https://www.esri.com/en-us/privacy/overview
          - text: Esri takes our responsibility to protect your privacy seriously. We are committed to respecting your privacy by providing transparency in how we acquire and use your information, giving you control of your information and preferences, and holding ourselves to the highest national and international standards, including CCPA and GDPR compliance.
