        - paragraph [ref=e77]:
          - strong [ref=e79]: Who We Are
        - paragraph [ref=e80]: Beyond New Horizons (BNH) is a fully populated joint venture of Astrion and Fluor Federal Services, Inc. formed to provide unmatched Test Operations and Sustainment services for the Arnold Engineering Development Complex.
        - paragraph [ref=e81]:
          - generic [ref=e82]:
            - text: Our name honors the legacy of AEDC’s
            - emphasis [ref=e83]: Toward New Horizons
            - text: founding study. BNH expands AEDC’s capacity by leveraging our parent companies' expertise in military and space system testing. We deliver proven results in large-scale program management, engineering, and construction for technically advanced, high-hazard facilities.
        - paragraph [ref=e84]
        - paragraph [ref=e85]:
          - strong [ref=e87]: Overview
        - paragraph [ref=e88]: Beyond New Horizons, LLC (BNH) is seeking a talented AI Engineer to join our Digital Enterprise team. In this role, you will lead the implementation of data-centered projects that directly improve AEDC’s ground test data infrastructure, facility operations, and business systems. You will work with multidisciplinary teams to find new opportunities to leverage data, drive critical decisions, and help design a modern data architecture from the ground up.
        - paragraph [ref=e89]: This is a unique opportunity to apply your AI and data engineering skills to solve complex challenges of national importance.
        - paragraph [ref=e90]
        - paragraph [ref=e91]:
          - generic [ref=e92]:
