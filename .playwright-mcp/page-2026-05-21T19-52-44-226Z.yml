        - list [ref=e154]:
          - listitem [ref=e155]: A Master's degree in a relevant technical field.
          - listitem [ref=e156]: 3+ years of professional experience in software development or AI-related roles.
          - listitem [ref=e157]: Proficiency with AI frameworks like TensorFlow, PyTorch, or Scikit-learn.
          - listitem [ref=e158]: Strong coding skills in languages such as Python, Java, or C++, along with SQL.
          - listitem [ref=e159]: "Experience with the full data lifecycle: ETL, data mining, APIs, and data warehousing."
          - listitem [ref=e160]: Knowledge of cloud platforms (AWS, Azure, Google Cloud) and DevSecOps methodologies.
          - listitem [ref=e161]: A deep understanding of various machine learning techniques and their real-world advantages and drawbacks.
