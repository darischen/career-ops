          - listitem [ref=e146]: "Grade 07: A Bachelor of Science in Computer Science, Statistics, Mathematics, Engineering, or a related field from an accredited university and at least 2 years of relevant experience."
          - listitem [ref=e147]: Must be a current U.S. Citizen and able to obtain and maintain a security clearance.
        - paragraph [ref=e148]:
