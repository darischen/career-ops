        - paragraph [ref=e112]
        - paragraph [ref=e113]
        - paragraph [ref=e114]:
          - strong [ref=e116]: Job Summary
        - paragraph [ref=e117]: Beyond New Horizons, LLC (BNH) is the team selected by the U.S. Air Force to conduct Test and Operations Sustainment at the Arnold Engineering Development Complex (AEDC) at Arnold Air Force Base in Tennessee. AEDC operates more than 55 aerodynamic and propulsion wind tunnels, rocket and turbine engine test cells, space environmental chambers, arc heaters, ballistic ranges and other specialized units located in six states. Many of the complex's test units have capabilities unmatched elsewhere in the United States; some are unique in the world. AEDC is one of three installations which are part of the Air Force Test Center (AFTC), one of six subordinate commands of the Air Force Materiel Command organization, and an important national resource.
        - paragraph [ref=e118]
        - paragraph [ref=e119]: AEDC’s mission is to conduct developmental test and evaluation for the Nation through modeling, simulation, and ground and flight test. Execution of the mission requires a large team of highly qualified and dedicated professionals from multiple technical disciplines to effectively accomplish the objectives of our test customers.
        - paragraph [ref=e120]:
          - strong [ref=e122]
        - paragraph [ref=e123]:
          - generic [ref=e124]:
            - strong [ref=e125]: J
            - strong [ref=e126]: "ob Duties:"
        - list [ref=e127]:
          - listitem [ref=e128]: Develop and implement enterprise-level artificial intelligence (AI) strategies and programs.
          - listitem [ref=e129]: Automate manual processes and optimize data delivery by re-designing infrastructure for greater scalability.
          - listitem [ref=e130]: Utilize machine learning tools to select features, build, and optimize classifiers that generate actionable insights from complex test data.
          - listitem [ref=e131]: Identify, assess, and integrate new data sources and data-gathering techniques.
          - listitem [ref=e132]: Lead AI proof-of-concept projects to explore new applications and technologies.
          - listitem [ref=e133]: Collaborate with diverse engineering and technical teams to implement models and monitor their outcomes.
          - listitem [ref=e134]: Define and develop processes to monitor and analyze model performance and data accuracy.
          - listitem [ref=e135]: It is a condition of employment to wear company issued PPE (Personal Protective Equipment) in accordance with supervisory direction and company policy.
          - listitem [ref=e136]: Perform other related duties as required.
