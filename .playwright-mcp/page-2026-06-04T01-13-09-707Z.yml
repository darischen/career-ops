            - listitem [ref=e75]:
              - link "Wyzant" [ref=e76] [cursor=pointer]:
                - /url: https://www.wyzant.com/
              - text: is the nation's largest community of tutors, covering 300+ subjects
            - listitem [ref=e77]:
              - link "Teachers Pay Teachers (TPT)" [ref=e78] [cursor=pointer]:
                - /url: https://www.teacherspayteachers.com/
              - text: is a comprehensive marketplace for millions of educator-created resources
          - paragraph [ref=e79]: Our mission is to create innovative products that will make a real, positive difference for learners and educators and we're looking for passionate, mission-minded people to join us in achieving this goal. We have a unique culture at IXL that fosters collaboration and the open exchange of ideas. We value our team and treat one another with kindness and respect. We approach our work with passion, tenacity, and authenticity. We find it immensely satisfying to develop products that impact the lives of millions and we are eager to have you join our team.
          - blockquote [ref=e80]:
            - paragraph [ref=e81]:
              - emphasis [ref=e83]: At IXL, we value diversity in age, race, ethnicity, gender, sexual orientation, physical and mental ability, political and religious beliefs, and life experience, and we are proud to promote a work environment where everyone, from any background, can do their best work. IXL Learning is an equal opportunity employer and does not discriminate against applicants and employees based on any legally protected category.
