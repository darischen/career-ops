  - generic [ref=e40]:
    - generic [ref=e42]:
      - link "Apply now" [ref=e44] [cursor=pointer]:
        - /url: /company/careers/apply?gh_jid=8574194002
      - generic [ref=e45]:
        - heading "Software Engineer, New Grad" [level=2] [ref=e46]
        - heading "San Mateo, CA" [level=3] [ref=e47]
      - generic [ref=e48]:
        - paragraph [ref=e49]: IXL Learning, developer of personalized learning products used by millions of people globally, is seeking new graduates who have a passion for technology and education. You will dive into our code base and immediately contribute to our three extremely impactful educational products and build new, innovative products. You can fine-tune your existing skills and learn new ones as you work on one of our many teams. You’ll be able to work with our Core Technology team in back-end engineering, Front-end group using cutting-edge technologies like React, Mobile team in implementing iOS and Android apps, or our Full-stack teams who seek engineers interested in doing it all.
        - paragraph [ref=e50]: We find it immensely satisfying to develop products that impact the lives of millions, and we are eager to have you join our team.
        - paragraph [ref=e51]: This position requires you to be in our San Mateo, CA, headquarters office. H1B sponsorship is available for this position.
        - heading "WHAT YOU'LL BE DOING" [level=4] [ref=e52]
        - paragraph [ref=e53]: As a Software Engineer, you will build the back-end wiring, application logic, and UI that engage our users. You will find and use the best technologies to add features and create new products. You’ll be involved in all aspects of the development process – including design, coding, testing, debugging, and tuning. You will own your projects from start to end as they travel through our fast-paced development cycle. In addition to working with your fellow engineers, you’ll collaborate with other teams to design amazing products that meet the needs of our users, who are students and teachers all over the world.
        - heading "TECHNOLOGY" [level=4] [ref=e54]
        - paragraph [ref=e55]: Our server-side stack currently includes Linux, Apache, Java, Scala, Python, and Oracle. For our iOS app development, we use Swift. Our front-end code is written in JavaScript (including the React and D3 libraries, and ES6). Of course, the specific technologies and languages you use will vary by project and according to your own interests or specialization areas.
        - heading "WHAT WE'RE LOOKING FOR" [level=4] [ref=e56]
        - list [ref=e57]:
          - listitem [ref=e58]: Bachelor's or advanced degree in computer science or a related discipline
          - listitem [ref=e59]: Excellent programming skills
          - listitem [ref=e60]: Strong analytical-reasoning and problem-solving skills
          - listitem [ref=e61]: Ability to work both independently and with a wide variety of teams
          - listitem [ref=e62]: Knowledge of Unix, Python, Java, SQL, or JavaScript is a plus
          - listitem [ref=e63]: Passion for improving education through technology
        - paragraph [ref=e64]:
          - emphasis [ref=e66]: The base salary range for this full-time position is $110,000 to $135,000 + equity + benefits. Our pay ranges are determined by role, level, and location. The range displayed on each job posting reflects the minimum and maximum target for new hire salaries for the position. Individual pay is determined by work location and additional factors, including job-related skills, experience, and relevant education or training.
        - generic [ref=e67]:
          - heading "ABOUT IXL LEARNING" [level=4] [ref=e68]
          - paragraph [ref=e69]: "IXL Learning is the country's largest EdTech company. We reach millions of learners through our diverse range of products. For example:"
          - list [ref=e70]:
