    - generic [ref=e30]:
      - generic [ref=e31]:
        - text: Veeva Systems is building the industry cloud for Life Sciences to help companies work in a more efficient and connected way. Learn more about our products, vision and values, and status as a public benefit corporation on our
        - link "website" [ref=e32] [cursor=pointer]:
          - /url: http://veeva.com/
        - text: .
      - heading "The Role" [level=3] [ref=e33]
      - generic [ref=e34]:
        - text: We are hiring recent university graduates to grow the next generation of Software Engineers through our
        - link "Engineering Development Program" [ref=e35] [cursor=pointer]:
          - /url: https://www.veeva.com/generationveeva/na-edp/
        - text: .
      - generic [ref=e37]: We believe in pushing high potential people to achieve excellence. Our program is specifically designed to provide a challenging environment to learn quickly and deliver value early, equipping you with the resources to become an excellent engineer.
      - generic [ref=e38]: "REQUIREMENTS | We are looking for graduates who meet the following requirements:"
      - list [ref=e39]:
        - list [ref=e40]:
          - listitem [ref=e41]: Bachelor’s degree in computer science or related field from an accredited 4 year university with a 3.0 to 4.0 GPA
          - listitem [ref=e42]: Must have taken relevant C.S. classes, including at least one Compilers or Operating Systems class. The Fundamentals are important at Veeva
          - listitem [ref=e43]: High work ethic. Veeva is a hard-working company
          - listitem [ref=e44]: High integrity and honesty. Veeva is a PBC and a “do the right thing” company. We expect that from all employees
          - listitem [ref=e45]: Excellent verbal and written English communication skills. Engineering is not all about the code, it’s also about communication
          - listitem [ref=e46]: 0-2 years of professional software experience. We have other jobs for more experienced hires, but EDP is designed for those just getting going in their careers
          - listitem [ref=e47]:
            - text: Ability and desire to work in office 4 days/week for your first two years. After 2 years, you will have the flexibility to
            - link "Work Anywhere" [ref=e48] [cursor=pointer]:
              - /url: https://careers.veeva.com/work-anywhere/
      - generic [ref=e49]: "OUR TECHNOLOGY | We have a variety of different products and codebases, but in general, we use this tech stack:"
      - list [ref=e50]:
        - list [ref=e51]:
          - listitem [ref=e52]: System software is Java or Rust
          - listitem [ref=e53]: Application logic is Java, Python, TypeScript
          - listitem [ref=e54]: Front end is JavaScript, React, TypeScript
          - listitem [ref=e55]: Mobile is Swift, Kotlin, React Native
      - generic [ref=e56]: "THE PROCESS | Our process is different than most. It is designed to be fast, efficient and respectful. Here are the steps:"
      - list [ref=e57]:
        - list [ref=e58]:
          - listitem [ref=e59]: You submit your resume, short cover letter of questions, and take a personality test
          - listitem [ref=e60]: Within one week we will notify you via email if we would like to go to the next step or not
          - listitem [ref=e61]: The next step is a 1 hour online coding challenge in Java or Python
          - listitem [ref=e62]: After the coding challenge, the next step is a single 2-hour interview with a member of our tech evaluation team. Part of this is a coding exercise in the language of your choice (Java, JavaScript or Python)
          - listitem [ref=e63]: Within one week after this step, we will give you an offer, or let you know that we do not wish to move forward
          - listitem [ref=e64]: You will have one week to accept our offer or not. If you accept, we will hold a spot for you and expect you to show up on your start date. Accepting an offer and continuing to interview would be an ethical violation in our view
          - listitem [ref=e65]: When you join you will be assigned to an engineering manager in your work location. It’s important to know you are applying to work as an engineer in a location but not applying for a specific team/product
      - generic [ref=e66]: Compensation
      - list [ref=e67]:
        - list [ref=e68]:
          - listitem [ref=e69]: "Starting base pay (Cash + RSU): $137,500 + sign on bonus in Pleasanton"
      - generic [ref=e70]:
        - strong [ref=e71]: Work Authorization
        - text: ": Qualified candidates must be legally authorized to be employed in the United States. Veeva does not provide sponsorship for employment visa status (e.g., H-1B, OPT, or TN status) for this employment position."
      - generic [ref=e73]:
        - strong [ref=e74]: Work Environment
        - text: ": Veeva is a Work Anywhere company. You can choose to work in an office or remotely from home on any given day of the week. Although Veeva is Work from Anywhere, Associate Software Engineers must live within a maximum commuting distance of 45 minutes to 1 hour from their home office and must work in-office 4 days a week."
      - heading "#LI-Entry" [level=6] [ref=e76]
      - heading "#WU" [level=6] [ref=e77]
      - generic [ref=e79]: Veeva is an equal opportunity employer. All qualified applicants will receive consideration for employment without regard to race, color, sex, sexual orientation, gender identity or expression, religion, national origin or ancestry, age, disability, marital status, pregnancy, protected veteran status, protected genetic information, political affiliation, or any other characteristics protected by local laws, regulations, or ordinances. If you need assistance or accommodation due to a disability or special need when applying for a role or in our recruitment process, please contact us at talent_accommodations@veeva.com.
