        - generic [ref=e21]: Worldscape is a cutting-edge platform designed to unify distributed data, sensors, and intelligent agents across cloud, on-prem, and edge environments. By combining geospatial intelligence, physics-based 3D simulation, and reward-driven AI, Worldscape enables organizations to build immersive digital twins for predictive modeling, scenario planning, and adaptive decision-making. With a zero-trust security framework, seamless integration with legacy systems, and robust developer tools, Worldscape empowers rapid deployment of agentic applications that drive resilience and efficiency in sectors like logistics, telecom, defense, and infrastructure.
        - generic [ref=e23]: Worldscape is seeking a skilled Full Stack Software Engineer to join our innovative team. We are pioneering next-generation AI decision-making and agentic integration across our AI fabric. This role focuses on designing and implementing the next generation of platform to power end-to-end agentic solutions - from ingesting and transforming data sources, to deploying intelligent agents within our evolving platform.
        - generic [ref=e25]: As an Full Stack Engineer, you will work on complex data integration challenges, distributed real-time systems, portal, and leverage advanced models to deliver a scalable, extensible, and reliable platform to author/host and monitor agentic workloads. You will collaborate closely with product management, studio teams, and the rest of the engineering teams to ensure the best integration and predictable delivery to our customers.
        - generic [ref=e27]: This is an onsite role that will be located in Redmond, WA.
