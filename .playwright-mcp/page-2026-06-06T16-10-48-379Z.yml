            - generic [ref=e81]: Apply now
          - generic [ref=e83]: Meta is seeking a Software Systems Engineer to join our Production Systems Engineering organization, where you will work at the intersection of software and large-scale hardware infrastructure. In this role, you will design, build, and optimize the systems software that powers Meta's global production fleet — spanning servers, storage, networking, and custom silicon. You will drive reliability, efficiency, and performance improvements across the infrastructure stack, partnering closely with hardware engineering, data center operations, and platform teams to ensure Meta's production systems operate at scale.
          - separator [ref=e84]
          - generic [ref=e85]:
            - heading [level=2] [ref=e86]: Software Systems Engineer Responsibilities
            - list [ref=e87]:
              - generic [ref=e88]:
                - listitem [ref=e89]: Design and develop systems software for managing, provisioning, and monitoring large-scale production hardware infrastructure, including compute, storage, and networking components
                - listitem [ref=e90]: Build and maintain tooling for hardware lifecycle management, fleet health monitoring, and automated remediation of production system failures
                - listitem [ref=e91]: Collaborate with hardware engineering teams to define software interfaces and firmware integration requirements for new servers and accelerator platforms
                - listitem [ref=e92]: Develop and optimize low-level systems software, including kernel modules, device drivers, and platform management agents, to improve hardware utilization and reliability
                - listitem [ref=e93]: Architect scalable infrastructure automation frameworks that reduce manual operational toil and accelerate hardware deployment across Meta's data center fleet
                - listitem [ref=e94]: Identify and resolve systemic reliability and performance issues across production hardware by analyzing telemetry, failure patterns, and system-level diagnostics
                - listitem [ref=e95]: Define technical direction for production systems software components, driving alignment across infrastructure engineering and data center operations stakeholders
                - listitem [ref=e96]: Mentor other engineers on systems software design patterns, debugging methodologies, and production infrastructure best practices
                - listitem [ref=e97]: Lead cross-functional efforts to evaluate and integrate new hardware technologies into the production environment, including bring-up, validation, and qualification workflows
          - generic [ref=e98]:
            - heading [level=2] [ref=e99]: Minimum Qualifications
            - list [ref=e100]:
              - generic [ref=e101]:
                - listitem [ref=e102]: Bachelor's degree in Computer Science, Computer Engineering, relevant technical field, or equivalent practical experience
                - listitem [ref=e103]: 8+ years of experience in systems software engineering, including development in C, C++, or Python for Linux-based production environments
                - listitem [ref=e104]: 6+ years of experience with large-scale infrastructure systems, including hardware lifecycle management, fleet automation, or data center operations software
                - listitem [ref=e105]: Experience developing or integrating with low-level system components, such as kernel interfaces, BMC/IPMI/Redfish management stacks, or hardware telemetry frameworks
                - listitem [ref=e106]: Experience designing and operating distributed systems software at scale, including monitoring, alerting, and automated remediation pipelines
                - listitem [ref=e107]: Experience communicating technical decisions and system designs through written documentation and cross-functional stakeholder alignment
          - generic [ref=e108]:
            - heading [level=2] [ref=e109]: Preferred Qualifications
            - list [ref=e110]:
              - generic [ref=e111]:
                - listitem [ref=e112]: Experience debugging and troubleshooting issues across hardware and software boundaries
                - listitem [ref=e113]: Experience working on hardware/software projects in the manufacturing and hardware validation space
                - listitem [ref=e114]: Familiarity with test automation frameworks and CI/CD pipelines
                - listitem [ref=e115]: Experience with large-scale distributed systems
