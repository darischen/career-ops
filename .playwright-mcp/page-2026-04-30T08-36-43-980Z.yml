              - strong [ref=e454]: Why are you being asked to complete this form?
              - paragraph [ref=e455]: We are a federal contractor or subcontractor. The law requires us to provide equal employment opportunity to qualified people with disabilities. We have a goal of having at least 7% of our workers as people with disabilities. The law says we must measure our progress towards this goal. To do this, we must ask applicants and employees if they have a disability or have ever had one. People can become disabled, so we need to ask this question at least every five years.
              - paragraph [ref=e456]:
                - text: Completing this form is voluntary, and we hope that you will choose to do so. Your answer is confidential. No one who makes hiring decisions will see it. Your decision to complete the form and your answer will not harm you in any way. If you want to learn more about the law or this form, visit the U.S. Department of Labor’s Office of Federal Contract Compliance Programs (OFCCP) website at
                - link "www.dol.gov/ofccp" [ref=e457] [cursor=pointer]:
                  - /url: https://www.dol.gov/ofccp
                - text: .
              - strong [ref=e458]: How do you know if you have a disability?
              - paragraph [ref=e459]:
                - text: A disability is a condition that substantially limits one or more of your “major life activities.” If you have or have ever had such a condition, you are a person with a disability.
                - strong [ref=e460]: "Disabilities include, but are not limited to:"
              - list [ref=e461]:
                - listitem [ref=e462]: Alcohol or other substance use disorder (not currently using drugs illegally)
                - listitem [ref=e463]: Autoimmune disorder, for example, lupus, fibromyalgia, rheumatoid arthritis, HIV/AIDS
                - listitem [ref=e464]: Blind or low vision
                - listitem [ref=e465]: Cancer (past or present)
                - listitem [ref=e466]: Cardiovascular or heart disease
                - listitem [ref=e467]: Celiac disease
                - listitem [ref=e468]: Cerebral palsy
                - listitem [ref=e469]: Deaf or serious difficulty hearing
                - listitem [ref=e470]: Diabetes
                - listitem [ref=e471]: Disfigurement, for example, disfigurement caused by burns, wounds, accidents, or congenital disorders
