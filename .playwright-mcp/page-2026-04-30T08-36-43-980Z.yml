        - generic [ref=e16]:
          - paragraph [ref=e18]: Anduril Industries is a defense technology company with a mission to transform U.S. and allied military capabilities with advanced technology. By bringing the expertise, technology, and business model of the 21st century’s most innovative companies to the defense industry, Anduril is changing how military systems are designed, built and sold. Anduril’s family of systems is powered by Lattice OS, an AI-powered operating system that turns thousands of data streams into a realtime, 3D command and control center. As the world enters an era of strategic competition, Anduril is committed to bringing cutting-edge autonomy, AI, computer vision, sensor fusion, and networking technology to the military in months, not years.
          - generic [ref=e19]:
            - paragraph [ref=e20]:
              - strong [ref=e21]: "ABOUT THE TEAM:"
              - text: Anduril’s Maritime Division has assembled a diverse team of experts in software, robotics, artificial intelligence, sensor fusion, and data analysis to create software and hardware solutions that radically evolve the capabilities of our customers. We are fielding the next generation of autonomous systems to tackle the extremely challenging industry demands of maritime operations. Anduril has brought to market a unique, ultra-long-range, full-ocean-depth underwater vessel platform and a completely refreshed maritime vehicle and flexible manufacturing architecture that scales from "small" to "extra-large" vehicle sizes. Today, Anduril is executing on billion-dollar contracts while simultaneously performing Robot-as-a-Service (RaaS) AUV operations.
              - text: We are continuing to expand our product portfolio, now moving into the surface maritime domain. Products like Dive-XL, Dive-LD, Copperhead, Seabed Sentry, and surface products in the pipeline will create a system-of-systems that enable a multitude of autonomous missions across all maritime domains. If you are passionate about solving problems that have real impact and working on systems that directly contribute to achieving national strategic priorities, we want you to join Anduril’s Maritime Division and help us build the future of defense capability.
              - strong [ref=e22]: "ABOUT THE JOB:"
              - text: We are seeking a highly motivated and experienced Systems Software Engineer to join our team in Costa Mesa, California. You will work closely with the program leadership and a wide spectrum of cross-departments as part of a team focused on solving hard problems and changing the industry forever. In this role you will be responsible for designing, integrating, and managing complex, software-intensive mission autonomy systems based on the Lattice OS, with specific focus on integration into a coherent, consistent, and complete system for ASVs. You will bridge the gap between hardware and software, and between ship control and mission operations, handling the entire lifecycle across ConOps development, requirements development and analysis, design, testing, optimization, and maintenance. Join our dynamic team and help us build the next generation of autonomous maritime systems.
              - strong [ref=e23]: "WHAT YOU'LL DO:"
              - text: The ideal candidate should have strong experience building or supporting developer experience platforms, internal tools, and/or platform engineering solutions. They should have proficiency with networking and related cloud-native technologies, and have solid programming skills in languages such as Python, C++, Go, or Rust.
            - list [ref=e24]:
              - listitem [ref=e25]: Participate in development and maintenance of the mission system to vehicle autonomy / management system interface in accordance with software architecture principles.
              - listitem [ref=e26]: Lead development and maintenance of the mission system to payload management system interface in accordance with software architecture principles.
              - listitem [ref=e27]: Perform analysis of ConOps, DRMs, and mission flows, and develop mission behavior concepts with associated definition of inputs and outputs list, collaborating with a cross-functional team.
              - listitem [ref=e28]: Own the build package and configuration of the mission autonomy software for the MCS, OCS, and PDK instantiations.
              - listitem [ref=e29]: Build, checkout, and deliver the PDK to payload development teams.
              - listitem [ref=e30]: Support integration, checkout, debug, and test of mission autonomy as installed on each type of ship.
              - listitem [ref=e31]: Active contributor to HITL development, maintenance, and use.
              - listitem [ref=e32]: Hands-on co-lead for integration of each payload with the mission system on each type of ship.
              - listitem [ref=e33]: Support ship V&V planning for at-sea activity.
              - listitem [ref=e34]: Own the software build and configuration of ASV MissionSim, and perform validation testing of mission autonomy; responsible for acquisition, curation, and maintenance of scenarios and data sets required to support simulations.
              - listitem [ref=e35]: Work closely with other electrical, mechanical, software, firmware, and test engineers to deliver fully functional products
              - listitem [ref=e36]: Work in a fast-paced environment balancing schedule against cost and performance parameters
              - listitem [ref=e37]: Conduct peer-level and cross-discipline design reviews, perform requirements analysis, and plan system verification to ensure compliance with project goals and industry standards.
              - listitem [ref=e38]: Ultimately responsible for ensuring the mission autonomy solution is effective and sufficiently reliable to operate ASVs in the intended real world environments, conditions, and scenarios.
            - paragraph [ref=e39]:
              - strong [ref=e40]: "REQUIRED QUALIFICATIONS:"
            - list [ref=e41]:
              - listitem [ref=e42]: Bachelor’s Degree in Computer Science, Computer Engineering, Electrical Engineering or equivalent
              - listitem [ref=e43]: At least 5+ years of experience designing, implementing, testing, and troubleshooting software-based systems
              - listitem [ref=e44]: Experience in fieldable system design
              - listitem [ref=e45]: Familiarity with developing and executing test plans for complex systems
              - listitem [ref=e46]: High-ownership and a bias toward action – if you see a problem, you want to solve and fix it
              - listitem [ref=e47]: Must be able to obtain and hold a U.S. security clearance
              - listitem [ref=e48]: Ability to travel 25% with potential surges above 25%
            - paragraph [ref=e49]:
              - strong [ref=e50]: "PREFERRED QUALIFICATIONS:"
            - list [ref=e51]:
              - listitem [ref=e52]: Familiarity with software development processes and tools such as git, Github, JIRA, etc
              - listitem [ref=e53]: Experience with the design, implementation and support of robotic and/or autonomous systems
              - listitem [ref=e54]: Experience working within the defense, maritime and/or aerospace domains
              - listitem [ref=e55]: Experience within the product delivery lifecycle including manufacturing, system acceptance, deployment, and sustainment
              - listitem [ref=e56]: Familiarity with designing for rugged environments
