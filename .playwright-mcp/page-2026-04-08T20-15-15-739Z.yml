            - heading "About Thorin" [level=1] [ref=e42]
            - paragraph [ref=e43]: Thorin is an Applied AI company born out of 8VC’s Build program, focused on redefining how work gets done inside modern organizations.
            - paragraph [ref=e44]: We build proactive, long-horizon AI agents that continuously observe work across Slack, email, meetings, and documents—and take action so nothing falls through the cracks.
            - paragraph [ref=e45]: Unlike traditional AI tools that wait to be prompted, Thorin creates a real-time digital twin of how a business actually operates. This enables automation, coordination, and insight over months and years—not just single tasks.
            - paragraph [ref=e46]: Backed by 8VC and built with product vision from Joe Lonsdale, Thorin is building foundational infrastructure for agentic, AI-powered productivity. Thorin follows 8VC incubations such as Affinity, Addepar, and Saronic.
            - paragraph [ref=e47]
            - heading "About the Role" [level=1] [ref=e48]
            - paragraph [ref=e49]:
              - text: We’re hiring a New Grad Software Engineer
              - strong [ref=e50]
              - text: to help build and scale Thorin’s core product. This role is designed for strong generalists early in their careers who want to work across the stack, learn quickly, and ship real features used by real customers.
            - paragraph [ref=e51]: You’ll work closely with senior engineers and the founding team to build user-facing functionality, backend systems, and AI-powered workflows. This is a hands-on role with meaningful ownership, mentorship, and exposure to product and customers from day one.
            - paragraph [ref=e52]
            - heading "What You’ll Do" [level=2] [ref=e53]
