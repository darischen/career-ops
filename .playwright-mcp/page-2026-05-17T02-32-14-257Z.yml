        - generic [ref=e22]:
          - paragraph [ref=e23]: CLEAR is building THE secure identity company of the future. Our mission is to make experiences safer and easier—physically and digitally. With more than 38 million Members and a growing network of partners across the world, CLEAR's secure identity platform is transforming the way people live, work, and travel. Whether it’s at the airport, stadium, or throughout your everyday life, CLEAR unlocks the magic of frictionless experiences.
          - paragraph [ref=e24]: In this role, you will design, build, and deploy AI-powered systems that accelerate AI adoption across CLEAR’s internal workflows and customer-facing product experiences.
          - paragraph [ref=e25]: This role will partner directly with Product, Engineering, Data, Security, Legal, Compliance, Operations, and business teams to identify high-impact AI opportunities, rapidly prototype solutions, and productionize reliable, secure, and measurable AI systems. You will own use cases end-to-end, from discovery and evaluation through launch, monitoring, and iteration.
          - paragraph [ref=e26]:
            - emphasis [ref=e27]:
              - strong [ref=e28]: "What you’ll do:"
          - list [ref=e29]:
            - listitem [ref=e30]: Discover, prioritize, and build AI use cases across internal tools, employee workflows, and customer-facing product features
            - listitem [ref=e31]: Partner with Product, Engineering, Data, Security, Legal, Compliance, and Operations to translate business needs into AI-driven solutions
            - listitem [ref=e32]: Rapidly prototype AI agents, LLM applications, RAG workflows, automation tools, and product experiences
            - listitem [ref=e33]: Productionize validated AI use cases with strong evaluation, monitoring, logging, fallback paths, and operational ownership
            - listitem [ref=e34]: Build reusable patterns for prompt management, retrieval, tool use, evals, guardrails, and human-in-the-loop workflows
            - listitem [ref=e35]: Implement responsible AI best practices, including privacy, security, model governance, risk review, and customer impact assessment
            - listitem [ref=e36]: Measure and communicate AI impact across adoption, quality, cost reduction, productivity, customer experience, and business outcomes
          - paragraph [ref=e37]:
            - emphasis [ref=e38]:
              - strong [ref=e39]: "How you’ll measure success:"
          - list [ref=e40]:
            - listitem [ref=e41]: Number of high-impact internal and customer-facing AI use cases launched
            - listitem [ref=e42]: Adoption and measurable business impact of AI-powered tools and features
            - listitem [ref=e43]: Quality, reliability, latency, and safety of deployed AI systems
            - listitem [ref=e44]: Reduction in manual work, operational cost, or customer support volume
            - listitem [ref=e45]: Improvement in customer experience, containment, accuracy, or workflow efficiency
            - listitem [ref=e46]: Percentage of AI use cases with clear owners, evals, monitoring, and governance controls
            - listitem [ref=e47]: Speed from AI opportunity identification to prototype, pilot, and production launch
          - paragraph [ref=e48]:
            - strong [ref=e49]: "What you’re great at:"
          - list [ref=e50]:
            - listitem [ref=e51]: 1+ years of experience in software engineering, AI engineering, machine learning engineering, data engineering, or related technical roles
            - listitem [ref=e52]: Hands-on experience building with LLMs, AI agents, RAG, model APIs, prompt engineering, or AI application frameworks
            - listitem [ref=e53]: Strong programming skills in Python and/or another modern backend language
            - listitem [ref=e54]: Experience building and deploying production systems with APIs, data platforms, cloud infrastructure, logging, monitoring, and testing
            - listitem [ref=e55]: Ability to work directly with business teams to understand ambiguous workflows and turn them into usable AI products
            - listitem [ref=e56]: Strong product judgment and ability to identify practical, high-ROI AI use cases
            - listitem [ref=e57]: Understanding of responsible AI concepts, including evals, guardrails, data privacy, security, human oversight, and model governance
            - listitem [ref=e58]: Ability to communicate complex technical concepts to technical, non-technical, and executive stakeholders
            - listitem [ref=e59]: Comfort operating in fast-paced, ambiguous environments with strong ownership from idea to impact
            - listitem [ref=e60]: Passion for building AI systems that are practical, secure, measurable, and user-centric
          - paragraph [ref=e61]:
            - strong [ref=e62]:
              - emphasis [ref=e63]: "How You’ll be Rewarded:"
          - paragraph [ref=e64]: At CLEAR we help YOU move forward - because when you’re at your best, we’re at our best. You’ll work with talented team members who are motivated by our mission of making experiences safer and easier. In our offices, you’ll enjoy benefits like meals and snacks. We invest in your well-being and learning & development with our stipend and reimbursement programs.
          - paragraph [ref=e65]: We offer holistic total rewards, including comprehensive healthcare plans, family building benefits (fertility and adoption/surrogacy support), flexible time off, free OneMedical memberships for you and your dependents, and a 401(k) retirement plan with employer match.
          - paragraph [ref=e66]: The total compensation range for this role is $110,000-$160,000 depending on levels of skills and experience.
          - paragraph [ref=e67]: This range represents the combined base salary, and new hire equity package (in Restricted Stock Units) for this position at CLEAR. Additionally, this role will be eligible for refresh equity grants as part of our ongoing compensation program. Actual compensation will vary based on factors including, but not limited to, location, education, skills, experience, and performance. All stock based compensation will be subject to the terms and conditions of applicable agreements.
          - paragraph [ref=e68]:
            - emphasis [ref=e69]: Qualified applicants will receive consideration for employment without regard to race, color, religion, sex, sexual orientation, gender identity, national origin, disability, protected veteran status or other characteristics protected by law.
          - paragraph [ref=e70]:
            - emphasis [ref=e71]: CLEAR provides reasonable accommodation to qualified individuals with disabilities or protected needs. Please let us know if you require a reasonable accommodation to apply for a job or perform your job. Examples of reasonable accommodation include, but are not limited to, time off, extra breaks, making a change to the application process or work procedures, policy exceptions, providing documents in an alternative format, live captioning or using a sign language interpreter, or using specialized equipment.
          - paragraph [ref=e72]:
            - emphasis [ref=e73]: We are committed to a transparent and secure hiring process. All communications related to this role will come directly from a CLEAR employee through valid CLEAR channels (e.g., a valid @clearme.com email address or verified CLEAR LinkedIn profile). We encourage candidates to remain alert to job scams and to report any suspicious activity.
