            - paragraph [ref=e43]: Liquid is a trading platform to trade anything, anytime, and anywhere. Our team is small, highly efficient, motivated, and focused on engineering excellence. We cultivate individuals that enjoy ownership and thrive off of agency. We operate with a flat organizational structure. All employees are expected to be hands-on, and contribute directly to the company's mission. Work ethic, contextual organization and strong prioritization are important. All employees are expected to have strong communication skills. They should be able to concisely and accurately share knowledge with their teammates.
