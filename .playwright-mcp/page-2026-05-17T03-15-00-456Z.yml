          - generic [ref=e36]:
            - paragraph [ref=e37]:
              - strong [ref=e38]: Who are we?
            - paragraph [ref=e39]: Our mission is to scale intelligence to serve humanity. We’re training and deploying frontier models for developers and enterprises who are building AI systems to power magical experiences like content generation, semantic search, RAG, and agents. We believe that our work is instrumental to the widespread adoption of AI.
            - paragraph [ref=e40]: We obsess over what we build. Each one of us is responsible for contributing to increasing the capabilities of our models and the value they drive for our customers. We like to work hard and move fast to do what’s best for our customers.
            - paragraph [ref=e41]: Cohere is a team of researchers, engineers, designers, and more, who are passionate about their craft. Each person is one of the best in the world at what they do. We believe that a diverse range of perspectives is a requirement for building great products.
            - paragraph [ref=e42]: Join us on our mission and shape the future!
            - paragraph [ref=e43]:
              - strong [ref=e44]: Why this role?
            - paragraph [ref=e45]: This role is for students who are excited about building the next generation of machine learning models and NLP products. Our SWE roles can cover creating datasets for machine learning, scaling the pods to serve our API, or even building out new security features on our platform. We don't distinguish much between interns and full-time employees, and you’ll have plenty of opportunities to push code to production. You'll have full autonomy and ownership over high-impact work, and will be backed by the support of an incredible team or leaders & mentors.
            - paragraph [ref=e46]:
              - text: Join us at a pivotal moment, shape what we build, and wear multiple hats!
              - text: We're currently hiring for multiple teams and roles, including Frontend, Backend, Full-stack, and Infrastructure roles. We'll take your interests & experience into account throughout the application process.
              - text: Our recruitment process will begin in the upcoming weeks, and we will be carefully reviewing applications and assessing potential candidates for our internships. Should we find a suitable match with your qualifications and our requirements, we will be in touch to discuss the opportunity further and to advance your application to the next stage.
            - paragraph [ref=e47]:
              - strong [ref=e48]: "Please Note:"
              - text: To be eligible for this position, you should be currently enrolled in a post-secondary program and available for a full-time 3-6 month internship, co-op, or research work term.
            - paragraph [ref=e49]
            - paragraph [ref=e50]:
              - strong [ref=e51]: "As a Software Engineering Intern, you will:"
            - list [ref=e52]:
              - listitem [ref=e53]:
                - paragraph [ref=e54]: Ship delightful experiences for our user-facing products, meticulously crafting code for browsers or server code.
              - listitem [ref=e55]:
                - paragraph [ref=e56]: Build features for the API platform that directly impact users.
              - listitem [ref=e57]:
                - paragraph [ref=e58]: Design and implement robust data pipelines (crawlers, storage, filters).
              - listitem [ref=e59]:
                - paragraph [ref=e60]: Design and implement scalable services or infrastructure for machine learning development.
              - listitem [ref=e61]:
                - paragraph [ref=e62]: Build internal tooling (CI/CD, dev utilities) to move faster together.
              - listitem [ref=e63]:
                - paragraph [ref=e64]: Build tech writing skills through maintaining and contributing to technical documentation, both internal and external facing.
              - listitem [ref=e65]:
                - paragraph [ref=e66]: Keep up with the cutting edge and adopt new technologies to improve performance and reliability across Cohere.
            - paragraph [ref=e67]: If some of the above doesn’t line up perfectly with your experience, we still encourage you to apply!
            - paragraph [ref=e68]
            - paragraph [ref=e69]:
              - text: We value and celebrate diversity and strive to create an inclusive work environment for all. We welcome applicants from all backgrounds and are committed to providing equal opportunities. Should you require any accommodations during the recruitment process, please submit an
