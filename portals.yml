# Portal Scanner Configuration — Comprehensive Tech + Household Names
# Covers major tech companies, app platforms, hardware makers, and household name companies with tech divisions.
# Used by /career-ops scan to discover new offers automatically.

title_filter:
  positive:
    # -- New grad / entry-level roles (Bachelor's degree) --
    - "New Grad"
    - "Entry-Level"
    - "Junior"
    - "Early Career"
    - "Recent Graduate"
    # -- General roles --
    - "Engineer"
    - "Software"
    - "Developer"
    - "ML"
    - "AI"
    - "Data"
    - "Product"
    - "Design"
    - "DevOps"
    - "Hardware"
    - "Firmware"
    - "Full-Stack"
    - "Frontend"
    - "Backend"
    - "Mobile"
    - "Solutions"
    - "Architect"
    - "SRE"
    - "Platform"
    - "Security"
    - "Infrastructure"
    - "Cloud"
    - "Systems"
  negative:
    # -- Seniority levels (too senior for new grad) --
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Director"
    # -- Graduate degree required (Master's/PhD) --
    - "Graduate Degree"
    - "Master's"
    - "PhD"
    - "Advanced Degree"
    # -- Internships & co-ops (already passed) --
    - "Intern"
    - "Internship"
    - "Co-op"
    # -- Legacy/dead tech stacks --
    - "COBOL"
    - "Mainframe"
    - "Swing"
    - "AWT"
    - "WPF"
    - ".NET Framework"  # (but allow .NET Core)
    - "DB2"
    - "VSAM"
    - "JCL"
    - "RPG"
    # -- Non-US locations (willing to relocate within US only) --
    - "Tokyo"
    - "Japan"
    - "London"
    - "UK"
    - "United Kingdom"
    - "Berlin"
    - "Germany"
    - "Paris"
    - "France"
    - "Singapore"
    - "Hong Kong"
    - "Sydney"
    - "Australia"
    - "Toronto"
    - "Canada"
    - "Europe"
    - "EMEA"
    - "APAC"
    - "Asia Pacific"

search_queries:
  # Generic searches across all major job boards
  - name: "All Boards — Engineer (Remote)"
    query: '"Engineer" OR "Software" OR "Developer" remote'
    enabled: true

  - name: "All Boards — AI/ML (Remote)"
    query: '"AI" OR "ML" OR "Machine Learning" engineer remote'
    enabled: true

  - name: "Greenhouse — All Tech"
    query: 'site:job-boards.greenhouse.io OR site:boards.greenhouse.io engineer'
    enabled: true

  - name: "Ashby — All Tech"
    query: 'site:jobs.ashbyhq.com engineer'
    enabled: true

  - name: "Lever — All Tech"
    query: 'site:jobs.lever.co engineer'
    enabled: true

  - name: "New Grad 2026 — GitHub"
    query: 'site:github.com vanshb03 "New-Grad-2026" engineer OR developer OR software'
    enabled: true

  - name: "SimplifyJobs — New Grad Positions"
    query: 'site:github.com SimplifyJobs "New-Grad-Positions" engineer OR developer'
    enabled: true

  - name: "Workday — All Tech"
    query: 'site:myworkdayjobs.com engineer OR developer OR software'
    enabled: true

  - name: "Built In — Tech Jobs"
    query: 'site:builtin.com engineer OR developer OR software'
    enabled: true

